body:
  text: 論學繩尺巻七宋魏天應編選林子長箋觧因顯知微格與後篇夫子之道忠恕論同意仁知愛人知人如何蔡順孫出處論語顔淵篇樊遲問仁子曰愛人問知子曰知人樊遲未遲子曰舉直錯諸枉能使枉者直樊遲退見子夏曰鄉也吾見於夫子而問知子曰舉直錯諸枉能使枉者直何謂也子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣立説仁知之全體至大而難名惟聖人能㑹之學者不能盡知也樊遲問仁知之時夫子若遲指其全體以告之豈不適滋其惑故莫若即其所發見者以明其所難見者仁知者體之難見者也愛人知人者用之發見者也以愛人之用而明仁之體以知人之用而明知之體夫子告樊遲之大意如此蓋欲悟其所易知也批云發夫子善誘之㫖明樊遲漸進之學文字有涵蓄有發越自淺入深節節精宻可為矜式論曰天理不可名也仁知難知即其用以名其體則幾矣即愛人知人之用以明仁知之體幾近也夫理之全體為至大本未易以一端盡也仁知全體至大難名然是體之全惟聖人為能㑹之暗指孔子能知之學者能盡知之乎暗指樊遲未盡知之夫其不能以盡知也連接上不能盡知説去學陳止齋文法聖人遽指其體以告之設使孔子遽然指仁知之全體以告樊遲豈不適滋其惑哉豈不甚樊遲之疑惑是故莫若即其所發見者以明其所難見者愛人知人是所發見者仁知是所難見者何則喚下意體之隱於無形者為難見而發見於用者不可掩也隱於無形者仁知之體發見而不可掩者愛人知人之用也今夫仁也知也出題字以其體之全者論之應體字則至大而不可名仁知之體為難見自其發於用者求之應用字則愛人雖不足以盡仁知人雖不足以盡知斡一轉方見得仁知之大處而仁知之端則於此乎發見愛人知人之用為易見聖人之語學者孔子之告樊遲與其直告之以是體而難名仁知孰若姑舉其用以明是體哉以愛人知人之用明仁知之體吁此夫子之答樊遲仁知之問所以有愛人知人之説舉本文不然夫子豈不知仁知之大有非愛人知人所能盡哉反斡有力亦應前愛人雖不足以盡仁知人雖不足以盡知之意仁知愛人知人如何夫子之語遲者如此惜遲之終未達也指本文漢遲未逹亦為後面張本得古論體請嗣論之夫仁知太極之動靜也用周子太極圗語太極動而生陽動極而靜靜而生隂一動一靜互為其根又用易繫辭故神無方而易無體一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之智議論本此太極之隱於渾淪者無方可求無體可見人孰得而名之以太極比仁知説得地位廣大太極之體不可得而知亦如仁知之體不可得而見見上注又用朱文公與陸象山辨太極圖語所可名者雨露之發生日月之昭回耳仁之用見於愛人如天之雨露知之用見於知人如天之日月謂雨露日月足以盡太極之造化固不可如謂愛人知人足以盡仁知固不可謂其非太極之造化尤不可也如謂愛人知人不足以盡仁知亦不可散而為雨露日月者造化之用如愛人知人之用渾而為太極者造化之體如仁知之體苟不於其用而觀之則太極之妙果何自而窺其際哉不觀造化之用無以知太極之體不觀愛人知人之用無以知仁知之體噫知太極則知仁知矣將太極與仁知打合了古之善言仁知者莫孟子若也引孟子之言為証而孟子之所謂仁知亦惟曰惻隱是非之端而已孟公孫丑上惻隠之心仁之端也云云是非之心知之端也夫惻隱是非豈足以言仁知之極哉應冐夫子豈不知仁知之大有非愛人知人之所能盡哉而孟子特以端言之以端字比愛人知人字見上注端者一性之所發見端者一性之發見愛人知人者仁知之發見孟子亦謂仁知之隱於性者體也應體字而惻隱是非之發於端者用也應用字體不可見而用可見應冒體之隱於無形者為難見而發見於用者不可掩即其用以明其體則不可見者可見矣應破題語孔孟誨人是或一道也又將孟子與孔子打合了吾讀魯論一書記門人問答之辭論語序言魯論語二十篇皆孔子弟子記諸善言也其言仁者雖不一而足先説孔子與諸弟子言仁非一次其於由也寧許之以千乘之國而不許之以仁語公冶孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也於求也寧許之以千室之邑而不許之以仁同上求也何如子曰求也千室之邑百乘之家可使為之宰也不知其仁也是何其重於言仁也要喚下意其言知者尤不多見再説孔子與諸弟子言知亦非一次不過曰知者利仁知者不惑而已也里仁仁者安人知者利人憲問子曰仁者不憂知者不惑勇者不懼何其不輕於言知也豈不以仁之大如天必以天地萬物為一體而後謂之仁答上言仁意且説仁之大處物伊川云仁者以天地萬為一體知之妙如神必至於窮神知化彰往察來而後謂之知答上言知意且説知之大處史記其仁如天其知如神化易繫辭窮神知彰往而察來以堯舜之聖猶以為病語雍也子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸以周公之賢有所未盡孟公孫丑下陳賈曰周公使管叔監殷管叔以其殷畔知而使之是不仁也不知而使之是不知也仁知周公未之盡也顧可易言哉以上説仁知至大雖以堯舜周公大聖人且未易盡况於由求諸子夫其平日不易於言連接上易言二字文如貫珠而一旦於樊遲之問即舉二語以告之曰愛人曰知人焉舉本文又何其易易耶應上易字吁嗟嘆之辭是殆未究夫子所以言也歸本意蓋是理之在人心有體則不能以無用應主意體用二字體之隱者非聖人莫能知應冒體之隱於無形者為難知惟聖人為能㑹之而用之顯者夫人可與知也應冒發見於用者不可掩也語用中庸夫婦之愚可以與知體之渾然者固難輕以語人應冒與其直告之以是體之難名而用之粲然者則亦未始不可語人也應冒孰若姑舉其用以明其體渾然粲然用朱文公注太極圖語矧夫學者之於道其資有敏鈍其識有深淺謂孔門人品之不同敏而深者固易以告語如顔曽之徒則其資敏而識深而鈍且淺者亦豈能使之頓悟哉如樊遲之徒則其資鈍而識淺本出處注程子曰聖人之語因人而變化雖若有淺近者而其包含無所不盡南軒曰遲之在孔門雖資禀之鈍然亦務實者若樊遲之在聖門正引樊遲來説明睿不如顔顔淵悟理不如曽曽參固嘗問仁矣夫子告之以居處恭執事敬而不之悟且舉樊遲平時問仁事來説人語子路篇樊遲問仁子曰居處恭執事敬與忠雖之夷狄不可棄也又嘗問知矣夫子答之以務民之義而猶不悟語雍也樊遲問知子曰務民之義敬鬼神而逺之可謂知矣夫舉日用常行者以告之可謂曉然易見矣夫子告樊遲仁知之問皆曉然易見而彼且未能心通而黙識彼且未之悟使夫子遽告之以天理之全則亦終於不達而已指本文樊遲未達應冒聖人遽指大體以告之豈不適滋其惑意是故夫子於此不得不姑即其發見於用者以曉之應冒發見於用意孰為用喚起用字曰答云愛人者仁之用也知人者知之用也釋本意分曉有如動一惻隱之心此愛之形於一念者也見前注之演愛人者仁用意然使樊遲知愛人足以為仁而推之以至於無所不愛則可以為仁之方也已應冒愛人雖未足以盡仁而仁之端則於此乎發見又充廣一步説萌一是非之心此知之見於一事者也見前注之演知人者知用意然使樊遲悟知人足以為知而推之以至於無所不知則亦可以語知之大也已應冒知人雖未足以盡知而知之端則於此乎發見又充廣一步説是則夫子於是理之全體雖言之有所未竟言夫子答樊遲之問仁知而遲猶未達再問諸子夏然由其所已言悟其所未言已言者愛人知人之用未言者仁知之體則體用一源顯微無間矣用伊川語惜遲之終未達而猶有子夏之問也引本文文勢不斷見題注抑遲則未達矣就未達二字轉作結尾子夏得因樊遲之問發明夫子舉直錯枉之㫖詳見題注事朱文公曰遲以夫子之言專為知者之又未達所以能使枉者直之理非惟達仁知之兩端而且能㑹仁知為一本見本題注朱文公曰臯陶舜之相也伊尹湯之相也不仁者逺言人皆化而為仁不見有不仁者所謂使枉者直也子夏蓋有以知夫子之兼仁知而言矣子夏其進於樊遲一等矣此句似貶樊遲子夏之見識髙於樊遲故有此議論雖然入轉扶起樊遲文字有抑揚微樊遲亦無以發夫子之藴是亦善學也已南軒曰樊遲未逹疑其未可以盡也夫子復告之以舉直錯枉能使杜者直言知人之功用如此遲猶有疑而訪之子夏遲之所疑者在他人則亦忽而不之疑也其於師友之際問辨之不置如此子夏聞夫子之言而富之舉舜湯之事以廣其心於此可見知人之為大矣謹論此篇多學後篇文法因顯知微格與前篇仁知愛人知人論同意夫子之道忠恕林雷震出處論語里仁第四子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣立説忠恕乃學者之所共知一貫乃夫子之所獨造夫子語曽子以一貫之妙惟曽子知之學者未知也曽子因門人之問不以一貫語之而以忠恕語之者蓋欲學者因其所共知而悟其所獨造也餘並見後注批云出入程朱張三先生議論理明文徹發越無餘藴矣論曰以學者之所共知夫子之道忠恕明聖人之所不可知子曰吾道一以貫之非深於道者不然也指曽子深知夫子之道夫盡已之謂忠推已之謂恕張南軒釋本文云云忠為之體恕為之用朱文公釋本文云忠為體恕為用實有是體則實有是用又南軒云忠者體恕者用大本逹道也學者苟無志於斯道則已學者無意於忠恕之道則已矣誠有志焉果有意於此道其於日用常行之際豈能有出於此也哉豈有出於忠恕之外然以盡已為忠推已為恕猶待於盡之推之而後為忠恕也南軒云盡已之謂忠推已之謂恕夫子之一理渾然而泛應曲當譬則天地之至誠無息而萬物各得其所也自此之外固無餘法而亦無待於推矣曽子有見於此而難言之故借學者盡已推已之目以著明之欲人之易曉也聖人之心渾然一理周流乎萬物之間見上注南軒議論其在已也則至誠無息無時而非忠同上文至誠無息者道之體也又伊川曰以已及物忠也其及物也則泛應曲當無往而非恕同上文萬物各得其所者道之用也又伊川曰推已及物恕也由學者而觀聖人觀曽子而夫子雖有淺深小大之不同與原題相應其為忠恕則一而已矣伊川曰聖人教人各因其才吾道一以貫之唯曽子為能達此孔子所以告之也曽子告門人曰夫子之道忠恕而已矣亦猶夫子之告曽子也又南軒釋本文云道無不該也而有隠顯本末内外之致焉忠恕者門人之所共知一貫者聖人之所獨造發出本意見上文注夫子語曽子一貫之㫖曽子以忠恕明一貫之妙見上注使門人因其所共知而悟其所獨造使門人因曽子言忠恕之㫖而悟夫子一貫之妙則聖人之道何必髙逺而求之哉夫子之道忠恕而已矣何必求之髙逺夫子之道忠恕請申論之嘗謂有學者之忠恕如中庸忠恕違道不逺之説又見下注有聖人之忠恕程子曰忠恕一以貫之與違道不逺異者動以天爾又南軒曰聖人全乎此天之道也曽子所稱忠恕是已已賢人求盡乎此人之道也子思所稱忠恕是夫理一也總本文果有聖人學者之别哉設難及觀中庸違道不逺之論見上注然後喟然而嘆曰忠恕之道雖不可以差殊觀而可以小大論雖不可以彼此分而可以淺深論南軒曰云見上注程子所謂如百尺木自根本至豪未皆一貫也若隠顯本末内外之致泯然莫别則所謂一以貫之者亦何所施哉四應冒淺深小大字是故無伐善無施勞顔子之忠恕也語公冶長顔淵曰願無伐善無施勞施諸已而不願亦勿施諸人子思之忠恕也見記中庸云云老吾老以及人之老㓜吾㓜以及人之㓜孟子之忠恕也見孟梁惠王上云云恕以上三人皆學者之忠夫子之忠恕雖不可以此論惟夫子是聖人之忠恕然小者大之基淺者深之漸也又應小大淺深四字即小以明大則大者可得而求因淺以論深則深者可得而見由忠恕之㫖以悟一貫之妙曽子不以一貫之㫖語門人而以忠恕言之引本文蓋一貫之妙難名而忠恕之道易知也發出主意應胃門人因其所以知悟其所獨造意夫忠之有恕猶影之隨形也程子曰忠者天道恕者人道忠者無妄恕者所以行乎忠也忠者體恕者用大本達道也非忠則恕無由生非恕則忠無以見見上注是故中心為忠盡心為忠分兩股設此先説忠公南軒曰或曰中心為忠朱文曰盡心為忠日省月試唯恐一毫之未盡者此學者之所謂忠也中庸云云自夫子而觀之斡歸夫子身上温良恭儉見於造次顛沛之頃語學而夫子温良恭儉讓以得之又里仁造次必於是顛沛必於是忠信篤敬得於不思不勉之餘語子曰言忠信行篤敬雖蠻貊之邦行矣又中庸不思而得不勉而中從容中道聖人也自志學之年至於從心不踰矩之日又為政子曰吾十有五而志于學云云七十而從心所欲不踰矩道體混融表裏無間斂之而不見其迹窮之而莫得其際夫子之道亦曰忠而已矣南軒曰夫子之一理渾然而泛應曲當同又指本文此是聖人之忠與學者之忠不又見下注如心為恕推心為恕此説恕南軒曰或曰如心為恕又程子曰推已及物恕也以已驗物惟恐推之有所未盡者此學者之所謂恕也用朱文公語自夫子而觀之幹歸夫子身上老者安之朋友信之少者懐之語公冶長子路曰願聞子之志子曰云云互鄉不必進而進之不以為嫌語述而互鄉童子見門人惑子曰與其進也不與其退也鄭曰互鄉鄉名其鄉人言語自專不達時宜南子不必見而見之不以為過語雍也子見南子子路不悦夫子矢之曰予所否者天厭之天厭之朱文公云南子衛靈公之夫人有滛行孔子至衛南子請見孔子辭謝不得已而見之綏之斯來動之斯和語子張子貢曰夫子之得邦家者所謂立之斯立道之斯行云云夫子之道亦曰恕而已矣指本文此是聖人之恕與學者之恕不同南軒曰而已矣者竭盡而無餘之詞也夫子之所謂一貫者忠恕也程子曰忠恕一以貫之所謂忠恕者天地之至誠無息而萬物各得其所也見前注又見下注至誠無息者道之體也萬殊所以一本也萬物各得其所者道之用也一本所以萬殊也六句全用張南軒議論學者雖不可以語此學者之忠恕雖未便至聖人一貫地位然忠恕之道則通上下而言之見胃頭注又南軒曰中庸所謂忠恕違道不逺斯乃下學上達之義始焉盡已而終則無所盡向也推已而今則不待推張南軒曰盡已之謂忠推已之謂恕云云自此之外固無餘法而亦無待於推矣一充廣下去説謂由學者之忠恕可以詣聖人之貫學至於是則為聖人之忠恕而一貫之理盡在是矣南軒曰以此觀之一以貫之實可見矣又見萬殊一本注然則曽子以忠恕之道而達一貫之機其妙於啓迪頋如是哉程子曰聖人教人各因其方吾道一以貫之唯曽子為能達此孔子所以告之也曽子告門人曰夫子之道忠恕而已矣亦猶夫子之告曽子也應冒語大扺悟人者必從其所已知明道者必先其所易諭又立議論皆學者所已知聖人所易諭之理如曰孔子之道忠恕堯舜之道孝悌人方病道之難知而又瀆之以未諭之説則彼有益惑而已學陳止齋文亦應冒語且堯舜之道巍巍蕩蕩蓋不可以盡言也語泰伯子曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉而孟子以孝悌言之孟子曰堯舜之道孝悌而已矣由世俗而論之昏定晨省亦可以言孝曲禮云凡為人子者冬温而夏凊昏定而晨省徐行後長者亦可以言悌孟子徐行後長謂之弟疾行先長謂之不弟以堯舜之孝悌為止於此則不可以世俗之所能而謂其非堯舜之道則又大不可也如以夫子之道止於忠恕則不可以忠恕為非夫子之道則又大不可堯舜之道孝悌而已矣夫子之道忠恕而已矣就而已矣三字打合得恰好知孟子之言孝悌則知曽子之言忠恕甚妙謹論前篇以仁知之體為難知而愛人知人之用為易見故孔子答樊遲之問不曰仁知而曰愛人知人者蓋欲以其所易見而悟其所難知此篇以一貫之道為獨造而忠恕之道為共知故曽子答門人之問不曰一貫而曰忠恕者蓋欲以其所共知而悟其所獨造也兩篇文意一同因後知前格與後篇王導深器謝安論同意蕭何竒韓信曽衞龍出處前漢韓信傳數與蕭何語何竒之漢王至南鄭信亡何聞信亡自追之居一二日何來謁上罵曰若亡何也何曰追亡者耳上曰所追者誰也曰韓信云云諸將易得如信國士無雙王必欲長王漢中無所事信必欲爭天下非信無可與計事者顧王䇿安決王曰吾亦欲東耳何曰王計必東能用信信即留不能用信信即亡矣云云又見原題注立説謂蕭何知漢圖天下之大勢以三秦為重當時無一人知之獨信知之數與何言與之相合此何所以深竒之觀韓信後來告帝之語無非以秦之故地為急則知何之所以竒之者在乎此也批云蕭何始之所以竒韓信者言無所考觀後來信之告帝首以定三秦為急則知何之竒信者以其知大勢與何合也原題便從蕭韓二子説去中間文勢最有法度論曰知所以圖天下之勢勢字指定三秦而後可以識天下之才矣才字指韓信識字指竒蕭何之心在於先定三秦而韓信所言與之合故竒之夫當天下未定之時暗指漢初固必得豪傑之才而後濟暗指韓信然世之所謂豪傑者申上豪傑二字其識見議論毎與人殊所見所言與他人異自非為大臣者深察乎天下利害之勢大臣暗指蕭何應破勢字而斯人之見與之不謀而同斯人指韓信則亦安能識其英偉竒傑而㧞之儔人中哉設使蕭何本心不與信言相合豈能知信之豪傑而㧞之於衆人之中方韓信歸漢之初不過一亡卒耳先挈韓信説韓乃楚之亡卒當時碌碌未有竒節用史傳語且説他有何竒處蕭相國果何所見而竒之耶入蕭何來難一難意何之在漢解上文其所以察乎進取天下之勢者固已甚熟先定三秦字應主意勢而信之所言適契其心謂信所言亦在定三秦故與何合是故數與之語而遂以國士竒之也數音朔謂之數者非一次也詳見題注向使何之胷中未有定畫反應深察天下之大勢意則聞信之説不疑其大言無當則病其落落難合矣無當不合理之言落落不相入之貌安能力薦於君而使其盡酬平日之議論哉反説竒字大有力詳見題注蕭何竒韓信請申論之蓋嘗即韓信登壇之論本題下文云云王素慢無禮今拜大將如召小兒此信所以去也王必欲拜之擇日齋戒設壇塲具禮乃可王許之以驗蕭何用蜀之語蕭何傳臣願大王王漢中養其民以致賢人收用巴蜀還定三泰天下可圖也題下便摘出蕭韓言論同處證主意而知天下英雄之所見畧同焉三國志英雄之士所見畧同應主意方帝困於南鄭之時見本題注帝固憤鬱不平謂髙祖亦不欲居南鄭又信傳吾亦欲東耳安能鬰鬰久居此乎而諸將之計亦莫知所出抑諸將皆不知定三秦為急何之勸帝則曰還定三秦而天下可圖見題下注信之告帝則曰舉兵而東三秦可傳檄而定見本題下文今大王舉而東云云二人之論不相謀而相合見得蕭韓二子言之相合皆以定三秦為急豈非皆有見於進取天下之大勢歟應冒頭然則何之竒信固非偶然矣歸竒字上何則設問斡下意關中之險百二之勢婁敬傳陛下入關而都按秦之故又本紀田肻賀上曰秦形勝之國也帶河阻山縣隔千里持㦸百萬秦得百二焉言秦地險固二萬人足當諸侯百萬人也圖天下者之所必先也此天下利害大勢所在秦得之而不能守秦不能守三秦楚得之而不能居楚又不能居三秦是天之所以資漢也則是天以三秦與漢用酈食其傳語為漢計者宜莫先於席巻三秦據殽函之固東向以臨天下叙傳席巻三秦闗中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面東制諸侯是其勢之所甚便者應勢字當時羣臣類莫之察應諸將之計莫知所出而蕭相國獨深知之發出本意想其朝夕之間議論之際形容數與蕭何語之時咨訪捜攬求得夫英雄豪傑之士而圖此駿功者其志固先定矣駿功大功也英雄豪傑指韓信熟應冒頭何察進取天下之勢已意而一時之臣蓋未有副其薦㧞之意者謂諸將攻城畧地非無絳灌樊噲之流也絳侯周勃及灌嬰樊噲皆髙帝之功臣有攻城畧地之勞馳説口辨非無陸酈隋何之軰也陸賈酈食其隋何皆髙帝之臣有馳説口辨之能然不知天下大勢之所在應勢字則尅一城是一城而已其功小降一敵是一敵而已其功亦小其於國家大事竟亦何補惟取天下大勢在於定三秦説倒諸將孰謂竒謀逺畧足以成天下之大功者乃有如韓信者乎今考信之所以數語於何者雖不可見本文只言數與何語不言其所與何語者何事然即其所以告帝者而推之亦可知矣因韓信後來告髙帝之語皆在於定三秦則知何之所以竒之者在此謂秦將斂怨於民出處下文且三秦王為秦將將秦子弟數歲而所殺亡不可勝計謂秦民屬望於漢下文信曰秦民無不欲大王王秦者謂項羽不都闗中而都彭城下文信曰項王雖得天下而臣諸侯不居關中而都彭城無非以秦之故地為急天下大勢在三秦此其攻取要畧是正何之所深致意者何之意在三秦則何安得不深竒之耶何之竒信亦在三秦嗚呼惟賢而後知賢惟豪傑而後識豪傑歸在竒字上信之未遇於何其羈困無聊甚矣再叙起何未竒信之初寄食於漂母受辱於跨下淮隂之人固不足以知之也本傳有一漂母哀之飯信漂母注云以水擊絮曰漂又淮隂少年衆辱信曰能死刺我不能死出我跨下信俛出跨下市人皆笑信以為怯官不過為郎位不過執㦸西楚之王亦未能知之也本傳信謝曰臣得事項王數年官不過為郎位不過執㦸執㦸注云郎中宿衛執㦸為連敖而不得知名為都尉而至於遁亡是漢之羣臣亦莫或知之也本傳項梁度淮信杖劒從之無所知名云云信亡楚歸漢為連敖云云注連敖楚官名漢王以為治粟都尉上未之竒也夫人皆莫之知而相國獨知之人皆莫之異而相國獨異之總上三股文謂他人不竒之獨何竒之是必其謀相符意相契有非常情之所可測識者應冒不謀而同適契其心等語繳倒上三股人不知之之意觀其語髙帝曰如信國士無雙欲爭天下非信無可與計事者詳見題注推此言也不惟知信足以察乎天下之勢抑亦知何之能察乎天下之勢矣發盡主意與前相應故自髙帝聴何之言用信之䇿收效因反鋒之勢本傳龍且曰漢兵逺鬬鋒不可當令齊王使信臣招所亡城城聞王在楚來救必反漢據建瓴之便見上注田肯云云秦得百二焉地勢便利以其下兵於諸侯譬猶居髙屋之上建瓴水也建音蹇瓴音鈴注云如居髙屋之上而翻瓴水向下之勢易也今年出陳倉定三秦而闗中尅復見本傳明年出秦闗收河南而燕趙青齊聞風而靡詳見本傳切用兩三秦事向非蕭何識韓信於未遇之時則漢室平定天下之勢豈如是其易哉有力蓋嘗論之又立議論立天下之功者在豪傑用天下之豪傑者在大臣發本題意冦恂不見異於鄧禹則征伐之謀將安所施後漢㓂恂傳光武定河内難其守問於鄧禹曰諸將誰可使守河内者禹曰冦恂文武偹足有牧人御衆之才以鄧禹比蕭何以冦恂比韓信髙崇文不見知於杜黄裳則討賊之功無自而建唐憲宗本紀公卿議者以為蜀險固難取杜黄裳獨曰臣知神䇿軍使髙崇文勇畧可用願陛下專以軍事委之以杜黄裳比蕭何以髙崇文比韓信由是而觀則漢之所以定天下者非韓信之力乃蕭何之力也引前二人証歸蕭何身上謂大臣方能用豪傑雖然非何不足以知信引上意非髙祖不足以知何又歸在髙祖身上使何知信之可用而君不用焉則雖有知人之明何自而見反説使髙祖不得蕭何之言則韓信無以自見今也何言之而帝信之謂髙祖信何之薦曰大將則授以大將本文曰設壇則為之設壇古文何其從之易其聴之篤耶喚下意豈非蕭何知信之為國士而髙祖亦知何之為人傑歟本紀鎮國家撫百姓給餉饋不絶糧道吾不如蕭何云云三者皆人傑吾能用之此吾所以取天下也故併及之歸在人君身上有主謹論因後知前格與前篇蕭何奇韓信論同意王導深器謝安李補之出處晉謝安傳安及總角神識沉敏風宇條暢善行書弱冠詣王濛清談良久既去濛子脩曰向客何如大人濛曰此客亹亹威采逼人王導亦深器之由是少有重名立説王導晉之元老大臣也謝安晉之少年才子也晉當典午南渡國步多艱外則有羯胡之交侵内則有權臣之專制導一以雍容閒雅鎮之而天下自定深慮夫繼之者浮躁淺謀與我之所為不相合不足以任犬下之重故見謝安於弱冠之年雅量𢎞識可以維持於異日所以器之於未用之先也批云謂王導之所以器謝安者迹無所考觀後來安之大用一以雅量鎮天下為先則知導之器安者以其有雅量與導合也中間文勢得之老蘇管仲論奪胎換骨出來論曰大臣以已為之事業謂王導已用於晉鎮以雅量而期人才於未用之先謂謝安未用於晉其雅量適與導合所以深知器之期字有器意其為天下國家計逺矣主意夫當天下多事之秋秋時也用諸葛亮出師表危急存亡之秋字凡有才者皆在所可取且聞説而大臣所見暗説王導顧必深予其合於已者何哉蓋王業偏安事變迭起指東晉時用出師表王業不偏安語决非浮躁淺謀者所能辦也浮躁淺謀與鎮浮雅量之人相反吾能以鎮浮之量而靖之於先指王導又本傳識量清逺見後注亦必欲得雅量之君子而後可以維持於其後指謝安本傳安嘗泛舟風起吟嘯自若人服其雅量於此有人焉指謝安其議論也雍容其器識也宏博見雅量意是雖未至於建功立業之地言其未用而其他日之所成就吾預知其有以措天下國家於治安矣言其雅量與已相合可以保其治安嗚呼此王導所以深有取於謝安也歟入得快夫以謝安方弱冠之年而王導已深器之本題注又記曲禮人生二十曰弱冠導非私於安也斡下意導之雅量鎮浮已足以植立江左之晉應前安唐裴度傳賛江左王導謝坐鎮雅俗又上注則異日之晉其可以輕舉妄動者為之耶須得雅量之人應浮躁淺謀語以其所已為王導而期夫人之所未為謝安導之為世變慮者微矣應破題不然何其器謝安之深也王導深器謝安請以是論之人才之在天下以一藝自見者是一藝而止也以一事自見者是一事而止也以小形大旁映題意求其以天下之量而能任天下之重者蓋不多得歸重本題意孟伊尹任天下之重是以為大臣者不患天下之無才常患人才不足以膺天下之任貫上任字不患人才之不用常患人才自小於未用之初應未用字使夫人之器量適契吾心之所期暗説謝安雅量與導相合則今日之未用已可以覘他日之大用天下國家終將賴之發明主意韓信之未用也蕭何竒之前韓信傳信亡楚歸漢上未之竒數與蕭何語何竒之應未用意何非為信也蓋為漢也應導非私安也為天下國家也意張柬之未用也狄仁傑器之唐張柬之傳武后曰安得一竒士用之仁傑曰荆州長史張柬之雖老宰相才也應未用意仁傑非為柬之也亦為唐也應導非私安也為天下國家也意使二子而無益於漢唐成敗之數反説韓信張柬之則蕭何仁傑亦以庸駑待之矣反説蕭何狄仁傑庸常也駑不良也其所以拳拳於此者轉正必有以深契乎吾心之所期也應主意謝安之年少雖未可以二子例論以安比韓信張柬之而王導所深器之者實與蕭何仁傑同此心也何導比蕭狄仁傑然則論大臣之許予可不于此乎觀之過本題意且東晉人才亦不乏也且説晉時人才之多顧榮賀循江東之望而導不之器王導傳顧榮賀循此士之望不若引之以結人心桓彛周顗晉朝之重而導不之器同上桓彛往見導極談世事還謂顗曰向見夷吾吾無憂矣管仲字夷吾桓彛以王導比管仲弱冠之童烏知其足以當大事題注從指謝安此設難起清談之口烏知其可以佐國家題注安指謝而導乃以堂堂元老之尊而獨拳拳於東山之孺子是何心哉謝安傳安始有仕進志將發新亭髙崧戯之曰卿屢違朝㫖髙卧東山諸人每相與言安石不肯出將如蒼生何而况淮淝未戰指授將帥之畧則未聞同上符堅百萬次淮淝安指授將畧各當其任既破堅有驛書至安方對客圍碁既竟了無喜色客問之徐云小兒輩已破賊新亭未召從容就席之儀則未覩新亭見上注又本傳云桓温大陳兵衛將移晉室呼安及王坦之欲害之安神色不變曰晉祚存亡在此一行既見温安從容就席謂温曰明公何湏壁後置人耶温遂語笑移日尚書僕射之職未除則鎮以和靜御以長筭亦未施設其萬一本傳除右僕射又時强敵㓂境安每鎮以和靖御以長筭人皆比之王導而文雅過之未以上用事皆是後來的句句各以之一字喚過見得是未用時導果何見而深器之自弱冠之童至此凡兩難大臣意向實係觀瞻取舎一偏安危易位謂大臣不敢輕於去取人物實係天下之安危導鎮重人也見前注轉正意豈冝輕於許可哉見得是大事嗚呼吾以是知王導之盛心矣正發主意何者設問典午南渡國步多艱典午司馬也晉姓司馬本紀童謡云五馬同渡江一馬化為龍及永嘉中王室淪覆帝與五王獲濟而帝竟登大位焉外而胡羯之交侵時五胡亂華内而權臣之專制指桓温等晉之天下幾不可為言東晉時天下多事導也以雍容處之以清靜鎮之主意又見下注彼其識量清逺𢎞濟逺猷真以天下國家為已任者王導傳導為政務在清靜又少有風鑒識量清逺又拜丞相册曰朕思憑髙謨𢎞濟逺猷戮力王室尅復神州此心未嘗一日釋也同上每至暇日相邀出新亭飲宴嘆曰風景不殊舉目有江河之異相視流涕導變色曰當共戮力王室尅復神州何至作楚囚相對泣耶特以當時事勢前軒後輊未易支吾軒輊猶輕重也支吾猶撑拄也以一輕躁浮薄者處之豈不殆哉應冒浮躁淺謀語今日之天下既能以雅量而措諸安王導自己如此則異日之天下亦宜得雅量之人而繼吾志亦須得人如自已方可得人如安石而用之豈不當於予心乎兹其所以器之之深也惟謝安雅量與自已合故深器之吁外而胡羯内而權臣均為晉之患再喚前語而終不足以患晉者徒以有導焉耳有王導雅量鎮之一日無導則彼皆得以肆其志無導則亂故為晉者不患有内外之憂而患無導總前内外二字再申上意有導則内外之變皆可潛消而隂弭之有導則治今也導復得其如已者指謝安則導雖死晉國未為無導也有謝安在與已一般學從有導焉耳起直至此住是老蘓管仲論奪胎換骨出來此其用心果為謝安乎抑為晉乎應非為安也為天下國家也意異時安之用國收効或予之以文雅之才注見上或美之以廟堂之量晉紀論謝安有廟堂之量或善其有以慰天下蒼生之望注見上卒之衂符秦百萬之師於不動聲色之間秦苻堅注見上衂戰敗也消桓温狂悖之心於優㳺暇豫之際汪見上其視禦劉石之冦王導禦劉聰石勒二㓂平王蘇之亂者通鑑晉明帝太寜元年斬王敦成帝咸和三年斬蘓峻若合符節言安之收功與導則同用孟子語前日之所深器者於此驗矣導之言驗晉之王業賴以復安推原其由導之力也歸功王導昔者管仲相齊以管仲比王導人才非無如仲者言齊之人才亦多而仲於鮑叔賓胥無之徒各疏其短老蘓管仲論仲之書有記其將死論鮑叔賔胥無之為人且各疏其短見史記遂使齊之伯業以管仲而興亦以管仲而替不能儲才為異日用冝其相齊之卑也儲留也君公孫丑上管仲得如彼其專也功烈如彼其卑也人謂導為江左夷吾由是言之非仲所及矣温嶠傳嶠見導曰江左自有夷吾人復何慮也言管仲不能舉人才不如王導之知人然則王導之賢愚將求之於古人可乎抑管仲扶起王導嗟夫論今而較之則有餘揚之論古而伸之則不足又抑之克庸祇徳者周公必進於王以蕃王室殆非王導之所可學書蔡仲之命蔡仲克庸祇徳周公以為卿士又睦乃四鄰以蕃王室謂導不如周公之薦蔡仲文武吉甫以輔成中興之業者君子亦歸諸張仲孝友之功詩文武吉甫萬邦為憲云云侯誰在矣張仲孝友謂王導不如張仲之友吉甫王導之胷中愚固未知其涯涘涯涘窺測之也畧揚之而深器雅量之人適足以長晉人清談之風又抑之見本題注而終不能洗銅駝荆棘之辱晉書或指銅駝曰㑹須見汝在荆棘中意者其人非歟疑人才之非抑時非歟疑晉時之非秦漢而下君子每恨古人之不復見而復於王導恨焉又扶起王導大凡論漢唐人才扶起了又抑倒既倒了又扶起方得文字有曲折亦君子所不取也謹論前篇謂何之竒信以信之知大勢與何合此篇謂導之器安以安之有雅量與導合兩篇同一意可以參看此篇係校定正本其間多有改易處就題去取格與道術智誼之指論同格志意徳行智慮如何洪强中出處荀榮辱天生烝民有所以取之志意致脩徳行致厚智慮致明是天子所以取天下主意取荀卿之言志意徳行而不取荀卿之言知慮謂聖人之所以有天下者不過正心脩身而已曷嘗窮其智巧竭其謀慮以為强取之計正心包志意字修身包徳行字無他術包知慮字批云正心脩身四字出於大學文字典雅去取極當此時文之最明潔者論曰聖人所以有天下者指本出處天子取天下意自正心脩身之外無他術也正心包志意脩身包徳行無他術包知慮本意取荀卿之言志意徳行而不取其言智慮天下不可以智術取也便罵倒知慮不可以取天下以智術取之者後世之事此是戰國以後時事非聖人所以有天下之道也聖人取天下未嘗用智慮聖人不有乎天下無心於取天下而天下卒為聖人所有天下自歸豈他有謬巧哉不用智慮用漢書韓安國傳語惟其心無不正而志之所充意之所發皆極其誠正心包志意身無不脩而徳之所存行之所積皆極其粹脩身包徳行則我雖不求以得天下而天下自不能不歸於我應小講起語聖人所以有天下者用此道耳只用志意徳行而不用智慮何嘗曰窮其智巧竭其謀慮而思以為强取天下之計耶駁倒知慮之説况天下不容以强取應接題起語聖人亦何意於取之應我不求以得天下意其所以正心脩身直以為分内事指志意徳行四字而天下之從違逆順姑以付之人心之自然未嘗强取之至於不得已而應其所求應副天下之求我者不過自其心身者舉而加之發出主意心孟子言舉斯加諸彼而已如將挾是以取天下而且參之以計術指智慮則聖人固有所不屑也謂聖人未嘗以智慮取天下荀卿子論天子取天下而歸之志意徳行似矣先取荀子言此四字胡為繼以智慮之言難智慮字智慮固聖人所不廢也言畧取荀子智慮二字然使役智慮以取天下其弊遂流為戰國權謀之習却罵倒荀子之説應接題以智術取之者後世之事聖人豈若是歟接應題非聖人所以有天下之道也志意徳行智慮如何請與之辨嘗謂得天下有道而一毫之智術不與焉道是志意徳行智術是知慮斯孟離婁上得天下有道得其民得天下矣與去聲得之有道者惟其求之於心反之於身無所不用其極照主意心身字用用大學君子無所不其極而天下之人依依然歸於我應自天下不能不歸於我自有推之不能去辭之不能釋者見我非强取而天下自歸意此則聖人所以有天下之道也照破題語舎是而詐焉巧焉計慮焉皆是智慮思以機奪而術取之機術亦是智慮未得之患得之既得之患失之語陽貨云膠膠擾擾日戰天下於方寸中膠字上聲語出荀子如此則是强取了而謂聖人為之乎疑辭謂聖人不肯以智慮取天下大學一書乃古人平天下之道舉大學語來証而必曰先正其心先脩其身本題立説祖此大學云云古之欲明明徳於天下者先脩其身欲脩其身先正其心荀子所謂志意之脩正心之説也所謂徳行之厚脩身之説也先取荀卿志意徳行之説與大學之語同而復拳拳於智慮之言何哉難之借曰知之至慮之得且寛一著説大學慮而後能得又知之至也智慮非聖人之所能忘也與冒頭知慮固聖人所不廢也相應而獨不曰以下却説大學之言知慮異荀子之言知慮誠意致知自實意之外無所用其智大學欲誠其意者先致其知止善慮得自至善之外無所容吾慮乎同上在止於至善云云慮而後能得今也於志意徳行之外而使人主而求其所謂智慮舉荀子之言則其智也必流為智巧之智其慮也必徒為計慮之慮矣智慮之流弊如此與大學之言智慮不同此戰國以詐相髙以術相尚者之為而非聖人有天下之道也應冒接題以智術取之者後世之事而非聖人所以有天下之道也卿也其殆耳濡目染不能不出入於譎正之間者歟言志意徳行則為正言智慮則為譎譎不正也昔舜之有天下也舉舜實事來講聞意同天地矣史樂書舜樂與天地同意聞徳洽民心矣書禹謨好生之徳洽于民心豈嘗區區於志慮哉舜未嘗用智慮武王之得天下也又舉武王實事來講聞志以道寧矣書旅嫯志以道寜言以道接聞有不矜細行之戒矣同上不矜細行終累大徳亦豈嘗役役於智慮哉武王亦未嘗用智慮夫以舜之明武王之睿不可謂非智也説舜武王亦有智範舜典濬哲文明洪思曰睿念兹在兹始於憂勤亦非漠然無所慮於天下者又説舜武王亦有慮書禹謨念兹在兹魚麗始於憂勤然而察物而不徧孟子盡心堯舜之智而不徧物垂拱而無為前漢董仲舒䇿垂拱無為而天下太平聖人非固黜聰明以為髙智也而置世故於度外也慮也知聖人亦未嘗不用慮特不如後世之所為耳惟其質之於心而無愧照正心字揆之於身而無慊照脩身字一念忱實自足以感人心志意百行純全自足以服天下徳行則舉四海之大皆不出於聖人心身之外包志意徳行字而吾之智慮亦將與天下相忘於無思無為之中惟有志意徳行則智慮亦不必用易繫辭無思無為也若其私憂過計鑿吾天於智慮之末而求以此取天下此是後世之知慮與聖人不同應本出處則天下且將不勝其多事矣智慮故夫外心身以求治騁智慮以為功者後世無志意徳行只用智慮三代以下皆然而戰國為甚應冐接題以智術取之者後世之事彼豈不謂一人之智巧足以周天下之情一已之計慮足以應天下之變再推究後世用智慮之本心卒之力愈勞而取天下也愈艱智慮不可强取天下則智慮亦秪以自弊耳又何取乎智慮孰知夫一人之情千萬人之情杜牧賦一人之情千萬人之情鶴鳴子和易鶴鳴在隂其子和之此感彼應正係於志意之所發歸志意上盡已而盡人記中庸盡已之性以盡人之性君正而國正孟離婁君正莫不正有覺徳行四國順之詩抑篇云云歸徳行上吾惟正吾之心為無自欺為信以發志而已大學所謂誠其意者母自欺也易大有卦信以發志也何暇於正心之外而過為是之深謀宻慮哉惟用志意而已奚用謀慮吾惟脩吾之身為果行育徳為庸徳之行而已易䝉卦君子以果行育徳又中庸庸徳之行庸言之謹何暇於脩身之外而强為是之自作聰明哉惟用徳行而已奚用知巧誠使志意有所未脩徳行有所未厚反謂四字則人必不我從物必不我化心不正身不脩則天下必不歸我情偽不勝其當察也如之何而不用吾智謂用智巧以取天下者事變不勝其可憂也如之何而不勞吾慮謂用謀慮以取天下者心正矣則不言而信不動而敬中庸云云雖智行無事可也雖無思無慮可也孟子離婁下智者行其所無事又易繫辭天下何思何慮寧復假此以為取天下之具哉發盡主意吾故以為卿之言未免於擇焉而不精也應舉題貶荀子而韓原道荀與揚也擇焉不精志意之脩徳行之厚先出志意徳行四字此乃人主當然之事本非以此為取天下之地古者聖人用之如此今而曰此天子所以取天下已非聖人之用心矣謂荀子志意徳行之言則是而取天下之言未是况又外是以從事於智慮之間而曰吾將以此取天下吾知聖人决不為也古之聖人不用知慮以取天下天下如彼其大也人心如彼其不齊也吾將恃吾之智慮以取之多見其有所窮矣駁倒荀卿智慮取天下之説孰若正吾心脩吾身而聴天下之自為去留耶應主意嗚呼晉以譎而敗於譎語十四晉文公譎而不正楚以詐而敗於詐前漢仲舒䇿五伯先詐後仁義秦以權力而敗於權力史本紀始皇為人貪於權勢譎詐權力四字皆是智慮智術之不足以有天下如此極言知慮之説不足取君子所以不得不與荀卿辨辨倒了戰國儒者若孟與荀其著書立言一也將孟子來比荀子孟子嘗謂竭心思以仁天下矣孟離婁上聖人既竭心思焉繼之以不忍人之政而仁覆天下矣而荀卿則謂修志意以取天下謂孟子言心字與荀子言志意字同孟子嘗謂天下之本在身矣孟同上國之本在家家之本在身而荀卿則謂厚徳行以取天下謂孟子言身字亦與荀子言徳行字同孟子嘗謂是非之智充之足以保四海孟公孫丑上是非之心智之端也苟能充之足以保四海而憂以天下樂以天下梁惠王上亦歴歴為時君道之孟子歴舉此言告戰國之君而荀卿則又謂明智慮以取乎天下謂孟子言智慮字亦與荀子之言同迹其所主者在於取天下則凡正心脩身無一而非徇乎外者是豈聖人之事哉謂荀子之言在於取天下則是有心强於取了不如孟子之言聴其自然吁此固孟荀之所為異也判斷二人所言不同不然何以曰孟氏醇乎醇卿也大醇而小疵舉韓子之言未斷二子優劣云韓讀荀謹論就題去取格與志意徳行智慮論同格道術智誼之指如何趙師榞出處前漢賈誼治安䇿天下之命係於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也立説道與誼正理也術與智不正之理也謂賈生言教太子之道以道居始以術與智居中以誼居終則是其始導之以道之正其中導之以術智之不正其終又欲導之以誼之正其言駁而未純殊不思以智術之説據其中俾之入道未幾繼為智術所勝則去道愈逺所謂誼者終失之批云去取當理行文有法其止齋之嫡傳歟論曰明正理以為教者正指道誼不可以不正者雜乎其間也不正指術智謂賈誼所言教太子之道始言道終言誼皆是正理豈可以智術不正之理雜乎其中教諭之道提起教諭太子是綱領一本於正而已道誼夫苟一本於正也學陳止齋文法則始此正也指道終亦此正也指誼或者介乎始終之間而即雜之以不正焉指術智夫介乎始終之間而即雜之以不正疊上句轉亦學止齋文則入乎正者未熟是道遽轉移而之他是術智異日望其復入乎正也難矣是誼古人為萬世慿藉之地而教諭之早者見本題注恐不若是其駁也始既曰道中乃曰術與智終又曰誼是駁而不純且道誼者古今之正理此是正㡳道理言必正言行必正行本題上文太子廼生而惟見正事聞正言行正行舍道誼之外他無所謂正者只道誼是正賈生不為漢計則已舉賈誼言來説如其為漢計也轉則曰道曰誼足矣何必復以智術而雜乎道誼之中者哉取其言道誼而不取其言術智中字巧見得道字在始術智字在中誼字在終夫始乎道終乎誼而中之以智術則是入乎道由乎智術而復入乎誼者也且據賈子先後之言不思入道未幾而卒為智術所勝則去道愈逺而所謂誼者終失之將題中四字判斷此賈生之言君子謂其駁而不醇也言術智是駁言道誼是醇道術智誼之指如何請得與賈生辨古人教諭之㫖可得聞歟舉賈子䇿中所言辨起曰吾聞其正矣道與誼未聞其不正也術與智應破題不正字何則教之以正猶懼不正言道誼教以不正其能正乎智術甚矣正不正雖兩途總説道術智誼而惟正之足以勝不正也且説道誼可以勝智術夫惟正足以勝不正申上文固也固是如此然始終之俱正道居始誼居終而一有不正據乎其中言術與智則正者反為不正者所勝道誼為智術所勝且古今天下之正理孰有出於道誼者乎喝出道誼字教諭之指而有出乎道誼之外者智與術反勝矣然智術定足以勝道誼哉且占强説惟道居其首誼居其終而智術據乎其中發出主意則始者易揺終者易失其究也道誼卒為智術所勝理是如此此賈生道術智誼之指君子惡其教之雜也應破題雜字智言道誼則純言術則雜母已則三代所以教世子尚有可考者畧舉賈子語其始也入則有保出則有師記文王世子凡三王教世子太傳在前少傳在後入則有保出則有師其中也樂正司業父師司成同上云云一有元良萬國以貞世子之謂也其終也大而君臣父子長㓜之倫小而為絃誦干戈羽籥之節同上云云成王㓜周公相抗世子法於伯禽欲令成王知父子君臣長㓜之道也又春夏學干戈秋冬學羽籥云云春誦夏絃至於禮樂詩書也釋奠養老也與士庶人同習其習也記王制樂正崇四術立四教春秋教以禮樂冬夏教以詩書王太子王子羣后之子皆造焉文王世子凡學春官釋奠于先聖秋冬亦如之又凡大合樂必遂養老始乎正中乎正終乎正無非道誼之流行見得三代教世子之法皆是正理伊尹之於太甲周公之於成王是也並見尚書奚其術奚其智不用術與智蓋自春秋戰國之紛紛而智術之説熾智術起於此此皆權謀譎詐詭遇獲禽者之所尚不取智術之説獲孟王良云云曰吾為之範我馳驅終日不一為之詭遇一朝而獲十而豈所以為教諭太子之指哉智術非教太子之道然嘗謂賈生言智術者不足責舉本文辨難以智術據乎道誼之中深可責照主意不取智術之説何則道誼者帝王之止理此是正㡳智術者伯圖之巧謀此是不正的今而始之以道中之以智術而終之以誼發明主意則是教之以堯舜禹湯文武始之道也理應帝王正而即雜之以齊桓晉文中之術智也應伯圖巧謀而又欲歸之於堯舜禹湯文武終之誼也其將何所决擇耶謂賈生之言雜究其極也道誼之卒孤而智術之卒勝抑賈子之説夫道誼本不為智術所勝又占强説應前語蓋智術據其中而為之主則道誼反為之賓此智術之所以勝耳應智術據乎道誼之中語主賓二字有眼目且所謂道誼者何也再喚起二字説曰非先王之言不敢言非先王之行不敢行孝經希聖賢周子通書士希賢賢希聖聖希天心六經文中子心若醉六經師古始史秦人不師古始皆是也謂道誼反是則術耳智耳出術智二字夫仁有術教亦有術孟是乃仁術也又教亦多術矣智五常之一也仁義禮智信固亦何惡於智術也哉且放寛説深惟清明之初决擇未定説教太子之始教以道誼吾猶懼其不堯舜禹湯文武若也出道誼二字若以智術居中用事而道誼反聴命焉又出智術二字照主意則機心之長良心之消也智術反勝道誼人為之勝天理之㣲也術智反勝道誼他日好猜忌好刻薄好察察而無天地民物之量常必由之智術之害如此察本紀帝為人猜忌又以苛為以刻為明為千萬世付託之地者若是踈乎言教太子不可用智術嗟夫指之以道矣又指之以智術指之以智術矣而又指之以誼舉本題四字次序正邪互戰茫無定向道誼是正智術是邪譬之行百里者至五十而迷譬喻切夫發軔之初路之正也如始教之以道至五十而迷則顛冥於旁蹊曲徑如中教之以智術欲返則失其所來欲往則昧其所止終無歸宿之鄉而已應終又欲教之以誼則應冒入道未幾而卒為智術所勝去道愈逺而所謂誼者終失之賈生道術智誼之指適相似者證賈生之言遂使文帝不審於鼂家令前鼂錯傳鼂錯為太子家令云云皇太子讀書多矣未知術數竟以成其刻薄之資景帝天姿刻薄是當誰任其咎耶責歸賈子抑論之再宣本意教諭之道貴於純乎正道誼教之以正莫大於謹其初教太子之始蓋一初之天清明不汨應清明之初意道誼森然於方寸可與為堯舜可與為禹湯文武收拾講中語烏知所謂智術者知有道誼則不知有知術非不知也無智術之可知也斡得精神無智術之可知而遽語之以智術初心清明只知有道誼不知有智術豈可以智術之語告之彼將厭其所未嘗無而貪其所未嘗有矣初心本無智術今告之以智術則知有智術之説矣雖然智術介乎其中而卒能自拔於正者吾於漢武乎有取取漢武帝與此題意合方其即位表章六經道也武帝本紀云云中間事土木求神仙好征伐無一日不由乎智術三輔黄圖序武帝土木之役倍秦越舊又郊祀志乃作通天臺招徠神仙之屬又荀悦論武帝窮兵極武百姓空竭及其術窮智敗本心呈露輪臺之悔則反而歸之於誼西域傳下詔陳既徃之悔今請逺田輪臺非所以優民也又賛云末年乃下哀痛之詔豈非仁聖之所悔哉而帝亦於是乎春秋髙矣謂武帝末年是可喜也亦可惜也喜其道誼之得而惜其智術之失吁賈生之言其誤於景帝智術之説誤之而驗於武帝者歟始道終誼之説驗雖然亦豈願其言之再驗哉有悠長之意謹論前篇取荀子之言志意徳行而不取其言智慮此篇取賈生之言道誼而不取其言智術是同就題去取格推原心學格可與朱埴顔淵潛心於仲尼論參看仲尼潛心文王林斯光出處揚問神篇敢問潛心於聖曰昔仲尼潛心於文王達之顔淵亦潛心於仲尼未達一間耳立説文王處商之窮孔子處周之窮皆遭時之不幸者也然文王之窮則道不在天下而在於演易孔子之窮則心不潛於堯舜禹湯之數聖人而潜於文王蓋其所同者道也其不幸而同者時也批云辭達理明發明二聖人之心於千百載之上佳作也論曰知有聖人之道謂文王演易仲尼學易是同此道而又知有聖人之時謂文王處商之窮仲尼處周之窮是同其時然後可以論聖人之心矣謂仲尼之心潛於文王之易是同此心夫道統之相傳聖人實宗主之先提出道字總説數聖人然天下不能皆堯舜禹湯之日此是聖人之達者而適遭其變者其遂已於道乎此是文王仲尼之窮者達而在上則行之指堯舜禹湯窮而在下則明之指文王仲尼在用老蘓春秋論達而上則其道行窮而在下則其道明苟不幸而居其窮文王仲尼處時之窮則聖人之憂斯道者雖異世而均此心也文王處商之窮孔子處周之窮其時雖異其心在於道則一文王之與孔子其居聖人之窮者乎應上窮字皆總説兩人處時之窮文王之窮則道不在天下而在易出主意孔子之窮則心不潛於堯舜禹湯之數聖人而潛於文王發出主意蓋其所同者道也應前道字其不幸而同者時也應前時字使孔子而非文王之時則此心此道固已黙契於數聖人耳數聖人謂禹湯文武而何獨潛心於文王哉反説有力揚子雲曰仲尼潛心文王請發其㫖且夫精㣲一理三聖相授吾見聖人之心也先提起心字説精書大禹謨帝曰來禹人心惟危道心惟㣲惟惟一允執厥中又漢董䇿禹繼舜舜繼堯三聖相授而守一道未見聖人之潛其心也辨難嗚呼是豈無所用其心哉解子用孟語蓋是時歸在時上來治化足以相因道統足以相承而天地生民之經紀未嘗一日不脩明於天下謂堯舜禹湯之時達而在上則其道行夫是以聖人之道有隆而無汚記檀弓道隆則從而隆道汚則從而汚聖人之心有相孚之實而無向慕之勤者不待潛心其所遭之時然也所遇時節好後之有聖人之道有堯舜禹湯之道而無聖人之時無堯舜禹湯之時如文王孔子其心始有不獲遂者矣過本題二人來説主意文王窮於商者也丈之窮孔子窮於周者也孔之窮然文王之道既不以其不行於天下而已於心應文王道不在天下而在易則孔子其可以不文乎應孔子心不潛於堯舜禹湯而潛於文王羑里之囚文王之變亦已亟矣且先説文王處時之窮于通歴紂用崇侯之讒乃囚文王羑里而演易之㫖同上始作周易彖象以闡斯文以極天地萬物之變文王在於易之道文果何心哉設問心起文王之心答心字蓋謂吾身可窮而吾之道不可窮應前窮字可使吾之徳教終未洽於天下而不可使天下一日無斯文謂時可窮道不可窮猶孟公孫丑文王之徳百年而後崩未洽於天下是時文王之時非昔者數聖人之時其時雖異而文王之心即數聖人之心也其心則一特其時有不得已焉耳繳上時字洙泗素王孔子設教於洙泗之上又左序説者以為仲尼自衛反魯修春秋立素王素王謂有徳無位也以文王之所以憂道者為春秋慮為萬世慮則其心欲不同得乎孔子憂道之心即文王之心琴有襄家語辨樂解孔子學琴於師襄禮有聃同上觀周篇孔子至周問禮於老聃官名有郯子左昭郯子來朝叔孫昭子問曰少皡氏鳥名官何也郯子曰吾祖也我知之仲尼聞之見郯子而學之皆孔子之心也而其潛不在是也孔子之心不於此數者去文王於五百載而聞知之孟盡心下由文王至於孔子五百有餘歲云云若孔子則聞而知之讃易道於六十四卦而十翼之見下注又釋文序孔子作彖辭象辭文言繫辭説卦序卦謂之十翼又見易説卦疏孔子十翼之次蓋自轍環不遇退而脩教書序轍環天下卒老于行云云遂乃定詩書明舊章云云足以垂世立教而夫子之心潛於重易之聖人乆矣揚問明文王重易六爻故夫韋編三絶人見其勤於易也史孔子世家讀易韋編三絶而不知其所以勤者非易也文王也發出意不在易之書而在文王之道也仰而思之夜以繼日用孟離婁下全句夫子之於文王也其亦幸而有文王之易以使斯文之不墜見下注而又幸有孔子者同此心也發出孔子之心與文王同文王既沒文不在兹乎語子罕子畏於匡曰文王既沒文不在兹乎天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何觀此則文而非孔子文王不得其傳矣反繳上意故嘗謂禮樂有制志於興周記明堂周公制禮作樂則夫子之夢在周公語述而子曰甚矣吾衰也久矣吾不復夢見周公大道不行安可遂廢家語云云則夫子之心在文王本出處以夫子之祖述堯舜憲章文武中庸其精神未始不㑹於數聖人之世孔之心非特潛於文王一人觀加我數年之語語述而子曰加我數年五十以學易可以無大過矣與夫吾衰之嘆見上誠悲其獨潛於文王者蓋晚而不遇之思也孔子之心在此雖然潛心之説亦揚子雲之言云爾畧責子雲未知孔子之心要之由孔子而上求其所謂心者當以傳心論之繳盡一篇之意湯韓子原道堯以是傳舜舜以是傳之禹禹以是傳湯以是傳文武周公以是傳之孔子謹論推原心學格可與林斯光仲尼潛心文王論參看顔淵潛心於仲尼朱埴出處同前立説顔子之學主於靜故其心潛於仲尼謂之潛者悟道於不聞不睹之表契道於無聲無臭之間吾心之中自有一夫子也使學而非靜則不能黙識聖人於一心之微而徒求聖人於口耳之末其去聖人愈逺矣何潛之有批云主靜之説得之周子太極圖靜字有潜意亦於顔子身上最切中間發越透徹語意俱新此時文中之軒軒燄燄者論曰以靜為學靜見顔子潛心處深於道矣深造仲尼之道天下之理未有不由靜而入喝起靜字學而非靜反説則膠於口耳形迹之粗耳便不能潛心了賢者之求道轉正固惡夫昧昧而尤惡夫皎皎昧昧是昏䝉者皎皎是表暴者此二様人皆是不能静㡳故必主乎靜而後無入而不自得焉太極圖聖人定之以中正仁義而主靜又中庸君子無入而不自得焉靜者何潛心是已分曉心者神之舎莊心者神明之舎神者聖之寓也孟大而化之之謂聖聖而不可知之之謂神聖之所以為聖亦心之精神為之耳此句本出孔叢子陸象山與朱文公辨太極圖用此一句吾惟於此暗説顔子潛心於仲尼反照而内觀黙通而㝠曉見得是靜方能潛心悟道於不睹不聞之表中庸戒慎乎其所不睹恐懼乎其所不聞契道於無聲無臭之天詩上天之載無聲無臭意二句形容潛心於仲尼自他人觀之雖若無所識者開而不知黙而識之乃真識之精合語此是潛心仲尼述而黙而識之雖若無所事乎言開而不知不言而喻已造於不容言之妙合於此是潛心仲尼而孟施四體四體不言喻天天相照以吾之天契聖人之天吾心一聖人也心中自有聖人心在是則聖在是聖人非吾心外物深造於斯道也固冝映破語不然舎靜以求道外吾心以求聖人反説吾見其泛泛焉而已泛泛便非靜了潛云乎哉揚子曰顔淵潛心於仲尼意或如此耳嘗謂天下無心外之理學者無心外之學挈心字講一心之中蓋渾渾乎其為聖人也應冐頭吾心一聖人也故非潛心則不足以言希聖之事周子通書賢希聖非主靜則不足以言潛心之法入靜字來抽千古心學之關鍵莫如大學一篇舉大學作證然統括之妙則在於能靜之片辭大學定而后能靜吾讀魯論如愚一語未嘗不歎顔子之善於學大學也語為政子曰吾與回言終日不違如愚何則設問愚非真愚靜而已矣愚只是靜文有開合惟𤣥惟黙守道之極用揚子語靜之體也寂然不動感而遂通靜斯妙焉周易繫辭學以上六句通書語書之沉潛洪範沉潛剛克髙明柔克詩之潛伏詩潛雖伏矣亦孔之昭皆是物也又舉詩書二潛字貼櫬蓋靜則見善明而用心剛信道𢎞而執徳固語子張執徳不𢎞信道不篤不矜其博聞而隱然於不聞之表有真聞不逞於多見而超然於無見之中有真見應冒頭黙而識之乃真識之精不言而喻已造於不容言之妙等語澄其思於退藏於宻之時易繫聖人以易洗心退藏於宻而極其理於精義入神之妙同上精義入神以致用也方寸之間空洞瑩徹用文公語録隂陽可以闔闢天地可以旋轉説心之大處而况我心同然之聖人孟子告子聖人先得我心之所同然何彼乎何此乎言其一也羮牆見堯非心之外别有一堯也是心之靜乃真堯也後李固傳坐則見堯於牆食則見堯於羮蚤夜思舜非心之外他有一舜也是心之靜乃真舜也韓原毁蚤夜以思去其不如舜者就其如舜者誠以人心之間何所不有心之大處一靜之外何道不明靜則可以潛心苟惟外此而求之應冐頭外吾心以求聖人語返已於物外物沉真於偽異端梏於形骸之内見於肝膈之上不求於心自以為道在是矣開説舍靜以求道不知機慧巧詐性之障也刻厲矯揉徳之賊也學陳止齋文聖人自聖人吾心自吾心心與聖人判而為二道深逺矣何潛之有心不能潛於聖人了故非至明不足以察靜之機非至健不足以察靜之固又轉歸靜上來古之人有顔氏子者其知此入顔子之易繫顔氏子且游乎洙泗之上而窺斯道之津涯者豈獨一顔子哉孔子設教於洙泗之上從游者三千速肖者七十子路以勇果求是其心蕩而不能靜語由也好勇過我又由也果子貢以辯給進是其心泛而不知靜列仲尼篇賜之辨賢於丘也能辯而不能訥冉求以才藝進是其心淺而不克靜語憲問冉求之藝文之以禮樂亦可以為成人矣回也何如引三子過顔子身上來用語全句論其勇不如子路言其辯不如子貢取其才不如冉求繳上文且開説回不如三子循循而無所異於人黙黙而無所驚於世雖是開説已含靜意至於合志於冥凝神於獨沈潛靜定黙與道契者應以靜為學意則甚非諸子之所企及也顔子能靜所以勝諸子之不能靜然則何如斯可以言潛設問潛字好學不倦非潛乎語雍也有顔回者好學是其心好夫子之學而已未足為潛也心之潛不在此言無不説非潛乎先進回也於吾言無所不説是其心説夫子之言而已未足為潛也心之潛不在此鑚堅仰髙服膺勿失非潛乎語子罕顔淵喟然歎曰仰之彌髙鑚之彌堅又中庸回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣是其心慕夫子之善而已亦未足為潛也心之潛亦不在此夫潛豈一朝一夕之故哉再喝起潛字黙通於闇室不睹之地以下説靜意出中庸𡨕悟於雷聲淵黙之間莊在宥淵黙雷聲探聖人之心以印我之初心也久矣應冒天天相照吾心一聖人也善論回者正説本意不但觀於好學不倦之時應前惟當觀於墮體黜聰之日此是真潜心仲尼顔莊大宗師回坐忘矣仲尼蹙然曰何謂坐忘回曰墮肢體黜聰明離形去智同於大道此謂坐忘不但驗之於言無不説之始應前惟當驗之於離形去智之後此是真潛心仲尼出處見上不但求之於鑚仰服膺之初又應前惟當求之於心齋坐忘之餘此是真潛心仲尼莊大宗師顔回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也他日復見曰何謂也曰回忘禮樂矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回坐忘矣又人間世回曰敢問心齋仲尼曰若一志云云虚者心齋也蓋道不悟於膠膠擾擾之地而毎契於𡨕𡨕黙黙之中不悟於動而悟於靜墮體黜聰是養之以童子之䝉也非道之源乎變三股又再演先股文養易䝉卦童䝉求我云云䝉以正離形去智是恬之以清夜之氣也非道之淵乎再演中一股存孟夜氣不足以心齋坐忘是㑹於太極渾淪磅礴之天非道之溥博乎再演後一股源淵溥博四字是影帶潛字故終日如愚心無時而不仲尼也又變一様文注見前三月不違心無日而不仲尼也語雍也子曰回也其心三月不違仁步亦歩趨亦趨步趨一仲尼也莊田子篇顔淵問於仲尼曰夫子步亦步也夫子趨亦趨也瞻在前忽在後前後一仲尼也語子罕瞻之在前忽然在後以上四股學張文潛進齋記文力到功深超然領㑹學到仲尼地位豈啻氷釋而風休雲收而霧霽譬喻悟道處鵬摶鯤運吾不知宇宙之寥闊出莊子逍遥遊云云帝驟王馳吾不知古今之廣漠白虎通五帝驟三王馳但見萬象森羅皆吾方寸中之故物自力到功深至此用奥論劉和卿論復卦文果孰為聖人乎孰為吾心乎應吾心一聖人也回亦不自知其潛之之妙也進一步説潛字豈惟回不知之雖夫子亦不知其潛於我也又進一步説得妙不然弗如之歎何待於知十之餘而後覺乎語公冶長子謂子貢曰云云回也聞一以知十賜也聞一以知二子曰弗如也不愚一語何待於退省之後而後發乎見原題注云云退而省其私亦足以發回也不愚吁妙矣哉靜之為學也歸静字上抑嘗讀易至復而得顔子之學易繫辭顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也復之為卦一陽雖萌然其時為仲冬其象為雷在地中復卦雷在地中復蓋斯時也木歸其根蟄坯其封葉落蟄開之時正復動於靜不事生化之時也復卦正是靜之時候而聖人於象辭必曰見天地之心本卦復其見天地之心乎何哉設問吁答有以知天地生物之心惟於閉藏静定之時可見指復兹非潛心之學所本乎以顔子潛心之學得之於復聖人賛易獨許顔氏子之庻幾也以此見前注雖然有心者累物衆人也無心者忘物聖人也用先軰語故静則生樂樂則無心矣進一步説簞食瓢飲若無若虚方寸郁如也語子曰賢哉回也一簞食一瓢飲人不堪其憂回也不改其樂人為盡而天理融機事忘而真性湛隨意所處渾然天成到此是無心處前此則賢希聖之事至此則聖希天之境矣周子通書語夫子曰未見其止語吾見其進也未見其止也回亦曰所立卓爾同上既竭吾才如有所立卓爾天精天粹萬物作類出揚子潛之妙何所限量乎其妙如此嗚呼參乎不敏一唯而忘孝經參不敏又語里仁曽子曰唯㸃爾何如一問而悟見語先進天假之年顔其孔矣語不幸短命死矣孰曰未達一間繳本出處語謹論可與前篇參㸔推原題意格與漢宜損周之文論同意為治顧力行如何陳傅良出處前漢申公傳趙綰王臧言申公於上上使使迎申公申公至上問治亂之事申公已八十餘老對曰為治不在多言顧力行如何耳是時上方好文辭見申公對黙然立説武帝之召申公乃即位初年申公未見武帝之所為如何説他是未見其所以是説他非未見其所以非不敢輕易告之姑告之曰為治顧力行如何是勉其所自為而詳察其行事却徐為之計批云從題目如何上起意模冩當時氣象甚工最是講題用武帝許多後來事斡旋得好可為矜式論曰士有一旦卒然遇其君者指申公赴武帝初年之招卒然用孟子卒然問曰語卒匆遽也未見其趨舎之方謂武帝初年召申公他未見武帝所為如何則亦何以告之謂不敢輕易説其馮厚齋批云此句如畫圖言破意活也徒信而許之固不可説他是既未是徒疑而禁之又不可説他非也未是開兩端説接題更不再起與破相連此老筆也他人幾句方説到此蓋吾誠有見焉指申公則語之有故而入之有繇正説故事實也繇因由也斯可以切中乎其心而深動乎其聴謂申公已見得武帝所為分曉告之方有益彼亦見信語之無故而入之無繇反説彼將以為卒然之泛言而無益於理亂者矣若未見得武帝所為如何言之何益彼亦不見信是故君子寧緩言之歸題姑勉其自為而徐為之計指為治顧力行如何一語申公之始見武帝也曰為治不在多言頋力行何如耳舉本文公之意蓋有待而後言也只一句繳了更湏舉全題方盡善嗚呼可謂老成長慮者矣是何也用何也字過原題與冒子破接同一格意脉不斷止齋行文法多如此獻言於其君莫難於其始指申公赴武帝初年之召欲聴言而吾未得其所以言也應破未見其趨舍之方意羡慕之未專趨嚮之未一武帝初年之心未定則其臧否無形而得失無證臧否猶是非也言未見得武帝所為是非如何而言之不過曰欲如此欲如彼矣揣摩之論夫莫得其當而一聴其所擇由上意又自作議論此所謂書生之冗談而人主之所習聞者罵倒上意昔者傅説之遇髙宗其君臣甚相歡也以傅説比申公而説未始有一辭及當世者傅説告君之初不敢泛及他事命之以納誨復之以從諫皆大畧之説也書説命上命之曰朝夕納誨以輔台徳云云説復命于主曰后從諫則聖此是第一節及進之以率百官則始一二而言之説命中惟説命總百官乃進于王曰云云此是第二節蓋至於黷祀之論累數十言而髙宗不俟其終篇輒勦其説而有㫖哉之歎同上云云黷于祭祀時謂弗欽禮煩則亂事神則難王曰㫖哉勦勞也禮記母勦説初交反又初教反此是第三節一事作三節説用得活處然後知説之發誠中矣説非有懐者猶如是蓋卒然一見之頃應冒頭其告語之法如此武帝之立年猶未冠後三年正月即皇帝位時武帝年未二十而其任申公也臨政猶未期月也秋七月議立明堂遣使者安車蒲輪束帛加璧徴魯申公王恢嚴助之策未施而邀功之隙未開王恢曰擊勾奴便嚴助發兵救東甌文成五利之技未售而神仙之好未萌郊祀志方士更乘言神仙事齊人少翁以方見上乃拜為文成將軍膠東人欒大求見言方大悦拜為五利將軍相如枚臯之賦未奏而文章之習未勝司馬相如枚臯皆以賦得幸張湯杜周桑𢎞羊孔僅之徒未並進而賦斂刑法尚文景之舊也以上數人皆言利之徒見食貨志年以上四股皆是武帝後來事只將數个未字斡歸初意末句長方承得上三句起此作文之法也當是時仲舒對䇿帝為之善則疑於是董仲舒對䇿天子善其對田蚡用權帝不之禁則疑於非田蚡傳上初即位蚡以肺腑為丞相入奏事語移日所言皆聴又薦人或起家至二千石權移主上出見臧綰與論經術則又疑於是本文上雅好儒術趙綰王臧言申公於上入見竇后與論黄老則又疑於非本紀太皇竇太后好黄老言不悦儒術以上疑於是非之説應冒語公也指申公入對之時以山林耆老一日入對其諌耶勸耶抑匪諫匪勸而游説之耶皆疑辭告應冒則亦何以之意夫其幾冠之年方為是未朞之政以疑於是非之心而聴勸諫不定之説則是誠無益哉只兩語總盡上面許多説話故豈若從其所自為而詳察其行矣應冒始勉其自為意指為治不在多言如何凡天下之事履之而後見有所試而後可以求其所欲也應冒子言之有故入之有繇斯可切中其心之意使武帝力行之某政善某事得則吾有勸未晚應勸字某政不善某事有失則吾有諫未晚應諫字嗚呼老成長慮顧不輒發也如此應冒老成長慮字夫當禽而射矢無虚捨天下之良工也再引譬如冒子言之有故入之有繇之意意病以加藥庸醫為之如冒子言之無故入之無由之意兩語錯綜文法最佳故凡與人而有言而言不見信者非其料想之説則其嘗試之説也應冒子言之無故入之無繇卒然泛言之意况人情有其意而無其形吾從而言之則諱又出意與形字作議論畧轉作結尾懐其實而無其名吾從而指之則逃皆是議論孟子一見齊宣遽許之保民宣王不自諒也易牛一事齊王甘聴焉孟子見齊宣王云云保民而王同上有牽牛而過堂下者云云以羊易之管仲之責楚固巧矣南征不復之事楚終得以辭之佐傳齊伐楚楚云云管仲對曰爾貢包茅不入王祭不共無以縮酒寡人是徴昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不共給昭王之不復君其問諸水濱無他吾臆之也臆者以意度之也一句繳得快是故臧否無形而得失無證則不可泛言乎其君舉原題語若申公者誠非所謂書生之冗談也應原題語收拾一篇之意謹論闕務勸農桑粟帛之外無異貢本紀詔曰老者非帛不暖非肉不飽云云今聞吏廩當受鬻者或以陳粟豈稱養老之意哉具為令其八十以上賜米肉酒九十以上賜帛絮至於法令之苟且經制之不立稽古禮文之多闕則恬不加意焉賈誼治安䇿禮誼不如法令又經制之不立是猶渡江河亡維楫武帝賛文景務在養民至於稽古禮文之事猶多闕焉以漢視周周其若是質乎亦疑辭以質字反形文字若是質則仲舒何所見而欲損之也第二難漢至武帝則六世矣入武帝講題建元至元光則七年矣建元六年元光元年䇿董仲舒是時賢良雖舉以衛綰之言而輒罷也建元元年衛綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可治道雖問以申公之言而頓沮也本紀天子使使迎申公天子問治亂之事申公對曰為治不在多言頋所行何如耳詳見前篇注明堂雖議經術雖尚以趙綰王臧之獄而復寢也同上雅尚儒術丞相竇嬰太尉田蚡俱好儒術推轂趙綰為御史大夫議立明堂以朝諸侯與申公議明堂事御史大夫趙綰郡中令王臧皆下獄自殺然則武帝之文固不見於仲舒對䇿之時也仲舒何所見而欲損其文耶第三難嗟夫解仲舒之所見見其心也非見其迹也應冐心迹二字衆人見其迹而始憂之衆人但知其迹之著於彰彰者仲舒見其心而逆制之仲舒則逆制其心之運於冥冥者忠臣之事其君如孝子之事其親也舉譬聴於無聲視於無形逆制其心仲舒引詩以斷事君之章所謂中心藏之何日忘之見孝經仲舒則有見焉見其心術之初察其聲氣容色之發探其精神心術之運應冒聲氣容色之末即精神心術之運異時窮奢極欲之事仲舒固已得之於冥冥之中矣發出主意應冒動一念慮之㣲皆他日横流而不可遏者也損周之文用夏之忠仲舒豈以人之惑乎我而不言哉舉本文且夫武帝之聲氣容貌可以逆探其精神心術而推見其末流之事則有三焉應前語又立三柱議論蓋人之常情冨貴者其心侈第一柱少壯者其欲廣第二柱而鬱積磅礴者其發必震第三柱而武帝於此三者則兼而有之謂他人但有其一而武帝則具其三以積世之冨庶則其心不期於侈而侈也武帝席文景富庶之後其心必至於侈應第一柱冨貴者其心侈以少年之英鋭則其欲不期於廣而廣也武帝即位年幾二十其欲必至於廣應第二柱少壯者其欲廣帝好經術而太后反之帝用儒生而太后抑之則其鬱積磅礴之久又必求以大得所欲而後已也帝好經術竇太后則好黄老帝用儒生而太后則不恱儒術二人相反如此其氣必至於發泄應第三柱其鬱積磅礴者其發必震夫是三者而有一焉則其勢猶趨於文而况武帝相遭而相有乎而况帝兼有三者當是時也方士之技未售吾知其必售也謂文成五利之徒文章之習未好吾固知其必好也謂司馬相如枚臯之徒太山未封梁父未禪其終有不封禪乎武帝封太山禪梁父宫室未建太學未立其終有不建立乎武帝建千門萬户之宫又立太學以至詩樂之作音律之叶魚龍曼衍之設千乘萬騎之備武帝賛協音律作詩樂又西域傳極曼衍魚龍角抵之戯注曼衍巨獸百尋是也魚龍者為含利之獸先戯庭畢入殿前激水化成皆魚躍水作霧畢化黄龍出水戯於庭又登單于䑓勒兵十八萬騎旌旗徑千餘里以上數句説武帝後來之文如此人見之於末流之後他人則見其迹而仲舒獨掲勉强加意以為發端之語仲舒䇿髙明光大不在乎他在乎加之意而已指其心術而逆制之主意惜乎老成長慮之言不足以動少年英鋭之氣也惜仲舒之言武帝不能聴之後乎仲舒若汲黯若東方朔若司馬相如武帝之臣或直而質之如汲黯東方朔皆直諫或諷而諫之如司馬相如作諭蜀文以諷上嘐嘐焉益進其説而冀以救其弊嘐嘐用孟子語嘐嘐志大言大也不知仲舒猶不能塞其源於其初且不能制之二三子獨能障其流哉其後何以禁之罵倒三子雖然損周之文固仲舒之所以逆制武帝也末申上文要引下意然儉非聖人之中制仲舒中篇之言何為而發耶用仲舒第二䇿中語來辨難既防之復啓之閉其一而開其一損周文之言是教武帝不必文則是防之閉之也儉非聖人之中制又是教武帝不必儉是啓之開之也武帝冝何從焉從文耶從忠耶世謂武帝之多慾基於𢎞病不廣大之言汲黯傳陛下内多慾而外施仁義公孫𢎞傳𢎞常稱以為人主病不廣大人臣病不儉節𢎞之推波助瀾以逢君之惡固不足道罵倒公孫𢎞逢君之惡用孟子語幸而仲舒之深見逺慮柰何亦為此哉亦責仲舒儉非中制之語不是夫儉非中制仲舒之言要未為過也又扶起言之於武帝之前則與病不廣大之言等耳又抑倒謂儉非中制之言與公孫𢎞病不廣大之言相似皆是教武帝奢侈了吁𢎞與仲舒之學俱春秋乎此也二人俱學春秋春秋之法君子不敢以責𢎞𢎞不足道不必以春秋之法責之若仲舒者豈能逃君子之責哉以此責舒其將何辭春秋之法責備賢者若仲舒賢者復為此言冝受春秋之責謹論回䕶題意格與黄棨孝文好刑名之言論同格孝文幾致刑措章頴出處前本紀賛孝文即位云云専務以徳化民是以海内殷富興於禮義斷獄數百幾致刑措嗚呼仁哉注措置也民不犯法無所刑也幾平聲立説文帝之心非不欲盡致刑措而至於幾致者以其制於時故也時有所不可所以文帝之仁未能盡推於天下而有缺然不滿之處此班固所以有嗚呼仁哉之嘆也批云看班固嗚呼仁哉之賛未必是不滿之語然此篇就幾字起意所以用得不滿字説得活動又得仁與時字開闔反覆雖不甚拘常格而文有氣勢老筆也論曰天下有不容盡之仁刑至於盡措方是仁而仁者始負不盡仁之名孝文未能盡致刑措只能幾致所以有不盡仁之名以夫人之為仁便將仁字説而天下猶以不盡仁議之指幾字幾者幾及而未盡之意非固指其未至而疵其失也斡一轉喚下意誠以有所制於時主意則雖無所吝於仁吝愛惜也與講中靳字相應而仁亦不能以盡推於天下是時斷獄數百猶有犯吾法者則是不能盡推此仁吾憂其仁之大而施之未得以滿吾意也暗指班固曰幾致刑措之意則亦有致其嘆息愛慕之辭而已指嗚呼仁哉之意故善觀夫人之為仁者必求諸其心暗指文帝方又生一意文字活固有心欲致之而勢有所格文帝本心未嘗不欲盡致刑措以制於勢之有所扞格君子亦歸之於其時可也主意推吾之仁以包天下應上仁字使天下無一人不有以全其父母之身者固吾之欲也人人自愛方得刑措貫上欲字吾以是愛之而彼不以是自愛吾推此仁則是愛之彼不自愛是制於時則吾之仁至此而遂有缺焉指幾字所謂仁者固千百而未仁者猶一二狀幾字但千百一二字粗非冒語欲盡者尋丈而未至者尺寸狀幾字但尋丈尺寸字亦粗非冐語君子固以是為文帝喜而亦為文帝不滿也以幾字為不滿班固之為是説也而復繼之以嗚呼仁哉之辭本文班固之意深矣孝文幾致刑措請申論之萬物皆生而一物獨枯則造化非全功以天之仁比人君之仁舉天下皆化而亦有未化者焉則君子非全仁人之未化猶麗於刑亦如物之獨枯者危公稹云論中設譬湏一句比喻一句使實事為上格君子受非全仁之名固無憾也幾致刑措是非全仁之名以吾仁不得極其所謂大君子於是而有不懌然不懌不悦也應不滿字用若是常格則此下未當用文帝事此下便文帝事説他仁處一臺之作未害也而帝謂吾可無臺不可使民無廬本賛常欲作露臺召匠估之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為一帷帳之文未過也而帝謂吾可無文不可使民無褐同上帷帳無文綉以示敦朴為天下先以吾之受恥而使民之保首領無臺無文則是吾之受耻使民有廬有褐莫不生全則是保首領吾寧安於簡陋而一毫亦不費也只繳上無臺無文意推是心以徃與造化同功與天地同量未為誇者説本心亦欲盡推此仁而今也一句引譬滿堂燕笑未免有向隅之泣不犯刑者多則是滿堂宴笑猶有一犯刑者則是匹夫向隅而泣者海内禮義而斷獄之數百吏猶有藉手焉本題注見不盡仁意説上一句舉譬下一句用實事見原題此非吾之仁至此而有所靳也應冒無所吝於仁意吾推之而彼則拒吾授之而彼則不受應冒吾以是愛之而彼不以是自愛使吾不得以全仁名者説幾字是彼也在人而不在我不便歸時字看他紆餘委曲處而亦有由焉却歸時字轉得又軟全與後篇有由也格致一般一陽之生也再舉譬冬而春始敷一雨之降也朝而暮始溢舉此為譬方切時字亦見文勢雍容前軰所謂做論不可多刼撮是也且以文王之徳百年猶未洽於天下見孟子文帝何議哉借周形漢更不再用漢事只輕輕繳入本題文王之仁由絲而綸由綸而綍記緇衣王言如絲其出如綸王言如綸其出如綍言因小至大也至受之時商王名受環妹土之疆者皆文王之仁也妹土地名紂所都之地自子來之後以至於大賚悦服之日亦幾年矣歸在時上書詩靈臺經始勿亟庶民子來又武成大賚于四海而萬姓悦服而今蠢兹不靖之變必至於痛懲而僅定書大誥西土人亦不静越兹蠢圄空之美號不式之極功幾少疵焉入刑措意餘前董仲舒䇿成康囹圄空虚四十年又成康不式四十餘年天下不犯則夫繼不勝弊之後而接乎倥偬不及用力之地者始有辭於天下矣指文帝不史髙祖賛漢承秦弊又倥偬暇給注倥偬苦也是以古之有天下者再起議論常畏夫驟合而患夫無以善其後也歸時字上則夫他日之難有不如今日之易時不常也而一時之矜喜曽不足以償後日無窮之憂時難保也秦之染未洗也秦舊習之汙未洗去而漢之漸猶淺焉漢之教化漸漬猶未深藉使成康居之正恐難以盡其仁而求備於文帝也可乎應制於時意照應上周事把成康來形容文帝回䕶得好肉刑古之制也只此一事説刑用得最好若不用此一事則是無論腹了在帝未得專去在漢亦未可輕去言刑是一箇重事妄一女子開説而從之則專去不暇恤輕去不暇恤本紀齊太倉令淳于意罪當刑其少女緹縈上書曰妾父為吏齊中皆稱其亷平今坐法當刑妾傷夫死者不可復生刑者不可復贖雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新天子悲憐其意詔除肉刑嬰兒呌號而隨之父母之懐亦誠有不及他顧者譬喻切言語好吾寧受變古之責而終不能恝然於人之父子之至情肉刑乃三代之法而文帝去之是受變古之責從緹縈之請而救其父是不能恝然於人之父子之至情然史之所稱且止若是舉本文幾致刑措帝之資則是應冒心欲至之意而其遇則非也應冒勢有所格意大抵心於愛天下者一身之名非所計負不盡仁之名所屈者寡而所就者大也屈一人以利天下以制度之脩則曰未遑賈誼傳誼以為漢興二十餘年天下和洽乃草具其儀以奏之文帝謙遜未遑也以禮文之事則曰猶缺武帝賛文景務在養民至於稽古禮文之事猶多闕焉至於刑措之美亦曰幾致本文是亦無一足以快人意者不滿之意孰知帝之屈於名而天下之伸於實邪文帝受幾致刑措之名而天下受殷冨之實武帝作意為之而天下非復前日矣説武帝只一句他人則要一段矣噫王者必世而後仁善人為邦百年而去殺見論語上引事新皆從時生來惜乎文帝之仁自文帝而始亦自文帝而止也貶武帝不能繼文帝之仁不然班固氏宜無憾於此也指嗚呼仁哉反繳有力謹論回䕶題意格與章穎孝文幾致刑措論同格孝文好刑名之言黄棨出處前漢儒林傳孝文本好刑名之言立説文帝本好儒而班固乃以好刑名稱之豈文帝之本心哉蓋是時儒者所好猶未脱刑名之故習文帝惟知儒者之可好不知儒者之所好又在刑名使文帝不得以好儒名者庸非儒者累之乎批云看文帝氣象亦非好儒者但謂之好刑名則太過此篇一力為文帝出脱謂好儒乃文帝之本心刑名乃儒者之習尚文意大有發明真妙論也論曰自儒者為習尚之累漢初儒者多學刑名而後賢主始負不好儒之名文帝但知好儒不知儒者學刑名之學所以得好刑名之言之名夫人主意向之所形指好字他日之名實定焉名實二字是一篇經緯間有好儒之實不得遂其好儒之名暗指文帝此豈得為人主之咎為文帝出脱生下意蓋自仁義之學不傳而異端之學始勝刑名之習此其風聲議論雖儒者不能以自免謂漢之初儒學刑名有如人主天資寛厚指文帝不幸而當儒道晦蝕之餘是時儒者不傳仁義而習刑名苟得一二儒者之言論以慰其所欲他未暇擇也含文帝聴賈誼鼂錯之言然所好之實方在此我之所好在儒而名則或出於彼儒者之所好又在刑名吾惟知有好儒而不知儒者之所好申上文他日發出主意名實之不辨應接名實二字使吾不得以好儒名者庸非儒者累之乎主意分曉漢文帝用儒之主也刑名之學决非帝所好者帝本心如此班孟堅以好刑名歸之舉本文豈非漢初諸儒未脱故習習刑名者言論之際一動文帝之聴謂賈誼鼂錯等則帝亦不能逃其名矣謂二子學刑名之學而文帝聴其言所以得好刑名之言之名噫帝本好儒而卒至於非所好應主意其亦不幸也已不幸與後面相應孝文好刑名之言請得以原文帝之心焉嘗謂儒術之與刑名曉然如白黒之易辨也謂二者判然不同此不待智者知之人皆知之三代而下人主天資苟不至於盡壊者又孰肯舎此而從彼哉誰肯舎儒術而從刑名置思軻仁義於迂闊之地子思孟軻談仁義唱申商名法於横流之中申不害商鞅談刑名世固有之矣世固有舎儒術而從刑名者安可以是待文帝乎文帝則不好刑名昔之議者亦以髙帝為不喜儒之主難之者酈食其傳沛公不喜儒諸客冠儒冠來輒解其冠溺其中溺字音尿去聲吁帝豈真不喜儒哉為髙帝解特未免為腐儒累耳同上腐儒幾敗乃公事干戈未定過魯祠孔子不可謂不知儒也本紀十二年十一月行自淮南還過魯以太牢祀孔子智學孟子不可謂不也叔孫儒者委以制禮可謂不用儒乎叔孫通與弟子共起朝儀為綿蕞野外習之又本紀叔孫通制禮儀學孟子可謂不智乎新語一奏隨即稱善不好儒者能之乎陸賈傳時時前説詩書云云凡著十二篇毎奏一篇帝未嘗不稱善號其書曰新語又本紀陸賈造新語學孟子謂不賢而能之乎屈一日之名喪千古之實應冒名實字世儒議論毎毎如此繳上意髙帝之不得以喜儒名者君子固為髙帝惜引髙帝要過文帝來况夫有好儒之實而反有好刑名之名君子又安得不為文帝辨入文帝講且文帝何如主也其真好儒耶疑辭抑好刑名耶疑辭雙下謂其好刑名喚起上文難則二十三年之治以仁言以徳稱文帝即位二十三年專務以徳化民又嗚呼仁哉若以為真好儒喚起上文又難則此言又奚為至文帝哉謂文帝好刑名之言吁有由也要歸本意與孝文㡬致刑措論同格致天下之事有其實固不得辭其名應名實字謂有不好儒之實當得不好儒之名而疑似之可議者是必夫人之有以累乎我謂文帝為儒者學刑名所累爰自申商之習一熾于秦申不害商鞅尚刑名之學世之以士自名者非刑名不學也言是時儒者皆學刑名漢氏之興人主苟不用儒則已反説儒非斯人之徒與而誰與學論語吾非斯人之徒與而誰與武夫鄙人椎朴少文既不足道如灌嬰樊噲之徒其間大儒如伏生之流則老夫耄矣又無以發明儒學之功尚書序濟南伏生年過九十失其本經口以傳授云云謂之尚書老夫耄矣用左傳語幸而舉朝唯一賈生賈誼事文帝學刑名之學百餘人中惟一鼂錯鼂錯事文帝亦學刑名之學則文帝安得不欣然以為儒而用之當時儒者無出此二人帝安得不喜而用之夫欣然用儒文帝之好則審矣申上文豈意帝之所好反為帝累耶為學刑名之儒所累自今觀之禮義亷耻之言賈誼治安䇿上設亷耻禮義以遇其臣治國大體之論鼂錯對䇿曰明於國家之大體臣以古之五帝明之使二子平日所以告帝者盡出於此則孰敢以刑名而議帝謂上二語純正不是刑名之言惟夫申韓故態未盡脱去申商韓非學刑名者而二子皆學之權勢法制刑名術數時發見於言論之末賈誼䇿權勢法制人主之斤斧也又鼂錯上書皇太子已讀書多矣而未深知術數者不聞書説也此等言語皆是刑名之學遂使後世徒見帝之所信用者不出二子賈誼鼂錯顧以帝為真好刑名之言帝但知好賈鼂二子之儒者不知二子尚刑名之學遂使後人以文帝為刑名之言所好嗚呼帝豈真好刑名者哉為文帝觧好儒者文帝之本心刑名者漢儒之習尚發盡主意本心不白帝好儒之本心不能明白習尚為累為儒者學刑名所累漢儒則有罪矣罪歸在漢儒身上帝何尤焉於帝何罪且帝本好儒尚不免好刑名之譏喚出本題語藉使盡聽二子之言賈誼鼂錯取其所謂權勢法制刑名術數者而盡施行之收前語挑斡説後日之論殆不止是後人又不止以好刑名之言譏之然則帝真不幸矣應冒不幸字厥後武帝以雄才大畧之資見本紀朝夕所從事者見知故縱監臨部主而已儒者何有焉前刑法志孝武招進張湯趙禹之屬定律令作見知故縱監臨部主之法注云見知人犯法不舉告為故縱而所監臨部主有罪并連坐也特其蘇張縱横之學已罷本紀建元元年衛綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷董仲舒公孫𢎞之徒習尚稍純武帝賛儒雅則董仲舒公孫𢎞而班固儒林一序乃大不滿於髙惠文景之世謂四君不好儒獨於武帝三嘆焉謂武帝好儒吁武帝本無好儒之實而顧得重道之名文帝當得好儒之名而反受好刑名之實以武帝反形文帝應前名實字儒生習尚闗於君徳多矣名實相關係天下之事幸不幸大抵如此幸不幸亦應冒語良可嘆夫吁嘆息結謹論因古思今格與老莊管孟立意論同意莊騷太史所録方澄孫出處韓文進學解周誥殷盤屈曲贅牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録立説謂文體之工自文法之變始莊子之文易之變也屈原離騷之文詩之變也司馬遷史記所録尚書春秋之變也然文以變而工其去道已逺古者之文正不貴其變也批云議論出自胷臆筆力雄徤前無古人老作也論曰文體之工自文法之變始莊者易之變騷者詩之變太史所録乃尚書春秋之變愈變而愈工知道者於是乎有所感焉知道指韓愈謂莊騷太史所録之文愈變而愈工去聖經之道愈逺故韓愈有感而言之夫文之正者無竒無竒則難工正與變相反無竒與工相反正則無竒變則愈工世之君子争為一家之竒言暗指荘騷太史所録則其法不容以不變欲竒則必變變益多正益逺工亦益甚變則不正而愈工已寓咨嗟嘆惜之意蓋自六經而下惟莊騷太史為最工先拈出三家之文工有志於文者類喜言之暗指韓愈有志於文而稱其工雖然莊者理義之變也莊子之文易之變也理義字只是替易字冐未敢便用易字恐太暴騷者風雅之變也離騷之文詩之變也詩有國風大雅小雅史記者尚書春秋之變也尚書古史也春秋魯史也而史記者二史之變也不變則不工矣反應破語噫文以變為工於其道奈何哉三家變六經之文雖謂之工其去聖人之道愈逺矣然則尚論三家之文者喜其工而悲其變可也繳結小講意韓愈氏號為知道者獨不有感於此乎應破語莊騷太史所録請言其㫖且夫世之議三家者吾嘗聞之矣且開説起曰漆園之文偉其失也誕莊周嘗為漆園吏謝靈運詩漆園有傲吏又莊子天道篇於是莊周聞其風而悦之以謬悠之説荒唐之言此便是誕靈均之文深其失也怨史屈平傳屈平作離騷蓋自怨生也此便是怨司馬父子之文浩博閎肆其失也豪司馬談司馬遷又進學解可謂閃其中而肆其外矣本賛又其是非頗繆於聖人序逰俠則退處士而進姦雄此便是豪以上三句學榖梁子序文左氏艷而富其失也誣榖梁清而婉其失也短公羊辨而裁其失也俗噫嘆惜歸正亦孰知其不誕則不偉不怨則不深而不豪則不足以發其浩博閎肆也哉應冐愈變則愈工意夫太羮𤣥酒味之正也唐駱賔王傳韓休之文如太羮𤣥酒有典則薄滋味雲門咸韶音之正也雲門大咸大韶皆古樂名以上二句比古人之文如此三家者負其詭異傑特之才不安乎正而必出乎變謂莊子屈平司馬父子三家變古文之正體力掃世俗之塵腐而為千百世言語文字之宗祖變則愈工其用志亦良苦而自成一家亦良可喜矣應冒喜字文字有抑揚有起伏然昔者吾孔氏非其無三家之才也以孔氏之文言其正而不變形三家之文變六經之文不敢出一毫意見於法度之外端簡嚴重如老成人而萬世之能言者莫加焉正而不變然則文之工者政不必變乎正而後工也應冒子承題文之正者無竒若三家乃必欲變之何耶設難彼誠見夫理義者聖賢之正論也文少本乎理義則淡薄無味根據不浮不足以捜竒而獵異矣文如易之正論則無竒風雅者詩之正聲也文少類乎風雅則寂寥希音簡朴無華不足以誇多而鬬靡矣文如詩之正聲則無竒尚書春秋者史之正例也文必法乎尚書春秋則謹嚴太過繩尺甚苛不足以騁才而肆志矣文如尚書春秋之正例則無竒以上三股推原三家變文體之意今觀莊氏之文架虚行危淩髙厲空逍遥齊物等篇廣譬博喻而雜恢諧戯謔之辭使人心廣神馳如從至人而游六合之外也逍遥遊齊物論並莊子篇名此所謂漆園之文偉屈子之文孤芳獨潔含譏隠刺卜居漁父等作悽切感惋而文以忠愛惻怛之㫖使人志銷意沮如行墟墓而聞秋蛩之鳴也卜居漁父並楚騷篇名此所謂靈均之文深子長之文浩浩乎洋洋乎自本紀至列傳採擷攟摭而駕以雄渾雅健之筆使人氣踈才涌如入太廟而觀禮樂器也司馬遷字子長史記自本紀至列傳凡百三十巻三此所謂司馬之文浩博閎肆以上股形容三家之文可謂工矣一句總結上三股且説三家之文工然使質諸知道君子之前則謂此變也而非正也轉歸主意應破語荒忽虚幻理義之所諱也應上莊者理義之變其失也誕褺嫚簡傲風雅之所棄也騷者詩之變其失也怨詭怪竒特尚書春秋之所不取也應史記者尚書春秋之變其失也豪夫六經無文法也陳止齋文三代無文人六絰無文法文之正者無竒今也文體之工乃出於文法之變應破題則是學不足以知聖人之用心而終身自列於言語文字之流工於文者果三家之福哉説盡三家之失謂其文不近聖經之道雖工何益故曰知道者於是乎有所感矣應破語韓愈氏固自許以知道者照冒子語進學之作平生用力淺深次第歴歴可見就題出處説來盤誥也詩易也春秋也引本文商盤周誥屈曲贅牙春秋謹嚴左氏浮誇易竒而法詩正而葩主意本出處上文有此語皆嘗含其英而咀其華趨向正矣出處下文沉浸醲郁含英咀華而必下逮於三家何歟設難豈因易而有感於莊之變莊者易之變易理義之書冒用理義字至此方説出易字因詩而有感於騷之變騷者詩之變因盤誥春秋而有感於史之變歟史記者尚書春秋之變委以上三句發盡主意又有折抑方喜其體之工而忘其正之已變歟應破語愈之為學識者固嘗議其失端緒矣抑韓愈觀其所作怪怪竒竒韓送窮文大率南華之步驟謂愈送窮之文倣莊子之南華經而羅池一碑毛頴一傳羅池廟碑又毛頴傳皆韓文之竒者視楚江之些序賛之筆必欲極力而模倣之謂愈碑傳之文學離騷之些辭史記之紀録些音噪哀辭也騷辭每句以一些字嘆於句終蓋其文僅足以變王楊之陋而不足以正莊騷太史之變唐文藝序唐文章三變始㳂江左餘風王楊為之伯𤣥宗稍厭雕琢崇雅黜浮燕許擅其宗太歴元和間韓愈唱之排逐百家法度森嚴三變變為王楊再變而為燕許三變而為韓栁唐文王勃楊炎又况子雲相如之可喜可慕者日陳乎前有以誘奪之歟出處下文子雲相如同工異曲而以上繳盡講中意謂韓愈之文亦出於變不得其正異時因文以見道原道中數語君子許焉韓愈作原道數伊川謂原道中語見道分明然後世終不以為得六經孔孟之正傳者先揚愈之知道後却又抑愈之不能傳道蓋愈之學雖正而其文終出於變則亦秦漢而下之文雜於其心足為之累者多耳不出於正而出於變故其文如此説盡韓愈平生噫學至韓愈文至莊騷太史而終不足以近道交合繳結應主意道字則有志聖賢之事者安得不重有感於斯應破語有一倡三嘆之音自首至尾無一語蹈襲可貴也哉謹論此篇格致雖與後篇同然此論是褒韓愈為知道後篇是貶蕭統為不知文不可不知因今思古格與莊騷太史所録論同意老莊管孟立意如何吳季子出處文選梁昭明太子序老莊之作管孟之流以立意為宗不以能文為本立説後世文人有心於為文而其文益陋如古人之為文未嘗有心於為文而自不能以不文蕭統議老莊管孟四子之文而謂其立意為之則是有心於為矣以文而待四子且不可况又謂之立意乎其説陋矣批云風之與水無意於相求不期而相遭而文生焉此天下之至文也此論似之論曰有心於為文後世之陋也有心指立意字謂立意以為文後世文人之卑陋也以是而議古人則滋陋矣老莊管孟四子未嘗立意為文蕭統以立意言之其説愈卑何則文不可以有心為也文不可以立意為之而况於古人之文乎暗指老莊管孟四子古人未嘗有心於為文也四子未嘗立意為文而不能以不文者自然有文下用老泉文見題注何哉設問蓋抱負於中而有餘則洋溢於外而不自覺用蘇子由文其氣充乎其中而溢乎其貌動乎其中而見乎其文固有未嘗規規然用其心未嘗立意而自然脗合乎律度者矣自合文章之法度脗合出莊子若曰雕琢胷襟布置程凖而可以為文則其文固不足觀矣若立意為文則不足為文况可持此而議古人之文乎豈可議老莊管孟四子立意為文老之簡也老聃之文簡畧莊之放也莊周之文放蕩夷吾之精確管仲字夷吾其文精確而孟氏之辨博也孟氏名軻其文辨博皆所謂洋溢於外者耳此四子之文發見於外者見接題下注夫豈用心之可到哉何嘗立意後世以來始有用心於為文者矣江左以來始立意為文心益苦而文益陋無足怪也陋字應破題蕭統淺狹之見蕭統集文選乃謂莊老管孟氏之書所以不可及者以其立意之精到耳引本題噫嗟嘆文而出於有意固已不足為文矣有心於為文則陋耳而况老莊管孟氏之書又可以文論乎又進一步説四子之書且不可以文論况可以謂立意為之乎有是哉統之陋也學論語句法有是哉子之迂也陋字應破題老莊管孟立意如何請試論之聞唐人有言文以意為主以氣為輔杜牧之云云文之尚意也明矣且放開説亦孰知夫無意於文者乃天下之至文乎主意今夫水之為水未嘗有文也風一過之則激而為澎湃蹙而為淪漣委蛇起伏千態萬狀而水之極觀備矣此固天下之至文也蘇老泉文甫字説且兄嘗見夫水之與風乎油然而行淵然而留停洄汪洋滿而上浮云云今夫風水之相遭乎大澤之陂也紆餘委蛇蜿蜒淪漣安而相推怒而相陵云云磅礡洶涌號怒相軋交横綢繆於乎虚空掉乎無垠横流逆折濆旋傾側宛轉膠戾云云殊狀異態而風水之極觀備矣故曰風行水上渙此亦天下之至文也風之與水曷嘗有意於其間哉同上文此二物者豈有求乎文哉無意於相求不期而相遭而文生焉是其為文也非水之文也非風之文也二物者非能為文而不能不為文也人而能知風行水上之文然後可與論文矣打合了人知水之文則知之文蓋嘗觀江左諸人如顔謝輩苦心極力常患不足以名家如顔延年及諸謝皆能屬文此是有心於為文者而歸去來一辭乃自柴桑翁肺腑中流出陶淵明居於柴桑里作歸去來辭又見下注此是無心於為文者唐之沈宋研揣聲律愈趨愈下唐書杜甫傳切宋之問沈佺期等研揣聲音浮不差而號詩律此是有心於為文者而盤谷一序昌黎子於杯酒談笑間得之韓愈封昌黎伯作送李愿歸盤谷序章東坡志林晉無文章惟陶淵明歸去來一辭唐無文惟韓愈送李愿歸盤谷序為此是無心於文者文其可以有意為之乎反應文不可以有心為也意異哉蕭統之論文也其曰立意為宗者何其待古人之薄乎引本文貶之自六經不作而諸子興斯文也下衰矣文不如古然其出而著書立言者猶非有意於為文也應冒子古人無心於為文者今觀上下經之文則寂寥簡淡太羮𤣥酒之味也老子著上下篇言道徳之意五千餘言薄唐駱賔王傳韓休之文如太羮𤣥酒有典則而滋味觀内外篇之文則宏放豪邁天根月窟之遊也莊子南華真經内篇凡七外篇凡十五窟朱文公賛邵康節云手探月足躡天根讀牧民治國之章其恢偉巨麗獨不如入猗陶之室而見其經理井井有條乎管子有牧民治國等篇也陶朱猗頓古之二富人讀居仁由義之訓其淵源奥博獨不如遊洙泗之門而親聆謦欬灑灑可聴乎孟子仁人之安宅也義人之正路也曠安宅而弗居舍正路而弗由哀哉孔子設教於洙泗之上又謦欬字出莊子人知其為文章之妙也而不知其所以妙者固非操觚弄翰鎔意鑄辭而習為如是之文也非有意於為文想夫柱下史之胷襟寒潭秋月之平淡也老子嘗為周柱下史記説老子無心於為文漆園吏之懐抱剛風浩氣之横放也莊周為漆園吏文説莊子無心於為仲之謀畧其甲兵之武庫歟管仲無心於為文杜杜預傳朝野稱美號曰武庫言其無所不有也軻之學術其金玉之淵海歟孟軻無心於為文漢舒向金玉淵海充暢於中則洋溢於外殆亦不自知其為文矣用蘓子由文見冒子注為繳四子無心於文而片言隻字蓋有後世老師鉅儒不能髣髴其萬一者四子之文後世文人皆不能及此豈效規圖圓模矩作方如統之所謂立意者哉四子何嘗有意於為文應冒子語嗚呼文而以立意言固文之下者耳若老莊管孟之書又可但以為文乎應冒子文而出於有意已不足為文矣而况老莊管孟之書又可以文論乎雖然拙於文而陋於識者言之是非何足深辨貶蕭統應破語若夫四子之人品則有不容無辨者馬要將四字分優劣夫以聃之絶聖棄智老耼之文如此周之放言髙論莊周之文如此往往蜉蝣天地芻狗事物而付之無何有之鄉固不足以施之於天下蘇赤璧賦寄浮游於天地注甲蟲朝生暮死又老子天地不仁以萬物為芻狗又莊子出六極之外而遊無何有之鄉而切切然惟冨强之是務者史記管仲冨國强兵又童子之所羞稱前揚雄解嘲五尺童子羞比管晏其於孟氏果若是班乎三人皆不如孟子之文正大學孟子語吾觀楊朱受學於耼而為我之説軻斥之為禽獸孟滕文公楊氏為我是無君也云云無父無君是禽獸也仲之功業亦以曽西之所不為孟公孫丑上管仲云云功烈如彼其卑也云云管仲曽西之所不為也而子為我願之乎則是三子者固孟氏之罪人也罵倒三子扶起孟子其又可以例觀乎孟為優而老莊管為劣不可一例而觀也愚故併及之謹論前篇謂古人之文出於正而三家之文出於變韓愈謂三家之文愈變則愈工蓋有所感也此篇謂古人無心於為文而後世有心於為文蕭統謂四子之文為出於立意非知文者也右二篇步驟畧同可以並看發明題意格唐虞於斯為盛陳子頥出處論語泰伯第八舜有臣五人而天下治其武王曰予有亂臣十人孔子曰才難不然乎唐虞之際於斯為盛有婦人焉九人而已立説古人以全徳為才後世以一技一能為才古之才全雖以一人之才亦可以周天下之務後世之才偏一人止於一事雖聚數十百人亦不能治如舜之五人皆是全才雖五人之少已足為唐虞之盛而况於武王之十人者乎以是知古人之才雖寡而猶以為盛初不在乎多也批云命意如與可之畫竹措辭如冝遼之弄丸此論中之巨擘也論曰人才不以多寡為盛衰古之才全雖寡而可以為盛後世之才偏雖多而不足以為盛顧所得者何如耳得古之全才則為盛不得則為衰夫物多為盛少為衰古今通義也以物理之盛衰比人才之盛衰至於人才乃獨不然何哉人之盛衰何不如物設問蓋古之所謂才者與後世異古今人才有兩様一技一能後世名之以為才後世之才偏而古之才則不如是也古人之才全自其禀天地扶輿清淑之氣固已卓立於生民之表此是古者人才之天姿而又益之以學問磨之以師友此是人才之學力為後靣張本迨其成也大用之則足以勝天下國家之重才之大者任大事而小亦優於一職才之小者亦辦小事投之所向皆綽乎其有餘裕古之人才全故可以為盛用孟子綽乎有餘裕語如此雖一人而已足為盛况以十計乎古之才全雖一人亦足為盛况於武王之亂臣十人乎孔子稱才難而有及於武王之十亂且曰唐虞之際於斯為盛引本文古朱文公釋本文云才難蓋語而孔子然之也謂周世人才之多惟唐虞較此為盛耳夏商所不論也朱文公釋本文曰言周室人才之多惟唐虞之際乃盛於此降自夏商皆不能及然猶但有此數人耳是才之難得也夫舉四海之人物而僅得十人焉已不足以言盛乃復以舜之五臣為盛而周之十亂為益寡矣若以數而論則十人多於五人若以古之全才而論則不如是也古之才全愈寡而愈足為盛然則聖人之所謂才者顧不可以意推乎言古人全徳為才與後世異唐虞於斯為盛此當以全才論者也盆成括以有才而敗於才孟子盡心下盆成括仕於齊孟子曰死矣盆成括盆成括見殺問曰云云曰其為人也少有才未聞君子之大道也中行氏以智名而滅於智智伯事見通鑑周威烈王紀又史記晉世家智伯與韓趙魏共分范中行氏以為邑故論者毎曰才徳殊塗君子小人之辨也司馬温公曰智伯之亡也才勝徳也云云才徳全謂之聖人才徳兼亡謂之愚人徳勝才謂之君子才勝徳謂之小人一薛居州如宋王何孟子謂一薛居州獨如宋王何六千君子以勾踐伯史記趙世家君子六千伐吳吳師敗故論者又曰一多一寡人才盛衰之候也用濟川文吁嗟嘆有是哉擺去上意愚為易之曰自以已意斷之惟君子然後能有才惟君子則謂之才小人不可以謂之才取人之廣非盛也衰也若以小人之才為才則其盛也反以為衰矣蓋古者以成徳為才後世以一技為才應冐古之所謂才者與後世異一段古之才全故一人而可以周天下之務古者以成徳為才舉天下而得如此者數人焉則沛乎而有餘後之才偏故一人而止於任一事後世以一技為才舉天下而非一事也則雖聚數十百人亦不能給雖謂之衰可也才之偏者雖數十百人亦不足以為盛而况後世之所謂才者又未必皆君子乎應古之才者與後世異古之君子未有不以才名者挈起才字説謂古之才非後世之才以周公之聖而孔子但稱之曰之才之美論語如有周公之才之美使驕且吝其餘不足觀也已左氏載元凱之事亦惟以才子稱之左文十八年髙陽氏有才子八人天下謂之八凱髙辛氏有才子八人天下謂之八元世濟其美堯不能舉舜臣堯舉八凱使主后土以揆百事舉八元使布五教于四方必周公元凱而後才之總上文言古者之全才非周公元凱而亦才之冝乎後世之多才也後世之才不如周公元凱之才五行麗天與攙搶枉矢飛流𤨏細者皆謂之星唐律歴志五行之祥應于下五緯之變彰于上雅劉向説苑秦胡亥立日月薄蝕在天光熒襲月又爾彗星為攙搶形如掃箒攙搶枉矢皆惡星名巍巍九鼎與瓶罌甕盎升斗勺合者皆謂之器前郊祀志禹收九牧之金鑄九鼎象九州者瓶罌甕盎盎等皆器之小君子稽乾文識坤珍不知將以何者為大乎稽天之文當以五行之星為大識坤之珍當以九鼎之器為大舜之五人五行也周之九人九鼎也打合説譬喻極切使虞周之臣不足以言盛則五行九鼎亦不得以為大矣反説有力嘗以周之亂臣考之且先説武王曰予有亂臣十人字晦庵曰亂治也乂曰亂本作古治自周公太公畢公而下至於邑姜列名凡十晦奄云十人謂周公旦召公奭太公望畢公榮公太顛閎夭散冝生南宫适其一人謂文母劉侍讀以為子無臣母之義蓋邑姜也閨門之懿姑置勿論則九人而已除婦人邑姜之外只有九人周㑹孟津諸侯八百同心同徳之臣至于三千史越書八百諸侯一旦㑹于孟津又見泰誓以此九人者列於其間蓋如太倉之一粟萬馬之一鬛亦何盛之有且難周武王時人才如此之多有如亂臣九人何足為盛聖人又引而上之至於夏商皆無稱焉以周之才比夏商為盛若是則合千八百年之間獨有此九人耳見冒朱文公注自唐堯至周一千八百年是猶可也又擺去上意舜五臣也以五方十僅其半也武王十人已為少以舜之五人比武王十人尤為少若取數之多而言十已不足何况於五舜之五臣又少於武王之十人而聖人又以唐虞之才較周為盛又以唐虞之才比周為盛豈其愈寡則愈盛物固以少為貴乎又設難嗟夫以下觧上難多寡者數也物之數則有多寡盛衰者才也古之才全雖寡而猶以為盛後世之才偏雖多而猶以為衰環天下之才一一以較其長再演才字儒者文墨武者介胄纎嗇者理財鈎距者聴訟前漢趙廣漢傳尤善為鈎距以得事情鈎距者設欲知馬價則先問狗已問羊又問牛然後及馬注鈎致也距閉也使對者無疑衆莫覺其所由以閉其術為距也一人一官一士一職應冒一技一能後世皆名之以為才天下之事如絲紛蝟宻不可勝舉雖竭天下之才而治之益見其少也言萬事之多如絲縷之亂如蝟毛之宻又應原題舉天下非一事也則雖聚數十百人亦不能給虞周之臣皆所謂千人之英萬人之俊淮太族訓知過萬人謂之英千人謂之俊百人謂之豪十人謂之傑以一而可以敵萬一人之才何以當萬人之才應冒雖一人已足為盛則所謂五人者固已多矣况倍而十之豈不為盛耶古人之才全十人之多尤倍於五人之多豈不為唐虞之盛然虞周之才何為而能若是也其生也間氣而殊禀培之以山嶽之渾厚瀹之以江漢之清明應冐禀天地扶輿清淑之氣固已卓立於生民之表其少長也則父兄師保以淑其質序庠學校以養其心仁義禮樂以充其學歲月齒髪以老其才應冒而又益之學問磨之師友嫓如竒植之材朝培而暮溉之此如古之才得其涵養數十年之後其崇干霄其大十圍採擢其一則棟梁之用備矣此如古者之才雖一人已足為盛况於舜之五臣與武王之九人乎其視九畹之蘭百畝之蕙何足道哉此如後世之才雖百人亦不能辦事春秋之世雖號多才指夫子時然與九畹百畆者何異此吾夫子所以發才難之嘆而思古之不可及也引本文後春秋而有漢焉武帝之世疇咨俊茂才人並出公孫𢎞傳上方欲用文武求之如弗及云云士咸慕異才並出班固亦為之賛曰漢之得人於斯為盛以此證題極切又見下注是以夫子賛虞周之意而賛漢也及求其所謂得人乃皆芻牧賈孺奴僕降虜之餘同上卜式拔於芻牧𢎞羊濯於賈孺衛青奮於奴僕日磾出於降虜云云噫異哉其所謂盛也武帝之盛與唐虞之盛不同若斯人而謂之盛吾見其衰也久矣武帝時人才之偏不足為盛用論語甚矣吾衰也久矣句法固曰漢之得人於斯為盛吾則曰漢之得人於斯為衰以衰字反形盛字散場極佳謹論可與已集陳耆卿漢世良吏論參看發明題意格可與前篇參㸔天子求修正之士潘徳逺出處賈山至言天子之尊四海之内其義莫不為臣云云舉賢以自輔弼求修正之士使直諌立説士之修潔者不屑進士之正大者不苟進然人主不可以其難進而不求之也苟以其難進而不之求則修潔者以退為髙正大者以去為榮又安得而用之哉批云題常則意新意常則語新此論可謂得其髓者論曰天下有難進之士修潔之士不屑進正大之士不苟進人主不可遂其易退之心天子要當求之不可使修潔者以退為髙正大者以去為榮文中子關子明姚義云云子曰有以發我也難進易退古今天下未有無士之國者挈起士字反説獨惟修潔之士則不屑進正大之士則不苟進應破難進之説然人主不可以其不屑進不苟進而遂已也不可不求之彼其以修潔自髙以正大自負毎不以進為喜應破難進之説求之猶恐不至而况不求之乎歸重求字上苟以其難進也而已於求則彼有望望而去矣反説不求之則修正之士必去矣用孟子語修潔者以退為髙正大者以去為榮應破易退意國無君子斯焉取斯學論語魯無君君者斯焉取斯宜有以發賈山之一疏也引賈山至言是時文帝即位之二年也考究當時在廷公卿夫豈無人謂在當時豈無修正之人正惟所少者修潔正大之士則亦在帝求之而已歸重求字不然若人豈肯輕於來哉反説有力故賈山曰天子求修正之士夫象犀珠玉之珍生於絶域皆可得而致惟士不可以屈致物可得而求士不可得而求士不可以屈致而况修潔正大之士乎歸在修正二字上彼好修兮餐秋英而不顧好修字見屈原離騷經又夕餐秋菊之落英養正則吉寧舎龜而觀頥易頥卦頥貞吉養正則吉也云云初九舍爾靈龜觀我朶頥求之不以道不至也歸在求字上孟語見子易之䝉曰匪我求童䝉童䝉求我見䝉卦觀䝉一卦則九二剛中之才實當之同上初筮告以剛中也注謂二也二為衆隂之主也何則湯以聘求尹也未聞以尹求湯也孟萬章下萬章問曰人有言伊尹以割烹要湯有諸孟子曰否伊尹耕於有莘之野湯使人以幣聘之囂囂然曰我何以湯之聘幣為哉豈若處畎畆之中由是以樂堯舜之道哉湯三使徃聘之既而􅜖然改曰與我處畎畆之中由是以樂堯舜之道云云武丁以夢求説也未聞以説求武丁書説命上髙宗夢得説使百工營求諸野得諸傳岩云云乃審厥象俾以形旁求于天下説築傳岩之野惟肖爰立作相文王以卜求望也未聞以望求文王也史齊世家吕尚以漁釣干周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔於是周西伯獵果遇太公於渭水之陽載與俱歸立為師曩使有九二剛中之才無六五虚心求士之君反繳應前䝉卦事則尹終於耕説終於築望終於釣也已矣三事並見上三股注夫天下之士不少求之而不得者有矣未有不求而得者用孟子語蓋有之矣必嗜進之士也學論語句法蓋有之矣我未之見也修潔者正大者詎肯爾耶歸重在修正二字上世言項王所用者多亷潔鯁介之士髙帝所用者多頑鈍嗜進之儔陳平傳平曰項王為人恭敬愛人士之亷節好禮者多歸之云云今大王嫚而少禮士之亷節者不來然大王能饒人以爵邑士之頑鈍嗜利無恥者亦多歸漢然大王資侮人不能得廉節之士頋楚有可亂者彼項王骨鯁之人不過數人耳云云故頑鈍嗜進者不肯為項留而亷潔鯁介者亦不願為劉用互換説兩生之不來豈以綿蕞故歟叔孫通傳羣臣飲爭功㧞劍擊柱上患之叔孫通説上曰臣願徴魯諸生與臣弟子共起朝儀云云通徴魯諸生有兩生不肯行云云遂與所徴三十人弟子百餘人為綿蕞野外習之馬上之風未歇陸賈傳賈時時前説詩書帝罵曰乃公居馬上得之安事詩書騎項之習猶存周昌傳昌嘗燕入奏事帝方擁戚姬昌還走帝逐得騎昌項問曰我何如主昌謝曰陛下即桀紂之主也然尤憚昌殽函京洛間彼豈北面耶婁敬傳良曰洛陽非用武之國也闗中左崤函右隴蜀又用與論語全句又石勒云若遇髙祖當北面而事之園綺四先生髙視闊步大非漢廷人物張良傳上欲易太子良曰此難以口舌争也頋上有所不能致者四人皆以上嫚侮士故逃匿山中然上髙此四人令太子請以為客則一助也注園公綺里季夏黄公甪里先生太子一卑詞求之朝商山而暮漢廷同上於是吕后使人卑辭厚禮迎此四人四人至及宴置酒太子侍四人者從太子年皆八十有餘鬚眉皓白云云四人曰陛下輕士臣等義不辱今聞太子恭敬愛士天下莫不延頸為太子死故臣等來則夫髙帝終身不能致之者正以非皮冠之招也孟滕文公下孟子曰昔齊景公田招虞人以旌不至將殺之注虞人守苑囿之吏也招之當以皮冠而以旌故不至也三葉而至文帝自髙祖過文帝來帝豈蔽賢之主哉用蘇東坡上神宗萬言書云文帝豈棄才之主絳灌豈蔽賢之士環視周行惟見蹶張吹簫之夫爾才訥無文之人爾修乎正乎應冒子在庭公卿豈無人申屠嘉傳嘉以材官蹶張注弩以足蹋者曰厥張又周勃傳勃常以吹簫給喪事又勃為人木强敦厚云云其惟少文如此又王陵傳為人少文當時在楚豈無穆生鼂錯傳初楚王好書與魯申公穆生白生俱受詩於浮丘伯云云穆生不嗜酒元王設醴後忘設穆生曰可以逝矣云云在齊豈無轅固轅固齊人也以治詩孝景時為博士云云固老罷歸之時年已九十餘矣在濟南豈無伏生伏生傳生濟南人也孝文時求能治尚書者天下亡有聞伏生治之欲召時伏生年九十餘老不能行於是詔太常使掌故鼂錯往受之白駒皎皎金玉遐心用毛詩全句比士之隠而不出者不肯一到漢廷言上面許多人不肯來亦懲前日嫚罵之辱以為漢家法然爾見前注又趙王傳趙王敖執子婿禮甚卑上箕踞嫚罵之又魏豹傳漢王嫚侮人罵詈諸侯羣臣如奴耳大抵士之修潔者不以進為榮士之正大者常以去為輕應冒子修潔者以退為髙正大者以去為榮緼袍華於佩玉飲水甘於列鼎用古文言其雖窮猶達也求之未必至至之未必留况欲不求得乎應冒子求之猶恐不至而况不求之乎賈山一疏正望文帝之求之也引本文當時修正之士僅一賈生賈誼年十八以能誦詩書屬文稱於郡中河南守吳公聞其秀才召置門下云云纔一啓口絳灌嫉之如仇矣同上每詔令議下諸老先生未能言誼盡為之對云云天子議以誼任公卿之位絳灌之屬盡害之曰洛陽之人年少初學專欲擅權紛亂諸事注絳侯周勃灌嬰也宣室之召帝豈思前日賈山之言也耶同上後歲餘文帝思誼召之至入見上方受釐坐宣室上因感鬼神事而問鬼神之本云云然而求之名常生於不足有則不必求倉公之門不求醫倉公能醫盧人也公輸之門不求匠魯公輸子之巧荆楚不求劒客荆楚多劍客鄒魯不求文學鄒魯尚文學何者其素有也以上四様人皆是本色自有更不須求漢猶有人尚勞當宁側席之求公卿有靦面目矣惟在朝公卿無修正之人所以要求修王之士朝無人焉安得不起師慧之歎見左傳謹論右兩篇辭意俱新更無塵腐氣習論學繩尺巻七
