body:
  text: 論學繩尺巻六宋魏天應編選林子長箋解囘䕶題意格與陳止齋子謂武未盡善論同意武成二三策如何吕祖謙出處孟盡心下孟子曰盡信書則不如無書吾扵武成取二三策而已矣仁人無敵於天下以至仁伐至不仁而何其血之流杵也下注云武成周書篇名武王伐紂歸而記事之書也策竹簡也取其二三策之言其餘不可盡信也程子曰取其奉天伐暴之意反政施仁之法也又講中注立說武王之伐紂出於不得已非為已也為天下也書之武成記武王伐紂之事其辭未盡明白孟子憂武王仁天下之心不白扵後世恐或者因血流漂杵之言以啟其不仁之念所以但謂吾之所取者惟二三策而已其餘者不可盡信也庶幾可以遏天下不仁者之心乎批云議論髙辭㫖婉非孟子不足以明武王之本心非此論不足以發孟子之微言前輩筆力如此後學當三復降歏論曰聖人之心不白於天下謂武王伐紂雖出於不得已不能不起天下之疑是武王之心不能自明白於天下後世之儒者始有言外之意後世儒者謂孟軻也孟子明武王之心釋天下之疑故扵武成之書但取其二三策而不取其血流漂杵之語夫以聖人之心何至於有所不白者且占强説破聖人之心而事變之來不能不䝉人之疑也便解本意謂武王伐紂有此變故不能不受人之疑而聖人適遭其時武王當紂之時不得已焉而為之不得已而為伐紂之舉聖人之心始晦矣晦只是不白之意夫惟其心之晦於此綴上文而書復紀於此謂書之武成篇紀載武王伐紂之事使後之人得借是以自便其無忌憚之為後之人見武王如此必借其殺伐之事以便一已之所欲為而肆無忌憚也儒者憂之而有言焉孟子憂天下不知武王之心意謂寧以吾言病聖人孟子謂寧可使吾取二三策之言而為武王病無寧以聖人之故病天下不可使聖人之心不明白於天下而為天下病此二句是骨此武成二三策之說所由發也舉本出處嗚呼軻其有憂天下後世之心乎孟子憂天下後世不知武王之意故發是語武成二三策如何此孟軻言外之意應冒頭語而亦悲武王之不幸也悲武王不幸而有伐紂之舉應後面人徒見武王聖人也難起而孟軻有盡信書不如無書之言叙出處本文遂謂軻非知武王者且難孟子之説嗟夫解軻豈不知武王者哉便解孟子立言本意七篇之書其論武王詳矣又泛舉孟子七篇多言武王之事故舉武王之言則曰無畏寧爾也孟盡心下武王之伐殷也革車三百兩虎賁三千人王曰無畏寧爾也非敵百姓也又曰非敵百姓也見上其論武王之勇則曰安天下之民也孟梁恵下武王亦一怒而安天下之民又曰救民於水火之中也孟滕文公徯我后后来其無罰云云救民於水火之中取其殘而已矣夫以軻之舉其言也如此而論其勇也又如此總前面孟子舉武王之言武王之心軻知之矣謂武王心事孟子其知之矣然則武成取二三策之言是果何為而發耶以本出處文再難夫亦憂武王仁天下之心不白於後世又解應主意恐㦯者因辭以害意恐天下之人因血流漂杵之言疑武王殺人之惨如此而不知武王為天下之本心是因辭害意也得以啟其不仁之念開其殺伐之心故不得不借此以喻彼也借此取二三策之言以曉諭天下之人謂武王本無心於武事不然聖人豈果不足於中者哉應聖人之心何至於有所不白者昔仲虺作誥舉証甞述湯之慙不釋於伐夏之日書仲虺之誥成湯放桀於南巢惟有慙徳曰予恐来世以台為口實注云仲虺恐湯憂愧不已乃作誥以解䆁其意夫以湯升陑之師湯誓伊尹相湯伐桀升自陑遂與桀戰於鳴條之野是皆應天順人之舉易革卦湯武革命順乎天而應乎人則亦何慙之有謂湯之伐桀亦為天下而又何慙之有湯乃不待人之慙身自為之而身自慙之申本意誠恐吾之心不白於天下而後世或得以貽口實也貽口實注云恐天下後世藉以為口實也是故湯寧自貶而不忍以自隠也自貶只是惟有慙徳之語雖然此雖然二字乃是連綴文意非是自為一叚湯之不自隠而得仲虺陳義以白之湯無慙矣湯有慙徳不能自隠而有仲虺作誥陳大義以明白成湯之心湯則無慙愧矣若武王之心則未白從湯過武王上来而武成之書則實言舉武成書言武王伐紂事孟軻則不容以不辨孟子安得不為武王辨嗚呼孟軻之意其亦仲虺之慮天下後世也歟總上文謂孟子之意與仲虺同仲虺慮湯放桀之為慙孟軻悲武王伐紂之不幸恐天下後世以是藉口是亦悲武王之不幸而無仲虺之誥又有武成之書歟湯之慙以仲虺之言而釋武王之不幸既無仲虺之誥為之釋且有武成之書以實其事孟子安得不悲之而為之辨且商之作威非一日也書泰誓今商王受狎侮五常云云作威殺戮毒痡四海武王嘗觀政矣而商不悛悛改也小同上肆予子發以爾友邦冡君觀政于商惟受罔有悛心嘗師次於河朔矣而商復不悛同上惟戊午王次于河朔云云今商王受力行無度然則武王何拳拳於商之悛也設問悛不悛何足介也荅改謂商王之改過不過不足芥蔕而無辜則籲天也所慮者天下之人皆怨之也書泰誓無辜籲天穢徳彰聞百姓則暴虐也牧誓俾暴虐於百姓以奸宄於商邑四海則毒痡也見上注武王雖無心於商而有心於民也總上文見得武王本心非是自欲伐紂為天下而伐之也是則武王之事誠有大不得已者為天下而伐紂是武王之心不得已士女一綏而我師罔敵武成肆於東征綏厥士女云云受率其旅若林㑹於牧野㒺有敵於我師牧野一誓而前徒倒戈牧誓與受戰於牧野作牧誓又武成云云前徒倒戈攻於後以北武王豈得已哉應上不得已字故歸馬放牛為天下也非為已也説得武王本心出華武成武王伐殷云云乃掩武修文歸馬於山之陽放牛於桃林之野㪚財發粟為天下也非為已也同上㪚鹿䑓之財發鉅橋之粟武王仁民之心遂至此則武王仁天下之心始成遂而武成之書所由作也從武王事過孟子来武成之書雖作而武成之辭則未白也武成萹有血流標杆之言恐天下後世疑其殺戮之惨是其言辭未明白也武成之辭未白申上文是聖人以無心待天下後世謂武王本無心伐紂柰之何天下後世不以無心待聖人也何天下後世反疑武王有心於伐紂戰國之世說孟子時用兵争強以相侵奪此時専事戰争争城以戰則殺人盈城争地以戰則殺人盈野見孟子甚而長平之川陰山之北皆且血流而鬼哭矣戰國時争戰之禍如此當時之人未必不以武王伐紂事為藉口通鑑武安君坑趙卒四十萬於長平想夫孟軻之意以謂聖人之心不白於天下應主意而後世黷武之惨得非武成之書有以啟之乎説主意明白謂後世錯認武成血流漂杵之語詳見後血流漂杆下注云云於是有盡信書不如無書吾於武成取二三策之言叙出處本文軻之所取二三策固未易輕指且含蓄其所取二三策之說而其所不取者則血流漂杵之一語矣不取者在此一句戈集注云武成言武王伐紂紂之前徒倒攻于後以北血流漂杵孟子言此則是不可信者然書本意乃謂商人自相殺非謂武王殺之也孟子之設是言懼後世之惑且長不仁之心耳夫其所取者不必論謂二三策所以不取者則不容以不論謂血流漂杵之説漂杵之說是固為攻其後以北者而設非謂武王也釋武成書中所言又見上集注云云特武成之辭不白耳孟子憂書中所言不明白故力辨應前而孟軻之憂則恐已亥之誤不止於三豕也家語讀史志者言晉師伐秦三豕渡河子夏曰非也己亥耳故嘗謂聖人仁天下之意昭如日星越千載猶一日演聖人仁天下之心本自明白徔古至今如此吾言書之不可信於聖人乎何損為孟子解盡信書不如無書之言而於天下後世則可以遏其不仁之心而其利則博矣發盡主意軻之言在此而意實在彼也孟子之言雖曰不信書而意實在於止天下之不仁論者當因其言而遡其意粘上言意字眼目不可冺其其意而信其言也不可冺沒其本意而徒信其不盡信書之言盖嘗因是而觀之牧野之師書武王云云與受戰於牧野伯夷固嘗非之矣史伯夷傳武王載木主號為文王東伐紂伯夷叔齊叩馬而諫曰父死未葬爰及干戈可謂孝乎以臣弑君可謂仁乎然則伯夷非武王之非也斡歸本意憂天下後世無君者見之誤而非之也伯夷之見與孟子同夫武之樂漢禮樂志武王作武武言以功定天下者也仲尼之在周末又嘗謂其未盡善矣語八佾謂武盡美矣未盡善也然仲尼非謂武王之未盡善也斡歸下意憂天下後世用武者失之黷而未善之也孔子之見亦與孟子同吾亦曰孟子言書不可盡信非不取武王也斡上歸下意憂天下後世殺人者流於惨而不取也以前二人證孟子之言為天下後世不仁者設伯夷也孔孟也是或一道也總工三脚文有法吾於孟子夫何議為孟子解歸重在孟子上則意不偏而亦悲武王之不幸而生於商之末也為武王解幸應冒頭不意謹論囘䕶題意格與吕東萊武成二三策論同意子謂武未盡善陳傅良出處語八佾子謂韶盡美矣又盡善也謂武盡美矣未盡善也孔曰武武王樂也以征伐取天下故未盡善立說武王之伐紂不得已焉而冒為之而其不足之心所在形見而不顧天下之議必其身後之名有不暇計而後為之也然則武王之樂為未盡善固武王之不幸有夫子焉而知其本心乃武王之幸也巽齋歐陽守道批前軰作文多從大處起議論如此萹更不論樂只從未盡善上説武王心事見得聖人大公至正無一毫欺隠於人而所謂未盡善者亦非真可愧之事文字感慨既能為武代辭說又自為武王惜之論曰聖人之心謂武王之心苟有所不足於中者無隠也不足字便見其未盡善意謂武王遭時之窮不得已而為伐紂之事本心雖有所不足而不敢自隠故形之於樂而未盡善以聖人之心何至於有所不足者且占強説破聖人之心接全與前篇合而事變之來不能盡如意也謂紂之變事變之来不能以盡如吾意申上文而吾適遭其所窮謂武王適遇紂之時不得已焉而冒為之不得已而為伐紂之舉聖人之心始病矣出於不得已必以為病病便是不足了夫惟其病於此者粘上病字格與前萹一同而天下之大無足以解吾之戚然愧然之意以武王氣象見不足之意盖將所在乎見之而不能以自禁見之於樂雖未盡善亦不能以自禁止見之而不能以自禁申上文止齋文法例如此疊句轉而又何暇乎文之以為欺雖未盡善見之於樂亦無隠何暇文飾以欺夫人嗚呼兹其為盛徳之事也惟其不以未盡善而不自隠所以為盛徳少有諱晦則非徳之盛事武王之武所以為未盡善更須舉全題方為盡善而吾夫子所以深察其心也深察其心字見子謂意與結尾相應大凡人之不幸而犯不韙之名者其辭氣容色必有所諱晦者也舉凡人之不能自隠乃所以形出武王之無隠韙音偉釋是也左犯五不韙於其辭氣容色有所諱晦疊句轉則君子必以為犯是不韙也必其本心為之而非有所隠詘由其外可以觀其中惟其無諱晦方見得是無心若是有諱晦便是有心了詘與屈同禮記不充詘於冨貴何者喚起歸本意吾心果有所詘粘上詘字轉則亦何畏乎天下後世之共知也若有所詘則不必隠古之聖人暗説武王所自見者吾心但知在我而已而非所恤於天下後世之辨吾與否何暇顧他人之議辨吾者知我也否者不知我也知我固不恤不知我亦不恤故雖有負俗之累而蒙人之疑應有不足之事心亦無隠俗漢武帝詔士或有負之累而立功名亦以為吾取之而不辭亦只得自受鳴呼嗟歎兹武王之武也武是武王之樂名所以見武王之心武王以征伐取天下故作武樂以象其徳而亦足以悲武王之不遇也發主意固矣固矣猶固然也文王之宜王也文王宜王而不王者也宜王不王並去聲固吕東莱文王論云而天下亦曰文王宜王也夫文王宜王也而文王之心則以為奚王也從文王說見得武王之事有不得已者然文王能逃諸其身而不能逃諸其子語泰伯三分天下有其二以服事殷周之徳其可謂至徳也已矣武王伐紂能不興周而不能保商之不亾周以武王興商以紂而亡能止汝墳之怨詩汝墳文王之化行乎汝墳之國婦人能閔其君子猶免之以正也而不能遏孟津之集史記武王東觀兵至於孟津諸侯不期而㑹者八百王此叚文法本祖東坡韓文公廟碑亦與東莱文論畧同則夫武王之事誠有所大不得已者事勢如此武王不容不伐紂發主意天下之美名且開説豈惟夫人樂得之聖人亦樂得之誰不欲得盡善之名武王亦何為安於居天下之謗又設難而使夫後之人得借以自便其無忌憚之為者語意與前篇冒頭語合武王而安於居天下之謗因上文轉歸正則必其身後之名有所不忍計而後為之而非其所欲若武王好名則不肯受人之謗惟其安然為之所以見本心不好名轉此數語是機盖使吾身獲㢘退之名而斯民被不可一朝居之禍若武王退避而不伐紂則天下必被紂之禍慘矣則是一人病天下也此是武王之本心武王寧以天下之故病一人寧可伐紂而救天下以不美之名歸之我無寧以一人之故病天下不可自得美名而為天下病則牧野之師豈必待伯夷非之而後知見前萹伯夷叩馬而諫注雖武王固自非之而不得不為之武王本心是如此議論出人意表吁武王之勢極矣應冒頭適遭其所窮象成之樂無亦為周之王天下而作者邪入武字來干記樂記子曰夫樂者象成者也總而山立武王之事也以周之王天下而至於作象成之樂申上文而武王之志尤怛然甚矣怛然驚動之意也於此乎有不足之意焉應主意固非武王之耻亦非武王之謙也既不以為耻又不以為謙見得武王心事之無隐武王之心猶湯之心也引證切甚欠此事不得湯之慙見於言書仲虺之誥云云詳見前萹注而武王之未盡善見於樂本題武樂聖人豈固以聲色欺人者應冒頭文之以為欺意亦應原題盖其胷中之藏與天地並見得聖人之心廣大處固不肯以其心之知而忌夫人之知也武王既自知其非豈忌他人知己之非此是無隠處後世或有察焉正説應舉題深察其心字盖將緣是而得吾之㣲知得我之伐紂出於不得已而吾亦庻乎其有辭於天下則我亦可以辭其未盡善之名後世而不吾察反説察字不知吾之心出於不得已則将叢謗於吾身吾無憾焉爾叢者聚也是聚天下之謗於一身皆議吾之未盡善吾亦無恨嗚呼世之察不察不足道總上文两脚而武王之心則見矣應破題無隠字魯昭公之為人皆知其非禮語述而陳司敗問昭公知禮乎孔子曰知禮則黨君之責其過也無疑同上孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎故夫陳司之有言也見上注夫子亦安受之曰邱也幸苟有過人必知之同上出處下文云云夫以過聞天下而夫子以幸言之申上文則亦寧有所避亦是無隠意而或者後世必有知吾言之非黨者也知夫子之非黨則知武王之未盡善然則武王之樂其未盡善也固武王之不幸應前不遇意而周衰焉有夫子焉知之此是見察於後世處又繳出題子謂字乃武王之幸也此幸字與夫子邱也幸字亦相應謹論前篇謂聖人之心不白於天下有孟子知之此篇聖人之心無隠於天下有孔子知之是同一意發明題意格仁聖博施濟衆馮椅出處語雍也子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸以朱文公集注云仁以理言通乎上下聖地言則造其極之名也乎者疑而未定之辭病心有所不足也言此何止於仁必也聖人能之乎則雖堯舜之聖其心猶有所不足於此以是求仁愈難而愈逺矣立說本晦菴之説謂施至於博濟及乎衆此固仁道之極致仁者之至願然而有次第有分量也盡此道者必聖人而後能之然聖如堯舜猶以為病則其功用之大不容以易致也此夫子所以明仁聖精㣲之辨歟又朱文公云博施者豈非聖人之所欲然必五十乃衣帛七十乃食肉聖人之心非不欲少者亦衣帛食肉也顧其養有所不贍耳此病其施之不博也濟衆者豈非聖人之所欲然治不過九州聖人非不欲四海之外亦兼濟也顧其治有所不及爾此病其濟之不衆也批云文勢圓轉節節相應深得論體論曰事有功用之大者不容以易致也謂施而至於博濟而及乎衆非止為仁雖聖人猶難之則亦求其所以致之之道而已矣貫上致字夫推一已之所為指施與濟字以被天下之至廣指博與衆字此豈非仁道之極致而行仁者之至願歟喝出仁字然而轉固有次苐也固有分量也不容易致意與講中相應而奚可以仁定論哉謂何事於仁等而上之必有天徳之聖人能合天下以為一體謂必也聖乎而動化之妙運用之神有不待推行之勞而自合者能博施濟衆則是聖人地位至此而後功用之大始可言矣應破題語然聖人尚竊難之而曽謂可以易致也謂堯舜其猶病諸應破題嗚呼此仁聖精㣲之辨辨仁聖二字不同固有待於講明而必折衷於夫子歟𠂻去聲引本文仁聖博施濟衆請即夫子之言而申之謂仁聖别乎疑辭問起别言其異也堯舜性之所以為聖而仁覆之功用後世無及也孟離婁上堯舜之道不以仁政不能平治天下云云繼之以不忍人之政而仁覆天下矣然則有同歟疑辭曰必也曰何事本文夫子奚為截然不肯少紊紊亂也而真若仁之别於聖者是可不深求其故耶謂夫子言仁與聖不同從原起辨難至此盖嘗泛觀之天下解上意舟足以航川而施之陸則不行莊天運夫水行莫如用舟陸行莫如用車以舟可行於水也而求推之於陸則不行葛足以當暑而施之寒則無補史李斯傳堯冬日鹿裘夏日葛衣則所施者有病於博謂一物不可两用見得博施之難大明普照而蔀屋弗覩易豐卦豐其蔀日中見斗注蔀覆曖鄣光明之物斯豐在蔀幽而無覩者也又豐其屋蔀其家陽和發育而寒谷或凝劉向别録鄒子在燕燕有黍谷地美而寒不生五谷鄒子居之吹律而温氣至則所濟猶有慊於衆謂日月天地之大且有不足處見得濟衆之難然則施之博濟之衆總上文此固仁道之極致而皇皇之四達者也應冒極致字皇莊知北逰四達皇固仁者之至願而所欲之不存者也應冒至願字君孟盡心廣土衆民子欲之所樂不存焉又見本題朱文公注舉而謂之仁夫豈不可喝出仁宇然而固有次第也固有分量也應冒頭小講两句則豈容於不講耶施之博濟之衆既未易盡夫子之言不容不講明今夫自一念之愛推而達之一身而支體髪膚之無遺育由心而身則身為大自一身之愛推而達之一家而父子兄弟之無異和家大於身又自家而國自國而天下國又大於家天下大於國先後之不同科也厚薄之不同品也其次第固如此謂有次第而豈易致耶以上應次第二字發出不容易致之意豈曰仁而已耶非止於為仁夫苟非泊然無意於斯世者則皆知所以求仁也自此以下說分量意而愛天下利生民之深心固有倫類之不通而不能推者矣謂施難至於博濟難至於衆或勉强而行之或利而行之中庸固有推之而不能逺逺之而不能盡者矣見得施難至於博濟難至於衆遲速不論也乆近不論也包上意謂有分量其分量如此又豈易致耶以上應分量二字發出不容易致意豈曰仁而已耶非止為仁是故非聖人不足以盡仁而苟未至於聰明睿知而達天徳語見中庸應冒頭語則所施之博所濟之衆誠不敢知也未到聖人地位則難盡這个道理惟夫與造化同功與萬物同體其徳盛其化神此是聖人地位天程子曰仁者以地萬物為一體有所不為為之而行有所不動動之而克謂聖人方能博施濟衆所謂保合太和之功用不於此觀而奚觀哉謂聖人可以盡博施濟衆之道易乾卦保合大和嗚呼此固聖人事也喝出聖字歸在聖人身上而聖人毎難之何也又難一難應聖人尚竊難之天地之大也人猶有所憾用中庸語不以天地之不足形聖人之足不小了聖人而匹夫匹婦有不與被堯舜之澤者吾猶有愧焉故也舉孟子語地與去聲謂天且有不足處聖人雖有不足又何慊且堯舜之性之較之湯武之身之猶有間也間去聲語見孟子盡心上文公注云堯舜天性渾全不假修習湯武修身體道以復其性而無告之不虐困窮之不廢書大禹謨嘉孺子而哀婦人莊天地堯曰吾不敖無告不廢窮民嘉孺子而哀婦人甚者有苖之弗率書大禹謨帝曰咨禹惟時有苖弗率汝徂征盖終堯舜之世不能相㤀於大順同上三旬苖民逆命而猶有待於禹見上注論至於此則博施濟衆豈易致耶應冒易致字以堯舜猶病之心觀之出處本文豈亦曰仁而已耶謂何事於仁亦應前語嗟夫别下意三代而下非無志於仁者也應前非泊然無意於斯世者固有殫所利以為恩捐所與以為恵而不能周普者矣殫盡也捐棄也此皆小恩小恵不足謂之博施濟衆雖有賢君僅致小康僅止也康安也而求其如三代亦難矣夏商周應前三代字况堯舜之敢望照應出處盖非不足於仁也而不足於聖也發明出處仁聖二字結雖然有孔門之講學則堯舜可為也應冒有待講明意歸孔子之言講學之不明而推行之或紊尚可語仁乎哉反説行講學推皆應前語夫子之示人曰能近取譬可謂仁之方也已出處下文云夫仁者已欲立而立人已欲達而達人云云嗚呼此善推其所為孟子所以有取古之人孟梁恵王上古之人所以大過人者無他善推其所為而已矣而盡已之忠推已之恕語里仁子曰參乎吾道一以貫之曽子曰唯云云夫子之道忠恕而已矣南軒曰盡已之謂忠推已之謂恕夫子他日以一貫之㫖啟子貢者盖深警乎此也語靈公子曰賜也女以予為多學而識之者與對曰然非與曰非也予一以貫之然則後之法堯舜者夫亦自吾推之而已矣應冒推字亦應破題致之之道而已矣語意方圓轉也謹論可把乙集蔡岸博施濟衆何如論參看又見前篇批發明題意格與馮厚齋仁聖博施濟衆論同意堯舜行道致孝陳子順出處前漢故堯兢兢日行其道而舜業業日致其孝善積而名顯徳彰而身尊立說為君之道事親之孝此理最大不可得而盡堯舜於此亦惟兢兢以行其道業業以致其孝而已以此見天下有不容盡之理聖人有不容已之心批云說有本祖文有法度說得極透徹老筆也論曰天下有實不容盡之理謂道與孝難盡聖人有誠不容已之心聖人指堯舜不容已指行與致字夫盡君道共子職盡君道是道共子職是孝又孟欲為君盡君道共為子職而已矣至於聖人足矣且説堯舜可以盡而猶拳拳不容已者説行與致意或謂聖人之謙非也説破非此意天下之理惟人倫為不容盡為君之道事親之孝非不容盡也斡一轉不可得而盡也見得道與孝之大使為君而仁道也為子而敬孝也仁敬两字眼目臣大學為人君止於仁為人止於敬云云如是而足以為道為孝應接題足字則聖人夫何謙應前謙字惟夫歸正仁之不能以直遂也道難盡敬之不能以盡孚也孝難盡則聖人之心始有不能以自慰者含不容已意以聖人之行道致孝而有一毫之未能自厭其意喝出行致字厭足也是其本然之職分謂行與致乃吾分内事猶有一毫之未盡少有未盡處顧可安乎豈可止此而不求以行之致之此其汲汲皇皇雖終身不得寧也狀兢兢業業意董仲舒曰堯兢兢日行其道舜業業日致其孝舉本題處兢兢畏也業業勤也解四字意聖人生知安行之性亦何用如是哉生知安行字出中庸設問盖天下有實不容盡之理荅應破不容盡語不極其至吾未見其有可止之地耳應破不容已意堯舜行道致孝信矣哉人倫之難盡也引題下意或曰設問起與前萹同格孟子曰規矩方圓之至也聖人人倫之至也舉孟離婁上語使堯而不能盡道舜而不能盡孝則古今天下當無能盡之人矣難一難使天下而有不容盡之理則人之大倫將坐視其湮斁而莫之省憂也從原起難至此注用湮没也斁壊也莫之省憂漢書語曰解辨則辨矣而見則未實也罵倒以上意彼果以為天下之理可得而盡乎疑辭意應主談何容易也謂此理不容盡孔子曰博施濟衆堯舜其猶病諸以下説行道之難注用雍也語見前篇題博施仁也君道也解出道字天下之人飢者欲食渴者欲飲勞疲者欲息生欲養而死欲厚行文有法鰥寡孤獨瘖聾跛躃之人皆欲不失其職連用許多欲字躃瘖不能言也聾不能聽也跛不能行也加之蠻夷小人盜賊奸宄皆欲其為君子此等不足道之人亦欲為君子與之並生天地之間幾多等色人俱要得所難耶易耶冷下之以上説道難盡孔子曰所求乎子以事父未能也以下説致孝之難用中庸語人子之於親親父母也温凊之候記曲禮凡為人子者冬温而夏凊清去聲甘㫖之羞養父母當奉甘㫖之食承顔順色之養語為政子夏問孝子曰色難注云承順父母之顔色為難雖竭誠盡力不敢以為一一中節語事父母能竭其力而又愛望其親欲使之為聖賢為君子非惟養體又欲養志此其所以為難雖聖人不敢自必也以上説孝之難盡天地之大也人猶有憾也用中庸語亦學前篇格致比以天地之不足聖人之不足若農力穡是穮是蓘是灌是溉用左傳語穮音標蓘音衮耕禾曰穮壅苗曰蓘灌音貫澆潑也溉音慨浸潤也工力百倍而地有肥磽磽瘠薄也上語見孟告子時有豐歉五榖皆熟曰豐不熟曰歉天下之理固有不容盡者耳應主意不容盡則其不容已也亦宜應破語聖人惟真見其職分之不容不盡也申上文而何謙之有應冒謙字繳原題意吾讀堯典自欽天而下授舜以前皆行道之事也堯典欽若昊天云云嬪于虞讀孟子史記之書自徃于田耕于歴階廪之順有庳之封皆致孝之事也書禹謨帝初于厯山往于田又萬章舜往于田又萬章曰父母使舜全廩捐階瞽叟焚廩又象至不仁封之有庳音被地名又史記本記舜耕厯山魚雷澤其行也如百川之東流詠行字其致也如良賈之聚貨詠致字自後世苟以為安者處之不啻足矣苟安者便自足了更不肯兢兢業業而聖人則以為未也惟堯則兢兢日行其道惟舜則業業日致其孝不虐不廢吾力能行之自此以下謂堯行道困書大禹謨不虐無告不廢窮而不能使天下之無窮困見上注授時平秩吾力能行之書堯典敬授人時云云平秩東作而不能使天無九年之水漢食貨志堯禹有九年之水能吁能咈能明刑弼教堯典帝曰吁咈哉又臯陶明於五刑以弼五教而不能使象恭方命猾夏姦宄之徒皆為君子堯典象恭滔天又僉曰於鯀哉帝曰吁咈哉方命圯族又舜典蠻夷猾夏㓂賊姦宄以上學東坡韓昌黎廟碑文則堯之心其能遂已於行乎且疑辭繳上叚其此堯所以日兢兢行道齋慄而見猶不足以解憂自此以下説舜致孝亦書大禹謨祗載見瞽瞍䕫䕫齋慄瞽瞍允若又孟萬章惟順於父母可以解憂終身之慕則一日不容於遽已同上大孝終身慕父母五十而慕者予於大舜見之矣既克諧矣既烝烝矣而但不至於姦焉堯典岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格奸聖人之望其親也豈但欲其不至於姦而已哉欲其親為聖賢為君子君堯而堯聖以君道事堯而堯為聖人臣禹而禹聖以臣道使禹而禹為聖人立已而已聖盡已之道而已亦為聖人而吾父不得為聖人也舜之望其親如此其厚則舜之孝猶為未能盡致也此舜所以業業日致其孝覆載之間有一物之不得其理一人之不協於極總堯行道一叚而吾之親不得為慈父為聖賢皆吾職分之慊然總舜致孝一叚則聖人之心得已乎不得已乎照主意不容已字此堯之所以兢兢也此舜之所以業業也說出兢兢業業四字此天下之理所以為不容盡也應不容盡意於其所不容盡之事而求盡焉應不容已意則堯為盡道孟欲為君盡君道欲為臣盡臣道二者皆法堯舜而已矣舜為絶孝矣揚君子絶徳舜以孝繳盡意是故又演餘意兢兢而行道業業而致孝堯舜之始事也舉出處本文善積而名顯徳章而身尊堯舜之終事也再舉出處下文欲引此為結尾聖人終始之事董子知之矣總始終两字歸在董仲舒所言上先揚之雖然是猶未免乎計效之論也又抑之結上生下與後靣相應謙固不足以盡聖人應冒謙字而名顯身尊猶非聖人之所計也堯舜本心不在此聖人所知者盡其心而已堯舜本心但欲行道致孝極其所事亦豈止於尊顯而已哉説得堯舜之心廣大董子之言猶未免乎計效之論也應前語畧責仲舒尊顯之說或曰設辭是為武帝設也謂董仲舒以是語告武帝果為武帝設則亦不足辨也已又為仲舒出脱學者姑反而求諸聖人轉歸堯舜身上謹論前篇謂博施濟衆其道甚大堯舜猶以為病此篇謂行道致孝其理不容盡堯舜亦以為不容已两篇語意一同順題發明格此篇文法與君子以仁禮存心論相似仲尼不為已甚陳傅良出處孟子離婁下孟子曰仲尼不為已甚者注云已猶太也立說聖人之道大故天下望聖人也過高若使聖人以高自處不能俯而就之則是此身孤立於天下便成已甚聖人於此只得少自屈抑非以狥夫人也盖將以行道也前軰云孔子教人嘗俯就不俯就則門人不親正用此意批云止齋之論論之祖也此篇又為止齋諸論之冠文圎活而味悠長讀之終日不厭也論曰聖人之道欲行於天下則亦不可孤而立也謂孔子不為太甚之事以拒絶天下之人盖天下之望聖人也過髙聖人之道大故望之過高則聖人之於天下亦難乎責之以詳聖人欲行道於天下故不敢責之以詳盡夫其望我過髙也而吾又詳責之曰必如是而後可與行道止齋文法多如此衮纒若如此則是太甚了使天下而皆如聖人之意則亦奚不可者更開一開則地步寛展惟聖人之不能盡如意也轉説故其勢將必至於拒絶而人心亦重自疑畏矣若聖人以道自高則必至拒絶天下之人而天下之人亦重自疑畏而不敢親近於聖人矣嚴拒絶之法以離疑畏之心而後聖人始孤収破題孤字嗚呼吾未見夫孤立於天下而後可以行道於斯世者也就孤字反結此無意於天下恝然以自潔者之為而謂夫子為之乎生此一句意為後面夷齊沮溺之徒張本故孟子曰仲尼不為已甚夫子之道所以至今不廢也此一句自是一叚意且天下均若人也而聖人獨有以異而舉世無與為侣若聖人求異於人使天下之人不與之為伴侣則是孤立了此固天下之所望而震焉者也下得震字響只是換易冒頭疑畏字意幸而在上為堯舜為湯武反形夫子不如堯舜湯武之達以其震天下者而用於天下其事便其理宜則亦可以徑行而無忌勇為而不屈若有數聖人之位則凡所施為皆可以盡如吾意不幸而在下無堯舜湯武之位正説夫子之窮以其震天下者而用於天下其事逆其理反既無數聖人之位則凡所施為必不盡如吾意必委曲為之吾猶憂聖人之道大天地不足以為容史記孔子丗家陳蔡圍孔子於野云云子貢曰夫子之道至大也故天下莫能容夫子盍少貶焉而終其身窮然而無所入矣說得似夫子氣象若是而猶甚焉許多逺来要説个甚字吾不知夫聖人之以道自累如此也若夫子凡事太甚使人不得親近非以道累其身耶夫道之不行也雖是起處亦與上意接續未必皆天下之過也或有道焉而不善用之也歸在聖人身上盖立已於峻則其迹固不可犯峻字是應冒頭過高字此一句説自己而强人於太難者中才皆有所弗堪太難字是應冒頭詳責字此一句説人而句法短長不齊此論體也為是不可犯之形以求弗堪之情此是止齋文法則其道始不可行於天下應冒頭吾未見夫孤立於天下而可以行道於斯世意文勢斬截昔者子㳺謂曾子曰吾友張也為難能也然而未仁見論語子張篇曽子曰堂堂乎張也難與並為仁矣同上用事不著迹可以為法夫以其堂堂也疑似足以拒人疑似字下得好如語子張篇我之不賢與人將拒我之何其拒人也則人雖有樂為善之心而不敢與之並立反形孤字使人有為善之心而不敢與我並立則凡沮人之善心者皆子張之為也再回來説數句有餘味彼子張一賢者爾安從子張上過夫子來子㳺曽子皆其深交而猶以其堂堂而病其難見上注况夫以夫子之聖而甚為之賢聖是闗合字吾見天下之病夫子者多於病子張者矣一句収取一叚意都在夫子身上是則夫子之所憂也謂夫子本意如此他日子張之論交曰君子尊賢而容衆嘉善而矜不能子張萹子夏之門人問交於子張云云子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜不能吁是非子張之言也其諸夫子之憂之而告之以是本是子張自說今曰夫子告之是將無作有善作文處而廣其介然之窒也與介然字用孟子山徑之蹊問介然用之而成路介音戞倐然之傾也窒塞也其曰異乎吾所聞盖聞諸夫子而已聞字是過脉吾於此是以得聖人天地之為量也量字過下叚有情故其言曰鳥獸不可與同羣吾非斯人之徒與而誰與語㣲子長沮桀溺耦而耕云云夫子憮然曰云云與巽齋批云究竟此篇只用子張與鳥獸不可同羣二事翻作許多議論聖人之憂固至此也哉照前靣憂字且君子誠不可孤而立也照主意其出也或為之主或為之僚出而有主有僚友則不孤其處也又必或為之徒䖏而有徒黨則不孤後以主僚徒三字立三節與相應一出一處未甞一日離夫人也如此則不孤不可一日而無人而夫人未必皆明君此是主未必皆賢卿大夫此是僚未必皆才子弟此是徒必用三未字好吾則曰是皆不足與行道惟逺之不暇惟疾讎之不足惟恐其影響之不幽如此則成已甚了則人既不可與居吾有羣鳥獸而已矣却是孤立了夫舉斯人而不足與居至於鳥獸焉是羣應前靣鳥獸同羣語是聖人之待人類薄於待鳥獸也聖人本心必不如此嗚呼又烏有身為仁義禮樂之主而可以待人類薄於禽獸也哉轉歸正意說得十分痛快是故夫子之於晚周再實一實苟可以仕不必皆明君也可以仕則有主矣以下三句用三箇苟可以字見得夫子不為已甚苟可以交不必皆賢卿大夫也可以交則有僚矣苟可以教不必皆才子弟也可以教則有徒耳以上用仕交教三字與主僚友三字相應前靣説三箇未必此却説三箇不必皆是相應處聖人之道非固如此徇乎人也不如是則道之不行於天下此是夫子本意其過不專於人而吾亦與有愧焉故也應原題下道之不行未必皆天下之過有道而不善用之意夫惟其如是也再申上文故雖春秋之時之人猶能樂其實而用其情愛其恕而安為之黨如此則不孤立了衛靈魯哀之君自㤀其愚不肖而願有所請如衛靈公問陳於孔子魯哀公問政於孔子之類由求數子非不急於仕者子路名由冉有名求陳蔡之厄極矣寧忍於飢寒流落而不忍去史記陳蔡圍孔子於野云云乃召子路而問曰云云嗚呼此夷齊沮溺段干木泄柳之徒能致者哉此數子却孤者伯夷叔齊長沮桀溺段干木泄栁皆隠一句結上生下結尾此孟子所以姑舎是而願學夫子也孟子公孫丑上乃所願則學孔子也仲子之兄不義而受齊禄猶盗跖也孟子文公下仲子所居之室伯夷之所築歟抑亦盗跖之所築歟云云仲子齊之世家也兄戴蓋禄萬鐘以兄之禄為不義之禄而不居也戰國之諸侯其取之民猶禦也孟子萬章下萬章曰今有禦人於國門之外曰云云曰今之諸侯取之於民猶禦也集註云禦止也止人而殺之且奪其貨也猶盗跖也不可以居猶禦也不可以受此等皆皆難處孟子則曰吾猶居之猶受之見得孟子亦不肯絶人不以仲子為亷孟子曰云云仲子惡能亷且戒萬章勿郤也見上萬章下出處上文萬章問曰敢問交際何心也孟子曰恭也云云以是為不恭故不郤也其從容氣象宛然孔氏家法也謂孟子氣象似孔子噫甚矣軻之似夫子也甚矣軻之似夫子也两句詠結謹論近日太學公魁君子之言之守論全倣此篇文法學者不可不熟讀順題發明格此篇學止齋仲尼不為已甚論文法君子以仁禮存心曽晞顔出處孟離婁上君子所以異於人者以其存心也君子以仁存心以禮存心仁者愛人有禮者敬人愛人者人恒愛之敬人者人恒敬之有人於此其待我以横逆則君子必自反也我必不仁也必無禮也此物奚宜至哉其自反而仁矣自反而有禮矣其横逆由是也君子必自反也云云立說謂以仁存心而能愛人以禮存心而能敬人者天也彼横逆之来拂乎吾心者人也彼固拂之吾固存之人固不得以累吾天也批云文簡潔而氣和平逶迤曲折頗得止齊法度論曰君子之所以自處者自處是存心也天而已矣天字指仁禮學方岳聖人道出乎一論破題聖人之為斯世也天而已矣夫苟天而已矣學止齋文法則人固無與也以天字為經人字為緯人字是指出處待我以横逆意人無與於天而紛紛者若將累之指其横逆由是也意天不可累也指愛人者人恒愛之敬人者人恒敬之可累則非天也指出處我必不仁也必無禮也君子人歟引題主愛人者天也仁者愛人敬人者亦天也有禮者敬人天者我固有之也學孟子語我固有之亦是學止齋文法則人固不能使之無愛無敬也愛人者人恒愛之敬人者人恒敬之吾愛人敬人而人不吾愛吾敬吾心之愛敬自若也指横逆之来君子必自反意此之謂天也説得主意天字分明是故仁也禮也出題字君子之存乎吾心者也叙本文存乎吾心者天也應前天字拂乎吾心者人也應前人字指横逆者彼固拂之吾固存之人固不得以累吾天也應接題吾之所以自處者天而已矣應破題主意文勢圓轉故孟子曰君子以仁禮存心請以天論不走了主意天字嘗謂君子之所能者天也而其所不能者人也用蘓東坡韓文公廟碑文云云人之不知天者其心與君子異申上文天字一語之慢貽憾終身睚眦之報孜孜然惟恐不及睚眦釋云瞋目貎上漢杜欽傳報睚眦之怨顔注音厓舉眼也下即眥字謂目匡也言舉目相忤者即報之也又司馬遷傳睚眦之辭顔注舉目眥也上音厓下音才賜反又上五解反下士解反問之則曰惡聲必反賢者不免孟子公孫丑北宫黝之養勇也無嚴諸侯惡聲至必反之以徳報怨聖人非之語憲問或曰以徳報怨何如子曰何以報徳以直報怨以徳報徳勢迫情動凡其扞格齟齬者責固不專在我也指待我以横逆意格音畫扞格齟齬言不相入也嗟呼不以薄待人則望其待已也甚厚指愛人者人恒愛之敬人者人恒敬之至於遭無故之變人情皆有所不堪指待我以横逆者觖甚厚之望而乘之以不堪之情則其所以相與屑屑者無怪也以上文學陳止齋仲尼不為已甚論皆立已於峻則其迹固不可犯而强人於太難者中才有所不堪為是不可犯之形而求當乎弗堪之情吁是非之相形彼此之相厲盖亦深於責人而不知天之在我者固已淺矣應主意天人二字君子不然也惟天之天可以明君子之天何以言之大哉乾元萬物資始天之仁也見易乾卦品物流形各正性命禮斯行焉同上而宇宙之間參差不齊忿怨嫚䙝参差不齊用伊川語凡以帝力為何有者天亦聽之而已此横逆意天之待人猶君子之待人莊子帝力於我何有哉百物之生四時之行天之天盖自如也天之天與君子之天則一語天何言哉四時行焉百物生焉天何言哉君子之天亦天之天也過處有法且惻隠之心仁之端也孟子君子以惻隠自處而刻薄之私一毫不敢萌焉懼有以戕其天也學蘓文存演君子以仁心意辭遜之心禮之端也孟子君子以辭遜自處而慢傲之習頃刻不敢生焉懼有以䙝其天也學蘓文上田况書其名曰逆天其名曰䙝天演君子以禮存心意仁於人無不愛禮於人無不敬此是君子之責使君子而不愛人不敬人非也反說然愛人者人恒愛之敬人者人恒敬之叙本文明白君子而愛人敬人人亦宜愛敬君子指愛人者人恒愛之敬人者人恒敬之而靡靡紛紛猶有撞搪呌號忿觸而怒抗者豈君子有以致之耶說待我以横逆者用止齋文君子無以致之而其至於此也則安得不究夫人應前人字自君子惟以天處而君子之於斯也有哀矜而無忿懥有順受而無捍拒有雍容暇豫而無躁切急迫形容以仁禮存心意被意外之患而居之以寛挟可以傲人之資而退然若不敢較者形容其待我以横逆則君子必自反也何也設問盖其涵養之熟持循之定所以自處者天也應主意天字我之於人無不愛盡我之仁而已君子以仁存心如此人不我愛我不知也指其横逆由是也君子必自反也我於人無不敬盡我之禮而已君子以禮存心如此人不我敬我不知也指横逆由是也君子必自反意其意亦曰自然者謂之天此是仁禮使然者非天也此是人之横逆者出於我者謂之天出扵人者非天也説得透徹仁義根於吾心我固有之也非由外鑠我也孟子今人不我愛我敬我亦不愛不敬以下皆反説是我之愛敬出於人而非出於已出於使然而非出於自然仁禮皆吾心外物矣其得謂之天乎大有議論周公之於管蔡書蔡仲之命惟周公位冡宰正百工羣叔流言乃致辟管叔扵商囚蔡叔於郭鄰夫子之於叔孫武叔語子張叔孫武叔毀仲尼子貢曰無以為也仲尼不可毁也子路之於伯寮皆是心也語憲問公伯寮愬子路於季孫子服景伯以告曰云云子曰道之将行也與命也道之将廢也與命也公伯寮其如命何此君子待横逆如古今論天徳者必曰舜莊子舜天徳而出寕舜何人也温恭允塞人也孟舜何人也予何人也又舜典温㳟允塞其仁禮非有所愧慢虐小醜崛强弗率謂三苗有書大禹謨惟時苗弗率赫然以兵殱之夫豈不可殱戮盡也舞干羽敷文徳舜之心泊如也同上帝乃誕敷文徳舞干羽於两階七旬有苗格君子之待横逆如舜之待夷狄則天矣歸主意天字嗟夫人同此心心同此天不走了天字天非君子之所私有也人自不能有之乃悻悻焉與君子角悻悻見孟子公孫丑下予豈若是小丈夫然哉諫於其君而不受則怒悻悻然見於其靣悻形頂反怒意也暴焉而莫之怒慢焉而莫之抗未必不謂君子之為吾屈也開抑孰知暴之慢之而未嘗怒且抗者固所以見君子之天也用止齋文法孟子之言吾於此騐之抑孟子亦能蹈其言者歟歸孟子身上臧倉之毁大非常情之所堪而行使止尼一歸之天平日仁禮之心不少易也孟梁恵王下魯平公將出嬖人有臧倉者請曰他日君出則必命先匹有司所之云云公曰將見孟子曰何哉君所為輕身以夫者以為賢乎禮義由賢者出而孟子之後䘮踰前䘮為君無見焉公曰諾他日樂正子見孟子曰克告於君君来見也嬖人有臧倉者沮君君是以不果來也曰行或臧使之止或尼之行止非人所能也吾之不遇魯侯天也氏之子焉能使予不遇哉吁以孟子之天而所遇之人猶有臧氏子焉世變亦可歎矣用天人字與前靣相應謹論亦可與止齋樂天者保天下論參看考究題意格與漢南北軍相統論同格唐兵制節目如何王文貫出處唐兵制唐立府兵之制頗有足稱焉盖古者兵法起於井田自周衰王制壊而不復至於府兵始一寓之於農其居處教養蓄材待事動作休息皆有節目雖不能盡合古法盖得其大意焉此髙祖太宗之所以盛也立說昔者先王寓兵於民未嘗厲民以為兵唐之兵制大抵以體民之心而為寓兵之法初非厲民以為兵節目之詳無非以仁愛體恤之意黙行乎其間正有合扵先王之意也批云學飽文贍攷究厯代寓兵於民之制甚精宻論曰以體民之心而為寓兵之法謂唐之兵制寓兵於民未嘗厲民以為兵君子有取其立法之詳且盡也取其節目之詳盡者以其有仁愛之心也夫昔者先王寓兵於民未嘗厲民以為兵也厲民字見孟子滕文公上滕有倉廪府庫則是厲民而以自養也言古者寓兵於民之意如此自兵民既分三代而下兵民分而為二為兵者亦無以自復於民為兵者專從事於兵不可復反為民之事而御兵者亦毎毎不復以撫綏斯民之意待之矣御兵者亦專以兵視之而不以民視之此言後之世以兵視兵而不以民視兵之意如此於此有君焉暗指唐不强民以為兵而常以民而視兵主意仁愛體恤之意黙行於法制條目之中以仁民之心寓於兵制之中其立法愈詳則其仁心愈著莭目之詳皆人心之寓夫如是則先王不厲民為兵之意亦僅見於此唐以仁心寓於兵法尚得三代之遺意而論者乃曰大體之不正而節目之徒詳是非得為制法之善者也設難嗚呼曷不自其體民之意而觀之乎解應發出主意破語君子是以有取於唐之兵制也取唐法之善夫自三代既降兵民之判乆矣三代而下兵民判而為二高祖太宗承魏周之舊而制府兵之法本題下文府兵之制起於西魏後周而成於隋唐興因之云云自其大體而觀之固可謂得古人之遺意得三代仁民之意而其居處教養之有方動作休息之有時言唐之兵制節目所在纎悉備具喝出題上莭目字彼豈求詳於是哉喚下文惟其以民視兵而不以兵視兵此節目之詳所以為仁之至也發盡主意唐兵制節目如何請因唐史臣之論而申之昔者嘗觀先王之制兵盖未嘗以兵視之也應冒先王寓兵於民意其令貢賦則立邱甸縣鄙之名而以四起其數禮地官小司徒乃經土地而井牧其田野九夫為井四井為邑四邑為邱四邱為甸四甸為縣四縣為都以任地事而令貢賦其㑹什伍則立伍兩軍師之名而以五起其數同上乃㑹萬民之卒伍而用之五人為伍五伍為兩五旅為師五師為軍以起軍旅其調車徒則立通同終成之名而以十起其數前刑法志殷周因井田制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里始嘗疑之且設疑夫先王之制兵何其有委曲繁重之心而不為簡易可行之法哉言先王制兵之法何為如此之詳嗚乎是必有其故矣喚下意夫兵者民之所畏而民者國之所重也喝出兵民二字以素重之民而使之趨可畏之事以民而為兵亦是難事苟無體惜愛恤之心焉則其戾於人情也多矣若無體民之心而為寓兵之法豈不違戾人情故民力之勞則有以息其力民用之缺則有以備其用此是寓兵於民之仁心周旋審慮不啻如家人父子之相為區處者治兵如治家然豈固欲以是徼譽乎民哉徼譽求名也喚下意先王亦求盡乎人情而已自原起至此論先王以民視兵不以兵視兵之意自秦人驅民為兵而民皆有疾視其上之心孟梁恵王下不誅則疾視其長上之死而不救閭左之戍前食貨志始皇發閭左之戍又見下注大澤之屯史記陳渉世家二世元年發閭左戍漁陽九百人屯大澤鄉盖草菅民命略無一毫顧惜體恤之心賈誼疏秦視殺人若刈草菅然照破題體民字他日一夫大呼揭竿斬木相與共起以亡秦者亦其困苦無聊不能自安於行伍者為之也賈山至言一夫大呼天下響應者陳勝是也又賈生過秦論帥疲散之卒轉而攻秦斬木為兵揭竿為旗吁以兵視兵而無以恤之其害固如是哉此叚用秦事反證題漢鍳秦弊而京帥有南北之屯其區處兵制大略可喜前刑法志漢京師有南北之屯且揚之然而又抑之募及奔命發及刑徒選及三百石吏而宰相之子不免戍邉則無乃悉民以為兵昭帝始元元年募民及發奔命者擊益州應劭注云常兵不足權選精勇聞命奔走故金曰犇命又趙充國傳西羌反發三輔中都官徒弛刑詣城以益邉兵又本始二年選郡國吏三百石伉健習騎射者從軍又前昭帝元鳯二年有卒更踐更過更三品之號注淳如曰天下人皆直戍邉三日亦名為更律所謂西戍也雖丞相子亦在戍邉之調徭役長安者而道中衣裝悉皆自備從軍山東者至貸子錢以自餉則無乃以兵而病民賈誼傳淮南之地遥属於漢吏卒徭役往来長安道中衣装悉自備又前貨殖傳闗中列侯封君從軍山東至於貸子錢以自餉節目未備則法制疎略君子於漢夫亦何取此一叚論漢無體民之心故漢制疎略嗚呼孰謂唐承八代之衰而其制兵之法見於節目之詳盡者乃能上合先王仁民之意邪應冒先王仁民之意觀其踵魏周之舊制立府兵之良法見冒子注置府八百而在闗中者五百可謂得居重馭輕之勢矣唐陸贄傳太宋列置府兵八百餘所而闗中五百舉天下不敵闗中則居重馭輕之意也無事則㪚於田畆而不知有征役之勞有事則統於宿衛而不至有調發之擾可謂得寓兵扵農之法矣題下文初府兵之置居無事時耕於野其畨工者宿衛京師而已若四方有事則命将以出事解輒罷兵㪚於府将歸於朝又見題注立法之善盖自三代而下莫加於此謂唐兵制節目之善得三代仁民之心然高祖太宗仁民之心尤未輒此而見之也更要演出仁民意自此以下說唐兵制之善盖至於畨上之有時調發之有節見上注給渭北之腴田以養元從之禁軍同上初高祖以義兵起太原天下已定悉罷遣歸其願留宿衛者三萬人高祖以渭北白渠旁民棄腴田分給之號元從軍復老不任事以子弟代謂之父子軍慮其統御之無法也於是有折衝果毅别將校尉以領之題下文毎府置折衝都尉一人左右果毅都尉各一人長史兵曺别将各一人校尉一人慮其紀律之不分也於是有團隊火正以糾之同上士以三百人為團團有校尉五十人為隊隊有正十人為火火有長慮其器械之難備於倉卒也則有庫以藏其介胄戎器焉同上其䭾馬鍋幕糗糧皆自備并其甲胄戎具藏於庫有所起行則視其數而出給之其畨上宿衛惟給弓矢横刀而已慮其老稚之不得以免也則有二十為兵六十而免之法焉同上凡民年二十為兵六十而免其教之有方則越騎武騎為有等同上其能騎而射者為越騎其餘為歩兵武騎排􅀈手歩射毎嵗季冬折衝都尉率五校兵馬之在府者校之其役之有期則五百里二千為有差同上凡當宿衛者畨上兵部以逺近給畨五百里為五畨五里七畨二千里十畨外為十二畨皆月一上給直以市馬蓄才以待用同上當給馬者官予其直市之又題注凡所以節民之力而安民之生者無所不用其至焉見唐之兵制節目無非以仁民之心行乎其間高祖太宗之意果安在哉喚起下意彼固以為民情之病於兵也久矣君上之不恤乎兵也久矣要知體民之心而為寓兵之法體察之精詳計慮之周悉是節目處則夫品節之具仁心之原也條目之備恵愛之孚也節目之詳盡皆仁心所寓唐之兵制由其節目而觀之其有得於古人不厲民為兵之意照冒主意以上講究兵制最為詳盡莭目曉然而論者乃以為六軍宿衛悉皆市人而衛士亡匿宿衛不給是皆節目不善之所致題下文高宗武后時天下乆不用兵府兵之法寖壊畨役更代多不以時衛士稍稍亡匿至是益耗㪚宿衛不能給天寳以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可交時府人目畨上宿衛者曰侍官言侍衛天子至是衛佐悉以假人為童奴京師人恥之至相辱罵者必曰侍官而六軍宿衛皆市人及禄山反皆不能受甲矣而不知唐制之所以善者正以其節目之備也節目之備乃仁心之寓唐制之所以壊者正以其節目之隳也節日之隳乃仁意之壊學止齋制度紀綱論文法制自此以下説唐兵之不善宿衛更代多不以時則民得無有勞逸不均之患乎見上注之謂無仁民心悉以假人或為童僕得無有失身行伍之恥乎見上注之謂無仁民心京師共恥號為侍官則上下不致其愛重之意可見矣見上注之謂無仁民心節目既隳大體不立唐之子孫實執其咎尚可以是而議高祖太宗立法之徒詳於節目也哉此段設難問荅責唐之子孫不能遵守舊制唐史臣謂雖不能盡合古法尤得其大意焉舉題本文彼所謂大意者其諸有見於先王恤民之意歟應主意分以上講題二叚一叚論兵制之所以善盖其節目之詳一叚論後代之不善正由節目之壊却用出䖏語意繳結講中意雖然莭目之備具固其體民之心所寓也揚之而節目之未䆒亦其考論之未精也抑之大凡作漢唐論先抑則後揚先揚則後抑古者凡起徒役無過家一人惟田與追胥竭作禮小司徒凡起徒役毋過家一人以其餘為羨惟田與追胥竭作今兵悉𨽻役而他繇不復無乃殫民力乎陸贄奏議唐人𨽻籍於兵者終身不復古者大司馬教兵三表之間二百五十歩以歩法立人殆不足以容六軍之數則六軍之旅固逓閱也禮大司馬修戰法虞人菜所田之野為表百歩則一為三表又五十歩為一表注云表所以識行列也四表積二百五十歩左右之廣當容三軍云云今府兵之法毎嵗季冬折衝都尉率其屬而教之豈不大煩擾耶見前注不特此也高麗之役既帥江淮嶺陜之兵矣又募長安洛陽之士既而逺近應募不可勝數而房𤣥齡垂沒之際至忍死上表且願焚凌波之舟罷應募之衆房𤣥齡傳𤣥齡晚節多病頋諸子曰今天下事無不得惟討髙麗未止遂上疏云云願下詔使髙麗自新焚凌波之舡罷應募之衆即臣死骨不朽毋乃平時養兵固不足恃而倉卒制度猶有待於外求邪且疑下節目至詳尤有遺憾亦可以見立法之難矣抑唐兵制節目之未善由其立法之難而有如唐制之善君子又安可以輕議既抑之又揚之見文字宛轉如末叚譏太宗立法雖詳猶未能盡先王之時繳處又略扶起謹論兩篇考究厯代兵制甚詳可以參看考究題意格可與唐兵制節目論參看漢南北軍相統如何張亦顔出處唐李揆傳京師多盗至驂衢殺人李輔國方横請選羽林騎五百備徼歩揆曰漢以南北軍相統攝故周勃因南軍入北軍以安劉氏本朝置南北衙文武區别更相檢伺今以羽林代金吾怱有非常何以制之立說李揆言漢南北軍相統之制固是一說但其論未盡盖漢之列城分屯固所以重京師之勢而周廬設徼尤為近天子之光故其創置兵制尤重宿衛之選而環立王所非必皆武勇之人雖士大夫亦得以周旋於其列見得漢之南軍尤重於北軍非但相統而已也批云考究精詳議論超出於題意之外老作也論曰論一代之兵制指李揆論漢兵制而取其有内外相維之意漢南軍在内北軍在外相維見相統意君子猶謂其有遺論也抑李揆之説主意謂漢以宿衛之兵為重且含蓄未説出夫立國固不可以無兵而京師猶不可以無衛順説兵衛之意是以古人之制兵也必使内外相權而無一偏之患表裏相屬而無角立之形亦既得之矣謂漢南北軍相統之說李揆亦得之矣且揚之而猶以為未也又抑之亦含蓄未説出主意盖列城分屯雖所以重京師之勢指南北軍相制而周廬設徼尤為近天子之光主意重在此道後漢班固西都賦周廬千列徼綺錯又張衡西京賦徼道外周千廬内附釋云周環遶也廬天子止宿之地徼古弔反循道也苟以一概視之而無所輕重於其間則非所以尊主勢矣北軍為輕南軍為重故其創置兵制尤嚴宿衛之選至此方發出主意而環立王所非必皆武勇之人雖士大夫亦得以周旋於其列此其意逺矣漢之宿衛以士大夫為之見得以南軍為重盖漢之南軍是也繳上意李揆論漢南北軍揆之言盖激於一時之論而不暇及其詳時京師多盗愚恐或者㮣謂之軍而不知漢人之美意故不得不為之辨謂漢以宿衞為重而揆不之知漢南北軍相統如何請以廣李揆之所未及推廣李揆言外之意漢人兵制材官騎士布滿郡國漢儀注云民年二十三為正一嵗為衞士二嵗為材官騎士又刑法志置材官於郡國南北二軍鎮衞京師前刑法志漠興京師有南北軍之屯孰重乎設問曰京師重荅重字北軍兵卒守䕶京輔南軍兵衞扈從禁庭解漢制南北軍之意孰親乎設問曰南軍親荅親字重是學孟子色與禮孰曰禮重文法夫惟京師之兵為重則不可以無統攝之意貫上重字夫惟南軍之勢為親則不可不重宿衛之選貫上親字發出主意此理也亦勢也理勢皆當如此論漢兵者烏可以知彼而不知此乎謂李揆豈可但知南北軍相統之意而不知南軍宿衞之選尤為重雖然喚下意非是自為一叚以漢論不若以周論引周為證周人王畿千里建置六軍記注云王畿千里為方百里者百百里為一同又夏官凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍有掌固以修城郭同工掌固掌修城郭溝池瀦渠之固有候人以察姦細同上候人各掌其方之道治與其禁令注云備姦㓂也有環人以伺軍慝同上環人掌致師察軍慝有司兵以掌兵盾同上掌五兵五盾注五盾干魯之屬北軍之在外者然也以上周之北軍如此虎賁卒伍擁王前後虎賁氏掌先後王而趍以卒伍軍旅㑹同亦如之舍則守王閑王在國則守王宫國有大政則守王門旅賁戈盾左右王車軍旅㑹同授貳車戈盾建乘車之戈盾授旅賁及虎士戈盾注乘車王所乘車也左馭前驅掌以太僕太僕掌王正之服位出入王之大命王出入則自左馭而前驅持馬陪乘賛以齊右齊則皆反乘去聲馬齊右掌祭祀㑹同賔客前齊車王乘則持行則陪乘以上並周禮夏官此南軍之在内者然也以上周之南軍如此舉内外之兵而属之司馬其綱維統攝之意亦可見矣周禮夏官乃立夏官司馬使帥其属而掌邦政云云馬以上内外軍皆属司然周人不如是而已也要斡下意以為環衛王宫實為親宻之所而宻邇紫宸尤不可使匪人濫厠其間證主意故宫伯所領皆貴逰之子弟周禮天官宫伯掌王宫之士庻子凡在版者又用春官貴逰子弟語宫正所属亦皆習知道藝之流宫正掌王宫之戒令糾禁云云㑹其什伍而教之道藝非區區徒役之比也見宿衛之兵皆士大夫為之非外兵之比周人重内之意何如哉證主意南軍為重成周之制固非漢所敢望其僅有得於周人之遺意者亦烏可畧而不論乎引周過漢高帝間闗百戰以成帝業高祖本紀大者百餘戰五載而成帝業既都殽函之地以壯京師之勢班固西都賦漢之西都在于雍州實曰長安左據函谷二崤之阻復重京師之屯以為皇家之衛刑法志詳見原題注南北置軍實昉於此昉始也以其制考之考漢兵制主於衛尉主於中尉則所𨽻之職不同也公卿百官表衛尉秦官掌宫門衛屯兵諸屯衞候司馬二十二官皆属焉又中尉秦官掌徼循京師候司馬十人調於郡國調於京師則所調之兵不同也刑法志漢置材官於郡國京師有南北軍之屯或守禁掖或䕶城門則所衛之地不同也百官表郎中令掌宫殿掖門户又城門校尉掌京師城門屯兵有司馬十二城門候漢人慮其分而難合也於是聨属其勢於渙㪚之餘統一其權於中外之異要南北相統五營郎衛更直執㦸入衞殿門出充車騎則内者未嘗不外也後漢北軍中候掌監五營屯騎校尉越騎歩兵長水射聲校尉皆掌宿衛兵又光禄勲掌宿衛宫殿門户典謁司郎更直執㦸宿衛門户又郎官掌守門户出充車騎乘輿出警式候清道還至宫門禁鑰方開則外者未嘗不内也式道凡三候車駕出還式道候持麾至宫門門乃開以上並百官表國有非常虎賁宿衛宫府有警五校屯兵其緩急之相應也如此虎賁校尉掌輕車凡八校尉皆武帝初置出百官表比又後漢百官志執金吾掌宫外戒非常水火之事又軍中候掌監五營屯騎校尉越騎校尉歩兵校尉長水校尉射聲校尉皆掌宿衛兵宫掖之内衛尉循行禁垣之外金吾設徼其表裏之相副也如此衛尉寺在宫内胡廣云主宫闕之門内衛上於周垣下為區廬又中尉秦官掌徼循京師候司馬十人武帝太初元年更名執金吾出百官表然此特論漢軍之相統者然耳而漢之美意詎止於是哉擺去李揆南北軍相統之言要入主意竊嘗深考漢制以為南北二軍立議論合而言之謂之相統可也此李揆之說分而言之則南軍為天子之宿衛非可以北軍之䕶城者而並論也此自家主意漢制王國人不得宿衛親属犯法者不許宿衛猶未足以見其隆重之美意也龔勝傳勝三舉孝亷以王國人不得宿衛又蕭望之傳望之為子苑東門候數年坐弟犯法不得宿衛免歸為郡吏環衛之職分為二等属於郎中令為郎衛属於衛尉為兵衛百官表郎中令掌宫殿掖門户武帝更名光禄勲属官有大夫郎謁者期門羽林皆属焉又後漢衛尉卿一人注掌宫門衛士宫中循徼事兵衛則警夜循晝或出於調發之人兵衛為輕郎衛則近接清光無非士夫之職郎衛為重主意考之當時又考是時為郎衛之人東方朔揚䧺皆以執㦸為郎東方朔傳東方朔執㦸殿下又揚䧺傳奏羽獵除為郎給事黄門而李廣馮奉世亦以良家子弟為羽林期門李廣傳廣以良家子從軍為郎騎常侍又馮奉世傳武帝末以良家子選為郎又羽林掌送從期門掌執兵送從才美忠義接踵禁庭耆儒碩學扈從左右言宿衛皆士大夫為之其所以彈壓奸萌増重主勢者豈小補哉見得南軍尤重又烏可概以軍衛而待之哉非北軍之比李揆之論方借此以明南北兩衙文武相檢之意叙本題故僅取其相統而已因唐南北衙之不相統而取漢南北軍之相統其實漢人南軍之制纎悉周宻主意歸重南軍非止如揆之所論也推李揆之意唐兵視漢未逺引唐事作結末南衙諸衛猶漢之北軍也唐兵制夫所謂天子禁兵者南北衙兵也南衙諸南兵是也北衙禁衛猶漢之南軍也同上北衙者禁軍也勲臣子弟入為宿衛亦猶漢之重内兵也見唐兵志其後宿衛寖輕至於假人為奴而此意始失唐兵志髙宗武后時天下乆不用兵府兵之法寖壊云云衛士稍稍亡匿至是益耗㪚宿衛不能給天寳以後彍騎之法又稍變廢士皆失拊循八載折衝諸府至無兵可交時府人目畨上宿衛者曰侍官言侍衛天子至是衛佐悉以假人為童奴京師人耻之至相辱罵者必曰侍官而六軍宿衛皆市人及禄山反皆不能受甲矣然使南北衙之兵無恙則國勢猶可少支見前注柰何府兵既壊折衝諸道無兵可交六軍宿衛不任受甲不知緩急果何所恃乎詳見上注此所以激李揆之論也本題故嘗謂成周逺矣如漢南北軍唐南北衙亦後世制兵之良法兼収之而其崇重宿衛尢漢唐之美意歸重南軍主意後世有能得其遺意而行之亦足以立國歸今日来若夫兵衛不足國勢寖輕徒以發識者之浩歎猶為國有人乎嘆息結用左傳語謹論前萹謂唐之兵制雖甚詳而兵寓於農無非仁心行其間此萹謂漢之兵制雖相統而南親扵北無非士夫充其職因事度情格可與後篇叅看子儀單騎見虜江萬里出處唐書郭子儀傳贊云云及被圍涇陽單騎見虜壓以至誠猜貳沮謀雖唐命方永亦由忠貫日月神明扶助者哉立説子儀以國家之重臣當使之自重其身以為吾國之重豈宜使之單騎見虜出其不獲已之計而僥倖萬一於不敗以國之重臣而處之不容自重之地及其成功則天幸也豈任将者所可常恃耶批云冩得子儀心事出立意深而措辭婉歎惜之意溢於言外髙古之文也論曰以國之重臣指郭子儀而處之於不容自重之地使之單騎見虜若夫成功則天也主意夫所謂重臣者國之所恃以立者也就破題重臣二字說謂重臣一身乃國家命脉之所係豈不為重有以重之則吾國與之俱重矣申上文又何至投之進退不容之所指單騎見虜使之不得以自重其身而借或然之幸於天耶應破題意夫效忠而忘其身是固臣子大義且聞說子儀為臣固當盡忠然不使之展布於平時而徒責其應機於倉卒暗說代宗不用子儀於安平無事之日聽之退間及涇陽有變則促而起之使之應敵扵倉卒之間本傳自變生倉卒賴子儀復安曰戰曰守皆失其所據於進退之間進而無以為戰退而無以為守出其必不獲已之計而僥倖萬一扵不敗單騎見虜皆是不獲已之計真是僥倖扵用韓愈盤谷序僥倖萬一之語是雖精誠動天威信在人天人二字是一篇眼目卒保其首領以集事用左傳保首領以沒語不知者以為重臣之幸或者之說而國有重臣反使之不容以自重㦯然之天幸豈有國者之可常恃哉照自家主意應破題涇陽之圍唐事急矣本傳傼固懐恩召吐蕃囘紇㓂河西殘涇州起子儀於已廢而責之以屯兵同上初代宗罷子儀副元帥及㓂至涇州遽拜子儀為關内副元帥鎮咸陽云云大閱兵屯商州單騎之見吾知子儀萬不得已也見本題註囘紇之拜令公同上囘紇怪問是誰報曰郭令公驚曰令公在乎云云囘紇下馬拜曰果吾父也又後註可以知唐之在天而子儀之在人者矣應前面天人二字特非所以為任将者之訓也責代宋任子儀不當如此子儀單騎見虜請畢其說甚矣世俗之見好以成敗論人而不為國家深長之思也抑㦯者之論以奮不顧身為疾風勁草之忠唐蕭瑀傳上賜瑀詩曰疾風知勁草版蕩識誠臣以履險幸成為天佑國家之福用左傳語吁亦孰知夫為臣而不顧其身忠矣工上意而人之云亡如邦國之殄瘁何詩人之云亡邦國殄瘁為國而賴天之福幸矣擺上意而天不可知如其幸之不可常恃何天幸適然不可常恃是故為國而必重其将非愛其將也所以重吾國也應冒有以重之則吾國與之俱重為將而自重其身非愛其身也為國而重其身也應冒自重其身是以壇焉而拜韓信傳王必欲拜之擇日齋戒設壇場具禮乃可漢王許之鉞焉而授唐渾瑊傳徳宗狩山南瑊以諸軍衛入谷口云云兼帥方等行營副元帥帝臨軒授鉞用漢拜韓信故事分閫焉而舉以聽者陸贄奏議古之賢君選将而任分之以閫又舉國以聽見左氏傳非徒以假其權也結上生下使之展布扵平時固所以折衝於倉卒也中說王道萹揚素謂子曰天子求善禦邉者子曰羊祜陸遜仁人也可使云云折衝樽爼可矣油憧雲擁虎帳風嚴将軍所居之地使在兵間猶不得以覘吾將之風采者見得将臣要自重其身非徒以重其身也結上生下身非吾身而國家所倚賴之身也應冒重臣者國之所恃以立者也今也有人於此投閒置㪚不得展其才於可為之日暗指子儀罷元帥之時學本傳議者謂子儀有社稷功乃置㪚地又韓進觧投閒置㪚乃分之宜倉卒受命乃欲責其力於不可救之時暗指涇陽之變遽拜子儀為闋内副元帥與單騎見虜之時欲其進退之有所不能應冐曰戰曰守皆失其所據於進退之間不獲已而出其萬一之計應冒出其不獲已之計而僥倖萬一於不敗以幸其或然之免應冒或然之天幸重臣之用國初心豈願至此耶應冒國有重臣意說者不能諒其心應冒不知者以為重臣之幸遂以一旦之幸免為重臣威信之孚亦國家天命之固應冒子儀之在人唐之在天曽不知為國而不知重其將而為將不得以重其身應前為國而必重其将為將而必重其身行險僥倖一至此極萬全之筭不如是也中庸小人行險以僥倖又晁錯傳帝王之道出於萬全子儀之在唐非他時比推尊子儀匹馬北方収復東都揚旗擣壘直指范陽國家之倚重子儀者如此本傳安禄山反詔充朔方莭度使率本軍東討収雲中馬邑開東陘云云扵是晝揚兵夜擣壘賊不得息云云扵是河北諸郡往往斬賊首迎王師方北圖范陽奉天之圍吐蕃陸梁紿以令公倉皇宵遁夷狄之畏子儀者如此同上懐恩隂召囘紇吐蕃㓂河西犯奉天又民紿虜曰郭令公来虜懼王甫結侠少夜鼔朱雀衘呼曰王師至吐蕃夜潰宵遁借用左傳語人主當如何而重子儀子儀當如何而重其身邪應前重其将重其身單騎一出囘紇下拜不世之功名賀子儀者衆矣本傳囘紇曰令公存乎今誠存可得見乎子儀將出左右諫回紇野心不可信子儀曰虜衆數十倍今力不敵吾将示以至誠左右請以騎五百從又不聽即傳呼曰令公来虜皆持滿待子儀以數十騎出免冑見其部長曰諸君同艱難乆矣何忽忘忠誼而至是也云云然自識者而論子儀則憂重於喜不能不動深長之思也喜字貫工賀字憂字含下意當是時也子儀之兵權屢削矣本傳魚朝恩疾其功因是謀譛之故帝召子儀還更以趙王為天下兵馬元帥云云又程元振離搆百計因罷子儀副元帥代宗之所與謀者王所之居州無幾也借用孟一薛居州如宋王何事懐恩不道誘致二虜擁兵結衆突如其來為唐謀者駭矣本傳僕固懐恩屯汾州陰召囘紇吐蕃㓂河西殘涇州倉皇幅紙急起子儀指懐恩召囘紇吐蕃㓂涇州時遽拜子儀為關内副元帥朽鉞鈍戈曽無素具疲卒潰兵誰有鬬心形容當時事勢無一可恃子儀受命驅馳以往子儀胷次中吾固莫知其何如也形容子儀初受命之時涇陽未戍虜圍已合本出處進而無以為之戰退而無以為之守應冐曰戰曰守皆失其所據扵進退之間苑中之屯天子皇皇自将矣本傳天子自将屯苑中召子儀屯涇陽又兵志朝思以神筞軍屯苑中遂為天子禁軍主憂臣辱是豈子儀自重之日耶涇陽之圍事勢急了子儀不容自重其身思昔囘紇共功之時感慕懐服素非一日一告語之或者囘紇猶吾聽也本傳子儀使諭虜曰昔囘紇渉萬里助復二京我與若䓁休戚同之今乃棄舊好助叛臣彼背主棄親扵囘紇何有囘紇曰本謂公云亡不然何以至此誠存我得見乎子儀将出左右諫戎狄野心不可信子儀曰虜衆數十倍今力不敵吾将示以至誠云云又見前注萬一戎心叵測出所不期則一死報君庻天地之猶我鍳耳子儀曰老臣受命将死扵外又史臣曰晏然效忠有死無二匹馬揺揺駕言行邁用毛詩句法此時此情愚固知其甚不得已也應冒出其必不獲已之計幸而天未棄唐誘虜之衷史臣曰天胙王徳寔生汾陽又用左傳天誘其衷語應冒唐之在天子儀恩信在囘紇者未憖本傳懐恩誘吐蕃囘紇入㓂云云懐恩本臣禆将且皆臣故部以恩信結之彼忍以刃相向乎憖字是學左傳天不憖遺之憖人應冐子儀之在下馬之拜晏飲之歡同上囘紇捨兵下馬拜曰果吾父也子儀即召與飲遺錦采結歡誓好如初反其向我之戈而為吐蕃之襲同上子儀曰吐蕃木吾舅甥國無負而来棄親也公䓁其倒戈乘之若俛取一芥云云子儀合囘紇衆追躡大軍繼之破吐蕃十萬扵靈臺令公之功固莫懿扵為此役令公之謀尤莫危於為此行也上句揚之下句惜之應不自重意論者不考子儀受任之素不察子儀所以見虜之情此或者之論顧謂子儀識囘紇之素心故見之而不疑囘紇驚令公之無恙故孫之而不抗注見前應冒不知者以為重臣之幸不思鴻門之㑹張良信項伯矣項莊之舞誰其料之高帝紀項伯素善張良夜馳見良具告其寔云云沛公見羽鴻門増數目羽撃沛公羽不應范増謂項莊曰汝入以劍舞因擊沛公莊㧞劍舞項伯亦起舞常以身翼蔽沛公平凉之盟渾瑊諒吐蕃矣刼盟之譟誰其抗之唐渾瑊傳吐蕃畏瑊與李晟馬燧欲以計勝之乃詭辭重禮請燧講好帝乃詔約盟平凉川以瑊為㑹盟使為結賛所刼兩敵相持惟力是視用左傳語失一重臣則無益於君將有不勝其悔者矣應冒國有重臣而使之不容以自重論至於此吾知子儀之不獲已也應冒語反報河中馳報天子代宗有靦面目矣本傳遂還河中馳報天子云云壓以至誠之贊殆未知子儀之不遇於唐也見本題註雖然子儀之不幸者人也子儀之幸則皆天也應冒天人二字元振之讒君惑之矣本傳代宗立程元振自謂有功於帝忌宿将難制離構百計因罷子儀副元帥朝恩之毁君又惑之同上魚朝恩疾其功因是謀譛之故帝召子儀還兵權所寄率視緩急而為之予奪見前註人主之視子儀輕重可以㮣見矣惟天地焉鍳其精誠鬼神焉扶其忠力應冒成功則天也意見前註又題注神明扶持更變厯險如履平夷髙節全名炤燿今古子儀之天何如耶本賛子儀全名髙莭燦然獨著上帝臨汝無貳爾心將兵之将乃所願則學子儀揚子儀無詩大明上帝臨汝貳爾心將安將樂女轉棄予將將之君謹勿以代宗為訓責代宗轉詩将恐将懼惟子與女将安将樂女棄予又用韓信傳陛下不善将兵而善将将謹論因事度情格與子儀單騎見虜論同意將軍度𦍑虜何如陳宗禮出處前漢趙充國傳先零𦍑畔時充國七十餘上老之使丙吉問誰可將者充國對曰無踰扵老臣上遣問曰将軍度𦍑虜何如當用幾人充國曰兵難隃度臣願馳至金城圖上方畧願陛下以属老臣勿以為憂注度入聲立說宣帝非不知西羌之莫我敵也其遣問充國之時必欲使之度𦍑虜何如者非徒度𦍑虜也正欲度充國之為人也充國是時已老其勇怯未可知宣帝欲於一問之頃覘彼之所荅如何可以觀其勇怯何如耳批云前軰吳公琮云主張在題目外題目在主張内此篇得之論曰講論羌人之强弱謂宣帝問充國使之度𦍑虜何如英主所以黙寓其觀人之術也帝欲覘充國也夫羌人以小醜而犯中國剪而去之可也指先零𦍑之犯漢伐之亦容易而英明之主咨謀審顧若有不敢以輕進焉者指宣帝之問充國是固持重不亟之意也緫説大意不使之輕於急進趙充國傳尤能持重而其深意亦豈止扵持重不亟而已哉将上意斡一轉生下意盖人之勇怯未易知也勇怯二字是一萹綱領而名遂身老之人時移志改者常衆尤不可以平日之意向測識之也謂充國已老未必如平時之常勇於其未可測識之中連上文如貫珠而吾欲以察其所志觀其為人如何苟事事而較之屑屑而試之甚非尊禮老臣之意也與後面相應孰若詢之以量敵制勝之謀使之度羌虜何如而隨察其處事應變之略觀他所荅區處如何一商㩁之際指遣問意豈唯可以度虜而已以意料之之謂度因其所度而吾將帥之可倚與否盡在是矣此意謂若充國勇於進則可倚仗之以伐羌若怯而不進則不足倚仗矣漢宣帝豈不知虜勢非吾中國之敵哉宣帝知西羌之情状已久而羌虜何如必欲充國度焉而後從引本文帝非徒度羌虜也帝盖意充國之老而因以覘之爾發盡主意所度在彼所以度者在此所度雖在羌虜所以度者在充國之勇怯如何耳吁古今孰有能明宣帝之深意者哉意在度充國將軍度羌虜何如請申宣帝遣問之㫖用本出處字甚哉帝王之問未有能窺英主之閫奥也就問字上原起昔漢楚方争髙帝之咨韓信曰將軍何以教寡人計䇿韓信傳王曰丞相數言将軍将軍何以教寡人計䇿信謝曰云云武帝將有事於匈奴亦以攻之何如為公卿問焉韓安國傳元光二年春詔問公卿曰朕飾子女以配單于金幣文綉賂之甚厚單于待命加嫚侵盗亡已邉境被害朕今欲舉兵攻之何如王恢建議宜擊世率謂咨謀詢度審而後發漢世人主大抵然耳且總結上二事審問不輕之意抑不思二帝之問若同而二帝之所以問者則不同也要撥剔主意謂高帝何以之問與宣帝同武帝何如之問與宣帝異武帝志馳扵沙漠之北用臧宫馬武馳志扵伊吾之北語衛青去病之徒乆已在揣摩之列武本紀大将軍衛青驃騎将軍霍去病各将五萬騎出塞匈奴逺遁謂武帝素知衛霍二将軍之為人何如之詔見上註特欲知兵事之可否往戰之成敗云爾武帝何如之問其意與宣帝不同而高帝之扵韓信則異於是焉擺去上一股却把高帝之問韓信來比本題擢之道亡之中邈無相知之素韓信傳漢王至南鄭諸将多道亡何聞信亡自追之計策之求見上注是覘信也非慮楚也高帝何如之問其意與宣帝同然則宣帝羌虜何如之問引本題吾不知為高帝之問耶抑亦武帝之問耶闗鎻上文且疑辭雙下如以為武帝之問且難則先零之小醜異乎匈奴之張皇不必為是贅也宣帝時先零之小醜不比武帝時匈奴之勍敵可畏其問若失之贅謂武帝之問公卿與宣帝之問充國異意者韓信方來而髙帝以何以教我試之充國已老而宣帝以羌虜何如覘之其機一而已矣打合得好宣謂高帝之問韓信與帝之問充國一同盖漢之視匈奴不過漢之一大縣西漢書匈奴漢一大縣耳先零之扵漢其為縣也小矣先零又不如匈奴之大螳螂怒臂一蹙可斃是不必度也言奮怒以伐羌虜立待其斃螳螂蟬之属也荘人間世夫螳螂怒其臂可以當車轍不知其不勝任也用兵先計而後戰在充國已非一日之故善兵之譽犬羊至為之震驚焉隠然敵國何向不濟是又不必度也趙充國傳充國行必為戰備止必堅營壁尤能持重士卒先計而後戰又羌豪相責曰語女亡反今天子遣将軍来年八十九善為兵今欲一鬬而死可得耶又用呉漠傳呉公隠然若一敵國語扵不必度之中而有不容不度者帝特未知充國晚節之規模何如耳發出主意人之常情立議論固有勇鋭於少年而昏荒於耄老者矣有勇扵少而怯扵老者亦有涵養於血氣方剛之時而精明於更事既乆之日者矣亦有自少至老而俱勇者時應冒人之勇怯未易知也而名遂身老之人移志改者常衆意充國以七十餘老鋭然金城之往見本題注其耄而輕敵耶抑老而益壮耶且疑辭雙下是未可知也帝扵是時以為冒然輕遣固恐有石碏無能為矣之患疑帝此問恐充國如石碏之怯左隠五年石碏使告於陳曰衛國褊小老夫耄矣無能為也苟切切然詰其勇怯進退之迹又非所施扵元老舊臣也又非吾所以推轂授鉞之禮也又疑帝此問恐非待大臣之禮應冒苟事事而較之屑屑而試之非尊禮老臣之意馮唐傳跪而推轂曰闑閫以外将軍制之又唐渾瑊傳授以節鉞以戡多難孰若就以羌虜之勢使之度之歸主意亦應冒孰若詢之以量敵制勝之計其或矜智負勇為滅此朝食之計歟是既老而輕不可将也左滅此而後朝食其或畏勞憂患為師老財費之畫歟是既老而怯亦不可将也左老師費財擺老而輕與怯皆不可用去上二股量彼量已乃善為謀不阻不廹庶幾善勝主意語用兵法吾是以知何如之問宣帝雖以度羌虜也亦將以度充國也發出主意應冒頭自宣帝委充國以必度本出處而充國且躊躇不輕於隃度隃與遥同出處下文兵難隃度臣願馳至金城圖上方畧帝扵此然後知充國臨事不苟為謀必臧記臨難母苟免詩謀之其臧註臧美也西羌之舉始决然不属之他人矣代西羌之舉只属之充國而不察宣帝之㣲意者應冒深意字且曰量敵而進慮勝而㑹用孟子語量敵而後進慮勝而後㑹帝之發問亦惟欲度虜勢之强弱以為吾出師多寡之决爾外此非其所度也開說謂他人不知帝之本意吁歎惜帝之所度果止於羌虜與之辨何為卒聽充國之不度而遽委之一往哉反説大有力帝之潜測宻察有出於言意之外者矣其言意在於度充國之勇怯異時五溪之亂馬援以六十餘嵗之老毅然請行固光武之所未許也以馬援之老比充國之老請馬援傳劉尚擊帝愍五溪蠻夷深入軍没援因行時年六十二其老未許之一試之餘踞鞍矍鑠然後信而遣之同上援請曰臣尚能披甲上馬帝令試之援據鞍顧盼以示可用帝笑言矍鑠哉是翁也其視宣帝之委寄充國殆無以異也光武之遣馬援似與宣帝之遣充國同然試而後見幾於素不相知者之為抑彼揚此謂光武試之而後用與宣帝問之而後遣其意不同試則渉於形迹而援也顧盼以示可用殊異乎老成嚴重之體謂援之自試求用亦不如充國之老成持重曽不若宣帝度虜一問辭婉意切推尊本題上無校試之勤宣帝勝光武下無自試之輕充國勝馬援論至於此益知宣帝觀人之術盖過人逺甚應破語自光武不能以造此而况他人乎罵倒光武推尊宣帝故嘗為之說曰就一轉語作結尾果哉宣帝綜核名寔之主也本紀信賞必罰綜核名實老將之遣審而後行本出處屯田之奏議而後定充國傳充國曰帝王之兵以全取勝臣謹條不出兵留田便宜十二事即其後日議論再三之舉不肯輕是充國之說同上奏上輒下公卿議初是其計者什三中什五最後什八又魏相曰臣愚不習兵事利害後將軍數畫軍􅜼其言常是臣任其計必可用也上從其計則始者羌虜何如之問其意所主决有在矣因後知前意字亦應冒或曰方叔元老克壯其猷宣王不如是之𤨏𤨏也詩采芑宣王南征也云云獨不思任賢使能豈泛然無所審訂者能之詩蒸民尹吉甫美宣王也任賢使能周室中興焉吁此宣帝所以侔徳周宣也打合好侔本紀賛可謂中興徳商宗周宣矣謹論前篇謂代宗起子儀以平囘紇使之單騎往見非所以使子儀自重其身也此篇謂宣帝選充國以禦羌虜使之自度何如盖將度充國之為人何如也評品優劣格與蕭曺丙魏孰優同格漢邊郡名將孰優如何洪振龍出處前漢李廣傳程不識與廣俱以邉太守将屯及出擊胡而廣行無部曲行陣人人自便不擊刁斗自衛幕府省文書然亦逺斥候未嘗遇害程不識正部曲行陣擊刁斗吏治軍簿至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁之而其士亦佚樂為之死我軍雖煩擾虜亦不得犯是時漢邉郡李廣程不識為名将然匈奴畏廣士卒多樂從而苦程不識立說李廣之治軍也以簡易程不識之治軍也以嚴宻然廣能以威望服人而不識則兢兢然保守尺寸人品優劣居然可見批云文勢衮衮議論層出抑揚頓挫無毫髪遺恨數十年来不見此作可為天下之矜式論曰考論將臣之事業緫論李廣程不識二人而能以威望服乎人者指李廣有威望優扵程不識此足以為難矣難字便見得李優而程劣夫師出以律古之道也此句有骨師似若奨程不識治軍之嚴宻易卦出師以律註謂用兵之初出就行列必用法律今有人焉指李廣坦然自脫於規矩凖繩之外而一以簡易為規模李廣之治軍不甚守法律李本傳廣行無部曲行陣又云将軍極簡易軍旅之事固未見其精且宻也似若不如程不識之治軍精宻然聲實素著扵平時威徳乆孚扵衆聽歸李廣有威望上不勤教詔而士卒樂為之用指出處幕府省文書云云士亦佚樂為之死意使敵國望其巍巍而不敢犯指匈奴畏廣意此其人品豈可與兢兢保守尺寸者同日語哉貶倒程不識見題註盖豪傑之士不可以尺度拘李廣非兢兢保守尺寸者而纎悉冗𤨏必非慷慨功名之將程不識正部曲行陣擊刁斗吏治軍簿至明軍不得自便果使敵貳其威士攜其令貳疑也攜離也則雖紀律設而號召嚴亦無補扵事耳指程不識觀此則李優而程劣明矣程不識之視李廣其才品優劣可知也且冷下語文書行伍以廣方之固不足以法律觀之李廣似不及程不識至其隆威重望行乎匈奴士卒之間則非不識之所知也威望觀之不識真不及李廣班孟堅以二子皆邉郡名將指班固所言固字孟堅愚謂以名稱者威望之謂也發出主意李廣為近之取李廣為優漢邉郡名將孰優請扵此而寘其辨且名將之士何如哉引證吳起之在西河而敵國不敢加兵吳起傳将三軍使士卒樂死敵國不敢謀守西河而秦兵不敢東鄉李牧之守鴈門而匈奴不敢犯塞此名將之事業也以呉李二名将比李廣世固有豪傑之士名塞宇宙威愕奸雄而不能錢穀簿書者矣為李廣占道理文帝本紀帝問勃曰天下一嵗錢榖出入幾何勃謝不知又王吉上疏其務在扵期㑹簿書斷獄聽訟而已未有諄諄自守而能脫略邉愊以事度外之功名者也謂程不識兢兢然保守尺寸今夫御三軍之衆以下形容程下識之治軍朝聚而告之曰厲乃戈植乃矛備乃車馬舉書費誓語備乃弓矢鍜乃戈矛礪乃鋒刄又見下註暮申而令之曰行而營壘治而簿書聲而刁斗而又人人而閱之旦旦而視之非不勤也見本題注又學栁子厚郭槖駞傳文旦暮吏來而呼曰云云蚤繰而緒蚤織而縷字而㓜孩遂而難豚鳴鼔而聚之擊木而召之以上形容不識之治軍煩擾處然能使敵國不可犯而不能使敵國不敢犯如程不識所為使敵人不可犯如李廣所為使敵人自不敢犯能使三軍無揚干亂行之誅而不能使三軍有投醪挾纊之氣左㐮三年晉侯之弟揚干亂行扵曲梁魏綘戮其僕註揚干名也行陣次也又左宣十二年椘子伐蕭申公巫臣曰師人多寒王廵三軍撫而勉之三軍之士皆如挾纊注重絮也又古烈女傳越王勾踐伐吴客有獻醇醪一器王使注之上流使士卒飲下流而士卒戰百倍如上句如程不識之治軍下句李廣之治軍便見優劣了平時威望不足以先懾敵人之心懾服也待其有所悔而動也然後恃吾行陣部伍以禦之一勝一負安能保其所不殆哉程不識所為如此不及李廣了或者之論則曰設難行陣軍行之紀綱簿書軍政之要領且說程不識正部曲行陣吏治簿書至明亦是當為之事學不識而不能猶不失為持重學廣而無成則一敗塗地矣且據或者之論如此然此特為學者言也解上文愚之所論者二子人品之優劣主意在威望上且自或者之説而觀之又開説行無部曲誠不如營陣嚴整者之有紀也李廣行無部曲程不識營陣嚴整人人自便誠不如虜不得犯者之為無虞也李廣人人自便程不識虜不得犯府無文書夜不設衛誠不如擊刁斗治軍政者之為詳且謹也李廣府無文書夜不設衛程不識擊刁斗治軍政治並見題註以上說李廣之治軍簡易不如程不識之軍嚴宻然匈奴不畏不識而畏廣士大夫不歸不識而歸廣歸主意見得李廣威望優扵程不識孰優孰劣可以鍳矣李優程劣且廣亦安能使人畏服之如是哉斡下意大抵媮色婉容不待談笑而意自親媮美也婉媚也齊明盛服不待揖遜而威自重中庸齊明盛服齊則皆反老成宿將不待號令而人自服説廣有威望而人自服之前二股比此一股廣自結髪以戰於匈奴本傳廣結髪與匈奴大小七十餘戰厯事三世驅馳七郡威名著於夷狄久矣以下説廣之有威望䖏厯事三世事文帝景帝武帝三朝馳驅七郡上谷上郡隴西北地鴈門雲中北平本傳云廣厯七郡太守又單于素聞廣賢賜飲食必分麾下而且寛緩不苛以誠待士則士之樂為用者固以此也本傳得賞贈輒分其戲下飲食與士卒共之云云寛緩不苛士以此樂為用麾戯與同不識之軍煩擾而多端見題註兵機謂何乃治軍簿夜以達旦何疲苦之如是也見題註擾言程不識之治軍煩不得士卒之心不如李廣治軍之簡易甚得士卒之心也宋襄公不皷不成列適以取敗左僖二十二年宋公及椘人戰于泓宋師敗繢國人皆咎公公曰不皷不成列比程不識而陣出背水者乃反勝焉韓信出皆水陣斬成安君泜水上本傳比李廣諸葛亮罰二十以上必親終以自憊諸葛亮傳罰二十以上皆親覧焉比程不識而不學兵法者足以立一世之名霍去病傳上嘗欲教之孫吳兵法對曰顧方略何如耳不去學古兵法比李廣豪傑之功固不在扵簿書行陣之末也謂李廣有盛望足以服人優扵程不識應講中簿書行陣語或者又以鴈門之俘獲東道之失敗為廣之病廣擊匈奴匈奴兵多敗廣軍生得廣又與右將軍出東道惑失道後大將軍不知名譽在我成敗在天同上云云豈非天哉武帝疑其數竒而靳之精兵李廣傳大将軍陰受上指以為李廣數竒令當單于數入聲衛青忌其成功而徙之逺遁本傳廣曰今幸從大将軍出接單于兵大将軍徙廣部行囘逺又迷失道廣亦不能自奮矣謂二人皆掣其肘使之不能展布非廣之過也使程不識而當廣之事不知能為廣之所為否乎倒翻在程不識身上来見不識之才不如廣君子觀廣之守右北平也匈奴避之至數嵗不入界其小試之效固已如此本傳廣在北平匈奴號曰漢飛将軍避之數嵗不入界使得自將一軍以當單于則其功當不在衛霍之下矣本傳大将軍衛青驃騎将軍霍去病大擊匈奴廣數自請行上以為前将軍云云廼今一得當單于臣願居前先死惜李廣不曽自當一軍若果當之其功尤在衛霍之上豈程不識之所能及然則廣可以為古之名將乎設問轉作結尾曰謂漢將則可謂古名將則未也荅云未可為古之名將語有斟酌何者廣能有其名而不能全其名能為天子治邉而不能自治畧抑之使其威望已著養晦待時則勲名事業庶幾與古方焉謂廣失之太衒露不能涵養聲名所以不能比古之名将奈何狃扵少年戰鬬之習數與虜确以敗其名本傳公孫昆邪為上泣曰李廣材氣天下亡雙自負其能數與虜确恐亾之确音角與之角立戰鬬也猶不得如程不識之碌碌前面已罵倒不識了至此畧揚不識前面已奨借李廣至此又畧抑之見文字有抑揚吁亦足惜也嘆惜結了然則後世憂邉之君暗指今日得有才如李廣者當愛䕶而用之當重之毋使冒危涉險以輕試其勇斯可矣不可輕試之謹論評品優劣格與漢邉郡名將孰優同格蕭曹丙魏孰優易祓出處前漢丙魏贊高祖開基蕭曹為冠孝宣中興丙魏有聲立説漢家以仁立國蕭何曹叅丙吉三人為相能體此意故其所為毎務寛大以維持漢家一代之治體惟魏相以嚴毅輔宣帝整齊天下而致一時之近效然其虧漢家之治體多矣比之蕭曹丙三人則為不及批云議論當理文字圎熟終萹反復抑揚婉曲不直致判斷到優劣處又含蓄不明言褒貶之意自見深得論體論曰大臣之用天下大臣指蕭何曹参丙吉三人固當維持天下之治體指三人毎務寛大以維持天下之治體而末節不與焉如魏相之才智則是末節了即其區區之末節而較其一時之所長接上句末節字起議論文勢連絡不斷一時字與千萬世字相形容褒中之貶則其著見於事業者固不能無等級之辨暗形魏相才智勝三子為講題収魏相處張本然非所以論大臣用天下之道也轉歸主意治天下有定體接上天下字作議論大抵寛大樂易者有經乆之謀此蕭曹丙三人之得而剛銳果敢者皆廹切之計此魏相之失為大臣者固當培植國本固結人心此是治體使天下之治至於千萬世而不窮焉可也暗叙蕭曹丙三人維持治體時千萬世字與一字相反苟惟治體之不察而一切之嚴毅者䆒心焉接上治體字暗形魏相寛本傳相為人嚴毅不如吉則其目前之效非不聳然甚可喜且揚之題目前之效應接一時字而治道之元氣索矣又抑之不識治體了昔者漢家之治源深流長入題先把漢家治體立論若便從四子身上說來則文勢直致死殺了誠不以一時之嚴毅者為之也應前面見得魏相不知治體蕭何之畫一曹参之清净丙吉之長者是固足維持漢家仁厚之政且拈出三子知治體却説魏相則撥剔分曉曹参傳蕭何為法講若畫一曹参代之守而勿失載其清净民以寕一丙吉長者見吉本傳而魏相獨以嚴毅聞嚴毅便與三子相反了嚴毅非不足以為政也又斡一轉而漢家之治體果如是乎反應主意君子扵是而考明之立論斷之則四子之所以用漢者殆不容無所辨其意雖是貶魏相而語却渾㴠用字應破題蕭曹丙魏孰優請因班固之贊而申之有一代之治必有一代之治體就治字生體字應主意而其所以輔贊彌縫於不可終窮之地者應冒使天下之治至扵千萬世而不窮要必有以任其責也含大臣意苗民之弗率聲其罪而誅之無難也反說形出下靣寛大意弗書大禹謨帝曰咨禹惟時有苗率汝徂征而禹之相舜乃汲汲扵班師之舉形寛大意映蕭曹丙吉乃同上禹拜昌言曰俞班帥振旅帝誕敷文徳商民之弗靖雖鋤而絶之勿恤焉可也反說形容下靣寛大意書大誥西土之人亦不靖而周公之相成王乃諄諄乎姑惟教之之言形寛大意映蕭曹丙吉惟書酒誥勿庸殺之姑教之夫優㳺和緩之不足以制天下之變固也且抑寛大之說而聖人之心顧乃委其自安待其自定何也設疑盖不如是解則不足以維持天下之治體也歸自家主意上来然則三代之所以為有道之長者其以此歟繳結原意道賈誼䇿三代有之長西劉之興固不可以三代之治責之也聨上三代字然轉高祖天資仁厚貫下意出秦民扵湯火之餘而納之扵袵席之上先就漢治體說来魏講蕭何曹参則説高祖講丙則説宣帝畢竟四子只是輔漢家之治蕭曹二子亦且静愿少事而足以為天下安養休息之政夫是以一代之治體可以乆傳而無後患後靣欲将四人實事分優劣此處只得虚講自武而宣過度入宣帝不覺則其渾厚之氣已少蠧矣治體已不如髙帝時丙吉之長者猶足以扶其顛而反其墜說丙吉不若説蕭曺之詳亦是勢當如此至於魏相之嚴毅則又益甚焉上面已説三人只留魏相在後與冒頭造文一同是不可以不辨也辨字應冒不容無所辨而世之論者則曰反説以下叙蕭曹丙不如魏相處蕭何以民田而自汙其視夫相之稱上意者為孰愈蕭何傳多買田地賤貰貸以自汙又魏相傳總領衆職甚稱上意曹參以醇飲而自肆其視夫相之總領衆職者為孰優曹参傳至者参輙飲以醇酒又魏相傳見上注丙吉聞匈奴之警而後任科𤨏邉吏之責其視夫相之識兵略者為孰勝丙吉傳見驛騎持赤白嚢至知虜入雲中代郡吉召軍曹案邉長吏科𤨏條其人自是而觀則相之才智自足以震耀扵一時而非三子之所可及也後而将貶魏相故上面先褒後面将褒蕭曺丙吉故上面先貶大凡欲抑則先揚欲揚則先抑乃文法也一面褒一面貶則文法直了且説三子不及魏相然君子不觀其才智之所用而深考其維持治體之所在轉歸主意囬顧字靣則優劣之辨始有可得而論者應四子所以用漠者殆不容無辨語意不廹而褒貶之意自見以下説三子優於魏采明堂月令之說而不知其品式之繁誠不若三章之約為簡且易也魏相傳數表采易隂陽及明堂月令奏之又刑法志髙祖入闗約法三章云云三章之法不足以禦姦於是蕭何捃摭秦法作律九章奏賈誼晁錯之言而不知其䧟於刑名之過誠不若獄市不擾者之為安且乆也魏相傳相好觀漢故事及便宜章奏云賈誼晁錯董仲舒所言奏請施行之属賈晁學刑名又曹参傳使者召参参去其後相曰以齊獄市為寄慎勿擾也稔霍氏之禍而不能救趙盖楊韓之誅誠不若三公不按吏者之為無後悔也魏相為相時宣帝赤族霍氏又宣帝誅趙廣漢盖寛饒揚惲韓延夀時魏相為相而不能救之又丙吉傳夫以三公之府有案吏之名吾竊陋焉云云公府不案吏自吉始格致全與前篇同三子之所以維持治體者相果能之乎斷倒魏相囘顧主意字面相當宣帝嚴毅之朝而不知守髙帝仁厚之治嚴毅二字應前此處應前面說髙宣處有収拾仁厚字講題起頭用而復見扵此裏了一講顧乃耗天下之脉而滋天下之變則三子之智似不如是斷得婉君子扵是而觀之則其人才之優劣盖有定論矣斷結應冒君子扵是而考明之殆不容無所辨而詞含蓄不廹意自見雖然演餘意非是自為一叚漢家仁厚之治是固不可以不守也又用仁厚字聨上然文帝之朝公卿大夫風流篤厚耻言人過文帝本紀其仁厚可知也揚之至扵周勃之椎魯申屠之木强是雖不至於激天下之變而亦何補扵漢家一代之治将周勃椎魯申屠木強映蕭曺丙吉之寛大椎魯木强是寛大長者短處並見本傳吁觧治天下之道立論權衡不病扵法制之不詳寛大之弊正病於法制之過詳也嚴毅之弊不病扵政令之不嚴寛大之弊正病扵政令之過嚴也嚴毅之弊用天下者苟能因其一代之體囘顧主意字面而守其一定之法應上面守字則仁厚之澤雖至今存可也應上面仁厚字蕭曹逺矣丙吉之長者固莫得而見矣撥退三人不撥退則魏相一人既與蕭曹丙吉較優劣又與申屠嘉周勃較優劣則惹得脚手多了與其為魏相之嚴毅而至扵虧天下渾厚之氣抑退魏相固不若申屠周勃之徒雖不足以聳天下之觀聽而亦不至於激天下之多事也魏相尚不如申屠嘉周勃則不及蕭曹丙吉明矣語話皆應前面君子其可不為之辨明乎収拾此叚今觀班固之扵數子一概而論之引本出處作結尾且曰君臣一體相待而成見出處上文則夫蕭曺丙魏之得君行道是固不可以優劣辨先寛説未分優劣然獨扵魏相之嚴毅而謂其不如吉之寛見冒註終萹大意之本祖則班固之論盖亦深識乎天下治體而非泛然之論也應治體字猶之一身焉為康強無事之時宣帝時治勢如此而投之以决裂瞑眩之藥魏相之嚴毅如此非徒無益而又害之學孟子語此治體之説也囘顧主意字面固之論數子則亦主乎此而已矣聫上學者當以是求之収拾意盡謹論此是品藻去取題前篇取李廣為優而程不識為劣此篇取蕭曹丙三人為優而魏相為劣如戊集陳傅良山西諸將孰優論取蘓趙二人為優而其餘十二人為劣可以参看更有一様不分優劣者如闕東京之士孰優闕公卿賢良文學之議孰優是也此論續刋言外發意格此篇文法與漢吏㢘平如何論相似漢世良吏為盛陳耆卿出處前漢循吏傳序孝宣厲精為治五日一聽事自丞相以下各奉職而進及拜刺使守相輒親見問云云是故漢世良吏扵是為盛稱中興焉立説古者吏無不良安有良之名本非衰也安有盛之名為吏而名之以良且以為盛是傷古道之不復見也有如漢之髙恵文景非無良吏也未嘗誇之以為盛至宣帝時班固乃稱之云良吏為盛非真以為盛也意謂宣帝之吏治彰彰不復如古若高恵文景未得為衰則宣帝未得為盛班固以為盛者盖不滿之也當扵言外之意觀之批云議論層出意在言外老手也論曰吏治之有餘有餘字見盛意吏道之所以不足也不足字是不盛了謂之不足則是漢世良吏不如古者之盛治與道字是眼目夫古之為吏者古者之吏不與漢同不以治而以道治則誇以為盛道則不名以為盛道之所在喝上道字吏㤀於民而民㤀於吏㤀字見得未嘗有良與盛之名不惟民㤀之而吏亦自㤀其所以為吏矣良與盛之名何從而生當是時吏無不良也而安有良之名本非衰也而安有盛之名發出主意鳴呼為吏而使人名之以良而且以為盛有此名便是不足了是古道之可傷古者未嘗求良與盛之名君子之所甚不樂也名之盛寔之衰也豈人所願聞夫其不樂乎此粘上二字而乃侈言乎此謂班固説本文矜詡誇大似若真以為盛者喝出盛字也詡亦誇大君子豈真以為盛者哉班固本意不如此至是而後知言外之意非盛也衰也而喜之中有於邑也於邑見漢書成帝贊言之可為於邑註短氣也讀如本字又於音鳥邑鳥合反高恵文景無循吏把四君與宣帝比並形容出来至宣帝則有循吏彼無而此有則此若勝彼以有為盛則無者其衰乎冷語發眀然吾未見高恵文景之所以衰者以衰字反形盛字高恵文景未得為衰則宣帝未得為盛理是如此而班固猶以為盛焉固之意其微哉意在言外與結尾相應漢世良吏為盛請論之自唐虞以來不能以身為天下而必以吏為天下與接題古之為吏處相應以吏為天下則吏欲其盛宜矣且説古者亦要盛而或惡其盛何也設難然求之古人觧轉歸正未聞有良吏之名迹班班著見者應冒頭安有良之名盛之名意然則古無良吏歟再設難曰天下皆良吏故也解天下皆良吏則雖十典謨百雅頌若之何盡之良吏既多雖書與詩難以盡載此古之盛而非後世之所謂盛也喝出盛字古今有两様盖古之吏如春譬喻起再叙古之民如萬物之得春也古者氣象如此物之得春不以為恩應冒頭民㤀扵吏意春之蕩物不以為徳應冒頭吏㤀扵民意不恩不徳名安從生安有良與盛之名是有惨刻然後有忠厚有貪垢然後有㢘潔非彼無以形此名者常人之所驚常人則好名君子之所不忍君子不樂聞此名天下殘我得寛名衆殘而獨寛則天下受殘之禍者多不若天下寛我無所用其寛也有此名不如無此名天下汙我得清名衆汙而獨清則天下受汙之祸者多不若天下清我無所用其清也有此名不如無此名即是而觀後世吏之盛者乃吏之衰也喝出主意與冒頭相應秦人以威毒天下引秦来入漢如熏如炙刑法之惨如火之熏炙為吏者可想矣吏亦必惨漢之治變秦者也入漢来治變秦則吏當反秦吏亦當變秦之惨然漢之吏其可指者誰也引下面循吏傳所載之人班固豈沒人善者班固稱漢之良吏為盛非冺沒人之善循吏傳之立所載者六前漢循吏傳文翁王成黄霸朱邑龔遂召信臣而宣帝已居其五只有文翁一人是文帝朝自王成以下五人皆宣帝朝前此者何如也含髙恵文景意夫豈高恵文景爬搔拊摩以福天下者無一人能承其休徳邪反説四君之時豈無一人為良吏賈山至言天下之士莫不精白以承休徳衣食殖而刑措循吏傳漢興之初衣食滋殖又文帝紀幾致刑措風俗易而民厚前景帝贊移風易俗黎民醇厚謂數君一手足之所致不惟誣吏是並誣數君者非是數君之自為亦是得人之力然而有由也要引下意勞來膠東此王成也王成傳詔曰膠東相成勞来不怠流民自占八萬餘口吾意前乎此而能愛民者非止一王成也比乎此為盛教化潁川此黄霸也本傳詔曰潁川大守霸宣布詔令吏民鄉於教化吾意前乎此而能正俗者非止一黄霸也比乎此尤盛朱邑之㢘潔本傳詔日大司農邑㢘潔自莭退食自公龔遂之富實本傳遂至勃海勸民務農桑吏民皆冨實召信臣之興利本傳召信臣南陽太守為民興利務在冨實吾意前乎而能此者又非止二三子也比乎此尤為盛漢以休息生養為家法説漢初之涵育人才未至如宣帝時之刻核高恵濬其源濬深也文景洪其流洪大也亦云盛矣喝出盛字自武帝湮塞之而為吏者無復舊觀矣已不如髙恵文景時宣帝綜核信必所以起仆陶窳與天下更始者也本紀信賞必罰綜核名實云云與天下士夫更始仆倒也窳音庾釋云器中之空缺者故吏治至是而盛亦至是而衰應主意則名雖盛而寔衰有不若高恵文景之時六合一和氣也不如漢初之渾厚是故高恵文景則不載循史傳不載四朝良吏至宣帝則備載載王成䓁五人詳見前註備載者不得不載也言其少也不載者不勝載也言其多也吾亦何以知固之不載設問曰荅以呉公事知之舉吳公一人吳公治平為天下第一是可謂之良也言苐一則其良可知固特附扵賈誼傳吴公事附載賈誼傳循吏傳則無名焉却不為吳公立傳大者尚爾指吳公他所遺落者多矣不載其名者猶多倒引此事證本意斷得由是言之以下設疑問難謂高恵文景之循吏止於文翁者非也言四朝循吏止文翁一人則不是謂固扵高恵文景之循吏獨取於文翁者亦非也言固獨取此一人亦不是然其獨載文翁者何也又設問曰翁之治主扵興學文翁修起學宫扵成都詳見後萹注五人之治主扵愛民見前註載一文翁所以見高恵文景之循吏非宣帝比也有眼目且帝獨不見王成事乎又舉王成事名為循吏而因列之傳者王成也偽增尸口以欺帝者亦王成也舉此事斷得倒一人之身瑕瑜已不相掩况其他乎瑕疵也瑜美也既曰循吏豈可偽増户口且以此人居循吏之首其他可知又奚足謂之盛帝之綜核信必至是窮矣見前注固之所為深嗟而甚不滿也謂班固稱其為盛乃不足之也以其深嗟甚不滿之心而為善談樂道之言以不足而為有餘意在言外固之意㣲而顯也應冒頭繳處㣲字范曄傳循吏視固特倍東漢范曄作循吏傳凡十二人君子知其名盛於西漢而其實愈衰於西漢也名愈盛實愈衰宣帝中興主也舉題主固言宣帝循吏之盛足稱中興本題註曄言光武則譏其吏事之深刻而於中興之美有所未盡儒林傳序云云曄之貶帝是也貶其未盡之美然曄以貶為貶孰若固以褒為貶哉褒其盛實所以貶其衰以貶而寓扵褒也則㫖不廹謂班固其辭婉以貶為貶則迹太露謂范曄其辭直是又足以訂二子之優劣固為優曄為劣有判㫁觀史者當有權度含不盡意謹論可與庚集陳賾唐虞扵斯為盛論参看言外發意格此萹學漢世良吏為盛論文法漢吏㢘平如何葉觀光出處前漢循吏傳漢興之初反秦之敝云云至扵文景遂移風易俗是時循吏如河南守吴公蜀守文翁之属皆謹身帥先居以亷平不至於嚴而民從化立説古之為吏者㢘以處已平以待民未嘗求人之知至後世之吏則但求㢘平之名而已漢猶近古吏治有古人渾厚之風如吴公文翁之属大抵以㢘平自将而不求知扵人有㢘平之名而無㢘平之迹故史臣以吳公文翁之属而稱其㢘平不載它人者以此見吏治之盛不容迹觀批云文有發眀意亦近古末叚愈髙論曰盡其在我而不求其在人説為吏者當知以㢘平處已而不當求人之知此吏治之近古者也謂漢之吏治有古人渾厚之風夫為吏之患莫大於求人之知若欲求人之知則其㢘平必非出於中心之誠然自其急扵求人之知申上文而古人渾厚之風始㪚矣安得近古盖皦皦以自㓗者不足以為㢘非古者吏治之㢘表表以自白者不足以為平非古者吏治之平要之有形之可指不若無迹之可名也有㢘平之名不如無亷平之迹古之善為吏者正説惟知吾之處已不可以不㢘吾之持心不可以不平盡其在我至於人之知不知不暇計也不求其在人斯民相㤀扵徳教之中而聲績冺然扵形迹之外不必皦皦以為亷表表以為平而人自知之至使史無可書之事傳無可名之功暗形吳公文翁之属此其氣象涵蓄圭角不露無形迹之一可求豈若後世刻畫以求名者之所為哉非若後世求亷平之名若夫指一事而曰如是而為亷如是而為平吁亦淺矣如此則是求人之知了班固傳漢循吏有取於吳公文翁之属叙本文以属言者不可以一二數也演属之一字然而或㮣謂之属而不表其名本出處只說吳公文翁之属而不表他人之名或雖表其名而不著其傳如吳公則不立傳或為之立傳而亷平之迹復無所考如文翁傳只載興學一事而不述其亷平之迹固豈略於此哉謂班固非略之而不載以當時吏治近古無迹之可求或者漢猶近古而吏治之盛又不可以迹觀也應破題主意或者猶意者漢吏亷平如何請以是論古無忠義之名而忠義有傳自晉始晉書有忠義傳古無卓行之名而卓行有傳自唐始唐書有卓行傳愚讀史至此未嘗不深為世道嘆惜謂後世之求名不如古者之無迹士君子為國家任事所貴盡其在我而已照破題盡其在我主意正不必如是之表表也照破題不求其在人夫使人得以忠義卓行之名而歸之我或者已議其涵養之未深有此名已自不可而史氏又得以紀吾忠義卓行之迹以垂於世母乃圭角之太露乎况可載其迹乎上繳意甚矣人之好名也照好名意君子為名而為善則其善必不純映名字人臣為名而效忠則其忠必不盡郡縣之吏為名而為㢘平則其㢘與平也必非出扵中心之誠然映名字如此則是求其在人而不盡其在我引上三句映出此句亷平意凡此者皆吾分内事也而又奚以名為哉此為善效忠為亷平皆吾分内事豈可狥名名非古人之狥也應古人不好名意學前萹語意唐虞三代盛時上自岳牧侯伯下至邦邑都鄙非無吏也岳牧侯伯見書周官邦邑都鄙見周禮天官而未聞以㢘平著名者照名字豈唐虞三代之人物獨不逮於漢乎逮及也名之盛者實之衰也人必皆貪而後㢘之名始顯㢘之名以貪而後顯世必皆枉而後平之名始彰平之名以枉而後彰語學前萹良吏為盛論意以㢘平著名已非盛世事也古者不如此而况扵㢘平立名而欲人之知也乎後世不如古是當以世變厚薄論也古者不求名則為厚後世但好名則為薄且㢘平之名始於誰乎喝出㢘平二字豈非班固叙漢循吏有取於吳公文翁之属者乎叙本出䖏夷考其傳與叙循吏傳與叙或概謂之属而不表其名只説吳公文翁之属而不載他人之名或雖表其名而不著其傳如吳公則不立傳獨一文翁有傳而所紀載終始乎興學一事而㢘平之迹不傳固果何見哉三件俱應冒頭舉題處前文翁傳文翁為蜀郡守巴蜀地僻有蠻夷風文公欲誘進之乃選郡縣小吏有才者張叔䓁十人親自飭厲遣詣京師受業博士數嵗蜀生皆成就還歸子又修起學宫於成都市中招下縣子弟以為學官弟由是大化蜀地學於京師者比齊魯焉至今巴蜀好文雅文翁之化也以固為掩人之善耶且駁難班固則傳叙所載已首稱之矣已稱吳公文翁為苐一以固為世逺而無所攷耶再駁難班固則他傳所述不為不詳也循吏各人有傳已自詳載嗚呼此當以古論漢而不當以漢論漢也見得漢近古照主意古字何以言之有赫赫之名者其所發必淺應冒頭皦皦以自潔者不足以為㢘表表以自白者不足以為平意無彰彰之譽者其所養必深應冒頭吾之處已不可以不亷持已不可以不平至扵人之知與不知則不暇計意古之人非不以㢘潔自得也而未嘗沽激以為㢘古人之㢘非若後世之㢘非不以平易近民也而未嘗矯枉以為平古人之平非若後世之平吾惟盡職分之所當然而以安静和平之福遺天下遺去聲與之也應盡其在我而不求其在人意古人用心大抵然也古人不求名漢興至於文景去古未逺說漢猶近古意議論務為寛厚公卿耻言人過見前漢刑法志孝文躬修𤣥黙將相皆舊功臣少文多質議論務在寛厚耻言人之過失藹藹然君子長者之風見近古意而當時郡縣之吏不過承流宣化而已前漢董仲舒傳郡守縣令民之師帥而以承流而宣化也又安敢立異以為能哉不敢求亷平之名自其謹身而至扵帥民自其不嚴而至於從化無一而非㢘平之實見本題詳註初非指某事以為㢘指某政以為平以自表暴扵世無亷平之迹而民生斯時陶陶然春風和氣之内亦不知其孰為㢘而孰為平也應冒頭斯民相㤀扵徳教之中聲績冺然扵形迹之外意垂白之老至有終身而不見官府如古者氣象而莊胠箧民至老不相往来而老癃之民皆思見徳化之成前賈山傳山東吏布詔令民雖老羸癃疾扶杖而往聽之願少須叟無死思見徳化之成農桑萬里相朢隴畆之間史律書文帝曰今天下殷冨䗎火萬里而雞鳴犬吠達乎四境之内孟公孫丑云云謂非亷平之功不可也謂以是㢘平之迹亦不可也應冒無迹可求等語如是則史何從而紀之耶紀之其可勝紀耶説班固不詳載意嗟夫紀載如固品􅇨如固再演班固未盡之意稱其功而莫能名其所以功述其美而莫能盡其所以美只是無迹可求意兹其所以為近古歟又入近古字繳至於淳于公之㢘平亦齊中之所稱者見下註今不見齒於列傳而乃附載於刑法之志不見録於史氏而乃僅形扵少女之書前刑法志齊太倉令淳于公有罪當刑詔獄逮繫長安其少女緹縈上書曰妾父為吏齊中皆稱其㢘平今坐法當刑妾願沒入為官婢以贖父刑罪使淳于不被逮緹縈不上書萬世而下不復知有淳于之名矣觀此一事則知當時之人不好名固之所謂属者得非若人乎形容出属字好彼淳于之名特偶因少女一書而僅著接上文歸正説得極是其他無所托而傳以至於冺沒者又不知其幾人矣發明透徹名之存亾傳之有無與夫事之詳略又奚足為漢史之増損哉謂班固於循吏傳或載其人不足為史之増或不載其人不足為史之損是知㢘平之名亦固强以是而稱之説出㢘平非固本意吳公文翁之属亦豈樂聞此名也應不好名意盖嘗因是求之宣帝之朝又舉宣帝来帝以考核為能以苛察為明本傳考試㓛能又綜覈名實又見宣帝紀以苛為察以刻為明而當時人物亦莫不表表然求以自見便不如文帝時扵是朱邑以亷潔稱前朱邑傳神爵元年天子下詔稱揚曰大司農邑㢘潔累守節可謂淑人君子而黄霸以持平顯前黄霸傳宣帝在民間時知百姓苦吏急聞霸持法平召為廷尉正載之史策班班可考非不足為後人之美觀又謂宣帝時吏之亷平自見者多而氣象呈露又非漢初之比也應有形之可指不若無迹之可見意然則循吏之傳六宣帝居其五而文帝居其一循吏傳所載文翁王成黄霸朱邑龔遂召信臣只有文翁一人是文帝時循吏亦學前篇語意果孰優而孰劣耶若以不好名而論則文帝為優宣帝為劣愚謂文翁之守蜀又舉文翁説向㣲興學一事注見上則其功名事業又将與吳公俱泯賈誼傳帝聞河南守吳公治平為天下第一召為廷尉吳公無傳只附見於此平見得吏以亷平著見於丗者不知亷之名俱冺也而未必與朱邑黄霸等齒也學者試思之未謂朱邑黄霸䓁亷平皆有傳列于史譏宣帝朝非文景朝比謹論此二篇皆以吏治不好名為主意但前篇是貶本題此篇是褒本題不可不知立說出竒格與後篇十二律八卦之變論同格說天者莫辨乎易潘牥出處揚寡見篇或問五經有辨乎曰惟五經為辨說天者莫辨乎易説事者莫辨乎書說體者莫辨乎禮説志者莫辨乎詩說理者莫辨乎春秋立說揚子謂說天者莫辨乎易吾以為說易者莫辨乎乾盖以形體而言則謂之天以性情而言則謂之乾言天而得其性情之妙斯謂之善辨批云於數萬人叢中獨立此竒論主司安得不刮眼才調如此其魁天下也固宜論曰言天而得其性情之妙伊川云乾者天之性情此天下之至言也至言指莫辨字謂説天者至易而止說易者至乾而止夫天下之物名為不可測識者莫天若下語新知謂天至難而易言天之書也引易来説故世之言天者至易而止且據揚子所言然而轉天也者世可得而識也擺開上意天之所以為天者雖有善辨莫得而窺也所以為天含乾者天之性情意故昔者聖人之作易也用易係辭語其於陰陽變易之理無一而不辨應言天者至易而止猶以為未也生下意必求其所謂性與情焉主意何者設問穹然在上者天之形體淮南子天穹窿而固乎上穹高也健而無息者天之性情也伊川易傳云乾天也天者乾之形體乾者天之性情乾健也健而無息之謂乾形體者其顯也天也性情者其隠也乾也言天而得其性情之妙應破題主意則雖其隐而在内亦莫得而遁焉貫上隠字謂乾之性情遁逃也此非天下之善辨乎歸辨字上子雲曰說天者莫辨乎易舉題夫所謂辨者非形體之謂也性情之謂也應冒頭語是當於易之乾而觀之冒只説天之性情未説出乾字至此方説出亦得作論之體天下之物有可辨者有不可辨者䨇下辨字動吾知其為風潤吾知其為雨明吾知其為日月學史記老子傳言語此皆天之類也而猶有象之可辨者也此是天之形體若夫天者可得而知也擺上意應冒形體者其顯也若性與情者不可得而知也應冒性情者其隠也昔者聖人之未畫易也歸易上吾意天下之人蚩蚩而羣蠢蠢而食蚩蚩敦厚也蠢蠢無知也彼且不知天之為何物也且不知天之形體而况其中之不可名言者乎安知天之性情今夫人心不同有如其面左傳㐮三十一年子産曰人心之不同如其面也故世之觀人者於此毎失焉史記仲尼弟子列傳以貎取人失之子羽人藏其心尚不可測知也而况天乎以人之心測天之性情伏羲氏有憂之始為之畫八卦曰如是而天也易釋文序伏羲因河圖而始畫八卦文王周公又從而和之曰如是而天也揚問明文王重易六爻又問神易始八卦而文王六十四又釋文序周文拘扵羑里作卦辭周公作爻辭故扵蠱扵剥而得天之行易蠱卦終則有始天行也剥卦君子尚消息盈虚天行也於大有於無妄而得天之命大有卦順天休命无妄卦大亨以正天之命也於泰謙臨恒觀而得天之道泰卦后以裁成天地之道謙卦天道虧盈而益謙臨卦大亨以正天之道也恒卦天地之道常乆而不已也觀卦觀天之神道而四時不忒此天也皆言天之形體所謂性與情者果安在哉未言天之性情此易之所以為善辨也歸辨字上夫天專言之則道也分而言之則主宰其帝也功用其鬼神也妙用其神也乾其性情也伊川易傳夫天專言之則道也分而言之則以形體謂之天以主宰謂之帝以功用謂之鬼神以妙用謂之神以性情謂之乾乾健也易說卦健而无息之謂乾見前註此乾之所以為乾而天得之以為天者也乾者天之性情吾何以知健之為天哉喚起辨天陽物也易係乾陽物也秉陽而主健記禮運天秉陽埀日星天而不健則有時乎或息見下係詞注時乎或息則四時不行焉百物不生焉而天之道冺矣語陽貨天何言哉四時行焉百物生焉故曰健者天之性情也荅上問註詳見冒而作易者獨辨之扵乾焉又豈非天下之大辨乎發盡主意或曰設問正大天之情也吾求之大壮而得其情焉大壮卦正大而天地之情可見矣動天之心也吾求之復而得其心焉復卦復其見天地之心乎心也性也情也皆是物也疑大壮言情復言心與乾性情一様獨乾乎哉設難嗚呼觧乾易之門也易係乾坤易之門乾不作則易幾乎熄矣易係辭乾坤其易之藴邪乾坤成列而易立乎其中乾坤毁則无以見易易不可見則乾坤或幾乎熄矣何有於復與大壮哉無乾則諸卦皆無矣此子雲說天者莫辨乎易舉本文而吾亦謂說易者莫辨於乾也發出主意雖然觀天自易始觀易自乾始觀乾自四徳始發明性情之說言語簡截四徳者何設問元亨利貞是也解夫此四徳者他卦莫得而有焉惟乾有之是其所以為乾也諸卦皆無四徳惟乾獨有四徳故仲尼於乾亦曰元亨者始而亨者也利貞者性情也文言云云用此尤妙然則天之性情在乾而乾之性情又有可得而辨者又在四徳上愚故并及之謹論此是福州解試論人所罕見真高作立説出竒格與前篇說天者莫辨乎易論同格十二律八卦之變如何徐玉潔出處晉律厯志六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終於南吕六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也十二律釋云六律陽聲黄鍾太簇姑洗蕤賔夷則無射也六吕陰聲大吕應鍾南吕林鍾中吕夾鍾也八卦乾坤艮巽震離坎兌也立說十二律為六十律八卦為六十四卦是氣數之所相生者為不一然十二律始扵黄鍾八卦始於太極則是氣數之所由生者為至一盖一者萬變之所由始也一不立則不一者不可得而見無所始則生生之機亦息矣批云處難題於平易變腐語為新竒直是庖丁手段論曰知氣數之所相生者為不一指十二律與八卦當知氣數之所由生者為至一指十二律始於黄鍾八卦始於太極夫物莫不有始始字説所由生之意一者萬變之所由始也始於一一不立則不一者不可見無所始則生生之機亦息矣含無黄鍾則不能生十二律無太極則不能生八卦意彼其陰陽互根周子太極圖太極動而生陽静而生陰一動一静互為其根剛柔相盪易繫辭剛柔相摩八卦相盪演而伸觸而長同上引而伸之觸類而長之律之變不一也卦之變亦不一也且説十二律八卦之不一然孰主張是孰綱維是用莊天運全句必有至一者以為之本也含黄鍾太極意盖律始於一黄鍾卦亦始於一太極自是一肇形而渾然全體已具乎其中黄鍾生十二律太極生八卦則所以變而通之者孰非此一之流行著見哉人徒見律之有十二五其十二而為六十一律生五音五个十二律便成六十律卦之有八八其八而為六十四一卦生八卦八个八卦成六十四卦則曰此變之不一者然也應不一字不知六十律一律也六十四卦一卦也應至一字一者何在卦為太極在律為黄鍾之宫是也主意在此二句十二律八卦之變如何愚請以是推廣志晉律厯者之說本題出處大哉一乎就一字說其氣數之樞紐乎樞紐字用朱文公語樞如户之樞紐如衣之紐言要𦂳䖏两儀至大也萬物至衆也言氣數之所相生者為不一苟非至一黙有主宰乎其間言氣數之所由生者為至一則陰不能以生陽陽不能以生陰何以極其不一之妙哉應接題一不立則不一者不可見有如十二辰之變至扵六十若不一矣此十二律至扵六十律見晉律厯志而始於至一者甲子是也比十二律始於黄鍾八陣之變至扵六十四若不一矣比八卦至扵六十四卦蜀諸葛孔明作八陣圖而始於至一者握機是也比八卦始於太極握機陣名是以龍圗始出之時伏羲所畫者八卦耳易釋文序伏羲因河圗而始畫八卦又昔伏羲之王天下也龍馬出河遂則其文以畫八卦謂之河圗而六十四卦之全體已存不待文王而後重文王重易六爻為六十四卦鳳鳴始聽之日黄帝所造者十二律耳漢律厯志十二律黄帝之所作也使伶倫取竹之觧谷其竅厚均者斷两莭間而吹之以為黄鍾之宫制十二筩以聽鳳之鳴䧺鳴為六雌鳴亦六以比黄鍾之宫皆可以生之是為律本而六十律之全體已具不待焦延夀而後著同上元帝時京房知五音六十律之數上使元成問房於樂府房對受學於故小黄令焦延夀六十律相生之法云云詳見題注律之始於十二而衍於六十六十律卦之始於八而成於六十四六十四卦此皆造物之實理總律與卦言非天下之至變孰能與扵此用易繫辭語變字結上生下雖然此雖然字要過講中意非是自為一叚有本焉本指黄鍾太極學孟子語君子不謂變也擺上變字言十二律八卦之變觀係辭易有太極之言易係辭上史傳黄鍾為律本之語見漢律厯志上注主意本此两句則知律之與卦必有至一者以立其體而後不一者始得以妙其用也應破語今夫黄鍾下生林鍾林鍾上生太簇而終扵中吕則十二律者其始變也晉律厯志黄鍾之宫律之本也下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賔蕤賔下生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕中吕上生執始執始下生去滅而終於南吕則六十律其再變也見本題注然變則變耳擺上意獨不曰生十二律者其黄鍾乎歸主意十二律始於黄鍾之一以乾索坤為震坎艮以坤索乾為巽離兌則八卦者其始變也説卦震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女以蒙次屯以需次䝉而終於未濟則六十四卦者其再變也序卦屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之穉也物穉不可不養也故受之以需云云故受之以未濟終焉然變則變矣擺上意獨不曰生八卦者其太極乎歸主意八卦始扵太極之一吁律之有黄鍾猶易之有太極總上文照主意無黄鍾則十二律無聞矣况於六十乎黄鍾十二律之本無太極則八卦且冺矣况於六十四乎太極八卦之本不觀本本原原之所自出則無以見生生化化之為不窮矣應一不立則不一者不可見無所始則生生之機亦息矣自其不一者而觀之學蘓東坡赤壁賦自其變者而觀之句法則由雌䧺迭鳴而為十二見前鳴鳳始聽注由十二而為六十焦延夀制為六十律律何其繁也此律之不一者由竒耦相錯而為八陽數竒陰數耦因竒耦而畫八卦由八卦而為六十四文王重為六十四卦卦何其多也此卦之不一者然自其至一者而觀之學赤壁賦自其不變者而觀之句法則六十律本十二律也十二律本一黄鍾也主意六十四卦本八卦也八卦本一太極也主意知乎此則由一以盡變而天下之能事畢矣繳盡晉史論律卦之變舉本文必有取於司馬遷太極黄鍾之說其有見於此乎本出處下文故律厯之數天地之道也司馬遷八書言律吕粗舉太經著於前史則必太極元氣函三為一而始于子十二律之生必所起焉云云以為黄鍾之法又叅之律云抑嘗論之黄鍾者氣之母而數之首也此太極元氣函三為一之始也見上注古人作厯必以十一月朔旦冬至起厯者盖謂此也見漠律歴志盖萬物孳萌於子而陽氣施種扵土中則黄鍾之律應焉同上黄鍾之律長九寸十一月冬至之氣應焉盖陰陽合得氣鍾於子而化生萬物又云鍾者種也故陽氣施種於黄泉孳萌萬物為六氣元也其於卦氣則為中孚與復焉黄者中之數故扵卦氣為中孚黄鍾者陽之始故扵卦氣為陽苟求其故則千嵗之日至可坐而致也用孟子語班固之志漢厯始言八卦繼言十二律而終之曰黄鍾為天紇太極運三辰五星班固律厯志自伏羲畫八卦由數起云云推厯生律云云律有十二又三綂者天施地化人事之紀黄鍾為天綂云云自太極運三辰五星於上而元氣轉三綂五行扵下於不一而求其至一固其得之矣収拾題意固志廣遷書者也班固十志廣司馬遷八書讀晉志而叅之以遷固則思過半矣總結一萹之意謹論論學繩尺巻六
