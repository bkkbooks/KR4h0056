body:
  text: 論學繩尺巻四宋魏天應編選林子長箋解摘字貫題格此篇與任翊龍文帝道徳仁義論同格太宗英武仁恕如何葉大有出處唐刑法志太宗以英武定天下然其天姿仁恕云云遂以寛仁治天下而於刑法尤謹立説此篇就出處天姿立説謂太宗之仁出於天性故發為英毅者此仁也著為武功者此仁也推為及人之恕者亦此仁也以此見君德發於運用之地無非原於君德一念之天也考官批云就本文立說議論有據文字明潔真佳作也論君德於運用之地太宗英武恕不若原君徳於一念之天太宗之仁天朱文公云仁者一念之周流貫徹以大有為之君語出孟子出而宗主民物含太宗定天下意舉天下之人莫不畏服而愛戴畏服是英武愛戴是恕此其君德之大應君德字固足以震動天下酬酢一世且先說太宗之英武恕然要其運用設施之本含仁意則必有一念之天流通乎其間也應破題一念之天字何者設問仁者天理也張南軒曰克盡已私天理渾然斯為仁矣根於一念之微應一念字推而及人則為恕朱文公曰推已及人則恕也用以定天下則為英為武本題注太宗以英武定天下一念所形初無限量主意盡見於此且無泛語太宗造唐葢得諸此入得簡快方其仗義之初唐本紀義兵為天下起已勃然有拯民塗炭之心指英武反唐張行成傳太宗撥亂正拯人塗炭而定天下之後終不忘其哀矜恤刑之意指恕云云見本文於刑法尤謹書吕刑皇帝哀矜庶戮之不辜是非偶然而發也引下文至於一念流行彰著一念之仁自有所不容揜耳太宗之英武恕皆自一念之仁得之吁知太宗之天照破題天字斯可以論太宗之德矣照破題德字太宗英武仁恕如何愚請因史氏之說而歸之於仁嘗謂君人之徳莫盛於唐虞三代思古面引此為後用莫衰於後世傷今後亦引此為面用而猶僅見於太宗便入太宗來是何也虚設問謂時有先後而德有盛衰歟應前盛衰字則後乎唐虞三代前乎太宗總前文其能如太宗者葢寡且說太宗好處未說出主意而太宗之姿應本出處天姿字可與為堯舜唐魏徴傳逺輩堯舜可與為湯武本贊比迹湯武可與富民而措刑此段文法自蘇東坡上皇帝萬言書中來是則德之盛衰不以時之先後論矣荅上問亦應盛衰先後四字然而君德之盛以過人者其必有所本也本字應冒頭運用設施之本字嗚呼無亦本諸一念之天乎照主意應破題語天者何仁是也露出仁字仁者上天生物之心而帝王得之以仁天下朱文公曰仁者天地生物之心而人得之以為心者也是以一念之天涵育渾融周流貫徹此是仁推仁之心則為及人之恕有仁則有恕發仁之勇則為服人之英武有仁則有英武照主意唐虞三代之盛德引證焉有不本於仁哉引原題莫盛於唐虞三代句正説為證謂唐虞三代之君有英武與恕皆自仁中來是故矜孺子莊子天地篇堯曰嘉孺子而哀婦人惠困窮書太甲先王子惠困窮不敢侮于鰥寡康誥文王克明德謹罰不敢侮于鰥寡此仁之推也仁中之恕聖神之運大禹謨帝德廣運乃聖乃神勇智之表正仲虺之誥天乃錫王勇智表正萬邦明德之廣大大明詩注文武相承其明德日以廣大此仁之至也仁中之英征有苗大禹謨惟時有苗弗率汝徂征戮防風家語禹戮防風氏與夫一怒而安天下之民孟子梁惠王文王一怒而安天下之民此仁之有勇者也仁中之武後世人主豈無志於帝王之盛者引原題莫衰於後世句反說為證謂後世之君不及帝王者惟其不仁所以無英武與恕惟夫猜忌以害仁是自小其天也唐德宗贊猜忌強明自任而何以盡推已之恕無仁則無恕以力而假仁是自拂其天也孟子公孫丑上以力假仁者霸而何以有定功之武無仁則無武内多慾而外施仁是自棄其天也前漢汲黯傳武帝内多欲而外施仁義拂天棄天等語是學蘇老泉上田樞宻書其名曰棄天其名曰䙝天其名曰逆天等語則雖有英偉之資祇以自弊而已無仁則無英毅明正證反證委曲詳嗚呼世變愈降仁心寂寥結上生下孰謂太宗之造唐而猶有帝王之用心歟引入講腹觀帝以百戰取天下先説太宗英武定天下叱咤風生指顧電掃狀英武意如吕温銘語其英武固可想矣太宗英武而俄焉施德敎太宗之仁尚忠厚太宗仁撫摩長育哀矜惻怛為愛民恤刑之舉太宗之恕見本出處是果何見哉設問吁於此可以觀太宗之天矣照主意自黄初以來魏受漢禪改元黄初天下之人牧未有不嗜殺人者用孟子梁惠王上全句此是不仁而一世之人必有濟世之仁者以主之須要仁豈徒角智力以長有天下哉謂自魏以來後多不仁之君豈終無仁人以為民主故其安民一念萌蘖於潛龍之初本紀其年幾冠必能濟世安民乾初九潛龍勿用而所禀之天已足為衆善之長矣照主意天字是仁乾卦元者善之長興義師太宗十八舉義兵除苛政題下文除隋虐亂可謂仁矣仁心之發用仁之恕去功利權萬紀傳奏宣饒可鑿山治銀帝曰公不推賢進善乃以利規我斥使還第施仁義魏徴傳此徴勸我行仁義既効仁心之流行仁之恕縱囚覆罪題下文親録囚徒縱之還家期以明年秋即刑及期皆至無後者帝嘉其誠信悉原之平獄緩刑題上文詔死罪皆三覆奏仁心之浹洽仁之恕天日之表足以奪姦雄之醜真英主也本紀龍鳳之姿天日之表又李宻見帝曰真英主也而辭色之假人是不止於英毅而已也通鑑本紀上神采英毅見人奏事必假以辭色仁之英雷霆之威足以整乾坤而清六合此武功也陸贄傳太宗威行如雷霆而文德之綏海内是不止於武功而已也唐禮樂志朕雖以武功興終以文德綏海内仁之武夫天下固未有不仁而能終身以行恕者語子貢問曰有一言而可以終身行之者乎子曰其恕乎已所不欲勿施於人而帝王之定天下亦豈徒恃威武而能濟哉必有仁斯有英武恕吾故曰太宗之德凡見諸運用之地者皆根本乎一念之天者也照破題主意史氏之志刑法見本題注論其定天下以英武而稱其天姿之仁恕本文至其所謂恕者且以仁先之有撥剔豈不曰仁者天理之全體本乎人主之一心以仁為主囿乎吾天者則推之以恕推此仁以為恕梗乎吾天者則震之以英武推此仁以為英武隨出而為用英武恕皆自仁中出而天者固不泯耶不走了天字不然何其愛民之深見前注恤刑之至本出處而待天下以君子長者之道也結大講意盡議者又曰設難結恤刑仁也奚為不恕於藴古本紀殺大理丞張藴古疑太宗未恕寢兵亦仁也又奚為耀武於遼東髙麗傳貞觀十九年拔遼東城又見下注武疑太宗未英太宗之仁亦少貶焉如此則太宗未為仁吁是豈天姿之未髙耶疑辭或者學力之未到也又添學力意揚先抑後揚先後抑作漢唐人君論法也此先抑太宗而終又揚之畢竟太宗是賢主嗟夫一刑雖暴未幾而有覆奏之令注見大講中一役雖過還歸而思仁義之臣魏徵傳遼東之役云云軍還悵然曰魏徴若在吾豈有此行耶亦可以見天理流行不可泯沒者也此是太宗一念之天以帝王之天姿加之以帝王之學力有天姿又有學力則純乎仁矣則太宗之德純乎天矣又應天字嗟夫又豈可以盡歸之天姿哉含學力意議論委曲有味摘字總題格此篇與太宗英武仁恕論同意文帝道德仁義如何任翊龍出處前漢東方朔傳云云臣願近述孝文皇帝之時以道德為麗以仁義為凖於是天下望風成俗昭然化之立說漢文帝本是仁君故其道徳義皆從仁中發出向使文帝無此仁則為欲而不為道為偽而不為德為利而不為義矣其主意本於朱晦庵四端以仁為主議論宫敎黄叔度批云立說祖闗洛語話行文有前輩典刑清宻而敷暢圎活而老成數十年來罕見此作又批冠塲以論取一念之天以仁為主衆理之會也道德義流朱晦庵云仁之體用周貫徹專一心之妙而為衆善之㑹也夫理者全美之地也道德義而仁者則其一念之天也露出仁字應起句大哉仁乎主意其人主所以㑹衆美之之本乎道德義皆從仁中來何也仁者天理也朱晦庵云克已復禮為仁言能克去已私復乎天理則此心之體無不在此心之用無不行也而衆理者則此仁之推也同上仁之為道衆善之源萬行之本莫不在是人主此心能充乎此仁之天以仁為主意則由之者為道說出主意分曉之韓原道由是而之焉謂道得之者為德揚問道篇道以導之德以得之處之者為義伊川云處物為義旁通曲暢無往非理有仁則有道德義否則一念之仁未充理以欲晦天以人汨安能㑹衆善於一身哉無仁則無道德義昔之聖人再正說援引古者入本題來惟其盡仁道之極主意而後備君德之全道徳義三代而下仁道之盡者難而君德之備者鮮矣無仁則無道德義一代賢君以其一念之仁主意應起語發而為衆理之㑹道德義或者見其所行之道所履之德所施之仁所斷之義則合而歸之曰是其為道德仁義全美之君也且把道徳仁義分開說噫是固未能如古人全美之地也先抑抑亦知斯美之所以全者乎又轉含仁中有道德義意漢文帝仁君也主意後揚而方朔以道德仁義歸之敘本出處若朔者其亦知帝所到之地道德義而未知帝所禀之天者歟仁蓄含未說盡此是論手文帝道德仁義如何請廣其説且古今之言道德仁義者堯舜而下其惟三代乎應冒頭昔之聖人語孟子之論三代也嘗言其道矣孟梁惠王上養生喪死無憾王道之始也嘗言其德矣孟公孫丑下以徳行仁者王亦嘗言其義矣孟萬章上夏后殷周繼其義一也至論其所以得天下者則斷之曰仁孟離婁上三代之得天下也以仁其失天下也以不仁彼豈無見哉結上生下葢仁者天地生物之心而聖人得之以為心者也朱晦庵云云此心之天不為物奪不為私汨則其見於三綱五常者人謂之道三綱君為臣綱父為子綱夫為婦綱五常仁義禮知信見於躬行踐履者人謂之德前谷永傳王者躬行道德見於裁處斷制者人謂之義記表記義者天下之制疏云制謂裁斷於事又朱晦庵云云其名雖殊其理則一晦庵云云是故論君德者不難至於全美之地道德義而難充乎一念之天仁齊宣之欲行王政道也而不足為道孟梁惠王下齊宣王問曰云云孟子曰夫明堂者王者之堂也王欲行王政則勿毁之矣宋公之不禽二毛德也而不足為德左僖二十二年楚人伐宋宋公及楚大戰于泓云云公曰君子不重傷不禽二毛注云二毛頭白有二色桓文之尊周義也而不足為義桓公尊王室晉侯朝于王之齊桓有召陵之師晉文有踐土盟何也不仁故也歸在仁上此段文法自賈誼過秦論中來葢仁則公正不仁則私反闗雙一正一反説仁則理正不仁則欲反議前輩論理欲之間公私之界極好說盡主意道欲交焉書大禹謨人心惟危道心惟微又晦庵云天理之公卒無以勝人欲之私德偽判焉書周官作德心逸日休作偽心勞日拙義利別焉孟梁惠王上亦有仁義而已矣何必曰利嗚呼此論文帝之道德仁義者所以必先論文帝之仁乎引入大講夫帝之仁葢庶幾乎帝王之仁也語有斟酌應題下語賢聖仁孝聞於居代邸之時先說文帝之仁帝文帝本紀文皇立為代王宋昌曰大王賢聖仁孝聞於天下寛洪仁厚著於化天下之日魏文帝典論文帝慈孝寛洪仁厚美聲塞於宇宙又東方朔傳天下望風成俗昭然化之此其識見宏濶氣象廣大葢與天地同量與造化侔功且說文帝之仁體博則用必宏本固則末必茂含有仁則有道德義意帝之仁如是其至故發而為道德則有純厚之道德有仁則有道徳純鼂錯傳陛下道德厚元元之民幸矣發而為仁義則有公恕之仁義有仁則有義文中子天地篇大哉七制之主其以仁義公恕統天下乎終之以禮樂則三王之舉也一念之形衆善之㑹也應起語或者則曰躬行𤣥嘿之道畧抑文帝方見文字有宛轉無此段則直了化本紀叙傳太宗穆穆允恭𤣥嘿民以躬帥下以德非執中建中之所謂道謂文帝之道非古聖人之道懋書大禹謨惟精惟一允執厥中又仲虺之誥王昭大德建中于民恭儉謙遜之德後張綱傳文帝恭儉守節又賈誼傳誼以為漢興二十餘年當興禮樂文帝謙遜未遑也非聖神文武之所謂德謂文帝之德非古聖人之德書大禹謨帝德廣運乃聖乃神乃武乃文奄有四海為天下君繫絳侯誅薄昭之義絳侯周勃本傳勃恐誅常被甲其後人有上書告勃欲反下廷尉逮捕治之又太后傳薄昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自刎昭不肯使羣臣喪服往哭之乃自殺非行一不義殺一不辜之所謂義謂文帝之義非古聖人之義孟子云云其為美者未純則其為仁者未必至略抑之噫轉歸正意帝之道非純乎無欲也應題下道欲字帝之德非純乎無偽也應題下德偽字帝之義亦非純乎無利也應題下義利字字應冒頭未能如古人全美之語獨其一念之仁天理洞徹却揚文帝之仁其私者終不勝乎公應題下公私字其欲者終不勝乎理應題下理欲字虚靈精粹之天不為外物之所終蔽私與欲是不仁公與理是仁則其發見於外者有不容揜爾惟有仁故有道德義乾之元仁也易乾卦元者善之長也君子體仁足以長人其見於四德者皆元也伊川程頤云四德之元猶五常之仁偏言則一事專言則包四者帝之仁固不敢語此下語有稱停然道德仁義同一仁其猶元亨利貞同一元乎本題議論本祖此物晦庵云元者生物之始於時為春於人為仁亨者生之通於時為夏於人為禮利者生物之遂於時為秋於人為義貞者生物之成於時為冬於人為智愚觀遷固之贊帝也極口稱道前後皆不出乎嗚呼仁哉之一辭見得文帝之仁内本紀贊是以海殷富興於禮義嗚呼仁哉噫是知帝之仁者矣是可以論帝之道德仁義者矣彼方朔何足以知帝哉入出處貶方朔不知文帝之仁雖然帝之天定矣天字是起句主意字面而帝之養其天者則未粹也歸在學力上來夫帝王有道德仁義之資必養之以道德仁義之學而又輔之以道德仁義之人故其所充者必宏所詣者必至帝王有所養而後有道德仁義黄老之好帝之學非道德仁義之學也末貶文帝本史律書孝文好道家學又漢儒林傳孝文好刑名之言竇太后又好黄老術絳灌之徒帝之人又非道德仁義之人也絳侯周勃灌嬰徒以資質近王道之性往來於刑名功利習尚之中得先儒議論一念之天文帝之仁其梏亡之時多矣孟告子上則其旦晝之所為有梏亡之矣然則後之有仁心仁聞出孟子而盡道德仁義之理者有文帝之天資又當有帝王之學力大凡做論先揚則後抑先抑則後揚此題先揚文帝至此不容不畧抑之前篇摘出仁字謂太宗之英武恕皆自仁中出此篇亦摘出仁字謂文帝之道德義皆自仁中出是同一機軸可以參看順題發明格孝宣招選茂異劉自出處前漢公孫𢎞等贊孝宣承統纂修洪業亦講論六經招選茂異而蕭望之梁丘賀韋𤣥成以儒術進劉向王褒以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黄霸王成龔遂鄭𢎞召信臣尹翁歸趙廣漢張敞之屬皆有功迹見述於世立説茂材異等者非常之才也宣帝有非常之見其精神心術足以聳動人才於未招未選之先故非常之才出為時用夫苟以常法而求非常之才則彼且以茂異自負安肯局於瑣瑣拘攣之中正恐招之而未必來選之而未必應也批云議論精神首尾相應格致甚新可為矜式論曰人主以非常之見用人人主指宣帝用字指招選非常字是主意則非常之人用矣茂材異等是非常之人夫非常之人粘上非常之人不可以常法求也常法便不是非常之見必有非常之君出而興起作新於其上暗指宣帝意氣之所招徠隨感隨應主意此是非常之見自有不約而孚者孚者信也冒元本云雲龍風虎隨觸隨應非頭語此係後改本否則下之人方且以其表表特異者自負指茂異之人而上之人乃欲以瑣瑣常度而致之應以常法求之吾恐招之未必來選之未必應亦有望望焉去之而已以上反説去用孟子望望然之語彼人才當漢宣之世何其幸歟入漢宣帝且其英銳之資厲精之政此是宣帝非常之見精前魏相傳帝始親萬機厲為治已足以挽天下之風聲氣習應招徠感召意而興起人才於未招未選之先者主意况夫招之愈勤選之愈實説招選二字則一時人才號為茂異間見特出指茂材異等之人孰不願得是君以為之臣而與之共圖天下事功之㑹哉自然出為時用吾以是知帝之招選茂異固有在於精神心術之微主意應破題非常之見意而不在乎區區詔令科目之常者矣應接題常法意孝宣招選茂異請因班史之言而求其所謂招選者不脫招選二字夫茂異之名起於誰乎且推原茂異字其豈非自武帝詔察吏民之有茂材異等者始乎舉一個茂異為證異武帝紀元封五年詔令州郡察吏民有茂材等可為將相及使絶域者吾觀其所謂茂異則曰非常之人也同上詔葢有非常之功必待非常之人此篇非常二字葢得諸此曰士或有負俗之累而立功名也同上詔士或有負俗之累而立功名曰可為將相及使絶域也注見上夫為將相使絶域此豈小任哉接上文作譏論而雖負俗者不之靳注見上靳惜也殆亦非古人之所謂非常者畧折倒非常字然而所求之才雖未必皆是又畧扶起而所以求材之意則是也意字便含非常之見意何者虚設問雄材大畧之資此武帝非常之見武帝贊雄材大畧固足以號召一世起其精華而作其懦惰之氣應意氣招徠字自有相孚於不言之表而觸其天機之自動者也以武帝之雄材大畧而能號召一世之士比宣帝之精神心術而招選茂異之才孝宣之精實固非如武帝之疎宕宕音蕩酌下語有斟而於登明選公之道往往得之精神心術之所感觸應主意則大似有家法者存也謂宣帝得武帝之家法何也虚設問漢自髙皇以來又自髙祖說來所以奔走英盧韓彭之徒者猶是術也英布盧綰韓信彭越是奚獨武宣為然哉髙祖亦以此術駕馭豪傑非特武宣為然且宣帝所用之人才正入宣帝來其去髙皇武帝亦不甚逺也結上文吾固不敢望其如舜之於臯語舜有天下選於衆舉臯陶不仁者逺矣湯之於尹同上湯有天下選於衆舉伊尹不仁者逺矣文王之於望荀子解蔽篇文王能用吕望而身不失道以大有為之君得所不召之臣用孟子語以間世之賢遇間世之聖應非常語道同志合精交神契如彼其光明盛大者謂宣帝固不能如舜湯文之用人為後面張本而一時人品如蕭韋諸公之儒雅本題注蕭望之韋𤣥成以儒術進如劉向王褒之文章同上劉向王褒以文章顯相如丙魏同上相丙吉魏相將如張趙同上將則張安世趙充國治民如龔黄召尹輩同上治民則龔遂黄霸召信臣尹翁歸之屬往往皆過人一等狀茂異字非惟當時鮮儷鮮少儷匹也而後世亦罕與儔伍罕少也儔伍儕輩也只是過人一等之意且其寛嚴之相濟丙吉寛魏相嚴文武之並用張安世文趙充國武循吏能吏間錯州郡前王吉傳趙廣漢張敞皆有能名又循吏傳黄霸王成朱邑龔遂皆有傳經學詞章尊飾朝廷蕭望之韋𤣥成梁丘賀皆以儒學顯劉向王褒皆以詞章顯下至政事文學法理之士咸精其能宣帝贊政事文學法理之士咸精其能而間出特異者茂異舉而加之其上招選莫不名孚而實稱器識髙而才量宏形容茂異字以其得於天資氣禀者如彼其茂露出茂字而下視乎嗤嗤横目之民如此其異露出異字帝何以招之選之若是至哉問起招選字噫是殆未可以形聲求也是殆非詔令之所能搜訪科目之所能網羅者也謂非以此招之選之之應接題不可以常法求之意又含精神感召意且以周宻如帝本紀孝宣樞機周宻信必如帝同上信賞必罰綜核名實如帝同上綜核名實刷滌而磨刮作新氣象叩觸而震撞振起氣象感人動物氣象概可想見應冒頭興起人才於未招未選之先黄鍾萌動律吕相宣譬喻氣類相感意鳶飛魚躍之下夫孰無拔茅連茹之思中庸鳶飛戾天魚躍于淵又易泰卦拔茅連茹以其彚征吉而且彈冠以相慶者前漢王陽在位貢禹彈冠吾固知數公者已自興起於帝之精神心術之中應冒頭帝之招選茂異固有在於精神心術之微非有待於招之勞選之勤而後至也應冒頭不在於區區詔令科目之常或者見元康之詔特有茂才異倫之求又舉一个茂異事為證下本紀元康四年詔遣大夫循行天察吏治得失舉茂才異倫之士以為帝平時所招選之意敷露於此或者之見如此亦孰知其所以招徠而感召之者固有其素哉招徠感召在於精神心術之微大扺君臣遇合之難而天時人事相符之尤不易演餘意不招之招其招也以氣主意不選之選其選也以神主意所求乎此者不應則所設乎彼者亦文而已矣精神意氣不能招徠則其他或設科目特具文而已况以人才之茂謂之異再說茂異字則其資禀必出乎物表此是茂其智識必照乎幾先此是茂其志趣必不投時人之趨向此是異其議論必不合乎鄉原之好惡此是異斯孟盡心下何如可謂之鄉原矣曰何以是嘐嘐也言不顧行行不顧言云云故曰鄉原徳之賊也殆將與斯世確乎其難合應冒頭彼方以茂異自負不有英主孰從而振拔之哉歸在人主非常之見上吾故於本始地節以來宣帝二年號人才遇合之盛而有感乎孝宣之為君也繳盡講題意雖然帝之所以得非常之才者精神心術之流弊歟先揚後抑作漢唐論之法如此夫周宻太甚則幾深周宻之過信必太過則令嚴信必之過綜核之政太精則一振之餘無復餘味綜核之過講周宻信必綜核與腹相應帝亦反而思之否乎抑宣帝人品如丙魏亦嘗以是為格心之事業否乎併責丙吉魏相心孟子惟大人為能格君之非吾故曰宣帝所用之人才吾不敢望其如舜之於臯湯之於尹文之於望者此也謂宣帝用精神心術太過故所用之人才不能如此數人與講腹相應所謂如常山蛇勢者此也謹論順題發明格此篇與孝宣招選茂異同看漢屈羣策樓昞出處揚子重黎篇或問楚敗垓下方死曰天也諒乎曰漢屈羣策羣策屈羣力楚憞羣䇿而自屈其力立說謂漢髙帝之智術出於天下之上故能屈天下之謀策如使我之智術與衆人一等則苟有智術者必思與吾角立皆將有求伸之心矣又安肯屈服於吾之下哉批云立説髙行文健有氣骨有學力可歎可服論曰不以智術視智術屈羣䇿必有以髙天下也謂髙帝有髙天下之見方能屈之夫天下無兩立之勢含屈伸兩字有屈則有伸一屈一伸便是無兩立之勢伸於此則屈於彼我伸則彼屈然而御天下之權暗指髙帝要當使在我者常伸在彼者常屈發明主意苟惟戰天下於智術之中反應智術字使天下之英雄豪傑懷竒負智以投於我者此是謀臣策士皆有求伸之心求伸便是不屈了則角立分裂無有紀極必與我爭勝負安有終窮尚安得為我之用哉如何屈得善御英雄者則不然暗指髙帝不以天下之智為智應不以智術視智術意常使天下之士謀策之士奔走服役喪其所有喪失也聽命之不暇如此方是屈我雖不求以服乎彼而彼自不得不屈於我不求屈之而彼自屈此非有以髙天下者能若是歟應必有以髙天下意是意也惟漢髙帝得之尊本題故揚子雲曰本出處漢屈羣策異乎楚之自屈者矣為後面張本夫自罾魚唱禍前漢陳勝吳廣傳勝曰誠能以吾衆為天下倡宜多應者云云乃丹書帛曰陳勝王置人所罾魚腹中卒買魚烹食得書怪之山鬼獻璧史始皇紀使者過華陰有人持璧遮使者曰為吾遺鎬池君因言曰今年祖龍死因忽不見置其璧而去注武王居鎬祖始也龍人君象天下無秦匹夫大呼呼去聲謂陳勝吳廣也麋沸雲擾如麋之沸如雲之擾紛紛籍籍言亂也未知鹿死誰手晉石勒曰朕若遇光武當並馳中原未知鹿死誰手一時豪傑雷動響應賈誼過秦論天下雲合響應山東豪傑遂並起而亡秦挾智謀策畧之資駈馳於中原者葢未始有定向也言天下未歸漢又見上注劉季眇然泗上一亭長耳髙祖紀姓劉字季及壯試吏為泗上亭長秦法十里一亭亭長主亭之吏也曽無服人之素言其素無服人之能沛中子弟多所願附同上沛中子弟聞之多欲附者仗劎一麾豪傑並起異姓諸侯王表漢繇一劎之任五載而成帝業雖以磊落竒偉之英謀臣策士亦莫不俯首受制於皁櫪之下以願獻其謀効其力皁櫪養馬之所意言羣䇿屈服之吁是果何自以得此哉設問意其待人之際體貌推隆故士樂為用意其是疑辭多本紀體貌竒異然而解冠嫚罵其如禮何前張良傳四皓曰陛下輕士嫚罵又酈食其傳沛公不喜儒諸客冠儒冠來者沛公輒解其冠溺其中矧夫謀臣䇿士又非體貌推隆之所駕馭曽謂髙帝為之乎折倒體貌推隆之語毋乃區區之智術有以勝之耳毋乃亦是疑辭吁又不然耳又折倒智術之語重瞳之子挾數用權當不在髙帝下謂項羽之智術與髙帝同前舉髙祖處謂劉季眇然泗上一亭長此舉項羽謂重瞳之子是改頭換面用字項籍贊舜葢重瞳子項羽亦重瞳子獨一亞父范増字亞父竟以猜忌而不能用髙祖紀項羽有一范増而不能用天下之士卒之背楚歸漢陳平韓信等皆亡楚歸漢豈以畫良吐竒楚果無人抑亦無以屈之耳楚非無人但項羽不能屈之耳異哉髙帝之屈羣策乎正講髙帝事方兩雄爭馳伸屈之形混然未判謂漢楚雌雄未决之時凡抱負所長以求售於時者謂謀臣䇿士楚漢皆足以究其用也且雙説漢楚皆可以用之夫何屈於此而不屈於彼歸於漢而不歸於楚耶且雙疑問何獨屈於漢而歸於漢吁是可以觀帝之有以髙天下也應破題髙天下字王蜀之謀蕭何之策深矣蕭何傳願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圗也何不得以伸其策故終於忘其所有而為帝之屈矣何不得伸其䇿便是屈何先屈一箇蕭義師之舉董公之䇿善矣髙帝紀沛公至洛陽三老董公遮説漢王曰項羽無道放殺其主天下之賊夫仁不以勇義不以力三軍之衆為之素服以告諸侯為此東伐此三王之舉也漢王曰善為義帝發喪公不得以自伸其策故終亦失其所負而為帝之屈矣董公不得伸其䇿便是屈又屈一箇董公張留侯韓之策士也張良傳求刺客為韓報仇以嘗相韓故後封為留侯一至於漢則入秦之策借箸之策歴歴為帝陳之同上沛公入秦宫室欲留居之良曰秦為無道故沛公得至此為天下誅殘去賊今始入秦即安其樂此所謂助秦為虐又漢王與酈食其謀撓楚權良來謁漢王方食云云良曰請借前箸以籌之其不可者八使帝無以屈其謀則彼將求伸於楚矣張良不能求伸於楚便是屈又屈一箇張良陳户牖楚之謀臣也陳平傳平陽武户牖人降漢一至於漢則反間之策諫伐之策亦縷縷為帝言之同上平曰大王誠能出捐數萬斤金行反間間項王君臣以疑其心破楚必矣云云明年平從擊韓王信於代至平城為匈奴所圍髙帝用平竒計解圍使帝無以屈其智則彼將復歸於楚矣陳平不能復歸楚便是屈又屈一箇陳平屢薦不用韓淮陰之志消矣韓信傳信數以䇿干項羽羽弗用信亡楚歸漢封淮陰侯一登壇之拜則决策東向破羽并秦信亦墮於帝之術而不自知其屈同上王曰吾亦欲東耳何曰王能用信即留必欲拜之擇日齋戒設壇場具禮乃可云云信曰今王舉而東三秦可傳檄而定又屈一箇韓信踞洗召見酈食其之意沮矣酈食其傳召食其沛公方踞床令兩女子洗而見食其食其入即長揖不拜曰足下欲誅無道秦不宜踞見長者一攝衣之謝則畫謀進計破魏下齊生亦游於帝之術而不自知其屈同上於是沛公輟洗起攝衣延食其上坐謝之食其因言云云遂下陳留冒又屈一个酈食其彼以上講腹應頭在我者常伸在者常屈他如毛髮絲粟之才言一毛一髪一絲一粟之小才凡有所挾以至於吾前者挾其謀䇿皆惘然自失惘失意見退省其私用論語句以為無一之足恃與冒頭奔走服役喪其所有相應奉敎承命之不給與冒頭聴命之不暇相應莫不委所有而為我用都屈了嗚呼兹非帝之所以能屈羣策者乎繳本意向使帝也不有以屈之縱而去楚楚復不能屈則彼將自用其謀以自伸其欲若如此則為患非小何以屈之有深長意吾恐智鬬智力角力與我為敵潰裂四出幾何不敗乃翁事哉項羽傳羽使人謂漢王曰願與王挑戰决雌雄漢王謝曰吾寧鬬智不鬬力又酈食其傳漢王吐哺罵曰豎儒幾敗乃翁事惟其智足以髙天下應破題主意故能合天下之智而為一人之用惟髙他一等所以能屈之雖不求以屈其策而自不容於不屈矣繳盡屈意應冒頭我雖不求以服乎彼彼自不得不屈於我意雖然髙帝之所能屈者至謀臣策士而止畧抑髙帝商山茹芝之老卬首信眉濶視雅拜終不肯一到漢廷至煩願見之思張良傳上欲易太子良曰顧上有所不能致者四人四人年老以上嫚侮之故義不為漢臣上髙此四人云云四人謂商山四皓初杜子美云吾慕漢老時清猶茹芝吁髙帝之屈羣策者至此始窮矣只能屈得謀臣策士若經生學士便不能屈了雖然四皓非謀臣策士比也四皓園公綺里季夏黄公甪里先生本之戴溪髙帝善將將論謹論得人立說格此篇與湯武凝士民同意天之生斯民如何謝昌元出處孟萬章下伊尹曰何事非君何使非民治亦進亂亦進曰天之生斯民也使先知覺後知使先覺覺後覺予天民之先覺者也予將以斯道覺斯民也立說天之生斯民固欲使之各遂其生也有夏之末民墜塗炭其生不得遂矣天生伊尹出於是時毅然以天下自任體造化生我之意廣造化好生之德開天下生生之路然則天之所以生伊尹即所以生天下也批云終篇就生之一字發明語意活動可謂擅場之作論曰觀造化仁天下之心天之生斯民當於君子之自任者求之歸在伊尹自任上是主意如題下文其自任以天下之重此葢天下之生無窮便就生之一字説聖賢之生不數不數者謂不常出也天之所以生君子即所以生天下也天生伊尹正為生斯民之地君子出而壽生民之命脈即所以全造化未全之功也伊尹之生斯民所以全上天之功數句發明主意極出天下之生久矣用孟子句事物汨之而生意褻汨者亂也褻者泯也氣禀局之而生理晦局者拘也晦不明也古無君子者出人之生幾乎絶矣君子不生則民不聊生反下精神則君子之生豈偶然哉暗指天生伊尹意偶學蘇老泉文天之所以與我豈然哉句法生民之命脈存焉命脈字見生意國家之元氣根焉元氣字見生意天地之仁心寓焉仁心見生意亦應破題故為天地立心為生民立命用前輩語而生生之意流動充滿於兩間說得生字活天之生斯民孰有大於此者繳小講意有夏之末民生未寧敘其時伊尹一出遂以斯道思濟斯民敘本文體造物生我之意廣造物好生之德開天下生生之路連用四箇生字甚暢天之所生止於伊尹而仁意所及周乎斯民生一人而千萬人皆得其生吁非孟軻氏烏足以知之本出處天之生斯民如何請演之士君子生天地間非無所為而生也原天生君子說起是必有以參天地之化關盛衰之運其生也有自來矣蘇東坡作韓文公廟碑匹夫而為百世師一言而為天下法是皆有以參天地之化闗盛衰之運其生也有自來其逝也有所為故申甫自岳降而傅說為列星云云傅巖一生霖雨四海書說命說築傅巖之野惟肖爰立作相命之曰若歳大旱用汝作霖雨是生傅說一人即所以仁四海之生靈也應冒頭天之生君子所以生天下也意周岳一生蕃翰四方詩崧髙維岳降神生甫及申維申及甫維周之翰四國于蕃四方于宣謂申伯甫侯也是生申甫之賢即所以仁四方之生民也應冒頭語亦應主意仁字况君子之生且說天生君子意陰陽五行範其體周子通書五行一陰陽也五行金木水火土河圖洛書麗其數河出圖洛出書河圗易也洛書洪範也仁義禮智陶其性人各具五常之性範字麗字陶字見生意一旦出類拔萃而宗主之孟出乎其類拔乎其萃則導之而生養遂敎之而倫理明治之而爭奪息三句用伊川春秋傳序文而生意滿天下矣應生君子所以生天下意生一人而千萬人受更生之德應冒頭天之所生止於伊尹而仁意所及周乎斯民所生者寡所以生者衆學大學語古之人有行之者伊尹是也學孟子語謂造化之所以生我者正所以仁斯民應主意我之所以仁天下者當求所以贊化育應破題地中庸可以贊天之化育三聘一起兆民賴之斯民之生於斯為盛孟萬章湯三使往聘之既而幡然改曰與我處畎畆之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉觀天道好生之意求造化仁民之心可不於此求之應主意是故無極之真二五之精妙合而凝生之本也用周子太極圗語二五二氣五行也而天非區區而生之也含天之生君子所以生天下意乾道變化各正性命保合大和生之源也見易乾卦而天非屑屑而生之也含天之生君子所以生天下意唐虞之際海隅蒼生而生意温然如發育之春書益稷帝光天之下至于海隅蒼生萬邦黎獻有夏之始利用厚生而生意洋然如茂盛之夏大禹謨正徳利用厚生惟和自時厥後聖道湮微有夏之末宫室苦之生理斲矣汙池役之生意蕭矣園囿勞之而生意如揫斂肅殺之秋冬矣孟子滕文公下堯舜既沒聖人之道衰暴君代作壞宫室以為汙池民無所安息棄田以為園囿使民不得衣食碩果不食此意猶存易剥卦碩果不食有人焉與造物者周旋於畎畆之間謂伊尹處於畎畆之中此正天道仁斯民之機也應主意仁字見得天生斯民不可無伊尹况五百之運氣數寥絶孟盡心下由湯至於文王五百有餘歳若伊尹萊朱則見而知之一綫生意天所屬心屬心於伊尹一則曰天之生斯民二則曰天之生斯民見題注天乎天乎何生斯民之易而生君子之難乎要入伊尹來抑生天民之先覺先知即所以覺天下之後覺後知者乎應天之所以生君子正所以生天下也見題注想其畎畆扶耒見前注一寸膚雲而四海九州之生理已磅礴於胷中粧㸃生斯民意莘野荷鋤孟萬章上伊尹耕於有莘之野以樂堯舜之道一犂春雨而天下萬姓之仁愛已洋溢於方寸粧㸃生斯民意語新句峭翻然起釋然悟見前注凛乎其不可留也用赤壁賦語佐勇智之君以廣其生書仲虺之誥天乃錫王勇智表正萬邦充堯舜之道以全其生見前注廣知覺之先以導其生見題注一夫不獲時予之辜遂可易蹇而為解書說命昔先正保衡作我先王一夫不獲則曰時予之辜匹夫匹婦皆被其澤遂可轉剥而為復題下文思天下之民匹夫匹婦有不被堯舜之澤者若已推而内之溝中其自任以天下之重如此造化屬意於一人生君子而仁意充滿於一世生天下生一先知者耳生伊尹見題注凡斯民之後知者咸安其仁應主意仁字生一先覺者耳生伊尹見題注凡斯民之後覺者咸被其仁應主意仁字造化不能全其生而畀之君子君子不能已其責而充之天下應冒頭語因孟氏之言味當時之意敘本文伊尹葢有感於生賢之數而不辭其自任之重哉應冒頭自任字繳盡講意雖然至孟子時此意轉甚引孟子作論尾功利之習行義利之本失戰國之時不戕於時君之麋鹿孟梁惠王齊宣王有囿方四十里殺其麋鹿者如殺人之罪則斲於楊墨之斤斧孟滕文公下楊氏為我是無君也墨氏兼愛是無父也舎梧養棘摧落殆盡告子上今有場師舎其梧檟養其樲棘揠苗助長凋喪無餘公孫丑上助之長者揠苗者也軻也志伊尹之志樂伊尹之樂而又不遇伊尹之時周子通書志伊尹之所志辨明乎義利界限而斯民後利先義之志生孟梁惠王上孟子曰王何必曰利亦有仁義而已矣苟為後義而先利不奪不饜紬繹乎仁義端倪而斯民事親從兄之志生離婁上孟子曰仁之實事親是也義之實從兄是也論天下之生則願比肩於三聖滕文公下孟子曰天下之生久矣一治一亂云云我亦欲正人心息邪說詎詖行放淫辭以承三聖三聖謂禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼論斯民之生則願同志於伊尹公孫丑上伯夷伊尹於孔子若是班乎曰否自有生民以來未有孔子也然則有同歟曰有而五百餘載之言詠歎咨嗟而不已軻之意有在矣注見上故為之說曰伊尹處斯民之復元氣尚存之日也故能自任其重而使生意彌綸乎宇宙謂伊尹達而在上孟子處斯民之剥元氣消靡之日也故徒著書立言而使生意不絶於萬世謂孟子窮而在下天生伊孟之意同伊孟所處之時異若二子者易地則皆然孟子禹稷顔子易地則皆然此借用其意謹論終篇説得生字鮮峭但文字似傷於太巧得人立說格此篇與天之生斯民如何論同格湯武凝士民如何林益甫出處荀子議兵篇古者湯武天下為一諸侯為臣能凝之也凝士以禮凝民以政禮修而士服政平而民安立說以湯武之凝士以為凝民之地主意謂君子之心與天下之心不同天下之心有求於我而徒計其利害君子之心無求於我而必辨其是非故有天下以為是而君子以為非者湯武以身而當世變之極冒然為天下大不可為之事不取必於天下而惟取必於君子者葢君子之心一則天下之心一天下之心一則聖人之心一矣考官批云此是一大議論見髙識逺筆力過人前輩謂命意如畫圖措辭如走珠此篇兩盡之矣末意尤妙論曰君子之心一士凝則天下之心一矣民凝夫心一理耳接心字説君子之心即天下之心正說士心與民心同天下之心非不衆於君子之心也斡一轉聖人固未嘗取必於天下謂湯武不先凝民之心而不能不取必於君子乃先凝士之心何哉設問葢君子之心其所以異於衆人者正説君子之心與天下不同以其能辨乎義利之情而察乎是非之當此是君子之心非可與欲安欲逸者同日語也此是天下之心人前鼂錯䇿人情莫不欲安云云情莫不欲逸故天下以為是而君子以為非天下以為然而君子以為不然天下之心徒計其利害君子之心必辨其是非聖人不敢為矣若君子不從則湯武不敢為矧夫聖人以身而當世變之極指湯武冒然與天下為大不可為之事湯伐桀武王伐紂以臣弑君是大不可為之事天下固欲之而聖人固不欲也天下之心欲安逸而已湯武之心於義則未安以聖人之所不欲而不得以遂其所不欲湯武雖不欲為而不能遂其不欲為之心則亦惟君子如何耳此觀君子之從違如何今為君子者亦不能以其所不欲者而奪其所欲今君子不欲為之心亦不能奪天下欲為之心則是君子之心一天下始得以遂其欲天下之心一而聖人始不得以遂其所不欲矣聖人之心亦於是乎一此數行文如盤走珠是知君子之心一則天下之心一而聖人之心亦於是乎一矣繳上文發明主意荀卿子曰湯武凝士民如何嗚呼其凝於士者乃所以凝於民歟主意荀卿子之言則是而所以言則非也畧責之嘗謂一人之心千萬人之心君子之心非固有異乎人者應冒頭接題心一理耳君子之心即天下之心然天下之事不能以皆常而變生焉又生出常變二字變字是含湯武伐桀紂意此其間是非利害不能以寸若湯武為此舉其心是其迹非不為此舉則天下有害而無利是豈衆人之所能知哉衆人之心安知大義之所在夫衆人之所能知者接上能知字危欲安也亂欲治也勞苦欲逸樂也只是鼂錯䇿欲安欲逸之意是皆有求於聖人故其心易一有求則易一其心而其勢之逆順事之是非皆非其所暇計者天下之心徒計其利害而不計其逆順是非則君子之所甚憂也君子之心必辨其逆順是非故聖人之興事造業指湯武不於其天下之有求於聖人者覘之應冒頭不取必於天下必其計是非定逆順惟理是適而未嘗有求於我者今皆求得於我而後聖人起而為之應冒頭必取必於君子葢其有求於我者其心易同天下之心而無求於我者其心難一君子之心難一者既一則其易一者葢有不謀而同矣應冒頭君子之心一則天下之心一古之人有為之者湯武是也用孟子句甚哉湯武之難也難字有意鳴條之師書湯誓伊尹相湯伐桀升自陑遂與桀戰于鳴條之野孟津之㑹書泰誓武王伐殷師渡孟津云云大㑹于孟津天地之大變也應原題變字湯武非利天下者乃冒然為之而不疑何哉應冒頭冒然與天下為大不可為之事虚設問嗚呼荅其亦知湯武之不求於天下而天下之求於湯武者乎應冒頭聖人不欲天下固欲之意亦應原題有求於我字壺漿之民戴商舊矣孟湯始征自葛載云云其小人簞食壺漿以迎其小人又書民之戴商厥惟舊哉而父母之思不獨西土之人為然書牧誓武王之與受戰于牧野云云曰逖矣西土之人又泰誓元后作民父母天下之望湯武者葢甚於飢溺之望拯救也應原題天下有求於聖人之意然而非台之辭湯誓非台小子敢行稱亂有夏多罪觀政之頃泰誓觀政于商其惕然恐然之心葢未嘗敢以天下之心為心也應冒頭未嘗取必於天下意何者葢天下求乎君以生者彼其志於求生也應有求於我其心易司則昔之荼毒者急於甘芻豢也荼毒惡草之毒曰湯誥不忍荼毒芻豢草性芻榖養曰豢昔之暴虐者急於就安全也牧誓今商王受云云俾暴虐于百姓樂應原題危欲安也亂欲治也勞苦欲逸也是其心葢計於其私而有求於我應前語彼其計於其私而有求於我粘上句雖其心甚固應其心易一而其是非好惡未必皆行乎天理之公應其勢之逆順其事之是非皆非其所暇計聖人亦不敢以為言然也應冒頭聖人不敢為也然而耕莘者歸矣轉歸士上于孟伊尹耕有莘之野渭釣者來矣史吕尚以漁釣于周西伯西伯出獵遇太公於渭之陽彼其堯舜君民之心往來於五就孟湯三使往聘之既而幡然改曰云云吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉而幡然於北海之濵者孟太公避紂居北海之濱曰盍歸乎來吾聞西伯善養老者且遲遲於文王宜王而不王之後吕東萊文文王宜王而不王予日望之之心用孟子語葢不獨為天下計而為湯武計者亦甚詳矣應冒頭君子之心所以異於衆人者以其辨義利之精審是非之當此其心術之微是豈衆人之所能知哉應冒頭其間是非利害豈衆人所能知之語是皆無求於我而其心拳拳然卒不可已者應原題下無求於我者其心難一如是則湯武其能已之乎應君子之心一則聖人之心一意然則使天下被湯武之澤者君子之功也歸重在凝士上故至亳之誥拳拳於元聖湯誥王歸自克夏至于亳云云聿求元聖與之戮力而孟津之誓亦必於我西土君子焉依泰誓師渡孟津作泰誓云云西土有衆咸聴朕命焉依學左傳晉鄭焉依句法葢君子者理義之所自出也謂君子之心能知是非逆順理之不容已而義之不得不為應冒頭君子不能以其所不欲而奪其所欲意君子之心既有所係於此應冒頭君子之心一况夫有求於我之民乎應冒頭則天下之心一又應原題語嗚呼今朕必往湯誥夏德若兹今朕必往毋貳爾心詩大明篇上帝臨汝毋貳爾心湯武之心葢亦至是而始凝矣應冒頭聖人之心亦於是乎一故曰君子之心一則天下之心一天下之心一則聖人之心一葢謂此也總應冒頭語荀卿子謂湯武之凝士民敘本文應冒頭荀卿子之言則是而不知其有不容不凝於湯武者畧責之若其汲汲然求以凝之則湯武果利天下者乎應冒頭所以言則非也亦應前利天下字雖然湯武之心終以為不然也此是湯武本心歸夏之慙而仲虺作誥而湯不以是為諱仲虺之誥成湯放桀于南巢惟有慙德曰予恐來世以台為口實採薇之夫飄然髙舉而武王亦不肯招之使來史記夷齊傳武王伐紂伯夷叔齊叩馬而諫曰父死不葬爰及干戈可謂孝乎以臣弑君可謂仁乎又伯夷叔齊隠于首陽之山採薇而食誓不食周粟何哉設問葢不如是則湯武之心終不白於天下終世湯武本心如此而君子之心亦終於無所寄君子本心如此亦得吕東萊議論故夫舎我穡事之丁寧反覆湯誓我后不恤我衆舎我穡事而割正夏而遷殷之頑至於再世之後其勤拳懇到之辭亦甚不欲開斯民之耳目書多士成周既成遷殷頑民再世至成王時此其為湯武之心歟説得湯武本心出荀卿戰國士也何足以知此責荀卿不知湯武之心吁謹論就問立意格可與林斯光武帝三策仲舒論參看禹湯水旱何由歐陽漢老出處前漢公孫𢎞傳武帝元光五年復徵賢良文學制曰云云敢問子大夫天人之道何所本始吉凶之效安所期焉禹湯水旱厥咎何由仁義禮智四者之宜當安設施云云立說禹之遇水湯之遇旱惟責已而已武帝遇水旱之變不思自反將以諉責於今於是致疑於古謂禹不宜水也而水湯不宜旱也而旱是必他有其故於是以何由之說問公孫𢎞急欲自諉其責可以見武帝自恕之心寧不開公孫𢎞遷就之説批云捉破武帝自恕之心儼然如見義正辭嚴可以為法古人之遇變禹遇水湯遇旱而必求其故故字見何由意可以覘時君自恕之心矣見得武帝以此為問謂禹湯不宜有此變而有之必有他故葢欲恕已之責而已夫天變之來謂水旱之變未有無故而然者接故字說却是有故惟我之故而已必求其故而為之說必求其因由之故而為言則非古人之所敢知謂禹湯不諉責於天惟自責於已吾以一身中三極而立且正說人君一身與天地相闗凡咎徵之出於天者如水旱之變其招徠致之之因其弭伏消之之策孰匪於吾身取之在我而不在天恐懼修省易震卦君子以恐懼修省皇自敬德而已在我而已敬書無逸皇自德安可臆度其所以然烏可以意見忖度其所以因由之故而作輟於遷就之際哉而或作或輟於他人遷就之説後世之君暗指武帝當譴告之來如水旱之變不曰反而求之有餘也不能自責有孟子歸而求之餘師將以諉責於今將辭今日致變之責於是致疑於古且疑禹湯致變之因謂古之人不宜有是也而亦有是也禹不宜水也而水湯不宜旱也而旱是必他有其故必别有因由説得何由字出斯言之發武帝發此問寧不開自恕之端欲恕在已之責而來臣子遷就之説乎欲來公孫𢎞何由之言武帝策公孫𢎞曰引本文禹湯水旱何由嗚呼帝之微意斷可識矣欲自恕𢎞烏得而不售其䛕為後面張本然則禹之水湯之旱遂無其說乎問用不别事便就本題辨難起曰葢有之矣荅語用經而其説則與漢之君臣異與武帝公孫𢎞説不同漢之君臣曰禹豈宜水也而水公孫𢎞策堯有九年之水使禹治之湯豈宜旱也而旱見中間桑林之禱注有應冒頭古之人不宜是也而亦有是意天變殆他有所感而發也應冒頭是必他有其故意禹湯則曰且説禹湯本意水固以我而水旱固以我而旱禹湯自責而已我無過焉天變當不如是之甚也其意若曰若我一身無失安能致水旱如此之極傳不云乎舉左傳語禹湯罪已其興也勃焉左傳禹湯罪已其興也勃焉桀紂罪人其亡也忽焉聖人一身與冒頭吾以一身中三極而立相應五行之統㑹書洪範一五行二五事庶徵之樞紐同上八庶徵陰陽之忒其節忒差也雨暘之失其宜見上八庶徵曰雨曰暘曰燠曰寒曰風曰時云云曰咎徵曰狂常雨若曰僭常暘若何莫而非我也謂五行庶徵陰陽雨暘皆關係聖人之一身遑知其他何暇問其他之因由如曰他有故焉反說則典謨訓誥之書二典三謨伊訓湯誥大誥等書所謂畏天者果何説書迪畏天顯小民又寅畏天命而禹湯之志荒矣若求其他有事故則非禹湯之心魯旱曰咎在巫尫左僖二十一年夏亢旱公欲焚巫尫臧文仲曰云云巫尫何為天欲殺之則如勿生注巫尫女巫也面向上俗謂天哀其病恐雨入其鼻故為之旱唐水曰咎則坊門唐楊再思傳時水沴閉坊門以攘之推所由來一至於此後世推其由則歸咎於天則禹也湯也固可以辭其責使禹湯之心如後世之心則可以辭其責武帝固可以寘其疑入主意應冒頭於是致疑於古意而公孫𢎞固可以委曲遷就而售其諛矣應冒頭來臣子遷就之説𢎞烏得而不售其諛意何由之問甚矣其不知禹湯之心也説出武帝本心不知禹湯之心豈復識天意也哉不知禹湯自責之心何以回天變禹之水何由由禹而已此禹自責之心故禹思天下之溺由已溺之也孟子禹思天下有溺者由已溺之也不諉之於人不歸之於數也禹不責之人不責之天只是責已湯之旱何由由湯而已此湯自責之心故桑林之禱以六事自責史記湯遇旱禱於桑林以六事自責曰政不節歟民失職歟宫室崇歟婦謁盛歟苞苴行歟讒夫昌歟何以不雨至斯極也不曰吾將罪歳孟子王毋罪歳斯天下之民至焉不曰是殆適然之數也湯不歸之天不歸之數亦只是責已禹曰予思日孜孜書益稷全句湯曰兹朕未知獲戾于上下湯誥全句得用此二句見禹湯責已菑害之來菑與灾同聖人方且怵惕兢懼之不暇責已且不暇而暇詰其所從來哉奚暇問天變所起之由而暇致疑於茫昧以為自恕之地哉若歸咎於天數則是置疑於茫昧而不自責矣非自恕乎水於禹旱於湯天固以累二聖人也上天仁愛人君之意二聖人而欲諉其責何患無辭倒翻轉說奚待武帝疑之亦奚待公孫𢎞釋之而後得其說也說得本意透徹建元元光以來武帝年號水旱疊見元光三年河水决濮陽汜郡十六元封二年夏伐朝鮮夏旱帝而禹也思溺由已而已矣使武帝如禹則必責已注見前吾水之不遑䘏且不遑恤自已致水之變而問禹水之何由帝何心哉見得武帝欲托禹以自解謂禹不宜水也而水然則我之遇水亦天數而已帝而湯也六事自責而已矣使武帝如湯亦必責已注見前吾旱之不暇憂且不暇憂自已致旱之變而問湯旱之何由帝又何心哉見得武帝欲托湯以自解謂湯不宜旱也而旱然則湯之遇旱亦天數而已禹也湯也不宜水旱而水旱者也不宜有而有焉足上意是必他有其故説何由意武帝之為禹湯發斯問也發明本出處豈徒以解禹湯哉帝將借是以自解耳發盡主意帝之䇿董仲舒也曰災異何縁而起董仲舒傳武帝制策曰災異之變何縁而起而舒以自省對仲舒對曰國家將有失道之敗而天乃出灾異以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也甚矣仲舒之言不當帝心也謂仲舒之言不與帝合問何縁而不得其說不得仲舒之說又以何由問問公孫𢎞帝之責急有所諉矣要歸之天數世不多董生仲舒也誰復以正大之説忤其意哉見仲舒自省之言不當帝心如公孫𢎞則遷就其説而諛帝矣水諉之堯公孫𢎞對曰堯遭洪水使禹治之未聞禹之有水也旱諉之桀同上若湯之旱則桀之餘烈也武帝之心釋然喜泰然安矣𢎞遷就其說合帝自恕之意瓠子之决實嫁禍於我湛璧以祭可也武帝本紀元封元年還至瓠子臨决河沉玉璧以祭作瓠子之歌武帝以水歸之天數而不責已實𢎞啓之歳之旱天意其乾封乎吾無與焉足矣漢郊祀志元封二年夏旱公孫𢎞曰黄帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎武帝以旱歸之天數而不責已實𢎞啓之禹湯罪已之心不傳武帝不知禹湯本心禹湯遇變之事反為後世託辭藉口之地反借禹湯遇變之說以自文其過天意固如是哉言天意不如此雖然所貴乎儒者此是正論謂能引其君以當道而正救其失者也見孟子公引此句以責孫𢎞英明如武帝豈真不為禹湯哉武帝上嘉唐虞下樂商周其志亦可見沉溺於多慾汲黯傳曰陛下内多慾而外施仁義馳騖於好名外事四夷内興功利遇災變而急於自解焉武帝本意何由之問所由發也引本文仲舒不知自省之語見前注固非帝之所樂聞自省之言乃禹湯責已之意而亦帝之所疑而未敢遽以為非者武帝覽其對而異焉則是疑之而未敢非之疑於舒而質之𢎞疑仲舒之言所以再問公孫𢎞𢎞又以舒之言對𢎞能以仲舒自省之言為對則帝且悟而懼矣武帝必覺悟而知天變之可懼不敢歸之數耳不回其機反逢其惡責公孫𢎞不能回武帝之失而反迎武帝之過孟子逢君之惡其罪大使武帝恕已之心遂决而畏天之念遂衰繳前語𢎞罪可勝誅哉皆𢎞之罪論𢎞者曰曲學阿世轅固傳固曰公孫子務正學以言毋曲學以阿世嗚呼信矣就問立意格可與前篇參看武帝三策仲舒林斯光出處前漢董仲舒傳武帝即位舉賢良文學之士前後百數而仲舒以賢良對策焉制曰云云乃復冊之曰云云於是天子復冊之云云對既畢天子以為江都相立說武帝凡三次策仲舒似若勤於訪問者然帝有喜容悅之心而舒每為剴切之論始者䇿之將謂仲舒之言必當帝心既而始對不合於是又再策之冀其改變始者之言欲與已合而再對又不合於是復三䇿之又冀其遷就其說以順適吾意而三對益守其初之說而不改帝其問誠宻而其心已疎矣舒豈樂乎如是哉葢君臣之間相信之篤則一言而有餘而議論之不相入雖累千萬言而不足批云灼見武帝本心吐露仲舒底藴有此才思方能如此發明真可為法君臣之相與仲舒之於武帝甚無樂乎其費辭也相與在真心而不在乎三䇿夫人君鋭於求治暗指武帝而訪問之勤三策仲舒意勤字見三策兹固悉意以從人者其意似喜人言然有謀之不能自已至三次策之而其心有大不然者帝之心好諛而惡直仲舒所對不與已合君子宜深察之當察武帝之本心葢君臣之間説君臣相與大意惟相信之篤則一言而有餘相與以心何待多言而議論之不相入雖累千萬言而不足若不以心相與雖三策亦徒然耳故夫尊卑濶絶而情分不親者固君臣之患謂不以心相與者言之愈詳而求之愈以為畧者亦君臣之通患也徒然以言相接者此是格何者其心有所不滿也其心有所不足故屢策之欲其合心之意武帝之於仲舒其患正坐此應上面兩箇患字大廷三策引本文世以為帝勤於舒應接題訪問之勤字而君子則以為非勤也罵破帝有喜容悦之心武帝本心而舒每為剴切之論仲舒真心故屢對而屢問仲舒三對武帝三問若拳拳於相與之誠應破題相與字而幸其言之遷就以順適吾意者此正武帝本心帝之私不能揜也嗚呼其問誠宻而其心已疎矣問之宻是三策之心之疎是為江都相舒豈樂為如是哉舒之本心豈願如此武帝三策仲舒請以詰仲舒之意詰問也嘗謂君臣相與之際應破題語太上以心真心相與其次以言言不如心心之不孚而言之不合者不足與有為矣說倒此一項武帝之於仲舒引本題來辨所以相與者其心乎其言乎皆不可得而見也且疑辭未斷盡思昔明良之懿引古者來肱書元首明哉股良哉未交而情已孚以心相與未言而意已宻不待形於言耕野築巖之人伊尹耕於有莘之野傅說築於傅岩之野非有一語以動上聽者伊傅二人何嘗多言以動成湯髙宗之聽一旦處之阿衡資之鹽梅畧無疑也成湯用伊尹為相髙宗用傅説為相書太甲惟嗣王不惠于阿衡注伊尹也說命若作和羮爾惟鹽梅傅說也是誠相與以心者固未易以此望武帝也此一段説君臣相與之際太上以心把古者君臣來形容本題若夫腹心之寄决於㑹留之一語前漢髙祖紀贊腹心良平又張良傳良曰始臣起下邳與上㑹留此天以臣授陛下魚水之歡締於興漢之數辭蜀志先主曰孤之有孔明猶魚之有水也又諸葛亮出師表親賢臣逺小人此先漢所以興隆也此其誠意之相孚而言論之必聽世之賢主皆能之何獨武帝之不能歟此一段説君臣相與之際其次以言把漢蜀君臣來形容武帝帝非誠不能也就不能字斡一轉待詔之書户庭無壅東方朔待詔金馬門一言悟主旋即超遷田千秋傳千秋無他材能學術特以一言悟意旬月取宰相封侯世未嘗有也此豈抗勢自尊而厭聽人言者且說武帝喜人言先揚後抑而獨於策舒之日引本題則英銳之氣武帝雄材大畧醇雅者不謀也仲舒敘傳為世醇儒又儒雅則公孫𢎞董仲舒計功之心指武帝明道者不同也仲舒傳仁人明其道不計其功此固帝之不足於舒謂武帝所見不與仲舒合而三策之所由發也鈫本文且以制策之初意攷之第一策謂法古為無補制曰夙興夜寐務法上古者又將無補謂祥瑞為何修同上何修何飾而膏露降百榖登帝之趨向己見於斯武帝之本心如此而舒乃以勉強告以正心告舒對曰強勉學問則智益明又云人君正心以正朝廷正朝廷以正百官豈多慾者之所甘心歟謂不合帝意外汲黯傳陛下内多慾而施仁義以任德言以敎化言舒對曰王者承天意以從事故任徳敎而不任刑又云敎化立而奸邪止者其隄防全也豈好大者之所願聽乎謂不合帝意功武帝好大喜帝心聞之誠不為悅以上是第一對對武帝不喜其初然猶慕舒之名而冀其詭遇以從吾欲也冀舒改其初之説獲孟子為之詭遇一朝而十於是再而策之再策之以稱朕意者望之再制曰各悉對於篇以稱朕意而舒加意之對舒對曰曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在乎他在乎加之意而已設誠之對同上願陛下因用所聞設誠於内視向之繩墨不改廢焉謂不變其初之説拙孟子大匠不為工改廢繩墨帝之不滿於舒至此不能自禁矣以上是第二策二武帝又不滿第對條貫則曰靡竟也統紀則曰未修也三策修制曰條貫靡竟統紀未意朕之不明歟一而再再而三至三䇿誠欲其悉之究之熟之復之而不知臣舒之不能䛕也三策云今子大夫既已著大道之極陳治亂之端矣其悉之究之熟之復之云云勉以謹微勸以積善舒對曰盡小者大慎微者著云云善積而名顯德彰而身尊責以堯舜之兢業同上堯兢兢日行其道舜業業日致其孝益守其初之說謂仲舒又不變其初之説牢不可破焉以上是第三對商鞅說君三變其說史記商鞅見孝公說以帝道不悟復説以王道不入復説以霸道公與語不自知膝之前於席也賢良大對三策如一仲舒有臣如此何帝之不能折節乎折節謂屈節也始而策之敬也再而策之則疑矣三而策之則薄之矣由敬而疑由疑而薄一次愈不如一次三策而卒無以稱上意謂仲舒所言不合上意則薄而厭厭而棄而江都之命下矣應冒頭其問誠宻而其心愈疎意相見本題注對既畢天子以為江都嗚呼舒非負於帝帝獨無負於舒乎責得武帝十分倒使吾其果能虚心也能聽言也雖都俞猶可書帝曰俞臯陶曰都况一策乎應冒頭相信之篤雖一言而有餘一之為盡奚假於再且三乎應冒頭議論之不相入雖千萬言而不足不然公孫𢎞能以一策而位平津武帝只一策𢎞後封丞相為平津侯而舒不能不扞格於三策之凟扞音旱格音畫不相入也告易䝉卦初筮再三凟策𢎞之易而策舒之難一策𢎞三策舒帝何遁其情乎帝之私不能揜是則帝之於舒心怠於迹之勤意疎於辭之宻策之三次似勤似宻既對而不用之非怠非疎乎兩句斷盡武帝本心故君問雖煩祇為費問謂三策臣言雖切亦為費言矣三對辭應破題費字嗚呼君臣之相與夫豈樂為如是哉應冒頭語昔孟子王道非不七篇孟子七篇仁義而齊宣之惛不能進孟子齊宣王曰吾惛不能進於是矣宣公論諫非不數百陸贄論諫數百篇皆本仁義而德宗之猜忌不能屈唐德宗贊德宗猜忌刻薄強明自任武帝之三策仲舒其齊宣之於孟子德宗之於宣公歟比並得極是故嘗謂君之於臣苟以心相孚則言可也不言亦可也應原題太上以心亦應冒頭雖一言而有餘意不孚其心而議論以相與則言不足也千萬言亦不足也應原題其次以言亦應冒頭千萬而不足語武帝志剛氣銳方其初年雖征伐禱祠未興初年未有此等亊而東馳西騖之心已動然其心未定仲舒之儒雅見前注與申公之老成未嘗不同一心也申公已八十餘老見本傳而視帝之所尚何竽瑟之不遇歟韓愈荅陳商書齊王好竽有求仕於齊者操瑟而往立王之門三年不得入云云曰王好竽而子鼓瑟瑟雖工如王之不好何故前日之安車申公以一言去申公傳上使使安車蒲輪迎申公至見上上問治亂之事申公對曰為治者不在多言顧力行何如耳是時上方好文辭見申公對黙然然已招致即以為大中大夫舎魯邸後以病免今日之大廷仲舒以三策去為江都相一言者為畧謂申公之言畧而不詳而三策者為緩謂仲舒之言緩而不急畧與緩總上文武帝之見云爾其何傷於申公仲舒末以申公形容尤見其妙前篇水旱何由之問是武帝自恕𢎞之對卒投帝意此篇三策仲舒是武帝好諛舒之對卒忤帝心兩篇捉破武帝本心可以參看傷今思古格此篇與柯適文帝思古名臣論同格王者之法如何陳傅良出處前漢杜欽傳成帝策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對立説逺而王者之法得於所聞者也近而我家之法得於所見者也得於所聞者不若得於所見之詳成帝不求近者之所見乃欲慕逺者之所聞逺有所慕則近有所遺矣使成帝能慕漢家之法尊而行之則漢其三代矣又何必法王者之法徒重所聞而忽所見哉批云終篇以新語易陳言醒人眼目所謂化臭腐為神竒者妙論妙論人君不必逺有所慕謂成帝不必逺法王者逺有所慕則近有所遺當以漢家之法為法逺慕王者則必忘了家法似若無害也接上文勢不斷而君子不之取者其不取法古之說者以近者不足慕以近之家法不足法棄而逺求可也法古逺而無異於近若古者之法無異於家法則何必貴耳而賤目哉何必重所聞而忽所見而况天下之理得於所聞古者之逺不若得於所見之詳家法之近且吾惟無所見則亦無所慕反難既獲見矣既見家法踵之躡之追逐其後之意惟恐其不彼若也惟恐不如家法奚暇他求哉何必逺有所慕此而不求不求諸近徒以古人已陳之迹而求聞其所未聞者徒求諸逺吾意其竊是名以夸天下也徒竊法古之名以夸耀當世而已其於治夫何益何益於當世王者之法如何吾意成帝問其所不當問此問以王者之法不是杜欽之荅又荅其所不當荅彼荅以法天地亦不是君臣胥失之嘗謂慕堯舜者不堯舜慕三代者不三代不必逺有所慕意居今而效古惑矣足上意彼堯舜三代非不足慕也翻上文來辨難吾刑罰不能清何有於畫象刑法志有虞氏之時畫象於衣冠而民不犯吾政事不能修何有於舞干書大禹謨帝乃誕敷文德舞干羽于兩階吾賦取無度敎養無術何貢助徹校庠序之異哉孟子滕文公上夏后氏五十而貢殷人七十而助周人百畆而徹其實皆什一也又夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也故凡治效不古若皆慕古過也不必逺有所慕吾不能於今而能於古乎既不能用家法何以法古是故嘉唐虞者漢其治前漢董仲舒傳武帝制朕上嘉唐虞輩堯舜者唐其俗唐魏徵傳陛下居常逺輩堯舜田非不井也而新自新王莽簒漢更號曰新行井田之法官非不周也而秦自秦秦易封建之制而為郡縣孰知夫成康其稱者循髙祖之法漢景帝贊周云成康漢言文景美矣又梅福傳文帝起於代谷循髙祖之法而商周其德者守漢家之法度也宣帝贊可謂侔德商宗周宣矣又元帝紀帝曰漢家自有制度本以伯王道雜之彼冀其相若者且據它人之見亦以其不今於今則亦不古於古也不能法今則不能法古君天下者其可捨近而慕逺哉應冒頭逺近字豈可畧所見而稽所聞哉應冒頭見聞字伊尹告太甲周公告成王吾不知其幾言也引伊尹周公事為證昧爽丕顯之説書伊訓太甲既立不明云云伊尹乃言曰先王昧爽丕顯坐以待旦子惠困窮之説同上先王子惠困窮民服厥命懋敬厥德之説尚書無逸篇周公作無逸云云自有先王惟時懋敬厥徳克自抑畏之說同上周公曰嗚呼厥亦惟我周太王王季克自抑畏一言一湯伊尹告太甲注見上一話一文周公告成王注見上伊周非不以堯舜望其君伊尹周公非不欲太甲成王之慕古正以人君不必逺有所慕也應破題語湯文殷周之堯舜也語新慕湯而湯慕文而文亦堯舜也能法家法即是法古奚必慕唐虞之堯舜也哉應不必逺有所慕嗚呼成帝王者之法之詔本文杜欽天地之對杜欽乃以法天地為對有愧於伊周多矣總上文謂杜欽不以家法為對不能如伊尹以湯而告太甲周公以文王而告成王漢之天下從漢初說來髙祖以寛仁結之後漢王昌傳髙祖寛仁結於人心深矣文景以恭儉固之前武帝贊如武帝之雄材不改文景之恭儉漢武以雄材恢拓之見上句注孝宣以綜核震厲之本紀孝宣信賞必罰綜核名實子子孫孫謂漢世子孫當守家法律令漢也爵禄漢也賦役漢也科制漢也兵農漢也向上五件事無非漢之制度成帝此慕此稽則此治矣謂成帝能慕漢家之法稽漢家之法則如漢家之治矣近之不考而逺訪也不用家法而法古帝欲禹湯耶文武耶法三代王者身漢而治不漢帝慙且恧矣謂成帝身在漢而治不如漢乃不用家法之故可以自愧矣何禹湯文武問哉何必問法王者不劉不王不功不侯外戚恩澤侯表漢興云云誓曰非劉氏不王若有無功非上所置而侯者天下共誅之此帝家法也此成帝漢家之法五侯茅土王譚王商王立王根王逢時五人同日封世謂之五侯諸舅秉軸外家王鳳等何法哉非王者之法輟洗所聽前酈食其傳沛公方踞床令兩女洗食其長揖不拜曰足下欲誅無道秦不宜踞見長者於是沛公輟洗起衣延食其上坐止輦所受袁盎傳文帝止輦受言此帝家法也此成帝漢家之法章之死京兆尹王章言鳳專權章死詔獄輔之罪劉輔言不當立趙倢伃土繫輔掖庭秘獄漢法似不如此也非王者之法未明求衣鄒陽傳文帝未明求衣厲精為治魏相傳孝宣厲精為治帝知之矣帝熟之矣成帝亦知文帝宣帝之法湛酒溺色日以夜繼成帝贊然湛于酒色趙氏内亂帝誰法歟非王者之法帝而慕帝之家法應前家法雖不純三代而漢之三代矣語句精采尚焉舉所見之法而燕越之所見之法家法也北燕南越言其相背也而逺者之慕王者之法將誰欺歟責成帝以上應冒頭成帝問其所不當問雖然帝之治固失矣挨退成帝之失吾猶冀杜欽之對有以開帝之漢也又責杜欽此句是學吕東萊未嘗少改蘇武之漢句法吾意欽以帝之所見為帝反覆言也欽當以家法為帝告今不是法而以法天地者為言應冒頭杜欽荅其所不當荅嗚呼何欽之所言不達時務耶以下責杜欽人君非甚庸亦必知所失矣指成帝應上失字豈待欽言耶所以深責杜欽之對不切欽而王陵也吾知必以非約對王陵漢髙帝之臣髙帝欲立諸吕為王問陵陵曰髙帝刑白馬而盟曰非劉氏而王者天下共擊之今王吕氏非約也况帝之時成帝時名號雖劉而柄實王也劉氏漢姓時王鳳專權帝而問以漢法則權不王而漢不新王莽簒漢改號曰新帝不之問不問漢法帝惑於逺有所慕也慕王者之法欽不是對不對以漢法欽非愚也欽非不知欽鳳黨也欽乃王鳳之黨言則帝悟而鳳斥矣欽能以漢法為言則成帝知有漢而王鳳必斥去矣欽恐一言而帝以感悟此欽之所見欽肯是言耶所以不肯言髙宗俾率先王之訓書説命王庸作書以誥曰俾率先王迪我髙后說告以先王時憲說曰監于先王時憲德宗庶幾二祖之問唐李絳傳帝嘗稱太宗𤣥宗之盛朕欲庶幾二祖之道德風烈李絳對以合法祖宗同上絳對曰陛下誠能尊道德逺佞邪云云如是可與祖宗合欽非愚於此也應前欽非愚也言則帝悟而鳳斥矣應前全句欽肯是言耶亦應前漢之不振吾始成之尤而終欽之尤以王者為問為帝之罪不以漢法為對終以為欽之罪傷今思古格此篇與陳傅良王者之法論同格文帝思古名臣柯適出處前匈奴贊匈奴數背約邊境屢被其害文帝赫然發憤遂躬戎服親御鞍馬馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣又馮唐傳帝問唐曰髙祛數為我言曰趙將李齊之賢戰於鉅鹿下吾每飲食意未嘗不在鉅鹿也唐曰齊尚不如廉頗李牧之為將上聞之迺拊髀曰嗟乎吾獨不得廉頗李牧為將豈憂匈奴哉唐曰陛下雖有廉頗李牧不能用也上怒復問唐曰公何以知吾不能用頗牧唐對曰李牧之為趙將居邊軍市租皆自用饗士賞賜决於外故牧得盡其智能是以北逐單于破東胡滅澹林西抑秦南支韓魏臣聞魏尚為雲中守軍市租盡以給士卒是以匈奴逺避虜嘗一入尚擊之所殺甚衆斬首捕虜上功幕府一言不相應文吏以法繩之陛下法太明賞太輕罰太重尚坐上功首虜差六級陛下下之吏削其爵由此言之雖得頗牧不能用也以上乃文帝思古召臣事立說文帝之時非無人才可用如魏尚之賢是帝得於所見者可用而不之用方且遐想異代廉頗李牧之為人豈非重所聞而忽所見哉此其所以乏將帥之才也此就本出處意發明批云推原題意曲當事情有餘不盡之意見於言外重所聞而忽所見重所聞是思古名臣李齊廉頗李牧之賢怱所見是罰魏尚後世以是多乏才之憂此文帝所以乏將帥之才憂字有思意夫當外患未寧之時謂匈奴冦邊人主方倚人才以為緩急用暗指文帝要將帥之才而環視四顧無一如意無人可用尚論古者忠力之臣如李齊廉頗李牧之賢禦侮折衝足為内外之藩蔽詩外禦其侮又漢李尋傳本強則精神折衝是誠今日之所小者謂文帝時無此等人如之何而勿思且説文帝合當思之然人主之用才謂文帝惜其所無者謂頗牧不若能就其所有謂魏尚而慨想於昔者謂頗牧不若採論之於今謂魏尚博觀一世豈無竒傑當時豈無人可用苟不能號召而奮庸之奮起庸用也之書有能奮庸熙帝載則其間有所抱而不獲伸者如魏尚等固已遺於念慮所不到之地矣不走了思字若文帝之思頗牧也見本文其亦憤於其所激而喜於其所聞歟應破題然當時未必無如頗牧者指魏尚而帝實未之思也不是之思而反思異代之頗牧文帝思古名臣愚於史臣之贊而有感於馮唐之言包得盡註見本文詳夫天下事功捨人才無與辦者要人才用人主寤寐乎英傑之思説思之一字求之於所知也弗獲而採之公論焉須問諸人訪之於一時也無有而追想古人焉須思古人此其志誠切矣説思字而或有不副其所期者應冒頭不如吾意語然則天下其無才歟設疑辭古人網羅英傑氣召類從同氣相求各從其類未聞其借才於異代者極是智足以用人則人未始乏也何代不生才故凡期待人物之過髙者往往意其時之未必有應重所聞意而接於耳目之所聞見者多易忽於常儕例視之中應忽所見意才不知用而動曰才難語孔子曰才難不其然乎是亦人主之厚古薄今也為之耳厚古是重所聞薄今是忽所見有如藩屏捍禦之臣詩崧髙四國于藩箋四國有難則往捍禦之為之藩屏若方召其人者姑勿論也方叔召虎周宣王時臣謂不必言之春秋戰國之世蕞爾小邦左昭七年蕞爾國蕞小貌而名將才士無日不有雖小國亦有人才趙之頗牧葢其一二者廉頗李牧豈以文帝之時國家全盛智勇駢肩而膺國委寄者無一足以方趙之諸臣乎入文帝來將他比並不小了本題駢並也方比也而帝也一聞李齊之名而思李齊見本題詳註一聞頗牧之能而思頗牧同上皇皇乎日有搜求不應之患者説思字如記檀弓皇皇乎有求而不得帝之心固已怵於其所聞聞李齊廉頗之為人怵恐懼意而歉焉以無人視天下歉不足意本以上且據文帝意抑不思歸主意何代不生才而世未嘗無頗牧也唐魏元忠封事何代不生才何才不資世且頗牧之於趙何如哉且說廉頗李牧之為人居其國而秦兵不加史廉頗傳藺相如曰強秦之所以不敢加兵於趙者徒以吾兩人在也守北邊而窺伺逺却李牧傳牧趙之北邊良將常居代鴈門備匈奴單于大率衆來入牧擊之大破殺匈奴十萬騎單于奔走後十餘載匈奴不敢近趙邊城服燕破胡趙奢傳燕相票腹之謀舉兵擊趙趙使廉頗將擊大破燕軍燕割五城請和又李牧傳破東胡降林胡所向輒靡靡披靡也趙之所以安者終始仗其力也皆頗牧之力後元之世文帝年號邊方繹騷常武詩徐方繹騷烽燧數警文帝後元六年冬匈奴三萬騎入上郡三萬騎入雲中所殺畧甚衆烽火通於甘泉長安又賈誼策斥候望烽燧當是時也而得頗牧為之將廉頗李牧以其所以強趙者而為強漢之謀合説以其所以弱敵國者而為弱匈奴之計交合得好則三陲晏然長在休息之域三陲三邊也是誠帝之所欲也文帝之本心如此我思古人實獲我心借用毛詩緑衣全句狀思古名臣字拊髀之歎見題註安得不動念於馮唐論將之時有思意出處同上雖然轉歸本意頗牧誠賢也而非帝之所得用也說馮唐云有頗牧不能用意則夫慨慕於昔時之事者不若相與攷論夫今日之才應冒頭慨想於昔者不若採論之於今且以雲中之守魏尚為雲中守練卒衛邊見題註國勢増重謂魏尚之賢是亦漢世之頗牧也語好頗魏尚即是牧而上功幕府一言不應遽不免於文吏之繩詳見題註謂魏尚差首虜六級而下之獄也昔者衛侯以細過而棄干城之將通鑑子思言苟變於衛侯曰其材可將五百乘公曰吾知其賢將然變也嘗為吏賦於民而食人二雞子故弗用也子思子以為此不可使聞於鄰國同上子思曰夫聖人之官人猶匠之用木也取其所長棄其所短今君處戰國之世選爪牙之士而以二卵棄干城之將此不可使聞於鄰國帝之所以棄魏尚者得無魏侯之失歟以文帝之不用魏尚與魏侯之不用苟變一耳國有賢材而不能用謂魏尚方且遐論緬思游心於世代不相接之逺且思趙將廉頗李牧是殆所謂忽所見而重所聞者應破題此固所以貽馮唐不能用頗牧之譏也見題註不特尚爾尚魏尚也將才如李廣者亦文帝時良將亦其巨擘孟子齊國之士必以陳仲子為巨擘而迄不大任焉文帝亦不用之且有惜不逢時之歎前李廣傳惜廣不逢時令當髙祖世萬户侯豈足道哉知而不用何為者耶責文帝愚知帝之心矣帝無意於事武者也史律書孝文即位將軍陳武等曰宜及士民為用征伐逆黨孝文曰朕任衣冠念不到此兵凶器雖克所願動亦耗病願且堅邊設堠結和通好休寧北陲為功多矣且無議軍故其論將帥思名臣不見於金繒通好之時賈誼策漢歳致金幣采繒奉之而見於發憤馳射之日見題註事已變休銳心輒弛以上應憤於所激意嘗思李齊矣而李廣終不用見前注又見下注嘗思頗牧矣而魏尚卒不顯見題注又魏元忠封事漢文帝不知魏尚賢而囚之知李廣之才而不用夫以李廣之才天下無雙方事匈奴而卒不任故近不知尚廣之賢而逺思頗牧馮唐是以知其有而不能用也彼其思也有所激而非其本心也應冒頭語然而思患豫防國家所重見易既濟自古未有數十年而常無事者豈有常無敵國外患之驚不能儲材以待事儲蓄也而每臨事以須材須求也求而不得始倉皇焉求而不得見禮記是未可謂長計逺慮者責文帝未能長計逺慮晚歳閲變既深前既抑之到此不容不放一著得一周亞夫於細柳堅屯之時周亞夫傳文帝六年匈奴大入邊以亞夫為將軍軍細柳以備胡而付託後人他日有以折七國之變於聲色不動之頃孝景三年吳楚反亞夫東擊吳楚出精兵追伐大破吳楚而吳楚平蓄將之功於是驗矣可見儲才之效惜乎始者之念未到此不脱了思字又見前註前篇謂成帝不法漢家之法而且欲法王者之法是舎近而求逺此篇謂文帝不用當時之名臣而乃思異代之名將是棄今而慕古兩篇俱就重所聞忽所見上發明推原立意格此篇與方剛叔顔真卿何如人論同格郭林宗何如人黄道深出處東漢郭太傳太字林宗或問汝南范滂曰郭林宗何如人滂曰隠不違親貞不絶俗天子不得臣諸侯不得友吾不知其他立説賢人君子之用於世則隆名彰彰有不待問之而自知者如林宗之為人窮居隠約負抱未試而一時人物莫不敬而慕之不能不起有識者之疑此或者所以驚駭而問曰林宗之為人吾不知其人為何如而使人如是其敬且慕也批云就何如人三字發得或問意出且不牽搭下文格範整峻文字典刑真是老手以匹夫而繫天下之望郭林宗未見用於時特匹夫耳而天下之人皆敬而慕之或者之所甚駭也此或者所以驚而問之曰郭林宗何如人駭字發得何如人三字意出後篇亦用駭字夫事之問諸人者就問字發意必平昔之所未知而聞見之所未及者也未知其人則問今有人焉暗指林宗隆名盛望負時名望彰彰於天下之耳目一時人物皆知而慕之而或者顧猶有問焉既知其人又何待問豈真有不知者哉設疑難葢名以用而彰才以用而見解上文則謂人才已用於世者人皆知之賢人君子之用於世粘上用字澤在生民功在王室以用而後見天下敬之慕之此固理之必然人亦信之無疑也此等人不待問乃若功未加於時澤未及於物指郭林宗未曽見用之人正與澤在生民功在王室者相反窮居隠約負抱未試林宗乃隠逸之士而一時人物敬服嘆慕說當時之人皆敬慕林宗若將舉天下之大而未見其人焉應匹夫繫天下之望意則有識之士獨得無疑乎未用於世之人人皆敬而慕之或者安得不疑嗚呼此或者之於林宗所以驚駭而問曰應駭字之人也謂林宗吾不知其人為何如說得何如人三字出而使人如是其敬且慕也本意曉然郭林宗何如人請發明或者之問且或者之於林宗便就或問發意其知而問之乎其不知而問之乎雙闗説且設疑葢嘗觀林宗之為人矣原題不泛用别事便用林宗事起名震乎京師則京師知其為人矣本傳林宗游於洛陽始見河南尹李膺膺竒之遂相友善於是名震京師才冠乎太學則學校知其為人矣黨錮傳太學諸生三萬餘人郭林宗賈偉節為其冠君厨俊及之名表表乎相髙則士君子又知其為人矣同上與李膺陳蕃王暢更相褒重云云海内希風之流遂共相標榜指天下名士為之稱號上曰三君次曰八俊次曰八顧次曰八及次曰八厨猶古之八元八凱也同舟之僊衆皆望之本傳林宗與李膺同舟而濟衆賓望之以為神仙角巾之折人皆效之則匹夫愚婦亦知其為人矣同上嘗於陳梁間行遇雨巾一角墊時人故折巾一角以為林宗中其見慕如此夫京師知之學校知之士君子知之匹夫愚婦又知之結上四脚文有法則舉天下之大皆知其為人矣而或者獨以為不知可乎難倒不知而問語斯問也吾不知其何如也疑辭形容得何如二字出大抵有非常之事則人信其為非常之士有不世之功則人信其為不世之人以上四句應冒頭名以用而彰才以用而見人亦信之無疑也常漢武帝紀詔曰葢有非常之功必待非之人迺若指林宗道未施而人慕其髙學未試而人服其博應冒頭功未加於時澤未及於物而一時人物敬服嘆慕功名之鋒未露事業之軔未發造句是狀出未用於世意而天下之人仰之如太山北斗唐韓愈贊學者仰之如太山北斗云望之如景星鳳凰唐李勃傳景星鳳凰爭先覩之為快且敬且慕應冒頭天下敬之慕之殆以為伊周孔孟之復出以林宗比伊尹周公孔子孟子此不惟或者疑之雖識者不能不駭且異也應冒頭入題處疑字駭字且林宗其人非才之未試者乎再敘林宗之未用吾嘗攷之矣攷其出處舉以有道而彼不應其舉本傳司徒黄瓊辟太常趙典舉有道並不應勸以出仕而彼不屑於仕同上或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可反也遂並不應卓乎三萬人冠而無劉陶剴切之言黨錮傳太學三萬人郭林宗為冠又朱穆案宦者趙忠帝大怒徵穆詣廷尉太學劉陶等數千人上書立乎黨錮之中同上其死徙者六七百人而不指斥曹節王甫之罪宦者曹節王甫擅權又本傳林宗善人倫而不為危言覈論故宦官擅政而不能傷已迹其行已驗林宗之為人隆中之孔明新豐之馬周而已以林宗比諸葛孔明馬周唐蜀諸葛亮字孔明隠於隆中馬周館於新豐皆未仕之時或問孟子曰周公何人也曰古之聖人也引孟子全文證或問何人字切或問孔子曰伯夷叔齊何人也曰古之賢人也引論語全文證或問何人字切神此過闗處自東坡范増論中來易曰知幾其乎詩曰相彼雨雪先集維霰此處却舉孟子曰孔子曰是學他文勢周公大功光耀天地記明堂位周公有勲勞於天下夷齊清風凛凛萬世論語伯夷叔齊餓於首陽之下民到於今稱之尊之以聖人周公敬之以賢人伯夷叔齊天下後世無異議也知之無疑更不待問林宗之為人把林宗與周公夷齊交合説吾不知其有周公之功歟抑有夷齊之節歟總處可法且疑辭其出處可觀其動靜可見也林宗之不仕與周公不同其隠逸又與夷齊不同李膺當世之偉人也而有今之夷夏鮮見其儔之語郭太博學善談論李膺與相見曰吾見士多矣未有如郭林宗者也其聰明通朗髙雅宻博今之華夏鮮見其儔遂與為友則陳太丘孔北海之諸人俱就下風矣陳寔為太丘長北海孔融謂二人俱不及林宗也順莊子黄帝下風而問宋沖一時之正人也而有自漢以來未見其匹之言本傳太嘗舉有道不就同郡宋沖素服其德以為自漢元以來未見其匹則賈董卿雲之諸儒皆當北面矣賈誼董仲舒司馬長卿揚子雲皆漢諸儒言此四人皆不及林宗也之唐杜審言云吾字羲當北面不特此也更推廣説黨錮之際諸賢駢首就禍如李膺范滂之徒皆入黨錮而議論不可得而疵本傳宦官擅政而不能傷也誅戮不可得而辱者同本傳處濁世而怨禍不及焉一林宗而已司馬温公論曰唯郭太既明且哲以保其身卓乎其不可及也夫君子小人不兩立也為君子則不黨於小人為小人則不黨於君子今也説林宗為人君子既敬而愛之謂時人皆敬而慕之小人又畏而憚之謂宦官不能傷之則其人果為何如耶斡得何如人三字出嗚呼此或者所以不能無驚駭之言也今來君子小人皆知其為人所以駭而問之應冒頭語昔者𤣥宗之問李平曰朕不識真卿何如人所為乃若此見次篇本題詳註儲子曰王使人瞷夫子果有以異於人乎孟子離婁下儲子曰王使人瞷夫子云云孟子曰何以異於人哉堯舜與人同耳或者之於林宗其如齊王之於孟子𤣥宗之於真卿乎自入大講凡三次引證始以孔明馬周比林宗未仕時繼以周公夷齊形容林宗之出處今又以齊王𤣥宗二事比或者之問文勢不重疊此處是學林斯光武帝三策仲舒論大講結語雖然是特論或者之見而已矣自冒頭至此只是説或問未曽判斷若林宗者其果為何如人耶要判斷林宗之為人昔之論者以有道稱之本傳趙典舉有道非也抑趙典之言不是道也者孔孟之所傳韓原道孔子傳之孟軻非林宗之所知者也林宗何足以知道以道予林宗不知道者也判倒林宗道其可以易言耶行文有法見得道之大處韓愈之論陽城曰見韓愈諫臣論陽子固不得為有道之士矣將遂不得為善人乎諫臣論曰或問諫議大夫陽城於愈可以為有道之士乎哉云云子告我曰陽子可以為有道之士也今雖不能及已將遂不得為善人乎愚敢以愈之言而荅或者林宗之問評品林宗極當妙論也推原立意格此篇與黄道深郭林宗何如人論同格顔真卿何如人方剛叔出處唐書顔真卿傳出為平原太守安禄山逆狀牙蘖真卿度必反陽託霖雨増陴濬隍料丁壯儲廥廪云云禄山反河朔盡陷獨平原城守具備使參軍李平馳奏𤣥宗始聞亂歎曰河北二十四郡無一忠臣耶及平至帝大喜謂左右曰朕不識真卿何如人所為乃若此立說真卿嘗遷監察御史出為平原太守是帝之所素識者今而聞河朔之變乃云朕不識真卿何如人夫豈真不識真卿者縁是時河北二十四郡聞安禄山之變往往望風改節獨有真卿挺然以忠義自聞帝於是發何如人之語其意以為均是人也彼乃相望而退縮此乃剛毅而獨立正將以愧天下臣子之心而厲其餘者豈真有不知者哉批云發越何如人三字透徹推原本意切當事情老於為文者以平時所已用之人真卿嘗遷監察御史出為平原太守是已用之人而一旦若駭聞焉𤣥宗曰不識真卿何如人是駭聞也此人主所以寓其微意也帝發此言正以厲當時臣子之退縮者葢當天下利害之衝暗指河北之變為臣子者暗指河北二十四郡之臣貴有守死無二而已當守死無二心不當改節今也一怵於畏敵之心説當時臣子俱畏安禄山之變往往望風而改節河朔盡陷則國家尚何所恃哉二十四郡無一忠臣又何所倚賴是以人主適當慨嘆之際暗指𤣥宗始聞亂而嘆幸有人焉暗指真卿挺然獨以忠義自聞謂獨平原城守具備是雖出於吾之所已知謂曽嘗遷御史然亦因是而有感於其時感當時臣子不能守節於其發為何如人之語敘本文何如人三字其意以為均是人也指真卿與二十四郡之臣彼乃相望而退縮二十四郡無一忠臣此乃剛毅而孤立獨真卿守節正將以愧天下臣子之心帝之微意在此而或者反以為真未之知則過矣斡轉不識二字况夫真卿之出守平原葢自内而之外也真卿自監察御史出為平原太守是則帝之所素識者應平時所已用之人語而今乃以何如人為言敘出本文吾是以知帝因一嘆之餘見題註而姑托真卿以厲其餘者哉發盡主意正欲愧天下臣子之心語相應亦為後面張本顔真卿何如人帝之意深矣應破題語嘗謂人主用人之際而得於一時之見聞者葢不同也見其人之賢否與聞其人之賢否自不同也夫忠良棄遺懵然無知者固所不論如懵懵然不知其人之忠良棄而不用者固不必論然有未仕王朝而驟喜其人於訪問之頃者矣此是聞其人者又有言論日聞而復質其人於在列之臣者矣此是見其人者喜其人者粘上文如太宗之於馬周因怪問常何之餘而方知其為忠孝之人唐馬周傳周舎中郎將常何家貞觀五年詔百官言得失周為條二十餘事皆當世所切太宗因怪問何何曰此非臣所能家客馬周教臣言之客忠孝人也帝即召之則以為未聞而驟喜之可也應喜其人於訪問之頃一脚質其人者解上文若武帝明知汲黯為戇直之臣汲黯傳上曰吾欲云云黯對曰陛下内多慾而外施仁義奈何欲效唐虞之主乎上怒曰甚矣汲黯之戇也復以何如人之問而諮嚴助同上嚴助為請告上曰黯何如人也曰使黯任職亡以踰人然至其輔少主守成雖自謂賁育弗能奪也上曰然古有社稷之臣至如汲黯近之矣則以為既知而必參之衆論亦可也應質其人於在列之臣一脚若夫其人既擢矣而似未嘗聞焉其君見用矣而似未嘗識焉引歸就顔真卿上來嘗遷監察御史是既擢矣見用矣復以何如人為言是似未嘗聞未嘗識者創見而駭稱驟得而深嘆應前駭字嘆字以形容發何如人之言意是豈有所矯而然耶疑辭吁解此固微意寓乎其間應破題語君子當觀其時而已耳應冒頭時字世每謂不識真卿之言且據他人言以為明皇無知人之明反說𤣥明皇即宗使不因河朔之變幸其平原一郡之獨存見本題詳註則帝將終身不之知矣應冒頭或者反以為真未之知意矣自世每謂上不之知皆以反難亦孰自夫真卿始末而深考之歟歸正說真卿之始用也初舉進士繼擢制科考真卿出仕始末詳見本傳又未幾而遷監察御史註見前不可謂不知真卿也學孟子不可謂不智也句法朔方一劾終身不齒之詔慨然輒從本傳使河東劾奏朔方令鄭延祚母死不葬三十年有詔終身不齒聞者聳然謂不識真卿者能之乎學孟子不賢而能之乎句法使其名震當時不獨郡國聞之朝廷知之上下之人皆知之雖帝固自信而用之矣應破題平時所已用之人語出守平原見本題註何如人之嘆帝始聞亂嘆曰云云帝豈無所激而然哉虚設問葢自逆臣肆叛指安禄山河朔風靡河朔盡陷聞風而靡以二十四郡之衆獨無一人能出力奮身以當排難解紛之責見本出處河北二十四郡無一忠臣耶尚得為國家有人耶應冒頭國家尚何所恃哉語吾觀帝始聞變之時惻然以河北二十四郡無一忠臣為嘆見本題詳註是帝固知有平原矣平原居二十四郡之一知有平原則知有真卿既知平原之為郡則必知真卿之為守特未卜其中流砥柱之操為如何耳但未知真卿之所守如何中流滔滔砥柱屹然今也李平一奏本傳真卿使參軍李平馳奏視其城守則具備同上獨平原城守具備倉廩則富實同上儲廥廩陴湟修矣同上増陴濬隍丁壯料矣同上料丁壯豈不上可以伸朝廷之氣壯唐家之威下可以懾敵人之膽服禄山之心而帝之心亦少慰矣帝亦自喜平原之守得真卿而全雖然真卿之所為固若此從本出處所為乃若此斡一轉而河北諸郡奈何其不然耶奈何河北二十四郡不能如真卿之守平原帝之言曰敘出𤣥宗之言不識真卿何如人所為乃若此見本題詳註葢以為此亦人也此顔真卿亦人彼亦人也彼二十四郡亦是人英風大烈縱不能為真卿深責二十四郡之為守者而城濠獨可盡委之敵乎禄山之變河北之城濠盡陷忠肝義膽縱不能如真卿深責二十四郡之為守者而郡縣獨可望風而靡乎禄山之變河北之郡縣俱潰以其獨守之操真卿獨全而視夫䧟沒之風河朔盡陷以其一郡之少平原一郡而視夫二十四郡之多河北諸郡是非優劣如此相去真卿則為是為優諸郡則為非為劣吾固知夫帝之微意應破題微意字不直咎夫諸郡之失而隠然見於何如人之一辭矣發越意盡卒之諸郡多應後效下又見註杲卿則以常山自歸本傳是時從父兄杲卿為常山太守斬賊將李欽湊等清土門十七郡同日自歸推真卿為盟主李萼則以清河為鄰本傳清河太守使李萼來乞師萼曰聞公首奮据倡大順而河朔恃公為金城清河西鄰也有江淮租布備北軍云云其不自帝言一發之餘而亦各知所勉勵哉應冒頭以勵其餘之語吁是意也應意字葢自漢之人主文帝有得之矣昔者亞夫見用於文帝周亞夫自其擇賢推封之餘周亞夫傳文帝擇勃子賢者皆推亞夫迺封為條侯而復委之以細柳之權同上匈奴大入邊以劉禮為將軍軍霸上以徐勵為將軍軍棘門以亞夫為將軍軍細柳可謂深知亞夫者也文帝可謂知亞夫之深一旦勞軍之際反愕然而有真將軍之稱同上帝勞軍至霸上反棘門軍直馳入云云已而之細柳軍軍士吏被甲銳兵刃彀弓弩持滿天子先驅至不得入上使使持節詔將軍曰吾欲勞軍云云既出軍門羣臣皆驚文帝曰嗟夫此真將軍也人遂謂帝之知亞夫也葢至是而始見或人不知文帝本意孰知帝意所在應意字誠有傷於當時可襲之將而姑假是以愧夫棘門霸上者耳同上鄉者霸上棘門如兒戲爾其將固可襲而虜也至於亞夫可得而犯耶然則真卿何如人之言把真卿與亞夫比並亞夫真將軍之語謂真將軍之語與何如人之言相似皆欲勉勵諸人辭雖殊而意則一用證切愚故併及之前篇謂郭林宗是未用之人或者不知之所以駭而問曰郭林宗何如人使人敬慕如此此篇謂真卿是已用之人𤣥宗非真不知之所以駭而言之者葢欲勵當時失節之臣兩篇俱就何如人三字上發明評品難易格太宗之美幾成康歐陽起鳴出處唐太宗本紀贊其除隋之亂比迹湯武致治之美庶幾成康自古功德兼隆由漢以來未之有也立説周之成王康王襲祖父累世已成之治從而潤色之則其用力也易唐之太宗以一身而自致一代之治以艱難百戰之天下用粉飾太平之規模未幾而聲明文物之美藹然有成康之氣象則其用力也豈不難乎批云意度髙逺文采絢爛最可以發人之筆力治有出於累世之所成成康之治自后稷公劉而至文武凡歴幾君賢主能以一身而致之太宗一身自創業兼守文斡得致字有力則其用力勞矣能幾及之可謂難矣夫繼治者易為功繼者襲其已成之治豈不易致治者難為力致者以一身自為之豈不難致一代之盛治猶難也若太宗猶為至難思昔賢王指成康襲祖宗積累之餘功繼后稷公劉而至文武積德累功之餘敎化已明董仲舒傳成康之隆囹圄空虚四十餘年此亦敎化之漸仁義之流習俗已成同上敎化行而習俗美從而藻飾潤色之成康但増光之政治光明輝耀千古說治字固優為也此是繼治者易為力乃若賢主太宗以艱難百戰之天下自創業用粉飾太平之規模兼守文未幾而聲明文物典章紀綱致治之美藹然有中古泰和之氣象庶幾成康在揚子泰和其唐虞成周乎其功豈可量耶此是致治者難為功嗟夫成康襲治之君也繼文武之後太宗致治之君也以一身致之成康之治有文武為之先文王武王創業於先太宗之治則太宗也太宗自為之而致治之美且庶幾焉引本文用且字有力此其用力豈不難於成康乎應其用力勞矣太宗之美幾成康史臣以致治言之㫖哉喚起致治字響漢史臣曰引證極切周云成康漢言文景美矣前景帝贊云云唐史臣曰太宗致治之美庶幾成康以本文治二股比並説文景漢之成康也漢文帝景帝之時如成王康王之時太宗唐之成康也見上文然而為文景也優文帝景帝有髙祖為之先則其繼治也易為力為太宗也勞太宗以艱難百戰之天下用粉飾太平之規模則其致治也難為功何者處豐之時則易有來章慶譽之功文景處豐大之時有易豐卦豐大也六五來章慶譽吉處否之世則難為大人休否之吉太宗處否塞之時人否卦九五休否大吉其亡其亡繫于苞桑千金之子以此比文景廣箕裘之業記良弓之子必學為箕良冶之子必學為裘繼而施肯播肯穫之功書大誥厥父菑厥子乃弗肯播矧肯穫加暨茨丹雘之力梓材若作梓材既勤樸斲惟其塗丹雘富之潤屋大學富潤屋非一朝一夕之積也易坤卦積善之家必有餘慶云云非一朝一夕之故以上比文景繼治易為力閭里匹夫以此比太宗不數年而致千金之資一身自致之能使其家之服食器用風聲氣習與紹箕裘之業者無異見上註之謂匹夫致富能與千金子享成者同則孰難孰易耶匹夫致富為難千金之子享成為易文景千金之子也太宗則自致千金之人也繳上譬喻太宗豈不難於文景乎應難字何者文景之時猶成康之時文景之治則有髙祖為之先成康之治則有文武為之先太宗之世豈成康之世乎太宗之治則太宗也成康襲闗睢麟趾之治詩闗睢后妃之德也風之始也麟趾闗睢之應也闗睢之化行則天下無犯非禮太宗則踵八代澆漓也通鑑本紀太宗承八代澆漓之後成康有文武為之祖父祖文王父武王太宗則繼武德之君也唐髙祖武德九年即位成康當持盈守成之時詩鳬鷖守成也太平之君子能持盈守成太宗則兼創業守文也唐房𤣥齡傳𤣥齡從我定天下見創業之難魏徵與我安天下見守文之為不易其時其世萬不侔矣謂太宗之時世與成康大不同然帝也風洒露沐身披荆棘儒學序太宗身櫜鞬風洒露沐未幾鼓元氣而雷域中騰百川而雨天下挽孤隋鬼魅之民通鑑封德彞曰三代以還人漸澆訛魏徵曰云云者謂古人淳朴漸致澆訛則至於今日當悉化為鬼魅矣而還成周中古之舊觀成康之時向者澆漓日滋見上註時八代之今致為仁義既效矣魏徵傳帝即位四年歳斷罪二十九幾至刑措米斗三錢天下大治云云帝曰此徵勸我行仁義既效風俗之美應美字既醉鳬鷖餘風也既醉鳬鷖二詩皆成王時曰餘風狀出幾字既醉太平也鳬鷖守成也向也刑網繁宻隋時今致為斷罪二十九矣見上註敎化之美應美字刑措圄空遺意也刑措圄空皆成康事曰遺意狀出幾字漢武帝紀詔周之成康刑措不用又冊曰成康四十餘年囹圄空虚致文館以崇儒斡出致字館儒學序太宗開文學召名儒十八人為學士致學校以養士斡出致字區儒學序太宗廣學舍千二百四方秀乂坌集京師向無有也聲明文物之美應美字即人人有士君子之行也既醉詩云云成王時致六典以建官斡出致字曰唐百官志云云曰省䑓曰寺曰監曰衞曰府致府衞以寓兵斡出致字曰兵志太宗貞觀十年諸府總折衝府凡天下十道置府六百三十四皆有名號而闗内三百六十有一皆以𨽻諸衞向無有也紀綱制度之美應美字周官井田之規模也周官行井田之法八家皆私百畆其中為公田成康處其易應前易字太宗處其難應前難字成康累世以成之應破題治有出於累世之已成太宗一身以致之應破題賢主能以一身而致之不曰太宗之難而誰難乎應難字嗟夫舜繼堯之後則美矣之治始見於韶樂語八佾子謂韶盡美矣又盡善也文王繼公劉后稷之業則美化之行始及於江漢詩漢廣云云文王之化被于南國美化行乎江漢之域髙帝迫於倥偬則漢興之初不能更化而善治髙祖本紀倥偬日不暇給又董仲舒策故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也光皇身濟大業則中興之美有未盡焉光武紀身濟大業兢兢如不及又後漢循吏傳建武永平之間云云所以中興之美有未盡焉孰謂太宗能創一代之業見前注又能致一代之治耶斡致治字致治之美引本文結史臣有味之言也雖然太宗之治固有成康之所不能為者先揚惜乎後抑美則美矣而未善也語子謂武盡美矣未盡善也坤之六五曰美在其中美字切暢於四支發於事業易坤卦全文夫暢於四支發於事業之美必有在中之美為之本有在中之美斯可暢於四支發於事業太宗責太宗無在中之美大抵輝煌於政治之間鹵莽於躬行之際本贊至其牽於多愛復立浮屠好大喜功勤兵於逺此中材庸主之所常為顯設於朝廷之上濶畧於閨門之中司馬温公曰父子兄弟之間慙德多矣使有坤德在中之美引上文則成康之治豈特庶幾織本文責以春秋未備成人之美本贊春秋之法常責備於賢者此以後世君子之欲成人之美莫不歎息於斯宜不復動史臣之歎見上評品優劣格孝宣優孝文歐陽起鳴出處後漢崔實政論宣帝明於君人之道審為政之理嚴刑峻法破奸宄之膽海内清肅天下晏如算計見效優於孝文立説天下多事則有功之名始見天下無事則無功之可稱人主獲有功之名天下被多事之害崔實以孝宣之功優於孝文殊不知文帝以德而為功每與天下相安於無事不敢生事以為一已之功如宣帝則以政為功雖能求一時可喜之功而適足以激天下多事之變謂之劣於孝文可也謂之優可乎批云説有本祖文亦華麗駁崔實之論極是三代而下粹然有王者氣象文帝一人而已豈可謂孝宣優之耶有功之可言孝宣有功不若無功之可言反不如孝文之無功反倒題意葢有功之功功之小也粘上有功無功四字發明無功之功功之大也是學先輩堯仁如天論接題何者虚設問天下多事則有功之名始見生事則有功天下無事則無功之可稱不生事則無功人主獲有功之名天下被多事之害有功之功功之小也孰若人主之無功天下之無事乎無功之功功之大也寛仁之君指文帝常欲與天下相安於無事而不敢生事以為一已之功天下無事則無功之可稱嚴厲之主指宣帝則每激天下之變而求一時可喜之功天下多事則有功之名始見以功而程其多寡程者比較也則渾渾之治固不如赫赫之美者為足稱且説文帝渾渾之治固然不如宣帝赫赫之功然而功之多者德之小也宣帝有功而德不如文帝外之有餘者内之不足也外有餘於功内不足於德嗟夫文帝以德而為功功之大者宣帝以政而為功功之小者崔實以宣帝之功優於孝文正敘本文不知其優也正所以為劣也駁倒上文孝宣優孝文夫遇夜則爝火之功為優爝苣火炬也遇旱則桔橰之功為優桔橰運水之具也大明當天爝火自息莊逍遥篇日月出矣而爝火不息其於光也不亦難乎人不知日月之功也日月功之大沾濡浸潤桔橰不施蘇東坡詩俯仰隨人如桔橰人不知雨露之功也雨露功之大文以上用前輩惟人亦然扞主于艱功莫優於晉也書文侯之命平王錫晉文侯秬鬯圭瓚云云汝多修扞我于艱救邢存衞功莫優於齊也左齊救邢又詩衛為狄所滅齊桓公攘戎狄而封之之以上二事功小者耕田鑿井帝力何有人安知堯之功乎帝王世紀堯時八十老人擊壤而歌曰吾鑿井而飲耕田而食日出而作日入而息帝何力於我哉地平天成萬世永賴人安知禹之功乎書大禹謨地平天成六府三事允治萬世永賴時乃功大以上二事功之者嗟夫知其功者功之小也齊桓晉文之功如爝火桔橰之功不知其功者功之大也唐堯夏禹之功如日月雨露之功人主果貴於有功抑貴於無功乎繳上意文帝無功之君宣帝有功之君也直說出文帝在位二十餘年所下三十六詔有考究勸農之外無竒語蠲租之外無異説文帝本心愛民凡下詔只是勸農減租而已史無可書之功紀無可載之事蘇東坡上皇帝萬言書漢之文景紀無可書之事唐之房杜傳無可載之功大臣之椎魯木强文帝時臣周勃為人木強椎魯固不如嚴毅總職公卿稱位其功之著於朝廷也宣帝時臣魏相嚴毅總領衆職又丙吉傳贊孝宣中興丙魏有聲公卿多稱其位吏之奉詔不勤文帝本紀十二年詔曰詔書數下歳勸民種樹而功未興是吏奉詔不勤固不如循吏彬彬皆無苟且其功之著於州郡也本紀贊孝宣之治信賞必罰綜核名實政事文學法理之士咸精其能又本紀上下相安莫有苟且之意田不加辟蓄積不多文帝本紀十二年詔曰朕親率天下農十年而野不加辟又賈誼曰公私之積猶可哀痛固不如田里安業民無愁嘆其功之著於天下也宣帝贊吏稱其職民安其業受賂者賞不朝者賜文帝本紀贊張武等受賂金錢覺更加賞賜以愧其心吳王詐病不朝賜以几杖視賞罰信必之功孰多宣帝贊信賞必罰下詔和親含垢忍恥文帝二年六月匈奴和親下詔曰云云俱棄細過偕之大道視單于稱藩之功孰盛宣帝贊單于慕義稽首穪藩禮文多闕制度未遑武帝贊文帝至於稽古禮文之事猶多闕焉又賈誼傳誼以為當改正朔易服色制度云云帝謙遜未遑也視品式備具之功又何若耶宣帝本紀樞機周宻品式備具以是為優夫豈不信自此以上且説宣優於文然豈知自此以下説文優於宣功之多者生事亦多應天下多事則有功之名始見而無功者則天下無事也應天下無事則無功之可見生事則天下受其病吾身獲有功之名功之小者功此指宣帝之無事則吾身無功之足稱而天下陰受安靜和平之福功之大者功此指文帝之文帝寧以天下病一人毋寧以一人病天下不欲生事求功使帝果有意於功則豈不能用賈誼以求紛更之功賈誼言改正朔易服色用李廣以求邊境之功李廣為將軍用刻深之鼂錯以求刑名之功耶鼂錯學刑名不以上三人文帝皆深信用之葢不欲生事以求功然而天下相忘於仁義公恕之中文中子七制之主以仁義公恕統天下息肩於湯火殘傷之後史記太史公曰文帝時天下新去湯火人民安業日受其春風和氣之澤者文帝時熙熙然如登春臺秋毫皆帝力也言纎細皆文帝保養之功帝之功殆與造化同其仁天地同其大歟應吾身無功之足稱而天下陰受安靜和平之福見文帝無功之功功之大者以上說文優於宣彼賞罰之信必雖技巧之習亡以下貶宣帝不如文帝出宣帝本紀見上註技巧之咸精雖苦窳之患息同上政事文學法理之士咸精其能以上四句蹈襲孝宣務行寛大論嚴刑峻法民且告病見本題註帝之天下殆如人之一身元氣索然而服采華麗耳目猶精明也應天下被多事之害人主獲有功之名意其視後元之治文帝後元年號氣象渾涵不露圭角應天下陰受安靜和平之福則孰優孰劣耶文帝為優宣帝為劣崔實方以為帝之優引本文不知是優也正所以為劣也駁題與冒頭相應不然武帝外攘四夷内改法度循吏傳序武帝云云民用彫弊奸宄不禁號令文章煥然可述武帝本紀贊其功亦非不髙也武帝亦是喜功之人曾足以補海内之虚耗乎昭帝贊武帝海内虚耗户口減半君子論人亦當論其德如何耳結尾又以德為主意以功而論則武優於宣宣優於文以德而論則文優於宣宣優於武判斷極當文采亦麗前篇謂太宗以一身致治而能幾及成康襲治之君則其用力也難此篇謂孝宣生事以為功不如文帝安靜無功之為愈兩篇自是一家機軸此篇與王貢材優龔鮑同格是倒翻一轉立説本出處是孝宣優孝文此則以為孝文優孝宣本出處是王貢材優龔鮑彼則以為龔鮑優王貢駁倒出處自判斷優劣格題外生意格帝王顧所行何如湯璹出處唐魏徵傳帝即位四年云云封德彞曰三代之後澆詭日滋秦任法律漢雜霸道皆欲治不能非能治不欲云云徵曰五帝三王不易民而敎行帝道而帝行王道而王顧所行如何耳立説魏徵之告太宗言行帝道而帝行王道而王辭之所及只帝王二者之道而已於霸者之道則絶口而不言上焉有帝次焉有王君請擇於斯二者舎是之外斷無他道辭之所不及豈不嚴歟葢縁本文上文封德彞有漢雜霸道之語此篇所以生出此意批云言外生意不為題目所拘議論甚佳法度尤宻論曰人臣納君於道指魏徴告太宗以帝王之道雖婉其意於辭之所及只言帝王之道顧所行何如耳實嚴其意於辭之所不及不言霸道夫自隆古以來迄於春秋之世自古及今所以行乎天下者更一變則一名立包帝王霸三者固第第相承而不共一軌轍也由帝而王由王而霸次第相承而不同也然即其時世而計之自古及今率不過三變而已矣帝王霸由帝道而之王由王道而之霸此是三變更一變則一名立霸固非帝王比也而亦以霸道名就霸字幹一轉有力則是三者之道葢萬世人君俱所擇術之地也謂後之人君擇術不帝則王不王則霸彼其擇術於此而未知適從暗指唐太宗在三个路頭人臣當是時而有言焉暗指魏徵納君於道者敢輕措辭於避就三者之際哉應破題字蹈帝道而行之吾君可以帝行帝道而帝蹈王道而行之吾君可以王行王道而王曰王曰帝兩開其端而使人主自擇借用公孫𢎞兩開其端使人主自擇語夫其句讀之所及者婉矣應破題婉其意於辭之所及然獨於霸者之道絶口而不言應破題實嚴其意於辭之所不及則上焉有帝次焉有王君請擇於斯二者而止用經語舎是之外斷無他道也捨帝王之外非别有道辭之所不及者豈不截乎其嚴歟應破題語帝王顧所行何如魏徴之善為辭也請申之夫大人格君心之非孟子君子誘其君以當道同上不貴乎費辭也應破題納君於道意陳於君前者一出於天下之至正應婉其意於辭之所及孟公孫丑我非堯舜之道不敢以陳於王前而泯於言意之表者决非人君之所當用應嚴其意於辭之所不及縱乎此而閉乎彼縱乎此謂帝王道閉乎彼謂霸道開其從入之門而杜其不可由之途從入之門謂帝王之道不可由之途謂霸道使夫上之人尊其所聞者而至於髙明前董仲舒傳尊其所聞則髙明忘其所未聞而念不到此辭之所不及者則辭雖不迫切而意已獨至矣用孟子序語此仁人之告君所以一言而利博也用左傳仁人之言其利博哉語孟子非堯舜之道不敢以陳於王前其論髙矣見前注而當路於齊必不肯自許以管晏之功孟公孫丑問曰夫子當路於齊管仲晏子之功可復許乎異時告時君以王道之始初未嘗有靳心梁惠王曰云云孟子對曰云云養生喪死無憾王道之始也而齊宣願聞齊桓晉文之事則託之後世之無傳孟齊宣王問曰齊桓晉文之事可得聞乎孟子對曰仲尼之徒無道桓文之事者是以後世無傳焉彼豈獨能嘉唐虞樂商周以聳動一時之聽帝王之道下武帝紀上嘉唐虞樂商周而不能容喙於五霸哉霸道葢以帝王之道萬世所當共由言唐虞夏商周帝王之道可行而相與言功利則無稽之言人君不必聽也言齊桓晉文霸道不可行書無稽之言勿聽夫是以詳其粹者不詳其駁者粹是帝王道駁是覇道俾人君擇術於堯舜禹湯文武數君子之世堯舜是帝道禹湯文武是王道而童子之羞稱者則無勤於行荀仲尼篇仲尼之門五尺之童子羞稱乎五伯兹其為愛君之厚而已矣繳孟子告君不言霸道之意魏徵在唐其亦以孟子之所以事君事君歟引過大講借用孟子不以堯之事君者事君語太宗之為君也其天資雖美而學問之道未到也褒其天資美而貶其學力天資之美故可推而納諸五帝三王之域五帝少昊顓頊髙辛唐堯虞舜是也三王禹湯文武是也學問之未到故不免雜為五霸功利之習五霸齊桓晉文秦繆宋襄楚莊是也涕泗於念親之時魏徵傳文德皇后既葬即苑中作層觀以望昭陵引徵同升徵熟視曰臣眊昏不能見帝指視之徵曰臣以為望獻陵若昭陵臣固見之矣帝泣為毁觀獻陵註髙祖陵也即堯舜之孝悌也似合帝道悌孟子堯舜之道孝而已矣而建成元吉之死太宗紀太宗以兵殺建成及元吉則與殺公子糾者同一不仁又似合霸道糾左桓公殺公子拯隋民於水火之中張行成傳撥亂反正拯人塗炭即湯武之征伐也似合王道伐湯伐桀武王紂而陽為尊隋之舉唐髙祖紀傳檄諸郡稱義兵下令曰犯隋七廟及宗室者罪三族則視河陽之事同一不義左僖二十八晉侯召王以諸侯見且使王狩書曰天王狩于河陽為人上者其所當先莫急於修身齊家治國平天下而止爾大學身修而后家齊家齊而后國治國治而后天下平而帝之所以修身齊家所以治國平天下其不純於帝王也如此謂唐太宗之綱領未正不能純乎帝王之道則當世人臣有忠愛太宗之心者可無慮哉指魏徵告太宗本題之意當太宗貞觀之治未成而形之嘆息本題上文帝即位四年歳斷死二十九幾至刑措米斗三錢先是帝嘗嘆曰今大亂之後其難治乎徵曰大亂之易治譬如飢人之易食也斯時也帝方以其可以為五帝三王之天資應前語而往來乎五霸功利之境應前出入無時莫知其歸宿之鄉亦可危矣用孟子語一小人以秦任法律漢雜霸道之説中之見題註封德彞云云使㣲徵之言太宗寧不六五霸也借六五帝四三王之語奪胎用之徵之言果何功於太宗也使太宗從德彞霸道之言而不從魏徵帝王道之言則徵為無功其言近其㫖逺用孟子語近者其辭之所及謂帝王之道逺者其辭之所不及者也謂霸道應破題五帝不難至行其道則至應本文行帝道而帝語三王不難齊行其道則齊應本文行王道而王吾君而果有志於上歟則可以語帝也應冒頭上焉有帝吾君而果有志於中歟則猶可以語王也應冒頭中焉有王舎帝而必王舎王而必帝應冒頭君請擇於斯二者於斯二者不加意而外求君道焉則有不容言者矣若出帝王二者之外則必是霸道噫徵之告其君以帝王者其意一何婉應破題婉其意於辭之所及而五霸之寂不發於口者其意一何嚴也應破題嚴其意於辭之所不及後世論貞觀之治者以仁稱以義稱本題下文貞觀四年帝謂羣臣曰此徵勸我行仁義既效矣太宗之得髣髴乎帝王功宜誰予哉此魏徵言帝王道之功也雖然言心聲也用揚子語其言發見於告君之際者皆其學力之所充也言魏徵之言自學力中來講道河汾王通講道河汾徵之受業者有人矣徵受業於王通胡怪乎進説於太宗以帝王而不以霸歟其學有所本也商鞅之見孝公也史記商鞅因孝公寵臣景監以求見孝公説以帝道而不入遽變而為王説以王道而不入復變而為霸同上孝公既見鞅語弗聽景監讓鞅鞅曰吾說公以帝道其志不開悟矣後吾復求見孝公未中㫖罷景監亦讓鞅鞅曰吾説公以王道而未入也請復見孝公孝公善之鞅曰吾説公以霸道其意欲用之矣鞅小人也奚有於帝王之學責商鞅不知帝王之道荀卿之誨人也其言曰隆禮尊賢而王重法愛民而霸見荀子大畧篇全句卿小人儒也寧不以霸與王而並言責荀卿不合以王與霸並言彼皆其學之未正也鞅與卿學不正徵豈有是哉徵受業於王通所學既正故其言亦正故君子因徵以觀鞅之三變見前註有以知失其守者其辭屈用繫辭語因徵以觀荀卿之並言見前註有以見中心疑者其辭枝用繫辭語謹論就題立論格為治顧力行何如危科出處西漢申公傳上使使安車蒲輪迎申公至見上上問治亂之事申公已八十餘老對曰為治者不在多言顧力行何如耳是時上方好文辭見申公對黙然然已招致即以為太中大夫舎魯邸立説漢武帝出治之初天資未試其一二而治道之問首及於重厚之申公其初意固善矣申公恐武帝之初心未固進而之善固易勉載而之他亦易從是以勸之力行欲帝他日之治常如今日之善斯可言矣批云鎔意鑄辭圎轉清峭可以見驪塘先輩之妙筆論曰善始之意可以占終焉武帝首問申公初意固善申公勸之力行葢欲勸帝常如始而君子之慮則未然也申公恐武帝行之未力夫人君圗囘之始苟圗回天下於堂上暗指武帝而謀之於重厚之人暗指申公是固其初意之善者應善始之意然此心之發最易導也進而之善固易勉亦最易揺也載而之他亦易從葢君心之善方萌而未固指武帝首問申公則其外雖未敢屑之於所輕不問他人而問申公可謂不屑於所輕揚文而其中亦非的然有真見於此然武帝本心亦未必真个如此抑文方是之時進而之善固易勉最易導也載而之他亦易從亦最易揺也篇此兩句是一闗鍵是以老成慮事之君子申公八十餘老一見其君心之在於善應善始意則深欲其堅忍保持以定其所行而後已勸武帝力行不然此意不堅不力行而寒之者至此四字非冒頭語十用孟子一日暴之日寒之語則君心雖善亦不得行之於所當行之域也始之善者不可保之於終漢武帝出治之日即位之初年天資未試一二凡事皆未做出而治道之問首及於重厚之申公見本文是其愛天下之重而不敢輕以謀之應未敢屑之於所輕是好賢慕道之意亦首見於此善始之意如此申公也謂帝他日之治皆如今日之意則亦何不可之有申公勸之力行葢欲其終之如始苐恐此志不堅而行之不力爾説出本意力行一語安得不首入以為帝規為治顧力行何如愚意如此嘗論君人之心未始有不善應冒頭進而之善固易勉轉而他從則必有導之者也應冒頭導而之他亦易從嘗觀滕文公為治之始孟子滕文公上滕文公問為國孟子曰民事不可緩也而井地之問越國以及孟軻同上使畢戰問井地此其為志豈輕於謀國者應冒頭屑之於所輕字然施行之效未獲近似滕文公未及行井田之制而畢戰之歸已不復來畢戰又不再來問孟子而滕之善政亦斬焉於此斬者絶也之始者之善不能保於終何哉既而思之彼無孟軻者常於文公之側謂勉之以善者少而揺於百官之議謂導而之他者衆則文公亦不得復行其所謂文公闕不能力行其始者問井地之心君心未固而朝無老成固如是夫應冒頭語君人者能即是以為戒轉歸後之人君上審吾心於所發之初審善始之意堅吾力於所行之後堅力行之心而使浮議淺謀無所施焉不導而之他則天下之福也如是方為善不然吾心轉移一息間爾而天下安危其隔幾何進而之善則天下安導而之他則天下危嗚呼此吾因是而知申公進言之意也旋引入題葢方是時武帝施行之事曽未多見即位之初而蒲輪束帛倐有申公之召見本題詳註是瑟之方絃而求雅奏之師董仲舒策譬之琴瑟不調必改而更張之當更張而不更張雖有良工不能善調也玉之未琢而不試於拙工之手孟子今有璞玉於此雖萬鎰必使玉人彫琢之即此一意已足以就漢天下應謂武帝不輕問他人而問重厚之申公其初意豈不善申公老矣八十餘老而鋭於一來良有以歟然申公之所喜固今日也應君心未固進而之善固易勉而申公之所慮亦今日也應載而之他亦易從何則興土木求神仙帝雖未有是心也武帝初年未興土木未求神仙事征伐窮聚斂帝亦未有是心也武帝初年未事干戈未㩁酒酤未筭舟車而帝意之所向則未固也應冒頭君心未固語况夫推轂儒術者方在前蘭陵王臧及趙綰亦嘗受詩申公乃言師申公上使使安車蒲輪迎申公而好黄老之術者已在内竇太后好黄老術詔舉賢良者方在廷武帝本紀建元元年詔舉賢良方正直言極諫之士而治蘇秦張儀之言者已在列同上衞綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政皆罷帝心匪石尚庶幾焉詩我心匪石不可轉也一有轉移鴻鵠至矣孟使奕秋誨二人奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之是以紛紛多言公皆不敢以為帝告申公言為治不在多言而力行一語則必以首入於帝心同上顧力行闕何如耳囘顧其今日之所發者其意為何若善始之意他日之所行者與此為何若應冒頭帝他日之治皆如今日之意總天下之事大率循初意而為之主意則規畫一定措置一審力行必不為浮躁者所輕動應冒頭亦最易揺也意而天下之事亦可以徐就吾之條理矣如此方為盡善不然初以仁義而終以功利以下三句反應善始占終四字功利乃仁義之反初以道德而終以刑名刑名乃道德之反初以重厚而終以輕浮之士輕浮乃重厚之反則上嘉下樂亦何補哉武帝上嘉唐虞下樂商周嗚呼年少多躁謀老成若遲鈍夫以漢之天子武帝召一匹夫之老申公宜有驚人可喜之論以傾上聽者當別有竒論而召至闕庭一語而止申公只言顧力行何如耳一語自他人觀之亦太朴厚矣應重厚字然使帝而有審於此應前審字則四百年之社稷實繫於斯應即此一意已足以就漢天下仁人之言其利博哉用左傳語晏子一言而齊侯省刑曰仁人之言其利博哉獨惜夫武帝拂意而不復問上不再問申公開端而不及竟下亦不終言卒之罷斥至邸見題詳註公以老成歸而帝之所與論治道者則他有人矣如東方朔枚臯公孫𢎞張禹桑𢎞羊之徒皆是小人嗚呼申公之告老本傳申公亦病免歸申公何憾也於申公夫何恨老成一退而武帝之善卒轉移於他人果是導而之他亦易從武帝則可惜也武帝不能保其初意之善則可惜雖然豈惟武帝而已哉以文帝恭儉之主梅福傳文帝循髙祖之法加之以恭儉所用皆功臣重厚之流本紀議論務從寛厚而在位之臣猶有以用兵之計動者如李廣之徒以削國之計動者鼂錯上言削七國以改制度之計動者賈誼勸文帝改制度而帝不售幸而帝不從其言不爾殆哉一從其言則危矣是知人主不堅力行之志以定天下而揺於輕進之言鮮不及也應冒頭語發盡本意後之君其思以是為戒云謹論論學繩尺巻四
