body:
  text: 論學繩尺卷九宋魏天應編選林子長箋解合異為同格與後篇仁義忠信樂善論同機軸仁義道德性命如何徐炎發出處孟子題辭又自撰其法度之言著書七篇云云包羅天地揆敘萬類仁義道德性命禍福粲然靡所不載立説仁義道德性命本出一原天所賦為命物所受為性人受天之命以為性其初則有仁義存焉蹈此仁義則為道得此仁義則為德會而歸之道德一仁義也仁義一性也性一命也批云本朱子中庸之説而參以已意議論有根據文理有發明此時文中之冠冕者論曰一初賦受之天賦是命受是性所朱文公云天所賦為命物受為性萬理會歸之地也主意謂性得之於命仁義道德具之於性書洪範會其有極歸其有極夫大化之生生不窮從原初説來謂易繫辭生生之易天命之流行不已喝出命字命朱文公云繼之者善天之流行而不已人受之而為性者也喝出性字朱文公或問云天命之謂性言天之所以命乎人者是則人之所以為性也一性之中萬理森具同上以性言之則曰仁義禮智四端五典萬物萬事之理無不統於其間大意謂有命則有性有性則有仁義道德大端全體即所謂仁喝出仁字及其發見於事物之間莫不有一定當然之則是則有義存焉又喝出義字中庸或問云事事物物莫不自然各有當然之路之又大學或問云見之日用之間莫不各有本然一定則作論之法句要或長或短不齊方是合也而非離也渾也而非散也前篇既喝出命性仁義到此亦須喝出道德字此却包藏道德意而不言是文字出沒處揚子道德仁義禮譬諸身乎云云合則渾離則散人惟有此理而不能蹈此理之實蹈行也道則行此仁義之理以揚子道導之知此理而不能得此理之真德則得此仁義之理揚子德以得之於是合者離渾者散反應前四字而一初之天始非我有矣照破一初之天字無道德是無仁義無仁義是無性無命矣吁此孟軻氏所以不能已其言於戰國也舉出孟子作書之意七篇仁義未嘗不兼而言之本出處上文著書七篇云云仁義性也仁義即是注中物天之所以命我者也性即是命中物其蹈乎此則為道其得乎此則為德道德即是仁義中物會而歸之道德一仁義也仁義一性也性一命也打作一串次第説來特人自昧之耳有此一句方有曲折不直致與後面相應故曰一初賦受之天萬理會歸之地也此二句與破相照應方圓轉仁義道德性命如何此趙岐所以序於孟子之篇首請原其初應初字本出處孟子題辭乃趙岐所作故如此舉題蓋自天以隂陽五行絪絪緼緼化生萬物易繫辭天地絪緼萬物化醇氣以成形而理亦賦焉是之謂命從命字説起應冒子接題意理大學或問所謂隂陽五行者又必有是而後有是氣及其生物則又必因是氣之聚而後有是形物中庸注命猶令也性即理也天以隂陽五行化生萬氣以成形理亦賦焉於是人各得其所賦之理而為性就命字過性上來同上於是人物之生因各得其所賦之理以為健順五常之德所謂性也性者何仁義是也從性字過仁義上來函萬善具衆理包仁義道德字全得天地生物之心而仁之體所以立説出仁字而朱文公云仁者天地生物之心人得之以為心者也及其見之萬事如方維上下定位不易而義之用所以行説出義字用亦用朱文公議論體立行字太極圖解語此其初所以豫我以此理也此我之所以受此理於其初也二者匪相間也以上説性得之於命仁義具之於性意吾中庸或問天之所以賦豫萬物而不能自已者命也之得乎是命以生而莫非全體者性也雖然此雖然字非是自為一段蓋上面已説性命仁義了到此要過道德上來立人之道大易未嘗不言於仁義之先言性初本有仁義仁易繫辭立人之道曰與義去仁義而言道德此韓子所以遏異端之流也言道德即此仁義云韓原道凡吾之所謂道德云者合仁與義而言之也云老子之所謂道德云者去仁與義言之也蓋道德非仁義外物也應主意道德一仁義也能行此理於踐履之間即道也應冒子其蹈乎此則為道能得此理於心領意會之頃即德也應冒子其得乎此則為德見得道德即是仁義天降衷於下民若有常性克綏厥猷衷即性也猷字包仁義道德下書湯誥惟皇上帝降衷於民若有恆性克綏厥猷惟后而所以降於我者命也有此衷則亦必有此猷矣言性出於命人能有此降衷之性則是仁義道德之理民之秉彛好是懿德彛即性也懿字包仁義道德字秉詩蒸民天生蒸民有物有則民之彛好是懿德而所以秉於我者命也有是彛則亦必有是懿矣言性出於命人能有是秉彛之性則有是仁義道德之理會而歸之應破題會歸字千流萬𣲖一源也千條萬枝一本也譬喻應道德一仁義也仁義一性也性一命也意仁義非精也道德非粗也是不過一天命之性而已矣言仁義道德具於性性出於命一而已矣性中庸天命之謂奈之何世之昧者常總總也應冒子特人自昧之耳要入戰國來况戰國之人心乎入此一句方引得孟子來孟子道性善提起性善二字有眼目是根源處孟子道性善言必稱堯舜斯言一發所以為千萬世理學之根源天理人心之凖的天下始知所向矣先挈起性説方是此題目却説仁義道德是性中物性是命中物至於謂性謂命之説亦縷縷言之非贅也又把性命合説也孟盡心下口之於味也目之於色耳之於聲也鼻之於臭也四肢之於安逸也性也有命焉君子不謂性也云云命也有性焉君子不謂命也性命之理一日不明於天下其所以陷溺其良心也必矣言仁義是性命中物心孟告子上雖存乎人者豈無仁義之哉其所以放其良心者云云自性命之理一明而仁義之言昭昭然於天下也自性命上過仁義上來惻隱仁之端也羞惡義之端也孟公孫丑上云云全句此端也何從而來哉喚下意性所有也以仁義歸之性即天之所賦也以性歸之命事親仁之實也從兄義之實也孟離婁上仁之實事親是也義之實從兄是也此實也何自而有哉喚下意性所根也以仁義歸之性即天之所賦也以性歸之命一初之天純粹至善應破題字用周子通書語孰非此仁孰非此義謂稟性之初已有此仁義了然知其為惻隱羞惡而不能實踐其惻隱羞惡之端轉歸道上總上文踐字替蹈字應冒頭人惟有此理而不能蹈此理之實知其為事親從兄而不能有得乎事親從兄之實歸德上總上文得字應冒頭知此理而不能得此理之真則是率天下而路也豈萬理會歸之地哉無道德則是無仁義應破題語反説用孟子全句故以德行仁仁即此德也又用孟子實德字證孟子以德行仁者王配義與道義即此道也用孟子實道字證道孟子養氣配義與楊墨道之禍也吾距之蓋深懼夫苟可以禍吾道即所以禍吾仁義也孟滕文公下楊氏為我是無君也墨氏兼愛是無父也云云楊墨之道不息孔子之道不著是邪説誣民充塞仁義也云云能言距楊墨者聖人之徒也仁又告子上率天下之人而禍義者必子之言夫鄉願德之賊也吾辨之蓋深慮夫一至於賊吾德即所以賊吾仁義也孟盡心下孔子曰過我門而不入我室我不憾焉者其惟鄉願乎鄉願德之賊也注原與願同鄉里謹願之人孔子以其似德而非德故以為德之賊仁以上二股説道德即是義會萬於一仁義吾道德散一於萬道德吾仁義應冒子道德一仁義也意大周子通書是萬為一萬一各正小有定是皆天之命乎人應冒子性一命也而人之所以為性也應冒子仁義一性也吾之得乎是命以生而莫非全體者性也人之所受為性庸以上數句用朱子中或問語見原題注一會歸之頃應破題字則仁義也道德也皆性也性即天之所命也道德即仁義中所有仁義即性中所有性即命中所有一合而為一初之天其至矣乎應破題語此孟子安得不拳拳為戰國人心慮也歸孟子身上而趙岐其知之矣應冒頭舉題處雖然性命之學難言也末將貶諸子之言性故如此説荀之惡習也非言性也荀子性惡篇人之性惡其善者偽也揚之善惡混氣也非言性也揚子修身篇人之性也善惡混修其善則為善人修其惡則為惡人愈之上下品才也非性也韓原性分性為上中下三品議以上判斷三子皆本之伊洛諸儒論性且不明况於命乎抑三子既不知性如何知命是無怪乎申韓黃老之徒申不害韓非黃帝老子竊吾仁義道德之似嘵嘵然於天下後世也三子不知性命則不知有仁義道德了嗟乎夫子止言仁也又引夫子來作議論而軻則兼言義矣伊川云仲尼只説一箇仁孟子開口便説仁義夫子性不可聞也命則罕言也語夫子之言性與天道不可得而聞也又子罕言利與命與仁軻則反覆其辭而不少屈夫子以性命為難言至孟子則屢言及性命事軻豈好辨哉孟子云豫豈好辨哉豫不得已也為戰國憂也為道統計也應冒子繳處數語雖然再用雖然字繳餘意不可以已也有餘味行文得法向微軻之言則是三子者指荀揚韓三子久矣其為天下道術裂矣乎吁繳結老成有收拾謹論此篇謂道德即是仁義之理此理自性命中有之後篇謂忠信即是仁義之理此理自樂善中得之合異為同格與前篇仁義道德性命論同機軸仁義忠信樂善如何林鏜夫出處孟告子上孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫此人爵也立説張南軒曰仁義又言忠信者在已為忠與人為信忠信只是誠實此二者也既曰仁義忠信又曰樂善不倦好懿德之常性也惟樂善不倦則於仁義忠信斯源源而進矣此篇本此立説謂仁義吾性之理忠信此理之實樂則為情之動此之所謂機者是也吾之所樂能於其善不於其不善則是機之動此身渾渾乎仁義忠信之天矣仁義忠信豈復外吾所樂之善哉批云理學透徹筆力老蒼非晚學可到論曰實理不在真機外也實理是仁義忠信真機是樂善機之動以天此天字説善則此身無非天矣此天字説仁義忠信謂樂此善之天則此身無非仁義忠信之天有此二句語意方足人之初生天理備具本無虧欠也人性皆有仁義忠信川本無虧欠用伊語惟其深造自得止於至善則真機所動不逐外樂説人之樂在乎善大孟子深造之以道欲其自得之也又學在止於至善凡其樂乎善者即天理之實豈曰求在外者哉樂在乎善則仁義忠信油然而生於心且仁義吾性之理也忠信此理之實也解仁義忠信四字用張南軒議論見立説注性分之天孰不充足人之性分皆有仁義忠信不必外求是性也不能不動而為情就性上過情字有眼目動而為情是樂朱子語録性是未動情是已動蓋心之未動則為性心之已動則為情彼機之動者理之形也機之動是樂理之形是仁義忠信充吾真樂無有不善説出善字為主則理之精微著於見面盎背之頃應主意理字於孟子見於面盎背仁義忠信蓋有油然而發露者仁義忠信皆從樂善而生使所樂人而不天徇人欲而不主天理則為不善則樂淫於善之外樂而不淫則為善出於善之外則淫耳觸境皆妄去理逺矣去仁義忠信之理愈逺孟子道性善者也孟子滕文公上孟子道性善言必稱堯舜以樂善而繼仁義忠信言之舉本文其得諸吾心真機之樂乎應破題語真機字指樂善繳結不費力仁義忠信樂善如何請申之人生而靜天之性也感於物而動則好惡形焉從性上原起性記樂記人生而靜天之性也感於物而動之欲也物至知知然後好惡形焉然則樂也者其此情之動而為真機者乎轉歸情上樂字應破題真機字樂荀子好惡喜怒哀謂之情鳶飛魚躍之妙孰非性分之陶陶以下二句形容樂善意淵中庸鳶飛戾天魚躍于蟲鳴螽舞之餘又何者非實理之形見詩出車喓喓草蟲躍躍阜螽箋云草蟲鳴阜螽躍而從之天性也苟機之動不于其真而于其偽則樂以人而非天矣故髙梁大厦不如仁宅之安固也而人之樂乃奪於髙梁大厦此以下三小段反應冒子真機所動不逐外樂意孟子離婁上仁人之安宅也髙車駟馬不如義路之正固也而人之樂乃移於髙車駟馬同上義人之正路也前漢于定國傳髙大門閭令容駟馬髙蓋車紆朱懷金不如忠信之實固也而人之樂乃錮於紆朱懷金揚子學行顔氏之樂也內紆朱懷金之樂也外機為物動所樂日非自苟機之動而下至此反説議論有味應冒子所樂人而不天則樂淫於善之外意豈知繼善所以成性而人之情皆可以為善乎只一句便歸樂善意告易繫辭繼之者善也成之者性也又孟子子上乃若其情則可以為善矣吁善何物也喚下文意即仁義忠信之理也善只是仁義忠信之理蓋自有怵惕之心而仁之理已具自有羞惡之心而義之理已存孟子公孫丑上今人乍見孺子將入於井皆有怵惕惻隱之心云云仁之端也又告子上羞惡之心義之端也盡已之謂忠有諸已之謂信而忠信者又仁義之實也朱文公論語集解盡已之謂忠孟子盡心下有諸已之謂信是理也上聖下愚均氣同體吕與叔克已銘凡厥有生均氣同體至於操舍存亡則不能不異者抑豈無故接上生下是文字過脈處孟告子上操則存舍則亡情既生矣機隨觸焉應主意情字機字樂之於外則日與仁義忠信逺矣反説此是樂於不善者樂之於內則真機之動而實理全矣正説此是樂於善者應破題實理真機字甚哉君子之所樂者不可不主於善也歸重在主善上而所以考其善不善者豈有他哉於已取之而已矣融化經語夫動吾真機陶吾天樂用莊子語則自孺子入井之時見前注充之於事親之日孟子離婁上仁之實事親是也而家人之嘻嘻者即其樂此仁之善也易家人象曰家人嗃嗃未失也婦子嘻嘻失家節也自無適無莫之際語四無適也無莫也義之與比充之於從兄之頃見前注而兄弟之怡怡者即其樂此義之善也語十三兄弟怡怡為人謀而不忠乎與朋友交而不信乎語學而曽子曰吾日三省吾身云云而申申夭夭於居處語默之際者即其樂此忠信之善也語七子之燕居申申如也夭夭如也以上鋪三小段講所樂之善即是仁義忠信至是則天髙地下此樂之充拓也以下三扇虛講樂字皆是用古文記樂記云云雲行雨施此樂之溥博也易乾卦無懷之逍遙洞庭之雅奏此樂之彌滿磅礴也説得樂字開闊池古有無懷氏又莊子天運黃帝張咸之樂於洞庭之野舜之樂散而為南風之詠以下三扇實事講樂字風家語辨樂舜彈五弦之琴歌南之詩文王之樂充而為演易之旨選魏文帝典論西伯幽而演易夫子之樂在其中而曲肱於飲水之時也語七子曰飯疏食飲水曲肱而枕之樂亦在其中矣上二句短此一句長方承得上句起其視夫峩其冠華其裾髙大其榱題者所樂霄壤也孟子堂髙數仭榱題數尺其視夫煦煦為仁孑孑為義寂滅其心性者所樂徑庭也韓原道彼以煦煦為仁孑孑為義又文公答徐子融書釋氏以空虛寂滅為宗樂仁義忠信之善而會仁義忠信之實此機即理耳此情即性耳此數句繳結上段收拾機字理字性字情字却再用顔子事意脈不斷顔氏之子其殆庶幾乎易繫辭云云人知陋巷可憂也而彼樂之簞瓢可憂也而彼樂之語六賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂而不知其得一善服膺弗失所樂蓋在此也中庸回之為人也得一善則拳拳服膺而弗失之矣孟氏子憫人心之淫於外樂也舉本出處應冒子樂淫於善之外語辨天爵人爵之異而以樂善為言見本題注固將使人心樂於善而不失其仁義忠信之正也發明主意七篇之書諄諄乎以善淑人而仁義之論説不離口程伊川云仲尼只説一箇仁孟子開口便説仁義孟子蓋亦自得其所謂樂者矣他人只是敘出處便結大講此更發孟子亦自得其樂以下引用孟子實事尤髙人一等食前方丈侍妾數百已不足以奪其所志此是外樂食孟盡心下前方丈侍妾數百人我得志弗為也而居安資深至於反身而實樂莫大焉此是內樂反孟離婁下居之安則資之深又身而誠樂莫大焉彼以其富我以吾仁彼以其爵我以吾義孟子公孫丑下云云吾於此益有以見孟子之真樂矣結盡孟子意雖然論尾餘意發孔孟互相發明意又歸重忠信孟子以仁義為言者也忠信之論蓋不多見説此意正欲把孔子言忠信事來説鄉原之似已深闢之孟子盡心下鄉原德之賊也居之似忠信行之似廉潔而天爵之説則特以忠信為言見本題注是故以忠信為仁義之實也接上生下又見前注然遡而求之論語一書仁義寥乎罕聞見前注伊川語而忠信之旨凡數見語第一主忠信母友不如已者又語第三必有忠信如丘者焉又語十五言忠信行篤敬雖孔孟互相發明皆所以道人心之善而所以必主忠信者又豈無説總孔孟合説蓋人不忠信則事皆無實得前輩議論為惡則易為善則難照善字然則忠信也者又教人樂善之根柢歟歸重在忠信上大易曰忠信所以進德也易乾卦知大易之所謂進則知孟子之所謂樂末又引易對結謹論立説正大格此篇與葉君櫸五始之要論同意周禮春秋表裏如何論阮登炳出處漢盧植傳今毛詩左氏在周禮各有傳記其與春秋共相表裏立説王道不可一日不明於天下周公處時之易而制周禮固以尊王為主孔子處時之難而作春秋亦以尊王為主孔子之心即周公之心也批云立説正大行文通暢此是省監官樣文字不可不熟讀論曰論聖經有相符之理相符貼表裏字要不過乎尊王而已周禮春秋同以尊王為主蓋王道不可一日而不明也挈起王字順接惟其不可一日而不明申上文則凡前後典籍之所存周禮在前春秋在後皆其大義之所在大義在尊王上雖若不相為謀而其實未始不相合也二經之所以相為表裏者同在於尊王而已或者徒見夫世變之有升降王道之有汙隆謂周時與春秋時不同汚記檀弓道隆則從而隆道則從而汚遂謂夫聖人之作經有不可以一概言者從上反説到此而不知經皆為尊王而作也喝出主意前聖處乎其時之易則王道之明者固易明周公制周禮在於尊王後聖處乎其時之難則王道之難明者為愈明孔子作春秋亦在於尊王使天下萬世昭乎其不容泯者時雖異而心則同也經雖殊而道則一也安有不相表裏者哉二經皆以尊王為主故相表裏夫使當王者之世周之時聖人不作經以先乎尊王以詔乎其後周公制周禮而後乎伯者之世春秋之時非有聖經復先乎書王以合乎其前孔子作春秋又何以使天下常知王道之為尊也邪照主意盧植在漢蓋志於尊王者也舉本出處主意在尊王二字故合周禮春秋而曰與相表裏植之意固有在矣包含尊王意不露周禮春秋表裏如何請申之平繳冒頭吾嘗聞表裏之説矣舉外來表裏事為證八卦與九章相表裏前漢五行志劉歆以河圖洛書相為經緯八卦九章相為表裏原道與軻雄相表裏唐韓愈傳其原道原性師説等十數篇皆奧衍閎深與孟軻揚雄相表裏而左右六經以其時考之則前後固有遼絶之殊矣且開説原其互相發明為斯道計者則未嘗不相為表裏也合本題説况夫王道之在天下發出尊王意綱常之所以植立法度之所以彰明禮樂之所以修舉揚子法度彰禮樂著皆人心天理之正斷斷乎不可易者二經皆所以明王道聖人作經以寓一王之法儒林傳序孔子因魯春秋舉十二公行事繩之以文武之道成一王法所以扶持世道於不壞不滅之地者以其有王者在耳喝出王字有力王者之迹息而詩亡詩亡然後春秋作孟子離婁下世有周公則春秋不作蘇老泉春秋論云天下有君則春秋不當作春秋不作則周禮一書皆王道也周公制周禮乃王道素明之時春秋烏乎作難一難春秋所以救周禮之窮也解不謂春秋時已不如周天下知有王孔子不容不作春秋以明王道禮樂征伐不自天子出而自諸侯出語季氏孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出則周公其衰矣春秋不作其可乎記禮運魯之郊禘非禮也周公其衰矣天下不能以常治人心不能以常古春秋之時不如成周之時王道固有時乎難行矣時不如成周則王道難行王道有時乎難行吾夫子其肯沒周公之志邪周公之志以尊王為主則孔子亦以尊王為主周公之志不可沒則挽回世變之所趨闡明古今之正理復顯然著見於斯世春秋亦一周禮耳周禮春秋之經雖殊而尊王之心則一不然周禮敵八百年之天命而王室何其尊文中子魏相篇周禮其敵於天命乎又左宣三年成王定鼎于郟鄏卜世三十卜年八百天所命也春秋紀二百四十二年之行事而天下之所以尊王者又何如邪左序二百四十二年行事王道之正人倫之紀備矣合盛衰而參之則二經表裏之意可以不言而自見矣繳盡原題意自今觀之六典之設他務未遑禮天官序周公居攝而作六典之職謂之周禮又周禮六篇其官有三百六十刑六典一曰治典二曰教典三曰禮典四曰政典五曰典六曰事典首揭以惟王之一辭獨冠於設官分職之首惟王建國辨方正位體國經野設官分職以為民極乃立天官冡宰使率其屬而掌邦治以佐王均邦國乃立地官司徒使率其屬而掌邦教以佐王安邦國乃立春官宗伯使率其屬而掌邦禮以佐王和邦國乃立夏官司馬使率其屬而掌邦政以佐王平邦國乃立秋官司冦使率其屬而掌邦禁以佐王刑邦國冬官考工記鄭注云此篇司空之官亡以此備數此尊王為周公作經之要領也以上周公制周禮以尊王為主春秋之經筆削尤嚴史孔子世家孔子為春秋筆則筆削則削子夏之徒不能贊一詞而書王每先拳拳焉者不一而足春秋經十二公皆書云元年春王正月文十二公隱桓莊閔僖宣成襄昭定哀又豈非尊王為孔子作經之端本乎以上孔子作春秋亦以尊王為主惟其皆主於尊王則表裏之大者不外是矣總周禮春秋二經皆主尊王故相表裏故命曰書王命治曰贊王治周禮所以重一王之權也內史掌書王命又天官作大事則戒于百官贊王命王視治朝則贊聽治而曰天王正月曰王正月春秋所以重王者之權者其與周禮同乎異乎春秋經元年春王正月詳見上注又秋七月天王使宰咺來歸惠公仲子之賵又如天王狩於河陽天王出居於鄭之類書天王者二十有六凡諸侯則使之入王皆朝覲宗遇會同於王周禮所以謹奉王之禮也周禮小行人令諸侯春入貢秋獻功凡諸侯入王則逆勞于畿協九儀之禮朝覲宗遇君之禮也又春官春見曰朝夏見曰宗秋見曰覲冬見曰遇又天官太宰大朝覲會同而如京師朝于王豫奪廢置則詔王治教刑政則佐王成周悉聽命於王而行之周禮以八柄詔王馭羣臣一曰爵以馭其貴二曰祿以馭其富三曰豫以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過又太宰之職掌建邦之六典以佐王治邦國一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典較之是非褒貶之筆足以榮辱天下之君大夫者即天子之行事孰非表裏於周禮之經者歟司馬遷傳春秋上明三王之道下辨人事之經紀别嫌疑明是非又穀梁傳一字之褒寵踰華衮片言之貶辱過市朝又孟子春秋天子之事也爵祿出於王賞賜出於王舉內外朝之大政事周家悉由王者而親決之見前注其視春秋賞人之功去人之族貶人之爵者同符吾夫子遂紀天子之賞罰以為懲勸之具又非表裏於周禮之當行者歟見蘇老泉春秋論賞人之功注如書齊桓召陵之盟晉文公城濮之戰之類人去人之族注如約及諸侯之大夫盟于宋之類貶之爵注如齊侯伐山戎而書人之類又賞罰者天下之公也是非者一人之私也位之所在則聖人以其權為天下之公而天下以懲以勸云云大抵為周公作經於太平之世者易為孔子作經於叔季之時者難應冒頭前聖處乎其時之易後聖處乎其時之難意世有周禮則王者之治行世有春秋則王者之教明應冒頭王道之明者固易明與王道之難明者為愈明意夫固關於其時而所以垂當今而詔來世者為一尊王之義而已此表裏不可以相無也照主意盧植得不舉二經之表裏而並言之邪引本文雖然周禮春秋一也使孔子生周公之時未必不為周禮使周公生孔子之世未必不為春秋二聖人尊王之心一而已矣吾觀仲尼嘆斯道之不行乃有不復夢見周公之説是又托春秋欲行周公之事者也語甚矣吾衰也久矣吾不復夢見周公又老泉春秋論云周公心存王室雖其子孫不能繼而夫子思周公而許其假天子之權以賞罰天下也土之盟見後尊王黜伯下注翟泉之會定元年晉魏舒合諸侯之大夫于狄泉將以城成周云云河陽之狩左傳僖二十八年晉侯召王以諸侯見且使王狩河陽仲尼曰以臣召君不可以訓故書天王狩於此何如時惜乎夫子遇時之難終不若周公用時之易爾應冒頭語漢固非周比本文盧植言於漢時有能尊王黜伯申春秋而用周禮則漢亦可為矣史記世家吳楚之君自稱王而春秋貶之曰子踐土之會實召周天子而春秋諱之曰天王狩於河陽此是尊王黜伯此又盧植言外之意本出處愚故併及之謹論立説正大格此篇與阮登炳周禮春秋表裏論同意五始之要如何葉君櫸出處前漢王褒聖主得賢臣頌其惟春秋法五始之要在乎審已正統而已注元者氣之始春者四時之始王者受天命之始正月者政教之始即位者一國之始立説春秋之時王綱不立故孔子因魯史作春秋託魯以尊王其書法自元年而下至即位而上特致嚴於書王之一字蓋上明王室之當尊而責侯國之自僣也王褒所言五始之要徒知謹始一事而不知尊王之大法豈足以知聖人作經之意哉批云説有源流文有操縱辭嚴義正駁倒王褒謹始之説論曰知謹始而不知尊王責王褒徒知謹始一節不知尊王之大法非聖經之本旨也非孔子作春秋尊王之本意聖經為尊王作也提起王字緊切夫既為尊王而作申上文則所以正天地之常經示萬世之大法者在是説春秋尊王之義所關甚大豈特謹始之一節而已哉貶本題意或者徒見夫始在改元而重在即位暗説王褒只知謹始一事指春秋書元年春王正月即位是謂五始又見本題注於是附會分裂而為之説遂有五始之説不知春秋之作非聖人本心也正説主意應上謂孔子不得已而作春秋王綱不立侯度廢弛春秋之時王道不明故不得已而寓於筆削之間史孔子世家孔子為春秋筆則筆削則削以尊王而垂法於後世其意深矣孔子本意在於尊王使徒欲謹始以立法而王綱之大者不拳拳而寓尊王之意説王褒但知謹始之意不知尊王之義吾恐大義乖而彞倫斁矣如此則王道不明矣範孝經異端起而大義乖又書洪彛倫攸斁故聖人託魯以尊周孔子因魯史以作春秋周是王魯是侯國書周以愧魯左傳隱公元年春周正月自元年而下至即位而上特致嚴於書王之一字春秋元年春王正月公即位蓋以明王室之當尊而責侯國之自僣責侯國不知尊王則即位之或筆或削皆可以王法繩之見前注以此示人後世其敢私正朔而改元者乎後世安敢不尊王此則春秋之本旨也孔子作春秋本意如此五始之要如何王褒徒知謹始之意豈知尊王之大法哉貶王褒甚矣五始之例為聖經惑也見本題注王褒徒見圖緯之説以黃帝受圖而得五始引五始事為證凰南宋書黃帝主於元扈洛水之上鳳銜圖至前又見通鑑外紀云云則以為春秋法之謂王褒言五始之要得之黃帝之説然黃帝之時安有公即位之事難上文借曰即位為一國之始則經之不書即位者是闕一始矣見冒頭注又見本題注又何得而言五始哉反覆辨難五始之説自褒倡其説而何休和之又引何休言五始事為證漢何休著公羊墨守於是以元之氣正天之端以天之端正王之政以王之政正諸侯之即位而五始之説安之以為當然公羊隱元年公何以不言即位注即位者一國之始政莫大於正始故春秋以元之氣正天之端以天之端正王之政以王之政正諸侯之即位以諸侯之即位正境內之治五者並見相須成體是則諸侯改元即位其果可以為法乎難倒王褒五始之説夫改元正號即位謹始王者事也諸侯安得而私之公羊隱元年注惟王者然後能改元立號君之始年必書曰元年春王正月公即位史策之正法也使魯得以自私則列國諸侯皆不必稟王朝之正朔夫子書元年春王正月公即位書王之一字蓋以尊周非以私魯若是私魯一國則諸侯皆不知有王之可尊矣而禮樂征伐亦不復自諸侯出矣用論語全句當王室尚存之日而諸侯有私正朔者僣也况敢自即位邪難倒王褒之説聖人於元年之下即位之上而以王法繩之應冒頭語非私魯也乃愧魯也應冒頭書周以愧魯語愧魯者所以愧諸侯也愧列國諸侯皆不知尊王此義不明而後有移元於魯之説因魯史書元年非為魯自改元也公羊注王者然後能改元立號有託王於魯之説王指尊周非為魯而託曰王也因公羊注春秋紀新主受命於魯故以録即位明王者當繼天奉元以是謹始毋乃開後世僣亂之門乎應前僣字昔者文王受命當天下三分之時敘起主意下語泰伯三分天有其二以服事殷享國五十年矣而未嘗有改元即位之文書無逸書曰惟中身厥享國五十年書無逸文王受命惟中身厥享國五十年注文王九十七而終中身即位時年四十七言中身舉全數也又曰惟九年大統未集書武成我文考文王克成厥勳云云惟九年大統未集是未嘗私改正朔也謂文王皆無改元即位之事證倒王褒五始之説奈何自共和之後諸侯乃各自私其國以改元哉周自共和王以後諸侯之國皆自改元觀傳之所載如鄭國之事有僖之元年簡之元年鄭亦自書元年是諸侯皆改元非獨魯也改元一事諸國皆然非特魯國為然即此而觀天下知有王者寡矣觀諸侯自改元一節便是不知有王室之當尊諸侯之改元即位乃王室之罪人而謂魯史足為謹始法乎極責諸侯不知尊王不當言改元即位夫子託魯以尊周應冒頭主意非謂魯之元年足以善始也謹始不在書元年上亦非謂魯之即位足以奉元也亦不在書公即位上周之天命未改則魯之有元年是邪非邪奉元乃王者之事魯不當書元年左傳周德雖衰天命未改周之王室尚存則魯之自即位是邪非邪即位乃王者之事魯不當書公即位故聖人之書法致謹於書王之大要主意應冒頭自元年而下至即位而上特致嚴於書王之一字語其書王於元年之下者用見元惟王之所自出謂夫子於元年之下書王字正是尊王其書王於正月之上者用見正朔非諸侯之所當改謂夫子於正月之上書王字亦是尊王自正月而次則以公即位繼之又明其罪以責諸侯而示王法之所不恕也謂夫子於正月之下書公即位亦是尊王蓋即位天子之稱天子方可言即位諸侯豈可言即位魯既舉行即位之禮則不能稟正朔於周矣責魯不當舉行即位之禮聖人獨以周正書於即位之始則有愧於尊王魯其能免乎左傳隱公元年春王周正月不書即位攝也注假攝君政不修即位之禮故史不書於策傳所以見異於常以秉禮之魯尚不知王室則列國之諸侯又可愧矣左閔元年齊仲孫湫來省魯難曰魯猶秉周禮未可動也大哉筆削之有功於王室乎應冒頭即位之或筆或削語歸正於周以明天命之未改應前面周正月及周之天命未改語託王於魯以明王室之當尊應前面託王於魯及王室當尊等語託始於隱以明筆削之大法春秋序曰然則春秋何始於魯隱公答曰周平王東周之始王也隱公讓國之賢君也隱公不書即位以明隱公而下皆非王命之所當立見前注於元年之外皆去正月以明當世諸侯皆不稟正朔於王事並見三傳至於隱公無王犯天下之大戒而又始終書王以愧之隱書元年春王正月又書三年春王二月又書四年春王二月又書七年春王三月又書九年春王三月此皆大義之不可犯也繳以上説夫子本意只在於尊王王褒不知聖人始隱之意而乃以為五始焉則其惑日甚矣責王褒不知夫子尊王之意然則人君謹始之法獨不可以是推之乎主意只在尊王上蓋尊王之義明則改元即位非所以為臣子訓見得王室當尊其謹始之義不在改元即位故公羊左氏足以知此公羊左氏知尊王之義而董仲舒則為通論也仲舒亦知尊王之義公羊以加王於正為大一統詳見下注左氏以正月為周正月見前注至仲舒則舉天地常經古今通義言之董仲舒策春秋大一統者天地之常經古今之通誼也此春秋經世之本旨懲列國之僣亂而示一統之大義以正本始春秋大意只在尊王黜伯上則元年之意明而萬世之經正矣繳盡本意書謂君為元首書益稷元首明哉又謂君為元后書泰誓亶聰明作元后則元者天子之稱也謂元亦王之義大哉乾元萬物資始易乾卦至哉坤元萬物資生易坤卦位乎兩間者當與天地參用中庸語故體元者人君之職也春秋隱元年注凡人君即位欲其體元以居正元即仁也易乾卦仁人心也孟告子上仁人心也體仁以長人則元之義得矣乾卦君子體仁足以長人此豈列國諸侯所敢僣哉應大講中僣字意愚故推明一統之義以正五始之要一統是尊王之義為人君者其可以不體元乎見前面注謹論前篇謂二經以尊王為主此篇謂五始以尊王為主主意一同合而觀之可以觸類而長由微知顯格可與聖人大明至公論參看聖主正身宣德如何論蕭符世出處前漢王吉傳宣帝頗修武帝故事云云時外戚許史王氏貴寵而上躬親政事任用能吏吉上疏臣聞聖主獨行於深宫得則天下稱頌失則天下咸言之行發於近必見於逺故謹選左右審擇所使左右所以正身也所使所以宣德也立説以知微為正身以知顯為宣德近而正身無一毫之可憾者其微也逺而宣德無一毫之可掩者其顯也由微而之顯由近而及逺此帝王恭已之化也批云此等題目易做得粗此篇文字脫去卑陋却入精細有理致有學識有議論比之一例説近習者大有徑庭論曰知微之顯者近而正身是知微逺而宣德是之顯中庸知微之顯可與入德矣可以言恭已之化矣恭已是正身化是宣德而語十五夫何為哉恭已正南面已矣古先帝王之恭已於上也豈嘗欲其善之顯哉且開説古者聖人惟欲此身之正豈欲此德之宣然而不欲其顯而不能以不顯何也就上文搬過顯字説宣德喚下意天下惟實理不容偽應上文正身必能宣德蘇文人無所不至惟天不容偽修於已者無毫髮之可憾説正身意則形於人者無毫髮之可掩説宣德意故微者必至於顯應微顯字正身於微必能宣德於顯其不可以顯者當制於微而後可也德不能宣之於顯當使身先正之於微不可以顯而不能不發於微焉將上面顯微字反説吾懼其微者有時而顯也身不能正則德不能宣恭已之君暗説宣帝亦惟於其近焉而審之説本文謹選左右意處於近者無以纍吾所履之正選左右以正身則流於逺者益足以昭吾所養之純擇所使以宣德不然近者之不察所以為恭已之纍也多矣身不能正未有不發乎邇而見乎逺也身不正則德不能宣逺易繫辭行發乎邇見乎是故人已一致也顯微一脈也應破題顯微字審於近者所以謹萬化之原也總説主意王吉以正身宣德告孝宣本出處而有及於左右所使之人見本題注夫左右近君者也申上文身以左右而正則德以所使而宣矣解析主意分曉此帝王恭已之化也應破題恭已字不謂漢之王吉有見焉取王吉之言聖王正身宣德如何帝亦思於近者而審之乎近即是左右嘗讀中庸至於君子戒謹乎其所不覩恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也主意蓋本乎此故原題便用此語見中庸又朱文公釋云君子必戒謹恐懼乎其所不覩不聞者所以言道之無所不在無時不然學者當無須臾毫髮之不謹而周防之以全其本然之體也又言莫見乎隱莫顯乎微而君子必謹其獨者所以言隱微之間人所不見而已獨知之則其事之纎悉無不顯著又有甚於他人之知者學者亦當隨其念之方萌而致察焉以謹其善惡之幾也而喟然嘆曰人之不能戒謹恐懼於不覩不聞也豈不能掩其不善於共覩共聞之地而隱者見焉微者顯焉何哉將上面數句反説設疑下難又見下注天下之理不可以偽為也解上文應冒子實理不容偽屋漏不愧而自處於有愧人之知其不愧者自若也中庸詩云相在爾室尚不愧於屋漏間居為不善而自表其善人之知其不善者亦自若也大學小人間居為不善無所不至見君子而後厭然掩其不善而著其善人之視已如見其肺肝然則何益矣故曰人之視已如見其肺肝然則何益矣見上注知以上數語皆是説微之顯意况人主一身大關萬化歸聖主身上來踐履於深宫獨行之中而利害形於四方九土之逺見本題注存養根於暗室屋漏之微而禍福極於天地萬國之大見前注者以上四句應冒子修於已無毫髮之可憾則形於人者無毫髮之可掩意嗚呼是果可以偽為乎應冒子實理不容偽是以聖帝明王知吾身之所關者重則凡近於吾身者有所不敢輕説謹選左右意曰小大之臣咸懷忠良其侍御僕從罔匪正人侍御僕從指左右字聖書冏命篇昔在文武聰明齊云云曰正豫羣僕侍御之臣交修不逮同上命伯冏為周太僕正曰惟豫一人無良實賴左右前後有位之士匡其不及凡為是者全吾身所以全天地萬物也應前面數語非曰將以昭昭也孟以其昭昭使人昭昭而要其終也修於身者正自質諸人而無疑行於已者粹自暴諸天下而無愧正身則可以宣德往往不求昭而昭焉自然昭宣則微之顯誠之不可掩也固如此也應冒子微顯字掩中庸夫微之顯誠之不可如此夫此所以為恭已之驗也應冒子恭已字嗟夫以下説左右近臣當謹其選周官帷幄帟綬之職雖微必審禮天官幕人掌帷幄幕帟綬之事注左旁曰惟組綬所以繫帷也則斯謀斯猷我后之德君陳始得以順之於外書君陳爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德而非致謹於懋乃后德之時雖穆王亦不能使其德之宣書冏命汝作大正正于羣僕侍御之臣懋乃后德交修不逮謹簡乃僚然則恭已之化所關係者如此應前恭已字人主亦焉用以不正者纍吾正而宣其所不可宣哉反繳前意且就漢之君論之引漢事講文帝最淵默淵默深沈武帝最英偉英偉奮發淵默者似韜晦若難乎人之知且開説文帝似不求顯而英偉者近表傑宜欲為名以自髙也武帝似求顯然道德為麗文帝之不可掩者如此至今言漢君之賢者首縷指焉合之東方朔傳臣願近述孝文皇帝時以道德為麗以仁義為凖而內多欲外仁義其窺見武帝之心事者正不特一汲黯而已汲黯傳上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎是何不求顯者或彰彰於一世之共覩文帝不求顯而德自顯而欲著其善者僅若此邪武帝求顯而德不顯意以是何字喚下嗚呼是可以求之二君之身矣德之顯與不顯皆係身之正與不正蓋嘗思之文帝不私一弄臣其左右前後粹然一出於正則正身有道者固鼓鐘聲聞之本也申屠嘉傳鄧通方愛幸居上旁有怠慢之禮嘉曰通小臣戲殿上當斬上使使持節召通而謝丞相此吾弄臣君釋之又詩鼓鐘于宫聲聞于外武帝天資英明固非近習所能惑而文成五利之徒猶得以中其心帝之身可知矣郊祀志方士更來言神仙事齊人少翁以方見上乃拜為文成將軍膠東人欒大來見言方大悅拜為五利將軍雖伏矣亦孔之昭用中庸語只是莫見乎隱莫顯乎微意帝獨能擇其善者以宣於人哉繳上二君謂文帝能正身故能宣德武帝不能正身故不能宣德王者正身宣德之説即仲舒正心以正朝廷之説也見董仲舒策宣帝之正其身者固不可以淺窺入宣帝講正身處稍略更可入許史王氏貴寵意而修洪業選茂異天下皆知帝之尊道公孫宏贊孝宣承統纂修洪業講論六藝招選茂異信賞罰核名實天下皆知帝之制治宣帝贊孝宣之治信賞必罰綜核名實務寬大假貧民天下皆知帝之好仁本傳黃龍元年詔曰朕數詔公卿大夫務行寬大順民所疾苦又開倉廩假貧民則其德亦可謂宣昭也已總上三段然使帝而非得夫恭已之化其效決不至此應冒子恭已字然使帝而盡得夫恭已之化其效又不止此下語有斟酌有開合吉之此言其欲進宣帝於古聖主歟引本出處左右一語帝安得不深思也見題注不然黃王龔召布滿中外帝何患其德之不宣哉黃霸王成龔遂召信臣皆宣帝時循吏正身之説吾不謂吉而有講乎此也取王吉所言繼此而後知此説者惟一孔明蜀諸葛亮字孔明孔明之言曰宫中府中俱為一體以昭陛下平明之治見出師表云云噫宫府之體合而為一則竒邪不得以為王躬之纍證左右正身意竒邪字出周禮邪音邪未有其身正而其德不宣者也正身則可以宣德是亦恭已之説也應冒子恭已字此唐虞三代正君之學至漢而未盡泯也繳盡講中意雖然正身固所以為宣德之本此論本意而宣德亦可以驗正身之功倒説收入來觀諸宇宙而德澤洋溢人誦明聖則其身之正可知矣德之宣於外可以知身之正於內如其不然其身之未純乎正亦可知矣反説中庸之言道曰本諸身徴諸庶民見中庸故善觀元氣者察形以知脈以一身譬喻善觀君德者由顯以知微應冒子顯微二字君天下者如之何不深長思也歸聖主身上夫何為哉恭已正南面已矣用論語全句應破題恭已字文勢圓轉謹論由微知顯格可與聖主正身宣德論參看聖人大明至公如何論王珏出處張藴古大寶針聖人受命拯溺亨屯大明無偏照至公無私親立説謂顯處能明而隱處不能明非大也見處能公而微處不能公非至也顯與見處乃人所共知之境隱與微處乃幽獨得肆之中惟聖人於隱處而無一毫之偏斯謂大明於微處而無一毫之私斯為至公矣知舉批意味深長議論明瑩説得大明至公字非苟作者論曰語盛德之事者盛德二字貼聖人大明至公字分曉要當以隱微之地觀之主意謂於幽隱處能明是謂大明細微處能公是謂至公夫天下之至顯指大明常伏於天下之至隱大明伏於幽隱處指無偏照意而所謂充周不可窮之理指至公其所發者固甚微也至公起於細微處指無私親意後之君天下者暗指太宗遍物以為明出一明字制物以為公又出一公字然有時能矯揉於人所共知之境外面易明易公此是顯與見處而每不能不失於幽獨得肆之中裏頭難明難公此是隱與微處用朱文公議論於是明者非不明也而未能其大也喝出大字公者非不公也而未能其至也又喝出至字明而未大公而未至接下生意意者顯微不能以無間見隱不能以如一歟顯與見是人所共知之境隱與微是幽獨得肆之中張藴古之告太宗曰見題注大明無偏照至公無私親舉本出處全文二句正以偏者明之纍此是隱處隱處不能明便非大明私者公之撓此是微處微處不能公便非至公苟一毫之偏私不足以語大明至公之事矣足成上意然則所謂偏私者顧不當求之於隱微之地乎應破題主意語聖人大明至公如何請申之昔嘗讀易曰大哉乾元援乾卦大字證題上大字曰至哉坤元又援坤卦至字證題上至字飛龍在天利見大人大明之事也喝出至公字物易坤卦坤厚載云云然聖人之贊易也轉歸主意乾則致謹於幾幾字應主意隱字幾乾卦知至至之可與也坤則致戒於漸漸字應主意微字坤卦履霜堅氷至云云其所由來者漸矣亦曰幾之不謹邪之萌也演上文乾卦幾字漸之不戒隂之候也演上文坤卦漸字雖德如乾坤而造化之大猶有憾也中庸天地之大人猶有所憾聖人中乾坤而立者也自乾坤引歸聖人身上倣西銘語乾稱父坤稱母豫兹藐焉混然而中處以一身之眇而應萬物萬情之會用程子語天地之常以其心溥萬物而無心聖人之常以其心應萬物而無情秋毫而察將以用其明也應隱處要明意之孟明足以察秋毫末銖兩而均將以用其公也應微處要公意於前律厯志始於銖兩於兩明斤均於鈞然一偏或入於先一私或伺於後喝出本文偏字私字則明者投其偏公者售其私應冒頭偏者明之纍私者公之撓意雖矯於衆而不能矯於獨衆是顯處獨是隱處能制於指視而不能制於幽眇指視是見處幽眇是微處縱明也而非大也明為偏所纍則不足以為大縱公也而非至也公為私所纍則不足以為至然則大明至公非聖人孰能與於此歸在聖人身上舜其大知也與天下之明無以加於舜矣説舜明之大處中庸舜其大知也與而曰察邇言何哉設難察邇言便是隱言中庸好問而好察邇虞芮質厥成天下之公無以加於文王矣説文王公之至詩虞芮質厥成謂虞芮二國之爭皆質於文王而豫曰有疏附何哉設難有疏附便是微處詩豫曰有疏附也附親蓋邇而不察與夫當疏而附當附而疏再反覆上文以足隱微之意雖舜文之明公而人得以議其後矣若不謹於隱則不足為明之大若不審於微則不足為公之至自聖人而推之於天以天比聖人不小了聖人天無私覆日無私照天下之論明公者盡於此矣明之大公之至莫能加於天月記天無私覆地無私載日無私照人徒見其飛潛動植洪纎小大自形自色一公洞然此是天至公處纎隙必燭容光必照萬里同晷一明了然此是天之大明處而不知其一陽之動實萌於剝復之交此是天之微處上一陽生於十一月隂易剝卦一陽在五隂在下復卦五在上一陽在下邵康節詩云冬至子之半天心無改移一陽初動處萬物未生時旦氣之清實宿於夜氣之定此天之隱處孟告子其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦晝之所為有梏亡之矣之朱文公云至於夜氣之生日以浸薄則平旦氣亦不能清造化且不能違而况於聖人乎自天上引歸聖人身上用經句人之一心靜虛則明通動直則公溥周子通書無欲則靜虛動直靜虛則明明則通動直則公公則溥靜虛何為而靜虛也動直何為而動直也文有呼喚接上生下惟無欲則靜虛而動直矣無欲應主意隱微字見上通書注云云人欲有一毫之未盡則天理不能充其量演上無欲二字有用朱文公語天理未明是以為善不能充其量人欲有未盡是以除惡不能去其根明不為大而為明之小公不為至而為公之淺應冒頭明未大公未至字三代而後論君道者率不滿於斯焉自舜文上引過太宗唐大宗何如主也太宗來説即位初年一念之天如太阿出匣光芒射物太阿劔名如源泉幽竇泥沙未渾其天資之美者乎説太宗初心清明如此然王魏之賢首加録用明則明矣王圭魏徴太宗時賢臣裴封參錯不得謂之明太宗未可謂之大明臣裴矩封德彛太宗時邪秦雍舊人裁抑恩例公則公矣唐杜如晦傳上為秦王時府屬多外遷閨門慙德有不可掩不得謂之公太宗未可謂之至公慙通鑑總論其父子兄弟之間德多矣謂帝非明非公固不可揚之謂帝大明至公尤不可後抑縱文有揉明而公者天資之本然又揚之其不足以論大與至者學力之未到又抑之喝出大字至字有力添入此意為結尾張本孰謂幽州一記室而能施倉扁鐡石之手於帝腹心之隱疾也張藴古為幽州記室倉公扁鵲二名醫人曰大明無偏照至公無私親喚出本出處二句全句又曰四時調其慘舒三光同其得失出處下文引此語以證本題大明至公字然而曰事起所忽與夫積小害大出處下文引此句以證文意隱微二字忽與小字是隱微意始終規警直欲其隱微之地應主意充而至於與四時三光相為表裏如此方才是大明至公所以望其君者厚矣先楊藴古之針為是惜乎未針之前此太宗也已針之後亦此太宗也後抑太宗不能大明至公為難藴古太寶之針既不見用於即位之初抑太宗不能用藴古之言鄭公十漸之疏又不盡信於十年之後又抑太宗不能聽魏徴之言終魏徴上疏言太宗十漸不克頻失頻復而太宗之德遂不加進矣抑太宗不能大明至公易復卦頻復吝嗚呼大明至公古聖人分量太宗信不足以進此矣抑太宗大明不如舜至公不如文王抑其本原之學不講認其智力之所及者即以為髙不復更致增益焉耳應前面明而公者天資之本然其不足以語大與至者學力之未到等語何則古聖人以觀我者為明觀我是隱微處易觀卦觀我生太宗則不能先覺而専以逆億為明太宗不能觀我信語不逆詐不億不古聖人以克已為公克已是隱微處歸語一日克已復禮天下仁焉太宗則不能勝其私而徒以任法裁物為公太宗不能克已見將聖人與太宗比並便優劣遂使後之欲為明為公者率以是為安而止不能進德應前面説話正學不明之故也又歸學力上嗚呼大明至公豈易言哉同詠繳結含不盡味謹論順題發明格此篇與崔日南春秋事文義論同意書詩春秋出於史林昌謙出處中説王道篇子謂薛收曰昔聖人述史三焉其述書也帝王之制備矣其述詩也興衰之由顯其述春秋也邪正之迹明此三者同出於史而不可雜也立説本文謂聖人述史三有述書述詩述春秋之語見得聖人述史而為經非有意而作之也若聖人果有意於作經則其措辭立論一出於我可也又何必出諸史哉今也述而不作則其不得已之意可見矣批云立説正大遣詞明白抑揚開合頗有古意未可但以時文目之論曰經非聖人之得已也經指書詩春秋以不得已之意而為經故必有所述焉書述古史也春秋述魯史也詩述太史氏之所采也述而不作是聖人之不得已也夫經以載道史以載事二者本不同也且開説經與史本異今而聖人之作經詩書春秋豈不能出意為之而必本諸古何哉設難謂聖人之於書詩春秋何必述古史而為之蓋作經非聖人意也應破題不得已之意其文勢學東萊七聖論聖人而果有意於作經反説則紀載之詳編録之備一出於我可也而奚以史為再難文勢伏處世變之會不能以無升降風俗之趨不能以無盛衰文勢起處昔謂今之時與之時不同聖人之道既不能見諸行事又不容託之空言説聖人著書本意之孟子敘仲尼有云我欲托之空言不如載行事之深切著明也於是不可以無書詩無春秋歸本題正意而書詩春秋之述則又皆出於史焉主意明白夫史雖古必不能有加於聖人之經文有操縱而聖人必於是而述焉應前述字此則聖人意也應前意字然則書也詩也春秋也不出於聖人之意而出於古人之史説聖人述史本意又喝得出字響聖人不得已之心蓋可見矣應破題意書詩春秋出於史請因王通之言而繹其意本文嘗因是而觀之且敘本意事起更不用外事書首堯典而終秦誓尚書堯典第一秦誓第三十二作之者誰歟喚下文曰聖人也反上説尚書乃述古史非夫子作之詩自周南而終商頌毛詩首周南關睢終商頌殷武作之者誰歟喚下文曰聖人也反上説詩是述太史之所采非夫子自作春秋首魯隱而終獲麟二百四十二年之行事具載無遺春秋始於魯隱公元年終哀十四年西狩獲麟注時無明王出而遇獲麟仲尼傷周道之不興感嘉瑞之無應故因魯史而修中興之教絶筆於獲麟之一句作之者又誰歟喚下文曰聖人也反上説春秋是述魯史非夫子自作然則作經者聖人本意也而王通乃謂出於史何哉下難應冒頭接題一段通其好為異論者歟設疑曰通非異論者也解歸正聖人意也應意字世皆言經者聖人之所作開而不知聖人之於經非作也述也合應主意述而不作語書出於古史聖人因而定之爾尚書序孔子覩史籍之煩文懼覽之者不一云云討論墳典斷自唐虞以下訖于周芟夷煩亂剪截浮詞云云典謨訓誥誓命之文凡百篇詩出於國史聖人因而刪之爾毛詩序疏昔孔子刪詩上取商下取魯凡三篇百一十一篇至秦滅亡六篇今在者三百五春秋出於魯史聖人因而修之爾尚書序孔子約史記而為春秋聖人固嘗曰述而不作信而好古全篇主意骨子在此二句夫述而不作申上文解則書定可也詩刪可也春秋修可也總上三腳文曰定曰刪曰修見得非夫子自作信而好古申上文解則書詩也春秋也其出於史也宜也有考證下得最有力然則作經其聖人之得已乎歸主意不得已上向使世變推移古而不今吾道流行泰而不否應冒頭世變之會不能以無升降風俗之趨不能以無盛衰意析因夷隩民安其業常如唐虞之治世道常如帝堯之治時則不必有書了殷書堯典以殷仲春厥民析以正仲夏厥民因以仲秋厥民夷以正仲冬厥民隩持盈守成歌舞太平常如鳬鷖之世世道常如成王之時則不必有詩了守詩鳬鷖云云太平君子能持盈成禮樂征伐會盟朝聘常如三代之盛時世道常如夏殷周之時則不必有春秋了語禮樂征伐自天子出又春秋言會盟朝聘則書可無定也詩可無刪也春秋可無修也總上三腳應前定刪修三字泮奐忘言之天豈非聖人之願哉形容聖人為經不得已之意惟夫帝降而王王降而伯二帝是堯舜三王是禹湯文武五伯是齊桓晉文秦穆宋襄公楚莊王世變所激愈趨愈漓應世變升降風俗盛衰意啓與有扈戰于甘之野聖人以君臣敵戰為文所以紀夏德之始衰已不足以追唐虞之盛况費誓之世乎以上用奧論古文有夏書甘誓啓與有扈戰于甘之野注啓禹子扈音户扈國名與夏同姓姒姓之國為無道者費誓篇魯侯事秦誓篇是秦穆公事在尚書末匪風下泉之後而繼以豳風黍離中谷之什而思宗周其詩有刺而無訕其情忍怒而不忍叛則其世道蓋可知矣亦是用古文風思周道也詩陳國風匪曹國風下泉思治也離豳國風七月陳王業也周王國風黍閔宗周也中谷有蓷閔也諸侯不知朝王而私相盟會春秋僖二十九年夏會王人晉人宋人齊人陳人蔡人秦人盟于翟泉按左氏公會王子虎與列國之貴大夫盟諱不書公者翟泉近在洛陽王城之內而王子虎於此下與列國盟是謂上僣諸大夫入天子境上盟王子虎是謂下陵無君之心著矣伯主不知尊王而以臣召君左傳僖二十八年晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓成周之後魏舒以卿而蒞國政傳定公元年春王正月辛已晉魏舒合諸侯之大夫于狄泉將以城成周魏子蒞政黃池之會勾吳以夷狄而主夏盟此又何等時邪左傳哀十三年公會魯平公晉定公吳夫差于黃池吳晉爭先吳人曰於周室我為長晉人曰於姬姓我為伯吾聖人之生於斯時也應世變意天不君之為堯舜禹湯文武夫子既無聖君之位又不臣之為臯稷伊傅周召又無賢臣之職前聖之傳誰其紹之綱維世變之責誰其任之應冒頭世變意則經之不作不可也不得已而作經經可作矣而不出於史又不可也經出於史蓋述而不作之意史者其古人行事之實録政事之巨編乎如古史魯史太史氏皆是史其殆未定之書未刪之詩未修之春秋乎下得語好謂書未定詩未刪春秋未修之時即是史書既定詩既刪春秋既修而後便是經於是而有所述焉可以見聖人之意矣應述字意字是故書斷自唐虞書序討論墳典斷自唐虞以下訖于周凡於書序之下而稱曰者此史氏之舊文數十篇之中莫不皆然如堯典篇自作堯典以上是夫子之言自堯典曰而下是古史之文諸篇皆如此則書之出於史可見矣此一假見得書是述古史非是夫子自作詩之命名如關雎后妃之德之類此皆國史之舊題如關雎篇云關睢后妃之德也此是史官之文夫子因而不改三百篇之中莫不皆然夫子因其舊題皆不改則詩之出於史可見矣此一段見得詩是述太史氏之所采非夫子自作春秋一書如桓十四年之書夏五春秋桓十四年夏五穀梁子曰夏五傳疑也注孔子在於定哀之世而録隱桓之事以承闕文之疑不書月明皆實録莊二十四年之書郭公莊公二十四年注郭公無傳蓋經缺誤也此當增也而不增不敢增一字桓五年之書甲戌已丑桓公五年春正月甲戌已丑陳侯鮑卒穀梁曰鮑卒何為以二日卒之春秋之義信以傳信疑以傳疑陳侯以甲戌之日出巳丑之日得不知死之日故舉二日以包之十二年之書丙戌者再桓十二年丙戌公會鄭伯盟于武父義丙戌夀侯晉卒注無傳重書丙戌非例此當削也而不削不敢除一字一惟舊史之是因皆因史官舊載則春秋之出於史也又可見矣此一假見得春秋是述魯史之所載非夫子自作嗚呼作經非聖人之得已也應破題冒頭主意語甚明而意不晦讀者曉然不然以吾夫子之聖豈不能自出意慮作為聖經而必本之史焉何哉應冒頭接題一假意吾道不見用姑托古人之行事以示天下後世應冒頭不能見之行事不容托之空言意庶乎來者之有稽而道統之傳亦藉是以不墜聖人本意如此此則聖人述而不作之意喝出主意是意也粘上意字惟王通知之引本出處繳結雖然經而不本乎史固無以為經申本論主意引下文史而不得乎經亦無以傳逺結尾意歸重經上書固自古史而出然非書則後世孰知其為古史知有書則知有古史詩固自國史而出然非詩則後世孰知其有國史知有詩則知有國史春秋固自魯史而出然非春秋則天下後世又孰知其有魯史知有春秋則知有魯史經自史而出史因經而顯歟史得經之力而後重然則書詩春秋未作之前史則有功於經再申本論主意書詩春秋既作之後經則有功於史歸重在經上愚言不然君其問諸王通歸在本出處上學楊誠齋易敘語謹論推原題意格與林昌謙書詩春秋出於史論同意春秋事文義如何論崔日南出處孟子離婁上王者之迹熄而詩亡詩亡然後春秋作晉之乘楚之檮杌魯之春秋一也其事則齊桓晉文其文則史其義則丘竊取之矣立説謂夫子之作春秋其豫奪褒貶非私意為之惟義而已義則有公是非無私賞罰以事之文觀之固有繁約之不同以事之義斷之則惟大公之所在非可以私意而議聖人也批云事與文兩字是孟子説義字是夫子自説諸人都只作一套説了獨此篇説有本領又有挑斡説出聖人無私之意甚正大歸重於義字上有分别論曰約史以為經孔子因魯史為春秋事則是齊晉文則是魯史非聖人私意也非私意指義之一字義則當賞當罰惟公而已何私之有何者古人所行之事良史所載之文指魯史固必經聖人而後定其事與文固待聖人而後定然大公至正之義豈聖人所能增損哉其義則非聖人之所得私人徒見夫聖人之作經指春秋因史以約其文喝出事文二字因文以著其義又喝出義之一字一豫一奪或褒或貶足以示勸懲於天下後世則曰聖人賞罰之也是者則豫之褒之非者則奪之貶之詳見講中注人文中子春秋之始周平魯隱云聖人達而賞罰行聖窮而褒貶作又見老蘇春秋論原題詳注吁是經之作豈聖人之私意邪應破題私意字以私意而議聖人者凡民也暗説其義則丘竊取之意非是聖人私意蓋天下之事有公是非無私賞罰反用老蘇論意云云賞罰者天下之公也是非者一人之私也紀事之文有繁約之不同則聖人不能泥史以為經指齊桓晉文之事與魯史之文裁事之義惟大公之所在則聖人不能舍史以為經指其義則丘竊取之意義是大公非私意是義也非孟子不足以知此入本出處意今觀軻之論春秋正敘本文其事則曰齊晉也其文則曰史也及其義則不曰聖人為之也應主意非私意字而乃舉夫子自道竊取之辭以實其説見得義乃夫子之所取非私意為之嗚呼讀是書者要當因是而遡夫子之心歸重義字春秋事文義如何請以是論嘗考諸經籍所載然後知春秋之賞罰非聖人為之也用蘇文春秋論有曰夫子之作春秋也非曰孔氏之書也又非曰我作之也賞罰之權不以自與也曰此魯之書也蓋魯作之也何以知之自此以下皆倣老蘇春秋論行文書者紀唐虞三代之事也而夫子有秦誓之附秦誓附於尚書之末易者著六十四卦之文也而夫子有易繫之作易繫辭乃孔子所作春秋非魯史之名乎公之以魯史之名則非孔氏之私書也同上春秋論云云有善而賞之曰魯賞之也有惡而罰之曰魯罰之也何以知之曰夫子繫易謂之繫辭言孝謂之孝經皆自名之則夫子私之也而春秋魯之所以名史而夫子托焉則夫子公之也公之以魯史之名而賞罰之權固在魯矣非孔氏之私書以為夫子之賞罰愚未敢以為然也申上文辨難夫自有典謨訓誥之文而史於此焉出書有二典三謨伊訓大誥周誥當是時是是非非善善惡惡之理隱於人心不待褒之而後勸貶之而後懲當是時不待聖人之賞罰自閭巷刺美之言興匹夫匹婦之詠作似非雍熙泰和氣象詩有美有刺皆出於閭巷野夫賤𨽻之人然或風或賦或比或興詩一曰風二曰賦三曰比四曰興其事甚白也其文甚著也其義亦甚明也謂有詩之時世道猶古人心猶公是非事文義三者不待分别去取人心之史聞者足戒言之者無罪聞之者足以戒故聖人之於詩亦不過刪其繁兼取而附之六經之一詩序疏昔孔子刪詩凡三百一十一篇至秦滅亡六篇今在者三百五篇孰謂詩亡而後春秋作乃聖人之私意邪應主意私意見本題注或者見夫春秋一書推見至隱見音現顯然之迹也春秋推見至隱或賞人之功即曰如書齊桓召陵之盟晉文城濮之戰之類或去人之族如約及諸侯之大夫盟於宋之類或貶人之爵如齊伐山戎而書人之類諸侯而或書其名如曹羈鄭忽莒類展輿衛侯燬之大夫而或書其字如儀父仍叔家父蔡叔南季之類以上五句亦是用老蘇春秋論文一字之褒有如華衮榖梁傳一字之褒寵踰華衮之贈一言之貶若撻市朝同上片言之貶辱過市朝之撻則謂春秋之世亂臣賊子接迹於天下孟孔子成春秋而亂臣賊子懼夫子悼王道之不綱傷伯圖之陵僣敘孔子作春秋之本意春前史馬遷傳壺遂曰孔子何為作秋太史公曰孔子知時之不用云云道之不行也是非二百四十二年之中以為天下儀表貶諸侯大夫以達王事而已不幸有其德無其位書序疏孔子修聖道位以顯有至德而無至不能以天子之權而賞罰天下不得已而作春秋老蘇春秋論春秋之賞罰自魯而及於天下天子之權也蓋將假天子之賞罰以為懲勸之具同上不得已而假天子之權以賞罰天下以尊王室其賞也則曰夫子賞之也其罰也則曰夫子罰之也同上不徒曰此是彼非而賞罰加焉則夫子固曰我固可以賞罰矣云云又前注抑不思史魯史也魯之史公史也見前面注夫子以之而修春秋其事則因其所記之事也喝出題上事字謂其事則齊桓晉文其文則約其所載之文也喝出題上文史字謂其文則其義豈非取其至公之義乎又喝出題上義字謂其義則丘竊取之矣取其至公之義而為之則非夫子之私意也應主意私意字且如葵丘之會盛矣豫齊之盛者公也夫子安得不取其豫齊之義而褒齊乎此假説孔子褒齊桓會諸侯于葵丘之義河陽之召僣矣疾晉之僣者公也夫子安得不取其貶晉之義而譏晉乎此假説孔子貶晉文公召天王于河陽之義春秋之或抑或揚或去或取如是者不一繳上面褒貶之意初非曰此孔氏之書也又非曰我作之也賞罰之權不以自與也曰此魯之書也曰魯作之也見前面注以上數句純是用老蘇春秋論何也設疑下難夫子固嘗曰知我者其惟春秋乎罪我者其惟春秋乎用孟子語蓋知我者則以魯之賞罰而為春秋見原題注春秋不得已而作夫子已有罪我之憂矣演上面知我罪我之意竊取之辭毋亦夫子欲以此意暴白於天下後世説其義則丘竊取之意嗚呼此聖人之意也説孔子竊取其義非私意惟孟子為能知之入本出處意事人知為齊晉之事也學韓獲麟解文齊再演其事則桓晉文意文人知其為魯史之文也再演其文則史意至於義人皆以為夫子賞罰之義也歸重在義之一字見前面注倘非孟子援夫子自道之詞而筆之書夫子之志荒矣反説本文其義則丘竊取之意後之人不知聖人作經之意反説而紀事著文必以麟筆為法春秋序今麟出非時虛其應而失其歸此聖人所以為感也絶筆於獲麟之一句虞氏著書八篇名曰虞氏春秋愚不知譏刺得失果足以勸善懲惡否乎不韋著書二十餘萬言號曰吕氏春秋愚不知八覽六論果足以當王法否乎其於義也斯焉取斯謂其義不足取不知夫子竊取之意噫惜無有以夫子之言告之者歸在夫子上謹論前篇謂述史為經聖人不得已為之此篇謂約史為經聖人非私意為之意義略同可以參看原題立意格與髙應枀聽言接下之規論同意理本國華如何論陳文龍出處唐陸贄奏議太宗挺秀千古清明在躬云云以虛受為理本直言為國華立説以心字包理本以精神字包國華謂治之本麗於心國之華寄於言人君能虛心受言則人言並進而國之精神在是矣考官批云有學問有識見有議論有文藻反覆轉摺不費斧鑿健筆也心之精神四字亦有本祖論曰治之精神在乎言指直言為國華精神是華君子是以原人主之心指虛受為理本心者治之原言者治之精神申上文演主意精神所發心實主之謂直言為國華自虛受為理本而始何則人主一心主意言脈之通塞係焉心能虛受則言脈通不能虛受則言脈塞言脈之通塞民之榮悴國之休戚係焉言脈通則民之榮國之休言脈塞則民之悴國之戚善觀人之國者不觀其國而觀其國之言國之華在言不于其治而于其人主之心治之本在心心苟虛明主意有容無拒能容受人言而不拒絶人言意氣之所感召本在心怠者奮以下説在人懶怠者奮發懦者激懦弱者激切畏沮者蟄而震畏懼沮挫者蟄藏而震起知無不言言無不直直言皆進要其效而至於事物之條理政化之精神説國之華處皆此心一運量之間耳歸在心上宅心不廣者則反是故夫治之本也麗於心此是虛受為理本國之華也寄於言此是直言為國華虛心受言則國之精神在是矣應破題本者其心華者其精神剔出題字説出主意心乎心乎其精神之所聚乎心是理本精神是國華甚矣言之有益於人國也收拾冒頭之意理本國華如何有知之者太宗也本題之主嘗謂治道之精神在人言治道之根本在君心照主意講起清明在躬志氣如神此心之體用經語講心字見記禮運風霆流形庶物露生此心之精神同上帝之所以為帝王之所以為王皆心之精神為之也用韓文語吾觀衢室有問且用帝王事講之文中子堯有衢室問總章有訪同上舜有總章之訪昌言拜而嘉謀告書禹拜昌言曰俞又成王曰爾有嘉謀嘉猷入告爾后于內帝王之心寬大樂易歸在心上上不以為厭下亦不以為忌上不厭人之言下不忌人之言其言猶之粟米布帛若無華也且擺開説然而又收拾藻火黼黻之采都俞之辭也粧點華意火書益稷藻粉米黼黻絺繡又禹曰都帝曰俞朴斫丹雘之文訓誥之言也書梓材若作梓材既勤朴斫惟其塗丹雘又伊訓大誥酒誥唐虞三代所以大治榮華至于今日者豈有他乎哉劉向封事帝堯能賢舜禹而消共工故以大治榮華至今用華字切喚下文蓋治有元氣焉君子是以求治於其心言有英氣焉君子是以觀國於其言又用元氣英氣字立二柱作議論元氣字代心字英氣字代精神字膚革充盈神采英發用經語粧點精神字英氣之聚未有不自其元氣者充之精神在心易之咸曰君子以虛受人其惟此心乎證題虛受宇切子見易咸卦山上有澤咸君以虛受人一或憧憧爾思未光大矣光大字應華字曰同上憧􅚸往來朋從爾思象未光大也惟虛故明此咸所以為無心之感伊川云云是心也三代而下太宗其庶幾得之引入本題主帝何心也先講心是理本君源臣流者其本澄本紀上曰君源也臣流也濁其源而求其流之清不可得矣竭誠待下者其本正魏徵疏夫在殷夏必竭誠以待下自仁義之言一開其端貞觀以來諌者相望魏徴傳貞觀四年云云帝曰此魏徵勸我行仁義既效矣惜不令封德彛見之帝之心蓋隂有以感發之以上説虛受為理本意是以千金可輕也而不如却鷹之一疏李大亮傳涼州督李大亮有名鷹嘗有臺使見諷大亮獻之大亮密表曰陛下絶田獵久矣而使者求鷹信陛下意邪太宗報書曰古人以一言之重釘千金今賜壺瓶一雖亡千鎰乃朕所御明珠可賤也而不如止獵之一奏薛收傳收上書諫王止田獵王答曰覽所陳知成我者卿也明珠兼乘未若一言今賜黃金四十鋌大寶易得也而終不若瓊室瑶臺之一針張藴古傳藴古上大寶針上賜以束帛大寶針云瑶其臺而瓊其室以上雖説受言已包為國華意帝之所以華其國者何哉言而已帝之所以能容言者何哉心而已心其精神之主乎繳上三件聽言事應冒子心者治之原言者治之精神精神所發心實主之人之所可見者精神人之所不能知者此心又畨一轉謂精神在心見得國華在理本上以帝之威靈氣焰人所望而畏者夫孰得而易於言且開説之本紀贊帝王將興其威靈氣焰有以動物悟人本自此以下再説心之虛受是理徐而考之又合説真見其孜孜治道魏徴傳孜孜治道常若不足真見其憂勤恐懼魏徴十漸疏此上天示戒乃陛下恐懼憂勤之日也真見其從善如流本紀贊迹其聽斷不惑從善如流千載可觀一人而已心以上舉太宗三件實事歸字上非外為寬容以悅之也洞洞無我曠然而與天下為一歸心之虛受上本以上説虛受是理意藴於其心發於其精神發出主意字面煥而號令文章則為中國之華吕溫贊使我大國煥乎其有文章自此以下説直言為國華粲而臺閣容典則為朝廷之華杜如晦傳天下新定臺諌制度憲物容典率二人討裁二人房元齡杜如晦至於日月晦而復明關河翳而復清掃六代之陋而恢我唐三百年光明俊偉之治是又散而為天地萬物之華陸贄奏議太宗明照侔日月又見吕溫贊云云六代謂宋齊梁陳魏周也自此以上鋪三段説得華字開濶吁言之效何如哉歸在言上帝之於言也豈徒曰美觀云乎循故事云乎含為國華意觀其言可以知其國觀其國可以知其治觀其治又可以知太宗之心應冒子不觀其國而觀其國之言不于其治而于其人主之心異時聽納不倦固未嘗戾戾焉有以嫉其臣民之心嫉字用書忿嫉于頑字引下意而或者已有心氣內損形神外勞之慮劉洎傳且多記煩心多語耗氣心氣內損形神外勞初雖無覺久且為弊此心少窒吾恐向之精神索然矣貶太宗照精神字若夫世南之鯁諤虞世南百藥之持論李百藥並見下注史臣之於贊也皆指其為治世華采然必曰知治之本何歟贊曰世南之鯁諤百藥之持論云云皆治世華采云云而後唐文物燦然誠知治之本歟用本字華字切題吁答此心法也心是理本亦太宗家法也過德宗何德宗而未之思責德宗過得文相連不可勾斷德本題之説乃陸贄言於宗之時故用此結末強明自任猜忌自信德宗本紀贊德宗猜忌刻薄以強明自任贄也陸贄所以上疏宜以虛受為帝勉本本題彼何如時而進諛者類曰德如堯舜時已太平言德宗時羣臣皆阿諛無有進直言者以頌美為奉職以竊議為邀名以深謀逺慮為駭衆德宗之心不能虛受故一時諸臣不能獻直言言者氣薾黯無晶光又何以為國之華嗚呼盍亦反其本矣照本字本在心上論諫百篇炳如丹青陸贄傳贊觀贄論諫數十百篇皆本仁義可為後世法炳炳如丹青後世以為華當時反以直而厭指德宗時言其可厭乎厭言非盛世事也反覆抑揚卿大夫莫敢矯其非士庶人莫敢矯其非國語子思云云觀人國者每於此覘之國事且日非矣伋寧不為之寒心孔伋字子思仕於衛雖然衛暗耳同上衛暗孰甚焉暗反形華字德宗又何如主哉冷責德宗吁謹論原題立意格與陳文龍理本國華論同意聽言接下之規如何髙應枀出處唐陸贄奏議許臺省長官薦屬吏狀所謂聽言考實者虛受廣納宏接下之規云云立説謂聽言之道未有不本於人主之心心之廣則言路通心之狹則言路塞上下相際之交惟視人主之心何如耳以德宗強明自任之君方局於猜防疑慮之見是於上下交接之道暌間已甚又何望其能容受人言邪此宏接下之規一語陸贄所以力為帝言者正欲帝反而求諸其心而已惜德宗不能用其言批云有意味有態度出入古文轉換處多筆力老健迥過前輩論曰人主一心之微心指規字以心字為主意上下相際之交也指聽言接下字破語有含蓄不屑屑體貼題字凡聽言之道未有不本於人主之心破題只是包大意承題須喝出聽言事方切題心之廣狹蓋言脈之通塞繫焉心廣則言脈通心狹則言脈塞天下莫患乎上下之情不通也接上通字反説必有交焉交是交接則人主方寸之間是已歸在心上上之接下下之接上皆在人主之心上吾方局於猜防疑慮之私而居之以強明好察之實暗指德宗之病痛處如本紀贊德宗猜忌刻薄以強明自任此則是心不廣了天下見其淺中狹度而猷之不裕也其誰言之謂德宗心之不廣何以聽言謀猷之不裕用書君奭告君乃猷裕語言猷之不寬裕也話頭老蒼設或有言亦終至於齟齬而莫之合扞格而不可容扞音罕格音畫言與物相扞格而不相入蓋漢唐以下之人主皆病之矣引漢唐過德宗不突兀而况其德宗乎入德宗來聽言宏接下之規引本文語宣公力為帝言之陸贄諡宣公言贄之告德宗如此使帝也反而求諸其心斯得之矣主意心字惜乎帝之不然也貶德宗不能用其言為篇末張本雖然贄如帝何哉謂陸贄無如德宗何一句一轉是作論手假聽言接下之規如何舉題下不著一句間語亦老夫上下之情難通也久矣欲人之言也難矣原從上下之情説起應冒頭天下莫患乎情之不通也天門沈沈邈不敢詆用古文全句謂君門深沈逺而不敢指斥之也於是有欲言而謁諸其上者如謁諸神明亦是用古文謂見人君如見神明相似言下情難通甚矣其未易接也説下情亦難接故交接之道貴乎忱實申上接字議論易於坎之納約曰樽酒簋二剛柔際也際字應主意際字易坎卦六四云云用缶納約自牖終無咎象曰樽酒簋二剛柔際也下謂人君以一尊之酒二簋之食而接臣尚誠實而不尚虛飾此言聽言接下之道也歸題意上天下固未有間絶而不可以相接者也間去聲言問隔也其間也必有為之際應破際字其際也必其上下彼此之交應破交際字上之不能通乎下下之不能通乎上其間不能以寸謂上下交接之情相近用孟子語此在乎人主之一心耳歸心字主意應冒子必有交為人主方寸之間是巳充之則廣正説心之宏蹙之則狹反説心之不宏大之則天地萬物無不容正説心之宏則可以接物小之則纎芥毫末有所不受反説心之不宏則不可以接物此固堯舜禹湯文武數聖人之聽言而得是以為規也喝出規字規即是心無稽之言勿聽弗詢之謀勿庸説古者聽言意之用書大禹謨全句無稽言是無所稽考之言弗詢之謀是不可采聽之言庸用也是蓋得之精一執中之餘歸心上同上人心惟危道心惟微惟精惟一允執厥中此是堯舜事中字見規意歸其有極會其有極用書洪範全句規此是武王事極字見意則所以謀卿士謀庶民者亦無一之不盡同上謀及卿士謀及庶人蓋中也極也總上二字固堯舜禹湯文武數聖人之所謂規而以接下焉者也總上面用事歸規字上規即是心市於議道於謗見下注下而至於芻蕘之微工瞽之賤聖人接之固有道矣總古者聖人聽言接下意前賈山至言古者工誦針諌瞽誦詩諫庶人謗於道商旅議於市又板詩詢于芻蕘以上正説而秦則反之以下反説夫羣臣頓首而後敢言再拜而後敢請此二句用古文又見下注上下之情濶絶秦之淺中可見矣秦之心不廣而亦以仆其國戴溪筆議尊君卑臣實自秦始始皇自謂皇帝自稱曰朕羣臣曰昧死頓首再拜字用此意髙皇帝宏其規模髙祖心廣大見下注好謀而能聽自秦過髙祖上與後面相應前髙祖紀好諫能聽自監門戍卒見之如舊云云規模宏逺矣監門挽輅之夫皇皇然接之若不及同上酈食其為里監門求見沛公云云於是起攝衣延之上坐又婁敬傳戍隴西過洛陽髙帝在焉敬脫挽輅願見上言便宜至今稱帝為大度豁如之主其規模蓋可想見大度規模字映規字切豁髙祖紀帝有大度寬仁愛人意如也夫秦漢之異若此矣而何德宗之不悟哉以秦漢一反一正引入德宗過得有脈蓋德宗也有髙視天下之志而無容天下之度心不廣了規規然銖較寸度於小物細故之中應冒子猜防疑慮強明好察等字故凡拒諌而飾非者見下注皆其口舌之能耳目之便非其有恢恢有容之心此最帝之痼疾也此數語道破德宗之心不廣了故不能容受直言薑公輔以賣直見疑見下注蕭復以輕已見忌唐本紀贊德宗猜忌刻薄以強明自任恥見屈於正論忘受欺於姦諛故其疑蕭復之輕已謂薑公輔為賣直雖以陸宣公之百篇仁義而帝固未之察也亦枘鑿而已過陸贄上疏上來用陸贄贊論諫數十百篇皆本仁義可為後世法而所才十一圓枘方鑿言其不相入嗟夫帝方怙非以自是德宗心不廣了豈不疑公輔之賣直故不能聽薑公輔之言織前公輔一股方強明以自任德宗心不廣了豈不疑蕭復之輕已故不能聽蕭復之言織前蕭復一股方展轉於利欲之中不能自拔心不廣了而以宣公仁義投之上下之情宜乎其不相接也故不能聽陸贄之言略織前陸贄一股上二假法一句一律下一假句變換正得錯綜成文之接與不接直方寸間耳總歸心上帝方寸間擾擾焉營營焉芥髮無所容上下惡乎其可通也應冒子吾方局於猜忌疑慮之私亦終至於齟齬而莫之合扞格而不可容一假芥髮言如一芥之細一髮之小夫彼皆其輔相也而不相接若是繳上薑公輔蕭復陸贄等况下是者乎大臣之言既不聽小者可知曷不廣其接下之規乎轉歸心字主意規廣乎中則情通乎上下矣繳足上意帝惟不與諸臣接也再説德宗故竇參延齡輩得以其言自售唐竇參傳每延齡對他相罷參必留以度支為言實專政也又陸贄傳帝自用裴延齡贄言延齡僻戾躁妄不可用不聽而帝且喜圓惡方矣不聽薑公輔蕭復陸贄等之直言是謂惡方樂聽竇參延齡等言是謂喜圓此之接如水投石指上薑公輔等栁宗元膏盲賦以水投石彼之接則若膠漆牢固而不可解指上竇參等馬周傳贊故君宰間不膠漆而固孟子曰君臣懷仁義以相接反是則利矣孟告子下是君臣父子兄弟去利懷仁義以相接應接字佳帝懷利以接下彼以規利之言進指延齡等如延齡輩又安足怪乎引孟子語結亦是嗚呼言之聽不聽情之接不接蓋係乎君心之廣狹也總結講中大意謂心廣則能聽言能接下心不廣則反是天下非庸主之病於狹也接上狹字議論文脈不斷惟強明好察者常病之應冒子語故周厲之監謗通鑑厲王使衛巫監謗秦皇之愎諌史秦紀始皇性剛戾正諌者誅愎音逼褊小也在唐則為強明好察之德宗謂德宗之心與周秦二主之心一其上下之情不接皆足以致亂謂以上三人不能聽言接下宣公之言豈不足為帝規哉繳入陸贄上疏上惜乎其非唐虞三代器也餘意指德宗不能用陸宣公之言應冒子惜乎帝之不然也亦應講中堯舜禹湯文武字夫惟好謀能聽豁達無我髙皇帝近之矣注見前又選潘安仁賦豁達大度末又提起髙祖結與題下相照應得作論之法所謂首尾相應如常山之蛇勢者如此謹論字面包題格與後篇天職天功天情論同意天道善勝如何論郭拱朝出處老子七十三章天之道不爭而善勝不言而善應立説以不物於物言天道以能役乎物言善勝蓋物皆囿乎形氣天則超乎形氣者也苟囿乎形氣則是一物耳又何以役乎物惟超乎形氣則是必有妙乎物者矣雖不求以役物而物卒不能不聽命於我此天之道所以為善勝也其大意本之莊子批云析理精話頭别文有頓挫意有抑揚老手也論曰不物於物指天道然後能役乎物指善勝凡盈宇宙之間皆物也用易繫辭語物物相役而無有終窮者皆形氣之為也且從物上説來囿乎形氣之中而不能自超於形氣之表則與物為物耳又何以役乎物申上形氣二字蓋形氣有盡而理無窮天道無窮萬物有欲而造化無心天道無心此其所以不物於物也此説天道所以不物於物自承題至此意脈不斷夫以物役物則物皆吾敵物皆吾敵而一切求勝求以勝之窮矣他人直是接上正説去此乃再略反説却歸正文字最善出沒不以物役物應破語使天下之物皆失其所以為物而惟我之聽此是善勝是必有妙乎物者此應不物於物意此是天道夫豈有心於勝物哉應破能役物蓋此是善勝其不能違乎天者不能違乎道也歸天道上故曰不物於物然後能役乎物照破題語繳結文勢圓轉與後篇一同天道善勝如何老子其知道者歟舉本出處請論之物物而不物於物莊子為是言也原用莊子語辨論起而莊子在宥篇有大物者不可以物物不物故能物物夫既物其物矣申上文而必曰不物於物何哉設難蓋自氣化形生而物形焉應冒頭物囿乎形氣雖造化之大不能離形氣以自立不離乎形氣則不離乎物矣應冒頭不能自超於形氣之表則與物為物耳然其所以攝萬有役羣動此是役物處使之自強自弱自屈自伸皆莫知其所以然者應冒頭使天下之物皆失其所以為物意是必超於有而妙於無非可與並言也應冒頭是必有妙乎物者意蓋惟天下之至無為能御天下之至有無是天道有是善勝惟天下之至靜為能御天下之至動靜是天道動是萬物惟天下之至一為能御天下之至不一至一是天道不一是萬物振用三惟字文勢如破竹議論發洪纎髙下紛然而不齊者至有也至動也至不一也至有至動至不一字指萬物而言然而有者安於無而無者勝動者安於靜而靜者勝至不一者安於至一而一者勝無字靜字至一字指天道而言總上三股用三惟字一段果孰使之然哉喚下意理之自然者物之不容不然也應上者應冒頭其不能違乎天不能違乎道也動動相形有有相使紛紛擾擾之交相病物於物者所以役乎物天之為天而與是瑣瑣者爭衡則亦弊弊焉耳天道不如是也弊弊字出莊子不物於物者故能役物此天道所以為善勝吾自夫造化而觀之先講造化一股雷風之相薄水火之相射寒暑之相推闔闢變化未知其所終也此是物之相爭處寒易説卦雷風相薄水火不相射繫辭暑相推而嵗成焉及夫進者退成者除勞而不止者息則孰勝焉此是天道善勝處至此一段應惟天下之無為能御天下之至有又自夫品類而觀之次講品類一股勾者欲萌甲者欲拆爪強者欲摶而齒剛者欲決羣趨彚奮交戰而不可禦此是物之相爭處靜多用前輩古文語動此一段應惟天下之至為能御天下之至意逮夫榮者悴實者剝而悍然者帖然果孰勝之哉此是天道善勝處又合夫人事而觀之又講人事一段衆寡之相暴強弱之相陵而矜智力以相雄長者惟恐人之有加於我也此是物之相爭處及要其終則衆欲暴寡而卒無以加於寡強欲陵弱而卒無以加於弱智者窮於智力者屈於力向之勝心又安在哉此是天道善勝處天此一段應惟天下之至一為能御下之至不一意吁是可以觀天道矣上三段皆設疑辭此只一句應折歸天道上大有力宇宙間萬形皆有弊惟理為不朽天下之獨立無對者理而已以上數句皆是前輩話頭凡物則有對有對則有爭爭則有勝有不勝焉發越天下之物皆有對則爭爭則有勝負至於理則凡物莫能奪也惟理無對此天道所以善勝申包胥曰人衆者勝天天定亦能勝人舉一箇勝字為證包國語晉申胥云云人固可勝也取天定能勝人一句是天其可勝乎難倒人衆者勝天一句不是而包胥之言非不知天也不知道也抑揚有味説天者莫辨乎易又舉易事為證易之乾曰乾道變化又曰首出庶物出易乾卦蓋天者天之形體乾者天之性情大有議論程子易傳云云運於無形而超於有形此萬物之所以資始乎應物則囿乎形氣之中天則超乎形氣之表意易乾卦大哉乾元萬物資始乾而水濕火燥雲龍風虎使之各從其類者元之功也以乾事證天道善勝乾卦大哉乾元萬物資始故聖人之贊乾必以天下之至健者言之繫辭夫乾天下之至健也惟至健則舉天下之物莫能加於此矣應冒頭不物於物故能役物意老子善勝之論其得諸此只一句歸題結大講斬截雖然天何心哉説天道無心於求勝善者自福淫者自禍書天道福善禍淫傾覆栽培不過因其材而篤之耳中庸天之生物必因其材而篤焉栽者培之傾者覆之故曰天何言哉四時行焉百物生焉語十七云云兹不物之説也繳就主意上聃之言未免管窺歟謂天本無心於勝以善勝言聃老子名謂其未為知天者嗚呼天以無心而溥萬物聖人以無情而應萬事下面將使舜文事故先頓此兩句且與上段意不隔程子曰天地之常以其心溥萬物而無心聖人之常以其情順萬物而無情也舜之征苗書禹謨惟時有苗弗率汝徂征文王之降崇荀子議兵文王伐崇夫子之却萊夷家語定公與齊侯會於夾谷齊使萊人以兵劫定公孔子以公退曰云云齊侯心怍麾而避之皆天道也皆無心於勝者聖人無心於求勝與天道一般然聖人豈願有勝之名哉與前段天何言哉相應吾懼夫後世假天以自文者必以聃之言藉口結末再罵倒老子之言收拾得盡謹論字面包題格與前篇天道善勝論同意天職天功天情如何論朱有進出處荀子天論篇聖人清其天君正其天官備其天職全其天功養其天情立説以不物於物言天情以造物之物其物言天職天功蓋天情在我之天也天職天功在天之天也聖人養其天情不物於物是盡其在我之天矣是以備其天職全其天功而盡其在彼之天而能使造物之物其物也其大意亦本之莊子見前論注批云做此題者易得糊塗惟此篇析理明白措辭老健反覆開合曲盡其妙論曰不物於物指天情為在我之天而後能使造物之物其物指天職天功為在天之天破與前面字面一樣夫舉天下萬物雖無以加於天而天亦物也先説在天之天即是物中三極而立者暗説聖人苟亦囿於物而不能超乎物則與物等耳囿於物是天職天功超乎物是天情何以使造化之物其物哉反破題意文勢與前篇一樣必有不物於物者天情運其神於有物之表天情可以備天職而達其用於事物之間天情可以全天功使浩浩大化各安其當然之職出題上職字著其顯然之功出題上功字在天者若有以使之然在天之天而聖人實不自知其所以然也在我之天繳講中意不物者何設問聖人之天情是也喝出天情字聖人此情寂然不動而未嘗與天爭職感而遂通而亦未嘗與天爭功天情可以包天職天功易繫辭寂然不動感而遂通天下之故然天之所以職其職而功其功者即此情之發達運用也歸天情上聖人何心哉應前聖人不知其所以然意不過盡在已之天以格在天之天在已之天是天情在天之天是天職天功不物於物而使之物其物耳照破題語繳結與前篇一樣天職天情天功如何請因荀子天論而言之舉本出處嘗謂荀子之論天接上説文脈不斷其謂有形之天邪有形之天是在天之天其謂無形之天邪無形之天是在我之天雙説起如謂其無形則以何物而言職以何事而言功交股反難天職天功如謂其有形則上天之載無聲無臭奚其情交股反難天情臭詩上天之載無聲無至矣吁我知之矣解上文荀子之所謂天職天功者論其在天之天也所謂天情者論聖人之天也解析主意分曉天以功職言則知造化之物其物照破題語説天職天功情以天言則知聖人之不物於物照破題語説天情蓋聖人以天下之至靜制天下之至動至靜是天情至動是天職天功以天下之至無御天下之至有至無是天情至有是天職天功法亦同前篇文百神受職萬化同功喝出職與功二字歸之造化而造化不言歸之百物而百物不有荀子不得已而後歸之天情焉把蘇東坡喜雨亭記脫胎換骨出來天坡文曰歸之太守太守曰不有歸之子天子曰不然歸之太空太空𡨕𡨕不可得而名而吾以名斯亭夫天情果何物也喚出天情辨論其未發則為中庸之中乎中庸喜怒哀樂未發謂之中其已發則為中庸之和乎同上發而中節謂之和中和一致而天地位焉萬物育焉中庸云云位者天之職也以天地位為天職育者天之功也以萬物育為天功中庸不歸之天而歸之中和何哉以中和為天情蓋天地與萬物皆物也應破題物其物意指天職天功中和所以物其天地萬物之物而不物者也應破題不物於物意指天情向使中庸聖人情其情而不天其情則喜怒哀樂以物交物吾心之天且擾擾不寧矣反應破題不物於物意尚何以物天地萬物之物乎反應破題使造化之物其物意情未發則為中已發則為和見前注知子思之所謂中和則知荀子之所謂天情矣總結歸本題且情不曰情而曰天情亦嘗論其故乎先挈天情來説夫性天也情亦天也辨天字性既曰天性則情亦必曰天情孟子曰乃若其情則善矣則情豈非天乎用孟子全句惟聖人性其情則謂之天衆人情其情則人焉而已矣用前輩語天情者不物於物應主意字謂天情乃在我之天也而舉穹壤間無一物不囿吾性分之內凡運於無著於有成氣成形指天職天功形朱文公云云氣以成理亦賦焉而此情實與之相蕩相摩無一息停也歸在天情上易繫辭云隂陽相摩八卦相蕩日晝而月夜春生而秋成人皆以為天之職然爾説天職字律大元元吉篇曰日以昱乎晝月以昱乎夜後漢厯志春為陽中萬物以生秋為隂中萬物以成而不知此情之舒豁收斂即此情之晝夜春秋也歸在天情上情之舒豁則為日晝為春生情之收斂則為月夜為秋成川流而山峙草夭而木條人皆以為天之功然爾説天功字羅晉書川瀆分流山嶽峙又書禹貢厥草惟夭厥木惟條而不知此情之和悅舒暢即此情之山川草木也歸在天情上開文字明暢且有合蓋其視太虛之中舒者慘者動者植者在天之天順其職分而著其功用喝出職與功二字不過性分之一物也以上應冒頭天之所以職其職而功其功者即此情之發達運用也一假此情固不與物而長亦不與物而留語老用古文物各付物而吾之不物者神全而守固用大而體宏應破題不物於物而後能使造物之物其物意造物自不能辭其職天情可以一天職而隨其職之洪纎髙下亦莫不有可見之功天情可以全天功至此則堯非心而天地平成之日范曄應詔詩黃屋非堯心又書大禹謨地平天成六府三事允治舜何為而晝夜有經之時論語夫何為哉恭已正南面而已矣又莊子天道舜曰天德而出寧日月照而四時行若畫夜之有經湯不競不絿而草木允殖之年也詩長發不競不絿敷政優優又湯誥賁若草木兆民允殖用堯舜湯事只作三句説了得古文法因而思之演餘意天情一耳固有越昔丕后由一念之誠明以贊天地之化育古者聖人能盡其在我之天以盡其在天之天用中庸語亦有後世人君反不能正一身之天地而或有以干隂陽之和後世人君不能盡在我之天故不能盡在天之天此無他七情之發雖同七情喜怒哀樂愛惡欲發而不中節則造化有不得其性萬物有不得其所者焉天情不養則天職天功不可得而理秦始皇怒不中節而川沸山傾罔有寧嵗見秦始皇本紀云云漢武帝欲不中節而旱暵星隕譴異頻仍見漢武帝本紀元光元年長星見天漢元年星隕唐德宗愛不中節而日食隂晦史不絶書見德宗本紀説前面用古者三事作三句此用後世事亦作三句説行文斬截有法度情動於此而驗應於彼此是在我之天彼是在天之天天神天明之不可掩也如此夫用楊子語天神天明天精天粹又學中庸語後之宗主三極者清其天君正其天官本文語純乎堯舜成湯之天而不少雜以秦皇漢唐之人朱文公云堯舜三代純乎天理漢唐諸君雜乎人欲則清明在躬志氣如神而在我之天定此是天精禮禮記運云乾正性命保合大和而在彼之天應此是天職天功易乾卦云云故曰有人焉君子不謂天也用孟子語謹論題外生意格與後篇大漢典籍著作論同意仲尼思存前聖之業論余至道出處前漢藝文志凡春秋二十三家古之王者世有史官周室衰微載籍殘缺仲尼思存前聖之業以魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰立説仲尼因魯史以作春秋初無容心也本題云仲尼思存前聖之業思則有心矣此篇反其意而用之謂堯舜禹湯文武周公之業至仲尼而存者天也非仲尼有心於述作也天相斯道則前聖之業吾不求存而自存又何待於思之之力邪批云立意異行文髙有力量有精神最可玩味論曰聖人無心於述作也謂夫子之作春秋述魯史也非有心於作之也無心反形思字而道之所以絶續者天也非聖人也謂前聖之業既絶而復續皆天也非夫子有心於存之也聖人本心初豈以區區述作詔天下後世哉謂聖人無心於述作天之未喪斯文也照破題天字也語天之將喪斯文後死者不得與於斯文也天之未喪斯文也匡人其如豫何云云聖人責也聖人不能自已也夫子無容心前聖之所以相傳者至是絶矣而復續前聖之業至此而存人則曰是書也聖人殆有心焉有心字與無心字相反或者之意謂夫子有心於作春秋夫聖人以天者自處以扶世教為已任推原夫子本無心於作春秋因史而經因魯史作春秋豈求益於古聖人而為是述作也豈有心於述作以道為書非吾本心應破題無心意而帝王之行事借是以考信謂堯舜禹湯文武之行事借是書以為證或者其天邪應破主意天字意仲尼於堯舜禹湯文武周公同道也數聖人之道一耳安有窮達存亡之判然其業待仲尼而存人以為數聖人幸也開説存前聖之業意愚則曰前聖非亡也仲尼非存也説存字有理春秋之作仲尼所不得已應前聖人不能自己意而謂之思者仲尼有心乎哉喝出思字説主意才思便是有心了夫子無心於春秋何嘗要思吁可論矣繳上意班固志藝文曰仲尼思存前聖之業是未知夫子之天者也掇出天字正繳冒意嗚呼尼山未禱史記孔子世家父叔梁紇與顔氏女禱于尼丘得孔子孔子生而首上墟頂故名曰丘字仲尼題下更不用他事直將夫子敘起筆力老健木鐸未鳴語八佾儀封人曰天下之無道久矣天將以夫子為木鐸道誰寄邪言孔子未出時道寄之誰喚下意曰堯也舜也禹也湯也文武周公也應上説出以前數聖人然則是道也歷萬世而無弊董仲舒䇿道者歷萬世而無弊而事業亦與之不泯説前聖之業如此果有待吾仲尼耶且反説曰存矣未能保其常存也喝出存字反覆議論然則聖人之作春秋果有心乎應冒子有心字引入思意王轍未東周自平王東遷謂之東周王綱未弛謂東周以前數聖人之綱紀尤定賞罰公名位尊天下未有筆削之春秋而人心之春秋未嘗無之史記至於為春秋筆則筆削則削子夏之徒不能贊一詞心人心之春秋得前輩議論謂人有公是非便是春秋五三聖人相為前後五帝少昊顓頊髙辛唐堯虞舜三王禹湯文武其行事者在斯民之耳目不必載之空言而後存也謂前聖之業不待春秋而後存我孟子序是故垂憲言仲尼有云欲托之空言不如載之行事之深切著明也吁此正堯舜禹湯文武周公之天也歸主意天字仲尼之處斯時也春秋不作吾道自若天下後世亦莫見繼絶之功過孔子來謂前聖之業果存則不作春秋語繼絶世奈何仲尼所遇之天非堯舜禹湯文武周公所遇之天也應主意天字謂仲尼之時與前聖之時不同不知仲尼者曰仲尼之於春秋以匹夫之微行天子之事孟子滕文公下孔子懼作春秋春秋天子之事也其殆有心焉應冒子有心字形思字嗚呼聖人之心天也又歸天字上天生仲尼上不君之為堯舜禹湯文武下不臣之為周公夫子有聖人之德無聖人之位眇然而為萬世仁義禮樂之宗主夫子一身所任甚重應冒子以扶世教為己任意春秋此時不作何時而可作邪夫子不得已而作春秋前聖之業此時而不存何時而可存邪説出存字有力蓋自世變日下聖人不作指堯舜禹湯文武周公道統失其傳而事業不見於天下後世謂前聖之事業不可得而見大舜有苗之征書舜典帝曰禹惟時有苗弗率汝徂征文武采薇之役詩魚麗文武以天保以上治內采薇以下治外又采薇遣戍役也周公東征之師詩東山周公東征三年而歸此事業之見於征伐者也今存乎否乎疑詞以上説前聖征伐之事業已不存彼鄭人伐衛以下説夫子作春秋存前聖征伐之事隱公三年鄭人伐衛莒人伐杞隱四年莒人伐杞取牟婁何為者乎責上二人我是以書之以示征伐之道廢春秋之書此所以存前聖征伐之道夏禹塗山之朝左襄七年禹會諸侯於塗山執玉帛者萬國商湯景亳之命周武孟津之會左昭四年椒舉曰商湯有景亳之命周武有孟津之誓事業之寓於禮樂者也今存乎否乎疑辭以上説前聖禮樂之事業已不存與前一假對説彼齊會葵丘以下説夫子作春秋存前聖禮樂之事業僖公九年公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘晉盟河陽僖二十八年冬天王狩于河陽按左氏晉侯召王仲尼曰以臣召君不可以訓故書曰天王狩於河陽何為者乎責上二人我是以書之以見禮樂之道缺春秋之書此所以存前聖禮樂之道田賦以改法襄十二年春用田賦胡氏曰古者公田什一助而不稅魯自定公初稅畝後以為常至是不足又以田賦也稅畝以益征宣十五年初稅畝胡氏曰書初稅畝者譏宣公廢助法而用稅也初者志變法之始也非前聖之規也謂是時稅賦之法不如前聖之舊書之以存貢助徹之良制夫子之書用田賦初稅畝蓋欲存三代井田之制孟子滕文公上夏后氏五十而貢殷人七十而助周人百畝而徹致夫人於大廟僖八年秋七月禘于大廟用致夫人胡氏曰夫人風氏也舉大事於始祖之廟立以為夫人嫡妾亂矣躋僖公於閔公之上文公二年大事於太廟躋僖公胡氏曰升僖於閔之上也非前聖之典也謂是時祭祀之法不如前聖之舊書之以存明人倫之大經夫子之書致夫人躋僖公蓋欲存三代明人倫之制説若不把春秋所書之事與預前聖所行之事打合出則春秋與前聖何相干初未嘗述堯舜禹湯文武周公之事而前數聖人之業自爾存自存乃是自然之存亦何所容其心哉見得非有心於存向也綱常湮斁今因春秋而明説春秋存綱常向也法度廢壞今賴春秋而立説春秋存法度是道既絶而復續是業既亡而復存應冒子絶續存亡四字謂非聖人之功可乎以上且説夫子之作春秋有功於前聖却轉入思字上吁轉入本意前數聖人之事業固因世變而存亡而仲尼豈求以強存之邪應無心於述作意始乎獲麟終乎獲麟一筆一削天假手也仲尼不與也用此一事見得道之存亡皆天非夫子有心於述作也史記哀公十四年春狩大野叔孫氏車子鉏於商獲麟以為不祥仲尼觀之曰麟也取之曰河不出圖洛不出書吾已矣夫顔淵死孔子曰天喪豫及西狩見麟曰吾道窮矣子曰弗乎弗乎君子疾沒世而名不稱焉吾道不行矣吾何以自見於後世哉乃因史記作春秋又左傳序絶筆於獲麟之一句者所感而起固所以為終也道未墜地豈非天乎語子張篇文武之道未墜於地異時未喪斯文之歎而歸之天語子罕篇子畏於匡曰文王既沒文不在兹乎云云天之未喪斯文也匡人其如豫何用此一天字極切與冒子相應於此益信仲尼之作春秋天也非人也歸在天字上道統之絶續非仲尼之本心也又歸在思字上見得夫子無心處前聖之業至於仲尼不得不存也謂夫子無心於存前聖之業班固之言其有見於仲尼之功乎引本出處惜夫思而存之之説是殆以有心論聖人者耳抑班固言思字未知夫子之本心照冒頭結處雖然聖人非有心於春秋者也接上生下抑亦有心於世道者邪末意謂夫子有心於世道何者舜之事業莫大於四放之罰孟萬章上舜流共工于幽州放歡兜于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服周公之事業特見於管蔡之誅書蔡仲之命惟周公致辟管叔于商囚蔡叔于郭鄰夫子匹夫也其事業何所寓邪謂前二聖人達而在上可以為事業夫子窮而在下不可以為事業周室衰微王綱解紐指春秋之時天下不可一日無賞罰見下注不得已假天子之權見之於書人書名之微蘇老泉春秋論夫子亦曰天下不可以無賞罰云云不得已而假天子之權以尊周室書人如隱二年書鄭人伐衛之類書名如隱元年書天王使宰咺來歸惠公仲子之賵之類舉前聖之業寄之於載籍之間是則夫子之本心也見得仲尼有心於世道故作春秋一書使夫子果無心於世道則亂臣賊子何為而懼乎反下有力秋孟子曰孔子作春而亂臣賊子懼然則前聖之業至春秋而復存喚前意而春秋之法所以常存者庸非後聖維持之功乎前聖亦得夫子之力故曰前聖後聖其揆一也孟子離婁上先聖後聖其揆一也謹論此篇謂道之絶續天也天之未喪斯文故前聖之業至是而存後篇謂文之盛衰天也天之未喪斯文故大漢之文至是而顯二篇同以天字為主意題外生意格與前篇仲尼思存前聖之業同意大漢典籍著作如何論沈震孫出處漢班固西都賦大漢受命云云有天祿石渠典籍之府又有承明金馬著作之庭立説漢開典籍之府設著作之庭是顯文之有其地矣然其文之所以盛者實天相之天之未喪斯文故有顯文之地批云意味長詞藻粲深得論體論曰顯文之有其地指典籍之府著作之庭顯文二字亦趨時理宗皇帝閣名顯文閣固足以為世道之盛褒美之與後面節節相應而文之所以盛者天實為之也以天相斯文為主意嗟夫文之盛世道之盛也鎖上意三代而後文獻不存推原其由故語文獻不足也有君焉能以顯斯文為己任應顯文二字暗説漢君聿興祕宇大集鴻儒包天祿石渠承明金馬意天祿閣石渠閣乃藏書之所承明殿乃著作之所金馬門乃待詔之所收篇章以廣儲蓄之富説典籍意新製作以侈詞藻之工説著作意人孰不曰藏書著書皆有其地斯文之盛可以為世道幸應破顯文之有其地意接上生下雖然文之盛豈能自盛意者天相斯文也邪應破文之所以盛者天實為之也主意在此漢至武宣餘百年矣考究其時文治之興以其時考之則可矣學孟子語應固足為世道之盛今也典籍則有府著作則有庭説出本文顯文之有其地豈不足以為漢賀應破題語愚則曰前乎典籍散矣至是而復聚典籍散於三代以後而今也復聚於漢前乎著作泯矣至是而復富著作泯於三代以後而今富於漢豈以其地為斯文重邪應上地字疑詞冷下要歸天字吁文之未喪其天也乎應主意天字人語天之未喪斯文也匡其如豫何大漢典籍著作如何是不當以地論而當以天論應前地字天字請申之嗚呼世尚結繩書契未作易繫辭上古結繩而治後世聖人易之以書契未有典籍之藏亦未有著作之工也推原古昔未有此二者之文豈天忘之乎抑亦一元混沌未雕未斫之天乎疑詞應主意天字隱吕東萊堯舜論函於太始於混淪而藏於未雕未斫之天者未離也逮周而尚文書在上庠禮在瞽宗記文王世子云云注上庠太學也瞽宗樂師也雖有其地應破地字猶未若石渠天祿之祕且密耳見本題注天祿石渠典籍之府尼山未禱史記孔子世家父叔梁紇與顔氏女禱於尼丘得孔子孔子生而首上墟頂故名曰丘字仲尼木鐸未鳴語八佾儀封人曰天下之無道久矣天將以夫子為木鐸文不在兹乎語文王既沒文不在兹乎夫子出而六經筆亦天生豫也應天字魋語天生德於豫桓其如豫何不幸竹簡吹煙典籍灰矣史秦始皇紀李斯言請史官非秦紀皆燒之非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之以書序科斗書廢已久云云更竹簡寫之瓜谷設穽著作荒矣書序及秦始皇滅先代典籍焚書坑儒注秦患天下不從召諸生七百人皆拜為郎又密令各自種瓜於驪山硎谷之中濕處詔天下博士諸生使往視之而為伏機因發機從上填之以土天果喪斯文乎疑辭照主意天字焚書焰烈秦非不欲滅典籍而澌盡也見上注焚書事然孔堂屋壁猶藏古書後人欲壞其宅而不可非天假金石絲竹之音以神之邪此一假説秦雖焚書而天不焚之書序魯共王好治宫室壞孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆科斗文字王又升孔子堂聞金石絲竹之音乃不壞宅坑儒禍慘秦非不欲空著作而無人乎見上注坑儒事然伏生九十餘年猶能口授非天假之年以夀斯文之傳邪此一段説秦雖坑儒而天不坑之以書序濟南伏生年過九十失其本經口傳授裁二十餘篇於是益信天之果未喪斯文也歸在天相斯文上灞上真人繼秦而帝史秦贊真人翔灞上指髙祖也五星聚井實開文明之運君子正有望焉前漢髙祖紀元年冬十月五星聚於東井秦府圖籍所收何書同上沛公還軍灞上蕭何盡收秦丞相府圖籍不喜儒語何有著作前陸賈傳陸賈時時前説詩書帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治之云云賈凡著十二篇號曰新語又酈食其傳沛公不喜儒然此又天之未定者耳應主意天字謂漢初典籍著作未顯六七葉而武宣作能以斯文為重從髙祖引過武帝宣帝來表六經而聖真一武帝贊帝初立卓然罷黜百家表章六經又敘傳憲章六學統一聖真招文學而儒術興宣帝本紀元康元年詔曰云云其博舉吏民厥身修正通文學明於先王之術宣究其意者各二人又見下注自秦而漢晦𡨕日月文風之盛世道之福也應冒子接題文之盛世道之盛然豈武宣自能為之哉毋亦天相斯文而為之爾歸主意天相斯文上今觀建藏書之䇿而諸子傳説皆充祕府典籍盛矣應冒子收篇章以廣儲蓄之富藝文志孝武世書缺簡脫於是建藏書之䇿寫書之官下及諸子傳説皆充祕府選名俊之儒而賦頌等詞更進迭獻著作興矣應冒子新制作以侈詞藻之工劉向傳宣帝循武帝故事招選名儒俊才置左右更生以通達能屬文詞與王褒張子僑等並進獻賦頌凡數十篇天祿石渠是為典籍之府見本題注天祿石渠二閣名六藝於是乎講論同異於是乎稽合西都賦又有天祿石渠典籍之府云云講論乎六藝稽合乎同異非藏書之地乎以上應冒子顯文之有其地意宣帝事承明金馬實為著作之庭見題注承明殿名金馬門名篇章於焉而啓發祕文於焉而校理西都賦又有承明金馬著作之庭云啓發篇章校理祕文矣非著書之地乎以上應冒子顯文之有其地意向之脫簡缺文今會粹矣向之文蕪筆絶今華藻矣見前注應冒子前乎典籍散矣至是而復聚著作泯矣至是而復富意典籍著作如是之盛豈能自盛哉應冒子盛字喚下意豈上之人崇尚斯文而後顯哉應冒子顯文字且疑詞抑豈以其地而重哉應冒子地字亦疑詞未決自今觀以下至此皆未説出主意噫吾知夫天其或者有意於斯文耳亦天以斯文而相我漢耳至此方説出天相斯文主意向使天無意於富典籍也則求書有使孰從而求藝文志至成帝時以書頗散亡使者陳農求遺書於天下巍峩崇閣未必不轉而為遊觀之地矣謂天祿石渠藏典籍之閣使天未欲興著作也則諷誦之通孰使之通班固西都賦云云森嚴祕廷亦未必果為文章所自出之地矣謂承明金馬著作之庭以上皆反説有力論至於此亦知典籍著作之地未足為斯文重而興起典籍著作之意出於天始足以為顯斯文也歸在天相斯文上收拾意足雖然漢之典籍著作固有其地也而相之者天也接上主意興起斯文雖曰天也而成之者人也末又歸之諸儒之力天不人不因人不天不成揚子重黎篇云云觀漢之世名儒輩出考究漢事論經石渠則有望之等輩宣帝紀甘露中講五經同異望之平奏其議校書天祿則有更生宗老劉向字更生成帝時校書於天祿閣是不徒藏典籍而考典籍者有人矣考典籍得諸儒之力入直承明則有嚴助諸儒嚴助傳助為會稽太守武帝賜書曰君厭承明之廬又揚雄待詔承明之庭待詔金馬則有王褒數子王褒劉向俱待詔金馬門著作不徒有其地而著作又有人矣著作得諸儒之力天生諸人正為斯文地關鎖上意使漢君不能相天意而進之用之則褻天矣棄天矣漢之得人力亦出於天意吁大漢典籍著作之盛天邪地邪人邪此是倣蘇老泉春秋論結文收拾一篇首尾字面春秋論鳴呼後之春秋亂邪僣邪散邪謹論順題發意格與陳介石禮所損益論同意王道之端如何陳子龍出處前漢董仲舒䇿臣謹按春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也立説春秋書王正月王道之端惟其正而已董仲舒當武帝即位之始以王道之端為言端者正也能審其初則為王道之正蓋得春秋書正之義批云語話多用經句抑揚開合斬截頓挫無煩難冗雜之病亦可為後學之法論曰行王而王謂仲舒告武帝能行王者之道可以為王矣出唐魏徴傳徴告太宗曰行帝道而帝行王道而王其初不可不審也初字指端字謂武帝行王者之道當審察於其初自古人主出而王天下者必有道喝出道字斯道也何道也出韓原道一出於正而已正便是王道苟出於正申上文正字則為天理之極人倫之至王之所以為王是為王道由是而之之謂道用韓原道語道若大路然出孟子夫道若大路然豈難知哉顧吾所行何如耳用唐魏徴語然而罔不在厥初轉歸主意初字見題上端字用尚書語此際不審純駁判焉其初能審則為王道之純粹不能審則為伯道之駁雜吁嘆詠可不謹哉謹字應破題審字王之所以行者有道道之所由發者有端喝出題字分曉甚矣端之未易求而初之不可不審應破題語此則春秋書正之義春秋書王正月舍乎此何如則可以王用孟子語武帝即位而舉賢良武帝建元元年即位舉賢良仲舒始以王道對董仲舒應賢良䇿對以王道餘見題注何則仲舒學春秋者也春秋書正仲舒學春秋以王道之端告武帝端者正也得春秋書正之義王道之端如何請求其端喝出端字語老春王正月此書元第一事見得是初王者即位之始影武帝事之初也應初字易之乾易第一卦是乾詩之關雎詩第一篇是關雎皆謹初之義耳易與詩皆謹其初非特春秋為然易言君道應王道字詩言王政應王道字未有不自其初求之應初字端在是則道是歸題上字道一而已奚其異易詩春秋所言皆是王道吁有由也演説王道與伯道不同之由吾之所謂道者禹湯文武之道此是王道也彼之所謂道者齊桓晉文之道此是伯道發軔一差塗轍隨異發端之初如車之發軔所發不同其路亦異入乎彼者必出乎此如入王道必出伯道入伯道必出王道語用韓原道是以君子審其初歸初字春秋而榮三代陋五伯三代夏商周宋五伯齊桓公晉文公秦穆公襄公楚莊王莫如孟子七篇一書以孟子之言證春秋首言王道之始孟子梁惠王上養生喪死無憾王道之始也始者何道之所由始也始便是初證得端字出梁以其利我以其仁孟子梁惠王上王曰云云亦將有以利吾國乎云云孟子對曰亦有仁義而已矣何必曰利齊以其力我以其德孟子以力假仁者伯以德行仁者王其行一也而所趨有不同仁與德是王道利與力非王道是以滕君為國之始獨以三代之事勉之孟滕文公問為國孟子曰云云夏后氏五十而貢殷人七十而助周人百畝而徹將行仁政必自此始同上孟子曰子之君將行仁政云云夫仁政必自經界始倘由是而後可以王用孟子語軻言其始仲舒指其端是或一道也孟子言王道之始與仲舒言王道之端其意則一武帝天資髙明非可與齊滕同日語過處有法罵倒上文齊宣王滕文公尊武帝而仲舒則學孟子之道故於王道拳拳焉就上文舉孟子事引歸仲舒對策之語始帝之蒞政也説武帝即位之初蒲輪束帛倐有申公之召武帝以蒲輪束帛迎申公逮其蔇也蔇者終也左傳猶懼不蔇僅力行一語而止申公對武帝云顧力行何如耳開端而不及竟應題上端字後世得以議其疏責申公之言疏略帝也厲精云始指武帝即位之初以有為之資操可致之勢見董仲舒策此朕未有艾豫將就之時也詩訪落云云此昭明有融令終有俶時也毛詩既醉篇云云然而此時此意進之善固易勉載之他亦易從謂即位之初當審趨向語用危科力行何如論中若乃概言其所行而不明指其所以行之端喝出端字趨向未定決擇不精初心不可不審初心之差終身之纍也其初不行王道則為他道之歸矣賢良三策而有仲舒出焉引入本出處一則按春秋二則證春秋説主意用本文語春秋何道也王而已歸王字正次王王次春用仲舒所對之語王道所在雖天且不能違况人乎演上文王者正也反是則伯矣董仲舒策正者王之所為也本乎人情行乎仁義之正此履道坦坦之道易履卦由是而之焉則王如此則為王道之正悖乎天理依乎仁義之偏此往來憧憧之道易咸卦云云由是而之焉則伯如此則為伯道之偏王伯常相背馳而不可以並行總上二股王伯之説端本澄源在審其初而已歸主意故曰道者所繇適治之路仲舒䇿云云所繇者正則所適者亦正應論冒正字果正矣必崇義也而抑利義是王道利是伯道必善善也而惡惡善是王道惡是伯道必貴華也而賤夷華是王道夷是伯道由是而勉強行道仲舒策勉強行道功則德日起而大有由是而尊聞行知同上尊其所聞則髙明矣行其所知則光大矣禹湯文武之道胥此焉出此是王道之端仲舒其知導之以道之義乎用論語為政篇語易曰差之毫釐繆以千里用易繫辭語舒之所謂端者在是豈直體元而已端在審其初而已然而造太初厯改太初元帝何獨屑屑於是邪證初字紀前武帝本太初元年注初用夏正以正月為嵗首故改為太初厯夏五月正厯以正月為嵗首注以建寅月為正未正之前以建亥為正向使仁義不外多欲不內久矣漢其三代也前漢汲黯傳上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎惜夫此心好大而近功淺利之説始得以售其巧於是神仙之端開矣郊祀志公孫卿齊人少翁欒大等皆言求神仙事土木之端開矣東方朔傳陛下以城中為小圖起建章左鳳闕右神明號千門萬户土木衣綺繡狗馬被繢罽窮兵黷武之端又開矣後漢荀悅漢紀論窮兵極武百姓空竭治道於是乎雜非王道之正吁何多端邪非王道之端遂使行道一念亦僅稅駕於此何異乎後世之不以伯王雜者為家法乎前元帝本紀元帝言陛下持刑太深宣帝曰漢家自有制度本以伯王道雜之奈何純任德教用周政乎行王而王亦貞觀初年事也其後竟何如哉唐魏徴傳徴曰行帝道而帝行王道而王顧所行何如耳靡不有初鮮克有終用詩語其尚鑒兹哉謹論順題發意格與前篇陳文龍王道之端論同意禮所損益如何論陳介石出處語為政子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也立説謂世變推移不能常如一日是以聖人制禮不敢以用之一世者先數百世而為之常留有餘不盡之意以所可為者而遺後世使之可損則損可益則益常不至於窮而有所弊耳批云文法圓轉趣味深長前後相照應逈出時粧頗逼古體論曰聖人之制禮謂夏尚忠殷尚質周尚文不能不以所可為者而遺後世也聖人不敢盡力為之常以其可損益者遺後之人禮秩於天而制於聖人書臯陶謨天秩有禮又前刑法志聖人因天秩而制五禮焉制之者先之也下一先字養下文先字窮字是一篇眼目先之則盡吾力而求工於文章度數之間且解開説謂聖人制禮要當詳盡使後有作者不能加毫末於此而無所損益焉亦何不可之有不必俟後世有所損益嗚呼亦獨不為世變慮邪歸主意上來世變之來聖人蓋審之熟矣申上世變意人情物變不能常如一日謂殷時與夏異周時又與殷異後之世又與周時異聖人亦豈能以用之一世者先數百世而為之文章度數以盡其變乎應接題先字意勢必有所窮也為之盡則必至於窮窮則必繼之以弊矣窮則必至於弊雖有聖人者作亦將奈之何哉若至於窮且弊雖聖人亦無用力處故莫若以其所可損益者遺之應破題以所可為者遺後世意使之可損則損可益則益謂忠質文三者與物推移隨時消息前頭做得未盡故後來有著力處常不至於窮而有所弊應前面窮字夫惟不至於窮而有所弊也粘上文再説盡主意則禮乎禮乎庶乎百世其可繼乎説盡本出處意吁此則三代聖人制禮之本心吾夫子知之而發為損益之論也説本出處禮所損益如何夫子雖以答子張之問文有操縱結上生下蓋亦深歎三代聖人之制禮以其所可遺者遺後世也應破題以可為而遺後世此固三代聖人制禮之本心粘上文文勢不斷不覺見過原題而或者之論則曰君臣父子禮也夫婦長幼禮也記禮運父慈子孝兄友弟恭夫義婦聽長惠幼順君仁臣忠十者謂之人義君臣父子夫婦長幼一日而無禮則亂學經句此是禮之大綱三代聖人之制禮不敢盡吾力而為之於其先應接題先之則盡吾力而求工於文章度數之間意而常以所可為者而遺後世應破題語則是三代之世君臣父子夫婦長幼其禮猶有所未備必至於後世有所損益而後備毋乃不可乎從原題下或者處難至此敢聖人制禮不是未備只是不盡力為之常留可為者與後人為之曰此非知本末之論也歸本意三代之禮所損益者文也指忠質文三者無所損益者本也謂君臣父子夫婦長幼三綱五常其本也文章度數其文也本出處正注云因謂三綱五常所損益謂文質三統三綱五常雖歷千萬世而不有所損益也本則不可損不可益文章度數雖以一代之興亦必有一代之所損益文則隨時損益是何也文章度數之用常與人情物變相尋於無涯世變既異則禮文亦異人情物變不能常如一日則文章度數亦豈能常如一日哉應論冒子講一段吁此世變説也應主意此三代聖人所以不敢竭吾力而為之而常以其所可損益者而遺後世也應論冒主意嗟夫井田之成禮地官小司徒乃經土地而井牧其田野九夫為井井四為邑阡陌之生前漢地理志秦孝公用商君制轅一開阡陌什一之盡善孟滕文公上夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也魯稅畝之所由起左傳魯初稅畝天下事其盡力而為之於前卒至於窮且弊而莫繼於其後者皆是也應論冒常不至於窮而有所弊語而况夫禮之為物所以管世俗而防民情昭人文以化天下此是禮之本日趨而日變日變而日以異應論冒人情物變不能常如一日意凡其登降之節揖遜之容此是禮之文與夫器用之飾冠裳之儀賓客祭祀之事周禮春官大宗伯以飲食之禮親宗族兄弟以昏冠之禮親成男女以賓射之禮親故舊朋友以享燕之禮親四方之賓客以脤膰之禮親兄弟之國必欲其詳且盡而使來者無毫末之可加而不能有所損益焉其可乎吾逆知其不可也應論冒使後有作者不能加毫末於此意是故穴居野處之不如宫室易繫辭上古穴居而野處後世聖人易之以宫室茹毛荷毳之不如衣裳記禮運昔者先王云云未有大化食草木之實鳥獸之肉飲其血茹其毛者又王褒賢臣頌夫荷氊被毳難與道純綿之麗密上古聖人其智非不足以辨此而必待堯舜氏作而後易之者蓋慮此也見易繫辭黃帝堯舜氏作云云上古聖人其所以慮世變者且若此應主意世變字曽謂三代聖人其不慮及此乎引堯舜三代來應主意冒頭世變字今之説者皆曰三代之所以損益者忠質文而已矣説本出處忠質文三者商可以損夏之忠而益之以質周可以損商之質而益之以文史髙祖紀夏之政忠忠之弊小人以野故殷人救之以敬敬之弊小人以鬼故周人救之以文又董仲舒䇿云云蓋至於周之文則郁郁乎盛哉雖聖人且將從之矣語周監於二代郁郁乎文哉吾從周繼周者奚容損益於其間哉説出本出處下文曰惟其文所以有所損益也應前三代之禮所損益者文也意何者文者時尚之所宜也夏尚忠殷尚質周尚文時有升降則文亦與之損益矣應冒頭隨時消息意且獨不觀諸易乎引易損益二卦為證損益二卦聖人皆彖之曰與時偕行此可以見隨時損益之義矣損卦損益盈虛與時偕行又益卦凡益之道與時偕行嗚呼禮所損益亦既隨時接上隨時意則聖人其敢先時變而為之應冒頭語惟恃吾力之所及而不計世變之無窮邪應冒頭獨不為世變慮邪語此三代聖人之於禮寧使吾被有所損益之名言夏商周損益忠質文三者毋使後世無加之之所以所可為者遺後世寧使禮制有所沿革而常新毋使禮文無所增損而終弊學蘇東坡韓文公文法故夫養老之禮一也夏則燕衣商則縞衣周則元衣記王制夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭元衣而養老祭祀之禮一也夏則尚明水商則尚醴周則尚酒出記明堂位云云堂一也而有世室重屋九筵之異禮考工記夏后氏世室殷人重屋周人明堂東西九筵輅一也而有用木用革用玉之殊記明堂位鉤車夏后氏之輅也大輅殷輅也乘輅周輅也注大輅木輅也乘輅玉輅也又周因殷輅以制木輅約木以加飾為玉五輅一曰玉輅二曰金輅三曰象輅四曰革輅五曰木輅凡若是皆三代之所損益也總上文夫自二代而至於周禮之儀文其所損益猶且若是然矣結上生下其或繼周至於百世本文則其文章度數之間夫豈無所損益者邪應冒頭為之文章度數以盡其世變等語此制禮聖人逆知時變之所趨應時變字必至於有所當損有所當益應冒頭使之可損則損可益則益等語不敢盡吾力而為之常以其所可為者遺後世也應破題主意結大講中語雖然其或繼周聖人之望後世者固不薄説孔子抑周之文亦豈容輕有所損益於其間哉説繼周之後意繼周者秦秦繼周後立為尊君卑臣之禮隋禮儀志秦氏以戰勝之威并吞九國盡收其儀禮歸之咸陽惟探其尊君抑臣以為時用君臣之禮雖嚴而君臣之禮文則甚不相接矣説秦不知禮之本區區損益無足議者罵倒秦更無推詞漢雖繼秦實猶繼周獨非禮所損益之時乎引漢來説野外之容從事綿蕞兩生不來良有以也前漢叔孫通傳漢王悉去秦儀法為簡易羣臣飲酒爭功拔劔擊柱通曰五帝異樂三王不同禮禮者因時世人情為之節文者也臣頗采古禮與秦儀雜就之云云於是通召魯諸生三十餘人魯有兩生不肯行云云為綿蕞野外習之注以茅剪植地為纂位尊卑之次春秋傳曰置茅蕝又蕞與蕝同蓋至於武帝之世承平日久百年可興入武帝來年同上禮樂積德百而後可興博士弟子之習稍有可觀者武帝紀五年詔曰云云今禮廢樂壞朕甚愍焉太常其議與博士弟子崇鄉黨之化以厲賢才焉丞相宏請為博士置弟子員學者益廣而議禮君子猶不以三代之所損益者而豫之董仲舒策故王者有改制功名亡變之之實然夏尚忠殷尚敬周尚文所繼之數當用此也云云夏因於虞而獨不言所損益者其道如一而已此又可以觀世變矣應世變字然則三代逺矣禮所損益果不可復見邪設難曰解得其禮文而不得其禮意者終不知所損益也禮之文可損益禮之本不可損益然則義惡在設問曰答必有關雎麟趾之意而後可以行周官之法度用程伊川語結謹論論學繩尺卷九
