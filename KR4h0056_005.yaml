body:
  text: 論學繩尺巻五宋魏天應編選林子長箋解就題發明格與君人致用成化論同意君人致帝者之用錢易直出處揚孝至篇君人者務在殷民阜財明道信義致帝者之用成天地之化使粒食之民晏也粲也主意君人能致帝者之道然後可以致帝者之用殷民阜財以厚其生明道信義以善其性此固今古不可易之道也世之談功利者往往欲以淺陋之說求以自信於天下遂謂帝者之道廣大而難行迂遠而難成故儒者之論不行而功利之說紛矣此揚子雲所以不得不發明致用之道也馮厚齋批云深得論體論曰知古今有不可易之道以古字指帝者以今字指君人以道字原上文殷民阜財明道信義又如古今有不可易之效以效字體用字則儒者之論可以行於天下矣取儒者之論則可以抑功利此原上文立說夫儒者之論其不行於天下也反說承上謂儒者之論暗指揚子起於功利之徒求以自信其淺陋之說因計功謀利之人欲以其説自信於天下此二句是綱目遂以聖人之道為廣大而難施照破題道宇以聖人之效為迂逺而難成照破題效字骨此二句是立而君天下者亦狃於其說以為誠然也君人亦謂功利之說是夫豈知此三字歸正講昔之聖人體帝者其所為更相授受以輔相天地之道者又照道字本出處成天地之化意亦不過養民以厚其生說殷民阜財教民以善其心說明道信義此二句教養是論骨然後無愧於天地化育之意說成天地之化意而帝者之用見矣明出題用字云此帝者之用也豈有廣大而難施迂逺而難成者哉又照前立骨句何嘗如是之難哉惟其待之過髙求之過深又照前立骨两句説惟其行帝者之道如是之過棄帝者已見之用而不知其所以致之棄其用而不知致又應前狃其説以為誠然句則失其為君人之用而不足以慰天下之望矣則君人之用失矣何足以惬人望乎揚子雲憫功利之説勝明指功利故發明致用之意所以發明帝者致用之道使知古今有不可易之道則必有不可易之效使人君知有此道則必有此效效應破題道两句此其所以為善學也君人致帝者之用請因其意以申之夫以帝者之道必聖人可以自行而不可以通於後世謂帝者之道難行以帝者之效必聖人可以自致而不可以求於後世謂帝者之效難致外尊之以廣大之名應承題廣大而難施句而内非笑其有迂緩之意者應承題迂逺而難成句其殆起於誰乎設問其無乃出於三代之後計功要利者之說乎答上問應承題起於功利之徒句昔之操是説以說其主而使功利立見於一時以誇示天下者蓋無過於商鞅者矣大事記曰按商君傳鞅初見孝公景監曰子何以中吾君鞅曰吾説君以帝王之道君曰乆逺故吾以強國之術說君君大説耳便用此反事最住彼其勸農力本以務冨強通鑑鞅說孝公以冨國強兵之術令民力本業耕織自以為昔之聖人所謂養民之政不過於此矣應冒頭養民以厚其生句謂養民之政只如此而已令行禁止無敢干犯通鑑令行十年秦國道不拾遺山無盗賊民勇於公戰怯於私鬪鄉邑大治秦民初言令不便者衛鞅曰此皆亂法之民也盡遷之於邊其後民莫敢議令自以為昔之聖人所謂教民之術不切於此矣應冐頭教民以善其心句謂教民之術莫切於此世之君天下者説後之人君徒恱於其功而不知聖人之所以為功徒然恱功利者之言功而不知帝者之功效為可恱喜於其利而不知聖人之所以為利徒然喜功利者之言利而不知帝者之大利為可喜真以為帝者之用廣大而難施迂逺而難成也應冒頭接題狃於其說以為誠然也一叚與其求效於子孫百年之後孰若吾身親見之乎謂當時之君人厭聖人功效逺大不若功利淺近易見之為愈於是舉輔相天地之任易泰卦輔相天地之宜以就一夫淺陋之說一夫淺陋指言功利者而不自以為過也自君天下者一句至此全應冒子承題蓋三代以後皆然矣此句結上承下嗚呼彼胡不取帝者之用而致之乎此入大講應冒子夫豈知昔之聖人一段方天地之初養民之理已具應冒頭養民字而民不能以自養所謂天生五材是也左天生五材民並用之教民之義已存應冒子教民字而民不能以自教所謂天叙五典是也書天叙有典勅我五典五惇哉有帝者出夫亦利而導之順而序之使天道可立易立天之道地道可成書地平天成而輔相天地之功可以無負於天下而已應冒子輔相天地之道者故事見前當水患之未平也雖有平土不可室而居桑而衣耒耜而食也此説養民以厚其生意孟滕文公上當堯之時天下猶未平洪水横流汎濫於天下云云又滕文公下民無所定下者為巢上者為營窟使禹治之然後人得平土而居之人室而居桑而衣耒耜而食學韓文其人火其書句法雖有父父子子兄兄弟弟不得養老以致其孝撫㓜以盡其慈也此說教民以善其心意以易家人卦父父子子兄兄弟弟又記王制司徒養老致孝又祭義慈㓜為其近于子也用二雖有字且説帝者之時民未得其養未得其教及既命禹命稷命禹命稷所以養其生命契命伯夷命契命伯夷所以善其心此不易之道則六府修矣三事和矣九功叙矣魏志荀彧傳舜分命禹稷契臯陶以揆庻績又書舜典有能典朕三禮僉曰伯夷帝曰咨伯汝作秩宗又大禹謨九功惟叙九叙惟歌六府三事允治此不可易之效何其疾也又何若此之急也向之巢而窟者見上注今上枕而下簟矣襁負之㓜頒白之老其生可樂其死不憾孟養生䘮死無憾班白者不負戴於道路矣貨財阜通禮天官商賈阜通貨財禮遜流行前丙吉賛海内興於禮遜驩溢之聲播於四海而九叙惟歌矣此帝者之用致矣是不可易之效上注又何其速也又何若是之急然則謂帝者之用不能親見於吾身而必待於子孫百年之後者又豈信然耶應原題嗟夫彼其用之以養民照養民字出用字非若後世之私其冨以為養也帝者之養民如此非若功利者之養民如彼也彼其用之以教民照教民字出用字非若後世之峻其防以為教也帝者之教民如此非若功利者之教民如彼也是豈廣大而難施迂逺而難成也又照冒頭廣大而難施迂逺而難成句董仲舒有言今之天下亦古之天下共是天下用仲舒語前漢董策夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治然則堯舜用之而帝堯舜用是道則為帝湯武用之而王湯武用此道則為王宰制自我荀子宰制羣動裁成自我易裁成天地之道更相授受以為不易之道若此其同也帝王之道如此其一而其不易之效又若此其信也帝王之道又如此其可信照冒頭語眼而吾獨不能致其已成之用何耶帝王有已成之用吾獨不能致之者何如此自是文勢如此却不是段眼雖然自三代以後結尾文勢不斷承上生下有以帝者之心而致之者矣漢之文帝是也謂文帝以帝者之心而致其用是以海内冨庻興於禮義之效所以其效亦如此冨前文帝紀海内庻興於禮義有以帝者之法而致之者矣唐之太宗是也謂太宗以帝者之法而致其用是以有田野日闢亷耻日篤之效所以其效亦如此人事見唐太宗紀使事可法蓋它不肯如此使蓋其治之廣狭海内冨庻田野日闢此其治也然治之有廣有狭隨其所致之淺深帝者之心帝者之法此其所致也亦随其所致之有淺有深二句有法而莫不有焉此致治有其效則揚子雲之言可以騐如此則子雲之言騐矣後之君天下者可以鍳後之君人者可為鍳功利之說可以息功利之說可以息矣而儒者之論可以行於天下而無疑矣自則字下収盡一萹意謹論就題發明格與君人致帝者之用同格君人致用成化如何朱埴出處揚子孝至萹君人者務在殷民阜財明道信義致帝者之用成天地之化使粒食之民晏也粲也立說帝者之用天地之化皆一自然之理用藏於無則為化化顯於有則為用帝者之與天地俱無所容其心也君人者於此亦惟因其自然之用全其自然之化致之而無致之之迹成之而無成之之迹斯可矣一以有心為之則用非其用亦迹焉而已便不是化考官批云於題字有分别亦有發越義廣意深語圓茟老深得論體天地聖人一自然之理也天地之化聖人之用皆自然之理惟無容心於其間則得矣無容心者謂君人惟因其自然之用而致之因其自然之化而成之何也理妙於無而超於有者也含用藏於無則為化化顯於有則為用意無非果無而用生焉有非真有而化存焉皆理之自然者耳應自然字主意豈容以有心為之哉含不致之致不成之成意故凡以有心為之者必有迹粘上句說有心於致用有迹則凝滯於物而非化矣反形容主意分曉蓋盈天地之間何者非化說天地之化之易序卦盈天地間者唯萬物而聖人之所以財成者亦何適而非用此是帝者之用易泰卦后以財成天地之道用藏於無則為化化顯於有則為用兩句說出主意用之所存即化之所存帝者之用即天地之化天地固無心而聖人亦無心也無心便是自然應破題語後有作者亦惟因其自然之用全其自然之化斯可矣謂君人無容心於致之成之惟因其自然而已是知不致之致其用神不成之成其化妙發明主意無容心之説天地也聖人也同此理之自然者也而吾奚容心之有應破題否則用非其用而與大造之初意不相似則亦迹焉而已化云乎哉便不是自然了應接題有心為之數語君人致用成化何如請申之嘗謂天地者無形之聖人聖人者有形之天地一而二二而一者也發明天地聖人一自然之理蓋天地以其心溥萬物而無心聖人亦以其情順萬事而無情見自然意其程子曰天地之常以心溥萬物而無心聖人之常以其情順萬事而無情君人者之於天地聖人歸君人身上非致其用之難也致之而無致之之迹為難應冒頭不致之致意非成其化之難也成之而無成之之迹為難應冒頭不成之成意爰自開闢以来自天地初説来凡宇宙之内鼓之為雷霆潤之為風雨易繋辭鼓之以雷霆潤之以風雨通之為山澤同上山澤通氣衍之為金刀貨寳見食貨志貨謂布帛可衣金刀龜具生之為桑麻榖粟韓文其衣桑麻其食穀粟無一非天地之化則亦無一非帝者之用縂以上文函三為一帝者之用秘於天地前志太極一元氣函三為一冒函三才為太極之時應頭用藏於無則為化意判一為三天地之化寄扵聖人謂太極既判而為三才之時有應冒頭化顯於則為用然用非膠膠擾擾之謂也理之自然者耳應破題聖人自然之理化非杳杳冥冥之謂也亦理之自然者耳亦應破題天地自然之理充滿六虚愈有而愈無也周浹萬物愈著而愈冺也上暢九垓下泝八埏愈溥博而愈淵泉也此數句應冒頭盈天地之間何者非化而聖人之所以財成者亦何適而非用意前漢書上暢九垓下泝八埏又中庸云漙博淵泉而時出之曷嘗有一毫容心哉應冒頭天地固無心而聖人亦無心也世固有移民移粟矜之為能者矣然有心以致之而終莫之致孟梁恵王上河内凶則移其民於河東移其粟於河内河東凶亦然亦有揠苗刻楮鑿之為巧者矣然有心以成之有心致之成之皆非自然而終莫之成孟公孫丑上宋人有閔其苗之不長而揠之者又列說符以玉為楮葉三年而成此無他天地聖人本自然而然彼有心者自累之耳應冒頭故凡以有心為之者必有迹有迹則凝滯於物而非化後之君人豈可求天地於天地而不求帝者之天地哉結上生下引入大講思昔帝者之王天下也且説帝者仰則觀象於天俯則觀法於地易繫辭古者包羲氏之王天下也云云用两全句因風雷之益而教之以耒耜則吾無斵揉之勞易益卦象曰風雷益又繋辭神農氏斵木諸益為耜揉木為耒耒耨之利以教天下蓋取因火雷之噬嗑而聚之以市貨則吾無通變之迹易噬嗑象曰雷電噬嗑又繋辭日中為市致天下之民聚天下之貨云云蓋取諸噬嗑又下文通其變使民不倦因風行水上之渙而作舟楫因上火下澤之暌而制弧矢則吾無刳剡之巧易渙卦風行水渙又繋辭刳木為舟剡木為楫云云蓋取諸渙又暌卦象曰上火下澤暌又繫辭下弦木為弧剡木為矢云云蓋取諸暌只用刳剡二字拈二事未盡凡此者人以為帝者之用也以上皆是帝者之用如此而不知即天地之化也用即化是主意一用之施一化之著也一用之行一化之全也應冒頭用之所存即化之所存意然人知其著而不知其所以著知其全而不知其所以全形容自然意惟天下莫知帝力之時乃造化不容致詰之妙應冒頭聖人天地皆理之自然意云通厯帝堯之時有老人撃壤於路曰云帝力何有於我哉又詰問也豈惟天下莫之知雖聖人亦不自知也豈惟聖人莫之知雖天地亦不自知也應冒頭不致之致其用神不化之化其化妙學中庸語嗚呼天地之與聖人一理也天地之化即帝者之用古之與今亦同一天下也君人所致所成即天地聖人自然之理豈有古之人可以致用而今則不可以復致今君人亦可以致用古之人可以成化而今則不可以復成今君人亦可以成化孟子有言非不能也是不為也見孟子梁恵王上云云惟能妙有為於無為則㡬矣歸君人無容心上是必自此以下形容君人無容心於致用成化之意冥經緯於無方無體之中易繋辭上故神無方而易無體冺知巧於不識不知之際詩皇矣不識不知順帝之則其於致用也不敢以淺心間之懼其有以壅此化不敢以私心雜之懼其有以累此化不敢以怠心乘之懼其有以間斷此化句法源流自栁子厚答韋中立書中来未嘗敢以輕心掉之懼其剽而不留也未嘗敢以怠心易之懼其弛而不嚴也未嘗敢以昏氣出之懼其昧没而雜也云云茫乎天運而雲行雨施易乾卦窅爾神化而陰闢陽開易見繋辭不動聲色而天地之藴神明之奥萬物之情森然在是帝者之用即天地之化蓋至於此則風雷非隠也而耒耜非顯也應前益卦事火雷非無也而市貨非有也應前噬嗑卦事風水火澤非精也而舟楫弧矢非粗也應前渙暌二卦事謂天地之化即帝者之用應冒頭無非果無而用生焉有非真有而化存焉有致之功無致之迹應冒頭不致之致其用神有成之理無成之形應冒頭不成之成其化妙果孰為君人乎孰為帝者乎又孰為天地乎渾渾乎一無聲無臭之天而已應題下君人之於天地聖人無致之成之之迹意詩上天之載無聲無臭雖然聖人本無容其心然豈無所用其心哉又斡一轉講君人致用成化固無所容心亦不可無所用其心蓋天地之心惟動則見而萬化之根本胥此焉出伊川易傳復卦先儒皆以静為見天地之心蓋不知動之端乃天地之心也而帝者之用亦當因其用心者求之莊子天王之用心何如故吾心之理累於有固不可應無所容心而溺於無亦不可應豈無所用其心不走了有無二字當使之周流而不當使之間隔要用當使之充暢而不當使之凝滯要用心在是則用在是用在是則化在是總結易之存神即其所以前民用易繋辭非天下之至神其孰能與於此是興神物以前民用而中庸之盡性即其所以贊化育也中庸唯天下之至誠為能盡其性云云可以賛天地之化肓不然吾心恝然於天下而無財成輔相之道易泰卦后以財成天地之道輔相天地之宜一切付之於自治則是亦槁木死灰而已則烏足語用化之妙哉荘齊物萹形固可使如槁木心固可使如死灰乎故曰寂然不動感而遂通天下之故用易繋辭語轉鳴呼至矣學周太極圖結謹論品藻優劣格山西諸將孰優陳傅良出處前漢趙充國傳賛曰秦漢以来山東出相山西出将漢興郁郅王圍甘延夀義渠公孫賀傳介子成紀李廣李蔡杜陵蘓建蘓武上郅上官傑趙充國襄武亷褒狄通辛武賢慶忌皆以武勇聞此其可稱列者也其餘不可勝數主意山西之風聲氣習類皆喜功名而乏噐識優於勇敢而劣於涵養雖賢者不免也於賢者不能免之中求其所謂渾厚深沉者獨蘇趙二人安得不表而出之此萹獨提出趙充國蘓武二子稱其有深沉渾厚之習大凡區䖏優劣題須如此剖判然此篇猶有縝宻者蓋説習以俗乃所以含山西意説賢者不能免乃所含諸將意如此則題目盡在中矣批云大凡論出於止齋之手者文皆精宻圓活得論之體然此文格製合於今者學者當復熟之論曰習俗之移人習俗指山西移人是主意雖賢者不能免也賢者指諸将不能免是立意於賢者不能自免之中而挺然特異者挺然特異指充國蘓武是未可以習俗之移者而例論之也未可以山西之習俗移者同論指孰優意一萹之意盡在一破何則習俗之所積便粘上習俗字士之氣習遷焉賢者不免為所遷移人惟遷於流俗又纒上句入講説人惟為習俗所移故皆誘於所長所以皆尚功名勇敢而不知陷於所短而無渾厚沉深氣象得自然説有理其間能有所見長立於品彚儔伍之中暗指充國蘓武二子題品彚儔伍即朋類也應破挺然特異句蓋艱其人諸将之中難得其人如此輕過䖏皆可學君子論人烏可例取之哉照破題句漢之諸将山西之族居多漢諸将多是山西人物然其風聲氣習然山西之習俗喜功名而乏器識此是山西習俗優於勇敢而劣於涵養亦是山西習俗兩句包盡雖賢者猶化之應賢者不能免句而無深沉渾厚之習為習俗所移指深沉渾厚是充國蘇武獨充國蘓武二子挺乎其中應破題句似非山西人物說優於山西諸将班固立論不能抑揚之而猥以例取應破題未可以例論句二責班固不知抑諸将而揚充國蘓武子而例論之漢山西諸將孰優㣲二子吾誰與歸舍二子山西諸將有誰且論人於燕趙不當取其慷慨而當取其深沉燕趙之人深沉者為優論人扵鄒魯不當取其浮華而當取其樸野鄒魯之人樸野者為優原起先立箇斷例是一格蓋舉世皆有則有者不足貴世皆能如此者不足重俗之所無則絶無而僅有者斯可喜也世皆不能如此其中有挺然特異者可喜應破題賢者不能自免之中而挺然特異者一句申上意說醒大抵湍水無蹤鱗魚之鱗不可蹤者湍水急使之然也風林無寧翼鳥之翼不得寧者林有風使之然也三家之市無千金之子其居使之然也三家之市所以無千金之子者所居之地然也譬喻尤精神應破題習俗移人不能自免意奥論中全文習俗之移人鼓舞變化雖賢者墮其中而不自覺應破題賢者不能自免意齊人多詐公孫儒者猶為之前公孫宏傅汲黯廷詰曰齊人多詐而無情又汲黯傳孫宏懐智飾詐楚人深於怨雖屈原之賢不能免也用事證賢者不能免句嗚呼孰謂山西之風聲氣習而有蘓趙二子者乎上面説習俗能如此移人此只一句繳歸二子省多少力此第一繳自秦之興功利之說一開於商君之齒頰通鑑商鞅求見孝公説以冨國强兵之術號商君詩書禮義之澤斬於李斯之手同上李斯上書臣請史官非秦記皆燒之天下有藏詩書百家語者皆詣守尉雜燒之士之雍容寛大之氣又摧敗困死扵始皇敲朴之下過秦論始皇執敲朴以鞭笞天下通鑑諸生在咸陽者皆坑之其民安於戰鬬狃於攘奪專以戰鬬攘奪為上頡頏相高争欲奮牙距而摶噬者至漢猶未泯也漢習俗猶如此賢如李廣以敢目之可也見題句賢如辛子以介目之可也題注賢如傅子以鋭目之可也見題句不此皆賢者能免處其深沉渾厚何有哉應冒子深沉渾厚字數子之餘益不足道須要此一語括未盡者孰謂山西之風聲氣習尚有如蘓趙二子者乎又用一句繳歸二子此第二繳夫充國佐方隆之漢説趙充國斃垂盡之先零後充國傳臣愚欲先行先零之誅振兵壓境雖以無道行之滅此而後朝食誰曰不可用左傳語武也説蘓武銜命敵庭之日蘇武傳武帝遣武以中郎将使持節送匈奴使㽞在漢者雖欲屈而臣之同上單于使衛律召武受爵武謂恵等曰屈節辱命雖生何面目以歸漢以其碎首全璧之勇死於一撃藺相如傳臣請全璧歸趙相如曰大王必欲急臣臣頭與璧俱碎於柱矣以寒氈裘之膽似可快也使夷狄之膽寒亦且快人意説上两段分説二子此又分两段去是何充國舒遲容與以孩提視䍐开之屬方休兵屯田以厚吾之勢充國視䍐开如小兒則充國傳不先破䍐牙先零未可圖也先誅先零䍐开之屬不煩兵而服矣臣謹條不出兵留屯田便宜十二事而獨弱其力以徐伺有定徐待匈奴自斃武亦鮮腆倨傲以虛舟飄瓦視單于之横逆此説蘓武藐視匈奴荘子如虛舟飄瓦雖濵於死者數四濵死者近於死也窖蘇武傳單于乃幽武於大中絶不飲食數日不死廼徙北海使牧羝廪食不至終不肯為匹夫匹婦之諒語豈若匹夫匹婦之為諒也自經於溝瀆莊乎其容記玉藻色容莊浩乎其氣者不衰也孟浩然之氣沉看他用事只模冩當時氣象而深渾厚已在其中可學嗚呼豈惟山西二子豈特優扵山西諸將雖漢之諸將孰有出於二子之右者乎惟漢將亦無優之者第深一歩繳此三繳為將之道立論不憂其無功而憂其貪功說充國不貴其敢死而貴其能處死説蘓武故夫斷徼危幸釁逞於一快之怒非國家之福說諸將而養威持重忠於君命而不攜貳者真愛國之將也說蘓武充國深沉渾厚者為優孰謂山西之風聲氣習而有憂國之將如斯人者哉又深一歩繳入一箇憂國字此第四繳况夫天下之事沮於羣議者易變唐憲宗紀排羣議奮獨斷其為羣議沮撓者易變事而咻於衆人之口者不能奪也孟衆楚人咻之充國上屯田之策而破羌彊弩諸將惡其成而樂其壊者多也本傳充國上屯田奏下公卿議臣初是充國議者什三中什五最後什八所善浩星賜迎説充國曰衆人皆以破羌彊弩出擊多斬首然有識者以為虜勢窮困兵雖不出必自服矣宜歸功於二将軍武之在匈奴蘓武傳武在匈奴十九年李陵衛律之徒刼制耳語者非一人也本傳陵為武置酒設樂因謂武曰單于聞陵與子卿素厚使来說足下又見前注而二子視之若無曾不加動蘓趙二子畧不為所揺撼此尤人之所難處守之愈固所守者堅居之愈安所見者定作之愈高所為者大非有憂國之心出於天授前漠高帝紀此殆天授非人力也孰能至是乎此苐五繳一自原題至此凡五繳皆層高一層自是一格孟堅作史不能輕重言之應冒子班固立論不能抑揚之一句噫後世無君子之論則二子亦山西人矣若非有君子為蘇趙拈出則蘓趙亦只是山西諸将等伍矣曰君子之論者止齊自謂也只用一句責史臣此様説若多却又無味了謹論品藻優劣格此篇與漢山西諸將孰優論同格漢忠言嘉謀之臣如何王節出處前漢匈奴贊乆矣外裔之為患也故自漢興忠言嘉謀之臣何嘗不運籌策相與争於廟堂之上乎高祖時劉敬吕后時樊噲季布孝文時賈誼鼂錯孝武時王恢韓安國朱買臣公孫宏董仲舒人持所見各有同異然其要歸两科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未䆒匈奴之終始也立說謂外裔之為中國患吾之制御之道當為長久可恃之計漢廷諸臣謀議各守偏見不出和戰二事獨鼂錯以守備為説可為萬世之圖言之忠謀之嘉者惟鼂錯一人而已其餘諸臣皆有失批云去取極當議論精詳可為矜式圖萬世之固而不狥一時之見者謂鼂錯守備之説是圖萬世之固不從諸臣之言和言戰者而守一時之偏見可謂善謀國者矣善指忠嘉謀國指言謀二字夫外裔之為患自古有之是出處乆矣外裔之為漢患意在昔盛時引古者説上下相與圖回經畫措置之策以求制御之道制御外裔必先為長乆可恃之計圗萬世之固固非一扵用武以逞威不恃戰而亦未甞幸其臣服而視之以為無事也不恃和後世以来暗說漢制御之道既失反應上制御字失字與大講相應謀國之臣暗説漢廷諸臣甘於迎合者徒欲求快人主喜功之心言戰者樊噲王恢朱買臣之徒而偏守已見不達時宜者復無善後之策言和者如婁敬之徒其間能為萬世之圗者幾何人哉應破題含取鼂錯守備之説先漢一代疆埸屢警埸音亦邊境也當時謀議大抵不過戰與和而已說出戰和二字戰以伸威和以息民此諸臣之見此非不足為濟時之策且畧取其言然漢人之失却抑之與講題相應皆未免於中有所怵怵動心也見有所偏偏見字應前言戰者一於戰言和者一於和先折倒諸人之議而不能於和戰之間思為可恃之計言戰者不是言和者亦不是惟守備之説可恃可恃字應前長乆可恃之計惟鼂錯以守備為說獨得古人根本之論取鼂錯守備之説惜乎固不能别而言之也責班固作史不能明言之漢忠言嘉謀之臣如何請申論之嘗謂古人以外裔待外裔故議論素定而中國之勢尊言專於守備自有定論所以尊中國之勢後世役中國以從事於外裔故議論紛紛而外裔之患熾言或戰或和卒無定論所以啟外裔之侮夫内夏外裔天地之大義也自有定勢唐虞君臣唐堯虞舜之時一謀一猷映忠言嘉謀字謀書爾有嘉嘉猷必思為可乆之計應冒頭長乆可恃字聞有柔逺之言矣書舜典柔逺能邇未聞和親之說也無漢人和親之説聞有明刑之説矣舜典帝曰臯陶蠻夷滑夏汝作士明於五刑以弼五教未聞窮征逺討之事也無漢人窮征逺討之事制御有道而邉鄙不聳應冒頭制御之道字邉鄙不聳言無烽火之警也卒之中國有常尊之勢而外裔自無不服之心鎖原題雙闗起两股則當時謀國果何如哉此則謂之忠言嘉謀自㑹戎之舉見於魯而外裔始横左隐二年公㑹戎於潜修恵公之好也戎請盟公辭自伐敵之師惨於秦而中國始弊史秦始皇紀賈生曰秦王鞭笞天下南取百粤之地以為桂林象郡乃使蒙恬北築長城而守籓籬却匈奴七百餘里漢興宜知所鍳矣當鍳魯與秦之失而諸臣獻謀奉慮乃不外和戰以為策而漢諸臣之議又不出和戰之策夫和之與戰提起和戰二字説誠古人所不屑謂古人不屑戰亦不屑和而亦後世綏御之㣲權濟時之一畫後世以和戰為綏御之權濟時之畫應冒頭非不足以濟時誠使車馬器械素備於内詩車攻宣王能内修政事外攘四裔復文武之境土修車馬備器械而太原薄伐盡境而還詩六月薄伐玁狁至於太原又見前匈奴傳云云如宣王之伐玁狁何害其為戰見工注戰戰如宣王之則可誠使生聚教訓無日不講左哀元年吴王夫差敗越於夫椒報擕李也遂入越越王保于㑹稽使大夫種因吳太宰嚭以行成吳王将許之伍貟曰不可弗聽退而告人曰越十年生聚十年教訓二十年之外吳其為沼乎而子女玉帛徒以餌敵史記勾踐令大夫種行成於吳乃以美女寳噐令種間獻吳太宰嚭如勾踐之於吳何害其為和見上注和和如勾踐之亦可柰何勇者主征伐漢之言戰者怯者守和親漢之言和者急於狥時好則利害不暇計應冒頭甘於迎合者偏於守已見則利害不能計應冒頭偏守已見者盈庭聚議彼是此非應原題議論紛紛之意往往皆疎鹵之謀而忠嘉之畫曽不多見責漢諸臣言和言戰皆守一偏之見未可謂之忠嘉此漢初匈奴之患所以相仍於不已者見題註咎在於謀國者狃於和戰之說而無可恃之計也可恃之計應冒頭論以上暗指漢諸臣講自今觀之勞師萬里徑度沙漠戰以復讐可也匈奴傳武帝大興師数十萬使衛青霍去病操兵前後十餘年於是浮西河絶大漠窮極其地追奔逐北又詔曰齊襄復九世之讐春秋大之士馬物故户口减半戰可恃乎此論武帝戰伐之失而題註下文孝武雖征伐克獲士馬物故亦略相當又昭帝賛孝武師旅之後海内虚耗户口减半行李往来金繒不惜和以安邊可也匈奴傳孝武即位復脩和親綺衣錦袍金帶綉錦赤綈緑繒遺單于云云復舊約以安邊民盟血未乾邊烽已警和可恃乎此論文帝和親之失同上十四年匈奴單于十四萬騎入朝那蕭闗殺北地都尉卭虜人民畜殺甚多後二年使使遺匈奴書單于既約和親後匈奴復絶和親大入上郡雲中又胡騎入代烽火通於甘泉長安茲其利害之所在較然甚明蓋不待異日而後見繳上文而樊噲徒以髙后一朝之忿遽有横行之請同上孝恵高后時冒頓寖嫚為書遺高后高后大怒樊噲曰臣願得十萬衆横行匈奴中王恢朱買臣徒以武帝開拓之志方銳而遽有襲匈奴置朔方之議韓安國傳武帝即位匈奴来請和親王恢曰擊之便韓安國曰勿擊便云云又公孫宏傳時東置蒼海北築朔方之郡宏數諫以為罷敝中國願罷之於是上使朱買臣䓁難宏置朔方之便發十䇿宏不得一乃謝曰山東鄙人不知其便若是願罷西南夷蒼海專奉朔方上許之言之不忠謀之不嘉在三子固有餘責先折倒三子之言謀不忠嘉安國建議勿撃公孫力請罷兵見上註始者為謀亦豈不善以為善謀夫何責二子辨論之際甫及一再而遽托之他有謬巧以自解同上安國言勿擊便凡三王恢言擊之便凡三安國曰不至千里人馬乏食兵法曰遺人獲已意者他有謬巧可以禽之則臣不知也發策詰難曽無一語争之而反謂其便以求合帝意公孫宏事見上註守説不堅謂之忠可乎再折倒二子言之不忠至於劉敬欲紓邊患而建和親之策劉敬傳時冒頓單于數苦北邊王問敬敬曰陛下誠能以適長公主妻單于使毋戰以漸臣上取家人子為公主妻單于使敬往結和親季布恐揺社稷而折面謾之人樊噲事見上又季布傳云云噲柰何以十萬衆横行匈奴中謾音嫚註欺誑也賈誼憤倒垂之勢而流涕以建言賈誼傳疏曰天下之勢方倒垂天子者天下之首上也蠻夷者天下之足下也今匈奴嫚侮侵掠漢嵗致金絮采繒以奉之可為流涕者此也仲舒思和好之利而請增於舊約題註下文仲舒親見四世之事猶復欲守舊文頗增其約以為匈奴者獨可説以厚利結之於天耳故與之厚利以没其意盟之於天以堅其約質其愛子以累其心遡其本心亦忠於謀國矣亦如始者為謀亦豈不善意然白登之圍嫚書之辱略不能為漢雪恥匈奴傳匈奴攻太原高帝自将兵往擊之至平城冒頓縱精兵圍髙帝於白登七日又匈奴為書遺高后曰两主不樂無以自娱願以所有易其所無高后大怒而單于之係愛子之質竟無儒者之空言賈誼傳請必係單于之頸又董仲舒傳質子事見上註慮事若是謂之嘉可乎又折倒四子謀之不嘉若錯則不然一句引入鼂錯當文皇初年匈奴侵擾未如後日之甚説當時夷狄之患而錯也獨能為國逺慮厯陳當世之急務取鼂錯一人謂之獨能者惟錯能之諸臣不能也見下註言守邊而不言開邊言備塞而不言出塞初未嘗倚戰以為武本傳錯言守邊備塞勸農力本當世急務而地形必習器用必利俟其來則一大治之亦未嘗恃和以為安也本傳錯言古之制邊縣以備敵也十連一邑邑有假侯皆擇其邑之賢才有諳習地形知民心者居則習民於射法出則教民於應敵陛下絶匈奴不與和親臣竊意其冬来南也一大治之則終身創矣於二説之間而思為可據之地應冒頭於和戰之間思為可恃之計是豈數子所可同日語哉此一句歸美鼂錯折倒諸臣考史氏之顛末始末也究匈奴之終始引本文若劉敬季布則失之懦劉敬言和親季布不欲伐匈奴皆懦也詳見上註樊噲王恢朱買臣則失之諛樊噲逢高后之怒王恢朱買臣投武帝喜功之心皆諛也註見上公孫𢎞韓安國則失之遷就𢎞為買臣所難安國為王恢所難不能守其初言皆遷就也仲舒賈誼賢者也而其言復失於疎漏仲舒増和好之約賈誼欲係單于之頸其説皆疎漏也冒以上一段合諸臣而言之逐一判斷數子皆有失應頭漢人之失字忠嘉之謀舍錯吾誰與歸取鼂錯一人大抵後世御戎類無上策自作議論責後世也謀國者惟當以和為表以備為裏以戰為不得已議論好綏禦有道備守有方使可和可戰而權不在彼以守備為主或和或戰皆在我而已請盟則為漢文帝匈奴傳註詳見前犯邊則為唐太宗唐突厥傳頡利襲武功京師戒嚴太宗幸渭上與可汗隔水語且責其負約羣酋見帝皆驚下馬拜俄而大軍至敵大駭蕭瑀以帝輕敵諌帝曰云云與戰則克和則固制賊之命在此舉矣如是則為謀斯善矣雖然有苗逆命征之可也書大禹謨帝曰惟時有苗弗率汝徂征三旬苗民逆命而伯益贊禹且曰惟徳動天無逺弗届見上註下文云云西旅獻獒似亦不必深拒書旅獒西旅厎貢厥獒太保乃作旅獒而召公作誥必曰明王慎徳四夷咸賔見上註下文云云不區區以四裔叛服為輕重而毎以修徳為言此是正大之論此又非後世人主所能及謂後世不修徳子雲有言引揚子雲語散場言合稷契謂之忠謀合臯陶謂之嘉揚子孝至萹云云吾亦曰言合伯益謂之忠謀合召公謂之嘉末又主修徳之説用伯益召公事為證且善變換揚子雲忠嘉二字来映題極切極好發明性理格此篇與葉子雅是非之心智之端論同意仁義禮智之端如何高起潛出處孟子公孫丑上惻隠之心仁之端也羞惡之心義之端也是非之心禮之端也是非之心智之端也人之有是四端也猶其有四體也立說祖朱文公之説惻隱羞惡辭遜是非情也仁義禮智性也心統性情者也端緒也因其情之發而性之本然可得而見猶有物在中而緒見於外也心統性情本程子語惻朱文公又云仁必具愛之理則發而有隐義必具羞惡之理則發而有羞惡禮必具辭遜之理則發而有辭遜智必具是非之理則發而有是非仁義禮智是未發底道理惻隱羞惡辭遜是非是已發端倪仁義禮智本體無形因其發動處可見考官批發盡朱文公未盡底意思理學透徹文勢委蛇關洛諸儒議論盡在是矣理原於至一理是仁義禮智之性至一是心極其所發見則未嘗一發見未嘗一是惻隱羞惡辭遜是非之情即其所發見而求是理之一焉以惻隐羞惡辭遜是非之情而求仁義禮智之性於一心始可與言理者矣理是仁義禮智之端夫是理之初初是端渾然而已仁義禮智之端其初本一動静同原内外同體用程子語初非有二本也應至一字然而其初者本一原族至一而其所發見者則隨見而隨著發見則未嘗一由動而觀乎静動是惻隠羞惡辭遜是非之情静是仁義禮智之性即外以達乎内外是惻隱羞惡辭遜是非之情内是仁義禮智之性吾知其混融精一之地要必有以主之也混融精一是心何者喚起人生之初應初字初是端此性而已仁義禮智此性所感其情動焉惻隠羞惡辭遜是非心也者又所以統性情而一之者也用朱文公釋本文語君子講明理學以幸天下君子暗指孟子知夫仁義禮智者性之所固有也演朱文公語故必示人以其情惻隱羞惡辭遜是非是情知夫惻隠羞惡辭遜是非之端者情之所已發也演朱文公語故必反求於其性仁義禮智是性因情以見性由惻隠羞惡辭遜是非之情以見仁義禮智之性由性以達情由仁義禮智之性以達惻隠羞惡辭遜是非之情則此心之用始可得而見矣歸心字主意不然内心一失其所主反說心無所主而支離專錮之習勝此是異端之學則其未發者皆非其天仁義禮智之性而已發者必流於人矣惻隱羞惡辭遜是非之情此孟氏之所深憂也正舉孟子仁義禮智之端如何請申論之嗚呼道之不明也我知之矣用中庸語自兼愛之説行孟盡心墨子兼愛摩頂放踵利天下為之世之求仁者不得其端墨翟兼愛非仁之端為我之說行同上楊子取為我㧞一毛而利天下不為也世之求義者不得其端楊朱為我非義之端絶㓕之學慘於老氏韓原道老子之言道徳吾有取焉耳及搥提仁義絶㓕理學吾無取焉耳縱横之辯肆於儀秦史記蘇秦説六國合縱攻秦張儀説六國連横事秦世之求禮與智者抑又不得其端儀秦之縱横非禮與智之端是豈吾道若是迂逺而無所從入之途哉非仁義禮智之迂逺也抑其所以求道者非其論耳求仁義禮智不得其道主應冒頭内心一失其所止必流於人矣一段蓋嘗静觀於此心正說心字達觀於此身自心而身泛觀於天地萬物之大由身而天地萬物且説心之功用大處人之所以混然中處横渠西銘予兹藐焉混然中處其或怵惕於赤子入井之時莫非仁也孟公孫丑上所以謂人皆有不忍人之心者今人乍見孺子将入扵井皆有怵惕惻隱之心而是仁果何自而形用何自字喚下意致謹於事君從兄之際莫非義也孟告子下為人臣者懐仁義以事其君又離婁上義之實從兄是也而是義果何自而見用何自字喚下意徐行後長初非外入孟告子上徐行後長者謂之弟疾行先長者謂之不弟又仁義禮智非由外鑠我也譽堯毁桀莫非當然同上子服堯之服誦堯之言行堯之行是堯而已矣子服桀之服誦桀之言行桀之行是桀而已矣所謂禮與智誠不可勝用也而是理又果何自而發用何自字喚下意嗚呼應上呼喚此理學之精㣲非可以易言謂仁義禮智之端未可易説而人道之大所以貫三才出萬類仁義禮智而卓然精一之地精一是心惟書禹謨人心惟危道心惟㣲精惟一允執厥中要有不可誣焉者也歸在心上夫有性而後有情正應由性以達情非情則無以見性反應因情以見性性主於内其静者也應冒頭内字静字此是仁義禮智之性情發於外其動者也應冒頭外字動字此是惻隠羞惡辭遜是非之情故錮於性之所不可執者非情之真反説性情字梏於情之所已流者非性之正此是揚墨之流亦其操存之無地心不能統性情之故而㣲者或不能以自主大禹謨道心惟㣲危者或得以私勝同上人心惟危論两句用朱文公議則其流益分而其習益逺矣應原題異端者流不知仁義禮智之端一段然而水木之本原譬喻端字初非有殊端如水之有原木之有本一而已矣而所謂一者則猶故也應主意一字彼異端之學應原題反説始於存心之不明異端不知存心之學而失於此性之不知不存心則不知性故支離淆亂四出而不可禦者應冒頭支離專錮之習勝字皆習於情之所已流者矣不知性亦不知情矣孟子之學惟其有異乎是正説主意故其所以言理者始可推也理是仁義禮智夫喜怒哀樂未發謂之中發而皆中節之謂和用中庸全句此性之初無智無愚正説性字而仁義禮智之理皆具則其未發者可知也未發是仁義禮智此情之動正説情字而惻隠羞惡辭遜是非之端隨所感而皆見則其已發者有在也已發為惻隠羞惡辭遜是非未發謂中已發謂和演上文此理固非自外入矣孟子仁義禮智非由外鑠我固有之也然極而至於天地位萬物育者果孰從而使之乎中庸致中和天地位焉萬物育焉用孰從字喚下意嗚呼答上問此上天之載無聲無臭中庸舉毛詩語而昭昭之多中庸今夫天斯昭昭之多所以能合萬殊而一之者也用朱文公萬殊之所以一本語大哉心之為用乎其四端之主乎其仁義禮智之本乎其性情之統而有以運用之者乎發盡主意自昔聖賢之所以相傳而植立人紀維持人道至於無所終窮者蓋得乎此者也仁義禮智之功用如此又豈若異端者之紛紛為哉又應原題説故愚嘗因孟氏之言竊以為天下之言性者不可溺於高逺異端之學溺於高逺吾之所謂仁義禮智者皆實理也聖賢之學不溺於高逺天下之言情者不可拘於凡近異端之學拘於凡近吾之所謂有是四端者皆是理也聖賢之學不拘於凡近成之者性而情動焉易繋辭繼之者善也成之者性也感而生情而性寓焉通書五性感動而善惡分又記樂記人生而静天之性也感物而動性之欲也則所謂心學者其端於此可推矣心所以統性情者也不然則反以禮為偽荀子之言以智為術告子之言以仁義為定名韓愈之言未必皆不知道者言之也非特異端不知吾黨亦不知噫安得孟氏子與之言道哉又感慨傷今思古是學文中子安得員機之士與之論九流哉句法發明性理格此篇與髙起潛仁義禮智之端論同意是非之心智之端葉子雅出處孟公孫丑上詳見前篇立說本朱公集注之説謂心者統乎性情人有此心即有此智既有此智即有是非是非其情也智其性也此心所主一純乎公是其所是非其所非則因其所發之情即可以騐其本然之性是心與性情未嘗相離也批云辭旨精深首尾通暢本先儒之説而叅以已意若論義理大段正當一念好惡之公一念是心好惡指是非則可以騐本然之天矣本然之天是智之端夫智者具是非之理者也先挈智字説人有此心即有此智露出心字主意既有此智即有是非見得是非之公是智之端是心與性情固不見其相離也總心性情三字用朱文公語心與性情不可相離然心則統乎性情者也語録張子曰心統性情者也夫苟其統乎性情也粘綴上文則此心所主一純乎公以心為主是其所是非其所非公是公非則既發之情即未發之性中庸喜怒哀樂未發謂之中發而皆中節謂之和吾見其一本而已心統性情不然公是公非之心或失其守心無所主則其與物接也必將情其情而不性其情矣便無公是非了何以統性情孟子論是非之心必以智之端言舉本文豈不以是非情也智則性也說主意分曉性者心之理情者心之用也語畧性是理情是用吾能因其已發而探其未發應前語則曰情與性獨不自此心而統之歟應心統性情主意是非之心智之端也願申言之大哉心乎其兼統夫性情者乎正原心統性情意主意在此一句所以復引此辨論起夫心自心也何兼性情而統之也問難吾嘗因是而求其說矣荅觧人生之初明通無蔽記人生而静天之性也與生俱生者心也用程子語是者是之非者非之是非之公本然之性此是智我固有之非由外鑠我也孟告子非由外鑠我也我固有之也然是心所在轉歸心上説其未發也固純乎天而已矣此是性之静應破題天字及其感物而動記樂記感於物而動性之欲也則或好或惡於是乎有情焉此是情之動其端甚㣲其理甚著説端字要皆此心本然通明之用也又歸在心字語畧人只有一箇心性安然不動情則因物而感性是理情是用性静而情動則是捨情無以見性非是非之情無以見智之性捨性亦不可得而見心非智之性無以知本然之心朱文公云心與性不可相離捨心無以見性捨性則無以見心性情之統於心者如是夫繳在心統性情上来吾惟自是而求之順說則動静一源顯㣲無間用程子語感物而動好惡形焉見上注即人生而静智以知此者也記樂記人生而静天之性也又祭義智者知此者也未發非先已發非後未發是性已發是情又見前注不得於心勿求於性學孟子不得於心勿求於氣句法不性其情則必情其情用文公語夫固一本而已應冒頭語知乎此則可以知孟子之言矣入孟子本文来且自人之智言之挈起智字講吾徒見夫人一心也心一理也心具智之理寂然之初端倪不露易繋辭寂然不動方其未發冲漠無朕此是性之静處朱文公云冲漠無朕雖淵懿也實有生知之妙揚子聖人聰明淵懿上語十六生而知之者也雖凝静也實有明通之識通書静虛則明明則通雖藏蓄也實有事至能應物来能名之功荀子云云不求照物無物不照不求見事何事不見是智也即具是非之理者也以上皆說智之性已具是非之理抑吾欲求是本然之理應破題本然字如之何而得之也有呼喚天下之人見夫人之為善也本非有與於我也應前是者是之意我則見之如不及語季氏見善如不及見人之為不善也本非有加於我也應前非者非之意我則見之如探湯同上見不善如探湯彼其一好一惡公是公非總説是非之公所以發見呈露如是其不可遏者此是情之動處豈喜怒哀樂既發之後其情自若是哉見中庸来喚下文吁應上於此可以騐本然之性矣應冒頭因其已發而探其未發意何則虚設問智根於心者也荅字歸心上其未有所觸也其未與物接也此未發之時吾見其寂然而已此是性之静及夫境變於前有是有非此已發之時則感而遂通天機自見此是情之動而易繫辭寂然不動感遂通是者好之智之理見於是是之時非者惡之智之理著於非非之日荀子是是非非之謂智譬猶因影見形形非與影殊以影比是非之情以形比智之性沿流遡源源不與流别以流比是非之情以源比智之情其妙用顯行者即其未始感發之驗也妙用顯行是是非之情未始感發是智之性誰謂是心之大非包括性情之具乎繳心絖性情意時當戰國心學不明甚矣引本題孟子来是非貿亂莫有得其真者心不能統性情故無公是公非孟子七萹之書其所以淑當時詔後世發明孟子所以立言之意大抵不過發明此心之妙先發心之一字如曰智者行其所無事孟離婁下所惡於智者為其鑿也禹之行水行其所無事也如智者亦行其所無事則智亦大矣是以智之本於心者不可鑿也歸在心上及其言性且曰乃若其情則可以為善孟告子上公都子曰云云今曰性善然則彼皆非與孟子曰乃若其情則可以為善矣非謂情之果可以為善也就上一句斡轉蓋以因所觸而發者雖不可以言情已發為情要其所以如火之然如水之達者亦其是非之心人皆有之故也性之動為情四題下文凡有端於我者知皆擴而充之若火之始然泉之始達孟子之言其真欲遏當時之情其情繳孟子立言之意使知心統性情之理歟繳歸心統性情上雖然四端之理雖人心之所固有結上生下至於智之為理此又仁義禮三者之所不可無者也朱文公云智亦可以包四者知之在先故也不又説仁義禮可無智是故兼愛以為仁孟子墨氏兼愛摩頂放踵利天下為之非智則何以知其非仁要智方知不仁為我以為義同上楊子取為我拔一毛而利天下不為也非智則何以知其非義要智方知不義非禮以為禮荀子以禮為偽非智則何以知其非禮要智方知其非禮故曰智者知此者也朱文公云智有藏之義焉有終始之義焉惻隠羞惡恭敬三者皆有可為之事而智則無事可為但分别是非耳又云智只是知得了便交付惻隠羞惡辭遜三者使人能於本心之智而行其所無事焉末又歸重在智上注見上文則是凡有四端者知皆擴而充之矣注見上两萹皆以心統性情為主意是祖前軰議論性理透徹前一篇人所罕見可以此萹參看囘䕶題意格此篇與黄朴經制述作論同意禹入聖域而不優林駉出處前漢賈捐之傳臣開堯舜聖之盛也禹入聖域而不優故孔子稱堯曰大哉韶曰盡善禹曰無間云云立說聖之盛者莫如堯舜凡事已盡美盡善所以繼其後者難乎措手况復世變愈趨愈下禹之時又不如堯舜之時所以禹之未優不如堯舜之盛也向使非堯舜為之先則禹亦可與堯舜並稱矣豈誠有所未優乎考官批云出脱大禹極有力量是用起文格議論自七聖論中来觀此一萹可見前軰手高處聖之盛者難乎其繼也堯舜聖之盛禹繼堯舜之後所以為難夫苟得斯道之傳者皆聖人也韓原道堯以是傳之舜舜以是傳之禹而或繼之難何哉設問傳既是三聖皆可以道何為難繼蓋寥寥數百載之間答上問而獲覩一聖人之興聖人不常出則世率以為希濶之遇言聖人罕見而未暇於求全含未優意今而二三聖人相因而起堯舜禹三聖人作於前日既盡善盡美而無復餘憾謂堯舜聖之盛可無餘恨則為之後者猶莫難乎其繼之也禹繼堯舜之後難以措手况復世變之自簡而入煩帝降而王堯舜時事簡禹時事煩天下之自無事而日以多事此两句用起文格事堯舜時無事禹時多後聖人之心已不能以逰乎前聖人之天禹所以不如堯舜立吕東莱禹論云向使征誓之名不吾知舜可以逰乎堯之天禹可以造乎舜之天則其可以無優劣之辨乎堯舜所以為優禹所以為未優此則禹之得為未優者也禹之未優堯舜之盛為之先蓋世無唐虞禹得以專聖人之稱若無堯舜為之先則禹與堯舜並矣惟堯舜為聖之盛則禹之聖亦難乎其為言矣應破題句發盡本意是知禹之所以為未優而非誠有所未優於聖者囘互得好賈捐之之言曰禹入聖域而不優請以是論之昔之為道統之論者曰堯以是傳之舜舜以是傳之禹見韓原道全句又曰三聖相授守一道董仲舒䇿則禹之於堯舜若是班矣如此則是堯舜禹則一乎用孟子語若是班今而於禹而有未優之論何耶設問反難以禹而猶未優於聖就上文難則堯舜亦未可謂之聖耳若以禹為未優則堯舜亦可謂之未優吁轉正亦孰知夫禹之所以為未優者正以堯舜為之先歟主意古之作書者堯曰稽古堯典曰若稽古帝堯舜曰稽古舜典曰若稽古帝舜禹亦曰稽古禹謨曰若稽古大禹是則堯舜禹之所以同也如此則是堯舜禹則一然堯以典名作堯典舜以典名作舜典禹獨以謨稱作大禹臯陶謨是又堯舜禹之所以異也如此則是堯舜禹又不同世之論者類以為風氣始開此帝降而王之别禹之時不如堯舜之時然豈知天下之事已備而猶有未備者則或可以措其力堯舜不為之先則尚可以措手盡美而又盡善者則無所容其功堯舜既盡美盡善禹何所容其功堯舜之時且先形容堯舜聖之盛處法度則章矣揚子見下注禮樂則著矣問道萹虞夏行堯道法度彰禮樂著論其功則巍乎無能名矣語㤗伯蕩蕩乎民無能名焉巍巍乎其有成功也言其徳則甚盛蔑以加矣左傳襄二十九年吳公子札来聘見舞韶箾者曰徳至矣如天之無不懤也如地之無不載也雖甚盛徳蔑以加於此矣藉使堯舜之後而復以堯舜繼之已難於復盛而况於禹乎應聖之盛者難乎其繼意昔孔子稱堯曰大哉語㤗伯大哉堯之為君也惟天為大惟堯則之而稱舜曰君哉孟子君哉舜也知君哉之舜已不能並大哉之堯舜已不如堯則禹之為聖其得未優之名固宜也禹宜乎不如堯舜况世變之浸以不古亦是起文簡應冒子世變之自而入繁人情之漸以不美應冒子天下自無事而日以多事堯舜之民皆以堯舜之心為心堯舜時優於禹之時又下注而禹之民各自以為心禹時不如克舜之時又下注泣辜之歎通鑑紀禹出見罪人下車問而泣左右曰何為痛之禹曰堯舜之人人皆以堯舜為心今方為君人各以其心為心是以痛之禹亦自知其不唐虞若也禹不如堯舜故其胼手胝足李斯傳手足胼胝面目黎黒其視埀衣拱手而天下治者為孰優易繫辭堯舜氏作埀衣裳而天下治誓師振旅大禹謨禹乃誓於師曰云云禹拜昌言曰俞班師振旅其視不戰而屈人兵者為孰優揚子問道不戰而屈人兵者堯舜也禹此两脚先用事織堯舜事擊壤之老不知其帝力帝王世紀堯時八十老人擊壤而歌曰吾鑿井而飲耕田而食帝何力於我哉康衢之童不識而順則列子黄帝萹帝逰於康衢兒童語曰立我烝民莫匪爾極不識不知順帝之則其視六府三事人得以歌其功者為孰優大禹謨禹曰於帝念哉云云帝曰俞地平天成六府三事允治九功惟叙九叙惟歌来此一脚先用堯舜事織禹事吁堯舜之聖其天也若禹則其猶人矣乎禹之人不如堯舜之天字眼好無堯舜則禹為蔑加之聖可也見上左傳注專應冒頭世無唐虞禹得以聖人之稱惟夫堯作於前舜述於後至矣盡矣而不可以復加矣本中庸見左傳則為禹者亦難乎其繼之也應冒頭惟堯舜為聖盛則禹之聖亦難乎其為言矣崛起於尋常之中則雖庸才亦足以自見此比無聖人為之先則或可以措其力意而襲箕裘世業之傳記良弓之子必學為箕良冶之子必學為裘一事少墜先人訓則其事有異於它人此比繼聖之盛者無所容其功意太甲亦賢君也湯之子以其繼成湯則不能以逃不明之譏書伊訓太甲既立不明比以不明字未優字成王亦聖子也武王之子以文武為之先則亦見謂中才焉漢書成王中才之君以中才字比未優字使禹曠堯舜數百年而後生使禹不繼堯舜之後則與湯武一同則有慙之湯書仲虺之誥成湯放桀于南巢惟有慙徳優以有慙字比未字未盡善之武語子謂武盡美矣未盡善也以未盡善字比未優字皆不失為聖人禹湯武皆謂之聖人孰謂禹而不優於聖邪回䕶得不優意甚好大抵世無孔子則顔子不當在弟子之列韓文全句時有周公則召公僅可謂之大賢孫寳曰周公上聖召公大賢又以此二事為證絶無而僅有則有者始足稱無堯舜則禹為優層見而疉出是所以來未優之論也堯舜之後又有禹所以未優不然則孟荀之才其視大禹又何如哉又舉孟子荀子來比禹後之論者猶曰優入聖域韓進學解皆者孟軻好辨孔道以明云云荀卿宗王大論以興云云絶類離倫優入聖域曽謂大禹而不孟荀若也禹豈孟荀之儔哉蓋時當戰國則雖孟荀可為優入聖域戰國之時無人孟荀所以為優世處唐虞則以大禹入聖域而不優唐虞之盛如此禹所以為未優善觀聖人者亦當先觀其時可也一觀孟荀之優則禹之未優可知矣以彼形此極是透徹囘䕶題意格此篇與前輩禹入聖域而不優論同意經制述作如何黄朴出處文中子天地萹吾視千載而上聖人在上者未有若周公焉其道則一而經制大備後之為政者有所持循吾視千載而下未有若仲尼焉其道則一而述作大明後之修文者有所折衷矣立説古者聖人開端於其先人心未漓未嘗求詳於法真意相與未嘗求工扵文使繼之者猶有所増益若經制之法至周公而大備述作之文至仲尼而大明則是法與文至此極矣後之言法者卒莫能繼周公之遺則後之言文者卒莫能繼孔氏之餘音則二聖人先為之極而難乎其繼耳然猶汲汲而使之大備者是蓋聖人處世變之窮而非其心之得已考官批云文勢圓轉意味深長蓋自吕東莱七聖論中来老作也事至於極而難乎其繼者經制大備述作大明則已極矣後之作者何以繼之是殆聖人處世變之窮周公處成周世運極盛之時孔子處春秋斯文將墜之時而非其心之所樂也至於窮而為之非其心之得已夫道散而法始立道散而後經制法立質䘮而文始興質䘮而後述作之文興曽謂聖人求詳於法求工於文哉聖人本心未嘗求如此法足以盡物之變經制大備文足以窮理之奥述作大明後有作者固無復加於此矣無以復加則難乎其繼然太朴日散不容無經制之法至徳日離不容無述作之文聖人之心未始不逆料異日之難乎其繼也周公孔子已預知如此聖人雖知異日之難繼猶将汲汲而為之者粘上文演大備大明意其殆憂世變之愈窮應破題處世變之窮不得已焉曲為之制經制大備詳為之說述作大明則来者尚有稽焉耳所以備且明者要使後世有所考證經制述作至周公仲尼而極盛引夲文亦至周公仲尼而始窮應窮字世變亦可覩矣應世變字吾是以悲二聖人居道之窮應窮字不得如古先聖人之為開端於先學東莱七聖論言語而使繼之者猶有所增益也古者聖人未至於極則猶可繼如周孔已極不可繼也然則經制大備述作大明非二聖人之心明矣照破題語經制述作如何請申王通之說夫法所以防情也經制文所以宣意也述作吾欲詔天下示来世應来者尚有稽語自非經制之詳大備述作之備大明則其傳也不乆不備不明則不可以傳後世雖然斯二者經制述作非聖人意也非本心之所樂勢也處世變之窮非聖人意也勢也是學栁子厚封建論語人情未漓何以法為太朴未散則不必求詳於法真意相與何以文為至徳未離則不必求工於文自穴居結繩易而為宫室書契易繋辭上古穴居而野處後世聖人易之以宫室上古結繩而治後世聖人易之以書契君子知黄帝堯舜之通變同上黄帝堯舜氏作通其變使民不倦已不能無異於伏羲神農之舊同上包羲氏没神農氏作云云神農氏没黄帝堯舜氏作則法固不必詳也不必求詳經制之法自八卦之畫重而為六十四伏羲畫八卦文王重為六十四卦君子病文王之費辭文王重易之辭已繁於伏羲之文已不逮伏羲氏之省文見上觧則文固不必多也不必求多述作之文是故溝池以為固禮義以為紀記禮運云云原於大道之既隠應冒頭承題道散而法始立博而寡要勞而無功司馬遷云云儒家者流博而寡要勞而無功咎在文籍之太繁應冒頭承題質䘮而文始興吾固以為周公經制之備非求備也入周公經制之備語世運至成而已極雖欲不備焉不可也應處世變之窮意不容不大備仲尼述作之詳非過詳也入仲尼述作大明語斯文至春秋而將墜雖欲不詳焉不可也應處世變之窮語不容不大明二聖人處時之不幸世變之窮是以極意而為之應冒頭猶将汲汲而為之非其所欲也應破題非其心之所樂何者君臣名分朝廷禮節車輿服御之制冠昏䘮祭之儀見周禮周公處之盡矣經制之法至周公而後大備後世有周公焉莫能加毫末於此矣應難乎其繼意天地之所以位日月之所以行學韓送文暢師序文日月星辰之所以行天地之所以著鬼神人物之變同上鬼神之所以幽人物之所以蕃仁義禮樂之實孟子離婁上仁之實事親是也義之實從兄是也知之實知斯二者禮之實莭文斯二者樂之實樂斯二者孔門講之熟矣述作之文至仲尼而大明後世有夫子焉亦莫能加毫末于此矣應難乎其繼意周公仲尼曾以是為誇乎非周孔二聖人本心蓋自三皇至於周如一陽之生於復易復卦五陰在上一陽在下而將變於姤也姤卦五陽在上一陰在下子丑寅之建正記檀弓注夏以建寅為正殷以建丑為正周以建子為正忠質文之迭尚夏尚忠商尚質周尚文至是周矣周者遍也此周公所以詳其法周公經制所以大備吾夫子所以備其文歟仲尼述作所以大明然自六典致太平之後六典周公致太平之書官六典天官地官春官夏官秋冬官世之言治者卒莫能紹六典之遺則經制大備難乎其繼自六經埀世之後孔子刪詩定書述禮明樂繫易作春秋世之為文者卒莫繼孔氏之餘音述作大明難乎其繼則以二聖人先為之極而後世難乎其繼耳發出主意嗟夫法備於成周經制大備由成周而下法無取焉應後之言治者莫能紹六典之遺則意文盛於洙泗述作大明洙孔子設教於四之上由洙泗而下文無觀焉應後之為文者卒莫能續孔氏之餘音二聖人之心周公孔子非不知異日事勢之必至此也應冒頭聖人之心未始不逆料異日之難乎其繼意亦念夫世降而周説周公孔子之時三光五岳之氣將散人事備矣應冒頭道㪚意風氣漓矣應冒頭質䘮意吾恐後世因之不知太平之盛典周公經制聖學之大全孔子述作非吾之責而誰責後世不知此則是周孔之意是用事制而曲防經制大備制禮事為之曲為之防博學而詳說述作大明説孟博學而詳立為成憲以俟後聖應冐頭来者尚有稽意千載而下尚庻幾如吾意之所期而卒不果也豈不悲哉非聖人本心之所樂應冒頭一悲字生於周孔之前者率五百年而一遇聖人孟子盡心下由文王至於孔子五百有餘嵗生於周孔之後者千有餘年而未遇焉上文由孔子而來至於今事極乎盛者其終必衰應聖之盛者難乎其繼意故君子欲觀聖道常願如大道為公之世停蓄不露記禮運大道之行與天下為公不願如周公孔子之事極盛而無餘也法與文至周公孔子而極此非吾之臆說也非吾一已之見周公仲尼復起無以易吾言也學孟子語太公報政周公曰平易近民民必歸之史記魯世家太公之封於齊五月而報政周公曰何速也平易近民民必歸之則欲簡而不欲繁周公之心也周公之心未嘗求詳扵法仲尼嘗謂予欲無言天何言哉語子曰予欲無言子貢曰子如不言則小子何述焉子曰天何言哉四時行焉百物生焉天何言哉則著書立言又豈仲尼之得已乎仲尼之心未嘗求工於文不得已而猶為之粘上文斡一轉聖人之志益可悲矣非聖人之本心應前悲字然則經制至於大備述作至於大明叙本文其殆救時之弊濟道之窮應處世變之窮意開天下後世之惑應来者尚有稽意雖欲效黄帝堯舜氏之為而不可得也應原題下數語世之惑者不諒聖人之心反應前心字不知世變之不可驟返也反應世變之窮説學清虛者病法制之繁於是乎有剖斗折衡之說老子剖斗折衡而民不争安得如經制大備時尚惨刻者病文字之多於是乎有坑焚絶㓕之說秦始皇以焚書坑儒絶㓕禮學時安得如述作大明愈變愈下世變之窮道術益為天下裂矣經制述作愈分裂矣獨不思返天下於太朴應人情未漓意示學者以無言應真情相與意斯説也而果可用於周則周公孔子已為之矣經制果可以不備述作果可以不明則周孔已先為之又何待後人為之周孔之所不能為粘上文正説而後世欲强為之此清虚惨刻之徒非愚則狂也繳盡上意雖然周公之事不得而見之矣周公是達而在上者宣尼之業誰實紹之孔子是窮而在下者引下文王通氏講道河汾竊有志焉王通字仲淹講道於河汾之上屬之王通氏可乎設問曰王氏支離揚子五經支離支離者不得其雅也折倒王通若孟軻氏醇乎醇者也見韓原道文井田經界本之周公孟畢戰問井地孟子曰云云夫仁政必自經界始井地不均穀禄不平仁義性善傳之孔子孟子告子曰云云以人性為仁義猶以杞桞為桮棬孟子曰云云率天下之人而禍仁義者必不子之言夫云云人性之善也猶水之就下也人無有善水無有不下孔子而下孟軻氏一人而已韓原道孔子傳之孟軻軻死而後不得其傳同上軻之死不得其傳焉故曰周公殁天下無善治孟軻死百世無眞儒四句全用程子語非知道者孰能識之前萹謂聖之盛者難乎其繼此篇亦謂事之極者難乎其繼意味正相似亦可謂與君擢唐虞三代純懿論蔡徳潤說天者莫辯乎易論機軸畧同可以参看反題辨論格此篇與鼂錯不能過崔寔論同機軸文帝不及賈生蔡岸出處前漢賈誼傳誼為長沙王太傅後嵗餘文帝思誼徵之至入見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席既罷曰吾乆不見賈生自以為過之今不及也立說不及之名常生於過帝不及乎賈生則生之於帝為過矣生以豪傑之才過於自用生之所甚喜帝之所甚憂謫之長沙欲其少損而宣室之論愈過於前則文帝不及之嘆蓋惜其過於自用之辭云爾而非所以為褒也是就過之一字上用力批云說他人未出底話是要看他冷語處最有力老筆也人主有志於成就天下之豪傑者賈生以豪傑之才過於自用文帝欲成就之不欲其過於自用也不及之嘆非真不及也恐生之過於帝也夫適然議論之間宣室之論能使其君欣然入其心文帝為之前席有不可㡬及之意自以為過之今不及也亦足以為一世之豪傑矣且説生之才可謂豪傑未説出主意然而轉歸主意動見於辭色者所以為喜文帝曰自以為過之今不及也而鬱然於懐者實深以為憂憂其過於自用苟不深觀其抑揚之所存自他人觀之則過字似抑賈生不及字似揚賈生以此萹觀之不及字是抑生非揚也而徐䆒其用舍之所極召之未㡬謫之長沙再召之方至又為梁王太傅則人君之用心所以成就其才於逺且大者終不可得而見也以不及之詞為褒而不以為抑則帝成就之心不可得而見矣吾嘗以是而觀文帝矣賈生以豪傑之才自奮於一世本傳誼年少頗通諸家之書固帝之所甚重文帝重之超遷嵗中至大中大夫而過於自用應起語抑有傷焉誼之才既有諸老先生之不及所以起絳灌之讒今而宣室之召議論尤過于前文帝所以傷之宣室之論自謂不及叙本文此不及二字當以冷語觀之異乎他人之所謂不及蓋惜之之辭云爾而非所以為褒也觀帝不及之辭不是褒他正是抑他惜其過於自用也不然既以為不及矣而卒不用焉亦獨何哉觀帝不用他則知不及之語非喜之之語以是觀之則文帝不及賈生亦可以考論其故矣舉題語亦復連接不斷夫人之所謂不及者且説他人之見必其在已者有所愧而在人者有所羡也我不如他所以有不及之語而文帝之所不及者則非是之謂也帝之所謂不及者非真謂不及他正是冷語不及之名常生於過說出本意帝不及乎生則生之於帝為過矣就出處過之一字斡得意出嗚呼帝之不及生於帝乎何愧帝若真不及他夫何慊生之過於帝則生其可慮也哉生若真過於帝豈不大可憂憂之者蓋惜其豪傑而欲成就之夫士君子抱負其所長以致用於一世此處文不失之抱脚雍容和緩且說君子之正論亦必觀乎時中之義而後可以有為也記中庸君子而時中有所不足不敢不勉有餘不敢盡用中庸句法古人㓜學壮行孟夫人㓜而學之壮而欲行之未有不以是為凖的焉者也當以時中之義為凖的動焉而不相其時可進則進不可進則止進焉而不揆其君可言則言不可言則已揚厲激發以求盡乎吾才之所至此便是過扵自用則天下之事将有撓亂而不輯自用則敗天下之事豈所以為善用其才也哉此非所以為成才生以豪傑之資益以聖賢學問之懿夲傳誼年十八能誦詩書屬文其必有以講此矣以上數語且揚賈生奈何却抑之其志大而量之狭也學廣而識之褊也如欲改正朔興禮樂等語皆是志大通諸家之書皆是學廣及謫長沙則意不自得便是量狭識褊登廷之初文帝召為博士正色論事有諸老先生之所不及此非先生之福也誼年二十餘最為小毎詔令議下諸老先生未能言誼盡為之對夫議論之所發有以使夫閱歴之未深者無以企及其萬一焉亦可以為難矣且説生之議論使時之未更事者不及之固是難得而老成慮事之君子曽少年論事之不逮兹豈其福而顧以為喜哉若夫諸老先生之所不及致有絳灌之讒非生之福應前福字生之所甚喜蓋帝之所甚慮也生以諸老未能言為喜帝以生之過於帝為憂禮樂制度之請為之謙遜誼以為漢興二十餘年天下和洽宜改正朔易服色制度定官名興禮樂云云帝謙遜未遑也夫亦㣲見其意矣帝之本心可見而生未之有察焉生未知帝未遑之心所以抑之長沙之謫本傳天子議以誼任公卿之位絳灌之属盡害之曰洛陽年少初學專欲擅權云云天子後亦疏之以誼為長沙王太傅夫豈絳灌貝錦之工哉見上絳侯周勃灌嬰也錦毛詩萋兮菲兮成是貝達之於孤孽之餘孟獨孤臣孽子其操心也危其慮患也深故達作之於困心衡慮之日孟告子下困於心衡於慮而後作以消沮其高世傲物之意謫誼于長沙正以摧抑其過於自用之心蓋帝之所以成就豪傑之㣲權也應破題語延之嵗月本傳後嵗餘文帝思誼而有宣室之召上方受釐坐宣室釐音禧福也夫亦以為動心忍性之效至是可以略見矣孟告子下所以動心忍性增益其所不能而英鋭之故習謂生年少之才振發於議論之間者見本題注未見其少損也而有加焉其議論不减於前日而有加於前日則生之過於自用者尤愈於前日則今也不及之歎說不及二字其惜之也耶正惜之也其褒之也耶非褒之也疑詞嗚呼亦既以為不及矣而卒不用焉至此說出本意若是帝果以生為不可及何為不用之而反以生為梁懐王太傅為生者亦可以自喻矣生亦可自曉帝不及之語矣夫知其不可及而不以為不及者掩善者也再演不及意既知其不及而不用焉者棄賢者也冄演不用意帝固不得為掩善而獨棄賢也哉帝之心無此二項節病拊髀之歎猶得借才於異代馮唐傳文帝稱趙将李齊之賢唐曰齊尚不如亷頗李牧之為将也上聞之乃拊髀曰嗟乎吾獨不得頗牧為将豈憂匈奴哉有賢如生知而棄之不宜其有此也又以拊髀一事為證見得帝不是棄賢者嗚呼為生者亦可以自喻矣再説生自喻意正所以深明帝之所謂不及者非真不及也惜其才之過耳帝之不及生則生過乎帝者也說過字有力當漢息肩之日史記本紀漢興至孝文百姓無内外之繇得息肩於田畆涵養之政如帝者亦宜矣而可過乎哉謂文帝之政如此不可更過若更要過則必至紛更多事帝以生之過已為憂應冒頭鬱然於懐者深以為憂意亦應生之過於帝生其可慮語生以帝之不及者為喜應冒頭動見於辭色者所以為喜意亦應帝之不及生於帝何愧語梁傅之日以誼為梁懐王太傅且為痛哭流涕而建策焉誼上疏大略曰可為痛哭者一可為流涕者二可為長太息者六因陳治安之策帝於是而愈見其不及矣說愈見二字最有味此是冷語當反着雖然生過於自用不足以知帝之心固無足怪也説倒上意而後之論者毎毎以是寘優劣之辨而不及究其始末焉是可不為大惑也耶浚人謂帝之不及生則以生為優帝為劣豈不惑哉鼂錯以不及其臣為五伯之事鼂錯傳錯對策曰五伯不及其臣故属之以國任之以事或者為是而發以愧帝焉其愚不足論也錯之心未必是如此而後世顧有矜已取名之主以為文帝勝賈生至僣為之論後之君乃立論以文帝勝扵賈誼又以勝字反映不及嗚呼帝之心愈不可得而見矣不知文帝不及賈生之語帝之心已不可得而見今又云文帝勝賈生帝之心愈不可得而見添一愈字謹論反題辨論格此篇與文帝不及賈生論同機軸鼂錯不能過崔寔蔡岸出處後漢崔寔傳論曰崔氏世有美才兼以沈論典籍為儒家文林云云寔之政論言當世理亂雖鼂錯之徒不能過也立說鼂錯專尚竒謀譎計雖其智足稱而其持論或過薄焉其激而為七國之變者乃其驗也何足稱述今崔寔之論時政大抵黜王而進伯緩徳而尚威其立論尤薄於錯焉所以范曄論之以為寔之政論雖鼂錯有所不能過非褒之也乃傷之也錯不能過寔則是寔過乎錯矣用智如錯而可過乎哉用智而過錯是欲移七國之變而震動于廟堂之間不亦過甚矣乎批云行文如斷案此萹是也且說得不能過三字極有意味真可為法言有大而非褒錯不能過寔似誇大之其實非褒寔也傷其立論之薄耳是學歐文言有大而非誇語要未可以品藻常法論之也以品藻常法論則似褒寔以本意觀之實傷之也夫君子擬人各於其黨揚子擬人必以其倫又論語人之過也各於其黨觀其所擬斯可以知厚薄矣且説比擬大意未説出主意蓋自三代而下從古者説来儒者論治暗指鼂錯固有其智足稱錯號為智囊而持論之意或過薄焉如削七國之謀皆是過薄處君子亦既傷之君子既傷錯之智不足道而或者於此暗指崔寔祖述其餘智而馳騁焉謂寔本祖錯之餘智而為政論猶将有加乎其初寔之立論以威刑為主尤過於錯之刻薄則君子以今凖昔暗指范曄而為之致其輕重淺深之論謂錯不能過寔是獨可以徒言而不深察其微意之所存哉豈可徒觀其言而不察其意且含蓄未說出昔者范曄之論崔寔也以為鼂錯有所不能過引本文其意之㣲者蓋若此也應上㣲意字而論者相承以為是固所以抑錯而揚寔者自他人見之真以寔勝於錯兹不惟失曄之意范曄之見不如此而其為患蓋有甚大焉者矣若以寔為勝於錯則其為患尤有大於七國之變鼂錯不能過崔寔吾於是乎申論之且凡所謂過人者原題與前篇機軸一同必其才智議論之有餘者也才智有餘方可過人而所謂不能過者必其有所不足者也才智不足則不能過人過者在我而不能過者在人則我之名尊矣總上两脚此其比方之大略也結上文而曄之所以論寔者則不若是然也亦如前萹帝之所以不及者非是之謂也機抽一同是何也虛設問君子論人之意應冒頭意字亦當自其所擬者而觀之也應接題擬字夫儒者論治且説大意暗用董仲舒事誠能使伊吕之無以加伊尹吕望吕無以加仲舒賛云劉向稱仲舒之才雖伊以無以加三字比不能過三字舜禹復生而無以易也雖虞舜夏禹不能易仲舒正大之論則其為論始有可以闗百世質天地而不慚者矣學中庸語蓋自劉向之論賈誼以為伊管未能逺過前漢賈誼傳賛劉向稱賈誼言三代與秦治亂之意其論甚美通達國體雖古之伊管未能過也又以未能過字比不能過三字則君子於此由其辭之所及察其意之所存應意字已有見其王伯之雜而學術之不純者伊尹王者之佐管仲伯者之佐今以誼比伊管是王伯之雜學術不純處而况於曄之所以論寔者顧若鼂錯而已耶向之論誼猶曄之論寔也臯陶之陳謨書臯陶矢厥謨伊箕之作訓伊尹作伊訓箕子陳洪範用崔寔論中語云臯陶陳謨而唐虞以興伊箕作訓而商周用隆姑舍是不論也且舍古人而論漢由漢以來二三百年之間崇論閎議亦且不為少矣司馬相如難蜀文必将崇論閎議創業埀統為萬世基曄之論寔而致品藻焉又引本文不於他人乃以及錯不以他人比寔而以錯比之兹其為意必有可察者也應前深察㣲意語然則亦先觀諸錯之所以為人者而後可以論寔矣先說鼂錯錯之學術蓋發源於申商者也錯學申商刑名於張恢學術一偏申啇惨刻之學故曰偏心術隨化錯號智囊可知其心術日從事於奇謀譎計之中如削七國敎太子以術數之類備邊守禦雖足以強國錯言守邊備塞又言屯戍之事又言制邊縣以備敵而天下自此日以多事矣時匈奴數犯邊賢良一策後詔有司舉賢良文學錯在選中上親策詔之思以親事法宫煩人主之視聽錯對策曰五帝神聖其臣莫能及故自親事處於法宫之中而更定法令之請必欲舉高帝之舊而悉棄之錯又言宜削諸侯事及法令可更定者書凡三十篇孝文雖不盡聽然竒其才是乃田嬰之所以謀齊通鑑田氏并齊商鞅之所以治秦者秦用商鞅定變法之令而錯施之漢焉以嬰與鞅而比錯則錯之為人可知幸文帝徳性之仁厚有未可以輕動者焉見上孝文雖不盡聽語至景帝則不能保矣景帝即位遷御史大夫用錯削諸侯之言術數一語養禍於羽翼東宫之日錯言人主所以尊顯功名揚於萬世之後者以知術數也云云臣切為皇太子急之異時性與習成氣類相聚見賈誼策云云而漢家治體為之寖傷後七國反以誅錯為名嗚呼用智而至於錯亦已過矣與後面用智如錯而可過乎哉相應而寔之論治雖錯有所不能過焉引本文則若寔者其殆有甚於錯也哉錯不能過寔則寔勝於錯夫錯之為智蓋㡬於申商矣見上注刻申啇惨豈可學於是而有過焉其誰能堪之若更過於錯則必有大患尤甚於七國之變寔之論時政也引崔寔来説見本文大抵黜王而進伯崔寔政論云且濟時拯世之術豈必體堯蹈舜然後乃理期於補綻决壊支拄邪傾云云今既不能純法八世故宜叅以霸政霸政則宜重賞深罰以御之注八世謂三皇五帝緩徳而尚威同上刑罰者治亂之藥石也徳教者興平之梁肉也仁人之言宜不如是之薄也彼其意固以為藥石所以攻疾同上夫以徳教除殘是以梁肉理疾也以刑罰理平是以藥石供養也而四牡横奔非箝勒鞬􅀢不足以為救同上自數世以来政多恩貸云云四牡横奔皇路險傾方将箝勒鞬􅀢以救之也注箝以木銜其口勒馬轡輈車轅鞬猶束則亦不思而已矣責寔之論不是夫補壊支傾顧豈無具而獨出於刑威也哉見上注又云故嚴刑峻法破奸宄之膽昔者魯哀公問社於宰我見語八佾云云說善用事者把不切題事自然切題其意固在三家也三家謂仲孫叔孫季孫宰我言周人以栗之意亦欲以諛語而㣲動之耳朱文公注云戰栗恐懼貌宰我言周所以用栗之意如此豈以古者戮人於社故附㑹其説歟而夫子聞之曰成事不說遂事不諫既往不咎見八佾全文非注孔子以宰我立社之本意聖人非固謂其勢之已成有不可以為之圗者三家魯之陪臣其僣已甚聖人非謂其勢不可以圗亦以為収公室之權夫自有道収其權在道不在威刑有不在於區區之刑威耳折倒崔寔刑威之論漢至桓帝之世崔寔事桓帝政令垢翫皇路險傾崔寔政論云自漢興以来政令垢翫云云皇路險傾是豈刑威不足之咎哉非刑威之咎大臣無權時太尉李固杜喬皆下獄死戚臣竊政中常侍曹莭等干政亦思所以處此者而已矣寔當忍所以處之豈在刑威是時天下大勢亡可蹻待桓帝時衰弱已甚其亡可立足而待其所以自扶於将傾者亦以高文之餘澤有至是而未斬者也漢之所以未亡者以徳教猶在耳豈在於刑威哉於是而震之以威焉則漢之為漢將無一之可恃痛言寔之言刑威不足恃寔也不是之思責寔不此之思方舉鼂錯未盡之智而施之夾惹錯來並説是欲移七國之變錯時七國反而震揺於廟堂之間若以寔為過於錯則其患必至於此不亦過甚矣乎説得過字好由是觀之如曄之論判斷范曄之言以為錯之不能過寔者說本文其褒之也耶非褒之也其傷之也耶正傷之也同且疑辭與前萹機軸錯不能過寔則寔過乎錯矣説主意極透徹用智如錯者而猶可過哉應前語君子於此亦可以知史筆之㣲意矣曄之㣲意正在此嗚呼史筆之意不著於後世於曄何憾也粘意字前結尾機軸亦與篇同崔寔之名于錯有光說寔勝於錯光學毛詩于湯有語後之好為論者以是為不可及而争趨焉言後之人不知曄之本意正是譏寔反以為褒而争欲效之此其為患可勝言哉應冒頭凡天下之言利者以管仲為不可及管仲相齊以魚塩冨國言兵者以孫武為不可及孫武吳起言兵者流此皆後世之不幸者也言利如仲言兵如武非天下之福言治者以寔為不可及又以管仲孫武来比崔寔則愚者求企智者求勝應後之論者以是為不可及而争趨焉意不仁之禍殆不知其所終矣應此其為患可勝言哉意嗚呼此吾之所以深憂而力論也歟妙論前篇說不及二字是冷語發明此篇説不能過三字尤有判斷两萹俱出蔡迂齋之手文勢開闔抑揚自是一家機軸囘護題意格此篇可與前輩荀氏有二仁論參㸔管仲如其仁張定甫出處論語憲問子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁注齊襄公立無常鮑叔牙曰君使民慢亂将作矣奉公子小白奔莒襄公徔弟公孫無知弑㐮公管夷吾召忽奉公子糾出奔魯齊人弑無知魯伐齊納子糾小白自莒先入是為桓公乃殺子糾召忽死之管仲相桓公立說召忽管仲俱為公子糾之臣桓公殺公子糾召忽管仲俱當死於義今則召忽死之管仲不死而反相桓公子路以是而問孔子疑召忽以身狥義仁者為之管仲隠忍事讐非仁者之所為也夫子答之謂忽之死也以明道仲之生也以救時苟有闗於天下之大誼者皆當為之而仁皆在焉故曰如其仁如其仁如之者謂仲之仁亦忽之仁也考官批云發得管仲心事明白議論愈出愈竒蓋自荀氏有二仁論中来君子之立事管仲召忽惟論其闗於天下之大誼而已仲之生也以救時忽之死也以明道而異同不與焉仲生而忽死皆闗係大義何以異同為拘事之不可以㮣論乆矣事有異同不可以一等論固有所當為而為者召忽當死而死亦有當為而不為者管仲當死而不死苟其有係於世道之升降民生之治亂有闗於天下之大誼則君子皆為之忽之死仲之生皆是當為之事世無聖人之論孔子為之者世常以為是世之人每以忽之死為是而不為者世常以為非每以仲之不死為不是嗟乎以君子之用心指管仲而不獲君子之名仲不死則以為非世之不為君子者將以是藉口矣恐世之人見管仲不死皆以為非其不為君子者将以管仲之事藉口矣聖人非方人者也方者比也而亦豈能已於言焉孔子豈容不荅子路之言而以仁許管仲公子糾之事引出本題人皆以召忽以身狥義仁者為之召忽為公子糾之臣見其君被害致命而死固仁者所當為而管仲隠忍其身不棄於溝瀆之間仁者所不為也管仲為公子糾之臣見其君為桓公所弑既不能死又相桓公是忍耻以事讐豈仁者所當為本出䖏下文微管仲吾其被髪左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也夫二子之心一耳召忽管仲生也以救時管仲死也以明道召忽而仁皆在焉忽之死仲之生皆可以為仁一旦子路以是為問本出處而夫子以如其仁為對見本題注凡两言之本文如其仁如其仁如云者管之仁亦召之仁也主意明白管仲如其仁請申論之人有常言吾聞之夫子矣便就夫子身上説来志士仁人無求生以害仁有殺身以成仁語衛靈公全句夫仁我所欲生亦我所欲也告子上生亦我所欲義亦我欲也二者不可得兼舍生而取義者也古人蓋有舍魚而取熊掌者上文魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌者也蓋言為仁者皆不可以求生也上文生亦我所欲所欲有甚於生者故不為苟得也出處本文此改義為仁字曰是非夫子之意也引用之文相是若論為仁者不可以求生如此則與管仲之生意反故先説破非夫子之意方説得主意来夫不明夫子之意而過為之說粘上文反說則人必皆為勇夫烈士之感慨然後可以為仁也如此則是人人皆為召忽之死不為管仲之生方纔是仁夫人孰不愛生而有時而不敢愛轉歸正於生所欲有甚者當死則死若其求生以害仁則固不可如其苟免求活有害於仁者固不可生而無以澤生民死而與草木俱腐則君子奚擇焉如其生而無益於世死而無聞於時者亦不可吾故曰是非夫子之意也應前語吾有以騐之矣引證昔夫子嘗謂殷之有三仁矣見下注殷之末造紂時天之棄殷已久紂無道天弃之㣲子比干王室之懿親也見下注相從而死於諌比干諌紂紂殺比干獨㣲子去之不相從比干而死於諌則恐湯之不祀也語㣲子去之箕子為之奴比干諌而死孔子曰殷有三仁焉注㣲箕二國名子爵也㣲子紂庻兄箕子比干紂諸父㣲子見紂無道去之以存宗祀箕子比干皆諌紂紂殺比干箕子異姓之臣也見上注死則無名不為比干之死去則不忍不為㣲子之生是以徉狂焉本注云囚箕子以為奴徉狂而受辱其去也以殷㣲子之去其存也以殷箕子之存其死也亦以殷比干之死故均謂之仁焉去者為仁存者為仁死者亦為仁有此一段全襲荀氏二仁論大抵仁固不在於狥身生則是狥身亦不在於狥道死則是狥道要之出於天下之大義應破題世道之升降照小講民生之治亂主意在此三句苟其有闗於是闗係上三句則仁不可勝用焉如此則是仁也孟仁不可勝用嗚呼比干之狥道召忽以之召忽之死如比干之死㣲子箕子之狥身管仲以之管仲之生如㣲子箕子之生夫子之待人一矣孔子待殷之三仁與稱管仲之仁則一豈有在殷則為仁而在齊則異其心哉豈以殷之三子為仁而以齊之二子為不仁哉方齊之亂見本題注小白子糾俱失身於外小白奔莒公子糾奔魯其勢無兩立之理也小白入必害公子糾公子糾入必害小白管仲二子擇君而事管仲召忽俱事公子糾一日之去就而終身之大誼存焉應破題大誼字子糾之没召忽死之見本出處固天理也召忽當死而死固可以言仁仲何人也先抑管仲忍辱於桎梏而為之左莊九年桓公即小白入鮑叔曰子糾親也請討之管召讐也請受而甘心焉召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而告曰管夷吾治於高傒使相可也易用説桎梏桎梏囚之具夫一日之生不足以易終身之節仲雖不死而人不以為是齊相之貴何足以償天下之謗仲雖相桓公而天下皆以為非抑仲至此仲之智猶以相齊豈不足以知此抑揚管仲仲之心猶忽之心也仲之心與忽則一仲蓋以謂君臣之義與天地並臣當為君致命有忽為之足矣有忽死於義則仲可以無死天子弱而未尊謂小白四裔強而未賔如椘人之類此其患豈特主辱而已哉為管仲張本誇大其功吾而相與為匹夫匹婦之諒見冐子注則誰與任其責也若忽既死仲又死則誰任尊主攘夷之責自今而觀後世所謂不忠之臣無所資以為非義者實聞忽之風不忠之臣不敢為不義者以聞召忽之風能為君致命也則忽之仁在天下也忽之死也以明道固可謂之仁矣而春秋之民不至於服左袵而言侏離者此句文自韓愈與孟簡書中来云云然向無孟氏則皆服左袵而言侏離矣注後漢語言侏離蠻夷語聲也吾又語憲問㣲管仲其被髪左袵矣謂非仲之仁可乎仲之生也以救時不可謂非仁也其沒也以君召忽之死其存也以天下管仲之生果孰是而孰非耶忽雖是而仲亦未為不是雖然仲之心是矣而迹非也又斡一轉謂仲雖生以救時為念其心固是但不能為君死於義其迹非也毋怪乎由之以為惑也引子路之問意匡章子以責善而獲不孝之名孟公都子曰匡章通國皆稱不孝焉云云孟子曰夫章子子父責善而不相遇也父子之間不責善責善則離離則不祥莫大焉管仲以愛天下而得未仁之謗本出處未仁乎世固有仁人君子之心以匡章比管仲而淪於負俗之累者多矣章之不孝如仲之未仁其幸則有聖賢為之辨明匡章得孟子為之辨明管仲得孔子為之辨明而不幸則終身無以自白若不遇孔孟則二人之心無以暴白扵天下由也出入於夫子之門墻謂子路固嘗講聞綱常之大義應破題大義字異日之結纓不屈㐮十五年衛太子蒯聵入孔氏追孔悝子路入太子聞之懼下石乞孟黶敵子路以戈擊之斷纓子路曰君子死不免冠結纓而死可信今日愛忽而疑仲也謂子路喜忽之死疑仲之生不特此也結上生下由之惑未驅子路之疑未去而賜之問繼至子貢之問隨至則天下之疑仲又非一人也如此則非特子路疑之不知以身狥義無忽則仲固為之又為仲説若忽不為君死則仲亦先為君死有忽則仲養其身以有待也忽既知大義而死則仲可以生而救時也受一朝之辱可以安天下之民應一日之生亦應生以救時意蒙一身之謗可以立萬世之功應天下之謗亦應生以救時意均之大義之所在應大義字則仲之仁亦忽之仁也應仲之仁猶忽之仁也夫子何愛於言而使仲有不可洗之辱哉孔子亦何害不言而洗雪管仲之辱嗚呼非管仲之仁不足脱天下陷溺之禍見上注下言得仲而後天免其禍非夫子之論無以知仲有愛天下之心仲得夫子之論而後天下知其仁去之千百載而下自周而隋而王通氏以其學傳之河汾王通設教於河汾之上曺魏之事陋矣魏曺操而二荀在焉文中子曰荀氏有二仁焉彧以直諫而死荀彧攸以事君而生荀攸而通斷以為生也以救時荀攸之生死也以明道荀彧之死為荀氏之有二仁焉詳見荀氏有二仁論詳註吁知管仲忽之皆為仁則知荀氏之二仁也以荀彧比召忽以荀攸比管仲通之言聖門遺意歟謂王通亦得孔子之意此論雖非本㫖然主中説立意亦可以備一說貶題立說格此篇可與張定甫管仲如其仁論參㸔荀氏有二仁陳芳出處文中子周公萹或問荀彧荀攸子曰皆賢者也曰生死何如注云彧死攸生子曰生也以救時死也以明道荀氏有二仁焉注彧字文若佐魏祖大有功或謂魏祖宜加九錫彧曰本起義兵所以正朝安國也君子愛人以德不宜如此魏祖聞之不悦彧飲藥而死彧從子攸字公達魏國初建參謀帷幄舉事謹宻魏祖常稱曰荀令君之仁荀君師之智然彧初仕漢漢亡則死攸獨仕魏魏存則生明道救時皆謂仁矣立說古之君子貴以其心公天下不貴以天下狥其身可行則行可止則止此二荀之扵魏未免以一身求狥於天下故所急者在民則狥民所急者在義則狥義是雖荀攸以智自效而生也以救時荀彧以義自守而死也以明道是皆以天下狥其身而不能以其心公天下君子以是知可以為荀氏之仁而非天下之仁也陳止齋批見識透徹議論老成開闔抑揚曲盡其妙止齋編論格以此萹為第一君子貴以其心公天下以公天下為心不必急於救時明道方纔是仁不貴以天下徇其心此古之君子如此若彧之死攸之生皆未免以身徇天下夫天下至大矣順接破意使其功之足以加乎人心公天下意利之足以及乎時心公天下意是亦可矣如此亦可以為仁豈必以其身之為貴而輊天下哉不貴以天下徇其身蓋天下非吾之所能必為也言天下之大不可必徇乎一身之所欲為操必為之心粘上文反説則必將忘已狥利暗指二荀以一身求徇於天下之利視一世之所急而力趨之彧之死攸之生皆是操必為之心所以急故所急者在民則徇民矣生也以救時是徇民所急者在義則徇義矣死也以明道是徇義君子之盡夫仁也此是古之君子可行則行不行則止未嘗操必為之心而豈切切然以其一身求徇於天下乎應破題語昔者荀彧荀攸當漢之㣲言事曹魏時有憫時憂世之心而急於求遂一則急於救時一則急於明道故不暇擇君而從之事曺魏便是不擇君迨夫曹氏之勢日隆而不可禦言曺操欲加九錫攸以智自效見本題注參謀惟幄彧竟死之荀彧飲藥而死生也以救時荀攸死也以明道荀彧其先天下而後一身可以為仁矣彧之死攸之生固是愛人忘身者然不免於以天下狥其身而非以其心公天下倒翻轉應破題語君子是以惜其可為荀氏之仁而非天下之仁也說得荀氏之仁意文中子曰荀氏有二仁古人以仁者天下之達道見記中庸非必為天下然後為仁也不貴以天下狥其身苟必待為天下而後為仁粘上文反説則仁必愛人也然後為公於人語里仁唯仁者能好人能惡人仁必殺身也然後為㤀其身語衛靈公志士仁人無求生以害仁有殺身以成仁夫仁者固愛人而求仁者亦有殺身以成仁者矣粘上文演以愛人㤀身為仁是有所利而為而仁止於愛人㤀身粘上文演則為仁者不能無待於天下也如此則是為仁者未免以身求狥於天下應君子貴以其心公天下不貴以天下狥其身之意昔者夫子思濟斯民之心用夫子事說以其心公天下意周流當世而欲得君以行道未嘗不欲利天下蓋甚於塗炭之民之欲脫也我之欲利天下尤甚於天下之求我孟子坐於塗炭七十二君而無所見用固七十二君之罪也夫子歴轍列國衛靈公問陳而明日行應可行則行意云衛靈公問陳於孔子孔子對曰云明日遂行晉殺鳴犢及河而返應可止則止意河家語晉殺鳴犢大夫及而返夫子亦太落落矣不與時合夫子而逆憂其不合演上文是夫子之愛其身也如此是未免以天下徇其身夫愛人㤀身所以為仁應前四字而夫子不然言夫子不當以天下徇其身而後世之言仁者莫先焉必如夫子以心公天下然後為仁則仁之為仁必有大焉者仁之道甚大而非止救時明道之謂也豈止如二荀所為夫曹操之不應簒漢曺操為漢将實漢賊也庸夫孺子知之此說曺操欲加九錫之時孰不知之孰謂二子明智甘心輔之乎荀彧荀攸蓋劉吕二袁不足以共功先主吕布袁術袁紹而生民之禍亦甚矣説是時之急如此豈容坐視之當是時也非有英雄豪傑之才不足以振起之旋引二荀意来二子徬徨周章而不忍斯民之急言二子視一世之所急而力趨之扶植曹氏而圗桓文之功欲曺操圖齊桓公晋文公之伯業此其用心不可謂不仁矣且先揚彧之死以救時攸之生以明道亦可以為仁萹大凡做論欲揚則先抑欲抑則先揚此欲抑二子不得不先揚之曹公不能堅守臣節而文若卒以憂死見本題注其仁復不居管仲之下也如召忽管仲事公子糾既被殺召忽死之管仲不死今荀彧能死則又勝管仲之不死矣亦得司馬温公議論由是言之演上意則二子之為仁其不可誣矣荀彧荀攸嗟夫二子之為仁所以求為此名也轉歸抑二荀意言攸之生以救時彧之死以明道皆非以其心公天下而以天下徇其身使仁而止於愛人則二子之愛人不為無其功仁止於愛人則二子可以謂之愛人應前愛人字使仁而止於㤀身則二子之㤀身不為無其實仁如止於㤀身則二子亦可謂之㤀身身應前㤀字吾恐仁之為仁非止於此也仁非止於愛人㤀身也君子之所謂仁也自盡於吾身而無所憾以其心公天下不取必於天下而無不獲不以天下徇其身極天下功名之可慕而一不義則寕捨而不為以其心公天下而孟子行一不義殺一不辜不為也急生民陷溺之可哀而一失身則寕止而不顧不以天下狥其身語一朝之忿㤀其身其見於設施形於事業以公天下為心則凡所發見無非仁也非愛人㤀身則無為應前四字明大意謂君子之仁於救時道之事固不為而未嘗攫取夫愛人㤀身者以為吾事業設施之地焉若夫汲汲焉攫取救時明道之事以為足以盡吾仁則不可也此道之所以為難明而仁之所以為難盡也哉仁之道夫豈二荀之所能盡今彧與攸也舉二荀實事勸迎主上以為服英雄之資荀彧傳曺操在許謀迎天子衆以為山東未定彧曰誠因此時奉主上以從人望大順也諌捨袁尚以幸亂亡之可取荀攸傳時袁譚圍袁尚羣下多以為劉表強當先平之譚尚不足憂也攸曰袁氏据四州之地帶甲數十萬今及其亂而取之天下定矣是其救時者猶未免乎君子之議攸之生也以救時既不是而其所謂明道者安知其不出扵蓋前日之愆而不死者又不足論也彧之死也以明道亦不是詳見本題注君子不直許之以仁剔出仁字說無亦曰漢魏之仁人焉可也發得荀氏之仁意出立言之輕重說王通言二荀之㫖豈非以是仁也特荀氏之有焉爾發盡本意商辛之酷虐天下所同棄也紂漢獻㓜冲曽不烈於此矣入漢獻帝来以獻比紂㣲子比干王室之懿親也㣲子紂庶兄比干紂諸父彼相從而死於諌則恐成湯之不祀也㣲子去之比干諫而死箕子異姓之臣也死則不敢不為比干之死去則不忍又不為㣲子之去是以徉彺而為之奴並見論語㣲子萹其去也以商㣲子其存也以商箕子其死也亦以商比干而孔子以為商有三仁前萹已詳注荀氏之生也将為微子乎吾不知也以荀攸比㣲子箕子其死也将為比干乎吾不知也以荀彧比比干是仁也王氏以為荀氏之有亦既得之矣見得荀氏有二仁意出抑吾有疑焉曰生以救時死以明道又把两句来辨難時與道非判然不相為也時與道則一孔子作春秋於晚周之衰明道即所以救時孟子談仁義扵戰國之季明道即所以救時此明道也而亦救時也發出上兩句意漢魏之不两立漢未亾則魏不當簒則荀氏生死不兩是也二荀仕漢魏既簒漢則彧之死攸之生必有一箇不是生而是則可以無死也以攸之生為是則彧必不死死而是則前日之為非矣若以彧之死為是則前日不當仕漢此两句文法得孟子前日之不受是則今日之受非也云云生與死舛時與道果異矣生與死既不同則時與道為二物矣王氏豈未之思乎豈王通言之過抑豈荀氏之言哉抑二荀自言之過意不斷盡有不盡之前篇是囘護管仲未仁此篇是貶二子未免急於以身徇天下未可以為天下之仁似若各有所短但前萹是脫此萹意思翻轉為之可以參看當自有得評品優劣格此篇與洪揚祖張馮汲鄭成名論同格王貢材優龔鮑應武出處前漢鮑宣傳贊及至漢興将相名臣懐禄耽寵以失其世者多矣然大率多能自治而不能治人王貢之材優於龔鮑守死善道勝實蹈焉立說謂二龔鮑宣大節足尚最關漢家盛衰消長之數有不係乎材者如王吉所學似無歉於材彼貢禹小人阿世苟容其才無足取者班固論人不觀其大莭而顧以王貢之材為優於龔鮑殊未盡善若論龔鮑之莭誠優於王貢多矣批云倒挈龔鮑為主出脫王吉但直貶貢禹品藻極當君子之論人物指班固論人不當當於其大節觀之指龔勝龔舍鮑宣大節之或虧指貢禹則材有所不必論矣謂貢禹之節不足取何取其才蓋士之生斯世順說固貴有經濟之材足以為世用先揚然至於闗國家之盛衰與後面相應風俗之消長與後面相應則有不係乎材者後抑乎含蓄實係莭意自世之陋儒指班固無深見逺識抑其論人不當始畧其節而論其材龔鮑之莭王貢之才夫豈知天下之所少者固豈在乎材也哉不在乎才而在乎莭西漢之士格致與後萹同大抵以才智相先且説才字故其弊也至於亷隅不立苟且自將此是才之弊暗指貢禹所謂立身律已挺然特異者大莭蓋莫之見也徒有其才爾有人焉介然自守暗指龔鮑其操履之固名莭之顯此是大莭足以扶衰世而振薄俗有補於漢此誠有關於盛衰消長之數者應前盛衰消長四字安可以㢘於材而少之耶應前所少非才意則亦觀其大節而已矣謂龔鮑大節優於貢禹之小才王貢材優龔鮑固之論蓋以材論也引本文才字是烏足為善論人物者責班固夫立天下之義者存乎節成天下之事者在乎材且雙闗説材之與節二者固不可以偏廢且未分優劣而君子之論判斷以謂與其有餘於材才不足取寧若有餘於節莭有足尚固非重夫節而輕夫材也又斡一轉辨才莭二字蓋天下固有扶持世教立千萬世君臣之義使之截然不可犯此是大節有非才之所能盡方見才不及節故聞伯夷之風者至於頑廉而懦立孟萬章下聞伯夷之風者頑夫㢘懦夫有立志雖伊尹之任且不與焉同上伊尹曰云云思天下之民匹夫匹婦有不被堯舜之澤者若已推而納之溝中其自任以天下之重也此固才節之辨也引證似有病伯夷聖之清伊尹聖之任未可以是而分才莭之優劣後世節義不明過後世来類以才而相尚應冒頭漢世以才相先至以是而寘優劣之辨辨優劣字夫優劣固可以材論也且放寛抑不思後世之所謂材者又寛一着其果能盡如古人有卓然可稱者乎後世之才又不如古人之才苟不能盡如古人粘上文則漢之世非其所少也應冒頭所少非才意而又安可畧其節而論其材哉應冐頭語先漢之興叙本文意導天下以利勢之塗而士翹然以才自見漢世以才相先宣元以來宣帝元帝士習曰薄少大莭非諂諛阿世則迎合苟容也非僥倖求進則持禄固位也包貢禹孔光張禹之徒亷耻不存名檢盡廢無大節所謂知進退謹操履者幾何人見得守莭之人甚少漢蓋至是衰矣小有才之人何補於漢是則漢之所少者非才也應冒頭意求其有裨於漢之盛衰消長之數者應冒頭盛衰消長四字豈非清節之士乎過龔鮑二龔鮑宣入龔勝龔舍鮑宣来當漢之衰應上漢衰字獨能以禮義㢘耻自守以下説龔鮑大莭寧甘心於不仕而不肯為二姓之從两龔傳王莽簒國遣使者安車駟馬迎勝勝稱病篤云云謂高暉䓁曰吾受漢家厚恩亡以報今老矣旦暮入地誼豈以一身事二姓哉寧死於淫刑而不忍一日負漢鮑宣傳宣為司𨽻摧辱宰相事下御史中丞王咸舉憣太學下曰欲救鮑司𨽻者㑹此下又守闕上書遂扺宣罪减死一等髠鉗宣既被刑乃徙之上黨其凛凛大節足以振起頹風矯正薄俗清節有闗於盛衰消長之數如此一時清節之士僅有此耳只有三子清節可賞而世儒之論班固乃使不得儕於有才之列者何耶設問原固之意且開蓋謂勝以非撥煩吏見輕龔勝守右扶風數月上知勝非撥煩吏乃復還勝光禄大夫宣以舉措煩苛獲譴鮑宣舉措煩苛上責之舍以召至無所建明而去初龔舍以勝薦徴為諫大夫病免復徴為博士又病去又拜為光禄大夫數賜召終不肯起若有不足於才者且説三子之不足於才豈知合吉之通經學古見本傳王吉少好學明經明王制述舊禮本傳臣願陛下與公卿大臣延及儒生明王制述舊禮欲建萬世之長策以舉明主於三代之隆本傳吉上疏言公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆也似無歉於才輕出脱王吉彼貢禹何為者直貶禹一人資石顯以為援而不知愧石顯傳顯為中書令元帝委以政事無大小因顯白决貴幸傾朝百僚皆敬事顯其後害望之公卿以下畏顯重足以立知蕭望之之死而不争蕭望之傳㑹望之之子汲上書訟望之前事事下有司復奏望之教子上書失大臣體不敬請逮捕㳟顯等知望之素高莭不詘辱建白望之自以托師傅援終不坐非欲詘望之於牢獄塞其怏怏則聖朝無以施恩厚上可其奏使者至召望之望之飲酖自殺陽為誠切而隂實有所主如孔光張禹之庸邪固位皆足以致漢之衰而舉大柄以授之孔光領尚書事凡典樞機十餘年又居公輔位前後十七年二張禹代王商為丞相封安昌侯人皆阿諛取容持禄固位者也是鄉原之小有才耳語鄉原徳之賊也所司馬光曰孝元踐位之初虚心以問禹禹宜先其急後其所緩然則優㳺不㫁讒佞用權當時之大患也而禹不以為言此萹議論祖此而顧可以為美乎深責貢禹論人而不論其節責班固則亦何以知王貢龔鮑數子之孰為優而孰為劣也謂龔鮑優於貢禹故嘗論漢清節之士蓋自二疏之後世莫之見䟽廣為太傅兄子受少傅朝廷以為榮云云即曰父子俱移病上疏乞骸骨上許之云云故人邑子設祖道供悵東都門外送者車数百两辭决而去道路觀者皆曰賢哉二大夫而孔光張禹諸人甚無禆於漢之盛衰消長之數應前新室以鬼蜮之資王莽簒漢更號曰新室詩為鬼為蜮能奪諸國人而不能奪諸匹夫之怨見前注鮑宣何武不肯附莽則徒以龔鮑之節介然不屈見前注故東都名節之風實基於此而世未有能察者黨錮傳中興在運漢徳重開而保身懐方彌相繤襲去就之莭重於時矣注逢萌嚴光之属李業費貽之不降其志不屈其身李業有志操介特公孫述徴之託疾不起歎曰危國不入亂邦不居其辭志不屈則聞龔鮑之風有立也歸功在龔鮑清莭上用孟子聞伯夷之風者懦夫有立志語嚴光高尚於東都新造之日嚴光字子陵帝遣使聘之三反而後至除為諌議大夫不屈乃耕於冨春山陳蕃李膺力扶於漢徳将衰之時黨錮傳李膺陳蕃更加褒重學中語曰天下模楷李元禮不畏強禦陳仲舉又陳蕃贊然其信義足攜持民心漢世亂而不亾者數公之力也其來蓋有自哉歸功在龔鮑清節上班固作史不能表而出之責班固既以龔鮑之清節與王貢而並稱復以王貢之材而優於龔鮑叙本文嗚呼固亦小有才而阿其所好者深責班固不能辨别人才之優劣用孟子語以固之作史排死節而不叙殺身成仁之美其見之陋如此責班固不叙死莭之美甘獨行傳或志剛金石而剖析於強禦或意嚴冬霜而心於小諒亦有結朋協好幽明共心蹈義陵險死生䒭莭雖事非通貟良其風軌有足懐者語有殺身以成仁宜其不知有龔鮑也謂班固不貴重死莭之人宜其不重龔鮑論人不要其大節亦奚以論云不脱了節字此篇與歐陽起鳴孝宣功優孝文論亦同格俱是倒翻一轉以優為劣可以參看評品優劣格此篇與應武王貢材優龔鮑論同格張馮汲鄭成名如何洪揚祖出處西漢張釋之等贊曰張釋之之守法馮唐之論将汲黯之正直鄭當時之推士不如是亦何以成名哉立説謂張馮汲三子有愛君之心不求名而名自爾彰鄭當時薦引非人特沽譽耳豈可與張馮汲為儔班固例以成名稱之其論未盡善也批云評品當情抑揚有法深得斷案之體不察夫人愛君之心謂班固不知張釋之馮唐汲黯三子愛君之心而顧與時之要譽者㮣稱之乃與鄭當時要求時名者一例稱之或者有遺論矣謂其説未盡善何者問起名者實之賔也将名實字對説有其實者必不計其名暗指張馮汲三子而汲汲以求名則其實不足觀也已暗指鄭當時稱贊人物而不要其心暗指班固則由中之誠指三子有愛君之心㡬何其不與外假而偽者同論哉指鄭當時要譽西漢人才最為近古大凡做漢唐人物題小講處只説數句便入題鋪叙稍長方說得意盡大抵非好名者且先説漢之人才不好武不好名馮唐汲黯先揚三子卓犖先後卓犖謂出人一䓁雖其優劣不同此句有含蓄要為結末張本而愛君之誠随遇輒發應破題愛三子皆主於君慷慨激烈明析是非演說愛君之意彼其身且不復顧而何暇為名計乎應有其實者不計其名下視沽名之當時接時流以駕虚聲而薦進人才卒流於逢君者相去萬萬却貶鄭當時一人謂其薦舉人才徒要譽而已且如桑𢎞羊孔僅皆當時所薦以三子比之相去萬萬倍班氏傳漢引班固来説習見時人亟稱四子之名亟屡也遂比汲鄭以為儔比去聲合也儔例也而復上及於張馮以上且總説班固㮣稱四子之意吁三子者之名張馮汲非其有志於成此名也不計其名忠誠一念發於愛君應破題君三子愛人歎其難而名自爾彰不求名而名自顯三子初無心也以上揚三子其可與要譽者同論哉專貶當時一人是以同論君子以為有遺論矣此句又責班固擬人不以其倫張馮汲鄭成名如何妄意如此夫人之難論乆矣按迹而遺心則善惡未易斷以迹而觀則四子未易分優劣以心而論則三子優於當時狥名而㤀實則公私未易定以名而觀則四子未易分優劣以實而論則三子優於當時人臣委質以事君固有心乎為國不以名為念而名自爾歸之者暗説張馮汲三子亦有心乎為已必以名為急而名亦濫歸之者暗説鄭當時其為善惡公私之判乆矣總原起善惡公私四字苟例以時之所稱者論之暗説班固不惟不足以知君子指三子亦不足識小人指小人甚矣其不可不審也以上含責班固之意涇渭之不同流涇清渭濁氷炭之不相入氷寒炭燠夫豈固自為之區别哉呼喚引下意性不同也清濁寒燠其性各異苟比而同之反結上意聲用經語比去則是清濁可殽是涇渭可亂而寒燠可混矣是氷炭可同人之論人也亦然歸在論人上来昔之善論人者莫如孔子以孔子比班固有扣於函丈者曰有問孔子扵函大之席者齊之管仲何如或問曰人也孔子答鄭之僑奚似或問名鄭子産僑曰恵人也孔子答至於子西或問則曰彼哉彼哉孔子答彼語十四或問子産子曰恵人也問子西曰彼哉哉問管仲曰人也注彼哉無足稱之辭子西之得齒於敬仲子産齒列也猶左傳不敢與諸任之齒必其一時之名埒扵二子埒䒭也而列國交稱之乆説當時人搃稱三子使夫子徒信其名而㮣予之反説夫子則鄙夫不可與事君指子西語千七鄙夫可與事君也與哉寧不與卓犖之士同科歟指子産管仲吾是以深不取孟堅之同贊四子也原題下用證以夫子之論三子勝於班固之論四子以管仲子産比張馮汲三子以子西比鄭當時謂惟夫子方能判㫁三子之優劣班固妄以四子比而同之夫四子之名雖同且總説而其所以為名者則異要别優劣心乎求名惟莊為然先貶鄭當時一人前漢鄭當時字荘平時志尚以任俠自喜同上以任侠自喜悦慕知名之友同上其慕長者如恐不稱知友皆天下有名之士以求表見於天下是有心於求名好名之念翹然於中指出當時好名凡其置驛以示勸同上常置驛馬長安諸郊請謝賔客推轂以為公者同上每朝必言天下長者其推轂士及官屬丞史誠有味其言也非為國也要譽以成名也應破題要譽字惟賢知賢古稱連茹議論好連易㤗卦㧞茅茹莊為何人責當時宜其所舉者皆聚斂之臣前食貨志東都咸陽孔僅桑𢎞羊二人言利事析秋毫故當時進言而逢君之惡孟告子下逢君之惡其罪大以重漢民之朘削也謂當時薦言利之臣剥刻萬民之膏脂若是而以推士名引本文其有負於君多矣所以深責當時莊之心豈三子愛君之心哉此一句斡歸不如三子有愛君之心盗環犯蹕帝怒方震却取三子文前張釋之傳帝出中渭橋有一人徔橋下走乘輿馬驚捕屬廷尉釋之奏犯蹕當罰金上怒而釋之嬰逆鱗之鋒以平國法同上釋之曰法如是更重是法不信於民也其後有人盗高廟玉環下廷尉奏當棄市上欲致之族釋之曰盗廟噐而族之假令愚民取長陵一抔土陛下何以加其法乎數批逆鱗用魏徴語幕府差級王誅且加見下注而馮唐乘拊髀之機以存良將前馮唐傳文帝輦遇問唐曰吾聞趙将李齊之賢父老知之乎唐曰齊不如亷頗李牧上拊髀曰吾得頗牧為将豈憂匈奴哉唐曰陛下雖有頗牧不能用也上怒對曰魏尚為雲中守軍市租盡給士卒是以匈奴逺遁今坐上功首虜差六級陛下下之吏削其爵雖得類牧不能用也是日令唐持莭赦之復為雲中守黯之忠鯁尤出天性見汲黯傳正直規主切中膏肓見本文凡所言皆中帝之心之膏肓用左傳膏之上肓下語雖枘鑿如武帝謂與武帝不相合枘方鑿員亦以社稷之臣許之汲黯傳武帝招文學儒者上曰吾欲云云黯曰陛下内多慾而外施仁義柰何欲效唐虞之主乎上曰甚矣汲黯之戅也後上謂嚴助曰古有社稷臣黯近之矣天下想望其風采巍如天人莫可梯接謂汲黯如天人之不可以階升則三子之名可謂卓卓矣總說張馮汲三子然亦豈有心扵成此名者哉歸主意不計其名十年不調駸駸遐遁張釋之為騎郎十年不得調遐遁謂逺避去自代為郎遲遲暮齡馮唐傳父徙代唐以孝著為郎暮齡謂晚年也黯也排屏罷黜了不介意汲黯屢罷出而拳拳愛君猶感激於再召之時汲黯後坐免數年召為淮陽太守黯泣曰今病力不能勝郡事願為中郎出入禁闥補過拾遺坎流周旋徐攄忠畧已上言三子惟在愛君不計其名此豈汲汲好名欲借譽於㳺士以自成其名者之為哉三子豈鄭當時好名者之比以三子而視當時分優劣蓋不啻涇渭氷炭之分矣照前涇渭氷炭四字繳倒鄭不及三子固不能鑑人品之善惡又責班固不知人品優劣鑑察也燭志慮之公私燭照也而牽合同傳已為非是謂固牽合四子同賛且復例以成名者誇之引本文固之論人龎矣龎雜也吁演餘意固之論時人之論也謂班固之論必本於一時之人時人之論者四子之名露出名字而四子之心時人未必知也時人知其名之同不知其心之異固欲汗青以傳不朽謂班固作漢書為汗青竹也古者以竹簡乃亦随聲雷同謂其各以一莭成名謂班固随時人之論莊之名莊之欲也鄭當時之心本好名三子之名豈三子之志哉三子之心不計其名知三子之心者一洗之要知三子愛君之心庻乎其無遺論矣此段責班固以四子並稱不當理破題相應雖然莊不足道也駁退鄭當時三子者之優劣於三子之中又分高下吾必以長孺為稱首取汲黯又優於二子黯字長孺蓋二子之忠在扵一事二子之忠不及黯而黯之忠見之終身黯之忠過於二子前後所言皆忠直二子之名著於一時二子之名亦不及黯而黯之名高乎百世黯之名亦過二子又有不可同論者又不可以三子並稱守莭死義僉論屬心汲黯傳淮南王謀反惮黯曰黯好直諌守莭死義雖多慾之譏見前注内多慾而外施仁義積薪之喻同上始黯列九卿𢎞湯為小吏及𢎞為宰相湯御史大夫黯見上曰陛下用羣臣如積薪耳後来者居上㣲近於戅見前甚矣汲黯之戅也而肝膽秋霜矣忠肝義膽凛然如秋霜之可畏揖客之亢重朝廷也同上衛青既益尊黯與亢禮或謂曰君不可不拜黯曰大将軍有揖客反不重也刀筆之誚厚天下也同上張湯數奏决讞得幸黯曰刀茟之吏專深文巧詆陷人於罔昆邪之諫尊中國也同上昆邪王率衆来降漢發軍二萬乘迎之從民貰馬黯曰何至疲中國急外裔乎孰非愛君之心所充乎應愛君二字正色朝端而淮南之謀寢要必有為之本者唐裴度傳韋處厚疏汲黯在朝淮南寢謀嗚呼安得若人者用之以尊朝廷哉末又併将張馮抑退只取汲黯能尊朝廷最有見識名不足羡也有判㫁前篇取龔鮑之莭而抑貢禹之材此萹取張馮汲之愛君而抑鄭當時之要譽是分優劣格就題褒貶格魏相稱上意陳傅良出處前漢魏相傳相為丞相總領衆職甚稱上意主意宣帝自是刑名之主而魏相當有以濟其所不及乃復以嚴毅佐之是徒将順其君所行之便相徇而至於相歡而已此實當時君臣之病大凡褒貶題須是褒無溢美貶無溢惡雖使其人聞之亦為之心服方是的當此題本是褒題然魏相却有當貶處故以相知褒其稱上意却以相濟不足貶其不能輔宣帝之不及也批云止齋之論此篇却蒍有段眼易學者論曰古之君臣非如宣帝魏相其心則相知意雖相得而其道則相濟寛嚴要相濟相知之深而相濟之不足意雖稱帝意不當濟之以嚴君子猶以為未善也貶魏相為臣之道未盡善凡人臣之事君且泛說不度其君之所可為以就其有為之志者非也此說不能相知安扵其君之所可為是稱上意而不輔其所不能為之缺者亦非也却不能濟其不及亦未是此格可學何者申咈其上之所欲不能稱人君之意相持而至扵相戾者彼此相制至於乖戾固君臣之患固是君臣相與之病處惟其所欲之便稱其意相徇而至於相歡者徇情而不相濟尤君臣之患也尤非君臣相與之道看他節節生意故夫正總論善事君者能盡臣道者雖不逆其意而戾其所欲雖不拂其所欲亦不逢其意以求中其所欲亦未嘗逢君之惡是非相知以心相濟以道者不能也謂如此之臣必相知而能相濟者也應破題句漢之魏相有聲於宣帝之日前宣帝賛孝宣中興丙魏有聲君子賢之且先褒魏相格此欲抑先揚然帝以刑名繩下宣帝紀宣帝以刑名繩下相以嚴毅總職魏相傳相總領衆職云云相為人嚴毅刑名嚴毅以寓貶之意史臣謂其稱上意是已叙出處獨惜乎相知之深而相濟之不足猶未可為善也照破題句是貶之也魏相稱上意請申論之夫自知其君可以王而與之王者伊尹也孟湯三使往䀻之既而憣然改曰吾豈若使是君為堯舜之君哉自知其君之可以霸而與之霸者管仲也孟管仲以其君霸是故伊尹之説成湯無卑論後馮衍傳伊尹干湯七十說而乃信王故曰無卑論湯之受之也無難色湯即受伊尹之說管仲之說桓公無侈說家致思萹管仲説桓公桓公不受公之闇也以伯故曰無侈説而桓公之受也亦無異圖桓公即聽管仲之言君臣之間相知如此而不可以致治者無有也君臣若此之相知如之何不能致天下于治照冐子相知字噫歎辭君臣之相知誠樂其如此也已君臣固當如此句無有也更轉亦得然賴有此一然後轉得不急然而轉相濟意文意俱好人主之患毎易恃其所長而狃於其所快暗説宣帝刑名繩下意夫恃其所長便自觧説亦一法則其才果於自用恃其有才而不信任人狃於其所快拘於快意之事則其志易失之偏凡事易失於一偏説盡為君情状而為之臣者暗指魏相又毎售其所喜應冒子求中其欲意而不責其所難入應冒子相㣘而至於相歡意夫售其所喜又自解説同上格則其過也莫之抑應冐子惟其所行之便意不責其所難入應冒子安其君之所可為意則其不及也莫之強應冒子不輔其所不能為缺者句説盡為臣情状以自用之才加之以易偏之志而徒見夫不抑其過不強其不及之說上已有議論了只如此縂結便明若更說則反冗了嗚呼歎辭引入大講徒相知無以相濟照破題相知相濟字其患蓋如此哉照冒子君臣之患字漢之宣帝人皆知其為英主也宣帝英明之主也不懼其不明也崔寔政論宣帝明於人君之道懼其明之過於察而入於苛也明過於太察明苛矣不懼不斷也宣帝紀聽斷惟精憂其斷之過於嚴而流於忍也斷過於太嚴則忍矣不憂其不勤也張敞傳宣帝厲精政事憂其勤之過於銳而幾於侵下也勤過於太鋭則下行有司矣連下三箇過宇有味魏相輔之總領衆職題注使上下無苟且之意前宣帝紀上下相安莫有苟且之意而公卿多稱位之人魏相傳衆職修理公卿多稱其位其無負於宣帝之為者且還他真箇稱上意相知以心照破題相知字孰如相之於帝也哉無如魏相之與帝相知也惜乎轉貶徒相知而無道以濟其短相徒稱意而不能濟宣帝之不及之應冒頭承題而不輔其所不能為缺者君子不為無恨於弱翁也弱翁魏相也用魏相又用弱翁是用左傳互文法昔韓厥言於晉侯曰成季之勲宣孟之忠而無後為善者懼矣左成公八年韓厥言於晉侯成季之勲宣孟之忠而無後為善者懼矣周公之法議能議功周禮秋官上以八辟麗邦法一曰議親二曰議故三曰議賢四曰議能五曰議功六曰議貴七曰議勤八曰議賔不遽以一眚絶天下之才也左不以一眚而掩徳霍光親握天子璽擁而立之霍光本贊擁昭立宣借使無後猶将十世宥之左十世宥之以勸能者相乃發其已往之私魏相傳光薨相因許伯白去副封以防壅蔽殺許后之謀始得上聞卒使功臣之盟未寒霍光漢之功臣而赤族之誅已及光本傳光身死而宗族竟誅何刻哉相何惨刻如此趙廣漢之吏才漢廷希有也廣漢之才漢吏所少也不幸而麗乎罪周禮秋官上毋使罪麗於民尚宜以八議之法貸之見上注相獨以忤已之私憾而於民泣而請代者舉京兆弗恤也趙廣漢傳丞相婢死廣漢入相府召夫人責以殺婢事丞相魏相上書自陳蕭望之奏廣漢摧辱大臣天子可其奏吏民觀泣者數萬人願代京兆死廣漢竟要斬何刻哉只用二事舉其大者以宣帝之刑名注見前而相以嚴刻佐之注見前甚稱上意史臣之言則信矣叙出處然孝宣之治甘於雜伯宣帝紀漢家自有制度本以伯王道雜之亦相之無以廣之也歟責得魏相極是大抵人臣之相其君用起議論結上生下非於其有餘者將順之為可喜應原題售其所喜句而増其所不能應原題強其所不及一句意裁其勝而約之中者斯可貴也應原題抑其過一句意高祖自任以為馬上治天下向㣲陸賈詩書之説前陸賈傳陸賈時時前説稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寕可以馬上治乎帝之勇氣未衰也此是裁其勝而約之中處以唐德宗之猜忌唐李石傳徳宗多猜忌宜趨於亾而未亡者時徳宗有奉天之幸陸贄之仁義陸贄傳贄論諌數義十百萹篇皆本仁實扶持之此是増其所不能處此陸賈陸贄二子能正其君之偏者非若相之徒相知而不能相濟也嗚呼歎辭孝宣固未必愧扵二君也孝宣比二君未必有忝孰謂相賢相也而有愧於二臣哉誰謂魏相為漢賢相却不及陸賈陸贄結最有法辭簡而意盡謹論就題褒貶格使功不如使過陳傅良出處唐李靖傳靖至峽州阻兵帝詔斬靖許紹為請免留㓂䕫州靖率兵破之帝謂左右曰使功不如使過靖果然立說天下之事恃其所長者必無所成而耻其所不能者常獲人惟摧敗困踣之餘故其心毎切於自效而愧於無以自贖也一旦使之則用力也專為謀也戒而天下之事集矣若夫驕其有功志滿意得斯人也其不敗於乃公事者幾希人主其可以摧折拂亂而棄天下之英䧺豪傑哉此使功不如使過之意批云反覆功過二字結處㣲㸃破意便曉然矣亦不甚守常體論曰天下之事恃其所長者必敗恃其所長指功而恥其所不能者常獲恥其不能指過必敗常獲字含不如意破自是一法故夫意得志滿者説功不可屢逞功者不可常承上必敗意而摧敗困踣者説過是乃明王之不棄者也人君所不棄説使字何則此二字設問人臣之立功入講立説詠題意不憂其挫不慮其摧敗困踣而憂其鋭而慮其志得意滿不畏其敢不懼其敢為而畏其專而懼其專蓋惟此二字答上挫者有所戒解上謂挫者有所儆懼説過應上挫字而鋭者必驕鋭者必自驕應上鋭字敢者處事以易敢為者輕易其事應上敢字而專之者難之也應上專字夫事不如意者十常八九說功不此一段非冒子法甚守常體天下之事倚其必集者恃其必成者未必能有所就也却未必能成亦含不如使過意應破恃其所長者必敗意以天下不可必集之事而使意得志滿驕且易者為之說使功應承題句嗚呼歎辭難矣哉數字輕収拾了惟夫此下説不如使過摧敗困踣之餘體過應承題句則其心之切於自效凡事盡力為之而愧於無以自贖也欲贖其過切於自效則其用力也專牽上句文謂自效則專於用力愧於無以自贖則其為謀也不敢以不戒欲自贖其過則凡事必儆戒以此遇事其與夫驕且易者逺矣方説不如易應上片驕字人君圖任之際圖任字體使字其可棄斯人也哉厚齋批云此一段亦非冐子體此使功不如使過之意人有常言敗軍之将不可以語勇前漢紀廣武君曰敗軍之将不可以語勇重在過字原題偏於過字着力嗟夫二字活士不可以成敗論也豈可以成敗論人才士以成敗論申上文天下㣲全人矣有過者凡天下之物設譬遭一蹶者得一便蹶失足也曽一失足後必不復蹈矣更一過者長一識一畨有過後必識其非傷弓之鳥高飛鳥曽為弓所傷則其飛愈髙驚餌之魚深逝魚曽為餌所驚則其逝愈深此譬專説過字世之深思逺慮之士亦未始不以其困得之也未嘗不因其困而得之困字應冒子句故曰常勝之家難與慮敵其操心也危其慮患也深故達必世之所謂孤臣孽子也孟子全文散用經史語法作文士果可以成敗論哉申言之謂果可以成敗論人乎况夫英雄豪傑之士非以其才有餘為可喜不以其有才為喜長説功應破題恃其所必敗意而以其更事之不多器識堅勇之不足為可慮也正説不如使過意易應冒子意得志滿驕且句啟發之機必生於憤悱之後語不憤不啟不悱不發知情偽者亦得於險阻艱難備嘗之中左僖二十八年險阻艱難備嘗之矣民之情偽盡知之矣乆於得志非人臣之福也恃其所長者必敗故凡英雄豪傑之士故凡二字以下是結上生下不有以沮抑其氣拂亂其所為應冒子摧敗困踣之意以固其謀而大其所受者不足以大用於天下不如使過之意是祖孟子勞其筋骨餓其體膚将以大其用也之説昔者留侯以其讎秦之志不勝其忿而奮於一擊之間當是時子房蓋㡬死矣前張良傳秦滅韓求客刺秦王為韓報讎得力士為鐵椎重百二十斤秦皇東逰至博浪沙中良與客俱擊秦皇誤中副車留侯子房互用得左傳叙事法及其以謀輔高帝則能舒徐隂伺以决楚漢之雌䧺此過者常獲處李陵之勇陵恃有功處嘗以數百騎深入不毛之地蓋漢将之翹楚也而終於僨軍降敵前李陵傳陵將歩卒五千人渉單于庭陵軍無後救射矢且盡陵曰無面目見陛下遂降司馬遷曰雖古名将不過也是何設問其拙於前者是有過或智於後却有功勇於昔者是有功乃大謬於今耶却有過蓋惟夫答上一撃之誤陷於虎口者有以忸怩留侯之心而増益其所未能此應破題恥其所不能者常獲與冒子小講挫者有所戒意是説㽞侯之恥其有過處深入之功高出漢庭之右者乃所以盛李陵之氣奪其魄而覆其軍也此應破題恃其所長者必敗與冒子小講鋭者必驕意此説李陵恃其有功處嗚呼人君其可以摧敗拂亂之者而棄天下之英雄豪傑也哉照冒子摧敗困踣之餘其可棄斯人也哉句説使意大抵再起两段用懼忽二字生下意天下之功未嘗不成於有所警懼天下之功以警戒而成而敗於有所忽也以玩忽而敗懼心起於自訟應破題恥其不能意忽心起於自矜照破題恃其所長意兹二者功過使之也明出使功使過字昔人有夜行者用旁喻尤佳見寢石以為伏虎也以石為虎是有懼心也援弓而射之援彎也一發沒矢一發箭而羽沒於石下視之乃石也及視之非虎乃石也却而復射却歩而再射之則矢躍無跡則矢不復入矣是以石視石而有忽心也劉向新序云椘熊子夜行見寢石以為伏虎關弓射之没矢翎羽下視乃石也却復射之矢躍無跡又見李廣傳夫射一也而中否異焉同是射也一中一否何哉設問以虎視石則其心有不免之懼是有懼心以石視石則恬不知怪而以戲處之者也是有忽心故夫有功處事以石視石者也照冒子驕且易意以過處事以虎視石者也照冒子不敢不戒意人君之用人也用人説使字能得以虎視石之心者而用之亦何所不濟哉此説不如使過意而每每以過棄人是未免以成敗論矣至此方應原題吾嘗見司馬子長論李将軍為将其言哀痛反覆深悲其無成以謂百姓知與不知皆為流涕前李廣傳廣結髪與匈奴大小七十餘戰今幸從大将軍出接單于兵大將軍徙廣部行回逺又迷失道豈非天哉遂引刃自剄百姓聞之知與不知老壮皆為埀涕至論霍去病無他美獨天幸不至乏絶前霍去病傳霍去病所将常選驍然敢深入亦有天幸未嘗困絶之将四件事織成二段議論衮纒将去更不可把捉文妙處夫子長不少假借於屢勝之去病不少假借是不貸也而獨惓惓於老死不侯之李廣惓惓者留意也何也亦嘗疑之矣設疑蓋至於孟明秦穆之事答上問里左僖三十三年敗秦師于殽獲百孟明視西乞術白乙丙以歸公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明孟明稽首曰君之恵不以纍臣釁鼓若從君恵而免之三年将拜君賜云云大夫何罪且吾不以一𤯝掩徳然後喟然嘆曰嗟夫子長之意深矣到此却判斷世無秦穆不識孟明要説使過意士之以有過棄者不獨李廣也士以有過見棄於人者多豈特李廣而已賈誼紛更之請似有少年浮躁之失前賈誼傳誼以為宜改正朔易服色制度定官名絳灌之屬曰洛陽年少紛亂諸事天子後亦踈之不用其議以為長沙王太傅誼之思未熟也賈誼未之熟思長沙之謫誼有大過人者矣而亦卒以不用死注見上嗚呼誼之不得為孟明不足恨也孟明賈誼皆摧敗困踣之餘言賈誼不得如孟明之遇秦穆公不足為恨文帝之不得為秦穆可惜也哉文帝之不如秦穆之識孟明為可惜也結處文字變化出沒謹論論學繩尺巻五
