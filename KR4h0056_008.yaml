body:
  text: 論學繩尺巻八宋魏天應編選林子長箋解無所考證格與李仲元貌言行論同格陸澄譏康成之註林徳頌出處孝經序劉炫明安國之本陸澄譏康成之註按要㑹云鄭氐孝經十八章係長孫氏江氏后氏翼氏傳之後來鄭氏註之近古皆云鄭康成魏晉之朝無有此説晉荀昶集孝經説始以鄭氏為宗陸澄以為非康成所註請不藏秘省王儉不依其請遂得見傳至唐劉知幾極言非康成所註凡十二條又見後註立説謂世儒溺於傳註之學不明聖經之本意如注孝經者有鄭氏人皆以為康成也而陸澄獨譏之以為非康成吾以為果是康成所注亦不明聖人言孝之㫖果何益於聖經又何必論其是非乎批云考究情深議論振發非老儒宿學安能有此筆力論曰談經者之無成説久矣言世儒傳註不明孝經之㫖君子不必論其人可也言孝經或是康成所註或非康成所註皆無補於孝經言陸澄譏之非也聖人作經以詔來世非真為言語設也論聖人作經本㫖不在言語上要喚下意所以啓迪人心扶持世教者在是大要在孝上况夫天地之大經生民之大義實於此有述焉孝經云夫孝天之經也地之義也民之行也天地之經而民是則之而世儒昧之世儒皆不明孝之大義徒尚傳註正使世儒復生亦無益於聖經也便是鄭康成所註亦無補於孝經不原聖經之明晦責陸澄而論傳註之真偽謂譏其非康成所註是雖考訂之精援據之審君子猶以為未也且放寛説便是康成所註於孝經亦有何補註孝經者有鄭氏人以為康成也且據他人之説而陸澄譏之以為非康成述本題意然使其真康成亦未必盡知聖人之經者矣何獨於孝經為然駁倒本題發明主意陸澄譏康成之註唐人主有志於孝經者故其説云耳謂唐𤣥宗昔傳易者有子夏人曰非子夏也丁寛託之也唐藝文志周易卜商傳二巻或謂丁寛自作託子夏之名君子曰如其果子夏也亦未必盡知易也斡一轉證主意何者子夏雖工於文學嘗於褒貶不能措一辭矣而又焉知易史記孔子世家孔子為春秋筆則筆削則削子夏之徒不能贊一辭又語文學子游子夏傳謂子夏於春秋且不能措一辭又安知三聖作易之㫖傳春秋者有左氏人曰非丘明也左氏之裔為之也後漢范升傳建武二年欲為左氏春秋立博士升起對曰左氏不祖孔子而出於丘明乂奏左氏之失凡十四事又上太史公違戾五經謬孔子言及左氏春秋不可録三十一事君子曰如其果丘明也亦未必盡知春秋也斡一轉證生意何者丘明好惡與聖人同者纔一二耳漢劉歆傳云云因其好惡之同推其好惡之異且猶不可况未能皆相似也謂左丘明好惡既不與孔子盡同又安能盡知春秋褒貶之法甚矣傳註之學何其相尚也引歸傳註上謂傳註不足以明聖人之心寜道孔聖誤諱言服鄭非彼何愛鄭如此哉用諱詩云云服䖍鄭康成皆尚傳註之學聖人之經以世儒而明曉得聖人之本㫖則為明白亦以世儒而晦不曉聖人之本㫖則為晦昧謂傳註盡無得於聖經固不可且揚傳註之學亦有益於聖人之經謂聖經皆不離乎傳註尤不可也又抑傳註之學未有益於聖人之經彼其篇斷而章分句解而字析深貶傳註之害以文害辭以辭害意用孟子語是皆指而枝焉身而贅焉謂聖經之有傳註如指之有枝節身之有贅疣言其繁多也有之不加益無之不加損言傳註不足為重輕其於聖經深㫖奥義彼烏知之言傳註不知聖經之深奥若康成者誠世儒之冠冕也且楊康成亦是漢儒之第一人然康成說經多憑臆見竄易舊文臆已意也竄易改變也言康成只是據已見而傳註聖人之經其說詩也泛引傳註非風雅之本㫖也康成説詩則不得詩之本㫖詩有國風大雅小雅其説禮也多泥名數非得中和之要理也康成説禮則不得禮之本㫖之周禮以五禮防萬民之偽而教中以六樂防萬民之情而教之和甚至於詩以生甫為甫侯於禮以生甫為仲山甫先後乖剌如出二人其無定見也若此詩崧嶽降神生甫及申謂康成註詩之生甫與禮之生甫其說不同可見乖謬誠使其真從事於孝經亦豈有得於聖人之所謂孝哉謂康成之註他經皆未深得其㫖使孝經果是康成所註亦未必盡知孝之大㫖且孝經家之有鄭氏以為康成者荀昶祖之而實之者王儉也荀昶與王儉謂孝經是康成所註詳見題註以為非康成劉知幾輩力排之而倡之者陸澄其首也劉知㡬陸澄謂孝經非康成所註並詳見題註盖嘗因開元天子之言參開元羣臣之議而遡陸澄之㫖矣開元天子指明皇羣臣指題下注諸人康成之自序述其所註惟及諸經而不及孝經也言所註周易尚書毛詩儀禮禮記鄭志之目録記其所註不及孝經𤣥荅諸弟子問五經依論語作鄭志八篇又况康成之釋經言鄭氏者皆以名著也康成之釋諸經皆云鄭𤣥箋今孝經之註存其姓而没其名是尚得為康成乎孝經註只云鄭氏箋不書其名吁是則然矣擺上意抑不曰歸正意聖人之道康成其有造之乎否也謂康成未深造聖人之道聖人之經其有得之乎否也謂康成未盡知聖人之㫖如其真有造乎此真有得乎此斡轉上意則介乎康成可也居二者之間謂之介否則雖孔壇猶在鄭鄉復作其亦何益哉孔子設教於杏壇之上又孔融告髙密縣為𤣥特立一鄉曰鄭公鄉亦嘗原聖人之所以語曽子者乎推原孔子與曽子語孝之意靡瞻匪父事父孝故事天明蓋鳶飛戾天如在其上也詩小弁靡瞻匪父又孝經感應章事父孝故事天明又中庸詩云鳶飛戾天魚躍于淵言其上下察也又洋洋乎如在其上如在其左右靡依匪母事母孝故事地察蓋魚躍于淵如在其左右也詩小弁靡依匪母又孝經感應章事母孝故事地察又中庸見上注是理也自天子達於庶人共由之孟滕文公上三年之喪齊䟽之服飦粥之食自天子達於庶人三代共之少有缺焉無所逃於天地間少有未盡處不得為孝其在聖門如養志之曽子得之孟子曰事親若曾子者可也孟離婁上若曾子可謂養志也事親若曾子者可也以曾子之事親而僅以為可朱文公云可者僅可而有未盡之辭嗚呼嗟嘆之辭孝之為道其大矣哉見得孝道難盡區區康成又焉知之焉音煙謂孝道之大康成安足以知之且鄭氏所註吾不得其詳亦嘗聞其略矣學孟子語舉康成所註來説曰分别五土視其高下高田宜黍稷下田宜稻麥盖舉世之所稱道然也鄭氏註云云抑易之所謂地之宜禮之所謂土之宜者猶不止是聖經之言地利不止如康成所言易泰卦后以裁成天地之道輔相天地之宜又周禮地官以土宜之法辨十有二土之名物况聖人所言天道地利者正欲人自檢律無愧於天地間耳聖經所指與康成異只舉此一端便見得康成不知聖人之所謂孝了陸澄之意謂所註之非康成則其言止是且敘澄之本意而君子之見謂所註之果康成故其言亦止是却以主意斷之學者但論傳註之不足以發揮聖經直駁傳註之學不足尚不必因其説求其人可也不必説是康成所註或非康成所註嗚呼何獨於鄭氏孝經為然哉安國之本亦然又舉安國之言為證安國之孝經古文孝經也而所傳之本失之久矣又孝經序疏今文稱鄭𤣥註古文稱孔安國註自王劭得之而劉炫實明之見篇末詳註然非必其真也謂此本亦未是安國所註故嘗謂閨門一章存之可也去之可也庶人敢問二章分之可也合之亦可也並見篇末註唐之人或右鄭而攻孔或主康成之説以為是而攻安國之本以為非或存孔而廢鄭或主安國之説以為是而廢康成之説以為非要皆一偏之見爾將上二件議論俱罵倒咸陽一焰經籍道息項羽焚秦咸陽宫室存之者皆煨燼之末其存其闕若此者多矣諸經或存或亡甚多不止孝經為然聖人之㫖意苟明雖以今之書觀之可也苟明聖人之㫖無傳註亦可傳註之無益於聖經以安國聖人之後猶未之免而况康成乎哉罵倒孔安國是孔子之後且不知孝經之㫖何况鄭康成乎縱使孝經果是康成所註亦無益了然則如之何曰問安如文記文王世子篇文王之為世子朝於王季日三鷄初鳴而衣服至於寢門問内侍之御者曰今日安否何如内豎曰安文王乃喜及日中及暮亦如之繼志如武中庸武王周公其達孝矣乎夫孝者善繼人之志善述人之事永言孝思昭哉嗣服君天下之事也詩下武繼文也永言孝思孝思維則昭哉嗣服一人有慶兆民賴之為諸侯者皆魯公出孝經甫刑云又見下註然友反命定為三年之喪父兄百官皆不欲曰吾宗國魯先君莫之行若定公者斯改悔矣孟子滕定公薨云云然友之鄒問於孟子孟子曰不亦善乎親喪固所自盡也為大夫者皆莊子語子張曾子曰吾聞諸夫子孟莊子之孝也其他可能也其不改父之臣與父之政是難能也如武伯者斯在下矣同上孟武伯問孝子曰父母惟其疾之憂為士者非曾則閔孟離婁事親若曾子可也又語先進孝哉閔子騫人不間於其父母昆弟之言又不但為子夏之服勞子游之能養矣語為政子夏問孝子曰色難有事弟子服其勞又子游問孝子曰今之孝者是謂能養當寒而温當暑而凊必使舉天下之為父子者定焉而後可也記曲禮凡為人子者冬温而夏凊昏定而晨省又用孟子離婁上語帝王之所行者若是繳以上語夫子之所言者若是繳夫子與曾子言孝意人患不知求之耳用孟子語若夫改元至徳亦不忘孝肅宗即位于靈武尊皇帝曰上皇天帝大赦改元至徳而萋菲者至讒隙生焉同上李輔國用事上皇輕輔國矯稱上詔迎上皇居甘露殿上皇不懌云云則雖詔天下家藏孝經猶無益也唐𤣥宗本記詔天下家藏孝經而况康成之註也哉謹論孝經有二古文孝經一十二章庶人分為二章故自天子以下分為一章曾子敢問分而為二又添閨門一章閨門之内具禮矣嚴父嚴兄妻子臣妾猶百姓徒僕也今猶有此本温公范祖禹註古文本出於屋壁中孔安國為之傳安國之本亡於梁至隋王劭於京師訪得之送與劉炫所謂劉炫明安國之本是也然儒者猶謂炫自作之非孔舊本也出隋經籍志無所考證格與陸澄譏康成之註論同格李仲元貌言行如何蕭易出處揚子淵騫篇或問子蜀人也請人曰有李仲元者人也其為人也奈何曰不屈其意不累其身曰是夷惠之徒歟曰不夷不恵可否之間也云云仲元世之師也見其貌者肅如也聞其言者愀如也觀其行者穆如也立説李仲元只是一隠士若貌若言若行俱無聞於時而揚子雲亟稱之其言無證若如子雲之言固足以起人之嘆而其言無證反足以起人之疑然君子寜闕其疑不敢厚誣當世之無人惟曰是其不可傳者與其人俱往矣方澄孫批云言語出入經傳有抑揚有變態不肯道有此人又不肯道無此人如驅龍蛇縛虎豹更無捉摸處也論曰古之君子其不可傳者與其人俱往矣謂仲元之貌言行無傳於世尚論者每歎之而亦或疑之如子雲所稱可以起人之嘆而其言無證反以啓人之疑雖疑之而終不敢少之也君子雖疑其言之無證又不敢厚誣當世之必無此人摺只一破多少轉夫人而非賢則已暗指仲元反説果賢也轉正其言論風㫖豈無一二之足聞者仲元之言而所為飭躬厲行不使非禮加乎其身也仲元之貌與行用經語固以待後世之夷考焉耳使後世有所考證方信其為人何至與聲容辭氣俱超忽而寂寥哉何至無傳於世意者素隠行怪出中庸子曰素隠行怪文公註云素按漢書當作索索隠行怪言深求隠僻之理而過為詭異之行也指仲元議論施為不少㮣見於世言其貌言無傳於世身隠矣焉用文之用左傳介子推語故當時亦不得而述歟其貌言行無傳當時無可得而述夫既已可見矣可聞矣可觀矣謂之不文不可矣謂仲元見其貌者肅如也聞其言者偢如也觀其行者穆如也字應上文其時得而識之暗指子雲非其時則不得而稽焉謂後世無所稽考然則古之人好修而名不稱者何限也古之名士不傳於世者多非特仲元一人而已不然則言無證不信而聲聞之過情者皆可疑也用孟子語疑應每嘆之而或之君子寜闕其疑而不敢厚誣後世之無人惟曰是其不可傳者與其人俱往矣應破語文勢圓轉如法言之述李仲元其貌言行之動人有若此者揚雄常問法應之譔以為十三巻象論語號曰法言而求其所謂貌言行者卒無可指也謂其無傳於苟世無所考證非史失其傳則子雲之言誇矣兩語疑不與後相應李仲元貌言行如何其然豈其然乎用論語句亦疑下夫仲元之為人書固有闕矣直將仲元叙起世次之先後則吾將安考謂世次無所考以其接於子雲之見聞殆亦西都末造之隠者歟謂仲元想是西漢末之一隠士何以驗其隠也設問隠字彼其卓爾大雅見稱於子雲者如此揚子稱李仲元為大雅君子而後世無傳焉是以知其為隠也應上隠字用孟子語抑古之流芳千祀者豈必皆遭遇其時而嘉言善行班班史牒者如將見之謂古之名聞於世者非必顯者而後傳世降俗末是固無賢者也有則史必書之舉孟子語昔隋之亂唐之未興也河汾之間有隠君子焉杜淹撰世家隋季文中子之教興於河汾又中説天地篇叔恬曰文中子之教興其當隋之季世皇家之末造乎其書曰中説者載其言行為詳學者得其書而讀之猶可彷彿其人王通諡曰文中子作中説十篇獨怪夫隋氏之史出於門人之所論撰而不為其師立傳房𤣥齡撰隋史不為其師王通立傳是以後世君子未能釋然於其間使人不能無疑甚者至以為無是人也或謂隋時無王通吁以為無是人則不可解上意而使人不能釋然於文中子者答上意則王福畤之家傳實啓之文中子二子長曰福郊少曰福畤福畤記王氏家書雜録何則揚之太過者疑之所從生也繳上意謂王通啓人之疑亦如李仲元今以文中子之動容正色而庶幾於貌孔子之貌謂王通之貌㡬及孔子之貌文中子之出辭吐氣則庶幾於言孔子之言謂王通之言幾及孔子之言而文中子之造次施為起居動履其行之不肖於孔子者幾希謂王通之行幾及孔子之行此一股變文又舉其事以實其説固以必人之信也而反以甚人之疑也且據揚子稱仲元之為人固將以必人之信而其言無證反以甚人之疑吁指實而言人猶以疑言又不實誰則信之學左傳言語若子雲之稱李仲元是矣謂揚子所言不足信蓋自史遷尚勢利而揚貨殖抑道義而進游俠司馬遷作史記有貨殖傳游俠傳班固論次西漢無能改於其失班固作西漢亦不能改司馬遷之失彼山澤之癯儒容貌不足以動人謂隠者之貌又山澤之癯儒括囊而遯雖有言而莫之或聴謂隠者之言无易坤卦括囊无咎譽惟其徳行道義之富而勢利蔑如也謂隠者之行態二股文勢有變一股是一様是固子長孟堅之所抑而不尚者司馬遷字子長班固字孟堅無惑乎仲元之徒無得而稱焉學語孟句法嗚呼嗟嘆之辭美晢之張蒼而大書張蒼傳蒼有罪當斬解衣伏質身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬晳白也用左傳東門之晢字反形仲元之貌木訥之周勃而特書周勃傳勃為人木強敦厚形仲元之言無行如陳平輩而不一書陳平傳漢王以讓無知對曰臣之所言者能也陛下所問者行也云云盗嫂受金何足疑乎形仲元之行大書特書不一書用左傳語而魯有大臣史失其名非以其不顯歟證仲元之隠者夫必顯者而後書則隠居求志姓名湮滅者何可勝數真可惜也應冒頭古之人好修而名不稱者何限也使𢎞也不見書於法言則天下後世誰復知有李仲元哉蜀秦宓傳李仲元名𢎞既稱其名復稱其字學左傳體雖然喚下意非是自為一段後世之知仲元者以法言也後世之疑仲元者亦以法言也應破論者每嘆之而亦或疑之尚友千載於古人中得仲元者焉用孟子語又尚論古之人誦其詩讀其書不知其人可乎是以論其世也是尚友也果如揚子之所稱且正說恨不獲振太史公之屐司馬遷歴覽天下名山大川歴乎魚鳬蠶叢之墟魚鳬蠶叢蜀地名物色益州之祠尚無恙乎蜀志劉璋為李𢎞立祠之物色字用嚴光傳迺令以物色訪又學馬子才贈蓋邦式文不知魚腹之骨尚無恙者乎想夫英爽如生睠兹宇而躊躇也想仲元之祠氣象蘭萎玉沈莫寫我心言仲元既往已如蘭之萎如玉之沈不能以寫我胷中之所藴則尋繹其議論察其立身行已之大㮣欲考其言貌行意其猶有足證而闕如也亦無所考證夫子温而厲威而不猛㳟而安徒曰貌云乎哉見語述而與下大夫言侃侃如也與上大夫言誾誾如也見語鄉黨而答問訓告散在二十篇之中者皆至言矣語序言魯論語二十篇皆孔子弟子記諸善言也若其徳行則綏之斯來動之斯和從游而速肖者非躬行之化疇克爾語子張云云又夫子從㳺者三千速肖者七十二股文各一様有變態彼仲元者何人斯歸本題貌足以肅人之見言足以愀人之聞行足以穆人之觀舉本出處文而其貌其言其行果何若也三者皆無所考證雖曰浮沉鄉里栖遲山林影響昧昧可即而不可求故人莫得而紀焉謂仲元只是一隠者故人莫得而知之然世惟無若人也無此人則史書不可得而紀誠有若人亦檮乘之光也若果有此人史書豈可不紀孟子晉之乘楚之檮杌檮乗二史官之號述子房者證之畫工史家之法固有纎悉於容貌之書者有所證者如此君平子真之流其微言篤行時時見於他傳尚多有之揚子谷口有鄭子真蜀有嚴君平皆修身自保成帝時王鳳以禮聘子真子真不詘而終君平卜筮於成都至於仲元何獨不然再歸本題知仲元者未幾而疑仲元者繼之必自子雲之言始應前知仲元者以法言疑仲元者亦以法言或曰設一難雄稱仲元以自况也謂揚子以仲元自比不夷不惠可否之間古無是論也引本文謂仲元既不是伯夷之清又不是栁下惠之和見而肅聞而愀斯不惠之驗歟將本文見其貌者肅如也聞其言者愀如也織在不如惠語下觀而穆斯不夷之驗歟將本文觀其行者穆如也織在不如夷語上草𤣥著新自附於可否之間歟本傳領而作太𤣥五千文又遷子雲劇秦美新織可否之語信若此則不無可議也駁倒第一難之説或曰再設二難雄稱仲元子誠齊人也雄與仲元同蜀人用孟子誠齊人也語雄家世蜀仲元之為人當世豈無其輩而此獨亟稱者以其為蜀之人耳發明同蜀人意若然則喜而溢美未足據也又駁倒第二難之説或又曰又設第三難雄稱仲元取其内外一致表裏俱符也謂雄稱仲元以其有徳行可取司馬相如王褒皆蜀産也又舉蜀中二人來證雍容閒雅者不足覆竊貲之醜司馬相如傳相如雍容閒雅甚都又卓文君奔相如俱如臨卬從昆弟假貸云云造作語言綴成歌頌者正當以貢諛獻佞為羞耳王褒傳褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之又作聖主得賢臣頌云云議者多以為淫靡不急𢎞之擅美正以其行歟是亦未可知也又駁倒第三難之説今既無以質雄説之是以雄稱仲元之説為是則又無所考而亦無以辨雄説之非以雄稱仲元之説為非亦無所證與其以誇誕而議雄寜若以傳而議史猶可景行古人而不失為忠厚之論耳應冐若非史失其傳則子雲之言誇矣亦應破頭雖疑之而終不敢少之也嘗試摭仲元之遺事而為之補傳曰論無補傳之體今創為之者不惟見其學識該博又可具見仲元首末李仲元不知蜀之何許人其名曰𢎞李仲元名𢎞見秦宓傳語在陳壽蜀志秦宓傳三國志乃陳壽所作其出處當在元成哀平間西漢之末與揚雄同郡又同時也仲元與雄同蜀人又同時雄雅敬之雄甚敬仲元今其載於淵騫篇者是己本文釋揚子者以為詳見華陽國志司馬光曰仲元事見常璩華陽國志尤詳而秦宓以為不遭法言令名必淪見秦宓傳如李仲元不遭法言令名必淪宓去𢎞未逺也而言若此則其事已不可攷矣秦宓與李仲元俱蜀人宓取仲元之時將三百年常璩增益而附㑹之殆皇甫謐譔帝王世紀之類其説難據謂常璩華陽國志載李仲元事皆增益附㑹之語不足信亦如皇甫謐譔帝王世紀之類蓋没後且二百年劉璋刺益州乃為之立祠云秦宓傳劉璋刺益州遣王商為嚴君平李𢎞立祠斷之曰揚子雲以為仲元在夷惠之間今雖未可信也舉揚子本文不夷不惠可否之間也仲元將不得在君平子真之間乎舉韓愈諌臣論子告我曰陽子可以為有道之士也今雖不能及已陽子將不得為善人乎嚴召平鄭子真皆隠者從前皆疑仲元之為人無考證至此放寛一著却將君平子真二隠士比他語有斷制謹論亦可與丁集黄道深郭林宗何如人論參看前篇謂陸澄譏康成之所註或是或非無所考證可疑之而不可信之也後篇謂揚雄稱仲元之為人或有或無無所考證雖疑之而不敢少之也有所考證格與聖人成書成言論同格五帝三代之記如何陳子頤出處史記三代世表太史公曰五帝三代之記尚矣自殷以前諸侯不可得而譜周以來乃頗可著注索隠曰此叙五帝三代而篇名三代者以三代代系長逺又三代皆出五帝故叙三代要從五帝起也立説考古者以經為證事本諸經君子質之而無疑而無證不信則姑存之以傳疑可也太史公採五帝三代之記以作世表表著五帝之世而其篇名特標以三代而不及五帝蓋謂三代之記遷已得以證之經五帝之記世代愈逺遷則不敢盡信也批云見識高考究熟用事遣文頗有前輩風度論曰考古者以經為證指班固言三代之記可以經為證出處下文云孔子因史文次春秋序尚書事不證諸經謂五帝之記無所考證君子存之而不敢盡信也故史記但云三代世表而不及五帝蓋經者史之法史以經為證主意凡經聖人紀次之所及者指孔子次春秋序尚書萬世所恃以為訂正之地也萬世以孔子之經為信有如去古既遠之餘總引本題帝王統緒之所相承其世代漫不可考三代世表正義曰言代者以五帝久與傳記少見夏啓以來乃有尚書畧有年月此於五帝事迹易明故舉三代為首所幸而僅存者猶以經傳所及之一二指春秋尚書所載與夫百家之所撰次者耳指出處下文傳記之類然而事本諸經君子質之而無疑三代之記可以證之尚書春秋而無證不信者姑存之以傳疑可也五帝之記無所考證傳出處下文云疑則疑盖其慎也存焉而述之述焉而名之存五帝三代之名於其名而示其去取之意世表之篇名去五帝之名但曰三代世表發語之首又曰五帝三代之記尚矣則是非疑信可以瞭然於後世矣繳前面主意司馬遷採五帝三代之記以作世表敘本文蓋自黄帝迄于周也始於黄帝終於周表著五帝之世而其名乃止於三代但曰三代世表而不及五帝豈非三代之記遷己得以證之經證之尚書春秋五帝之記世代愈逺遷亦未敢盡信歟無所考證見小講注此世表之名所以不及五帝也發盡主意五帝三代之記如何請得而辨之蓋嘗觀遷史之例矣便就司馬遷作史之例敘起所記以此其名亦以此此正例也記與名無異同如五帝之紀所以記五帝之事也史記五帝紀黄帝顓頊帝嚳帝堯虞舜所記以此其名遺乎此此變例也記與名不同如十三諸侯而表之名止於十二不數吳也史記十二諸侯年表索隠曰篇言十二實敘十三賤夷狄不數吳又伯在後故也周魯齊晉秦楚宋衞蔡曹鄭燕吳今而採五帝三代之記以為帝王之世表引本文不從其實而名之既曰五帝三代之記則世表盍當名五帝三代世表今只云三代世表而不及五帝顧乃削去五帝標以三代自附於黜呉之例何耶以上面十二諸侯世表黜呉事設難大抵良史之著述必欲其有所證也主意考之平昔所聞而然推之聖經賢傳而合則名之無疑也有所考證則名之亦足信如三代之記證之聖經而無據考之百家而僅存若是則存以傳疑可也如五帝之記無所考證則存之以傳疑存之而遂名之若存五帝之名而遂名之於世表天下後世其謂五帝世系本末先後果若是確恐後世以司馬遷之言為實是非君子所以望來世俟明哲之意也轉歸遷之意不如此堯典之書乃係之虞今書之堯典不曰唐書曰虞書訖書序孔子討論墳典斷自唐虞以下于周非固抑唐而進虞也幹下意書得於虞氏之史官謂之虞則可謂之唐不可也有所證據夫子且不敢以無證之書實堯典為唐遷其敢以無所考信之記而遂以五帝名表哉以夫子形容太史公用事甚活且五帝之記三代以來未嘗無考也且放寛一著周外史之所掌則三皇五帝之書也禮春官外史掌三皇五帝之書楚左史之所讀則三墳五典之書也書序春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘使遷也生於三代之時周旋於周外史楚左史之列將上文來與司馬遷打合則以帝王之書表帝王之世無庸寘疑信於其間也使司馬遷如外史左史之有所證據則其世表必名五帝三代世表是以上皆放寛説奈何戰國以來諸侯去籍帝王之記己先壞孟萬章北宫錡問曰周室班爵禄也如之何孟子曰其詳不可得聞也諸侯惡其害己也而皆去其籍秦人焚書帝王之記則盡泯書序秦始皇滅先代典籍焚書坑儒漢興君子所恃以考上世之源流而究見其統緒之所自出者以屋壁之六經存也書序魯共王好治宫室壞孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書也然詩者國史之所記詳於周而及於商五帝之事不記也詩大序國史明乎得失之政載詩之風雅頌載商周事為詳謂詩不五帝事無所證書者記書之史也始於堯而終於秦五帝之典不全也古史叙書謂之古史又書始堯典終秦誓謂書亦不載五帝事無所證至於易言黄帝通變之事僅數語耳而其世次先後亦不可知也易繫辭神農氏没黄帝堯舜氏作通其變使民不倦後謂易雖載五帝事亦不詳言其世次之先五帝之世所可得而聞者系牒之有書世表之有載本出處下文於是以五帝繫牒尚書集世紀黄帝以來訖其和為世表然皆出於百家之書其為不雅馴則一也百家之言無所考證然史五帝紀太史公曰學者多稱五帝尚矣尚書獨載堯以來而百家言黄帝其文不雅馴薦紳先王難言之遷將絶之而不記歟設疑下則三代世繫之有記而黄帝以來獨無之非所以尊本繫之自出也司馬遷於三代世表所以有五帝三代之記尚矣之言將從之而盡信之歟再設疑下則三代之事猶有明證五帝之世經無可考也三代之事可以證之經五帝之世無所考究也夏禹之後有啓有太康吾可證之書書益稷啓呱呱而泣注啓禹子也又五子之歌太康失邦注啓子也湯至太甲而外丙仲壬又介乎其間吾可證之孟子孟子萬章伊尹相湯以王於天下湯崩太丁未立外丙二年仲壬四年太甲顛覆湯之典刑伊尹放之於桐三年趙氏曰太丁湯之太子未立而死外丙立二年仲壬立四年皆太丁弟也太甲太丁子也周自文武成康而次其譜繫之著於小史者皆可按而覆也周譜繫圖周文王武王成王康王昭王穆王又書君牙惟小子嗣守文武成康之遺緒至於黄帝顓嚳其世次之先後不知何所取證哉黄帝顓頊帝嚳於經無所考證夫惟世次不可得而詳而五帝之名自孔安國且有異説按劉道原通鑑外紀云云小司馬以伏羲女媧神農為三皇未知何據蘇子以伏羲神農黄帝為三皇以少昊附顓頊高辛堯舜為五帝者盖本孔安國序書謂伏羲神農黄帝之書謂之三墳少旲顓頊高卒唐虞之書謂之五典故以黄帝為三皇少吴為五帝又書序注云先儒解三皇五帝與孔不同則三代之記其視五帝之記其詳畧虚實未易同年記也三代之記詳而實以其有經可證五帝之記畧而虚以其無所考證故不同也何者三代之記有經之可稽是者得以筆非者得以削三代之記可證之經故可信五帝之記獨出於百家之言百家可信乎五帝之記出於百家之雜記故可疑則其世表之作雖記五帝而獨以三代表為名者遷蓋未敢自以為信然照前面主意故寜闕其名以俟後世之訂正乎所以闕五帝之名而不標於世表之首嗚呼表則記之表亦名之三代也表則記之名則削之五帝也主意發盡後世覩世表之名則五帝三代之記其是非有不待辨者遷之意微矣雖然遷誠有疑於五帝之記則記之足矣不表其世何害哉承上意再辨難是不然一物不知君子所恥晉張衡傳云仲尼恥一物之不知疑以傳疑君子謹諸史記世表云信以傳信疑以傳疑自後世譜牒之學不明遂以世繫之書為無益専責後世之人不明譜牒之學而不知帝王源流之所自出且不能究見其本末何以議世道之損益商古今之得失哉既不明帝王世繫之源流何以知其損益得失後之學者不察史遷之深意而猶肆其譊譊之辨譊譊言其口卞之捷給也此正遷之所謂難為淺見寡聞者道也司馬遷云云責後世之人淺見寡聞不知史遷世表之意謹之哉謂不可輕忽也謹論三代之記有經可證而五帝之記無可考證故不以五帝名表有所考證格與五帝三代之記論同格聖人成書成言髙山出處揚子五百聖人之言逺如天賢人之言近如地云云聖人矢口而成言肆筆而成書言可聞而不可殫書可觀而不可盡立說書者言之所寄而言者心之所形心非言不能以自明言非書不足以為證聖人以吾之心而寄之言以吾之言而筆之書使天下後世由聖人之書而求聖人之言由聖人之言而遡聖人之心則其所見所聞有可得而證矣批云辭意明白最利初學論曰因所見而證所聞自所見之言以證所聞之書帝王之心法於是乎信矣主意心形於言言寄於書夫書者言之所寄言者心之所形順發主意求其心而不求其言則其心不能以自白於天下心非言則不能以自明求其言而不求其書則其言不能以取信於後世言非書則不足以為證所傳無證言不驗之書則無證所寄無迹心不寄於言則無迹聖人且奈何哉結上生下是故聖人以吾之心而寄之言以吾之言而筆之書主意從心上發出去佔畢之所載簡編之所陳記學記今之教者呻其佔畢雖若不足以盡吾精神心術之妙且占便宜説而聖人亦惟假是書以寓吾之言托是言以發吾之心倒歸在心上使是書之在天下至萬世而不泯書者言之所寓則吾不言之言亦與萬世而無窮心者不言之言也與講腹相應夫如是則天下後世由聖人之書而求聖人之言因聖人之言而遡聖人之心主意則其所見所聞寜不至是而有所證耶照冒頭聖人成書成言子雲之意如此耳談者類曰言者道之漓也漓澆薄也書者言之贅也贅餘剩也太上忘言何以言為謂不必言貴記曲禮太上徳上古結繩何以書為謂不必書世易繫辭上古結繩而治後聖人易之以書契聖人宜若泯聰明黜智慮而秘天下於不可見聞之地也此是放寛一著謂上古聖人無容心於此然心而非言則無以啓天下之聞應冒求其心而不求其言則其心不能以自白於天下言而非書則無以信天下之見應冒求其言而不求其書則其言不能以取信於後也故聖人不憂其書之不足信而憂其言之無所證言證諸書應冒書者言之所寄不憂其言之無所證而憂其心之無所寄心寄諸言所應冒言者心之形何者設問目力至於離婁固明矣孟離婁上離婁之明又聖人既竭目力焉離婁能喻人以己之所見注離婁古之明目者形此如聖人之心於言而不能使衆人見其所見故無規矩則無以證其明同上不以規矩不能成方圓如聖人之言要以書為證耳力至於師曠固聰矣同上師曠之聦注師曠晉之樂師知音者也又聖人既竭耳力焉此如聖人之心形於言師曠能喻人以己之所聞而不能使衆人聞其所聞故無六律則無以證其聰同上不以六律不能正五音注六律謂黄鍾太簇姑洗蕤賔夷則無射五音謂宫商角徵羽如聖人之言要以書為證聖人者道之離婁師曠也歸聖人身上言者其目力耳力也書者其規矩六律也總上文有法知離婁師曠之所以為目力耳力則知聖人之所以為心法者矣照主意蓋聖人者天下之法則繫焉時人之耳目寄焉貫上耳目字其一言一語無非精神心術之所寓應冒言者心之所形然是言也發之於心驗之無形視之無迹能使一時聞之不能使後世聞之應冒所寄無迹所傳無證等語聖人寜忍聴吾言之窮也哉應冒以吾之言而筆之書意是故危微精一允執厥中舜之心形於言矣書大禹謨人心惟危道心惟微惟精惟一允執厥中然必寄之於禹謨之書見上注嗟爾萬邦明聴予誥湯之心形於言矣書湯誥王曰嗟爾萬邦有衆明聴予一人告然必筆之於湯誥之書見上注西土有衆咸聴朕命武王之心形於言矣書泰誓中王乃狥師而誓曰嗚呼西土有衆咸聴朕言然必寓之於泰誓之一書見上注夫聖人之心其精神運於亭毒之表其思慮出於事物之外先説聖人之心大處聖人之言大而天地不足以容之幽而鬼神不足以測之次説聖人之言大處彼區區之簡牘曾謂足以盡聖人之心術乎反説歸在聖人之書上然聖人終不廢此者亦念夫發之於心者其言無所證筆之於書者其言有所稽慮冒小講數語誠使禹謨常在舜雖不作而舜之言未嘗不在天下也吾心之言其可勝用乎倒斡前面所舉舜事湯誥常存湯雖不作而湯之言未嘗不在後世也吾心之言其果有窮乎倒斡前面所舉湯事泰誓常自若武王雖不作而武王之言亦未嘗不窮天地而亘古今也吾心之言其旦暮而盡乎倒斡前面所舉武王事而右三股俱應冒頭使是書之在天下至萬世不冺則吾不言之言與萬世而無窮嗚呼嗟嘆之辭由古及今去聖人之世如彼其逺學孟子語而心法之所在猶有足稽者焉照主意豈非聖人言之與書相維於無窮者歟應冒所見所聞寜不至是有證等語雄之言曰言可聞而不可殫也書可觀而不可盡也舉出處下文雄其知聖人之心矣繳結歸重在心字上應破語雖然書不盡言言不盡意易繫辭書本於聖人之言言出於聖人之心且順説前面主意而是心又有非言書之所能盡也又推廣一步説雄之所謂不可殫不可盡者乃其所謂成也本文喝出成字故煥乎文章而有所謂巍巍乎成功莫之能名於是謂之成語子罕巍巍乎其有成功也煥乎其有文章聲成文謂之音而至於動天地感鬼神於是謂之成見詩闗睢篇是其所謂成者非斐然之成者集百聖之大成者也語狂簡之小子斐然成章不知所以裁之孟孔子之謂集大成者金聲而玉振之也成言成書雖特出於聖人一矢口一肆筆之間本文聖人矢口而成言肆筆而成書而要其成功則成順致利曲成萬物惟㡬惟深以之成天下之務也觀乎人文以之成天下之化也揚子聖人成天下之大順致天下之大利易繫辭曲成萬物而不遺又繫辭云云又賁卦舉數十箇成字來影帶題上成字夫如是聖人成言成書豈苟成乎哉結尾全力在成字上謹論順題發明格與王者之論同意合宫衢室聴問如何李瓘出處中説問易篇文中子曰議其盡天下之心乎黄帝有合宫之聴堯有衢室之問云云皆議之謂也立説黄帝之時其事尚簡所以合宫之議惟聴之之畧固不待問之之詳帝堯之時不如黄帝之時其事已繁所以衢室之議要問之之詳而不如聴之之畧非帝堯之問求詳於黄帝之聴也時有先後事有簡繁固應爾也祭酒常挺批云議論正大首尾照應原題用同人咸卦之義最親切有味諸巻所無且氣勁而語老必非少作論曰聖人將以盡天下之議總説黄帝與堯聴問之意而不能無詳畧之異者黄帝合宫之聴則為畧帝堯衢室之問則為詳世道為之也謂堯之時已不如黄帝之時故問詳於聴夫太上本忘言也黄帝以前無聴亦無問言之瀆者非古也有聴有問便不如無聴無問之時况於詢謀之地指合宫衢室愈詳而愈切乎帝堯之問又詳於黄帝之聴蓋自風氣始開已非太古忘言之日暗指黄帝時已不如太古之時忘言於是乎有聴政之地以來天下之言黄帝合宫之聴言固聖人之所樂聞也幹轉而天下卒無事之可言無言則無可聴聖人之所以優游於此者合宫之地亦惟相忘於無聲之表無言可聴雖聴之吾亦不得而聞也黄帝雖欲聴言而終於無言之可聴自皇而帝天下之事日以詳帝堯之時不如黄帝之時聖人將以通天下之情則其心又何如哉説堯問天下之意於皇皇四達之衢説衢室意為并謀兼智之地出處本文并天下之謀兼天下之智聴之猶以為未足且進而加之問焉聴之則不形於言問則費辭説了卒之洞達無隠上下相孚雖問之之詳亦如聴之之畧而聖人亦得以遂其恭已無為之心語夫何為哉恭已正南面而已矣則堯之時猶黄帝之時也文字圓轉與後相應然則以衢室視合宫則其制為愈詳衢室之制詳於合宫聴而進之問則其言為愈切帝堯之問切於黄帝之問非衢室之問固求詳於合宫之聴也倒幹一轉時有先後事有繁簡固應爾也黄帝居帝堯之先其事簡帝堯居黄帝之後其事繁所以問詳於聴而聖人大公無我之心則一而已矣聴問雖殊而二聖人之心則一合宫衢室聴問如何請申王通氏之言夫公論其天道乎譬喻起開闢以來天開地闢天道不容一日息則公論不容一日泯以天道比公論説得開闔公論猶一日聖人無兩心且説聖人求言之心則一則聽可也問亦可也奚其異設問曰無異也答聽與問本無别特世數之相去有不能以強同爾應冒子世道語謂五帝之時不如三皇之時世數不能以強同申上文則事愈繁而言愈悉制愈詳而情愈切應冒子繁簡詳切等字此非聖人意也勢也聖人之心本不欲如此以制於時變之不同耳學栁子厚封建論文法吾求之易包犧氏以結繩為政其言泯如也從太古説來其時尚未有言易繫辭古者包犧氏之王天下也云云於是始作八卦以通神明之徳以類萬物之情作結繩而為罔罟上棟下宇之未制其宫室無有也同上上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨宫室且無有况於合宫乎衢室乎引歸合宫衢室意謂是時且無宫室安有聴問吾觀同人一卦而曰同人于野亨此固聖人所以通天下之志考官批云用同人卦義親切有味易同人于野亨利涉大川云云惟君子為能通天下之志又六二同人于宗吝之以此比衢室問然至於咸而曰以虚受人咸卦象曰山下有澤咸君子以虚受人夫以虚受人者心之感也承上文而同上聖人感人心天下和平不曰感而曰咸咸者無心之感有以潜通於忘言之表本伊川語咸無心之感以此比合宫之聴吾故曰衢室之問同人于野之意也合宫之聴其咸之無心以虚受者歟總上舉易為證二段見得問為詳而聴為畧且合宫古明堂也本出處主合宫明堂異名也而黄帝之聴必於是先説黄帝有合宫之聴吾想是宫也陟降左右神明森列詩文王陟降在帝左右又韓文與孟簡書天地神祇昭布森列非可誣也其聴也真可以對諸天而無愧以上説黄帝合宫之聴如此衢室亦古明堂也本出處衢室明堂異名也而堯之問必於是又説帝堯有衢室之問吾想是室也無門無旁我闥八荒揚子無門無旁四達皇皇又吕與叔克已銘洞然八荒皆在我闥其問也真可以質諸人而無隠以上説堯衢室之問如此王通氏均以為盡天下之議總上二股見本題注則堯之心固黄帝之心也應冐子聖人亦得以遂其恭已無為之心則堯之心猶黄帝之心也惟夫事變由簡而入繁古制由畧而入詳應冒子繁簡詳畧四字此是起文堯固未得遊乎黄帝忘言之天也應冒風氣始開已非太古忘言之日自皇而帝天下之事日以詳等語脱奥論舜不得以遊乎堯之天句法此曰聽曰問不能以不異世道既有繁簡之不同故聴問有詳畧之或異何則設問前乎此者天地絪緼猶太初也用繫辭語生人蚩蚩猶古始也蚩蚩注敦厚貌氓之蚩蚩又劉孝標嘗著絶交論天下蚩蚩此説太古之時可以忘言迨陶唐氏洪水亟矣而非合宫調元氣之時謂堯之時不如黄帝之時有書堯典湯湯洪水方割又唐陳子昂傳疏黄帝合宫虞總章云云皆所以調元氣和陰陽也苗民作矣而非合宫和天人之日書大禹謨三旬苗民逆命又隋牛𢎞議傳議曰明堂者所以通神明感天地出教化崇有徳黄帝曰合宫云云噫堯之問所以急於黄帝之聽歟總上文謂堯之時既不如黄帝之時是以問之之詳不如聽之之畧故夫合宫之名不可得而考擺去合宫歸在衢室上來至於衢室則闢之通途大衢而為採民言也明矣本出處注衢室明堂異名也當衢為室以采民言也黄帝之聴不可得而聞擺去黄帝之聴歸在堯之問上來至堯之問則諫鼔謗木之下有不容一日釋者矣通厯堯定五岳置諫鼔又前文帝紀朝有進善之旌誹謗之木注善旌堯設之五達之道令民進善也吾求其當時所聴之人自廣成子一人之外無聞焉黄帝之所聴者一人而已比堯所問之人則為詳問莊在宥篇黄帝聞廣成子在空同之上進拜稽首而曰聞吾子達於至道敢問治身奈何而可以長久云云詳見下注而咨四岳稽于衆與夫鰥寡之辭皆得以自通於密勿之前者何其詳書堯典咨四岳又大禹謨稽于衆舍已從人又吕刑皇帝清問下民鰥寡有辭于苗應冒詳字吾又求其當時所聴之事自至道窈㝠之外無他語黄帝之所聴者一事而已比堯所問之事則為詳莊在宥黄帝問廣成子云云廣成子蹷然而起曰吾語汝至道至道之精窈窈㝠㝠至道之極昏昏默默而曰平土曰殖穀與夫遏絶有苗亦必因其辭而聲其罪者何其悉書舜典帝曰俞咨禹汝平水土又吕刑禹平水土主名山川稷降播種農殖嘉穀又皇帝哀矜庶戮之不辜報虐以威遏絶苗民無世在下應冒悉字由是觀之合宫之聴無聲也無言也與天俱游也應冒聖人相忘於無聲之表子詩無聲無臭又語予欲無言又莊心與天游衢室之問為其有辭也無告也雖蕩蕩之天欲無言得乎應冒聴之猶以為未足且進而加之問焉語書吕刑鰥寡有辭于苗又大禹謨不虐無告又惟天為大惟堯則之蕩蕩乎民無能名焉黄帝非忘斯世也堯非媚斯民也應冐子非衢室之問固求詳于合宫之聴也理也勢也應前非聖人意也勢也聖人亦不自知也總結上文不然去之千餘載而清問等語猶見於吕刑書吕刑詳見上注堯問一篇至形於莊叟莊子有堯問篇獨黄帝之所謂聴者終莫得而髣髴何也反難謂堯之問尚有可考黄帝之聴無所考一詳一畧可以見矣吁是可以論其世矣主意之應破世道為也意抑均之為明堂也均之為盡天下之心也引本文畧轉作結尾堯惟憂其時之不黄帝若也故其問也切於聴應前語迨夫一問之餘萬感俱㑹歸重問字庶績熙矣萬邦和矣書堯典協和萬邦又庶績咸熙堯何心哉亦恭已無為而已見前注此康衢童子從而歌之曰不識不知順帝之則列子仲尼篇堯治天下五十年不知天下治歟不治歟云云堯乃微服遊於康衢聞兒童謡曰立我蒸民莫非爾極不識不知順帝之則至於是則堯之時歟黄帝之時歟打聚説堯與黄帝之時則一也抑無懷大庭之時歟謂堯黄帝之時與上古無懷大庭之時則一然則欲知合宫之聴者當觀之衢室欲知衢室之問者惟求之康衢打合得艷麗可觀謹論次名論亦佳但自講題以後文勢寖弱矣順題發明格與合宫衢室聽問論同意王者之論如何戴慶焨出處荀子王制篇王者之論無徳不貴無能不官無功不賞無罪不罰朝無幸位民無幸生百姓曉然皆知夫為善於家而取賞於朝也為不善於幽而䝉刑於顯也夫是之為定論是王者之論也立説謂粹古之世上下相孚於忘言之中世道不古而後賞罰之論興焉王者非不欲忘言也不容不見於言論也時當戰國㫖意不明荀卿子有感於王者之事故有此語然賞罰之用見於言論之間亦豈王者所樂乎批云立意髙行文老步步照應如珠走盤深得論體論曰自粹古忘言之化不復見感嘆上古不言賞罰之真情不見於後世而後人主出而維持世道始不容於無言矣後之人主不得不明賞罰之論夫聲色示人非聖人之所尚也以賞罰之用而見於言論非王者之本心有王者作夫豈不欲以精神心術感通天下使夫人自得夫好惡之正哉謂王者非不欲忘言而使人知善之可趨惡之可避哉時非上古俗非樸略王者之時非如粹古之時凡昔焉之淳厚篤實者一轉而漸入於浮偽矣粹古之時則淳厚篤實至王者之時已有浮偽之漸適斯世也而王者出焉照破題引入小講即吾心之公敷暢厥藴心形於言示人以善善惡惡之方善善則勸之以賞惡惡則懲之以刑蓋有不得已於此者照主意以聲色示人非聖人之所尚也以其不得已之心形而為不得已之論以刑賞而見於言論非王者之本心是雖不足以擬忘言之盛固不如粹古不言刑賞之盛照破題而此心所存明白洞達昭然無隠於天下王者之心形於言論明示賞罰舉天下咸知上意之所在而為之趨捨焉天下知賞之可慕則趍善知刑之可畏則舍惡則與後世以神相示以機相使者抑又不侔矣以此心而形諸言固不如粹古之忘言亦勝戰國之時用智術者要之以聲色示人豈真王者之所欲哉方歸本意荀卿談刑賞於戰國而謂有王者之論在引本文吾謂王者深不樂有此論也發盡主意王者之論如何請嗣言之夫粹古忘言之化不見於世乆矣便照破題第一句意上如標枝下如野鹿莊子天地篇至徳之世上如標枝下如野鹿言其時風俗尤樸野當此之時不賞而勸不怒而威前公孫𢎞傳上古堯舜之時不貴爵賞而民勸不重刑罰而民不犯形迹既忘言語亦泯一人之心千萬人之心也粹古之時忘言如此固無待啓之而後明迪之而後悟諄諄於口說之滕若後世之尚口乃窮者以上應接題聲色示人非聖人所尚二句易咸卦咸其輔頰舌滕口説也又困卦有言不信尚口乃窮也時運而往樸散而漓應冒子時非上古俗非樸畧唐虞之世去上古未逺也唐堯虞舜之時屋比可封後楊終傳堯舜之民可比屋而封象畫不犯漢武帝制冊曰昔在唐虞畫象而民不犯淳實忠厚之化猶有存者應冒淳厚篤實四字而天命天討已不容忘言於此書天命有徳云云天討有罪降是則王者矣以上是帝者事由帝而王引入本題使天下而尚洪荒人心而尚簡古三數王者繼世立極亦何樂於揭此之論昭然為的於天下哉使世道常如粹古之時王者亦不立為刑賞之論若他人則便從王者之論説去然無此以上數句則文勢太直了故如此宛轉應王者深不樂有此論也嗚呼王者之論王者之心也照主意心字王者之心公平而廣大明白而簡易譬猶大明當空萬象呈露王者之心如日月之大明而其宣之言論者亦不過欲天下知善之當趨惡之當避人人有士君子之行而毋蹈於小人之歸而已以吾心賞罰之公而形諸言論使人知所趨避以上應冒子即吾心之公敷暢厥藴示人以善善惡惡之方詩既醉云云王者之論雖不足方古者忘言之盛而王者之心固與忘言者之心無以異也應冒子是雖不足以擬忘言之盛而此心所存明白洞達等語上易知而不易使上宣明則下治辨語見荀子吾方幸王者能與天下為公亦何敢必以粹古之事責之使世之作福作威者托之以自神哉應冒子舉天下咸知上意之所在與後世以神相示以機相使意甚矣世之以籠絡駕馭自神者易以㒺吾民也接上自神字自此以下數行照小講説其出幽幽其入𡨕𡨕不以心術㫖意明示天下迎之不見其端隨之不見其首懵乎茫然無所底麗老語照冒子以神相示以機相使意彼固以為得聖人神道設教之妙易麗卦云云應前神字而不知世道不醇人心不古暗説戰國機愈神則心愈蔽心愈蔽則法愈滋此心之公不形於言則其天下皆不知賞刑之用而法愈甚天下固欲求一日之遷善逺罪而不可得也孟盡心王者之民皥皥如也殺之而不怨利之而不庸民日遷善而不知為之者然則王者之有論獨非問之大者引歸本題紐結王者固不欲以言語瀆天下而不能不至是應冒接題聲色示人非聖人所尚意亦以有功不賞有罪不誅雖唐虞不能以化天下漢宣帝地節三年詔云云粹古無言之化固非吾所敢望也應破語而復㫖意不明心術不露其與以籠絡駕馭自神者相去一間耳應前段語結盡本段意求之於書甘誓而下殷盤周誥無慮數百言並見尚書賞刑之論間見層出王者之論興而王者之心白矣甘誓殷盤周誥皆王者言刑賞實亊須如此拈出抑孰識王者之心雖白而王者之本心固不能以自遂也耶又轉入本意以聲色示人豈王者之所欲哉故嘗謂王者之心一天也他人說到此則筆力竭矣此又以天之心比王者之心説得廣大雨露之霑濡雪霜之剥裂天之賞刑也王者之賞如天之雨露王者之罰如天之雪霜天未嘗以言語示人而機動化神莫測其妙固有終天下日由於福善禍淫之中而不自知者亦猶王者未嘗以言語示人而天下之人自知賞之可趍罰之可避又書云天道福善而禍淫世降俗移王者不得以天道化天下反斯世於醇醲簡朴之盛接上天字要其中心之所存則豈王者之得已哉應冒子以其不得已之心形為不得已之論有能因王者之論遡王者之心亮其不得已之意而知其與世之機密不測者實有間焉則㡬矣此數句繳盡小講之意應前面語彼戰國何如耶就荀卿感時之意結極得體機巧相角詭偽相勝應冒以神相示以機相使意為君者非無言也不以言明民而以言愚民使天下莫識避就之方而賞罰之逆施者多矣應㫖意不明心術不露以籠絡駕馭自神等語荀卿生其時目其弊而遐想乎王者之論引本文嗚呼粹古忘言之盛吾不得而見之矣應破語文字圓轉如走盤珠得見如王者斯可矣學論語句法此固卿之心也然則卿其有感也耶収拾一篇之意無遺恨謹論可與前篇參看推原題意格與鄒魯守經學論同意漢諸儒修藝文如何謝奕孫出處後漢鄭𤣥傳論自秦焚六經聖文埃滅漢興諸儒頗修藝文及東京學者亦各名家而守文之徒滯固所禀異端紛紜互相詭激遂令經有數家家有數説章句多者或至百餘萬言學徒勞而少功後生疑而莫正立説六藝之文因秦焚之後文字廢失諸儒修舊補廢無非齊魯之士豈非此邦漸染聖賢之餘化其天性純篤出於自然此六經之學所以復存也此意本之司馬遷儒林序議論見題下注批云就題目大處起議論足見學問精深見識超卓使低手當此題不過就修字上粧㸃耳安能有此筆力有此文章論曰經學既廢而復存謂六藝之文既廢於秦火復存於漢皆諸儒修之之功可以驗聖賢餘澤之所自矣且含蓄主意魯指修藝文者皆齊諸儒夫已廢者未易以遽興而已缺者未易以遽全也且説藝文已廢缺了未易修有如當經學廢缺之餘暗指西漢而畢力補復猶能使來者之有考諸儒能修之有補後世此豈無自而能然哉幹一轉結上生下自字應破題亦惟聖賢之餘化深浹乎禮義之邦指齊魯二邦而考古好學實出於天性之自然指齊魯諸儒天性純篤故其前後相承源流如一前後諸儒皆以修藝文為已任雖經學之厄於一時經焚於秦而相與維持遺文卒賴之而不滅也漢諸儒修之之功嗚呼是其源委盖深長矣亦含蓄主意來説應破聖賢餘澤之所自意秦壞六經而漢儒修之壞之之易而修之之難也敘本文然藝文賴之以復修者則齊魯之士居多發出主意何哉設問聖賢之教薰陶已深而世習其業終久不忘指齊魯諸儒如此秦縱壞之而人心之經學終不可得而泯也見得齊魯諸儒與他邦不同然則六藝之修獨非齊魯聖賢餘澤之驗歟發出主意漢諸儒修藝文如何請因范蔚宗之言而有考焉後漢乃范曄所著曄字蔚宗夫儒林有傳自太史公始也司馬遷也太史公之序儒林也叙遷本文其言夫子之述六藝所以憫時行道之意誠深切矣史儒林周衰孔子憫王道廢而邪説興是以詩書修起適齊聞韶西狩獲麟曰吾道窮矣因史記作春秋以寓王法蓋至論齊魯之士則及其習俗之雅厚天性之純篤同上至于始皇儒術既絀然齊魯之間學者獨不廢又見下注與其更變履艱而卓然固守之意反覆慨嘆拳拳不釋焉同上秦季焚詩書坑術士六藝缺矣髙帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂弦歌之聲不絶豈非聖賢之餘化存禮樂之國哉夫齊魯之間於文學自古以來其天性也而復從為之辭曰漢興諸儒始得修其經藝同上漢興諸儒始得修其經藝講習大射鄉飲之禮始嘗疑之設疑聖賢闡人心之理而作經又原聖賢作經之意將欲使天下之昭昭非一方一國之所得而私也非獨齊魯為然通經好古奚獨齊魯之士為然發明上意而經學之復修卒亦齊魯之是賴喝出齊魯主意何歟設問蓋天下之理非出於漸染之已深者則其所習為易囘反應冒齊魯得聖賢之餘化意非出於情性之固然者則其所業為易變反應冒齊魯諸儒天性之自然齊魯聖賢之邦也孔孟周遊其間而以經學淑後進者𢎞矣見得齊魯得聖賢之餘化化行當時澤在人心誰忍忘之非惟不忍忘也而且安之以為業矣見得齊魯諸儒天性之自然講學於儒術既絀之後弦歌於引兵迫城之餘並見原題儒林傳注風聲氣習終始純固申前意史固謂其襲聖賢之餘化而天性然也繳前意相照應是雖烈熖之酷秦焚詩書禁網之苛漢除挾書之禁而學士大夫口誦其文心惟其義惟念也兢兢傳守以世其家應冒世習其業終久不忘意固有經百變而不詘者矣應冒秦縱壞之而人心之經學不泯意藝文之復修非齊魯諸儒之功而誰歟反繳大有力自今觀之伏生濟南人也而言書田生菑川人也而言易皆其教之著於齊魯者也儒林傳言尚書自濟南伏生言易自菑川田生二人皆齊魯之儒髙堂生以禮名申公轅生以詩顯而春秋一經實胡毋生聲其學於不傳之後兹非炳炳於齊魯之間者乎同上言禮自魯髙堂生言詩於魯則申公於齊則轅固生言春秋於齊則有胡毋生此四人皆齊魯之儒自時厥後緝比遺編推尋斷簡説修藝文使繼之者有稽而傳之者有宗應冒猶能使來者之有考皆齊魯諸儒之力也歸重主意齊魯上夫自秦氏之厄而六經之遺響幾墜矣儒林傳秦焚詩書是數公者齊魯諸儒以其耳目之所及師友之所傳更相討論互為正救説諸儒之所講明如此而六藝頼之以復立絶者復續缺者復全而息滅者復盛數語説六藝得諸儒修之力萬世而下獲味六藝之全文而繼見天地之大造諸儒之功顧不逺歟指齊魯諸儒之功不然丁寛以易著於梁者也而原其學則本於齊之田何前儒林傳自魯商瞿子木受易孔子以授魯橋庇子庸至子乘授齊田何又丁寛傳寛梁人初梁項生從田何受易時寛為項生從者材過項生遂亊何趙綰以詩名於代者也而原其學則授於魯之申公申公傳魯人少事齊人浮丘伯受詩蘭陵王臧及代趙綰亦嘗授詩申公經學淵源信不為無所自來矣應冐題自字然則六藝之修吾安得不歸功於齊魯之諸儒乎繳盡講中意用實事作講題皆有證據嗟夫已廢者難修而既修者易定也藝文之復修諸儒用志亦甚苦矣擺出西漢諸儒而東京之士反不能因已修之書而求至當之論何哉引本出處設問大庭㑹議而戴馮以辨給禦衆後儒林叙傳光武正旦朝賀百僚畢㑹帝令羣臣能説經者更相難詰議有不通輒奪其席以益通者馮遂坐五十餘席韓歆欲立古學而范升陳元之徒紛如聚訟范升傳時尚書令韓歆上疏欲為費氏易左氏春秋立博士詔下其議云云升對曰云云陳元傳建武初時議與立左氏傳范升奏以為左氏淺末不宜立升聞之乃上疏云云觀蔚宗所載若任戴包薛之徒類皆互相詭激而非有志於聖經之奥㫖者也任安包咸薛漢並見儒林本傳無忝前修僅有康成一人而已題注下文鄭𤣥括囊大典網羅衆家删裁繁誣刋改漏失自是學者畧知所歸夫諸儒能全其書於經之已壞指西漢諸儒而後學不能守其業於經之已全指東漢諸儒諸儒能出力以任其至難西漢諸儒而後學不能平心以考其所易東漢諸儒遂使六經之粹學反累於衆氏之繁誣是則東京之士其有負齊魯之諸儒甚矣責東漢諸儒不如西漢諸儒蔚宗既以修藝文為諸儒之功而復以滯固所禀為守文者之病本題注其亦有感於漢興之諸儒也夫其亦有憾於東京之學者也夫末意雙結多少感慨意在言外妙論妙論謹論此篇以藝文之修皆齊魯諸儒之功後篇以經學之守皆鄒魯諸儒之力無非得聖賢之餘化兩篇文意一同推原題意格與前篇漢諸儒修藝文論同意鄒魯守經學緯焯出處鄒陽傳陽曰鄒魯守經學齊楚多辯知韓魏時有竒節立説鄒魯乃聖賢之邦當守聖賢之經學然文景以前鄒魯之諸儒不尚傳注猶知守聖人之經者武宣以後鄒魯之諸儒惟尚傳注而已安知經學之可守哉君子當觀其時可也馮厚齋批云史傳魯事甚多鄒事甚少此論謂鄒鄰於魯而合於漢既善立説善用事且考究精詳排布有理足觀學力論曰傳注之學未興説漢文帝景帝以前諸儒傳注之學未興則聖經之傳正矣言鄒魯所守之學却為近正君子於是得以考其時焉時謂鄒魯乃文景以前之鄒魯非武宣以後之鄒魯夫居聖賢之邦鄒魯之邦而傳聖賢之學聖經之學雖百世不變也前後當如一何必考其時哉設難斡時字蓋方其去古未逺聞道之士猶多答是時猶近古而上之人未始以利禄為誘人之具以待天下上人無他所誘當時學者惟知守聖人之經而已下人無他所誘又况幸而居聖賢之國者耶何况鄒魯之邦嗚呼降是而求之其學非不盛也降者下也謂下是經學亦盛而盈學者之口耳不過前日講誦之餘其去經愈逺矣説初間只是守聖人之經後來専一理㑹傳注魯夫子之國也魯聖人後鄰於魯而合於漢者有鄒焉鄒亦聖賢之後鄒人非魯比其聖賢亦出於其間鄒亦如魯故終漢世言儒雅者必先鄒魯惟鄒魯為正然鄒魯所守之經學者此文景以前之鄒魯非武宣以後之鄒魯也發出主意鄒魯守經學請申論之夫鄒魯何國哉直叙起自春秋而魯以周公之後為儒者之國周公封於魯而邾亦預玉帛盟㑹之列矣見下注云迨戰國而魯之諸儒以孔氏為家法自髙韓文楊墨塞路孟子辭而闢之云云今學者尚知宗孔氏而鄒以孟子之居往來四方賢俊之士矣孟子題辭鄒本春秋邾子之國至孟子時改曰鄒國近魯後為魯所并則其風聲氣習之所感何往非經學哉見得鄒魯二邦之學為正然君子猶得以考其時也應主意時字且鄒之入於魯久矣見上注孟子題辭而合為魯分同上鄒國近魯後為魯所并離為魯東海則自漢始見前漢地理志凡以名見於二漢儒林之士而號魯東海之儒者皆鄒魯之經學也前漢儒林傳孟喜東海蘭陵人申公魯人后蒼東海郯人孟卿東海人嚴彭祖東海下邳人顔安樂魯國薛人嘗竊深求之考究惟見后蒼之詩訛而為翼氏之五際非出於經而出於傳注也蒼非東海乎翼奉傳詩有五際注孟曰詩内傳注五際夘酉午戌亥陰陽終始際㑹之嵗則有變改之政又見上注惟見夏侯之書甚而為父子之同異非出於經而出於傳注也夏侯非魯乎夏侯建傳勝非建曰章句小儒破碎大道建亦非勝為學疏畧難於應敵至於孟喜之傅㑹乃轉而從蜀人之繆説則是以東海之士從蜀士之學抑又甚焉傅與附同孟喜傳蜀人趙賔為易文以箕子者萬物方荄滋也大抵武宣以後士習日傳武帝宣帝以後諸儒専尚傳注之學不如文景帝以前由訓詁而為章句由章句而為文辭為科目文體日變一日去經愈逺而經學愈駁傳注愈専經學愈雜其師半鄒魯為師者半居鄒魯之地其從而學者非鄒魯之士必其游鄒魯者也其從游者無非鄒魯之人又安在於守經學也哉武宣以後諸儒不能守經學然則鄒陽之言要必有所考矣引本文夫論一鄉之士不若論一時之士用孟子語照時字主意楚皆卿材可以觀於子木聲子之時左襄二十六年聲子如楚子木問晉故對曰晉卿不如楚其大夫則賢皆卿材也以此比文景以前之鄒魯而不可以言於屈平子蘭之日屈平為楚懷王左司徒子蘭懷王女弟以此比武宣以後之鄒魯衞多好善可以考於衞文復國之初干旄詩衞文公臣子多好善賢者樂告以善道也以此比文景以前之鄒魯而不可以議於夫子正名之際語十三子路曰衛君待子而為政子將奚先曰必也正名乎魯以此比武宣以後之鄒吾故以謂欲求經學於鄒魯者盍亦求之於文景以前而已矣觀上面二股之証則題意曉然矣今夫孔孟之化無非鄒魯故地孔子居魯孟子居鄒顧何獨於文景之前設難蓋方是時干戈方息文墨未興則其風俗為猶古應冐意見下注庠序未盛科目未分則其意向為猶古應冒去古未逺聞道之士猶多天下之學者惟鄒魯鄒魯之學者惟聖經其得之於私淑孟有私淑艾者講之於羣居者語羣居終日皆吾夫子之易詩書春秋而已孟序孔子自衞反魯云云乃刪詩定書繫周易作春秋而為之師者詩有申公禮有髙堂生焉前漢儒林傳言詩於魯有申培公言禮則魯髙堂生為之徒者有綰與臧焉又申公傳蘭陵王臧本治詩而趙綰亦受詩文景之際如申公之門受業以千數此固陽也所親見而喜道同上弟子自逺方至受業者千餘人言其時鄒陽親見故喜而道及此語則其一時師友之傳終身不易之守自經學之外無他學也宜矣詠題上守經學字夫學不難於傳而難於守又喚守字起不守以經而守以傳注非守也要守以經不守之以心而守之以口耳非守也要守以心是故其守之堅也攻以異端而不能惑破以傳注而不能入奪以勢利而不能移如此方是守經學古經之禮止於十有七篇而已非不能為異日之四十九篇也懼其虧吾聖經之全也前藝文志漢興髙堂生傳古禮十七篇魯詩獨以經為訓而闕其疑豈誠有不知哉不如是不足為守也同上嗚呼此文景以前之鄒魯亦文景以前之經學也照冐主意而後之議者貶或者之議徒見其寂寥簡短章句不多得之師承僅一間見如前注申公髙堂生之徒往往太息不滿於庠序未遑之事儒林傳諸儒始得修其經學云云然尚有干戈平定四海亦未遑庠序之事此文景以前之鄒魯能守經學有足取武帝以來鄒魯之士多卿相鄒魯經學滿四方同上自此以來公卿大夫吏彬彬多文學之士云云詳見儒林傳則大書特書支分𣲖别以為盛而昌言之言鄒魯之學盛夫豈知經學之盛乃經學之衰哉此武宣以後之鄒魯不能守經學徒尚傳注之學不足取雖然陽也既親得而見之矣繳前意而區區歴聘徒欲訪竒謀之士以解一時之紛而已末抑鄒陽本傳梁王令人刺殺袁盎上責梁王始勝詭謀陽争不可故見讒及事敗迺思陽言齎以千金求解於上陽素知齊人王先生年八十餘多竒計即往見語其事先生曰云云誠難解也惜乎使其誠知經學之有益於人國方事變未萌君心猶正謂梁孝王為之訪求經學之士得其如韋孟王式者使在王所焉豈有異時之憂哉韋賢傳魯國鄒人也其先韋孟為楚元王傅又王式傳為昌邑王師以詩朝夕授王孟居魯也式亦受業於魯矣有據其仗節死義之風千載而下猶凛凛也謂韋孟王式能盡節則魯不惟守經學亦知守節義矣愈好髙帝知之本紀髙祖引兵圍魯魯中諸儒弦歌不絶知其為守禮義之國而梁之君臣不知謂鄒陽徒能言鄒魯守經學而不能救梁孝王之過豈惟梁王又為陽寛一著舉漢人之言鄒魯者未必知也謂當時鄒魯之士皆未知節義可守愚故發此以廣鄒魯於天下云推廣此意文字有抑揚謹論思古傷今格與易象魯春秋周禮論同意周禮盡在魯馮椅出處左昭二年晉侯使韓宣子來聘觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也立説周之禮廢於王轍之東則王制已無存周之書存於侯國之藏則王制尚可考韓宣子聘魯之日惜周禮之不復及觀易象春秋之書奮然曰周禮盡在魯者蓋以有易之象足以探是禮之原有魯之春秋足以志是禮之變因其書之僅可考而求其禮之已無存非於所深惜之中而致其所甚幸之意歟批云節節照應感嘆之意浮於言外論曰王制之不存固君子之所惜謂周禮已廢宣子所以惜之王制之僅可考亦君子之所幸也謂易象春秋之書猶有可考宣子所以喜之天下之理順說已廢者無據廢謂周禮已不存而有證者可推證謂易象眷秋猶可考周之禮其廢於王轍之東也宜若無有存者也周禮至周末已不存周之書其存於侯國之藏也固亦有可考者也易象春秋猶藏於魯國則尚可考即其書以推其禮由其義以求其制因觀易象春秋而知周禮之猶在有聖賢者出則一王之法尚冀其舉而行之指孔子讃易修春秋以明周禮意為後面張本君子無志於斯則已暗指韓宣子反說苟有志於斯也轉歸正安得不於所深惜之中致其所甚幸之意歟應破語惜幸二字繳結韓宣子以晉之臣而致魯之聘其請觀太史氏之書者引本文非徒博古也蓋觀禮也宣子之意不在書而在禮有易之象足以探是禮之原有魯之春秋足以志是禮之變此二句是一篇綱領得其所非望而滿其所甚欲宣子意當時周禮已不存今觀二書而知周禮之盡在魯是謂得其所非望而滿其所甚欲奮然曰此三字下得最好形容得宣子當時氣象出周禮盡在魯矣嗚呼嘆惜起周禮果在魯乎愚不得而知周禮其不在魯乎愚亦不得而知也就題辨論雙股疑下是學柳子厚封建論文法然而君子曰是秉周禮者也是天下所從資禮樂者也左閔元年齊仲孫湫來省魯難曰魯猶秉周禮未可動也若然則豈但盡在魯哉雖斷之以盡在是可也語有挑斡抑觀入春秋以來舉春秋時事來説隠桓争立而嫡庶之大法不立矣隠傳恵公元妃孟子卒繼室以聲子生隠公宋武公生仲子生而有文在其手曰為魯夫人故仲子歸于我生桓公而惠公薨是以隠公立而奉之仲子兼賵而夫婦之大倫不正矣隠元年秋七月天王使宰咺來歸惠公仲子之賵賵芳鳳反注助喪之物即位不告而君臣之大義不明矣同上元年春王周正月不書即位攝也注假攝君政不修即位之禮故史不書於策傳所以見異於常况於文物之微度數之末一非成王周公之舊禮惡在也言周禮之小者至春秋時亦不存宣子之言無乃爾是過歟難宣子所言學論語句法噫嗟嘆之辭我知之矣解上文詩書非為泰和計也而觀詩書者可以知唐虞成周之泰和揚子孝至或問泰和曰其在唐虞成周乎觀書及詩温温乎其和可知也周之班爵禄非以有籍而加損也而苟去其籍雖博物如聖賢不能言其詳孟萬章下北宫錡問曰周室班爵禄也如之何孟子曰其詳不可得聞也諸侯惡其害已而皆去其籍象去上聲以以上二股證本題如觀易春秋可知周禮盖古人之大綱小紀至纎悉也指周禮而或剥蝕毁裂之餘有非臆見之所能定應冒子周之禮廢於王轍之東宜若無存意而古人之殘編斷簡若甚粗矣而其本末源流庸有可以義起也應冒子周之書藏於侯國猶有可考意此宣子所以動心於易春秋之觀而奮然以為周禮之盡在於魯也歟引本文應舉題奮然曰字夫易何為者也肇伏犧而成於文王當是時周之禮未備也易釋文序伏羲因河圖而始畫八卦因而重之為六十四周文拘於羑里作卦辭是何文王於倥偬不暇給之日而為是迂緩不切之務耶設難疑易未足以存周禮若春秋則魯史爾其諸侯之策書赴告無國不紀也而豈復周公制作之初哉春秋序周徳既衰官失其守上之人不能使春秋昭明赴告策書諸所記注多違舊章仲尼因魯史策書成文云云上以遵周公之遺制下以明將來之法注崩薨曰告又設難疑春秋亦未足以存周禮也誠以文王之造周其精微之藴皆寫之於易而後世之變法改制者即春秋可以知其故也轉歸正意謂易與春秋皆可以存周禮象於謙而制禮易係辭謙尊而尤謙以制禮亨象於豫而作樂豫卦象曰先王以作樂崇徳象於萃而享帝立廟萃亨王假有廟云云王假有廟致孝享也此易也此易存周禮之小者而其大者自乾坤一畫而天地之尊卑以定高卑之貴賤以位通鑑文王序易以乾坤為首孔子係之曰天尊地卑乾坤定矣言君臣之位猶天地之不可易也周之禮非可即是以探其原耶書六羽則八佾之僣禮見矣隠五年公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也書三望則卜郊之失禮見矣左僖三十一年四卜郊不從猶三望書丘甲則制貢之非禮又見矣成元年三月作丘甲注周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人歩卒七十二人此甸所賦今魯使一丘出之譏重歛故書至於朝聘㑹盟以邦交書左朝如邾子來朝之類聘如晉知武子來聘之類㑹如公㑹戎于潜之類盟如陳及鄭伯盟之類蒐苗獮狩以國事書隠五年故春蒐夏苗秋獮冬狩皆於農隙以講事也注蒐索擇取不孕者苗為苗除害也獮蔱取也狩圍守也禘雩烝嘗以時祭書閔二年夏吉禘于莊公速也又經書大雩比三十四又桓十四年秋八月乙亥嘗書不害也又桓五年閉蟄而烝書凡三周之禮非可即是以志其變邪以上一段應冒子有魯之春秋足以志其禮之變後篇講中全襲此文法可以參看禮之未作必有以求其原之所自來禮之既失必有以稽其變之所自始總上二段自本及未皆有考焉應冒子可考意此宣子之所深幸也應冒子所甚幸意嗟夫嗟嘆敷演餘意成周一王之制萬世不刋之典也必待其人而後行應冒有聖賢者出則一王之法尚冀其舉而行之刋春秋序經者萬世不之書也昔者周公之相成王極其精神心術之運寓之文物度數之間雖與天地相為終窮可也説周公制禮之本意欲傳之萬世奈之何穆王立而周道始衰矣有宣王出則古可復也史周紀王道衰微穆王閔文武之道缺又詩宣王復古也平王東遷而周道益微矣出而復之者誰乎春秋序周平王東周之始王也其以上應冒子周之禮廢於王轍之東也是責非宣子之所能勝任也而已非宣子之所能忘情也應冒子苟有志於斯世二段玉帛以相見而典籍之是觀宣子之志篤矣説宣子來聘魯觀書之時慨嘆深惜之餘而奮然以為猶盡在是應冒深惜奮然字庶㡬周禮之有考而來者之可俟也應冒可考字未幾而孔氏出焉應有聖賢者出一段有其徳無其位書序有至徳而無至位彷徨四顧卒於讃易而修春秋兹非宣子之志邪書序先君孔子生於周末云云遂乃定禮樂明舊章刪詩為三百篇約史記而修春秋讚易道以黜八索不然孔氏得時亦嘗有志於夏殷之禮也之杞之宋曾無文獻之足徵也則固不能言之也語八佾夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也又見下卒有得於夏時坤乾之書記禮運我欲觀夏道是故之杞而不足徵吾得夏時焉我欲觀殷道是故之宋而不足徵吾得坤乾焉則即其義與其書以言之况宣子也引證歸本題然而連山歸藏與周之易而三者也而魯不之藏孔穎達易疏序三代易名神農一曰連山氏黄帝一曰歸藏氏既連山歸藏並是代號則周易稱易取山陽地名晉乘楚杌亦與魯之春秋而三者也而宣子不之觀孟離婁下詩亡而後春秋作晉之乘楚之檮扤魯之春秋一也以上二段應周之書存於侯國之藏是又何説歟又難宣子何不觀諸書而獨觀魯春秋兹非孔氏之杞之宋之意歟應上面引證語天下故曰魯有道之國也又挈魯説晉之宣子聘魯有書可觀本文吳之季札聘魯有樂可觀襄二十九年吳公子札來聘請觀於周樂云云諸國無之而魯有之是可幸也應甚幸意然魯有之而不用之亦可惜也應甚惜意孔子生於魯矣而道不行宣子何責焉繳孔子事出脱宣子後乎㡬千百年而河汾之士乃欲執此以往則又可重嘆也中説魏相篇子居家不暫捨周禮門人問曰云云如有用我則執此以往説從冒至大講皆先説深惜而後却説甚幸未意却先甚幸而後却又説甚惜皆文字之圓轉處可與後篇參看謹論後篇皆脫此篇文意思古傷今格與馮厚齋周禮盡在魯論同意易象春秋周禮如何羅志道出處左昭二年晉侯使韓宣子來聘觀書於太史氏見易象與魯春秋曰周禮盡在魯矣吾乃今知周公之徳與周之所以王也立説謂國以禮而立禮以書而傳天下不可一國無禮則亦不可一國無書有如易象足以探周禮之原春秋足以志周禮之變魯而有是書此固韓宣子幸其周禮之盡在魯然列國皆周之臣子今宣子之聘自魯而齊自齊而衞而是書獨於魯乎見而他國咸無焉書亡而禮與之俱亡君子安得不為世道惜乎批云立説既髙遣文警策有一唱三嘆之味當是老手論曰因書而知王制之僅存韓宣子因易象春秋之書而知周禮之猶在魯固可為世道幸幸者幸魯國之獨有此亦可為世道惜惜者惜他國之無此夫禮可以為國也久矣便説禮字識綱領古人寓是禮於典籍之間正欲為憑藉無窮之地周禮寓於易象春秋之書正欲存此禮為長久之計後之人有能保其書於不墜暗指魯有易象春秋之書而王制猶有考焉而周禮有所稽考豈不甚可喜者固可為魯喜而君子顧為是不滿何歟不滿字應破惜字畧難一難蓋國以禮而立周禮禮以書而傳易象春秋天下固不可一國而無禮周禮則亦不可一國而無書易象春秋苟於世衰道微之時春秋之時而亦絶無僅有為貴諸國皆無而魯獨有則君子之所憂殆有甚於所幸者矣憂字亦應惜字憂他國之無是書而幸魯國之有是書韓宣子晉卿也來聘魯庭觀書太史而特於易象春秋有取焉引本文誠以易足以探禮之原春秋足以志禮之變二書皆周禮之所寓魯而有是書也則周禮在魯固可為魯幸也應固可為世道幸然書不見於他國而獨於魯乎見禮不在於他國而獨於魯乎在君子寜不重有感於世變歟應冒亦可為世道惜感字亦惜之之意易象魯春秋周禮如何請申論之人皆曰論禮於叔季之世者不可以隆古例言也周末不可以古為比且就本題設難起古之盛也唐虞三代之時禮達於日用常行之間固不待書而後見天下皆知禮不待易象春秋而後知為餘意張本世變不古春秋之時得見典籍之禮斯可矣必有易象春秋之書方知周禮之所寓况國異政家殊俗有不能以一律齊詩大序云云苟於文獻不足之時而猶有舊章之可證語八佾夏禮吾能言之杞不足徴也文獻不禮足故也有書可觀猶可以知亦不啻衆狂而醒衆髽而冠也離騷衆人皆醉惟我獨醒又曲禮一冠而九髽注音撾散髪也猶他國皆無是書而我有是書喜將不暇而何議之為從原下至此應冒王制猶有考焉豈不甚可喜殊不知書備於一國不若列國之皆備禮存於一國不若列國之皆存不特魯國有之他國皆有之尤好聖人舉是禮之寓於書者正欲使天下之皆有書而望天下之皆知禮也應冒古人寓是禮於典籍之間數句正欲諸國皆知周禮豈特為一國計哉豈止為魯一國之計今駭於一國之僅有而稱嗟嘆慕反為當時之美談指韓宣子來聘觀書於太史氏見易象與春秋曰周禮盡在魯矣則是知足音之可喜而忘空谷之足悲也莊子逃空谷者聞足音而喜應固可為世道幸意譬如千金之家子孫蕃衍固有為之本者如周禮迨其後也僅存前人之遺緒者曾不一二如易象春秋之書或者指是以為誇以此為喜而不知所可恨者多矣可惜尤甚扵可喜易象春秋之在魯何以異是收入本題且夫易之為卦六十有四其吉凶皆以象告而其辭則文王之所為也史周紀西伯益易之八卦為六十四又易係辭八卦以象告而吉凶可見春秋雖魯史耳而赴告策書諸所記註皆周公之遺制也左序春秋者魯史記之名也云云上之人不能使春秋昭明赴告策書諸所記註多遺舊章仲尼從而明之上以遵周公之遺制文王寫精微之藴於易象實所以開周禮之原應冒易足以探禮之原周公垂紀載之法於春秋實所以防周禮之變應冒春秋足以志禮之變魯而有是易象也先説易象之書則因乾坤而知君臣之所以位通鑑文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣言君臣之位猶天地之不可易也因咸恒而知夫婦之所以别後荀爽策夫婦人倫之始故文王作易下經首咸恒因豫而知作樂崇徳之由易豫卦象曰雷出地奮豫先王以作樂崇徳因比而知建國親侯之本此卦象曰地上有水比先王以建萬國親諸侯凡周禮之所自出者皆可於是而探其端矣繳此段易象存周禮意魯而有是春秋也此説春秋之時則因朝聘而知私交之失左定十五年邾子來朝襄九年晉知武子來聘四年穆伯如晉報知武子之聘因侵伐而知兵交之禍左莊二十九年天子之師有鐘鼔曰伐無曰侵因雩禘郊望而知祠祭之非古左桓五年秋大雩書不時也僖八年秋禘而致哀姜非禮也三十一年四卜郊不從猶三望因稅畝丘甲而知賦斂之非制左宣十五年初稅畝非禮也成元年作丘甲凡周禮之所由壞者皆可於是而求其故矣繳此段春秋存周禮意然則韓子見二書於魯而慨然謂周禮之在魯非善於觀書者能之乎論本出處意易前一段講魯有象足以探禮之原後一段說魯有春秋足以志禮之變因説宣子因見二書而喜周禮之盡在魯而忽悟其所在者必其他有所不在者也言宣子獨謂周禮在魯而不在他國蓋人之常情駭於所見者必其所未嘗見言宣子獨於魯見此書而他國無之而君子不能不因是而有感也應冒君子寜不重有感於世變列國皆周之臣子典章文物受之先君者宜無以異如齊衞諸國皆當有此書易象豈獨私於魯者豈特魯國有之晉之乘楚之檮杌諸侯各有國史孟離婁下詩亡而後春秋作晉之乘楚之檮杌魯之春秋一也豈但魯有春秋而已哉豈特魯國有之亦以上應天下不可一國而無禮則不可一國而無書秦盧粤鎛夫人皆能則巧之名不聞禮冬官考工記秦無盧粤無鎛夫人皆能為也使書不專於魯乎見則禮亦不專於魯乎在也而何韓子之慨慕若此言諸國皆無易象春秋之書惟獨魯有之宣子安得不慨然嘆曰周禮盡在魯吾觀韓子之聘自魯而齊自齊而衞周流列國不一而足言宣子當時亦厯聘諸國未嘗觀書於他國而獨喜書之見於魯於魯見易象春秋之書掇一見字説得響未聞論禮於他國而獨謂禮之在於魯於易象春秋見周禮在魯掇一在字説得響是儒書秉禮捨魯蓋無足稱者矣應冐子然書不在於他國一段書不存於天下若未害也易象春秋之書書亡而禮之俱亡書亡則周禮亦亡則世道所繫獨不凛凛歟應有感世道意此君子幸魯之意不足以勝其憂天下之情也應冒子君子之所憂殆有甚於所幸者矣抑又於魯有考焉再考究魯實事若齊仲孫湫來省魯難嘗有猶秉周禮之言左閔元年齊仲孫湫來省魯難曰魯猶秉周禮未可動也湫之所謂禮蓋觀於俗而不待觀於書也講後轉此意好應原題禮達於日用常行之間固不待書而後見今韓子之所謂禮乃指易象春秋而言之魯殆非昔比也引本文繳上意于時昭公娶同姓而貽不知禮之誚語七陳司敗問昭公曰君娶於呉為同姓云云君而知禮孰不知禮屑屑焉習儀以亟而不知行其政令毋失其民之謂禮左昭五年齊女叔齊曰魯侯焉知禮是儀焉禮所以行其政令無失其民者也云云而屑屑焉習儀以亟言善於禮不亦逺乎則周禮之在魯亦徒書而已耳駁倒本題言是時只存易象春秋之書而已安有周禮雖有此書誰無此書結上意用孟明焚舟之事雖有此舟誰無此舟雖然猶幸有書以待聖人之出也便轉歸夫子去天之生夫子不於他國而於魯則有意矣此意極好有徳無位遂取易象而讃之取春秋而修之書序約史記而修春秋讃易道以黜八索疏孔子修聖道有至徳而無至位豈惟周禮賴以不墜而大經太法垂詔萬世向非魯史之藏未泯豈不重夫子之杞之宋之嘆乎猶幸魯史之書尚存也觀記禮運我欲觀夏道是故之杞而不足證也欲殷道是故之宋而不足證也然則二書僅見於韓子固可為當世惜而二書大明於夫子尤可為後世幸云論尾餘意雖見得之馮厚齋前篇論然此作論意精倒又有能發厚齋之所未言者蓋破語謂固可為世道幸亦可為世道惜此段句則謂固可為當世惜尤可為後世幸皆相照應文勢圓轉可法謹論前篇謂宣子來聘因而感王制之不存固可為世道惜然周禮已廢而二書尚存猶可為世道幸此篇謂宣子因觀書而知王制之尚存固可為世道幸然他國絶無而魯國僅有深可為世道惜倒翻前篇意可以參看貶題立説格與蕭瑀真社稷臣論同格叔孫通為漢儒宗陳子頤出處史記叔孫通傳叔孫通希世度務制禮進退與時變化卒為漢儒宗大直若詘道固委蛇蓋謂是乎立説叔孫通非儒者何足為宗師太史公稱之以為漢儒宗者蓋寓其咨嗟不足之意非真謂叔孫通可以為漢儒之宗者以通為漢儒之宗則漢之為儒可知矣是可重嘆也批云破千古之狐疑立一家之鯁論能言司馬子長之所不能言者使漢儒視之流汗竟趾矣論曰觀一世風俗之所趨指漢之儒者皆宗叔孫通可以覘士氣矣叔孫通非儒者不足宗師而漢儒且宗之則漢之為儒可知矣夫士以儒稱挈起儒字説以其議論之近正趨向之不惑卓然守先聖之道而不移於富貴貧賤者也必如是方謂之儒哉孟子公孫衍張儀豈不誠大丈夫云云富貴不能淫貧賤不能移今有人焉暗指叔孫通竊儒者之道以自文責叔孫非真儒論卑氣弱與時俯仰而所計不在於其身如此則議論不正趨向亦偏了挈之聖門固在麾斥之域矣既如此則非守先聖之道韓文在夷狄則進之倚門墻則麾之而一世之士方且歆慕嘆美視其所言所行以為模範之地畧無一人非之者責漢之儒者方且宗之而不議其非嗚呼嘆息之辭是固豪傑之士扼腕而嘆息也暗指太史公歎息之意叔孫通何如人也不言可知矣冷下堂堂漢儒豈無特見之士而率其宗焉抑可傷也已責漢儒不合宗之太史公之論通也以為與時變化卒為漢儒宗引本文人皆謂其美叔孫也而不知太史公之意豈在於區區一叔孫通哉貶叔孫通以通如是而漢儒宗之則可以觀漢之為儒者矣應破題意分曉叔孫通為漢儒宗請繹其説焉且儒之為儒何如也設問起吾聞其道矣又出一道字幽與大極並生明與三才並立大之而經天緯地小之而謀王斷國其道固如此説儒者之道大處永語見易係辭又尚書堯典注經天緯地曰文又漢谷傳經術文雅足以謀王體斷國論以上說儒者之道又聞其宗主之人矣又説宗字伊周之事業伊尹相湯周公相成王孔子之六經家語孔子刪詩述書定禮樂制作春秋讃明易道孟子之議論孟子七篇之仁義自荀卿而下蓋不數焉荀子名况其人又如此以上説儒者可宗之人叔孫通何為者抑叙孫通乃能處秦漢之間接三代之後翹然為一代儒者之首是亦伊周孔孟之徒歟疑辭孟等以叔孫為儒者之宗則是與伊周孔董仲舒賛後學有所説壹為羣儒首太史公何其言之謬也揚中之抑且難一難或者遂從而為之説曰為太史公解太史公姑以一代儒者而論之爾太史但謂漢儒之宗非固爼豆於古聖賢也非以伊周孔孟為比然考漢世又將漢一代人才來再難之如賈生之開爽俊淑通達國體賈誼通達國體本傳董子之精潔純粹終始仁義董仲舒賢良策正其誼不謀其利明其道不訃其功此皆太史公耳目之所及二子皆漢儒司馬遷之所熟識進而先之不猶愈於叔孫通乎二子勝似叔孫通遷何不取之今也漢之儒者不宗賈董而宗叔孫太史公亦聴然和之曰是其為漢儒宗者也此亦有説乎從考漢世起設難至此住噫嘻解又嘆惜之辭太史公傷時悼俗之意於是乎深矣司馬遷儒宗之辭非美之也蓋寓咨嗟嘆惜之意蓋自秦人焚書坑儒孟子序迨至亡秦焚滅書詩坑戮儒生世之縉紳先生襃衣博帶之士掃迹於人間久矣言秦時雖有儒者亦不出徒司馬相如難蜀文縉紳先生之儼然造焉注紳帶縉笏又見記内則注深衣大帶山東事興陳勝議秦盗者卒亦不免當時儒生凛然惟恐去禍之不獲叔孫通傳陳勝起二世問博士諸儒曰楚戍卒攻蘄入陳於公何如博士諸生或言反或言盗於是二世令御史按諸生言反者下吏非所宜言皆罷獨叔孫生雍容異辭竟脱虎口人固病其為諛然亦不許其智矣同上通曰諸生言皆非夫天下為一家毁郡縣城鑠其兵視天下弗復用且明王在上法令具於下吏人人奉職四方輻輳此特䑕竊狗盜何足置齒牙間哉二世喜拜為博士通出反舍諸生曰生何言之諛也通曰公不知我幾不免於虎口以髙祖之溺冠嫚罵酈食其傳沛公不喜儒説客冠儒冠來者輒解其冠溺其中又趙王傳上箕裾嫚罵之自酈生陸賈以下無能免者酈食其陸賈皆為髙祖所嫚罵而叔孫生又能短衣楚製首動人主喜儒之機叔孫通傳通儒服漢王憎之乃變其服短衣楚製漢王喜野外之儀亦可起皇帝為貴之嘆同上羣臣飲争功拔劔擊柱通曰云云願徴魯諸生與臣弟子共起朝儀云云與弟子百餘人為綿蕞野外習之㑹長樂宫成諸侯羣臣朝以次上夀無敢讙譁失禮者於是帝曰吾乃今日知為皇帝之貴也故其言壯士則壯士用同上專言諸故羣盜壯士進之進弟子則弟子官同上通曰諸弟子隨臣久矣與共為儀願陛下官之悉以為郎委蛇宛轉之態不少忤物見題注委音威蛇音怡言其曲折宛轉也而賜金析爵寵數便蕃見本傳賜帛二十疋衣一襲又拜一為奉常或者睹其光燄赫奕之如此且據當時之人所見如此則囘視兩生之徒窮瘁自守亦真可謂不知時變者矣本傳通徵魯諸生三十餘人魯有兩生不肯行通笑曰若真鄙儒不知時變故其言善制禮必曰叔孫生髙帝紀賛叔孫通制禮儀知世務者必曰叔孫生本傳諸生喜曰叔孫生聖人知當世務言引薦人物不忘故舊者必曰叔孫生本傳通降漢從弟子百餘人然無所進云云弟子皆曰事先生數年今不進臣等專言大猾何也通曰云云諸生待我我不忘矣當時之宗仰如此固宜諸儒之所深慕切嘆也自大講至此且先揚叔孫通似可以為漢儒宗雖然此語要斡轉下意非是自為一段叔孫生之名重則重矣而漢世之風俗則可悲爾自此以下直抑叔孫不足以為漢儒之宗彼以短衣楚製而見喜見上注則頑鈍無恥之士雖顛倒衣冠而不憚矣陳平傳今大王嫚而少禮士之亷節者不來然大王能饒人以爵邑士之頑鈍嗜利無恥者亦多歸漢彼以緜蕞草儀而獲賞見上注則乘時規利之士雖侮慢聖言而不懼矣如弟子百餘人及魯所徵三十人皆乘時規利之徒又語侮聖人之言寵錫之餘可以潤諸生師傅之榮可以華士類見上注乂拜通為奉常又徙通太子太傅自非特立獨行之士疇能不動心於是哉記儒行儒有澡身而浴徳其特立獨行有如此者故自叔孫之名既重而後世以儒名家者大抵慕其故歩而規矩焉漢之士氣於是乎索然矣應冒子以通如是而漢儒宗之可以觀漢之為儒矣太史公一世竒傑魁磊之士指本文司馬遷豈若腐儒者宗叔孫以為趨向哉麗食其傳漢王吐哺罵曰腐儒㡬敗乃公事李陵之事纔一開口而大戮隨之李陵傳上聞陵降虜怒甚問司馬遷遷盛言陵事親孝與人信常奮不顧身以殉國之急有國士之風云云上以遷誣用為陵游說下遷腐刑環視在廷以丞相封侯文學拜爵者無非為叔孫所為之人公孫𢎞傳𢎞不肯面折廷争云云封丞相𢎞為平津侯又兒寛傳以射䇿為掌故功次補廷尉文學卒史云云拜寛為御史大夫以稱意任職以上二人皆阿諛順㫖如叔孫通蓋慨然發憤於此久矣而又不可與俗士言也謂司馬見當時儒者皆效叔孫之所為所以發憤而言則於其賛叔孫通之語而特致其意曰叔孫通希世度務制禮進退與時變化卒為漢家儒宗引本文嗟夫嘆惜歸本意希世而與時此豈足與言儒哉以若人而漢儒宗之則漢之為儒可知矣應冒子語儒之失其為儒固不足道而漢家他日必且壞於諛佞利口之俗遷意謂漢儒皆宗叔孫諛佞之習恐相師成風此固太史公之所致意也挹其辭㫖豈真為叔孫通榮豔之嘆哉遷之言非美叔孫也蓋寓其嘆惜不足之意應冒語抑嘗因太史公之意而觀漢人之所以議論叔孫氏者未嘗不鄙漢儒之陋而怪叔孫之幸也又引他人語叔孫之事為本題証其羣弟覩朝儀之就固已稱之為聖人矣本傳臣願徴魯諸生與臣弟子共起朝儀云拜通為奉常因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之悉以為即諸生喜曰叔孫生聖人云云則猶曰諸生嗜利懷私之論然也劉更生一世名流真漢儒中之諤諤者劉向本名更生而其封事之語亦曰定公始皇賢季孟李斯而誚孔子叔孫見劉向本傳是亦以叔孫為孔子之流也謂劉向以孔子叔孫並言嗟夫嘆惜之辭叔孫通何以得此於劉子政哉劉向字子政習俗之移人雖賢者不能免用陳止齋文愚於是益嘆孔孟不生而真儒之道不復見於世云不足之意形於言外謹論貶題立説格與叔孫通為漢儒宗論同格蕭瑀真社稷臣歐陽復亨出處唐蕭瑀傳帝曰武徳季太上皇有廢立議顧朕挾不賞之功於昆弟弗克容瑀於爾時不可以利訹死懼真社稷臣也立説謂之真社稷臣者必能誠死社稷而後謂之真也彼蕭瑀為梁宋臣既不能憫其宗國之顛覆歴陳仕隋又非不事二君之義及為隋臣河池之守固當效死豈有一聞髙祖之招遽然挈郡而歸之所幸天下歸唐得保首領以没或天下不為唐有安保其不轉而之他哉太宗以真社稷臣許之過矣批云義正辭明可以斷千年不倒之公案使蕭瑀親聞此言亦當招伏讀之使人毛髪洒浙耿耿不寐論曰許人臣以任天下之重指太宗許蕭瑀為真社稷臣當觀其所履之素瑀歴陳仕隋又仕唐觀其素履本非有守之人而已之私不與焉不可徒以有功於唐室而許之真社稷臣也蓋人之情喜其功者常過予喜瑀之有功而許之以真社稷臣也則為過予而狥其名者每每失其實也許瑀以社稷臣之名而本無守社稷之節則為失實以喜功狥名之心而觀人總上兩句意則惟見其與我者之為忠徒然知有功於唐室之為忠而不究其昔日之大有咈於理者不知昔日歴仕異代之為不義觀人如此果可以通於萬世之公乎非觀人之正論夫天下無事訏謨獻替此固臣子之至願為臣而處常固當盡忠而或者一旦遇世變之搶攘臨難死節亦臣子分内事也為臣而遇變尤當效死而可以夷險而易吾之所守歟故善觀人者應前觀人二字不求其迹於功成名就之後不觀其形迹之似而每以酬酢變故决擇去就之頃而逆諒其心要觀其本心之真以此觀人庶㡬可以示來世矣如此方是通萬世之公論吾觀唐太宗之稱蕭瑀何其喜功而徇名也應前四字瑀本隋臣敘瑀履歴河池之守固當效死豈有一聞髙祖之招遽然挈郡而歸之本傳瑀拜内史侍郎出為郡守髙祖入京師招之挈郡歸封宋國公謂其有功於唐則可其如隋之社稷何瑀為隋臣不能死於社稷豈得謂之真社稷臣太宗謂蕭瑀真社稷臣何以訓天下辭明義正夫所謂真社稷臣者以其能誠死社稷也便將本題要字辨命前賈誼策法度之臣誠死社稷而真之為言又非形似髣髴之謂足以當此而無愧者也又詠真之一字非形似之謂故見危必致命語十九子張曰士見危致命思難不越境左宣二年趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾殺其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰苟利社稷死生以之又用左傳全句嗟夫嘆惜立議論士之操守當覘其不變於蹈險之秋而不可以安平無事之時論也應冒子一旦遇變臨難死節之語士以安平無事之時論天下無節義矣反申上文應冒子天下無事語故不遇歲寒不知松栢語子罕歲寒然後知松栢之後彫也不攻堅木孰别利器東漢虞詡傳不遇􅌉根錯節何以别利器乎世之忠臣義士亦未始不以其臨難不可奪而得之也將上二句比此一句語可以托六尺之孤可以寄百里之命臨大節而不可奪也兵環畫邑三十里而王蠋不歸燕燕樂毅伐齊云云毅聞畫邑王蠋賢令軍中環畫邑三十里無入使人請蠋蠋謝不往燕人曰不來吾且屠畫邑蠋曰忠臣不事二君烈女不更二夫云云遂經其頸而死切畫胡卦切蠋珠玉囓雪牧羝間闗海上十九年而蘇武終不忍忘漢真社稷臣有如此者蘇武傳武留單于天雨雪武臥囓雪與㫋毛并咽之云云迺徙武北海上牧羝武杖漢節牧羊臥起操持節旄盡落武留匈奴凡十九年以上二人方是真社稷臣至如李陵衛律之罪一汙青史萬古凄凉大節一虧功名不足贖矣同上單于使衛律招武受降武引佩刀自刺云云初武與李陵俱為侍中單于使陵説武降云云武曰王必欲降武請畢今日之歡效死於前陵見其至誠喟然嘆曰嗟乎義士陵與衛律之罪上通於天因泣下霑衿吁人主可以一時之功名而確然謂其係國之輕重耶繳上意謂觀人要觀其大節蕭瑀之事嘗讀史而知其顛末矣叙瑀始末當是時唐室開基朝綱振聳萬機倥偬而未暇也説唐初時事未定有臣如瑀忠直自任抑過繩違精神風采不減房魏執政得人賀有唐者衆矣且説他好處要後抑必先揚謂瑀之忠言直論不下房𤣥齡與魏徵之為人抑本傳髙祖呼曰蕭郎瑀自力孜孜過繩違無所憚况夫問以長保社稷之策而首倡藩籬屏衛之謀本傳瑀為僕射帝問瑀朕欲長保社稷奈何瑀曰三代有天下所以能長久者類封建諸侯以為藩屏秦置守令二世而絶漢分王子弟享國四百年魏晉廢之亡不旋踵此封建之明效也帝納之武徳方揺揺於社稷之託而卒定元良之任見本題註瑀之於唐誠不可謂無功者瑀直可有功於唐自太宗賜以疾風勁草之詩光映縉紳瑀之功名已班班於唐公卿間矣本題下文云因賜詩曰疾風知勁草板蕩識誠臣真社稷臣之襃誰得而議瑀哉自大講至此皆説瑀似可當真社稷臣之名然而轉歸正意自立議論抑他人言之溢美未嘗不因於其所喜成於有所狥應冒喜功徇名之語惟其喜也嘗過於襃揚而不知惟其徇也則又不求其實者也應接題人之情喜其功者嘗過予而徇其名者每失實兹二者皆錮於人情之私也總結上文應破已之私不與焉何則喚下意瑀生於梁本傳瑀梁明帝子為梁宗臣不能憫其宗國之顛覆學詩黍離句法周大夫行役至于宗周過故宗廟宫室盡為黍離閔周室之顛覆歴陳仕隋又非不事二君之義本傳瑀女兄為隋晉王妃晉王即位妃為后瑀寖親寵拜内史侍郎又見前王蠋註出守河池駕言行邁同上出為河池郡守又學毛詩句法想其覩故宫之禾黍悵連阡之秀麥上註彼黍離離又微子麥秀歌其心愧恥不汗顔而泚顙者㡬希言瑀不能守節豈不惶愧其韓文血指汗顔又孟子其顙泚瑀也親綰銅章安然五馬之貴瑀之大節已可議矣言㙖乃梁之宗臣不當仕隋為太守汝杜詩金章紫綬照青春又送賈閣老出州人生五馬貴莫受二毛侵然既為隋而任千里之寄隋之社稷政藉瑀為一扞蔽也言既為隋河池之守合當死守髙祖入京之招豈瑀苟富貴之時歟言瑀又不能為隋死守又挈城歸唐見冐子注鑿池築城堅守勿去孟梁惠王鑿斯池也築斯城也與民守之效死而民弗去則是可為也為唐計者不過以兵而驅我也説出髙祖見脅之意夫其以兵而驅我則一死以報國士之知尚可以少吐生氣瑀於此時蓋當效死中史記刺客傳豫讓為智伯報讐云云曰臣事范行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之獻城而求苟生焉亦猶奄奄泉下也瑀雖生亦猶死也瑀乃不思及此苟利禄而忘節義謂瑀苟受唐之利禄而忘為隋守節義輕於去就而重於死生瑀為隋臣不當去隋之守而就唐之招若輕於一去一就則是畏死而貪生一招之頃巧媚求全不過為保身計孰有真社稷臣而挈城以為進身之階乎繳盡題意使瑀親聞此言亦無辭説可解見冒子注所幸天下歸唐得保首領以没於地用左傳語隠三年宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以殁先君若問與夷其將何辭以對設或中原之鹿不為唐有則又安保其不轉而之他哉說破蕭瑀不能守節情狀而晉書石勒云若遇高祖當北面事之若遇光武當與之並驅中原未知鹿死誰手太宗不考其素而輕以一言許之可勝恨耶應破語謂太宗不考其素履而輕以真社稷臣一語許之昔王通氏曰魏相真漢相見中説相真可以相宣帝也如魏相之才則真可為漢相以真之一字正形下意以瑀為社稷之臣而真之一字確然許之瑀之才不如魏相豈可當真之一字太宗其欺萬世哉應冒子何以訓天下意商州之行帝之知瑀晚矣見本傳瑀貶商州太宗誠不知瑀也商州之山川鬼神瑀其得而誑之乎用左傳語縱子忘之山川鬼神其忘之乎嗟夫死士五百人從田横於海島而無叛色見國語荆楚之士從先主於江南而依依如雲見蜀志先主傳云云事雖不成而氣不可奪身雖不免而其心猶未死也如是方是真能守節義以若人而當社稷之重以真許之吾無憾也繳上二人如此方可以當社稷之名瑀何人斯而敢當此哉瑀不足以當此名真社稷臣之褒太宗將以厚瑀而不知重為瑀累也貶太宗以真社稷之名許之亦不是漢髙祖戮丁公丁公為臣不忠使項王失天下見前漢髙祖紀髙祖之示萬世者精矣取髙祖之言是太宗之慮後世良有闕歟抑太宗之言不是謹論前篇謂叔孫通非儒者而太史稱之為漢儒宗惜其不足也此篇謂蕭瑀非忠臣而太宗稱之為真社稷臣許之太過也形容題意格此篇與樂天者保天下同格舜禹有天下而不與陳傅良出處語泰伯子曰巍巍乎舜禹之有天下也而不與焉立說謂舜禹所以有天下而不與者由自視其身不勝其小也葢舜禹之心常歉然若不自足其自視之小者不見天下之為大也馮厚齋批議論出人意表行文精微通暢深得論體論曰不見天下之為大者謂舜禹有天下而不與其自視小者也謂歉然不足是主意夫自一介而上用孟子一介不以與人語以至小形至大厚齋批云此意頗髙然非冒子當用皆人之所役役焉求之而弗遇者一介至小底物求之且不能得况夫天下而有無故之獲哉天下是至大底物豈偶然得之天下不可以無故得也再喚起上句而儻然得之以舜禹則若必有以大過人者反說小字嗚呼吾視吾身誠有以大過於人而能得天下止齋文法多如此轉換最圓活則夫得天下者始可挾之以為喜固之以為私若自視吾身不以為小則必與天下干預了何者設起其自視哆然大也反說不見天下之為大意則視其所有出題有字皆葢世服人之具變换大過於人意則亦甚貴重愛惜也如此則與矣知此始可與論舜禹有天下而不與之說焉一句入題更不叙講葢上面說意已醒了且夫堯授舜舜授禹漢董䇿禹繼舜舜繼堯三聖相授守一道誠非敢輕也且說天下是重大底物誠擇之試之詢之卜之之悉而後與也擇如師錫帝曰有鰥在下曰虞舜之類試如歴試諸難之類詢如詢于四岳之類卜如枚卜功臣之類夫擇於斯試於斯詢且卜於斯接上文變換學擅弓歌於斯哭於斯聚國族於斯句法必無以易我者焉見得重大而後上之人退然而遜之上遜讓之下之人偃然而戴之下歸戴之則夫所以崇髙富貴我者皆其善後之深計上之人遜我之意而其所以奔走服役我者亦其圖安之覬心也下之人戴我之意反而觀我焉彼皆利賴我者也皆屬望我者也又從舜禹身上說一過則凡致乎此者誠吾能而居乎此者誠吾宜應冒大過人意亦可以拱受而無愧敢當而不懾應冒得天下挾之以為喜固之以為私意懾震驚貌舜禹也入主意一則曰吾不堪也二則曰吾不堪也形容舜禹不與氣象吾無以異於人而胡於我乎遜而胡於我乎戴也應前遜字戴字設問只兩句意轉換作三様說非望之福有道之憂也無窮之求性分之累也詠題文意悠長大有議論是以天下遜我是非望之福天下之戴我無窮之求是故君固與之而固辭之應上之人遜之意民固歸之而固逃之應下之人戴之意若他人則必將河南陽城之避接去了惟此又於嗚呼下又着數語則文勢雍容詳緩嗚呼夫其致之者可以為吾能也而顧曰吾憂應前致能憂三字其居之者可以為吾宜也而顧曰吾累應前居宜累三字說得舜禹不與天下本意出河南陽城之避悶然而不就若以此接固逃之之下則文勢急迫矣下又見注禹益之薦汎乎而不嗇孟萬章舜避堯之子於南河之南又舜薦禹於天三年之喪畢禹避舜之子於陽城又禹薦益於天彼其視天下何眇乎其小也應不見天下之為大意其心固常常而曰我何以有天下云爾也出題有天下三字勅天以為戒非以患失也書益稷帝庸作歌曰勅天之命惟時惟幾又患失之出論語叙功以為歌非以干譽也書大禹謨九功惟叙九叙惟歌又罔違道以干百姓之譽賞罰以勸沮非以立權也書罰弗及嗣賞延于世又荀强國是以為善者勸為不善者沮禮樂以藩設非以飾治也楊問道虞夏法度彰禮樂著又荀善顯設善藩飾吾職之不共吾責之不塞吾懼焉而已矣所謂不與者非是置之不問須要此數語方宻故曰其自視小者不見天下之大為大其無係於物者無我也照破題結再添一句最好無係於物見不與意凡天下之人簞食豆羮抱闗擊柝皆可以驗匹夫匹婦之心照冒接題意羮孟好名之人能讓千乘之國苟非其人簞食豆見於色又萬章辭尊居卑辭富居貧惡乎宜乎抱闗擊柝何也設問惟我之為快也答是故遭意外之幸者多盛氣會適成之功者每徳色議論造理喜應挾之以為意以舜禹之得天下歸主意而始之以欿然終之以欿然慊然不足之意則孟盡心上如其自視欿然過人逺矣欿音坎是其胷中之藏天地同量盈之而益虛過矣而已化說得舜禹之心廣大過語有若無實若虛又孟所者化巍巍之道亦可想也巍巍本題上文而好事者猶曰設難舜臣瞽瞍孟咸丘䝉問曰盛徳之士君不得而臣父不得而子舜南面而立堯帥諸侯北面而朝之瞽䏂亦北面而朝之而禹徳衰於傳子孟萬章至於禹而徳衰不傳於賢而傳於子嗟乎吾觀書傳舉經傳語為證至舜之傳禹􅈤􅈤如釋負皇皇如有求榖梁如釋重負又檀弓云皇皇如有求而弗得而禹也雖衣服飲食之微曽不少適吾之意語泰伯禹吾無間然矣菲飲食云云惡衣服云云夫過卑以下其臣而顧以施諸其親解舜不臣瞽瞍之意不以便其身而顧以利諸其子孫解禹不私傳子之意筆兩句辨得倒可觀前輩力雖微孔孟吾不惑之矣雖無孔子孟子之言吾亦不疑舜禹之事而况孔孟之說昭如也此意尤工謹論貶題立說格與後篇天子與公卿議錢幣同格公卿議錢幣如何陳時中出處前食貨志武帝因文景之富忿胡粤之害嚴助朱買臣等招􅝘東甌事两粤江淮之間蕭然煩費云云於是天子與公卿議更造錢幣以贍用而摧浮滛兼并之徒云云是時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黃金為上白金為中赤金為下云云乃以白鹿皮方尺縁以繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫白金三品其文龍直三千其文馬直五百其文龜直三百云云立說就題公卿字設難言興天下之利當與天下共議之今與公卿議之私也非公也批云議論極正文字儘佳筆下更無疑滯處論曰將有以興天下之利指武帝更錢幣必有以盡天下之心當與天下共議之大臣不得私也不當與公卿議之日公私二字是一篇眼夫利為天下而興者也唤得主意響為天下興利而不得以盡天下之心接上文反說主意則議之所及者不過於利吾國利吾家而已與公卿議則私了大用孟梁惠王上語王曰何以利吾國夫曰何以利吾家豈暇計其實利害哉不盡天下之公議則利害皆不得其真大抵事有利害不厭其為議事有利有害須要議論議有當否不厭其為詳人之議論有說得當理者有說得不當理者須要詳盡况於錢幣之大政入本題意乃國家元氣生民壽命之所由闗見得錢幣之議是為天下而興利葢有公卿以為利而天下以為病公卿之私見與天下之公議不同可以紓目前之急而無補於經久之大計者矣一時之急計與萬世之常經不同苟惟一二私意之大臣是崇是信只從公卿之私議而不得以博盡天下之情不盡天下之公議狃於意見之偏勝從公卿之議而不盡天下之議便偏了而不暇計生民之利病既是偏見安知實利害則異日弊端之起將有伏於議論不到之地矣言公卿之謀必有未盡善處於國奚補哉何利於國葢自君民相通之情不見於後世從古者引入後世至漢而始有集議之名伐匈奴有議弃朱厓有議鹽鐵有議然而議止於羣臣而不及於庶民此意已不廣矣此一轉可去元狩錢幣之議元狩武帝年號謂宜以天下之利害與天下謀之主意柰何所與議者公卿而已而臣下又不得以盡其情焉駁到本題之意奚其私論勝而公論泯也公卿之議私天下之議公公卿議錢幣如何吾固未暇察其議之當與否且以見私意之害公也着此二句尤有宛轉請因漢志而詳其說且自上下之勢隔而謀國者無公論從古者原起應冐子君民相通之情不見於後世意自功利之說勝而理財者無正辭錢幣之議非公義易理財正辭曰由是錢糓之問廟堂不以為凂本韓文錢糓之問不至廟堂曰利之言大夫不以為恥孟大夫曰何以利吾家殉貨之戒卿士有位者不以為畏書伊訓敢有殉于貨色問之則曰圜法九府維師尚父之所立也前食貨志太公為周立九府圜法理財一書冢宰姬公之所作也周官一書半言理財古之所以言興利者亦公卿而人耳天下何議焉從錢糓之問度至此且掦古者之言理財亦與公卿議未為不是嗚呼使其居公卿之位者而皆能以天下為心如尚父如姬公則可繳上文要歸主意苟其不尚父不姬公也能以尚父姬公為心尚是公議苟不以二公之心為心則是私議了幾何而不為管氏之謀富强者乎管仲相齊富國强兵幾何而不為商鞅之談功利者乎史記商君傳衞之庶公子名鞅姓公孫見孝公說公以帝道其志不開悟云云說公以王道而未入云云說公以伯道公與語不自知膝之前席也云云鞅曰葢吾以强國之術説君君大悦之耳又幾何而不為皇甫鏄宇文融之剥下媚上以要權寵者乎唐憲宗伐蔡用度急鏄裒㑹嚴急以辦濟師又𤣥宗以宇文融為覆田使括正丘畆歳終羡錢數百萬緡並本傳皆非天下之公是非實利害者也如管仲商鞅皇甫鏄宇文融諸人之言理財皆非公議天下之事利與害對公與私對應冒子利害公私四字利於國者或有害於民演上文立利害不两私諸已者是必不公諸人者也公私不两得彼其以刻削為至謀以詭遇為宻議指管仲商鞅諸人之議十孟為之詭遇一朝而獲方恐天下之議其後則亦何敢以盡天下之議幹此意好見得公卿之議私天下之議公是以不謀之國人而謀之公卿不蔽以公論而蔽以私意見得天下之議與公卿之議不同其所以欺世罔民者葢未必不以為天下有道則庶人可無議也語天下有道則庶人不議亦孰知天下之利害當與天下共之公卿可得私耶應破語將以興天下之利必有以盡天下之心大臣不得私也嗟夫貨泉布帛周室之所為理財也而謀及庶人者曷嘗一日廢前漢食貨志太公為周立九府圜法云云故貨寶於金利於刀流於泉布於布束於帛又洪範謀及庶人職歳職幣周官之所以厚天下也然於一沐一食之頃苟有以利害至者葢未嘗不動念焉周禮天官小宰之職云云職嵗掌邦之賦出以貳宫府都鄙之財出賜之數以待會計而考之云云職幣掌式法以歛宫府都鄙與凡用邦財者之幣及史魯世家周公戒伯禽曰我一沐三握髪一飯三吐哺喜以待士云云心以上用周事見得周之言理財皆盡天下之公未嘗狥公卿之私見此意古矣繳上周事引入本題殆豈漢庭公卿所能知之責漢公卿之議不公不如周公卿之議為公葢自三代既衰徳不勝偽又從三代叙起而生財大道逸而歸諸言利者之口大學生財有大道公議綫脉所恃以僅存者獨漢之集議耳見冒子注然國家有大政政有大疑則下之於博士下之於議郎君子猶以為未大也漢凡有大事下博士議郎集議推廣此意尤佳錢幣之議豈細故哉歸重錢幣上鹿皮之行歟罷歟白金之造歟否歟見本文詳注揆之人情質之輿論豈無的然不易之說謂天下自有公論吾意其建議之初必當合天下之公盡天下之慮以求經久可行之說謂錢幣之議當盡天下之公心不當狥公卿之私見苟其不然猶當參之博士議郎之選庶幾可以紓民力而裨國計者尚肯為國家畫一籌也應前語形出公卿意奈何博士不得聞議郎不獲預而僅議之在廷之公卿參之博士議郎雖未至於盡天下之公議猶愈於狥公卿之私議問其官則丞相御史也問其秩則三公九卿也指公卿問其所以議則錢之更幣之造也喝出本題論以上三句是學韓子諫臣文問其官則曰諫議也問其禄則曰下大夫之秩也問其政則曰我不知也吁嗟嘆漢廷公卿類以事君為容悦者耳豈能為國家逺計哉責漢公卿之議不公用孟子語以事君為容恱者直以濟武帝之侈心而已見得公卿所言只是奉承武帝奢侈不能究生民之利害豈是公議嘗觀當時所謂錢幣之議再評品當時錢幣之議大抵便於國而不便於民應冐子公卿以為利天下以為病意利於濟一時之私而不暇為通變無弊之法應冒子可以紓一時之急而無補於經久之大計意故以方尺之鹿皮而為直者四十萬則薦璧者難於行而侯王坐免爵者多矣幣之議何益詳注見本題出處以白金之龍文而為直者三千則盜鑄者易為力而小民犯死不可勝數矣錢之議何禆見本題注下文云盜鑄死罪犯者不可勝數彼之所以勇於興利者葢亦明知其有異日利害也應前利害字特以帝之欲心如火方炎應前武帝之侈心東甌兩粤之使未通食貨志武帝招徠東甌事兩粤云云朔方匈奴之醜未雪同上又興十餘萬人築衞朔方費數十百萬又匈奴絶和親侵擾北邊兵連而不解神仙土木無涯之費皆未能以快其所大欲郊祀志遣方士入海求蓬萊而海上燕齊怪迂之方士更來言神仙事又作通天臺置祠具其下將招徠神仙之屬又本紀起建章宫作甘泉通天臺柏梁臺又三輔黄圖序土木之役倍秦越舊雖以區區爵級之鬻出題下文令民得買爵名武功爵級十七萬凡直三十萬金以顯軍功曽不足以佐繁費之萬一武帝開邊所費甚大無可以濟其用度其計安得不出此哉安得不議錢幣然堂堂漢朝公卿大臣相與言及錢幣陋矣責漢公卿錢幣之議卑陋不足取况斯時也為斯議也說當時之議不謀之天下不謀之羣臣而謀之一二之私人應冒子一二私意之大臣是崇是信而不得以博盡天下之情公論其謂何謂公卿之議私而不公吾嘗因錢幣之議而求之漢之諸臣再演上意未嘗不嘆私情之勝而公論之益泯也應冒子奚其私論勝而公論泯夫以國家大計羣臣庶民不得盡情而主之公卿照前主意重不古矣應原題古字然猶幸其有君子者在公卿之列猶能為公卿伸一喙也此一轉尤妙暗指仲舒顔異諸人夫何議之者張湯决之者亦張湯自湯之外無聞焉食貨志御史大夫張湯方貴用事初造白鹿皮幣客語異初令下有不便者異不應微反脣湯奏異九卿見令不便不入言而腹誹論死自是有腹誹之法至於遞相汲引更相用事如𢎞羊孔僅者又賈人之靡耳豈復知有公論哉同上以東郭咸陽孔僅為大農丞領鹽鐵事而桑𢎞羊貴幸咸陽齊之大鬻鹽孔僅南陽之大冶𢎞羊洛陽賈人之子以心計三人言利析秋毫矣謂以上三人皆小人安知天下之公議罵倒本題噫漢非盡無公論也又畧救起特為私論所勝耳應前私論勝而公論泯吾觀正誼之說仲舒言之而舒擯於行董仲舒傳正其誼不謀其利明其道不計其功不便之議顔異主之而異論於死出處大農顔異對曰王侯朝賀以蒼璧直數千皮薦反四十萬上不恱張湯以他議誅異亦何怪乎鹿馬之禍秦史趙髙指鹿為馬凡言鹿者皆殺而鳥鸞之誤隋也通鑑太宗執髙徳儒曰爾指野烏為鸞以欺人主君子觀張湯桑孔之謀蓋深嘆私情之揜公議應前私情勝而公論泯君子觀仲舒顔異之說猶深幸公議之在人心應前猶幸有君子者在公卿之列猶能為公卿伸一喙謹論天下大計當與天下共謀之不當徒狥公卿之私議議論極正大文法亦圓轉其大意本之栁子厚守原議云守原政之大者不公議於朝而私議於宫不愽謀於卿相而獨謀於寺人蓋襲此論形容題意格與舜禹有天下而不與同文法樂天者保天下陳傅良出處孟梁惠王下齊宣王問曰交隣國有道乎孟子對曰有惟仁者為能以大事小是故湯事葛文王事昆夷云云以大事小者樂天者也云云樂夫者保天下立說聖人無致變之因而有無故之變於此只得歸之於天其所以樂之者正以其無故而安之也所謂保天下者則樂天之餘效爾非有所利而為之如湯有葛文王有昆夷皆是無故之變而湯文則順受之而不與之較安乎天而不咎乎人自然收安天下之效非謂為是不校之形將以大得志於他日也巽齋歐陽守道批說天字最精宻文字有模寫形容之妙若說葛伯昆夷則又是上文意但觀其文可也論曰聖人之心其所以安於無故之變者指樂天含湯事葛文王事昆夷意初非其利而為之也保天下則樂天之餘效爾非有所利而為之含湯伐葛文王伐昆夷意事變之來而出於無故者申上無故字人情之所甚不堪而聖人固安之者從人情說來入得聖人有節度誠知夫天下之理其非吾自為之者皆天為之說天字有理則夫無故之變亦天也應主意惟知天理之或然也貫上理字而是非曲直之說無與乎其間與去聲干預也則亦不必歸咎於彼而求伸於我不與之較是故遭之而不疑受之而不愧只得順受嗚呼聖人之安天下如斯而已矣此樂天之餘效天下之被吾澤者吾猶不暇計謂保天下者孟匹夫匹婦有不被堯舜之澤若已推而納之溝中而况乎謂聖人為是不校之形將以大得志於他日也應非其利而為之也孟子曰樂天者保天下而論其人則曰湯事葛文王事昆夷舉本出處上文世之君子惑焉與後相應葢曰湯卒有葛之師而文王卒有昆夷之役始既事之今又伐之安得不疑其有所利而為之或者湯文之事固有所就於天下而非其樂天之情應大得志於他日意亦與後面相應吾固為湯文辨而且為孟子辨也應在後甚矣世之以利心窺聖人也從利字上説起最緊切彼特見夫堅忍以俟時舒徐以觀釁者之為觀釁出左傳釁隙也與吾聖人樂天之事形似相近也謂湯事葛文王事昆夷則亦曰聖人之心固將有所就於天下而非其樂天之情應冒舉題處語嗟夫裂眦之怒藏於嬉笑眦目匡也裂眦開眼也背面之毁隠於緘黙背面背後也以小形大此市人少知義者不為而謂聖人為之乎聖人豈有所利而為之應接題語故夫聖人未可以利心窺之也應起句結上生下彼其備意外之患而居之以寛有積强可為之勢而退然若怯者两句是樂天氣象說安於無故之變意其分量固大其見固定而察乎天者固審也聖人心事如此何也唤起生下段凡盛衰之相推而貴賤之相使强弱之相加而賢否之相用包括是非曲直意其至也不可禦其去也不可留者無迹可捉摸是必有數焉黙行乎其間而人事不能以獨専應天下之理其非吾自為之者皆天為之意是故子路雖無可愬之理而公伯寮必無自愬子路之心語公伯寮愬子路於季孫愬譖也孟子雖無可沮之說而臧倉亦必無自沮孟子之心孟樂正子見孟子曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也事善使事不為所使兹天說也四字說得好以聖人之盛徳說聖人有眼目而天地之間猶有夫撞搪呌號忿觸而怒抗者與我較者是豈聖人有以致此而夫人亦奚為而如此也意者其天也邪不為必然之說有模寫形容之妙蓋至於是吾固不知所以使之者而彼亦不知其孰使之者形容樂天意自然而然我與物皆聽其所為而莫得以窮其所歸如捕風捉影文之妙處吾於此將孰從而尤焉尤歸咎也而應冒不必歸咎於彼求伸於我有順受而無捍拒捍拒抵敵也有暇豫而無遑遽遑遽急迫也有哀矜撫慰而無忿懥鬬争忿懥怒也不大學有所忿懥則得其正蓋其分量之大其見之定其察乎天者審也應前三句而何利於天下之被吾澤也哉應冒語過保天下意水不與土争而魚利山不與木争而禽利聖人不與國争而天下利理勢自是如此以上二句形下一句亦其有容之末效不戰之餘福固如此爾聖人不知也歸之樂天之效而何利乎他日之得志也哉應冒為是不效之形將以大得志於他日語雖然彼以其始事焉終伐焉而惑乎湯文者亦不明乎天之説也應冒舉題語天之說固有定未定也又以定未定字生議論且天之於物也舉天字說用孟子語其傾之也或張之其就之也或困之日將暝也大明雷將震也深蟄是其猶未定也此在天未定之天葛與昆夷猶足以難湯文而湯文猶為葛伯昆夷所屈其諸未定之天歟此聖人未定之天及其定也則湯文有不得已者矣謂湯卒有葛之師而文王卒有昆夷之役只一句涵蓄說了昔者亦嘗疑於禹益之事舉證且禹之伐苗也固歸之天書大禹謨帝曰咨禹惟時有苗弗率爾徂征云云民弃不保天降之咎而益贊禹以班師也亦歸之天同上益贊于禹曰惟徳動天無逺弗屇云云時乃天道云云禹拜昌言曰俞班師振旅以前日之伐為天則今日之還非天矣以今日之還為天則前日之伐非天矣學孟子文前日之不受是則今日之受非也今日之受是則前日之不受非也而禹益皆曰天焉皆歸之天豈禹之欲伐也姑假天以辭苗或益之欲還也假天以懼禹邪設疑辨難禹益非假天以自文則必有道矣解天字意吾固曰禹之於苗其始伐之者天也而終還之者亦天也語有判斷湯文之於葛伯昆夷其始事之者天也而終伐之者亦天也對說甚切不然反繳禹為過舉而文王之志荒矣斷送得氣魄謹論近日君子以仁禮存心論多學此篇文法亦可與仲尼不為己甚舜禹有天下而不與論參看方知止齋文法之妙論學繩尺巻八
