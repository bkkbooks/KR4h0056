body:
  text: 論學繩尺卷一宋魏天應編選林子長箋解立説貫題格此篇與三王法度禮樂論同意湯武仁義禮樂如何王胄出處前漢賈誼傳上疏湯武置天下於仁義禮樂而德澤洽禽獸草木廣裕德被蠻貊四夷纍子孫數十世立説謂仁義之中自有禮樂成湯武王躬行仁義之久使一世民物安行乎仁義之中而與聖人相忘於道化之內故極順所積而禮生焉極和所格而樂成焉是則人心之禮樂皆自仁義中來豈於仁義之外而他有所謂禮樂哉批云立説有本祖行文有法度明白而通暢純熟而圓轉真可為後學作文之法論曰為治之道道包仁義禮樂字至聖人而極聖人指湯武極字見仁義中有禮樂謂樂極和禮極順夫世之人主反説後之人君亦固有以道為治者亦以仁義禮樂為治而力行不息道久化成之功或有虧焉謂行仁義不至於悠久記中庸力行近乎仁又不息則久易恆卦聖人久於其道而天下化成則又安能底乎極致之地哉無仁義所以無禮樂極字與破題相應惟夫聖人之心與天同運説得廣大仁義之治出仁義二字本之以躬行通鑑太宗躬行仁義持之以悠久中庸悠久無疆及其成也仁義之成功功用之盛彌滿充足於天地間見仁義之大處之程子云斂之不盈一握放彌滿六合使一世民物安行乎仁義之中而與聖人相忘於道化之內只是仁義應前道久化成字故極順所積而禮生焉極和所格而樂成焉主意在此兩句見仁義之中有禮樂樂記樂記樂也者動於內者也禮也者動於外者也極和禮極順嗚呼此先王之澤所以至於千萬世而不泯者此是湯武之仁義其諸湯武之仁義禮樂乎引本文彼賈生在漢乃欲以是而望孝文焉引賈誼上疏意君子固知不能以易其未遑之念也為論尾張本易賈誼傳誼以漢興二十餘年天下和治冝改正朔服色制度定官名興禮樂乃草具其儀法悉更奏之文帝謙遜未遑也湯武仁義禮樂如何請終言之夫禮云而不以玉帛樂云而不以鐘鼓此孔子之言也語十七子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉謂禮樂不在於儀文禮所以節文乎仁義樂所以樂乎仁義此孟子之言也孟離婁仁之實事親是也義之實從兄是也知之實知斯二者弗去是也禮之實節文斯二者是也樂之實樂斯二者樂則生矣生則惡可已也中謂仁義之有禮樂由夫子之論禮樂而質之孟子之論仁義夾上二説則知聖君之所謂仁義禮樂者矣本題蓋為治之道應破題端本於仁義而成就於禮樂發明主意初不可以差殊觀也援孟子之言為證則知禮樂本於仁義不可分而為四也移民移粟可以言仁也而人皆小其仁此是仁之小者其孟子梁惠王上王曰河內凶則移民於河東移其粟於河內河東凶亦然不鼓不禽可以義言也而人皆卑其義此是義之小者曰左傳二十三年楚人伐宋宋師敗績國人皆咎公公君子不重傷不禽二毛寡人雖亡國之餘不鼓不成列二二毛注謂班白之老黑白色禽與擒同捉也何者疑問行於此而彼則逆用於暫而久則乖答久應冒頭接題力行不息道化成之功或有虧焉發之於事業而有戾於至順推之於民物而有咈於至和反應冒頭極順所積而禮生焉極和所格而樂成焉此姑息之仁矯激之義又何望其躋一世於禮樂哉凡其禮樂之不興皆由仁義之未至文姑息猶且止也矯激猶不順也如韓原道煦煦為仁孑孑為義之意是故必日新其德而後禮樂可以興謂必行仁義之久方成禮樂又大學湯之盤銘曰苟日新日日新日新必夙夜其勤而後禮樂可以興宣王夙夜行善必漸摩涵養之有素而後禮樂可以興前董仲舒䇿王者漸民以仁摩民以義段漸平聲注漸謂浸潤之也摩謂砥礪之也此一意如前漢高帝時魯兩生云禮樂積德百年而後可興之意否則禮樂不興而仁義亦幾乎息矣禮樂之不興皆仁義之未盡湯武之治應破題治字非徒曰克寬克仁也書仲虺之誥克寬克仁彰信兆民非徒曰惇信明義也武成惇信明義崇德報功垂拱而天下治又非徒曰仁義之師拯民塗炭也苟議兵篇湯伐夏武王伐紂皆以仁義之兵行於天下女滕文公下書曰徯我后后來其無罰又東征綏厥士云云又救民於水火之中取其殘而已矣誓師之辭書泰誓王乃徇師而誓下車之訪洪範武王勝殷以箕子歸作洪範王訪于箕子一念所積夫豈以天下為利哉言湯武以弔民伐罪為心皆欲行仁義而已非欲利己也二君之心言湯武仁義之心蓋大乎天地不足為容皎乎日月不足為明巍乎泰華不足為髙渾乎江河不足為流轉以上四句應冒頭聖人之心與天同運説仁義之大處是一樣文法大學韓文伯夷頌句知之者天也同之者道也化之者人也漸而澤之天下後世也以上四句應冒頭本之以躬行持之以悠久使一世民物安乎仁義之中説仁義之化處此處又是一樣文法不以仁義禮樂歸之湯武而將孰歸哉歸湯武身上湯武之置天下也用本文亦曰因人心固有之仁而示之以仁因人心固有之義而示之以義説仁義鑠孟仁義禮智非由外我也我固有之也即仁義以節天下而使之各得其順則禮之所由興仁義之中有禮禮應冒頭極順所積而生焉即仁義以和天下而使之各得其樂則樂之所由成仁義之中有樂應冒頭極和所格而樂成焉禮樂云者固非外仁義而求其所謂制作之具也此禮樂非制作器用之謂乃人心仁義之中自有禮樂由今觀之正敘本意兆民之彰信書仲虺之誥見前注萬邦之表正同上天乃錫王勇智表正萬邦極而至於後昆之垂裕同上以義制事以禮制心垂裕後昆無非湯之仁義則亦無非湯之禮樂謂湯仁義之中有禮樂而殷輅之乘大濩之奏不與焉謂禮樂非制作之具作語十五乘殷之輅注商輅木輅也又前禮樂志湯大濩武王作武言救民也又見下注云云天下之昭明書顧命文武用昭明于天下後人之啓佑君牙啓佑我後人咸以正罔缺極而至於世積之忠厚詩行葦篇周家忠厚仁及草木無非武之仁義則亦無非武之禮樂謂武王仁義之中自有禮樂而周冕之服大武之作不與焉語十五服周之冕年大武見上注又左襄三十九吳季札觀樂云云見舞大武者曰美哉周之盛也見舞韶濩者曰聖人之𢎞也而猶有慙德湯武之道化見於仁義應冒頭使一世民物安行乎仁義之中而相忘於聖人道化之內而仁義之妙用著於禮樂應極順所積而禮生焉極和所格而樂成焉發盡主意使天下之民皆尊其尊皆親其親而辭遜於天髙地下之中再説人心有仁義則有禮樂中庸凡有血氣者莫不尊親又孟辭遜之心禮之端也又記樂記天髙地下萬物散殊而禮制行矣則人紀之修煥然有倫書伊訓肇修人紀彛倫之敘截然不紊洪範彞倫攸敘非所謂無體之禮耶此是仁義中有禮應極順所積而禮生焉不記孔子間居威儀逮逮可選也無體之禮也使天下之物同聲相應同氣相求而舞蹈於蟲鳴螽躍之地易乾卦云云又詩不知手之舞之足之蹈之也又草蟲篇喓喓草蟲躍躍阜螽則德澤之洽充然大順題注頌聲之作流於無窮食貨志君有餘財民有餘力而頌聲作非所謂無聲之樂耶此是仁義之中有樂應極和所格而樂成焉樂記孔子間居夙夜基命宥密無聲之也是二聖人者果何修而得此於天下哉設問汲汲之誠有加無已應冒頭力行不息意文揚學行堯舜禹湯武汲汲故其治之極致有不可得而形容者矣應冒頭底於極致之地世之人主後之人君要引入漢文帝求於旦暮之功無道久化成之功索諸形器之末徒求制禮作樂之具又烏覩乎湯武之所謂仁義禮樂乎安知二聖人本意仁義之中有禮樂漢至孝文入文帝來休養生息亦六七十載矣景帝贊漢興掃除煩苛與民休息文景五六十載之間移風易俗黎民醇厚以寬厚之資而介念於化民之道文帝贊專務以德化海內殷冨興於禮義幾致刑措烏乎仁哉其躬行也其為凖也賈誼贊孝文玄俗默躬行以移風東方朔傳文帝以仁義為凖仁義之道視古庶幾焉下語有斟酌至於禮樂之事則謙遜未遑出賈誼傳詳見冒頭注其應冒頭君子固知其不能以易未遑之念吁禮樂豈仁義外物哉仁義之中有禮樂帝特未有志湯武之仁義也謂文帝當如湯武之仁義果有志於湯武之仁義粘上文則不待制禮而禮之實已著不待作樂而樂之實以形謂仁義之中自有禮樂不在於求制作之具賈誼之言引本文蓋非徒以漢望帝文帝而必以商與周望帝也以商湯周武而望文帝繳盡本意雖然不特誼之言也又引一人來證誼之言王通氏論七制之統天下蓋有取於漢之仁義然終之以禮樂則猶為帝憾焉中説天地篇七制之主其以仁義公恕統天下乎云云其有以結人心乎終之以禮樂則三王之舉也蓋惜其已倣佛於仁義之萬一而未能極其道之成譏文帝行仁義之未至也三代而上禮樂達乎天下三代而下禮樂徒為虗文唐禮樂志全文此湯武之志所以不復見於漢也應前語君子觀賈誼王通之言仁義則知文帝之所以得為文帝褒文帝仁義庶幾乎古觀賈誼王通之言禮樂則知文帝之所以止為文帝貶文帝禮樂不及乎古謹論立説貫題格此篇與湯武仁義禮樂論同意三王法度禮樂如何常挺出處荀子大略篇言味者豫易牙言音者豫師曠言治者豫三王三王既定法度制禮樂而傳之苟不用而改自作何以異於變易牙之和更師曠之律立説為法度者君道也為禮樂者師道也君道要與師道相維三王因人心有和順之機作為禮樂道迪既久然後建一法立一度可以更千萬世而不變者是其君道與師道並行也批云文字體面亦有本祖真得省闡作文之法論曰法至聖人而止指三王聖人之治至於盡君師之道而止君道指法度師道指禮樂法且包題未説出有禮樂而後有度意蓋君道立則天下無餘法法度師道立則天下無餘理禮樂尚君師二字本之書天佑下民作之君作之師君道不與師道而相維粘上君道師道字反下雖有良法美意其何以行之哉謂苟非先以師道而教禮樂則不能以君道而立法度孟離婁上徒善不足以為政徒法不能以自行三代之興正説三王更數聖人而植立千餘年之天下説三王為治之道殫智畢力以為經世之規模殫畢皆盡之之義是豈徒法云乎哉豈是徒然之法度必有禮樂為之先道莫大於君師照君師二字聖人迭出而任之任君師之道導迪人心措之極和極順之內先導之以禮樂者記樂記樂也者動於內者也禮也動於外者也樂極和禮極順主此是效前篇意彼其心志浹洽於道教之久謂浹洽於禮樂之久一旦有所設施謂立法度則其耳目狎熟以為吾聖人之立法議制皆遺我於便且安之地也謂人心知禮樂則知法度有順從而無強揠強揠逆而不從之貌有和懌而無睽疑和懌樂也暌間疑二也兹其一法一度之立可以更萬世而不變而後可以立法度於長久是非不能變三王之法度喚下文而三王禮樂之教有以維法度於不容變也發盡主意法度立於君道禮樂出於師道分曉説出主意君師之道並行此三王之法度禮樂所以為盡善也歟應破題君師字繳盡主意三王法度禮樂請申荀卿之論吾嘗求其所謂法度矣雙關起把法度與禮樂對説關睢麟趾之詩則有其意詳見毛詩關睢麟趾之篇又明道語録有關睢麟趾之意而後可以行周官之法度小雅魚麗之詩則不多辭小雅六月詩魚麗廢則法度缺矣蓋致太平一書則聖人之心術智慮無遺焉唐楮無量建議周禮者周公致太平之書吾固知法度者君道之所由立也應冒頭法度立於君道至於禮樂者對法度説果鐘鼓云乎哉果玉帛云乎哉語十七禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉求之六經格言禮一順也樂一和也注見冒頭和順之外無禮樂禮樂不過和順二字而已禮樂者誠師道之所自出也應冒頭禮樂出於師道以上雙關説未分輕重然則禮樂與法度二歟設問曰禮樂固與法度二答上文而法度自禮樂出則一也歸重在禮樂上何者喚下文聖人以一身而任君師之責總君師字君道師道會於聖人之一身應冒頭聖人之道至於盡君師之道而止法度禮樂安得岐而二之岐分也言法度自禮樂出不可分而為二也大扺禮樂者人心和順之本也應上和順之外無禮樂本此和順則法度可以行有禮樂則有法度失此和順則法度雖欲行而不可無禮樂則無法度先王立法議制法度將於人心而強矯之耶有禮樂則和順將於人心而和順之耶無禮樂則強矯且疑辭雙下此君道所以待師道而並行也應冒頭君師之道並行故自吾師道之立也先立師道教之以禮樂以是禮而導人心於至順以是樂而導人心於至和見冒頭注人心安於和順之天總上和順二字知有禮樂則知有法度主意分曉然則師道立而君道亦至矣應君道師道字吁此言治者止於三王而三王之治亦至於盡君師之道而止也應破題語原題發明法度出於禮樂照主意用君道師道相維之説思昔三王之興正講本題上繼三皇五帝鴻荒之治三皇謂伏羲神農黃帝五帝謂少昊顓頊高辛唐堯虞舜下開百千萬世文明之運文字體面以開闢天地之規模而極世變江河之思慮世變猶江河愈趨愈下中間千有餘年夏四百年商六百年周八百年千有餘嵗出賈誼傳所以維持人道之大經人道謂法度接續人文之脈絡人文謂禮樂蓋於數聖人有望焉指三王聖人亦曰君國子民之道不容一日不盡心父師不及之功尤不可一日而無教先入教以禮樂意教記禮運人其父生而師之是故禮人心之禮也樂人心之樂也只是以是禮而導人心於至順以是樂而導人心於至和意聖人因之而教禮樂焉歸三王教之以禮樂上來敘為彞倫書洪範彞倫攸敘修為人紀書伊訓先王肇修人紀置之充然大順之域記禮運大順者養生送死事鬼神之常也此是人心之禮夏簋之用殷輅之乘周冕之服不與焉語五注簋黍稷之器夏曰瑚又語十五乘殷之輅服周之冕與去聲三王之禮不在此洽為德澤賈誼治安䇿湯武置天下於仁義禮樂而德澤洽流為雅頌漢薛道衡傳禹湯文武功濟生民聲流雅頌納於藹然至和之中樂記樂者天地之和也之此人心樂大夏之興大濩之作大武之奏不與焉全是步驟王胄湯武仁義禮樂論正講樂前禮樂志禹作夏湯作濩武王作武又禮大司樂以德教國子大濩大夏大武此與去聲三王之樂不在此處全學前篇步驟當時之所謂禮樂説人心之禮樂惟見其四極和寧而已栁塗山銘夏后氏勤勞萬邦和寧四極惟見其萬民咸恱而已書太甲湯子惠困窮民服厥命罔有不悅惟見其江漢無犯而已詩漢廣文王美化行乎江漢之域無思犯禮三王時人心禮樂如此斯民難與慮始者今可與之樂成此語出左傳又見下注相與立法蓋不獨已日而乃孚易革卦己日乃孚注生民可與樂成難與慮始故革之為道即日不孚已日乃孚是何也設問教之以師道也既至應師道字則與之相從於君道也固冝應君道字謂能以師道而教禮樂則能以君道而立法度矣一旦創為法度斯民不驚且疑安其教則安其政矣應冒頭有所建立設施則其耳目狎熟以為聖人之立法遺我於便且安之地故井田什一之法行天下知其遺我冨實矣後祭祀志井田什一三代之所同肉刑三千之制立天下知其導我向善矣書吕刑穆王訓夏贖刑云云五刑之屬三千創為校庠序之規知其教我也孟滕文公下夏曰校殷曰序周曰庠學則三代共之皆所以明人倫也設為封建之制知其字我也唐蕭瑀傳三代有天下所以能長久者類封建諸侯以為之籓屏人心未易曉明立一法而猶不聽謂人心知法度之教三代聖人一法度之立而斯民共之如律度量衡之不可易要引法度歸禮樂上量書舜典同律度衡吁人心一和順之機蓋於是乎見應人心和順字惟其因彼禮樂之和順而立我法度於無窮應冒頭三王禮樂之教有以維法度於不容變故法度立於一時而一時便且安法度傳於子孫而子孫便且安法度行於千萬世而千萬世可以長守而無變以上三句應冒頭便且安語亦應一法一度之立可以更萬世而不變夏嘗亂其紀綱而紀綱終不可得而亂書五子之歌今失厥道亂其紀綱商嘗覆其典刑而典刑終不可得而覆孟萬章上太甲顛覆湯之典刑周嘗缺其法度而法度終不能不復詩六月魚麗廢則法度缺矣是法度未嘗不可變也抑人心禮樂之澤不可泯也應冒頭是非不能變三王之法度而三王禮樂之教有以維法度於不容變也荀卿子謂言味者豫易牙言音者豫師曠言治者豫三王引本文見題詳注吁法度禮樂三王豈有他技巧哉蓋以盡君師之道而已歸主意君道師道字以上大講先論三王因人心之和順而為禮樂禮樂教之既久然後立法度則人心樂從雖千萬世而不變繳結意盡雖然三王之法度禮樂非一人之為也抑非一日之積也其來也久蓋自皇治既降三皇帝文始開五帝堯舜氏作見易繫辭其為風俗計也已悉為治之道意衣裳宫室之制得於十三卦之先易繫辭黃帝氏作垂衣裳而天下治蓋取諸乾坤云云後世聖人易之以宫室蓋取諸大壯詳繫辭命夷命夔之教載之二典而可覆書舜典有能典朕三禮僉曰伯夷帝曰咨伯汝作秩宗帝曰夔命汝典樂教胄子然則法度禮樂興於唐虞唐堯虞舜盛於三王禹湯文武而大備於成周之世揚問神如周之禮樂庶事備其闓創始有由也歸之唐虞創始之功故不觀荀卿定法度制禮樂之言無以知三王備王道之成題性不觀揚子雲法度彰禮樂著之論無以知唐虞開帝功之始揚問道虞夏行堯道法度彰禮樂著吁帝王不作君師之責吾誰歸不走了君師字末有歸之今日意亦寓不足意謹論前篇謂人心有仁義則有禮樂此篇謂人心知禮樂則知法度是用其主意倣其步驟不可不參看貫二為一格此篇與帝王要經大略論同格聖人備道全美林執善出處荀子正論篇天下者至重也非至強莫之能任至大也非至辨莫之能分至衆也非至明莫之能知此三至者非聖人莫之能盡故非聖人莫之能至聖人備道全美者也立説天下之美豈有外於道而道豈外於人哉有然天下之人均有是道而不能備是道道一之未盡則其美必有一之不全聖人豈有異於天下之人哉其道本人之所常行而其美皆人之所當得惟聖人能盡人道之極無美有一毫之不備所以充之於身則為一身之達之於天下國家則為天下國家之美凡衆善之美無不全也批云法度整嚴氣象廣大首尾相照應有如常山蛇之勢前輩典刑如此真可為後學矜式論曰天下之至貴者至貴指美字皆具於人之一身一身指道字謂美在道之中特患夫人不能盡其極耳盡其極指備與全字謂天下之人不能備是道則不能全是美惟聖人則能備而全之人惟反之於身身是道不自知其可貴而可樂也可貴可樂是美知謂道中有美人不之徒見夫聖人之所存者與人異謂聖人之備且全與冒頭繳處聖人何以異於人哉相應凡天下之所願而不可得者皆集而有之於其身謂道之備美之全以為聖人必有大過人者反説備與全字孰知天下之美豈有外於道道中自有美而道豈外於人哉聖人與人同耳人而有斯道也則未有無斯美也天下之人與聖人同此道然其道有一之未盡不備則其美必有一之不周不全故其所得於道者有小有大與原題下相應而其美之在身者亦有偏而有全得道之小者其美則偏得道之大者其美則全聖人盡人道之極者也極字是備其道本人之所常行道與人同而其美皆人之所當有美亦與人同夫惟天下常行之理至於聖人而後無遺憾天下之人不能備此道惟聖人則能備之無遺憾見備意故自其心而充之於身從道中推出去則為一身之美能備是道則能全是美應與講題相自其身而達之於天下國家從道中推出去則為天下國家之美與講題相應地位開闊當時尊之萬世仰之尊字仰字見得聖人之備與全處與大講末相應而聖人之心歉然不足且不敢以為備且全也與結尾相應聖人何以異於人哉應接題聖人之所存者與人異聖人備道全美請因荀卿子之言而申之引本文夫天下之謂美者提出美字説皆人之所同貴而同欲也只是冒頭接題可貴可樂意人之情好善而惡惡記緇衣好賢如緇衣惡惡如巷伯好榮而惡辱孟子公孫丑上仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下也所好皆至美之事而所惡皆不美之名且雙説美與不美字使順其所好而行之人若能順其所好便是知道了以之處已則順而祥身之美以之治人則愛而公天下國家之美以之養心則和而平心之美之用三個以格以上三句出韓文原道以之為已則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當顧豈非可樂之事哉應接題可樂字是皆人之所得有者也應冒頭皆集而有之於身然人皆知好之而不能有之者何哉粘上好字有字設問道原於天而授於人至此方出道字出前董仲舒䇿道之大原於天人有是道而不能為已有也粘上有字説不能備道則人雖有是美亦不得而有之也是以不能全美人不能有是道而道豈外於人乎應冒頭道豈外於人哉即其日用飲食日由於斯道之中應冒頭人而有斯道也苟不至自絶於道則莫不皆有一二可見之美應冒頭未有無斯美也特庸人不自知耳不知道中之美惟賢者則知是道之所在而求以備之者也賢人勝於庸人故其美之在身者亦各隨其所得之小大應冒頭所得於道有小有大美之在身有偏有全其淺者為聞望之美此是美之小者詩令聞令望其盛者為事業之美此美勝其淺者之易坤卦發於事業美至也即其成也為充實之美此美又勝其盛者信孟子盡心下孟子曰可欲之謂善有諸已之謂充實之謂美充實而有光輝之謂大然知之而未至體之而未具轉歸不能備全上應冒頭道有一之未盡則美之全者或缺焉應冒頭則其美必有一之不周此備道全美所以獨歸於聖人也歟轉歸聖人身上今夫聖人之道何道也就聖人上正説韓原道斯道也何道也喚下文即其父子而有親焉以下講道字子孟子滕文公上父有親即其君臣而有義焉同上君臣有義即其夫婦兄弟而有序别焉同上夫婦有别長幼有序此皆天下之通道也以上三句是道之常應冒頭其道本人之所常行天下有是道之常而聖人盡是道之極應冒頭聖人盡人道之極也衆人之所不得有者聖人皆萃而有之矣應原題人不能有是道等語觀其君臣則仁敬之至也至是備仁大學為人君止於為人臣止於敬觀其父子則慈孝之極也極是備為同上為人父止於慈人子止於孝觀其內外長幼之序則或友或恭或順或睦也見上注長幼有序又書舜典五典克從注兄友弟恭也又左傳兄愛而友弟敬而順天下之美孰有大於此者此是道中之美故充之於身則語默出處動容周旋不思而得不勉而中一身之美也以下四句是説全美處語易繫辭或出或處或默或又孟動容周旋中禮又中庸不勉而中不思而得應冒頭充之於身則為一身之美形之於家則閨門有章宫庭有度不言而化不肅而成一家之美也見左傳云云又栁文晉問平陽堯之所理焉有無為不言而垂衣裳之化又孝經聖人之教不肅而成其政不嚴而治應冒頭達之於國則朝廷正而百官治一國之美也前董仲舒策正朝廷以正百官正百官以正萬民應冒頭舉而措之天下則黎民雍而萬邦和天下之美也書堯典協和萬邦黎民於變時雍應冒頭達之於天下國家則為天下國家之美在上則美其政苟子儒效篇儒者在本朝則美政在下則美其俗前董仲舒䇿教化行而習俗美道行則美見於治如堯舜禹湯文武聖人之治不行則美垂於書如孔孟荀揚聖賢之書其致治也郊焉而假廟焉而饗諸福之物可致之祥莫不畢至而王道備矣此是美見於治者福韓原道郊焉而天神假廟焉而人鬼享又董仲舒諸之物可致之祥莫不畢至而王道備矣其垂訓也燦如日星信如四時理義之會事物之情莫不咸在而天道備矣此是美見於書者又前漢執此之令信如四時天下之所願而不可得者惟聖人能全之應冒頭天下之所願而不可得者皆集而有之於身豈有他哉喚下文亦盡人道之極而已應冒頭聖人盡人道之極也人之一身天下之至貴者無不具也應破題天下之至貴者皆具於人之一身聖人不患不能全其美而患不能備其道惟聖人能備其道則能全其美蓋以人道之大有一不備則猶四體之不具應冒頭道有一之未盡則其美有一之未周祥孟公孫丑上人之有是四端猶其有四體也而美之全與否則聖人不知也聖人但知備道而已非求全美而美自全由天下後世觀之則聖人之美孰有加焉者哉應冒頭天下尊之後世仰之致其詠歎則曰美哉韶濩大武之德也左襄二十九年吳公子札來聘請觀周樂云云見舞大武者曰美哉周之盛也其若此乎見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也極其形容則曰宗廟之美百官之冨也語十九子貢曰譬之宫墻賜之墻也及肩窺見室家之好夫子之墻數仞不得其門而入不見宗廟之美百官之富得其門者或寡矣此荀卿子備道全美之言所由發也引本文繳結盡由聖人觀之從由天下後世觀之引入由聖人觀之文勢不斷則其所全之美歉然若有不足而道之大備猶曰未備焉應冒頭聖人之心歉然不足且不敢以為備且全也是故舜竭力於孝而天下不足以解其志孟萬章問曰舜往于田號泣于旻天何為其號泣也孟子曰怨慕也云云我竭力耕田共為子職而已矣云云富人之所欲富有天下不足以解憂云云惟順於父母可以解憂文王視民如傷而天下不足以易其憂孟子文王視民如傷望道而未之見夫子轍環天下卒老于行而不遑於退處也韓進學解仲尼轍環天下卒老于行夫是道之美至聖人而盡猶有憂焉何哉喚下文此人道之所以為無窮而天地之大猶有憾也含有餘不盡之意見中庸謹論貫二為一格此篇與聖人備道全美論同格帝王要經大略彭方迥出處唐裴垍賢良䇿嚴尤三策人以為一可采也侵逼則驅而逺之遁逃則守而備之此帝王御外之要經靖邊之大略也立説帝王所謂大略非出於要經之外而經之要者又非區區守禦之云不過自治而已全篇本中庸九經為説謂此乃為天下國家經常不易之道吾惟即其要而持之至於常道修明四裔自服人見其為略之大而不知實得於經之要也考官批云説有根據造辭老蒼較之他作氣象大段不同真可為省闈多士之冠論曰聖人之自治有常道常是經謂帝王自治有經常之道故所持者約而其用博焉約是要博是大用是略夫中國之所以異於外裔者氣象好以經常不易之道存焉耳此是要經而聖人所以自治其中國者應破題自治字是主意初豈以逺人之變而易吾之常也哉應常字是經如其捨我之常徇彼之變反接上面常變二字擾擾然求其治於彼徒欲靖邊以為制敵之略照題略字與大講相應而所以自治者不以定力持之不能自治反照主意則要經不立出要經三字反説在我固已失其制之之本矣失其自治之要經而安能使彼之帖然受制於我何以禦外靖邊盍觀諸帝王乎歸正中國者帝王所自立也此句出文中子彼其以一身為中外之主謂帝王一身為中國外域之宗主而異俗懷服無有異向使外域向化無有二心是孰使之然哉喚下文或者求其故而不得則以為謀略之大致然須要如此發方見題上大略字而不知其操約以御博約是要博是大篤近而舉逺篤近是自治要經舉逺是治人大略與原題相應帝王之意亦惟曰凡為天下國家有常經見中庸句全篇祖此一立説乃中國所以為中國之道此是自治常道吾當持之而不易耳應持字至於常道修明四裔自服要經中有大略此其理之必然而吾何與知之哉與大講人見其為略之大而吾不知相應是意也唐之裴垍略道破裴垍惜語焉而弗詳耳略責之未説出此句是韓原道擇焉而不精語焉而不詳帝王要經大略如何請循其本應前制之之本字夫自山河兩戒奠布埏垓設難辨論自此以下造語頗異又唐天文志一行以為天下山河之象存乎兩戒前漢書上暢九垓下泝八埏九夷八蠻紛紛籍籍書旅熬通道于九夷八蠻謂自有中國便有外裔龍戰野而豕負塗易坤卦上六龍戰于野暌卦上九暌孤見豕負塗久矣其為方內患矣謂四裔久為中國患帝王者作説帝王來則地彌天區界軼海內語異句新皆有所祖四夷來王書大禹謨無怠無荒四夷來王三苗丕敘禹貢三危既宅三苗丕敘維其喙矣綿詩昆夷駾矣維其喙矣而毋或越厥志孟曷敢有越厥志吁果何自而得此哉設問意其厲志講武駟伐盛威於中國見毛詩則莫我敢曷詩則莫我敢曷然而振旅還率書禹謨班師振旅詩出車勞還率也率與帥同又焉用兵謂帝王未嘗用兵矧夫習威暴之事樂戰鬬之危者又非徒抗兵相加之所可折謂外裔氣習非憚用兵曽謂帝王為之乎帝王肯如此毋亦其謀略過絶於人有以制之耳應冒頭或者求其故而不得則以為謀略之大致然吁又不然矣建元天子建元漢武帝年號號為雄才大略武帝贊雄才大略計其囊括包舉之智當不在帝王下賈誼過秦論囊括四海包舉宇內然輪臺之詔終怵然動心焉前西域贊末年遂棄輪臺之地下哀痛之詔是豈其長駕逺馭才略未宏相如諭蜀文撫武帝長駕逺抑未識所謂要經者而自治焉爾謂武帝知大略而不知要經䇿原題至此皆是步驟樓昞漢屈羣論要哉帝王之經乎為天下國家有九經所以行之者一中庸凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也來百工也柔逺人也懷諸侯也云云所以行之者一也一者其要也喝出要字而柔逺特經中一事耳摘出柔逺以為特九經中之一事見得古人非區區於守禦自其行乎修身之經惟知非禮勿動而已中庸非禮勿動所以修身也此上是本以下是效至於謹德而四夷賔人見其略之大而吾不知也要經中自有大略咸書旅􅋙明王謹德四夷賔自其行乎尊賢之經惟知賤貨貴德而已中庸賤貨而貴德所以勸賢也下此上是本以是效至於難任人而蠻夷服人見其略之大而吾不知也要經中自有大略率書舜典而難任人蠻夷服明德睦族親親之經也堯典克明俊德以親九族九族既睦此上是本以下是效而蠻貊之莫不尊親非所計要經中自有大略氣中庸是以施及蠻貊云云凡有血者莫不尊親求賢用吉敬臣之經也詩卷阿求賢用吉士也以上是本以下是效而海內之莫不來臣非所期要經中自有大略德前董仲舒䇿四海之內聞盛而皆來臣執其經於體羣臣子庶民之時則疏附奔走羣才輯也綿詩豫曰有疏附豫曰有先後豫曰有奔走懷保惠鮮民生遂也書無逸懷保小民惠鮮鰥寡此上是本以下是效而昆夷之駾自駾矣要經中自有大略注見原題循其經於來百工懷諸侯之時則斯干考室羣力齊也詩斯干宣王考室也錫韓褒申衆志勸也詩韓奕美宣王能錫命諸侯云云又嵩髙云云能建國親諸侯褒賞申伯焉下此上是本以是效而淮夷之來自來耳要經中自大略求詩江漢淮夷來此段應冒頭至於常道修明夷狄自服吾何與知之吁此帝王事也歸帝王上帝王不作而後之制敵者吾惑焉入後世深謀以傾之其名曰計略非要經中之大略過儒學傳徐明逺其計略人耀武以威之其名曰兵略非要經中之大略相文中子魏相篇魏相真漢識兵略窮兵逺討以剃獮之其名曰逺略非要經中之大略後剃音雉剗除也獮音鮮秋曰獮殺之也西域傳懷致逺之略彼固自以為吾制敵之略舉天下莫能抗也上連用三個略字但非帝王之所謂大略其應冒頭捨我之常徇彼之變擾擾然求治於彼以為制敵之略不知中國之異於外裔者以其經常不易之道爾應冒頭接題略帝王之所謂大非出於要經之外而顧乃漫不省焉謂後世之人不知也則夫能空幕南之王庭西域贊幕南無王庭而不能不減海內之戶口又昭帝贊海內虛耗戶口減半若漢武者前後相踵也如武帝所為者多矣况唐德宗乎一句歸德宗極省力裴垍舉帝王之事告之引本文而歸諸要經大略似矣且説裴垍之言似是豈知大略非出於要經之外而經之要者又非守禦云爾也垍謂帝王御外之要經靖邊之大略是分而為二也此篇主意在此二句是合二為一者也垍何足以知之夫中國之失其所以為中國也久矣再喚起中國説非宫府一體則不能定中原蜀志諸葛亮傳上疏宫中府中俱為一體云云當奬率三軍北定中原非朝廷肅清則不能定山東韓愈元和聖德詩朝廷清明無有欺蔽云云東定青徐積年之叛又平淮西碑旋取山東垍所事何如主也垍所事乃德宗不如先主憲宗所以平西戎者特在邊境間乎題下文陛下之問及此也豈不以西戎未平乎臣伏見陛下境土之兵衆矣邊塞之將多矣但令有所統一則凱樂之期可依而望也君子之論有本有末本是應冒頭本字末字要説結尾意去古愈逺敵患益深謂後世不如古外患尤甚於古則禦外亦要經靖邊亦大略垍之言未失也略放寬裴垍為結尾張本要其本本元元之論應冒頭本字則帝王之要經大略識者必有以辨之矣又折歸本意文有抑揚操縱應冒頭唐之裴垍惜語焉而弗詳耳雖然內夏外夷聽其自附盛德事也古人非求服四裔帝王所本蓋深逺矣應本字降及後世亦謹守疆埸事急則戰而已此一轉謂帝王之事未易為後世得如裴垍之言亦未為失也埸音左傳亦邊境語出四裔可服而未易遽服也亦是難事文德如舜則苗格舞干大禹謨帝乃誕敷文德舞干羽于兩階七旬有苗格用以解平城之圍則君子以為踈矣後崔實傳俗士不知變以為干戚之舞足以解平城之圍又胸奴圍髙祖於平城故曰垍之言亦未為失也應前句特未識帝王之經與略者耳又折歸主意非畢竟裴垍之言亦有可取特所以論帝王耳雖然尚以俟後之師式帝王者後崔實論人主師五帝而式三王暗説今日此篇極得文字抑揚操縱之法宜細觀之謹論前篇謂備道之中自有全美此篇謂要經之中自有大略是貫二為一格可以類推推原本文格此篇與孝武號令文章論同意漢訓辭深厚如何戴慶炣出處前漢儒林傳序公孫𢎞為學官請白丞相御史言制曰禮壞樂崩朕甚愍焉其令禮官勸學興禮崇化厲賢臣案詔書下者文章爾雅訓辭深厚立説就本出處上文崇化厲賢主意謂武帝所下詔令其訓辭所以深且厚而不流於淺薄者由其崇儒重道有古人之遺意故也批云主意純正文筆駿發深得前輩論體人批此篇下得言語最好論曰英主以崇儒重道為心主意道英主指漢武帝崇厲儒重指出處上文崇化賢則發而為言者始不流於薄矣言指訓辭字薄反形深厚字夫太上忘言其次有言語老字粘上言説則言固非得已也至於有言不如忘言不得已而言焉粘上文而又無補於風化之大則是不以崇儒重道為心則言之薄亦甚矣訓辭安得而深厚惟當儒學湮晦之餘暗説漢武帝時深思吾道一脈不絶如線指出處本文禮壞樂崩朕甚愍焉意慨然出而崇奬作新之此其意至美也指本文崇化厲賢見得武帝崇儒重道之意一旦發之詔令誕告天下訓辭識者誦其言味其旨謂天下之人誦詔令之言辭味詔令之旨趣真見溫醇正大之氣藹然可掬形容深厚意則其待天下者固不薄深厚而所以為言者亦未可以薄而窺之也應破題薄字漢武元朔一詔元朔五年詔崇鄉黨之化以厲賢才蓋非尋常詔令比也語好訓辭所發無非崇化厲賢之真意主意此意近古謂崇儒重道有三代之遺意孰不聳動於觀感之下謂天下之人喜其詔令公孫𢎞等諸臣嘉稱而樂道之敘出處本文其曰深厚也固宜發盡出處本意史臣筆之儒林序傳吁有旨哉漢訓辭深厚如何請申之讀髙帝省賦之詔其意固仁恕矣而謂之深厚則未也便從漢詔原起年漢高帝本紀十一二月詔曰欲省賦甚令獻未有程吏或多賦以為獻而諸侯王尤多民疾之令諸侯王通侯常以十月朝獻及郡各以其口數率人嵗六十三錢以給獻費讀文帝重農之詔其意固懇惻矣而謂之深厚則未也文帝本紀二年二月詔曰夫農天下之本其開藉田朕親率耕讀景帝讞獄之詔其意固寬恤矣而謂之深厚則未也景帝紀五年九月詔諸獄疑輒讞之武謂高文景三君之詔未謂之深厚要歸帝上來夫人主敷心腹腎腸而布之言語號令書盤庚今豫其敷心腹腎腸歷告爾百姓于朕志乃隱然有深厚之意應上深厚字此豈規規然求為是文辭哉要引下文崇儒重道之心夫固有以發之也入主意明快不然則深厚之褒何獨歸之元朔一詔哉反説有力是時考官批謂切近明快謂此等處也况自秦人私制謂詔令使羣臣庶民畏之如虎狼用前輩文而無雍容樂易之意無崇儒重道之意經生學士坑滅殆盡固無望其招延而涵育之也此段説秦人焚滅之禍無復崇重之意文有起伏云通鑑李斯上書云云諸生不師今而學古以靡當世云臣請史官非秦記皆燒之非博士官所職天下有藏詩書百家語者皆請詣守尉雜燒之生同上侯生盧生相與譏議始皇始皇聞之大怒曰盧等吾尊賜之甚厚今乃誹謗我云云於是使御史悉案問諸生諸生傳相告引乃自除犯禁者四百六十餘人皆坑之咸陽漢興雖詔令數下數入聲亦自有聳動羣聽者謂漢之詔令亦有可取者但不如武帝之深厚然馬上之習甫除陸賈時時稱説詩書髙帝曰乃翁居馬上得之安事詩書黃老之説已入本出處上文竇太后好黃老術冝王言之深厚不能不屬之上嘉下樂之武帝也急收入本題可謂簡快武帝詔朕上嘉唐虞下樂商周武固非真知道者先揚後抑語有稱停其亦念吾儒之道説主意自春秋戰國以來湫底壅遏亦不應若是之久也應冒頭當儒學湮晦之餘微如孟子序堯舜湯文周孔之道將遂湮正塗壅底之意學之未勸本出處勸學興禮俗之未醇本出處博士弟子貟之未置本出處下文為博士官置弟子五十人復其身太常擇民年十八以上儀狀端正者補博士弟子往來于懷如有求而弗獲者用檀弓語想其胸中所存略不敢有一毫鄙夷厭薄之意形容武帝崇儒重道之意開導之訓迪之只是崇化厲賢之意直欲續儒道之一脈應冒頭吾道一脈不絶如線此其辭豈不深且厚哉此訓辭所以深厚今取其訓辭而讀之却把訓辭中語鋪排出來形容深厚意如愍禮樂之廢壞見題注禮廢樂崩朕甚愍焉其視古者教民中和同一指趨也應冒頭此意近古樂周禮以五禮防萬民之情而教之中以六防萬民之偽而教之和如明居室之大倫出處上文婚姻者居室之大倫也其視古者婚姻以時同一風教也應冒頭此意近古姻詩桃夭序男女以正婚以時如欲延天下士以登於朝出處上文故詳延天下方聞之士咸登諸朝其視古者旁招俊乂同一規模也應冒頭此意近古庶書説命旁招俊乂列于位此詔之頒總上文豈惟春秋戰國之所無應自春秋戰國以來等語而亦髙帝文景之所未暇及者也繳原題下髙文景三君事謂三君之詔不如武帝之深厚𢎞也入題實參衆議條列來上此是公孫𢎞説合入此語且以訓辭深厚稱之敘本文夫帝之號令煥然可述武帝贊號令文章煥然可述若詔問公卿元朔元年詔曰公卿大夫所使廣教化美風俗也詔諭巴蜀元光元年五月發巴蜀治南夷道詔司馬相如諭巴蜀父老詔舉賢良建元元年正月詔丞相御史列侯舉賢良皆詔也謂以上三詔奚獨是詔號為深厚哉難元朔一詔其意蓋謂崇化厲賢解歸主意見本題注髣佛三代聖人之遺意應冒頭此意近古矧數百年絶響之餘應冒頭當儒學湮晦之餘慷慨發憤欲一旦而振起之應冒頭出而崇奬作新之殆未可以尋常詔令比也其訓辭深厚皆自崇儒重道中來不可専以他時詔令為比應冒頭語自時厥後公卿大夫彬彬多文學之士出處下文自此以來公卿大夫吏彬彬多文學之士矣史臣筆之儒林序傳其亦知源流所自來矣照冒頭結處雖然武帝表章六經罷黜百家武帝贊孝武初立罷黜百家表章六經固未為不識吾道之味者語好奈內多欲而外施仁義汲黯曰陛下內多欲而外施仁義則訓辭亦未純於深厚也大凡做漢唐論先褒則後貶先貶此則後褒此篇既是一力褒武帝至不容不略貶之元封詔茂才異等至以泛駕之馬喻之元封五年詔曰泛駕之馬􅘆弛之士亦在御之而己其令州郡察吏民有茂才異等者旨意一差趨者瀾倒謂武帝上面一詔言語未謂之深厚是以人皆效之韓進學解回狂瀾於既倒於是上書自鬻待詔金門東方朔傳武帝初即位四方之士多上書言得失自衒鬻者以千萬數方朔待詔金馬門往往皆􅘆弛之士見上注準􅘆音托謂趺蕩於規矩繩之外之士而儒道為之蠧蝕矣儒道亦蠧壞晦蝕安得深厚愚故為之説曰元朔一詔帝尊經之心發之也本題注意元封一詔帝多欲之心纍之也見上汲黯注自作議論斷以元朔之詔為帝喜褒之也又以元封之詔為帝惜貶之也詔考官批云以元封元朔二並説褒貶亦是謹論推原本文格此篇與漢訓辭深厚論同意孝武號令文章如何繆烈出處前漢武帝贊孝武初立卓然罷黜百家表章六經疇咨海內舉其俊茂與之立功興太學修郊祀改正朔定厯數協音律作詩樂建封禪禮百神紹周後號令文章煥然可述後嗣得遵洪業立説就出處上文表章六經上立意謂武帝之號令文章煥然可述皆自表章六經中來蓋六經者治道之本有聖經以為之本則發而為號令文章皆自然而然有可稱述苟不本諸經而徒用力於號令文章之末又何足取哉考官批云議論正大文勢發越可謂傑特之作論曰治道未有無其本也本指表章六經本立則其見諸顯設者皆自然而然顯設指號令文章自然是主意初非容其心也無容心只是主意自然之説六經者治道之本明説出六經是本盛帝明王之極致舉不外是謂帝王之治自六經中來其措辭立論雖非後來所可企望見於六經中無非號令文章豈後人所能及非元本是希聲寡和後改云措辭立論以元本四字冒頭語然洪模懿範昭布森列六經模範可法挹其餘潤則典則程度自有可觀者焉六經典則程度皆號令文章之法世之有志於治道者説後世之君孰不欲舉一世之治應破題治道字使煥然皆有華藻之可述言號令文章然求之號令鮮可人意號令不足取求之文章徒飾虛言文章亦不足取元本是骫骳羞稱後改云徒飾虛言以元本四字非冒頭語或者見其不如古而歸咎於號令文章之不修不知本不知此豈用力於號令文章者所能得哉要自然而然有經術以為之本應主意本字沉浸醲郁之餘自六經中發出去郁韓進學解沉浸醲含英咀華由是而充則自有不容掩者矣無非號令文章漢武帝承禮文多闕之後題上文稽古禮文之事猶多闕焉迄能使號令文章煥然可述本文盛哉稱贊其號令文章之盛班孟堅述其所以盛粘上盛字歸班固而先之表章六經之一言出處下文吁其知武帝治道之所自出也歟出於六經孝武號令文章如何請申之發號施令罔有不臧書冏命全句渙汗大號令出惟行易渙卦渙汗其大號又書周官令出惟行弗惟反非六經之所以為號令者乎六經中言號令處觀乎人文化成天下易賁卦觀乎人文以化成天下追琢其章金玉其相詩朴棫全句非六經之所以為文章者乎六經中言文章處號令之明文章之粹未有過此者鎖上兩扇豈不足以垂百王之軌範萬世之龜鑑歟謂六經可為後出之法然自三代而降貶後世乘時施為有志於治道者應冒頭世之有志於治道者豈不欲以古之號令者為號令以古之文章者為文章卒之卑陋蹇狹不廣大之貌瑟縮骫骳不舒暢之貌骫音委骳音靡不振之貌行之一時已不足以動天下之觀聽尚何望其傳之後嗣詔之來世也哉自此以上是應冒頭反説一段蓋自文侯之命稱述於東周者書文侯之命乃周平王命晉文侯之辭辭體卑弱已無復君陳康誥之舊而號令不如古書君陳乃成王命君陳尹東郊之辭康誥乃成王封唐叔之辭謂平王號令卑弱不及成王自枝葉未有害本實先撥天下蕩蕩無綱紀文章而文章不如古並詩蕩篇全句謂周厲王之時文章不如文武成康之時自是而下源流益逺愈不如古秦人不師古始史秦紀淳于越曰今陛下事不師古焚滅六經書序秦始皇滅先代典籍焚書坑儒見漢訓辭深厚論原題詳注亦既自拔其本自塞其源矣應本字其晉國語已自拔本矣徙木之令史商君傳商君令未布乃立木於市南門募民有徙置北門者豫十金人莫敢徙復下令曰有徙者豫五十金有一人徙之輒與五十金封禪之文史始皇紀禪梁父乃刻所立石其辭曰皇帝立位作制明法徒足以驅一世於聾瞶其於號令文章何足多論原題照主意用六經中號令文章可為法則起歷敘三代而下號令文章不如古漢興髙皇帝起自馬上不事詩書前陸賈傳賈時時前説稱詩書髙詩書帝曰乃公居馬上得之安事一時所謂號令文章者不過羽檄召兵大風起舞而已髙帝紀三秦可傳檄而定檄尺書也加羽毛取其速也髙帝號令如此雲同上帝置酒沛宫酒酣上擊築自歌曰大風起兮飛揚髙帝之文章如此時方草創君子無望焉謂髙帝草創固無望其號令文章之美至於文景漸有可稱漢文帝景帝後元詔令溫然粹然寖有古意後元文帝年號君子以為廣遊學之路刺六經作王制實為之先也孟子敘文帝廣遊學之路又前郊祀志使博士諸生刺六經中作王制謂文帝之號令文章自六經中來若夫禮樂未遑制度多闕亦以時之未暇耳賈誼傳誼以為漢興二十餘年當興禮樂帝謙遜未遑又制度踈闕謂文帝號令文章未純武帝光紹鴻業正説武帝以言其時則漢興六七十載煙火萬里也史律書文帝里末年煙火萬以言其資則雄才大略髙邁前古也武帝贊帝之雄才大略漢家一代之治發揮而潤色之豈非此其時乎謂武帝勝於髙文景時當有號令文章之可述自今觀之興廉有詔元朔元年詔求言有詔建元元年詔舉茂才有詔元光元年詔號令班班聞者至今可使聳動得鼎有歌元鼎四年得實鼎天馬有歌馬生渥窪水中作寶鼎天馬歌樂章有歌前禮樂志文章炳炳見者至今猶足晃耀夫爛然雅奏玉振金聲前兒寬傳斐然前陳日光玉潔韓文日光玉潔人知其為帝之號令文章爾豈知罷黜百家表章六經題注帝之自本自根蓋有在也班孟堅述其燦然之盛足以詒謀後嗣題注而敘事之首表章罷黜實為之先見上究其旨意豈直以修郊祀改正朔協音律以此為盛而已哉題注意者黃老之言盡屏時好儒術登崇相與辨難前儒林傳序故能使文章爾雅訓辭溫潤同上膏之沃者光茂源之深者流長信有自來矣喻以六經之本而為號令文章史儒林序全句不然異時內外相應無非義理溫潤之文號令文章儻非所積之宏所培之厚豈能強至是哉非本之六經安能用力而為號令文章應冒頭此豈用力於號令文章者所能得哉太史公之作史記也司馬遷盛稱建元元狩以來文辭燦然武帝二年號不述於表不述於紀而自序於儒林傳之首見儒林傳序遷其知所本始矣應主意本字文謂遷之説亦謂號令章本之六經意者班固之言其猶有所祖述歟謂班固之言得之司馬遷厥後王通續書之著文中子曰續書始漢既嘆五帝之典三王之誥不可復見而於漢之制志詔策深所致意文中子周公篇賈瓊問續書之義子曰天下之義列乎範者有四曰制曰詔曰志曰䇿且曰帝王逺矣舍漢其將安之同上天地篇子曰五帝三王吾不得而見也舍兩漢其將安之然則班固所謂後嗣得遵洪業豈不信然題注以上大講先説武帝之號令文章歸於表章六經之功又以班固祖述太史公敘儒林傳之意及文中子取漢之説文有證據雖然續書無傳君子嘗深為文中子惜文中子續書無傳於世如使漢之號令文章果能無愧於典誥之舊則續書制志至今存可也注見上毋亦可以為漢之盛而未足為五帝三王之盛歟此二句少抑漢武只能為漢之盛仲舒之言曰強勉學問知益明董仲舒對武帝䇿強勉學問則聞見博而知益明武帝有可為之時有能為之資又有大有為之志時資志三字皆與前面相應表章罷黜以來意向亦略定矣見前注惜夫多欲未克不能勉其所未至汲黯傳陛下內多欲而外施仁義奈何其欲效唐虞之主乎於是號令文章非不燦然可述而可見者僅止此只能為漢之盛如使以仲舒所謂強勉者加之意則詩書所稱何以加焉題下文雖詩書所稱何以加焉令結尾意謂帝不知加學問故號文章僅止於此寓嘆惜意謹論前篇本上文崇化厲賢所以訓辭深厚此篇亦本上文表章六經所以號令文章可述格同意同可以合看立説尊題格此篇與天下國家之本在身論同意聖人擬天地參諸身陳松龍出處揚子五百篇或問五百嵗而聖人出有諸曰堯舜禹君臣也而並文武周公父子也而處湯孔子數百嵗而生因往以推來雖千一不可知也聖人有以擬天地而參諸身乎立説以形而觀則天地為大聖人一身為小以道而觀則聖人之道與天地為一初不囿於形也惟其不囿於形故擬於彼而參諸此必使無一時不以天地為準則無一事不與天地相似由是觀之一身雖微可與天地並矣批云文簡意明非老筆不能道最利初學論曰道一而已聖人之道即天地之道惟不囿於形者能得之不以天地為大吾身為小是不囿於形也夫其不免囿於形也接上囿於形字説則天地為大一身為小反説主意必將擬之於彼參之於此是強擬而參之果何從而強同也哉何以與天地並有聖人者出正説知吾身之道即天地之道道一而己故以道觀天地則天地亦形爾不囿於形天地非道則亦不能以自立天地即此道故惟以此而擬説擬字以道而擬不以形而擬則精思熟慮收視反聽而默參諸一身之問説參字必使無一時不以天地為準易繫辭易與天地準則無一事不與天地相似用前輩語由是而觀則一身雖微可與天地並如中庸可與天地參之意聖人所以厚待吾身而為天地萬世綱常之主者此其事非可以易言也見得聖人一身之大與天地為一揚子謂聖人擬天地參諸身愚請以是而申其説夫自太極一判而為天地提起天地先説則凡以藐焉之身混然中處者此徒以常人論也謂聖人居天地之問坤張橫渠西銘乾稱父稱母豫兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也苟知天地之塞吾其體天地之帥吾其性見上注則不徒求天地於天地且自反吾身之天地聖人之一身自有天地鳶飛魚躍在在呈露中庸詩云鳶飛戾天魚躍於淵言其上下察也參前倚衡如將見之語十五立則見其參於前也在輿則見其倚於衡也斯固聖人之事也此是聖人一身之天地然聖人不世出於天下謂聖人不常出而天下之人反説往往見天體在上日月星辰萬象畢麗中庸今夫天斯昭昭之多日月星辰繫焉萬物覆焉又韓原人形於上日月星辰皆天也地體在下山川草木衆彚畢陳同上形於下草木山川皆地也吾以一身置乎其中聖人一身居天地之中冝其與動植微物等與萬物一同形色為纍囿於形稽驗不熟不能擬而參之而聖人之統愈不傳言囿於形者如此然則見天地而不見道其流弊至此應冒頭接題一段此豈聖人果不世出哉此句引入題目主意苟有擬天地而參諸身者焉則是亦聖人而已矣自此以下正説聖人以道參天地而不以形意且聖人本無以異於人者孟豈有以異於人哉堯舜與人同耳惟其日夜之所擬必思毫髮無愧於天地説擬字孟是其日夜之所息嘗擬諸天地曰乾稱父坤稱母父母之愛宏矣見上西銘注反而參諸吾身果能視生民如保赤子否也前路溫舒傳文帝愛民如赤子嘗擬諸天地曰天職司覆地職司載覆載之功溥矣列子天瑞篇天職生覆地職形載聖職教化反而參之吾身果能納八紘於度內否也猶吕與叔克已銘洞然八荒皆在我闥意又聖人以天下為度擬其髙明擬其博厚擬其悠久無疆中庸博厚所以載物也髙明所以覆物也悠久所以成物也博厚配地髙明配天悠久無疆無所不用其擬展轉説擬字又參之以平旦之氣却説參字息孟告子上其日夜之所平旦之氣參之以喜怒哀樂未發之時中庸喜怒哀樂未發謂之中凡起居食息語默動靜之頃皆可得而參也説得參字分曉以其所參而終不差其所擬擬字參字夾説有審訂無揣摩有稽驗無強揠此四字説擬字參字大意強揠勉力而提拔之意隱然道體密行乎中應道字主意而會廣大於精微中庸致廣大而盡精微推精微於廣大見上倒説吾不知天地之為聖人乎聖人之為天地乎學莊子語蓋聖人此身天地所賦也見得聖人之身與天地一率性會道而形不足以囿之應破題不囿於形意中庸率性之謂道仰觀俯察用功彌博易繫辭仰以觀於天文俯以察於地理斯亦天地之望生人之幸世道之福也文字大體繳盡講題意雖然自三聖執中之學不傳語二十堯曰咨爾舜天之厯數在爾躬允執其中舜亦以命禹商周質文之統不續前漢董仲舒䇿夏尚忠商尚質周尚文而吾夫子潛心之夢蓋不復栩栩於西周時矣語好尼揚子問神篇昔仲潛心於文王矣又語述而子曰甚矣吾衰也久矣吾不復夢見周公又莊子莊周夢為胡蝶蘧蘧然栩栩然或者自是歸諸世數之不傳引本出處將以天地生聖人為期而不復以擬天地為事見本題注何其見道未審也責或問不見道子雲論數之定未定至舉天地而參諸聖人之身見本文夫莫小於一身而天地猶在所可擬吁此亦踐形之學也應形字然孟子盡心上形色天性也惟聖人後可以踐形注履此美形也謹論立説尊題格此篇與聖人擬天地參諸身論同意天下國家之本在身莫應龍出處孟子離婁上天下之本在國國之本在家家之本在身大學曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身孟子之言蓋本諸此立説以勢觀之則天下國家為大以道觀之則吾身尤大於天下國家知吾身之大則先立其大可以用天下國家矣批云文勢如長江大河一㵼千里文采如奇葩麗卉最醒人眼視筆下蹇澀者大有徑庭論曰人主知自立其大自立其大指身者孟子先立乎其大則能用大矣用大指天下國家天下國家至大也包勢之大人主一身則尤大也包道之大世之人主凡其輕用天下國家者豈忍為是哉輕用便不能用大失在於視天下國家甚大視吾身甚眇眇小也謂大者之難用而眇然者要非其所係也其不能用大者以吾之所立者小耳嗚呼人主一身中兩間而立見得身之大處坤如母西銘語乾稱父稱子兹藐焉乃混然中處意思所宗主者何事便見與天下國家相干涉而顧以小者自狹乎如此則吾身非可小用也天下國家一吾身也因彼而驗此吾身一天下國家也推此以及彼自其在天下者推而在國家又自其天下國家者移而在吾身見得身之大處非吾之一身大於天下國家乎辭意俱暢天下國家為勢之大至此出一個勢字人主一身為道之大又出一箇道字道大者身亦大身之大以道之大自見其身之大則理一身以用天下國家特舉而措之爾結冒頭意猶言舉斯心加諸彼而已句法天下國家之本在身吾孟子蓋望人主先立其大者歟主意請衍其説自有天下國家者習聞孟氏緒論只就孟子上説以為人主一身天下國家之本本文道之在身又人主之本應冒頭道字詳説反約其究不越如是而已孟子博學而詳説之將以反説約也不越即不過也嗟夫此見形知影之論不知本豈足與言用大之道哉歸主意用大字道字自家而國則國大於家自國而天下則天下又大於國從小處説到大處儒者之論謂孟子顧曰人主一身大於天下國家果若何以知其大也設問蓋以人主一身答上問説就身上天地賴之而立極生民賴之而立命前輩云為天地立心為生民立極為萬世開太平前聖賴之而繼絶學同上為前聖繼絶學萬世賴之而開太平見上注以此觀之天下國家大乎人主大乎見得人主一身為甚大且雙開設問蓋亦曰人主大耳答其所謂大講大字蓋以道而不以勢也應冒頭天下國家為勢之大人主一身為道之大我立其大以用其大應破題自立其大則能用大矣風動教化始於衽席詩關睢風以動之教以化之衽席字歸在身上一國之本係於一人同上以一國之事係一人之本一人字歸在身上斂時五福敷錫厥庶民悉會歸於無偏無黨之皇極書洪範五皇極斂時五福用敷鍚厥庶民又無偏無黨王道蕩蕩歸其有極會其有極皇極字歸在身上不曰天下國家之本在身而奚在説在字有力不曰人主一身大於天下國家而孰大哉説大字有力信矣人主不可不先立乎其大也應冒頭主意澄神反視於深宫獨行之時漢書聖主獨行於深宫端本澄源於尸居龍見之際莊子尸居而龍見淵默而雷聲真見夫天地之塞吾其體也天地之帥吾其性也民吾同胞物吾與也以上四句出張橫渠西銘全文其家不可教而能教人者無之大學全句所以示教者誰歟示教在身而已一家仁一國興仁大學全句所以作興者誰歟作興亦在身而已篤恭而天下平出中庸所以盡是恭者又誰歟盡是恭者亦在身辭連用三箇誰歟似是設疑之所以顯見在身而不在他人此非預天下國家也不在他身也在我在吾身者非小也吾身有係於天下國家豈小也哉大也喝得大字有力我之一身雖微似小而天下國家之本積於吾身則甚大天下國家之本都堆積在我身上豈不甚大必正心必誠意則大者立大學欲修其身先正其心欲正其心先誠其意必執中必明德則大者立書大禹謨人心惟危道心惟微惟精惟一允執厥中又堯典克明峻德以親九族九族既睦平章百姓必親君子逺小人則大者立諸葛亮出師表親賢臣逺小人此先漢所以興隆也必晝有為宵有得息有養瞬有存則大者立孟子其日夜之所息平旦之氣其好惡與人相近也者幾希則其旦畫之所為有梏亡之矣梏之反覆則其夜氣不足以存夜氣不足大以存則其違禽獸不逺矣見張文潛文連用四箇者立是歸在身上文勢滔滔似經義體然時文之法自當如此一日二日可樂也而曰有萬幾焉在身上一書臯陶謨篇兢兢業業日二日萬幾匹夫匹婦至微也而曰或能勝豫焉在身上夫書五子之歌豫視天下愚愚婦一能勝豫天下之治泰山四維而曰有積薪厝火之勢焉在身上天前漢嚴助傳下之安猶泰山而四維之也也賈誼策進言者皆曰天下已安己治矣臣獨以為未曰安且治者非愚則諛云云夫抱火厝之積薪之下而寢其上火此未及然因謂之安方今之勢何以異以身立天下國家之極見用大意而不以天下國家局吾身於小應前在吾身者非小也噫嘻兹其所以為大本歟應主意大字兹其為用大之地歟應破題用大字效以上是本以下是自此而親九族和萬邦堯其盛也自吾身推出去為天下國家之本明書堯典以親九族九族既睦平章百姓百姓昭協和萬邦自此而齋栗事親垂拱視阜舜其治也書大禹謨祗載見瞽瞍夔夔齋栗瞽瞍亦允若視揚子虞夏垂拱而天民之阜自此而勤邦儉家聲律身度百姓咸以仁遂禹其德也書大禹謨克勤于邦克儉于家禹史記禹聲為律身為度又禮記立三年百姓咸以仁遂焉自此而致刑于之化極純被之美文王之所以為文也詩思齊刑于寡妻至于兄弟又騶虞詩天下純被文王之化用四箇自此字是自身上推出去為天下國家之本天下大本培養於宫庭培養是狀本字宫庭是家華實於海宇華實是狀本字海宇是天下豈惟此哉上連用四箇自此下連用三箇推之推之於四海而準見禮記推之於老者安少者懷見論語推之於舟車所至霜露所墜凡有血氣莫不尊親見中庸全句吾身大於天下國家的然可信矣説盡本意後世外施仁義者不足以識是大漢武帝欲前汲黯傳陛下內多而外施仁義溺心多愛者不足以識是大唐太宗屠本贊至其牽於多愛復立浮好大喜功勤兵於逺執簿書期會為政者併與其本仆之矣漢宣帝會王吉疏其務在於期簿書斷獄此非太平之基也不足以識是大以上連用三箇應不能用大意我思古人實獲我心毛詩全句其出而君天下者不惟以一身立天下國家之本而盡君道又能以一身立天下國家之教而盡師道君道師道四字面好常挺省元論是用此四字維天之命於穆不己教之源也周頌維天之命全句親親仁民仁民愛物教之推也孟子親親而仁民仁民而愛物乾道變化各正性命首出庶物萬國咸寧教之溥博淵泉也見易乾卦書中庸溥博淵泉而時出之源此處文法是學通大哉乾元萬物資始誠之也乾道變化各正性命誠斯立焉漢唐人主局其見於一身之小應冒頭視吾身甚眇荒其見於天下國家之大應冒頭視天下國家甚大本原既舛如君道何如師道何繳結下語迅速然則必以天地萬物為一體以天下為一家以中國為一人者始足以及此見禮記扇以下三文氣象廣大方才襯得用大意出必盡巳之性以盡人之性盡人之性以盡物之性始足以及此見中庸必所過者化所存者神上下與天地同流者始足以及此見孟子以又連下三箇始足及此此自是一家機軸謹論前篇謂天地雖大吾身尤大此篇謂天下國家雖大而吾身尤大皆歸重於身上立意指切要字格太宗鋭情經術楊茂子出處唐儒學傳太宗身櫜鞬風灑雨沐然鋭情經術即王府開文學館召名儒十八人為學士與議天下事立説太宗情之鋭是用心剛處太宗不鋭情於他術而鋭情於經術是擇術精處惟用心剛而擇術精所以留心於正道也批云議論精切語句華麗極利初學論曰英主一念之烈言太宗情之鋭切烈字指鋭字極初不出乎正道之外也正道是經術夫道亦多術矣露出術字矣用孟子教亦多術句法英主之心太宗之情不用之他道而惟用之正道經術舜揚子適堯文王為正道非堯舜文王為他道非擇術之精用心之剛者不能也擇術之精是經術用心之剛是情之鋭其或情其性而不能性其情者反説輩用先語乃於吾道之外經術之外鋭然以求其所謂術求他道之術則情非正情術非正術矣他有所用情則非正情他有所謂術則非正術此英明之主暗指太宗所以不敢鋭情於彼他術而惟鋭情於此也經術唐太宗之為君其殆英明不世出者乎應破題英主字不世出謂不多有也方其當干戈甫定之餘見本題意他務未遑未暇及他術而真情所發惟鋭然於聖經之所謂術演本題意而經術之外一毫不敢容心焉應英主之心不用之他道而惟用之正道意其擇術精而用心剛者如此應接題語君子方喜其情之得正而他有所未暇議也謂其情正其術亦正未暇議含結尾意唐史傳儒學而曰引本出處太宗鋭情經術其知太宗之情者歟又不放了情字且術之説昉於誰乎昉始也此挈術字辨論起格可學求之孟氏之書聞有所謂仁術矣孟梁惠王下曰毋傷也是乃仁術也是乃聖經之術此仁術字出於孟子而非後世之所謂術也非他術也求之記禮之書聞有所謂儒術矣記儒行篇儒有合志同方營道同術是乃聖經之術此儒術字出於禮記而非後世之所謂術也非他術也非仁之術非儒之術而外求其所謂術焉非聖經此二者之術則是他術術其所術而非吾聖經之所謂術矣説得術字響之是用韓文道其所道非吾所謂道句法是豈人主所當鋭然留情者哉歸在鋭情上自夫人主外經術而鋭情於兵也治兵之術而後孫吳之術進矣孫武吳起戰國時善用兵者自夫人主外經術而鋭情於財也理財之術而後管商之術售矣史管仲傳仲相齊通財積貨冨國強兵居商君傳衛之庶公子名鞅封於商以強國之術説君五年秦人冨強管仲商鞅古之善理財者自夫人主外經術而鋭情於異端也異端之術而後老莊之術行矣莊周虛無老子清淨皆異端之學三扇文是一樣莫非術也而非吾所謂術非聖經之術擇之不精韓文擇焉而不精則必將果決於求他道而不果決於求正道矣他道是前三者之術正道是聖經之術然則人主一念之發可不審歟照破題一念字歸在情字上且髙帝非不鋭情也髙祖亦鋭情而安得猛士之思實終其身前髙祖紀過沛置酒擊築歌曰安得猛士兮守四方而謂詩書安事前陸賈傳賈時時前説詩書髙帝曰乃公居馬上得之安事詩書則是其情非鋭於經術也非術之正武帝非不鋭情也武帝亦鋭情而尊顯賈人之流淫剝其民前漢公孫𢎞等贊上方欲用文武卜式拔於芻牧𢎞羊擢於賈孺又食貨志桑𢎞羊為治粟都尉斡鹽鐵盡籠天下貨物又榷酒酤抑兼并而謂尚書為朴學前倪寬傳寬見上語經學上曰始吾以尚書為朴學弗好則是其情非鋭於經術也非術之正情如光武亦非不鋭也光武亦鋭情而好溺圗讖之意勝後漢祭祀志案索河洛讖文言九世封禪事布圗讖於天下講論經理之意衰後本紀數召公卿郎將講論經理則其情尤非鋭於經術也亦非術之正樣三扇文亦是一以漢世三君之英明總上三扇事而擇術不精用心不剛猶如此術非正術情非正情要過太宗來孰謂有唐之君而鋭情經術有如太宗者乎過正講謂太宗用心之剛擇術之精勝於漢之三君風灑露沐之餘見題注似可少已也而帝則汲汲於崇儒焉見題注日昃夜艾之時題下文置𢎞文館引內學士畨宿更休聽政之間則與討古今道前王成敗或日昃夜艾未嘗少怠似可少安也而帝則拳拳於講學焉見上注二形容得鋭字意出此段是一樣文𢎞文建館之不敢緩其情之鋭何如也見上注自此以下又變文名儒招集之不敢後其情之鋭何如也見題注乙夜觀書之不敢廢其情之鋭又何如也太宗每視朝後即閲羣書常謂若不甲夜視事乙夜觀書何以為人君此三段用三不敢三其情之鋭何如也是一樣文不始勤而終怠不進鋭而退速見鋭意其孟子其進鋭者退速雖封倫勸之以法術而帝鋭然經術之情不變而為法術魏徴傳上曰今大亂之後其難治乎封倫曰三代僥詭日滋秦任法律漢雜伯道帝不聽雖萬紀試之以利術而帝鋭然經術之情不變而為利術權萬紀傳萬紀奏宣饒部中可鑿山冶銀嵗取數百萬帝責曰公不推賢進善乃以利規我斥使還第雖英衛以兵術奏功動之而帝鋭然經術之情不為之動李績封英國公帝征髙麗績為遼東道行軍大總管李靖封衛國公帝伐遼靖曰往慿天威得效尺寸功一心之微攻之者衆通鑑十七年太宗曰人主惟有一心攻之者甚衆而帝心匪石不可轉也詩我心匪石不可轉也謂之鋭情經術信乎其為情之正術之正矣應題正情正術二語人見其限官任才周官六典之遺法也唐百官志帝省內外官定制為七百三十貟曰吾以此待天下賢才足矣曰禮太宰之職掌建邦之六典一曰治典二曰教典三禮典四曰政典五曰刑典六曰事典府兵寓農井田兵制之舊規也唐兵制府兵之制頗足稱焉蓋古者兵法起於井田自周衰王制不復至於府兵始一寓於農此太宗之所以盛也思封建之未復易之建國親侯也唐膠東郡王道彥傳帝與蕭瑀等講封建欲與三代比隆易比卦先王以建萬國親諸侯立經常以定賦禹之成賦中邦也唐食貨志唐授人以口分世業田而取之以租庸調之法亦可為經常之法也書禹貢成賦中邦以上四股是一樣文廣學置貟非得於菁莪之樂育才乎以下變文儒學傳頁觀六年廣學舍千二百區三學益生貟諸生至三千二百人詩菁菁者莪樂育才也求士如渴非得於嘉魚之樂與賢乎魏徴傳上疏曰貞觀初求士如渴樣詩南有嘉六魚樂與賢也以上二股又是一文以上股是把太宗當時事質之聖經打合説來凡唐治之卓冠於百代之上者此是太宗之收治效處孰不謂帝之經畫動合經意如此繳上文焉知其皆自鋭情經術中來哉此鋭情經術之功而苛於責備者難見結末注且曰擇術非難用經術之正為難本主意尊經非難行聖經之説為難書説命知之非難行之惟艱多愛之牽豈動合七情之正者乎本贊至其牽於多愛欲記禮運謂人情喜怒哀樂愛惡弗學而能浮屠之立豈確守左道之戒者乎本贊復立浮屠道謂佛教也記王制執左以亂衆者殺閨門之多慚德圭復修身齊家之訓者似不如此通鑑總論其父子兄弟之間慚德多矣復大學欲齊其家者先修其身語南容三白圭逸詩也十漸之不克終服膺鮮克有終之戒者似不如此魏徴傳上疏曰此不克終十漸也失詩蕩篇靡不有初鮮克有終之中庸拳拳服膺而弗之矣此以上將太宗事質聖經為有愧是責太宗嗟夫人主不知尊經天下之治不出於經久矣有君如太宗鋭情經術如太宗此一篇褒之之主意而君子方喜其擇術精用心剛之不多見應主意六字而其已善者千百所以褒之未善者一二所以貶之固未暇以是少之也又略恕之責人斯無難書泰誓全句學者其無以春秋之法責備於太宗云本贊春秋之法常責備於賢者備文有操縱真可為法謹論指切要字格孝宣厲精為治林希逸出處前漢循吏傳序孝宣興于閭閻知民事之艱難躬親萬幾厲精為治立説宣帝承昭帝積弊之後即位數年精神晦藏地節二年始親政事總攬權綱與吏民更始風采頓異於前日蓋人主之精神在心方其韜晦則精蘊於心及其奮發則精見於治中興之盛實宣帝一心實為之考官批云地位廣大議論純粹時文中髙作也論曰以一人而作新天下宣帝之為治與天下更始之意亦運諸此心而已精在心運諸心是厲精也神乎心之用也粘心字舉天下之大斡旋闔闢指為治有非智巧之所能不在智巧而在心而精神之地一日用其力焉見厲精意力論語有能一日用其於仁矣乎則治之功用隨之為治此其故何也設問蓋吾心之蘊者為精而其發者為治主意求治於天下不於其治而於其心歸心字上則沉潛於未發之先暗指宣帝即位之初沉潛精神於未發激揚於既發之後指宣帝地節以後奮厲精神於既發風采所至精怠必奮奮是厲意弛必張張是厲意事物條理而政治精明見為治意特吾心一運量之頃爾又歸在心上地節元康之政皆宣帝年號漢治更始之日也本紀元康二年詔與士大夫厲精更始帝之精神晦藏亦甚矣謂帝即位之初如此一旦權綱反正而與斯世更新焉謂帝更始之初如此不致力於其他而汲汲於此心之用一念奮而百廢興奮是厲精興是為治帝之所操何其約也指厲精方其韜晦則精藴於心及其奮發則精見於治主意中興之盛其可以心外求之乎題下文漢世良吏於是為盛稱中興焉孝宣厲精為治請以是明班固之意本文嘗謂治道之精神在於人主而人主之精神在於一心就心上説起含洪停蓄心之體也此晦藏時光明發越心之用也此奮發時其虛靈之妙主宰之神程子云虛靈知覺荀子天論心者道之主宰存諸方寸者雖微列子仲尼篇方寸心也而萬化之樞紐百為之綱紀繫焉言心者治之本樞紐關要處也帝之所以帝王之所以王學韓文無非吾心之精者為之也心之繫治道如此今夫日月星辰之運行隂陽寒暑之代謝人莫不以為天之功氣象廣大主以天之功比人之治而冥冥之中乾實主之以乾之精比人主之心程子云乾者天之性情大易之贊乾既曰剛健中正純粹矣而管攝之妙獨歸於精之一辭乾卦剛健中正純粹精也精也者斡精之一字其乾道變化之根乎同上乾道變化各正性命吁乾天也君也易説卦乾為天為君天以乾運而精之用見於四時君以心運而精之用見於政治關合得好二者蓋同一機括也謂天與君一也宣帝之為君固未足以語此下語有稱停而更始一意獨得於此心之用愚於是有取焉爾地節以前宣帝年號帝之於治何如也且説帝晦藏時弊根之蟠固蠧冗之浸淫謂百廢未興之時志氣梏於滯固之深神采鑠於退遜之久此是霍光用事時精神尚未奮發民生疾苦帝非不知也而未及問焉為宣帝占便冝説循本紀地節四年詔朕惟百姓失職遣使者行郡國問民所疾苦吏或營私煩擾朕甚閔之吏治得失帝非不聞也而未暇察焉本紀具知閭里姦邪吏治得失帝於斯時韜聰明以自晦則此心之精者未露也如明夷晦其明之意藏智勇以若怯則此心之精者未奮也如家語三恕篇勇力振世守之以怯之意頭以上一段講宣帝即位初年尚晦藏其精神應冒方其韜晦則精藴於心語一旦隂翳剝而陽和舒五隂為剝一陽為復洊雷震而羣蟄起易震卦洊雷震之此二句喻宣帝更始時一時之政粲然精芒如太阿之出匣大阿劒名匣謂帝之精神如劒之出光芒可畏人孰不曰樞機周密治之鍵也自此以下講為治處式本紀地節二年上始親政事樞機周密品備具鍵門鑰品式備具治之目也注見上勞來之褒所以明勸賞之權前王成傳成為膠東相治甚有聲帝詔曰成勞來不怠流民自占八萬餘口賜爵關內侯副封之撤所以防壅蔽之漸前魏相傳故事上書者皆為二封一曰副封領尚書者先發副封所言不善屏去不奏相白去副封以防壅蔽初政施行班班可紀致治之美殆以是基之此一小段論地節以來為治之時然嘗觀諸帝之心矣轉入厲精意心字是主意遣使循問之詔則曰朕所甚閔見前民生疾苦注直言針過之詔則曰朕所甚懼本紀地節三年詔乃者九月壬申地震朕甚懼焉有能針朕過失無諱有司想其閔心一萌照上閔字而癢痾疾痛真切吾身吕與叔克己銘癢痾疾痛舉切吾身懼心一動照上懼字而天地鬼神森布左右韓與孟簡書天地神祗昭布森列非可誣也其曰念慮之不忘本紀地節三年詔朕既不逮導民不明反側晨興念慮萬方不忘元元其曰朕意之未稱本紀元康二年詔今吏修身奉法未有能稱朕意無非此心之精所著見者繳入精字故聽斷惟精見於齋居之決而內治以興敘傳時舉傳納聽斷惟精又刑法志上嘗幸宣室齋居而決事飭躬齋精詔及勤事之吏而吏治以振五鳯三年詔朕飭躬齋戒郊上帝祠后土公卿大夫其勉焉又元康元年賜勤事吏爵二十餘年宣帝自本始元年即位至黃龍元年凡二十五年田里絶愁嘆之聲循吏傳序帝嘗曰庶民所以安其田里而無嘆息愁恨之聲上下無苟且之意本紀上下相安莫有苟且之意文學法理咸精其能本贊政事文學法理之事咸精其能中興之治號為厲精題下文稱中興焉至今在人耳目是豈出於帝心之外乎見帝為治皆厲精之力則應冒頭及其奮發精見於治帝果何以得此哉此句引入主意人之一心不走了心字動則汨汨是晦藏之時靜則精精是奮發之時當其韜晦之時蓋有靜定之益謂帝地節以前閲厯之久則其見精容忍之積則其慮精映帶精字謂帝更始以來帝之所得愚知其出於是矣繳盡主意雖然心也者合理與氣而後有是名也張子正蒙合理與氣而有心之名理足以御氣則其用也純此古者聖人之心氣得以勝理則其用也駁此後世人主之心議論本之吕東萊唐虞三代之治粹而不雜精而無間純乎心之理也推美唐虞以理御氣秦漢而下英君誼辟時獲有為於斯世而大抵皆以氣主之責秦漢之君氣得以理勝以帝之精鋭歸宣帝上來一時之振厲固有餘用而不能充此心之理謂宣帝不能以理為一心之主以進於傳心精一之地書大禹謨惟精惟一允執厥中同此精一之精與宣帝之厲精不使漢之為漢僅止於斯是可慨嘆也已惜漢止於漢不能唐虞三代豈惟帝哉引後人為證貞觀之思治曰厲精也貞觀唐太宗年號崔植傳太宗厲精思治開元之政事亦曰厲精也開元唐玄宗年號本贊厲精政事於其氣而不於其理視帝蓋一轍焉謂太宗玄宗尚氣而不尚理與宣帝無異帝與太宗猶能勉強支持帥是氣以終身故不盡見其敗缺又説宣帝太宗能御其氣玄宗之晚節亦餒甚矣責玄宗晚節不克終後之厲精為治其監于兹有規諷今日意謹論前篇指鋭情二字為切要此篇指厲精二字為切要是用功之重處可以並看指題要字格此題歸重在本字上帝王治安之本吕中出處前漢食貨志故財者帝王所以聚人守位養成羣生奉順天德治國安民之本也立説治國安民之本固在於財用之足然國之本在民先民後國則其本一民安而國自治矣若為民與為國之心兩用則其本二矣如是而欲治國安民固無兩得之理也蓋祖孟子天之生物也一本而夷子二本之説而用耳批云議論正大文字典雅且剪截無費辭頗有古作氣象論曰天下之事不兩得欲利國又欲利民是謂不兩得知所先後者得之先於安民後於治國是謂得其本公私之計事之不兩得也明説主意公是治國私是安民為公計耶必不利於私利國必不利民為私計耶必不便於公利民必不利國其勢然也公私不兩得之勢如此而古人所以使公私兩得其利者是必有道矣從勢字過道字先安民後治國方兩得其利蓋天之生物一本而己説出本字也用孟子天之生物一本意古人惟見其一本暗指帝王知以安民為治國之本故平時培養封植先為吾民計形容本字本在先安民上而國計之盈虧每每後之後於治國後應破題先字誠以國之所以為國者民而己主意有民而後有國民者國之本民既安矣國無有不治者如孔子所謂百姓足君孰與不足之意帝王之治安先民後國一本之效如此後世非不欲安且治也後世亦欲安民治國不知一本之理不知帝王先民後國一本之道故為民一心也為國又一心也既欲利民又欲利國心無兩用則天下安有兩得之事乎後世兩用其心則二本矣何以治國安民兩得其利班固志漢食貨而有感於帝王之事引本文豈非帝王一本而漢世二本故爾此一句斷盡主意是用孟子一本二本字帝王治安之本請論之國非難治也民方不足而欲一於為國計則難也一於為國而不為民則治國為難民非難安也國方不足而欲一於為民計則難也一於為民而不為國則安民為難然天下有兩難之勢冒頭用兩得字至此又出兩難字應上難字勢字應冒頭接題亦有兩難之理乎理字應冒頭道字天下之理粘上理字一則易一於為民則民易安而國亦易治兩則難為國為民兩用其心則國難治而民亦難安天下無二本安民乃治國之本聖人無兩心心乎利民而不心乎利國國之於民猶木之有本也猶木之本根之陸贄奏議民者邦之本財者民心其心傷則其本傷其本傷則枝幹凋瘁矣帝王惟以民為本應冒頭古人惟見其一本故推以治國民安而後國治特自本根而條幹自條幹而枝葉爾猶木有根發而為千條萬葉後世非盡無帝王之心也應冒頭後世非不欲安且治也但欲為民又欲為國兩用其心有意於保民而王一念之仁也此是心乎利民孟梁惠王上齊宣王問曰德何如則可以王矣曰保民而王繼之以好貨之心則二矣又心乎利國曰孟梁惠王下齊宣王謂孟子寡人有疾寡人好貨移民移粟一事之仁也此是心乎利民河孟梁惠王上梁惠王曰寡人之於國也盡心焉耳矣內凶則移其民於河東移其粟於河內繼之以利國之心則二矣又心乎利國亦同上梁惠王問孟子曰將有以利吾國乎為民之心與為國之心交戰乎其中應冒頭為民一心也為國又一心也則是民一本也國又一本也應冒頭一本二本字其終也必兩失之到了非惟民不能安國亦不能治以兩失字反形兩得字曷不反觀帝王一本之治乎應冒頭帝王一本字百榖之播為民而播也書舜典帝曰棄黎民阻飢汝后稷播時百榖六府之修為民而修也大禹謨禹曰政在養民水火金木土榖惟修又禹貢六府孔修九職之任為民而任也周禮以九職任萬民地為民而均禮均人均地政均地守均地職田為民而授禮遂人以嵗時稽其人民而授之田野室廬器用之具為民而作前漢食貨志聖人域民制廬井以均之開市井以通之凡其設心措慮為民之意常急先於為民故曰急為國之意常緩後於為國故曰緩是非緩於治國也就緩字斡一轉大有力如珠走盤蓋天地生物之本自下而上用孟子語應一本字也自下而上先民而後國故易之損益二卦皆以損上益下為義易損卦損下益上其道上行益卦損上益下民説無疆損下則上下俱損損民則民貧國亦貧非惟損民亦損國也演足上意益下則上下俱益益民則民冨國亦冨非惟益民亦益國也演足上意民有餘力國有餘財前賈山傳君有餘財民有餘力而頌聲作百姓足則君孰與不足語哀公問於有若曰年飢用不足如之何有若對曰云云此二句應冒頭民既安矣國無有不治者九功敘矣書大禹謨九功惟敘九敘惟歌九式均矣周禮大宰以九式均節財用賦鄉遂而貢都鄙詳見周禮天官居積倉而行裹糧孟子告齊宣王曰云云故居者有積倉行者有裹糧也九州之富百畝之産悉竭力以奉其上而百官庶事亦莫不備具民安而國亦治是其安民之中而治國之規模已定主意根荄枝葉同一生意其本必豐其末必茂固如是夫形容本字如木之有根本民如本根國如幹條枝葉大抵三代而上治出於一應冒頭帝王一本故雖不求以治國而安民乃所以治國也主意漢世以來治出於二應冒頭漢世二本字寬租減稅之詔雖下文帝紀二年賜民田租之半十三年除田租之稅而口賦算賦之令未嘗不嚴漢髙帝四年初為算賦民年十五以上至五十六出賦錢人百一二十為算冨民搜粟之官雖置食貨志武帝末年封丞相為冨民侯以趙過為搜粟都尉而均輸榷酤之法亦未嘗罷武帝置均輸又末年用度不足乃榷酒酤賈誼仲舒王道之言雖略施行賈誼言積貯天下之大命文帝始開藉田躬耕以勸百姓董仲舒言古者稅民不過什一其求易供宜薄賦省徭以寬民力而鼂錯耿夀昌霸者之術亦未嘗不售鼂錯説文帝令民入粟拜爵耿夀昌為大司農中丞以能商工利得幸於上故其始也民貧而國富其終也國與民俱貧矣應民一本也國又一本也其終必兩失之無他天之生物一本也而漢則二之爾用孟子語亦應冒頭繳處嗚呼天下之事一則純二則雜一則公二則私一則義二則利一則為帝王二則為霸痛説一二字學方嶽聖人之道出乎一論文法漢世之法大抵公私兩用義利並行帝王霸之道雜施安民則是為公為義為帝王治國則是為私為利為霸此漢世二本之説此生民所以不復蒙至治之澤歟所以不如帝王之時吁又豈特漢事為然結尾規諷今日有味外之味可以一倡而三嘆謹論就題摘字格歸重在本字上太宗治人之本徐霖出處唐循吏傳序唐承隋亂剗祓荒荼擇用刺史縣令太宗嘗曰朕思天下事丙夜不安枕永惟治人之本莫重刺史故録姓名於屏置風卧興對之得才否狀輒疏之下方以擬廢立説刺史之職乃天下大勢植立之本太宗之治天下而歸重於刺史乃深根固蒂之仁也字是就題中本上立意考官批云文有古體語有古意當於古文求之其源委得之栁子厚封建論論曰英主之仁天下也太宗治人必求夫植立之要植立指本字要字含重刺史意此其慮深逺矣與後面相應天下之大勢雖散闊區分言其廣也而不可以遍致其仁愛斯民之意應主意仁字孟子堯舜之仁不遍愛人然古之聖王不計其勢之廣也應大勢散闊區分意思夫天下之勢自有根本者存粘上勢字出題上本字此勢字自栁文封建論中來從其根本而植立之粘上文應破題植立字則森羅列建列建諸侯相與扶持天下於安靜熙洽之中而吾仁遂矣説治人之本在諸侯應主意仁字故以一人而君天下謂古者聖人之治人聖人不敢私擅之已而獨理之也必資人而共理之分土地而設司牧列建諸侯以司牧萬民使之各制其國而各子其民諸侯之職以植立大勢之根本應破題植立字及接題大勢字然後聖人之德意惠利藉此以孚於天下聖人之仁方可以遍天下此古者建諸侯之意也古者諸侯如唐之刺史唐之太宗識之識治之本在於建侯深思極慮應破題慮深逺意惻然念治人之本而歸重於刺史之職本出處意夫刺史者古諸侯之職也大勢植立之本也應小講意太宗之治天下於是有深根固蒂之仁矣應本字應仁字姓前漢諸侯王表昔周封建八百同五十有餘深根固蒂為不可拔者也太宗治人之本請以大勢之植立者而論本之説不走了主意蓋王者之設官也應冒頭接題天下大勢意原起自公而卿自卿而大夫士言古者設官之制伯孟萬章天子一位公一位侯一位一位子男同一位凡五等君一位卿一位大夫一位上士一位中士一位下士一位凡六等至於公侯伯子男則不列於其數注見上所以别諸侯之職非若朝著之聮事合治有所屬而不可専也周禮天官小宰之職云云以官府之六聮合邦治一曰祭祀之聮事二曰賔客之聮事三曰喪荒之聮事四曰軍旅之聮事五曰田役之聮事六曰斂弛之聮事諸侯則各有卿大夫士其體統位置亦視王國之制而特殺減焉耳詳見孟子萬章諸殺去聲降一等也此數句包孟子論侯之制一百四十餘字而雖王臣之位其在上者不得踰之也見孟子天子之卿受地視侯大夫受地視伯元士受地視子男又所以别諸侯之職有社稷土地之重固不得輕其承事之者也以上言建諸侯之制嗟夫此天下之勢也此議論自栁子厚封建論中來封建非聖人意也勢也天下之勢必有本説出本字植其本則固而安立其本則能治人蹶其本則散而擾仆其本則不能治人此所以古諸侯之職與夫聖人封建之法為天下後世慨嘆而不可復也此説古者建侯為天下計而後世不能復其制生民之初糾糾紛紛五合六聚奉其尤能者而為之君栁子厚封建論勢之來則其生人之初乎云云由是君長刑政生焉云云德又有其大者方伯連率之類又就而聽命以安其人然後天下會於一此一人者豈能以其方寸之智慮而把握之哉必建諸侯彼天地奠位山川修阻表裏區分如星羅而棊布者固自然之勢經久之基林林然黎元赤子之命所根也勢字基字前後相應后封建論周有天下裂土田而瓜分之設五等邦羣布履星羅四周於天下聖人因其勢而有諸侯分治之法接上勢字以寄吾仁民愛物不能遍及之心應冒頭不可遍致仁愛斯民之意然後治化淪浹風俗乂寧歷年垂統而不可撼有諸侯以分治而後天下安撼字有本意嗚呼此所以為天下之根本也應前而唐之太宗深識之應冒頭題方其以英雄超邁之姿正講太宗平定海內出本紀思為生民悠逺之計謂太宗之治人謂不可以向者飄忽震蕩之規而守之也飄忽震蕩謂太宗以武定天下之意端居深念應冒頭深思極慮周覽乎宇宙之勢天地四方之宇古往今來之宙探索乎興衰之機興衰猶治亂也而感喟乎三代之所久安長治三代夏商周也長賈誼云三代有道之又文武並用長治久安之術與夫秦漢而下所不得遂其守天下之意者言三國六朝而至于唐本此數句只是形容思治人之意於是而知古諸侯之職為治人之本應冒頭刺史者古諸侯之職也夫後世之官謂刺史其華顯貴重而係於一人之禮樂刑政刺史受天子之命以治人凡仁民愛物之事者亦非特刺史之職而已也顧乃以治人之本而歸之引本文辨論此其所以為識天下之大勢也應前大勢字抑有志乎三代鞏固不拔之仁也應主意仁字注不拔字見冒頭是以貞觀初年太宗時以享國久長之䇿問諸公卿見下注有以三代封建而長久秦孤立而速亡為對者蕭瑀傳帝問瑀朕欲長保社稷奈何瑀曰三代有天下所以能長久者類封建諸侯以為蕃屏秦置守令二世而絶漢王子弟享國四百年此封建之明效也帝深然之於是始有封建之議同上太宗納之始議封建他日議者頗憚沮於古制之未可遽施宗室贊帝與蕭瑀等喟然講封建事欲與三代比隆魏徴李百藥皆謂不然徴有五不可之説百藥稱帝王自有命厯祚長短不在封建而帝之意蓋深憾於不得如古者三代所以仁民之職也也應前意字歸主意然猶分王作鎮間以州縣雜錯而居互相維持同上顔師古獨議封建諸侯當少其力與州縣雜治以相維持帝之意蓋深知古者三代封建之諸侯為天下之本也應前以諸侯而植仁民之根本應主意帝雖不得復其制而深得夫古人之意也已謂帝雖不能復三代封建之制然能重刺史以植仁民之本應前意字當時都督刺史之建或臨朝而拜册命循吏序以都督刺史皆天子臨軒册受後不復册然猶受命得對便殿賜衣物乃遣或對陛而錫衣物上注懇切勤渠若以生民之命而寄其身者見得刺史治人之本此固所謂悠久之基根本之慮而封建之意也包括前意水火移而為袵席昔之危轉為今之安呻吟變而為謳歌昔之憂變為今之喜衣食有餘刑錯不用言天下之人安一時治功卓然秦漢之下謂唐太宗之治秦漢而下之所未有蓋三代以還中國之盛未之有焉謂三代而後亦無如太宗之治天下固有無其本而至此哉歸在本字此天下之勢也應勢字帝惟識其勢而植其本以基唐家一代之仁總前面勢字本字仁字此所以為唐之太宗也歟繳盡本意雖然唐之子孫其所以昌盛綿延雖更事變復險阻而人心連結不可解而仆之者固以治天下者有其本也至於子孫之安而不搖皆太宗有治人之本應本字繼此意者應意字吾於開元之治為之喜矣玄宗時選京官才望者以為都督刺史所以重其本也選舉志玄宗即位張九齡言刺史陛下所與共理尤親於民者也今京官出外反以為斥非少重其選不可於是詔擇京官有善政者補刺史作令長新戒一篇賜天下縣令是亦太宗重本之意也通鑑開元二十四年作令長新戒一篇賜天下縣令謂玄宗重刺史之意與太宗同而晚節末路一旦釋然而不念及此謂晚年之心不如初使太宗所植立所綱維者披裂敝壞而生民不得以仁遂矣謂玄宗不克終使太宗治人之本不復見不走了仁字故嘗因是論之建侯以治人者此固本也而抑勢也應前勢字純仁以治心者此又本之上也語老純通書心則賢才輔而先王自強不息謹終如始絶人欲維天理之意也應前意字三代之仁又説仁字其所以達乎天下流乎後世三代之仁如此逺大遺休餘澤如松柏之茂庇蔭悠長者狀得本字意出其根本之深則又有默存乎形勢疆理之外者也在心而不在人此心之仁純明粹精一毫之蠧不敢以傷其本根之地此心之仁乃是本之大者則彼之所謂本者特其輔耳刺史之本又其次焉嗚呼此三代之仁也太宗猶假之而未至則吾於他奚責焉借用孟子五伯假之之假字文有抑揚獨喜夫太宗之所謂本者為深識夫三代扶持植立之意也總前面數個字謹論論學繩尺卷一
