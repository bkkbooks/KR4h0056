body:
  text: 論學繩尺卷二宋魏天應編選林子長箋解就題生意格此篇與説天者莫辨乎易論同意唐虞三代純懿如何吳君擢出處文中子問易篇賈瓊曰書無制而有命何也子曰天下其無主而有臣乎曰兩漢有制志何也子曰制其盡美於恤人乎志其慙德於備物乎薛收曰帝制其出王道乎子曰不能出也後之帝非昔之帝也其雜百王之道而取帝名乎其心正其迹譎其乘秦之弊不得已而稱之乎政則苟簡豈若唐虞三代之純懿乎立説唐虞三代聖人之心本欲無言而其見之於言者非聖人之得已意謂聖人之心可以言而見不可以言而盡此是純懿處若至於君臣告語之詳則辭之費者為心之病是豈純懿之妙也哉考官歐陽起鳴批云文字出入東萊議論法度嚴密意味深長説得聖人本心出深得論體可敬可服聖人之心唐虞三代可以言而見不可以言而盡純懿七吕東萊聖論云聖人之事聖人之言聖人之心也是故論事不若觀言觀言不若觀心聖人何事於言哉謂聖人無事於言道隱於無言而寄於無心者得東萊七聖論中議論好聖人渾淪之天也無言乃聖人之本心於吕東萊堯舜論云道涵於太始隱渾淪而藏於未雕未琢之天者未離也然聖人之心雖與天者遊莊子心無天遊則六鑿相攘而亦豈能忘情於斯世不容不形於言則其見於辭令之間君臣告語之際始有不能以終隱者矣有言非聖人之得已惟其不能以終隱也粘上隱字文如貫珠故其精神心術之所形始有可得而見者矣應起句可以言而見語人見其粹而正者謂之純韓愈贊粹然一出於正溫而良者謂之懿語夫子溫良恭儉讓遂謂其隱然於心者應隱字皆顯而見之於言應見字抑豈知夫可見者言而不盡見者心應起句不可以言而盡語純懿之妙又豈止於言也哉言不盡意王通氏論漢制而有感於唐虞三代之純懿敘本出處通可謂知聖人之言者矣先揚未必盡知聖人之心也後抑唐虞三代純懿如何請申之聖人之心何心哉無思無慮也原聖人之心本欲無言也易繫辭天下何思何慮無將無迎也莊不將不迎其純而不雜淵而且懿者常在也伊川云一則純二則雜揚子不亦淵乎不亦懿乎其渾然之天應接題聖人渾淪之天語雖鬼神莫能窺也此聖心之妙處然而有心焉不能以無事也應小講不能以終隱語感而遂通則應生焉易繫辭感而遂通天下之故有君焉不可以無臣也見本題出處都俞吁咈則言形焉應冒頭小講顯而見之於言句見書堯舜二典大禹臯陶謨噫是可以見其心矣而未可以盡聖人也又斡一轉歸聖人之心可以言而見不可以言而盡意退藏於密者聖人之分矢口成文者聖人之餘吕東萊堯舜論云洗心退藏者聖人之分也吉凶與民者聖人之餘也為其餘而不及其分聖人之心亦缺然矣有言非聖人之本心東萊堯舜論全文吾觀之書其有以見二帝三王之心乎引書説唐虞三代聖人之本心典謨之溫潤深純冠冕乎百世之上下選揚進答客難典謨之篇不深純溫潤則不足以揚鴻烈章緝熙然觀二典之寂寥簡短則知三謨已為辭費聖人之心不得已見之於言言之多者心之病也雖曰朝廷之上君臣之間不可以無言也説不能以終隱意至如命官詢謀恤刑敷教等事舜典咨汝二十有二人又大禹謨詢謀僉同舜典欽哉欽哉惟刑之恤哉又敬敷五教在寬皆不能不衡於慮者孟子困於心衡於慮聖人豈能以不言而遂已乎聖人之心可以言而見然此特其粗者其精微閫奧則不如是而遽止也説不可以言而盡執中一語君臣更相授受此是聖人之本心惟書禹謨人心惟危道心惟微精惟一允執厥中心與理涵如印如劵其精神心術之妙盡在於是應胃頭隱於無言寄於無心語純懿之真者固未嘗散也渾者固未嘗漓也全是學東萊堯舜論中語逮夫甘誓之作有扈氏之戰至此已不如執中相授之時井書甘誓啓與有扈戰于甘之野作誓君臣至於敵體或者已傷其夏德之衰用吕東萊議論若夫商周之誓誥書泰誓牧誓大誥酒誥則真者散渾者漓矣見上四字至此又不如夏之時多士之訓書多士周公以王命誥作多士遷都之舉盤庚五遷將治亳殷又召誥召公既相宅周公往營成周反覆數四若將曲防而預制之者言豈聖人之得已興言至此未始不病其用心之勞非聖人之本心則知夫言之多者始為心之病見本意屈曲聱牙以此四字反形純懿字韓文商盤周誥屈曲聱牙大非純懿之所形矣况於唐虞三代而下者乎入大講文勢不斷此王通氏所以慨思於古聖人純懿之為也通其求聖人之言乎抑亦求聖人之心乎若謂帝王之純懿但止於典誥之間則未為知聖人者其所以致不足於漢制者曰政則苟簡豈若唐虞三代之純懿乎見本題出處嗚呼漢之不古若豈獨政也哉彼徒知帝王之言而不知帝王之心故也轉歸心上胡不因其言而求其心乎欽天等語非純乎分四段影出純懿字其所以敬天者則非止於厯象授時之事也此是唐堯之純象書堯典乃命羲和欽若昊天厯日月星辰敬授人時正德等辭非懿乎此是虞舜之懿其所以為德者則非止於用休用威之時也書禹謨正德利用厚生惟和云云戒之用休董之用威曰平章百姓堯典九族既睦平章百姓曰敬敷五教舜典敬敷五教在寬非帝治之懿者乎然帝治之所以懿者在道此是唐虞之純則又不獨在是也以上四段説純懿字亦牽強但不如此説又不見純懿字由後世而觀亦幸而有可證之言可以言而見由漢制而論則又未為盡知帝王之心不可以言而盡何則辭令訓誥者其粗也而精神心術者其精也轉歸可見者言不盡見者心意維持控制者其淺也而渾淪涵蓄者其深也粗與淺是言精與深是心漢之制毋亦于其粗而不于其精于其淺而不于其深者乎説漢制不得唐虞三代聖人純懿之心賢良制䇿猶可曰體古人敬賢之意漢武帝本紀詔舉賢良方正直言極諫之士又制䇿問董仲舒公孫𢎞而石渠稱制臨決則不過任已之見而抑臣下之言漢宣帝詔諸儒於石渠講五經上親稱制臨決焉古人純懿之妙恐不從事於言語口舌間也非聖人之心雖然三代而下如漢制亦未可少前既抑漢制到此又放寬一著此王通續書之百篇所以躋之典誥之列亦未為無見也王通續書始於漢通之言曰皇墳帝典不得而識矣不以三代之禮統天下終危邦也如不得已其兩漢之制乎文中子關子明篇云云夫以不得已云者則固已知其非純懿也見有言非聖人之得已意况於真者愈裂渾者愈漓耶應講中真者散渾者漓語吾於漢復何尤有深長不窮之味就題生意格此篇與唐虞三代純懿論同意説天莫辨乎易蔡德潤出處揚子寡見篇或問五經有辨乎曰惟五經為辨説天者莫辨乎易説事者莫辨乎書説體者莫辨乎禮説志者莫辨乎詩説理者莫辨乎春秋立説造化之妙本不合言方易經未作函於太始隱於渾淪天者未離也孰得而言之聖人出而作易闡其幽顯其微固能言人之所不能言者然言之詳者又所以泄造化之機非聖人之得已也此説亦自吕東萊七聖論中來考官批云窺造化之妙藴究聖經之微言非胸中自有易者道不到此吾道一造化也吾道指易造化指天言之詳者機之泄也既説而辨則言之詳者而造化之機發泄無餘藴矣夫莫妙於造化天之妙亦莫妙於吾道易之妙本不容言也妙處豈可得而言不容言而言之綴上文言言字是説與辨則其機已泄矣應起語吁聖人固亦大不得已於此也造化之妙本不容言若形之於言則是泄造化之機矣豈聖人之得已哉何者設問經之未作也經指易函於太始無極之妙始易繫乾知大隱於渾淪太極未判之時列子天瑞篇有太易有太初太易未見氣也太初者氣之始也氣形質具而未相離曰渾淪而藏於未雕未斫之先太極未分剖之時渾渾淪淪而已天者未離也以上四句見吕東萊堯舜論全文人孰得而知之耶此造化之妙亦孰得而言之耶造化之妙不容言也人固不能言之矣就不能言上轉歸言上來聖人者所以言人之所不能言者也聖人不得已而形於言則説而有辨斡元工於莫測發神機於無形二句演説天意昔幽者闡昔微者顯既説而辨則闡其幽而顯其微矣微繫辭夫易彰往而察來顯而闡幽言辭之諄復説與辨是乃吾道之一槖籥也莫辨乎易德隋經籍志夫經籍道之槖籥吁用吁字易之書其始泄吾道造化之機者歟應破題語子雲之言曰説天者莫辨乎易非易之得已也應破題不得已字不如是則吾道之造化隱矣反説有力理若不説辨則天之終祕矣嘗求之未有易之先便就易上説起一氣渾涵孰探其妙且説天無極以前孰窺其際周子太極圖無極而太極不特不容言亦且無可得而言也造化之妙不可得而言河呈而未支也易繫辭河出圖支謂河圖雖出未分派卦具而未演也謂八卦已具而文王未演卦東萊堯舜論云河洛呈而未支也八具而未演也天者亦微露其機於聖人矣此時已異於無極以前之時雖有言焉而猶未辨也自説字上引歸辨字上既支而派畫而三之卦而八之是支而派矣既演而詳文王既演易是演而詳矣見得説典辨意天之藴奧其容以自祕乎天之理不可以終隱是故一畫於伏羲而未見其説也畫而三之卦而八之伏羲始畫八卦説自此始矣又露説字已而文王重之文王重易六十四卦孔子繫之孔子作繫辭而説其辨於此歟又露辨字雖然不説不辨不可也文勢圓轉先謂不容説又謂不得已而説與辨至此又斡一轉謂不容不説不容不辨是應冒頭不容言而言之數語人心懵然中則無見也不灼其影昧者弗覩也暗使譬影如日月之影不烈其聲瞶者弗聞也聲如雷霆之聲東萊堯舜論中云雖然不重不繫不可也人心懵然止弗聞也三句全用堯舜論中語吁此説之有取於辨也所以不容不辨今夫易先六經而作也再提起易字道之始也説易之道夫既曰道之始矣粘上文一畫則泄一畫之天畫八卦始於伏羲一卦則泄一卦之天畫八卦亦始於伏羲自乾坤畫而君臣之天道泄矣上經首乾坤乾君道也坤臣道也自家人畫而父子之天性泄矣家人卦父父子子云云而家道正自咸恆畫而男女之天倫泄矣下經首咸恆以咸卦男下女又繫辭夫婦之道不可不久也故受之以恆出乎震相見乎離萬物所付之天分莫不盡見於此繫辭萬物出乎震齊乎巽相見乎離吾道之造化應破題語聖人何若是之不隱耶應冒頭隱字索之鴻濛三五厯紀未有天地之時混沌如雞子溟滓始芽鴻濛孳萌揆之希夷老子曰希曰夷探之無何有之鄉見莊子不説則無益也不説則不可露其端倪而微妙者昧昧也天之微妙處難言發其形似而髙逺者茫茫也天之髙逺處亦難言説之不辨猶無説也不辨亦不可説而辨矣既説而辨則其關紐始彰彰於此矣應造化之機泄矣語抑論之天外無見見天於易天在易上易外無見見易於心易在心上心有易則亦心有天矣總上四句洊雷震驚震卦洊雷震吾心一恐懼修省時也同上君子以恐懼修省乾之行健吾心一運用不息時也乾卦天行健君于以自強不息明入地中明夷卦明入地中明夷吾心一明夷養晦時也同上君子以涖衆用晦而明方寸之中自有伏羲吾心中有伏羲念慮之外無兩姬孔吾心中自有周公孔子説雖在易而心則無説心有易則不待説辨雖在易而心則無辨心有易則不待辨至是則不知天之為易邪易之為我邪只在心上是學莊子言語嗚呼論易而至於心主意則渾然融然全體全妙本未始泄也求易於言不若求易於心以心求之則天之機未嘗泄也雖然子雲之言其深於知易固也敘本文揚雄字子雲且説子雲知易太玄之擬子雲作太玄以擬易其以天乎抑不以天乎且疑辭如以天也毋嫌於辨也答上文否則多言而已不然其説徒辨而已何補於易亦何功於天語簡意足頗有古風前篇謂聖人之心形之於言非聖人之本心此篇亦謂聖人之心形之於書亦非聖人之得已議論俱本之東萊七聖論可以參看援古證今格此篇與聖王施德行禮論同格三聖褒表功德丘大發出處前漢諸侯王表周監二代三聖制法立爵五等封國八百同姓五十有餘周公康叔建於魯衛各數百里太公封於齊亦五侯九伯之地所以親親賢賢褒表功德關諸盛衰立説謂文王武王周公當王業方興之初而制封建諸侯之法其所以褒美而表章者非有不世之殊功則有庇民之大德所以扶植國本於數百年之久髙祖興漢亦封建諸侯苟簡一時之謀不思萬世之計殊無周人褒表之意此班固作漢諸侯王表所以首述三聖封建之得而繼言漢人封建之失者其意可見矣考官批云立論髙行文熟用事詳贍筆力過人其學議得之左氏其文法得之東萊博議學者當知其學問之有本處考古人封建之法謂班固考文武周公封建諸侯之法而必求之王業方興之始而求之周家創業之初儒者之論指班固作表抑其不足於後世選用之初意也言不滿髙祖封建之失初意字照始字蓋封建之得失三聖之得漢人之失世道之盛衰實關焉周盛漢衰實係於封建之得失凡其奬用激厲於其始褒表功德之初固欲以憑藉維持於其後者也蓋欲為扶植國本於數百年之久自昔二三聖人文武周公當王業肇興之際應破題語初周創業之選建親賢親其親賢其賢分列藩屏藩屏謂諸侯翼衛也蕃詩嵩髙四國于箋云為之蕃屏非有庇民之大德庇覆也大左傳禹之德其庇民乎則有不世之殊勳不世謂非世世而有殊異之功其所以扶植國本於數百年之久扶持植立周家八百年之久皆自其奬厲於始者實為之奬厲見褒表意應接題語後世開基創業之主指漢髙祖苟簡一時之謀苟且簡略不思萬世之計不為長逺計始焉分建之不審不褒表其有功有德者而卒貽後日無窮之憂後來七國僣叛此論治之儒者班固作表所以每嘆封建之不古謂漢不如周而遐想於興王之良法也歟所以逺思周家始者封建立法之善嘗觀班固諸侯王表實為漢而作也敘本文不言漢人封建之失而深美三聖褒表之制見本題詳注固之意豈有他哉喚下文蓋文武周公所以肇周家之封建者也肇始也今而以褒表之制獨歸其經始之謀應破題考古人封建之法而必求之王業方興之始意則知漢人封建之始其所以失之於褒表者不言而自見矣應破題儒者之論抑其不足於後世選用之初意也三聖褒表功德請申之易之為卦六十有四舉易為證皆所以明開物成務之道也見易繫辭未注云物類分而易能分之故曰開物事體未定而易能定之故曰成務聖人於利建侯一事見下注不寓之他卦而獨繫之豫是不難知矣豫卦利建侯行師又曰豫順以動之以豫為豫先豫蓋能謹選用之法於初則謂之豫選用封建也先初是豫之意嚴勸奬之術於始則謂之豫勸奬褒表也始亦是豫先之意審其謀於未然弭其變於將然則謂之豫弭消也未然將然皆是豫先之意自昔以來固有以封建而啓數百載不可拔之基者矣指周數應冒頭扶植國本於百年之久意是必選建明德茂啓崇勳説褒表功德選左定四年昔武王克商成王定之建明德以蕃屏周有以旌别淑慝於立法之初者然也書畢命旌别淑慝其淑善也慝惡也言旌表其善分別惡此段論周人封建之得亦固有以封建而啓數十年不及慮之變者矣指漢卒應冒頭始焉分建之不審貽後日無窮之憂是必否德而爵罔功而祿説不能褒表功德德書堯典否德忝帝位又説命爵罔及惡又詩伐檀無功受祿無以大明黜陟於垂法之始者然也書周官大明黜陟此黜退其惡也陟升其善也段論漢人封建之失古今同此天下也見董仲舒䇿亦同此封建也總結上兩段而成敗得失如是之相逺者周之封建成而得者漢之封建敗而失者亦在乎即其初意豫圖之而已矣照豫字在封建之初不然轉入本意先王疆理天下畿方千里以為甸服書禹貢五百里甸服之謂地方千里之內謂甸服治田出穀稅也言甸者主治田故服名甸也內官不過九御禮天官內宰以婦職之法教九御外官不過九品國語晉文公請隧襄王不許曰昔先王之有天下規方千里以為甸服云云內官不過九御外官不過九品外九御九嬪也九品九卿也周禮內有九室九嬪居之有九室九卿朝焉舉天下之大而無敢専享其功説封建之意亦惟我一二兄弟甥舅是攝是贊同奬王室無相害也左昭二十六年王子朝告諸侯曰昔武王克殷成王康王並建母弟以藩屏周亦曰吾無専享文武之功今王室亂若我一二兄弟甥舅奬順天法無助狡猾以從先王之命此皆封建欲其奬王室無相害之意苟於建置之初雜焉無所别白於其間不褒表其功德則三代之保天下果何若是之久哉前賈誼傳三代之所以長久且人孰不知八百年之基業周家封建之功也前諸侯王表周厯載八百餘年云云封國八百同姓五十而不知其為造端之謀者誰歟應破題方興之初意唤下文亦孰不知周家封建三聖之法也引本文而不知其示尊顯之意者誰歟應褒表意喚下文自文王重易而得建侯之旨於豫應原題豫字揚問明篇文王重易六爻建侯事見原題豫卦注武王周公率而行之不敢加焉借用記文王世子句亦是省文法故大功莫若齊則身兼五侯之地見題注州謂五等諸侯九之伯也明德莫如魯則國侈百里之封左定四年分魯公以大路大旗使法則周公以昭周公之明德孟告子下周公之封於魯為方百里也曹文之昭而為伯甸德薄者不以居尊位同上曹文之昭也晉武之穆也曹為伯甸非尚年也以曹文王子與周公異母晉武王子伯爵居甸服言小也晉武之穆而列侯藩功大者不以殿小邦也見上注殿後也以至武王之母弟八人而五叔無官同上武王之母弟八人周公為太宰康叔為司冦𣆀季為司空五叔無官豈尚年哉霍五叔管叔蔡叔成叔叔毛叔也蓋文武周公封建之初心為褒表功德而設主意非徒曰大封同姓以明親親而已也題注又前漢翼奉傳古者朝廷必有同姓以明親親必有異姓以明賢賢自講題至此援左傳周封建事極親切漢髙帝徒知懲秦人孤立之弊題注下文漢興之初海內新定同姓寡少懲亡秦孤立之弊而不知周家有褒表之法題注以里閈之恩裂全燕之地而封故人前盧綰傳與髙祖同里閈同日生及壯學書又相愛虜臧荼乃立為燕王里閈音汗門也以閨門之私分天下之半而王孽子題注下文剖裂疆土二等之爵功臣侯者百有餘邑尊王子弟大啓九國諸侯大者跨州兼郡連城數十宫室百官同制京師侯孽子諸之子信何功而王於韓韓王信傳漢二年立為韓王濞何德而王於吳吳王濞傳髙祖立濞為吳王也以上四事皆無功無德而封彼其初非無封建之法也斡一轉言髙祖非不封建褒表之意一失失周人褒表功德之意徒法固不能以自行也孟離婁上云云是徒猶空也有其政無其仁謂徒法是故周雖東遷卒收五伯之功史周紀平王束遷于洛又題注下文衰則五伯扶其弱與共守穆東遷避犬戎之患周五伯齊桓晉文秦宋襄楚莊也此封建之得漢未中世已激七國之變史景帝紀至景帝不復憂異姓而鼂錯刻削諸侯遂使七國俱起合從而反七國謂吳王濞膠西王卬楚王戌趙王遂齊南王辟光災川王賢膠東王雄渠皆舉兵此漢封建之失魯衛晉宋尚能城成周於王室如線之時春秋昭三十二年仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔小邾人城成周又公羊僖四年不絶如線不曰城京師而曰城成周者成周地名也與列國等矣此周封建之得韓彭英盧欲連兵釁於帝業甫定之日見韓信彭越英布盧綰傳後贊曰髙祖定天下張耳彭越黯布盧綰與兩韓信皆激一時之權變以詐力成功咸得裂土南面稱孤見疑強大懷不自安卒謀叛逆終於滅亡此漢封建之失周家封建之效如彼漢室封建之患如此繳盡講意又安得不歸於始謀哉周封建之所以得皆自始謀之善漢封建之所以失皆始謀之不善也班固著漢諸侯王表引本文其述髙帝之封建可也而且及於周室班爵之制引出處文借孟子周室班爵祿之句作文其述周之班爵猶可也而且歸於三聖褒表之功詳見題注固之意必有在矣含蓄下文蓋三聖興周者也髙帝造漢者也並應方興之始意均之為封建也周漢封建則一周之以是而治者既曰三聖之功周之治以三聖封建始謀之善則漢之以是而亂者詎非髙帝之過歟漢之亂以髙祖封建始謀之不善即治亂之相形總上治亂字以議周漢封建之得失應冒頭成敗得失字周之得漢之失則創業垂統之君歸之肇造之君孟子創業垂統為可繼也信不容不任其責者繳上講題雖然漢固失之於始矣從頭既抑倒漢了到此略扶起之然猶有可諉者周德下衰曲沃以一軍而封左僖十二年王使虢公命曲沃伯以一軍封晉侯褒表之意已失謂周亦有失非特漢也又其甚也韓趙魏以三家而侯史記周紀威烈王二十三年命韓趙魏為諸侯封建之制蕩然矣謂周封建之制至此已壞漢自文景以來文帝景帝扶起漢説有賈誼以啓衆建之䇿前賈誼疏衆建諸侯而少其力有主父以明推恩之令題注下文武帝施主父之䇿下推恩之令此二事又是漢後來封建之得者於冥豫之中而得其所謂有渝無咎者焉應原題用豫卦事首尾相應者豫卦上六冥豫成有渝無咎冥豫昏迷不知反也若能有渝變可以無咎故封建之法得之於文武周公而子孫廢之周始得而終失失之於髙帝而子孫復之漢始失而終得合始終而論焉總上文則進漢於周亦未為過扶起漢與同一般是固孟堅之微意也一篇主意稱周封建之得譏漢封建之失至結尾却取賈誼主父偃之言進漢於周以為班史之微意此意盡矣學者試思之援古證今格此篇與三聖褒表功德論同格聖王施德行禮黃保大出處前漢宣帝紀甘露二年冬胸奴呼韓邪單于欵五原塞願奉國珍朝三年正月詔有司議咸曰聖王之制施德行禮先京師而後諸夏先諸夏而後四裔單于非正朔所加王者所客禮宜如諸侯王稱臣位次諸侯王下詔曰朕聞五帝三王禮所不施不及以政今胸奴單于其以客禮待之位在諸侯王上立説古人之待外裔非不施之以德必有禮行乎其間使恩意足以羈縻之而大分凜然不得以踰越宣帝喜外裔之來朝不以古人之所以待之者待之乃以殊絶之恩溢出於常分之外借是禮以寓是德而使德浮於禮焉此亦出於一時之權宜而非可以古人之禮為拘也末却責宣帝未得古人待逺人之道批云援古證今趨時立説可謂善於形容者古人之待遠人有常分分禮也聖王之待逺人以禮行於施德之間而後世則權之以恩恩德也宣帝之待逺人以德溢出於行禮之外君子殆未可以概論也謂宣帝與聖王之意不同不可一概而論夫尊卑內外中國為尊四裔為卑中國為內四裔為外截然不可易者分也分是禮不卑不可以抗尊外可以踰內而抑揚輕重於其間則有恩焉恩是德帝古人則抑外國而輕之宣則楊外國而重之恩者所以濟其分之不及也主意發明宣帝本心矧當逺人歸慕之初暗説宣帝時單于來朝彼將覘吾恩意厚薄而為去留謂逺人視我施德之厚則留薄則去苟非有殊絶之禮少溢於常分之外含施德意出於行禮之外王證詔位次諸侯上則何以為羈縻之地哉羈縻乃籠絡駕馭之意有如漢呼韓之請朝本題注自古人觀之則常事耳若聖王待之以有禮存焉以漢得之則深為漢喜宣帝之失在此帝也且推原宣帝本意亦思夫髙文以來髙祖文帝胸奴之嫚甚矣前漢胸奴傳髙祖時冒頓圍帝於白登七日髙后時冒頓寖驕為書嫚髙后孝文復修和親一旦能屈膝於天子之庭單于來朝則待之之禮寧過於厚位在諸侯王上而有司乃欲以古人常禮律之見本題注而有司之意欲示之以分不褻之以恩夫禮固不可廢也不敢説倒了禮字屈吾之禮以寓吾之德此是宣帝本意則帝之意固有在矣其意在羈縻逺人聖王施德行禮請申之嘗論古人嚴中外之辨而立為一定之分分禮也而見題注先諸夏後外裔分之所在恩不得而私焉恩是德論此是正道路固使之通書旅獒武王遂通道于九夷八蠻而要荒之服必有其别書要服荒服正義曰五服之最逺者曰要服荒服要者要束以文教荒者簡略之義朝會固與之進記明堂位周公朝諸侯于明堂之位天子負斧依南鄉立三公中階之前北面東上而國門外之儀終不可得而越同上至九夷之國東門之外西面北上此古人侍四裔之禮其嚴如此廣大之中而有嚴密之意寓德之中有禮撫柔之餘而有凜然不可犯者存德之中有禮古人之待遠人何其大體耶言大體者以禮之中有德存焉蓋古者禮教素明國勢嘗尊古人以禮為重蕞爾外裔蕞才外切小也使之生全天地間而隂受容養之賜行禮之中有施德之意寓或一進之朝會之列得以觀吾中國衣冠禮樂之文中國乃衣冠禮樂所自出之地外而內之已為莫大之德韓文在夷狄則進之在門牆則麾之則其律之以內外之限尊卑之分德之中有禮中中國為內四裔為外國為尊四裔為卑烏敢有一毫缺然不滿之意古人之待逺人如此是禮也以三代聖人行之則可矣引入漢不能如聖王所以施德行禮後世立國之勢寖不如古謂漢之時非三代之時外裔強弱中國之盛衰係焉彼強則此衰彼弱則此盛時君世主幸其弱幸外裔之弱則窮兵以快其忿固非所以為德如武帝之窮也兵黷武非德畏其強畏外裔之強則屈已以徇其欲尚何暇議禮哉如文帝之和親非禮也是故君子考論古今之變而斟酌德禮之間引入本意則知漢之事殆未可以古論也謂漢之時不可以古禮為拘含白登之怒見冒頓注忍嫚書之辱冒頓為書遺髙后曰兩主不樂無以自娛願以所有易其所無髙后大怒以就和親髙祖使劉敬結和親之約孝文即位復修和親並見胸奴傳君臣首足之義固不暇問也謂文帝屈已和親何以為德今前賈誼疏天子天下之首上也蠻夷天下之足下也胸奴嫚侮侵掠天子共貢足反居上首顧居下倒置如此武帝一不勝其忿窮兵三十年見下注能斷胸奴之臂西域傳孝武之世開玉門通西域以斷胸奴右臂而不能一屈單于之膝胸奴傳胸奴震怖益求和親然而未肯稱臣也能絶和親之幣而不能一致逺人之貢坰上武帝選將練兵深入逺戍兵連禍結三十餘年中國罷耗胸奴亦創艾雖欲行禮其何以行之哉武帝窮兵黷武何以為禮夫寬以待之既不足以為德文帝之和親不足為德嚴以治之亦不足以行禮武帝之窮征不足為禮漢之事兩失之矣結上兩腳宣帝安得不於二者而權衡之宣帝能以德禮二者之間而待逺人夫以向也崛強穹廬崛強陸梁之貌穹廬胸奴氊帳也而今也窮蹙無聊言單于屈服向也搖蕩邊陲陲邊也見左傳而今也奉珍朝賀言單于來朝見題注希世之曠典一朝而創見自髙文武以來單于不曽屈服今一旦稱藩可謂希曠之典百年之深耻一朝而盡雪宣帝贊值胸奴百年之運如敘傳所謂單于慕義稽首稱藩功光祖宗業垂後裔帝也方以是為漢喜應冒頭漢得之則深為漢喜蓋惟恐其待之不厚接之不恩耳宣帝所以欲屈中國之常分而權之以恩也何暇較纎悉於禮文之末哉奚暇以古人之禮為拘且帝非不知贊謁不名古無是禮也題注下文三年春正月胸奴呼韓邪單于來朝贊謁稱藩臣而不名賜以璽綬冠帶衣裳車馬金繒賜以璽服古無是禮也見上注待以客禮而躋之王公之上古亦無是禮也題注其以客禮待之位在諸侯王上然借是禮以寓是德而使德浮於禮焉宣帝本意欲羈縻逺人以恩德而溢出於禮分之外帝之意亦可見矣應冒頭帝之意固有在語想其荒逺裘罽之民荒逺四裔所居之地裘罽四裔所服之衣一旦周旋於玉帛會同之地言其來朝執玉與帛與吾臣子相為後先位在諸侯王上彼自視非常之遇出於意望之外彼之本意豈敢望此今而待以客禮是出望外殆將相顧駭愕感誦漢德彼將感我之德願為臣妾以長保塞上之安形容稱藩之意則為漢之利豈止一名位抑揚之間而已奚必拘於禮吁此帝所以却有司之議而從望之之請也蕭望之傳初胸奴呼韓邪單于來朝詔公卿議其儀黃霸于定國云云其禮儀宜如諸侯王位次在下望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國進而不臣此則羈縻之義也天子采之下詔以客禮待之單于位在諸侯王上吾觀五單于爭立之時見胸奴傳望之亦嘗以救災恤鄰之禮行之蕭望之傳五鳯中胸奴大亂議者多曰可因其壞亂舉兵滅之詔問蕭望之計䇿對曰是乘亂而幸災也宜遣使者吊問輔其微弱救其災患四夷聞之咸貴中國之仁義必稱臣服從上從其議清渭之朝固有自來胸奴傳呼韓邪單于朝天子於甘泉官漢寵以殊禮賜之冠帶衣裳黃金璽綬上登長平蠻夷君長王侯迎於渭橋下咸稱萬嵗及甘露以後邊塵不警亦復遺三世之利胸奴贊至孝宣之世單于臣服遣子入侍三世稱藩賔於漢廷邊城晏閉三世無犬吠之警抑見外裔雖荒遠未嘗不可以化誨懷服之也見宣帝待逺人之效傳曰招攜以禮懷逺以德左僖七年云云用得切望之儒者謂其有見於此歟謂其有見於德禮之説也雖然望之之議固出於權宜望之之説固是而有司之議亦烏可以盡廢有司執古禮之説亦是何者外裔不可與中國並斷斷乎若天冠地屨之不可易中國外裔自有尊卑之分會戎于潛春秋猶譏之春秋隱二年公會戎于潛公羊注王者不治四裔録戎來者勿拒去者勿追書會戎譏之也宣帝許其來朝固可自附於來者勿拒之義上注厚金繒盛燕享非不足以示恩也説宣帝待之以恩猶可也奚必以名分假人哉責宣帝豈可廢尊卑之禮大抵帝之待遠人皆非真有見於古人之常道言宣帝不如聖王之施德行禮有如置屬國以處降羌卒為他日腹心之患宣帝本紀神爵二年置金城屬國以處降羌此皆一時用權之弊而萬世所當戒也後世不可以宣帝為法當戒其弊噫外四裔而內諸夏春秋所以存周禮本題注後之欲施德行禮者當以春秋為法公羊成十五年春秋內中國而外諸夏結語正大可法前篇援周人封建之得而證漢人封建之失此篇援古人待遠人之禮與宣帝不同皆是援古證今以天立説格此篇與文武之道同伏羲論同字面聖人道出乎一方嶽出處荀子儒效篇如是則可謂聖人矣此其道出乎一曷謂一曰執神而固神固之謂聖人立説聖人以一身而酬酢天下之萬變若不一矣然彼之分雖殊而此之理則一以我之一貫事物之不一蓋以聖人之心純乎天天則一矣一則足以應天下之不一矣批云筆力老蒼可逼前輩其議論得之通書其主意本之西銘聖人之為斯世也天而已矣破有含蓄天字是道出乎一夫苟至於天詁上天字則至神而無迹神則無方之可指故張子正蒙一故神兩化至化而難名化則無形之可名意天字化字是一篇主蓋有物物而不物於物者能物萬物而不物於萬物物用前輩語又孟告子耳日之官不思而蔽於物交物則引之而已矣故凡天下之事變其森乎吾前者千岐萬轍而未艾也言事物之不一即後面自其變者觀之則其分殊意而吾方與之交戰於酬酢之境交戰是不一而相應接於爭馳競逐之中爭馳競逐是不一則吾心亦擾擾矣既與之交戰與之爭馳競逐心安得而不擾擾擾擾便是不出於一膠膠擾擾字出荀子以吾心之擾擾者粘上文不以吾心之一而應天下之無窮應天下不一之事物則人者勝而天者微而烏乎化語老字應主意天化字是何也唤下文天下之事自其變者觀之則其分殊事物之不一自其不變者觀之則其理一吾心之至一自用東坡赤壁賦文法蓋將其變者而觀之則天地曽不能以一瞬自其不變者而觀之則物與我皆無盡也程子云理一分殊又龜山語録西銘理一而分殊知其理一所以為仁知其分殊所以為義至於一則所謂殊者化矣應主意化字蓋道之所在一則真二則變一則純二則雜用前輩語聖人之一其聖人之天乎語老天應破題字荀卿子曰聖人道出乎一一者何也便從一字説起一元之氣渾淪磅礴於天地間先説天之一其滋而萌三五厯紀濛鴻滋萌其芽而甲易解卦百果草木皆甲拆其生而息張橫渠云物之初生氣日至而滋息其榮而悴萬物榮於夏而悴於秋何啻什百千萬之不齊也言萬物之不一物孟滕文公上曰夫物之不齊之情也或相倍蓰或相什百或相千萬使天而無以應之耶則造物之功幾乎息矣無以應之則是無化使天而求以應之耶則物矣而非化迹矣而非妙也求以應之則不能化心已上一段以天之一比聖之一天下之理一而萬萬而一者也周子通書是萬為一一實萬分萬一各正散一於萬何者非物物之不一會萬於一何者非化心之至一字應主意化然則聖人之一其聖人之天乎應冒頭結處假合得好故動而無靜靜而無動物也動而無動靜而無靜化也周子通書動而無靜靜而無動物也動而無動靜而無靜神也云云物則不通神妙萬物天則一矣一則化矣好議論而何事物之能纍化則神妙萬物是何也唤下文人惟此心耳天下惟此道耳有此心則有此道心外無道道在心外心而求之者非也反説故凡事物在吾道中太倉一梯米耳設譬中萬物即吾道之一物何事乎紛紛為也何必與萬物爭馳競逐虛靜之天雲氣出沒天為雲氣之所出沒並與下句比靈明之府塵土障固如心為物欲之所掩蔽如此便是心不一了則一而二二而三而天下始多事矣何以一天下之萬物老子一生二二生三三生萬物聖人之為天下也以下數句説聖人之道是學韓原道文法其具則禮樂刑政典章文物其倫則君臣父子夫婦朋友其教則仁義禮樂孝慈友悌其位則宗廟朝廷州閭鄉黨韓原道其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賔主昆弟夫婦其服桑麻其居宫室其所酬酢其所經綸蓋有萬之不齊也應前萬字亦應冒頭千歧萬轍而未艾也而聖人者以一心而普萬物程子云天地之常以其心普萬物而無心聖人之常以其心順萬物而無情虛靈無際沖漢無朕程子語又曹子建云渾沌鴻濛兆朕未形貫通渾融意慮不作澄然其靜洞然其空一而已矣四句形容心之一處嗚呼兹其所以為聖人之天乎應冒頭繳處舜禹之精一書大禹謨帝曰格汝禹人心惟危道心惟微惟精惟一湯尹之一德商書伊尹曰惟尹躬暨湯咸有一德吾夫子之一貫論語子曰吾道一以貫之皆天也應主意天字則凡不出於一者不足以言道反説道出於一字不一則不足謂之道故是一也非有方體非有限量朱晦菴與陸象山太極圖辨云云又云心之虛靈無有限量寂然非靜感通非動易繫辭寂然不動感而遂通天下之故其所以酬酢萬變剸裁百為以吾心之一應事物之不一一乾道之變化而已易乾卦乾道變化各正性命又通書大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立馬所謂一者固自若也而或者膠膠擾擾見荀子與天下相馳於萬物之中相將役於物之不暇而道安在哉荀天論聖人清其天君正其天官云云則天地官而萬物役矣申韓以刑名而慘此一申商韓非學刑名之學莊老以虛無而眇此一莊周老聃學虛無之學蘇秦張儀以縱橫而亂此一蘇秦説七國合從攻秦張儀説七國連橫事秦並見史記而天下始紛紛矣應原題紛紛字紛紛便是不一了荀卿子其知道乎引本出處而君子猶不能無憾焉何也略貶荀子吾道之一説一字之原在易為元易乾卦元者善之長在書為極書洪範五皇極而在中庸則為誠中庸誠者天之道儒以上三句亦是關洛諸議論一者誠而已矣周子通書聖誠而已矣誠五常之本百行之源也誠則靜虛動直靜虛則明明則通動直則公公則溥明通公溥其庶乎坰上聖學篇聖可學乎曰可有要乎曰有請聞焉曰一為要一者無欲也無欲則靜虛動直虛則明明則通動直則公公則溥明通公溥庶矣乎而曰執神而固見題注則非所謂覺朱文公云此心之靈其覺於理者道心也其覺於欲者人心也則非所謂無意語子罕子絶四毋意毋必毋固毋我則非所謂心之精神是謂聖此句出孔叢子而陸象山與朱文公辨無極二字取此一句以天立説格此篇可與黃朴經制述作論參看文武之道同伏羲危科出處荀子成相篇文武之道同伏羲由之者治不由者亂立説以時而論則伏羲之朴若異於文武之文以道而論則文武之文自不變伏羲之朴時變而道不變者以聖人之天常全耳其天者常全則千載猶一日也百慮猶一致也孰謂文武之道不同於伏羲乎考官批云意甚古語甚新下字亦甚異此論中巨擘也論曰天下之朴既散伏羲之後而聖人之天常全者文武之道此時變而道不變也不變則同是天字時字道字主意蓋聖人之出不能違天下之時時變謂先聖後聖不同而天下之時亦不能變聖人之道道不變謂先聖後聖則一人徒見聖人居夫適至之時暗指文武迫之而必應求之而必供與後面相應其政迹其文為炳然著見於天下此數句説文武之文則謂後之聖人文武深異乎淳古淡泊之為者伏羲之時嗚呼此殆未能以天而觀聖人也歸天字主意時之適至文武之時雖聖人不能避朴之既散文武處伏羲之後雖聖人不能凝固也雖文武不能凝固其朴之既散而聖人之道則非與世而為之旋轉也時變而道不變往往一以會其異會合其不同靜以鎮其騖鎮定其馳騖必於萬有並形百為昭晰之中文武文為既盛之時而有所謂渾然不露之道體在焉如伏羲質朴未散之時果能以是觀之則千載猶一日也文武去伏羲已千載同其道則如一日百慮猶一致也易繫辭孰謂文武之道不同於伏羲乎反繳文武之道同伏羲愚請有以實荀子之説嘗謂聖人之天猶太虛然就天字説以天比聖人之道雙關説太虛之中雨暘寒暑與時代謝固不一也應時變而太虛之體則未嘗變應道不變聖人之出損益盈虛與時偕行至不一也應時變而聖人之天則未嘗變應道不變羲黃處於聖人之祕伏羲黃帝大道既隱之時堯舜處於聖人之盛唐堯虞舜文明方顯之時伊周處於聖人之任伊尹周公達而在上孔孟處於聖人之窮孔子孟子窮而在下祕者時實隱之就時上斡隱藏也盛者時實顯之顯彰也任者時實勞之勞煩也窮者時實否之否塞也文四句演上是皆不得不爾者時之使然而數聖人之天則混然於不隱不顯不勞不否之中應冒頭聖人之天常全四隱顯勞否包上句非可以差殊觀之而或者則曰世變既激則天下無全質謂文武之世變無伏羲之全質文為既盛則中古無淳風謂文武之文為無伏羲之淳風嗚呼萬燈一火萬粟一粒譬喻同意猶萬事一理是理混融本無間斷聖人之道無絶續豈以古往今來而為之盈縮哉雖千載如一日不多不少且後世而不能追還古人之懿者懿美也惟懼夫吾有以斫天下之朴也應破題朴字若夫以一而運天下應冒頭一字以道而適時變應冒頭時變而道不變智鑿未用真體不分應冒頭渾然不露意鑿孟子所惡於智者為其也使斯世莫得而損益之常如一則天下之朴雖散猶未散也應天下之朴既散而聖人之天常全吾觀堯舜之道一中之外無餘説語堯曰咨爾舜天之厯數在爾躬允執其中及舜以命禹則演而為精一之傳書大禹謨人心惟危道心惟微惟精惟一允執厥中夫子之道一貫之外無緒言語里仁子曰參乎吾道一以貫之及曽子以告門人則廣而為忠恕之理同上子出門人問曰何謂也曾子曰夫子之道忠恕而已矣始者舉其要終者極其詳道自要而詳前者肇其端後者備其極道由端而起疑於其理益岐而其體裂也岐裂分也分極其道已及統而歸之脈而一之其道本一則精一之詳於一中未虧也禹精一之道即堯舜一中之道忠恕之極於一貫未散也曾子忠恕之道即夫子一貫之道道應冒頭天下之時不能變聖人之嗚呼孰謂文武之道不同於伏羲乎應冒頭繳語試以八卦九疇合而論之伏羲畫八卦武王敘九疇方伏羲之畫八卦乾坤艮巽震離坎兑於天地之理微有端倪伏羲之道未露至文王重為六十四文王重易六爻為六十四卦則天地之理始盡形於天下文王之道已露文玉之易已多矣粘上句而武王加之九疇焉書洪範九疇一五行二五事三八政四五紀五皇極六三德七稽疑八庶徴九五福然卦而重之君子不以為暌道之全暌離也文王之道同伏羲之道疇而九之君子不以為裂道之體裂分也武王之道同伏羲之道何則設問時欲顯聖人不能使之隱時欲彰聖人不能使之晦應冒頭時變至所恃以不變者則有道存焉應冒頭道不變意今夫以迹觀之且説伏羲文王之迹則伏羲之時文籍生而未詳書序古者伏羲氏之王天下也始盡八卦造書契以代結繩之政由是文籍生焉法度隱而未著揚虞夏法度彰禮樂著禮義之習差見而洪荒之習尚遺揚子問道鴻荒之世聖人惡之是以法始乎伏羲而成乎堯匪伏匪堯禮義哨哨網罟之制雖設而結繩之風猶在易繫辭古者包羲氏之王天下也云云作結繩而為網罟以佃以漁蓋取諸離其與文武禮制之修干戈之用左襄七年周之王也制禮尚物居天下極文之世而為仁義禮樂之主者莫不大有徑庭謂伏羲之朴異文武之文泊應冒頭後之聖人深異乎淳古淡之為者惟夫自其天而觀之自其變者而觀之自其不變者而觀之是學東坡赤壁賦句法應破題天字則文武之有為者猶其伏羲無為之至體也歸同字意有為與無為則同文武之已形者猶其伏羲未發之妙用也已形與未發亦同何以明之設問文籍備矣應前伏羲事而卦演疇敘之後天下莫得以名其文應前文王演八卦武王敘九疇事干戈用矣應前武王事而牛散馬歸之後天下莫得以名其武書武城歸焉于華山之陽放牛于桃林之野以至儀刑之孚初無煩文詩儀刑文王萬邦作孚雅頌之作其意簡古食貨志君有餘財民有餘力而頌聲作而天下莫得以名其禮樂之盛三扇連用三個莫得名字見得文武之道文雖全而朴未散與伏羲之道則一往往文武之道每每於形不能自晦迹不能自祕之際應前晦字祕字而韜光剔華潛真守一只是不斫其朴之意宛然淳古之風在焉如伏羲淳朴之時吾是以知惟天下之至動可以觀其至靜文武之動如伏羲之靜惟天下之至異可以觀其至同也文武之異如伏羲之同始嘗觀諸伏羲之初如空未雲如水未波如玉未琢以此三句譬朴之未散而其與世相忘於不可為與道相融於不可作應渾然不露意是固然也結上生下及文武之世天下之求於聖人者日益衆不如與世相忘之時聖人之迹其著於天下也日益暴白不如與道相融之時非可以無為為之矣始之不可為不可作者今不可矣今也雲興波動而清明不移應前譬喻雲興波動如朴已散清明不移如朴未散璞分質剖而渾厚猶在璞分質剖如朴已散渾厚猶在如朴未散是難能也結上文然則欲觀聖人之天者不觀於此而奚觀應破題天字抑嘗論之文武處中古之治而心逰太朴應破題朴字迫之而必應也而惟恐晦之而不深應冒頭迫之而必應求之而必供也而惟恐斂之而不祕應冒頭求之而必供是則其著見於天下者皆非其心為之文武本心不欲如此奈何後世之運天下者則必欲窮吾力之所可到以盡古人之所未為責後人做太盡於是典章文物粲然畢具制度繩檢靡有不周愈備於文武之時故後世皆以是為極文之世文之盛實之衰而不知天下之文固極於此而周後為秦之不可繼者亦未必不在於此此亦是前輩議論天下之朴其不可斫也如是哉應前斫朴字憂國者試思之謹論此篇亦可與狀元黃朴經制述作論參看立説出奇格此篇與漢武號令文章論同意孝宣務行寬大徐元德出處前宣帝本紀黃龍元年二月詔曰云云朕數申詔公卿大夫務行寬大順民所疾苦將欲配三王之隆明先帝之德也今吏或以不禁姦邪為寬大縱釋有罪為不苛豈不繆哉立説漢宣帝本嚴毅之君至黃龍元年忽下寬大之詔蓋此時即位已三十年矣前乎此年未有此見至此而見始定下詔二十有一矣前乎此詔未有此言至此而言始出亦其志氣定而本心見世故熟而至理明脫去雜霸而窺見帝王之真深足為帝嘉耳陳竹林批云此篇推究得是黃龍元年方下此詔乃是宣帝春秋既髙閲天下道理已熟方見的然知得如此議論極髙徐進齋批云據黃龍元年詔曰朕數詔公卿務行寬大則如此立説自非本意但文字精采所謂強詞奪正理也人主有一旦之言指孝宣晚年下詔而言而易其平生之素宣帝本嚴毅之君今一旦欲行寬大是易其平生之素也君子是以知其老成之定慮也是時宣帝即位已三十年故云老成定慮夫此一人主也謂宣帝前日所見與今日異前日之政不裕前日之政不寬大今日之論不迫今日之詔欲寬大以其不裕而概之於不迫總上四字則言行之不相顧謂今日之言與前日之行不同幾若矯過以自文者似以今日寬大矯前日嚴毅之過而君子何以知其慮之定難破題定盧字蓋人之本心常定於老成之日也謂少年之心至老成而後定彼其少壯之時求速化之術少壯則欲速優裕含洪狀寬大二字自非聖人而誰能惟聖人則能寬大而流於躁切急迫躁切則非寬急迫則非大則昧而不自知若昏昧之君不知寬大苟君子不姑緩之以徐俟其定謂至老成之時方有定慮照主意定字顧以一旦之為而占其晚節之不加進照破題主意則人主亦難矣哉若不看宣帝末年所為則是宣帝不知寬大矣漢宣帝剛毅之主也剛毅與寬大正相反寬大之詔發於黃龍元年引出處有考究蓋帝於是春秋髙矣宣帝本始四年地節四年元康四年神爵四年五鳯四年甘露四年黃龍一年從本始元年至黃龍元年已二十五年孝宣務行寬大請試論之人主之所見雙關説人主少壯不同壯失而老得後世之君不如老壯之均善古者聖人始亂而終定後世之君不如始終之全美古者聖人豈惟賢君欲為之將天下之庸君皆欲為之也誰不欲老壯終始之俱善然事敗於少年氣失於壯勇年少多躁謀曽不如老成之長慮老成若遲鈍豈惟庸君病之將天下之賢君猶皆病之也人亦罕見壯失而老得者夫其均欲之也而又均病之也應欲字病字揔上兩段論然則天下之君烏可無君子之論歸主意何者物則不可以兼隆詩蒸民天生蒸民有物有則志氣不可以並行孟子夫志氣之帥也凡血氣之盛皆志氣之衰也血氣盛乃少年之時形骸之未廢乃天理之未進也形骸未廢亦少年之時昔者堯舜用事證人應冒入聖處即位視耄期如一日應老成字曰書耄期倦于勤又記九十耄百年曰期頥彼其天德之純全固不可以老壯而殊異應題下老壯均善等語然天下不多堯舜結上生下或者宜徐俟於其末要觀老成之時吕刑一書見周書非其享國之百年書吕刑王享國百年耄荒穆王蓋未輕作前此未敢輕作吕刑一書而天下亦未輕見此書也粘上輕字方見持重之意夫墨劓剕宫吕刑墨辟注刻其顙而涅之曰墨刑劓辟注截鼻曰劓刑剕辟注刖足曰剕刑宫辟注男割勢女閉宫前此穆王非不知也穆王少時雖知之而不敢輕作輕重上下吕刑上刑適輕下服下刑適重上服前此穆王非不知也知之而未敢輕作而惻然哀矜之訓吕刑皇帝哀矜庶戮之不辜必於垂老之年至百年乃作此書噫亦可見矣方見老成有定慮正結上文然則世之人主苟不要其終焉終是老成之時而需其所見之一定應主意定字徒托其一二事以為優劣是不信此理之不泯也反結上文漢之人主雖不足以進帝王之粹下語有稱停穆帝是堯舜王是王大抵皆顛冥於強壯之時應壯失字而警悟於老成之日應老得字人皆以其強壯者病之應題下病字吾固以其老成者喜之應老成字彼髙帝也其去諸將忍矣髙帝斬韓信醢彭越非忍耶然大風之歌髙帝作大風歌安得猛士之辭歌云安得猛士兮守四方實發於十年之後本紀髙祖十二年冬置酒沛宫上擊築自歌曰云云當是時也忍心何在哉至老成時忍心絶矣彼武帝也其伐四夷勇矣武帝窮兵漠北非勇耶然輪臺之詔西域傳贊武帝末年遂棄輪臺之地下哀痛之詔悔過勸農之意同上詔云止擅賦力本農非所以優民也實見於後元之初按西域志是征和中下此詔本紀征和二年後是後元元年當是時也勇心何在哉至老成時勇心消矣由始而觀之則二帝為少恩是壯失而始亂者由今而觀之則二帝為至仁是老得而終定者君子幸其有此焉幸其老成有定見則一是可以蓋百非晚年之是可以掩昔日之非而奚暇以咎其昔結上生下孰謂二帝之後而又有宣帝入正講有眼目其始焉不至二帝之失揔得好且善回護而終焉有二帝之悟哉應前悟字帝也先反敘宣帝嚴處明敏有餘明敏乃寬大之反果鋭有餘果鋭乃寬大之反堅忍剛毅有餘堅忍剛毅皆寬大之反或者於寬大之詔猶有所未明也宣帝之嚴如此恐其未必寬大夫有所未明也粘上明字是以汲汲乎權制法理非寬大之本紀贊政事文學法理士咸精其能而徐徐乎德化禮遜非寬大風本紀本始元年春遣使者詔郡國德化又丙吉贊海內興於禮遜道妙不存故緒餘之是用安得寬大躬行不至故隄防之日深安得寬大天下雖治而不知已陷於狹且褊矣狹與褊乃寬大之反偏見之狹不可以使寬粘上狹字狹則不寬私心之褊尤難於為大粘上褊字褊則不大天下固已絶望於帝也黃龍元年下此詔即位三十年矣見冒頭注前乎此年未有此見前此未嘗有寬大之見至此而見始定至三十年後見始定下詔二十有一矣見本紀前乎此詔未有此言前詔未嘗有寬大之言至此而言始出至二十一詔後寬大之言始出假如寬之政大之事開一著字露出寬大二敷演即行於公卿即播於萬民亦何足為帝多縱宣帝前乎有此亦未為異獨其志氣定而本心見應老成定慮語世故熟而見理明此兩句是骨脫去雜霸而窺見帝王之真元帝紀宣帝曰漢家自有制度本以霸王道雜之深足為帝嘉耳説盡主意至治無奇功盛美無善迹前輩議論帝也亦却而觀之矣宣帝所以行寬大者知此意耳謂賞罰之信必本紀贊信賞必罰雖僣濫之弊亡百工之藝精雖苦窳之患絶同上至于技巧工匠器械自元成間鮮能及之河窳音庾言缺壞也舜陶于濵器不苦窳然帝王之風純粹溫厚之氣不如是之斬也而亦何貴於此哉今日之行寬大與初年信賞必罰之時不同故不以為貴其見之定其言之決蓋非偶然也結一段意蓋嘗論之天下之事勉強於早為者不如時至之自然如此乃盡善而覆護於今日者未必不棄於晚節終有發露時節故夫圖終之主太甲乃前日敗度之人書太甲欲敗度縱敗禮而即位焚錦繡者唐明皇初年焚錦繡前殿乃滋暮年之奢侈見玄宗本紀人之賢否非觀於其終焉應終字蓋未可以目前論也終是老成之時霜降水涸涯涘乃見以此喻老成之時乃見定慮而善觀木者亦得之於歸根見老子夫物藝藝各歸其根吾是以取宣帝收題謹論立説出奇格此篇與孝宣務行寬大論同意孝武號令文章如何李發出處前漢武帝紀贊武帝初立卓然罷黜百家表章六經云云與太學修郊祀改正朔定厯數協音律作詩樂建封禪禮百神紹周後號令文章焕然可述後嗣得遵洪業立説武帝自即位以來凡幾號令凡幾文章非不可觀然其惻怛為民之真心獨在於輪臺之一詔蓋武帝下此詔時已年五十四矣更閲久而真見定懲艾深而實意形是以輪臺詔中言語切於民生之休戚關於國家之利害此是真號令真文章比平時號令文章大不同也考官批云立説尖新造語警拔真百烏中之孤鳯也如繆烈論以表章六經為主意固是正説但立説稍同不如此篇竒偉甚刮人眼論人主經世之大典武帝真號令文章當取其有為民之真心在於輪臺一詔而辭采不與焉不在於平時之號令文章自古人主出而經世應起句經世字所以興起人心號令藩飾治具者文章有號令有文章露出題字二者固不可一日闕且擺開説然使其典麗之辭有餘號令文章而真淳之意不足反應為民真心語則君子亦不之貴謂武帝平時之號令文章無憂民之真心固不足貴君子之所貴者粘上一句拗轉取其更閲久而真見定主意懲艾深而實意形此是下輪臺詔時惻怛為民之念此紹中多有為民之語詳見大講中藹然溢於文辭之表此是真號令文章則言雖簡朴而不華理實深切而獨到言不華而理獨到以其有為民之真心至孟亭辭不迫切而意已獨其有關於天下國家理亂之機者甚大應破題語噫知此則可以論孝武號令文章矣正入題處帝在位五十四年間有考究其平日號令非不燁然可觀也真號令不在此文章非不燦然可慕也真文章不在此本出處號令文章焕然可述然略其辭采而求其真心應破題語則愛民一念足以夀漢四百年之脈號令文章在於愛民則為可貴而號令文章俱有可采者其在於晚年輪臺之一詔乎主意在此一句孝武號令文章如何請因班史之贊而究極其説愚嘗讀班史接引上文不斷而熟考漢興以來號令文章矣便就漢史上映帶出來前乎孝武之世含髙文時意其言語雖未多號令其文辭雖未盛文章然求賢一詔招徠至切髙祖本紀十一年詔曰云云賢士夫有肯從我逰者吾能尊顯之大風一歌守禦不忘髙祖紀十二年置酒沛宫酒酣上擊築自歌曰大風起兮雲飛揚安得猛士兮守四方此髙帝之號令文章是已髙帝號令文章猶有愛民之真心春和一詔慘怛備形文帝本紀元年三月詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡其議所以賑貸之南粵一書忠信可掬文帝賜南粵尉他王書朕髙皇帝側室之子云云此文帝之號令文章是已文帝號令文章亦有愛民之真心驟是模倣孝宣務行寬大論大講中步以二帝之發施者揔上文視典謨訓誥之所傳如堯典舜典大禹謨臯陶謨伊訓大誥酒誥之類風頌二雅之所載毛詩國風大雅小雅商頌周頌彼仁義道德之味粹然而可挹此是真號令忠厚純懿之風渾然而無瑕此是真文章固不可同日語下語有斟酌有抑揚然竊觀髙文之號令文章轉歸主意猶皆出於真心實意之所形照破題語而無一毫之矯偽粉飾雜乎其間若有一毫矯偽粉飾便非真心其去帝王風旨猶未至大相遼邈此是文字操縱之法前既説二帝之號令文章視古帝王不可同日語今又云云帝王風旨未大相逺者以其有愛民真心耳逮越六七十載而傳至武帝就髙文上引歸武帝有前司馬相如傳漢興七十八載德茂存乎六世則文治蔚然寖盛矣且揚吁又抑辭藻之華忠信之薄也言語之工道德之衰也此四句是襲陳止齋文心號令文章若無愛民真又何足取此論者三嘆髙文之猶古揚髙文而每不滿於武帝之世者此也抑武帝然孰知又揚帝之號令文章其間亦豈無更閲久而真見定懲艾深而實意形應冒頭雨句大有關於理亂之機而端可嘉尚者乎應冒頭關於天下國家理亂之機者甚大語自今觀之且演説興廉有詔本紀元朔元年詔深詔執事興廉舉孝求言有詔同上建元元年詔舉賢良方正直言極諫之士舉茂才又有詔同上元光元年詔州郡察吏民舉茂才異等可為將相者凡載於紀者皆號令也非真號令然君子之所取者不在是以其不切於民生之休戚獲天馬有歌元鼎二年馬生渥窪水中作天馬之歌獲朱鴈有歌太始二年獲赤鴈作朱鴈之歌産芝房有歌元封元年甘泉宫産芝九莖作芝房之歌凡載於志者皆文章也非真文章然君子之所取者亦不在是以其無關於國家之利害且帝也挾長駕逺撫之資前漢司馬相如傳上聖創道德之塗云云博恩廣施逺撫長駕將之以上嘉下樂之志董仲舒䇿制朕上嘉唐虞下樂商周愧詩書之不事前陸賈傳賈時時前説稱詩書髙帝曰乃公居馬上得之安事詩書悼禮文之多闕題上文稽古禮文之事猶多闕焉招徠儒雅作興文治書序漢室龍興開設學校旁求儒雅渙為號令揚為詩書見題注于以播之殊方于以奏之清廟見前漢禮樂志一洗髙文之陋而逺追古風焉應原題數語非不可尚也應冒頭語而君子不之取何耶且難蓋所謂號令者不貴乎粉澤之溫潤而貴乎切於民生之休戚應冒頭惻怛為民語此是真號令所謂文章者不貴乎節奏之鏗鏘而貴乎關於國家之利害應冒頭關天下國家理亂語此是真文章故論者不觀之於春濤洶湧之時此比武帝平時之號令文章而當觀之於霜降水涸之際此比武帝晚年之號令文章不當觀之於春華繁茂之日此比武帝平時之號令文章而當求之於枝葉剝落之餘此比武帝晚年之號令文章愚嘗越紀與志應講中紀志字而歷讀班史至于西域傳見輪臺一詔主意在此始為之撫卷而喜曰帝之號令文章其得者在此矣其得處在於憂民故也讀其詔其始也悼二師之失利而曰悲痛常在朕心西域傳詔曰云云乃者二師敗軍士死略離散悲痛常在朕心其中也悔築亭之非而曰是擾勞天下非所以優民也同上今請逺田輪臺欲起亭隧是擾勞天下非所以優民也其末也歸重於力農而曰修馬復令以補缺毋乏武備而已同上當今務在禁苛暴止擅賦力本農云云其語懇惻而意明此可謂真號令應冒頭惻怛為民語其辭質直而理到亦可謂真文章應冒頭言雖簡朴而不華理實深切而獨到語帝至是蓋春秋高矣武帝是時已年五十四矣豈非所謂更閲多而真見定懲艾深而實意形者乎應冒頭語豈非帝為民一意真切誠慤蔚然超出於平日號令文章之表者乎真號令文章盡發露於此然是詔也足以夀漢脈於幾絶足以扶漢鼎於既危足以關四百年理亂之數非小也用三足以字文勢沛然班孟堅不載之帝紀而載之西域傳何意耶設問其亦獨有取於是詔又解答故表而出之於編末不欲混於其中耶此是題外生意故不得不挑斡説出來雖然帝之號令文章固然矣固是如此然愚竊意帝平日之文皆出於司馬相如枚臯諸公之筆帝之制詔多出二子之手雕琢鴻藻斫喪元氣多矣此二子豈知真號令文章晚年諸公雕落殆盡謂二公已亡輪臺一詔其亦出於帝由衷之語乎謂輪臺一詔出於帝之親筆左傳信不由衷質無益也是時帝之更閲多而懲艾深又應前語其胸中之天亦頗定矣帝至晚年必有定見向使汲董諸儒尚在汲黯董仲舒此二子乃武帝之直臣復以帝王仁義道德之味忠厚純懿之風應原題下數語有收拾涵濡其德性啓沃其善心書説命啓乃心沃朕心則帝之所得又髙矣若有汲董諸儒以輔帝則其所得不止如此何止乎號令文章之可觀是充廣一步説此篇是祖前篇之意孝宣於黃龍初年務行寬大武帝於輪臺一詔務在愛民皆到晚年方下此詔故此篇主意謂更閲久而真見定懲艾深而實意形是襲前篇志氣定而本心見世故熟而至理明語步驟略相似學者可以觸類而長就題發明格此篇與陳預孟荀名世之士論同意天下之善士如何林士愷出處孟子萬章下孟子謂萬章曰一鄉之善士斯友一鄉之善士一國之善士斯友一國之善士天下之善士斯友天下之善士立説古之人無非士亦無有不善未嘗有善士之名至於天下以此名歸之君子則世變之下可知矣君子固不願有是名也考官批云就題立説反覆推明最得此題之體名非君子之所樂聞也善士之名本非君子所尚舉天下之名而歸之君子斡得天下之善士意出可以觀世變矣世變不如古方有天下善士之名人性皆善也從善字發明天下之人無有不善孟子云人無有不善又説天下之善士則善之名何從而起哉古者本無天下善士之名古之天下孰非士也古者天下無非士天下之士又孰非善也士皆為善善士之名泯古者無善士之名而士有為善之實為士者但知強於為善故舉天下皆善士之歸也此言古人無一士不善未嘗有為善之名自三光五嶽之氣分而世道日以裂説後世人才始不古矣自此以下引入世變不古而後人以善士之名歸之君子人而以士名已足以為凡民之秀説士字况以士之善者而又名於天下又斡得天下之善字出此固聖賢之所喜談而樂道者此句指孟子説天下之善士然為士者但知強於為善而已應上有為善之實初亦不願其有是名也應名非君子之所樂聞也名之所歸君子可以觀世變矣應破題語天下之善士如何孟子蓋激於世變云耳又應破題世變字善士之名何始乎挈善士字説原題古無是名也古無善士之名其殆起於世變乎應世變字泰和盛時渾厚已鑿此説古者盛時周揚泰和其在唐虞成乎多士一篇乃為遷頑而作書多士成周既成遷殷頑民周公以王命誥作多士夫民之頑也而周人猶以多士目之此是文字點化處所謂死事作活使則古人胚腪未鑿之天可見古者氣象渾厚一時天下誰非善士應冒頭古之天下孰非士也天下之士又孰非善也意故唐虞之俗比屋可封後漢楊終傳堯舜之民比屋可封文武之民無非好善孟子告子上文武興則民好善見得皆是善士天下無士之名而士有為善之實應冒頭善士之名泯而士有為善之實意耕莘天民樂道畎畝其天下之先覺也而未聞以善士名孟子伊尹耕于有莘之野而樂堯舜之道云云曰豫天民之先覺也應善士之名泯意版築之夫沃心三篇有後世老師宿儒所不能道亦天下之良弼也而未聞以善士名書説命説築傅巖之野惟肖爰立作相命之曰啓乃心沃朕心云云夢帝賚豫良弼應老師宿儒所不能道是用前輩語善士之名泯意想其帝王隆盛之天下古者盛時家稷契而人臯陶揚雄解嘲家家自以為稷契人人自以為臯陶天下皆士也士皆善也何以名為哉應冒頭援題古無善士之名數語名之盛者實之衰也後世有善士之名則無善士之實夫士以善名則必有所謂不善者矣説得透徹蓋自戰國以來此説世變不如古意庸瑣齷齪之中庸常也瑣細也齷齪乃不善之徒風聲氣習薾然日索世變愈趨愈下辨士以縱橫騁蘇秦張儀之徒智士以譎詐鳴如公孫衍淳于髠之徒武士以戰鬬逞如孫武吳起之徒題以辨士智士武士反應本士字士之能以善名者幾何人哉士之善者不多見此吾孟子所以重世變之感應世變字引入題而善士之名所由以起也所以有善士之説故嘗因是而論天下之人性未嘗不善見孟子云云水無有不下人心之天理未嘗不同只是人性無不善意是何生於唐虞三代之時無非士也應天下之人孰非士也求士之名且不可得而見况謂之善乎應善士之名泯意况又謂之天下之善士乎字字挑斡得出生於春秋戰國之世應世變不如古求士之善者且不可得而見况得為天下之善士乎應冒頭人而以士名已足為凡民之秀况以士之善者名於天下數語得為天下之善士亦足為世道喜也應聖賢喜談樂道語總題下古者後世兩段説話然世變無窮而人心之善則未嘗一日泯也故孟子之道性善則其言必稱堯舜滕文公上孟子道性善言必稱堯舜日遷善而不自知則必曰王者之民盡心上王者之民皥皥如也日遷善而不知為之者如曰天下之人莫不有善告子下好善優於天下四海之內皆將告之以善也又曰人無有不善告子上人無有不善水無有不下連舉孟子言數個善字來作正講是皆於世變有激而言耳應世變字嗚呼魯仲連天下之士也通鑑子順對魏惠王曰魯仲連天下士也諸葛孔明天下之奇才也通鑑諸葛亮卒司馬懿按行其營壘歎曰天下奇才也用兩個天下字為證甚切古之人才如彼其多古者士無不善後之人才如是其少後世士之善者罕見世變蓋可知矣説得世變意出大抵世道日趨士風瀾倒應世變愈下意為善者不一二而不善者常千百應上人才如此其少鄉原善之賊也為天下之毒論語子曰鄉原德之賊也天下之善士果誰歟見得天下善士少楊墨善之蠧也為天下之穽孟子楊氏為我是無君也墨氏兼愛是無父也天下之善士又誰歟見得天下善士少士之挾智數騁才辨率天下以禍仁義如儀秦髠衍之流者滔滔皆是也告子曰云云率天下之人而禍仁義者必子之言夫者蘇秦張儀淳于髠公孫衍皆戰國智辨士語滔滔皆是也獨一善人如樂正子孟子弟子固未至為天下之善士略抑之然好善優於天下却揚之孟孟子告子下魯使樂正子為政子曰其為人好善好善優於天下而况魯國乎使其自可欲之善而充之以至於不可知之神則亦天下一善士也孟盡心下孟子曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神樂正子二之中四之下也嗚呼善人吾不得而見之得見有恆者斯可矣見論語天下之善士吾孟子不得而見之僅得善人如樂正子者學論語句法固可為世變憂亦足為世道喜應孟子激於世變意吾孟子安得不豫之耶繳盡本意或曰天下之善士今不古耳孟子乃以天下之善士欲友天下之善士者豈欺我哉引本文吁是豈知孟子者也答上問孟子以師道自任達則兼善天下窮則獨善其身盡心上古之人得志澤加於民不得志修身見於世窮則獨善其身逹則兼善天下嘗曰當今之世捨我其誰公孫丑下夫天未欲平治天下也如欲平治天下云云是天下之善士獨吾孟子一人而已惟孟子可以當之然欲友天下之善士而天下卒無可友者其乃以師道自任歟用孟子以師道自任語故曰師道立則善人多用周子通書中語云云就題發明格此篇與林士愷天下之善士論同意孟荀名世之士陳預出處荀子楊倞序孟軻闡其前荀卿振其後觀其立言指事根極理要撥亂興理真名世之士王者之師其書所以羽翼六經增光孔氏周公制作之仲尼祖述之荀孟贊成之立説君子以道自任本非求名於當世然衛道之功不可泯沒論者始以名歸之孟荀雖能辭其名於當世而不能辭其名於後世者以是非之論久而後定故也孟荀何容心焉考官批云議論正當文字活熟尤利初學名非君子之所尚也孟子荀子未嘗求名是學前篇破法而天下後世或以名歸之者後人自以名歸之歸重名字主意是必論其世也尚論其世字見孟子曉剔出世字分夫舉世之所尚者名挈出名字辨難而君子則無所尚乎此名非君子之所尚豈其獨求以異於人哉結上生下蓋君子之所自任者知有道而已孟荀以道自任是主意道術分裂之際戰國之時異端並起出而身當斯責説孟荀衛道意凡所以闡微續絶開闈吾道之微接續吾道之絶扶持其正而排斥其偏正是吾道偏是異端在當世且不計其功而於名乎何計斡得世字響謂孟荀且不求功於當時豈肯求名於後世然君子之為斯道也歸主意道字雖能辭其名於當世而或不能辭其名於後世説得名世字出何則虛設問是非莫公乎人心答久是非之論而後定而名之所由生也孟荀因此得名異端之與吾道暗引孟荀衛道意既久而論定後世自有公論則卓然衛道之功皆孟荀之功固萬世之所必推崇有不謀而同辭者不能辭其名於後世又烏得以遁是名哉喝出名字文此語本韓故自當世而觀君子剔出世字名字分曉則君子之於道固無所事於名主意名雖能辭其於當世由後世而論當世久而論定則當世之名不容不歸之君子者不能辭其名於後世公也而非私也以名歸孟荀乃公論非私論也孟荀名世之士是特以孟荀之世論應天下後世或以名歸之而猶未足以見孟荀之心也應名非君子之所尚請因楊倞之序而申其説引本文嘗謂天下之至不容泯者名也挈出名字議論至不可得而私者亦名也名不可得而私應公也非私也名之在當世應冒頭故自當世而觀君子猶有出於一時議論之偏此是論未定之時而名之在後世應冒頭由後世而論當世則終不能掩萬世是非之定應冒頭是非莫公乎人心久而論定意漢之世非無儒也證世字由後世而論應後世字則漢朝之儒惟賈生而已前漢劉歆傳云云賈生名誼唐之世非無文也證世字由後世而論應後世字則唐文之一出於正惟韓愈而已唐文藝序文章三變大厯正元間韓愈倡之排逐百家粹然為一王法夫誼以儒名愈以文名證名字猶不能不以後世而論當世應冒頭意則衛道如孟荀獨不尚論其世乎應冒頭卓然衛道之功固萬世之所必推崇意况道無近功提起道字君子之衛道且不計其功應冒頭語前董仲舒䇿明其道不計其功功之不計而又何計乎他日之名應冒頭在當世且不計其功而於名乎何計意方其義矛節介出嬰邪説之鋒禮防教範力遏人欲之流此四句形容孟荀闢異端意作四六句非論體揚子防範見禮教之至艱難齟齬孟荀當戰國之時不合於當世者甚矣非斥異端與當世不合况欲取必於來世哉難然君子雖未始取必於來世應冒頭名非君子之所尚而來世有不容不取正於當世應冒頭由後世而論當世是必名之真偽久而自定應是非莫公乎人心久而論定所謂必有後世好之子雲前漢揚雄傳其書後世好之者以為過於五經而非可欺以當世盛名之王衍者也晉王衍傳聲名日盛傾動當世觀此則孟荀之所以稱名世者思過半矣正入孟荀且當杏壇迹熄莊子孔子休坐乎杏壇之上木鐸聲沉語天將以夫子為木鐸干時惑衆之徒孟子以干時惑衆者非一紛紛藉藉於當時者名號何可勝數此是異端之徒在軻之世孟子楊墨不論也楊朱墨翟孟子天下之人不歸楊則歸墨管晏以其君伯而公孫丑許之孟公孫丑管仲以其君伯晏子以其君顯公孫衍張儀以口舌自肆而景春慕之孟景春曰公孫衍張儀豈不誠大丈夫哉一怒而諸侯懼安居而天下息是世知有管晏知有儀衍又知有楊墨而不知有軻也説當世之人只知異端之徒不知孟子之名在卿之世荀子孫武吳起不道也荀子孫吳變詐殺人盈城縱情性安恣睢囂牟持之而有故荀非十二子其持之有故其言之成理足以欺惑愚衆是它囂魏牟也上功用大儉約翟鈃言之而成理同上上功用大儉約足以欺惑愚衆是墨翟宋鈃也是世知有囂牟知有翟鈃又知有孫吳而不知有卿也説當世之人只知異端之徒不知荀子之名使孟荀而果有名世之心也挈名世字反説方且區區然求與世競必欲其名之我歸如此是有心求名則此亦一是非彼亦一是非荀子齊物論全句應冒頭是非字名固未知其所歸也反至此住説得名字響而孟荀之心則不然也轉歸主意然孟荀固未嘗有心乎徇名應能辭其名於當世而千載之下名非孟荀則不歸應不能辭其名於後世是何也虛設問道者公天下之物提起道字是主意而萬世之所共由也語何莫由斯道也孟荀翼衛之功以身當其難孟荀出來衛道而使萬世得以享共由之福日用飲食而不知焉應上萬世字如見得衛道有功此是則合世變以觀其時應破題必論其世意本人心以公其豫應破題天下後世或以名歸之諸子百家之視之也此是異端之徒譬之日月出矣而爝火不熄以日月比孟荀以爝火比異端時雨降矣而猶浸灌以時雨比孟荀以浸灌比異端不亦微乎淺哉以譬用功故自今觀之更演足上意以異端闢楊墨而後世信其為異端結講中文聖孟子能言距楊墨者人之徒也以權術斥孫吳而後世信其為權術見前注以功烈之卑陋管晏孟子見上注管仲晏子云云行乎國政如彼其久也功烈如彼其卑也以妾婦之道鄙儀衍孟子見上注公孫衍張儀云云以順為正者妾婦之道也以矞宇嵬瑣梟亂天下之説非囂牟翟鈃輩見前注詳見荀子非十二子篇而後世又莫不以其所排攘而鄙狹者為可傳可信連用二後世字見得後世自以其名歸孟荀意出亦惟非之不能以勝是異端之非不能勝吾道之是邪之不能以干正異端之邪不能勝吾道之正一時之淫詖不能以奪萬世之正大而已異端之詖淫不能奪吾道之正大兹固孟荀名世之稱不必在當世而在後世也歟繳結講中意雖然孟荀固均為名世者而猶不可以無辨也末意欲揚孟子而抑荀子當今之世舍我其誰軻之自任者如此孟子如欲平治天下云云其間名世之言猶退然示不敢自居之意同上注充虞路問曰云云曰彼一時也此一時也五百年必有王者興其間必有名世者卿之非十二子舉一世以為盡出已下至併與孟子而誣之見前注好名之心於是非軻比矣荀子好名孟子無容心於名名世之論序卿書者合孟子而並稱本題楊倞序其將借孟以重荀歟抑將托孟以形荀歟且兩疑説隱然見孟子為優荀子為劣意出識者其必能辨當如此辨别兩篇皆以名非君子所尚為主意前篇謂古無善士之名至世變不古方有此名此篇則謂君子不求名於當時而後世自以名歸之意各有指機軸略同可並看順題發明格此篇與黃鏞湯文孔子聞知論同意見知聞知如何黃萬里出處孟子盡心下孟子曰由堯舜至於湯五百有餘歲若禹臯陶則見而知之若湯則聞而知之由湯至於文王五百有餘嵗若伊尹萊朱則見而知之若文王則聞而知之由文王至於孔子五百有餘嵗若太公望散宜生則見而知之若孔子則聞而知之立説聖人之道無一日不在天下聖人而存是道固與之俱存聖人而往是道不與之而俱往有能得聖人於所見者固足以知是道得聖人於所聞者亦足以知是道若以迹而觀則所聞不逮所見以道而論則見亦道也聞亦道也孰為知孰為不知耶考官批云理學玲瓏地位開濶説見而知者此道聞而知者亦此道真足以契數聖人之心於千百載之上以道觀聖人以道字為主意則無時而不在也程子云道無在無不在見而知者此道聞而知者亦此道蓋是道所在與天地並説得道字濶聖人而存是道固與之而俱存若禹臯陶則親見堯舜於一時是見而知之是道固與之俱存餘可以類推聖人而往是道豈與之而俱往若湯去堯舜已五百有餘嵗是聞而知之是道何嘗與堯舜而俱往夫惟真有見乎此真有見乎此亦見亦知此道聞知此道則世有古今而道何有於古今時有先後而道何有於先後説聖人之道無時而不在方其得聖人於所見露出題上見字固能知是道於口傳面命之間如禹臯之於堯舜是見而知之及其得聖人於所聞露出題上聞字尤能知是道於神交意會之表如湯之於堯舜是聞而知之一理既融萬境俱徹語録一理㯙萬理融回視前日見聖人者非見聖人也見道也見者此道聞聖人者非聞聖人也聞道也聞者亦此道吁吾是以知道者未嘗一日不在主意應道無時而不在意而聖人者特道之寄也寄字響昔者由堯舜而至湯文歷敘本文往往迭出而為吾道宗主道字是主意自其見之當時者知之聞之後世者亦知之説出本意以迹而觀則所聞不能以逮所見開如以道言則見亦道也聞亦道也又合果孰為知孰為不知耶説理透徹見知聞知如何請廣孟子之論甚矣天下不可一日無聖人尤不可以一日無道應道無時而不在意然而世道不常泰聖人不常出應聖人而往意而是道雖存幾於無所附麗應是道豈與之而俱往意必有聖人者作而道之統始傳應聖人而存是道與之而俱存意然則是道也者為千萬載之公器説得道字開濶而前聖後聖特時出而管之矣管字好苟幸而遇聖人耶幸不幸二字學韓原道文其亦幸而出於三代之後云云其亦不幸而不出於三代之前則見於面盎於背道無一日而不在孟子見於面盎於背施於四體不幸而不遇聖人耶則誦其詩讀其書道亦無一日而不存孟子誦其詩讀其書不知其人可乎應道無時而不在意誠能心與之融動與之契則隔形骸而無爾汝閲嵗月而猶旦暮者矣於一時固可見而知之雖五百嵗亦可聞而知之或者則曰難想其顏色聞知孰若親聆其謦咳不如見知吾聞見而知之者未聞聞而知之者且難是不然解終身疲道路者或不盡知其險要比見知者而指山畫谷者乃得於不出户之儒比聞知者老子不出户而知天下把手論交情者或不盡曉其辭色比見知者而洞見肺腑者乃得於未傾蓋之士比聞知者如前漢䇿傾蓋故天下固有不見之知者矣見知與聞知則一是故見而知則臼季見冀缺於田畝之間左傳僖三十三年初臼季遇冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也云云君請用之聞而知則孔子交周公於夢寐之中語述而子曰吾不復夢見周公是果可以耳目拘哉耳聞目見一而已知乎此則數君子之見知可以道論道字是主意而不可以迹論也明矣旋引入講道者何挈起道字設問堯舜之精一書禹謨人心惟危道心惟微惟精惟一允執厥中湯之建中書仲虺之誥建中于民文王之純亦不已中庸文王之德之純純亦不已皆是物也皆此道也然堯舜五百年之後而有湯湯五百年之後而有文王並見題注是何天之生聖人不數數然哉五百有餘嵗方得一個聖人出自堯舜五百年而不生應聖人而往意堯舜之道未嘗一日不昭明於天地之間應是道豈與之而俱往意湯文五百年而不出應聖人而往意湯文之道未嘗一日不著見於日用之際應是道豈與之而俱往意聖人固不必其常在而道則未嘗不在也應道無時而不在意道在則聖人亦在也一句總上兩腳是學歐陽諫臣論言行道亦行也句法豈必見聖人者為知見者固足以知是道而聞聖人者為不知耶聞者亦足以知是道譬夫帆滄海者知海比見知者處窮谷者未必知比聞知者苟知海者水也則海在吾目中矣苟能知海則見亦知聞亦知之廬岱嶽者知山比見知者居汙澤者未必知比聞知者苟知山者石也則山在吾掌上矣苟能知山則見亦知聞亦知之親夫聖人者知聖人此見知者後乎聖人者未必知此聞知者苟知聖人者道也則聖人見於羮牆矣苟能知道則見亦知之聞亦知之羮後漢李固傳舜食則見堯於坐則見堯於牆海者水之深山者石之富聖人者道之會也以三句總上三腳文有法度見者是道聞者亦是道見者是聖人聞者亦是聖人只以見聞二字演説見者足以致知而聞者亦足以致其知又説知字格大學致知在物見而知耶則堯舜之時有禹臯湯之時有伊尹文王之時有太公宜生並見題注聞而知耶則堯舜之後有湯湯之後有文王文王之後有孔子並見題注非絶倫之聖聖謂堯舜湯文王孔子韓文絶類離倫優入聖域則命世之賢賢謂臯陶伊尹太公宜生也孟序命世亞聖之大才者莫非自聞見中來也歸在聞見上來嗟夫都俞告語禹親傳諸堯舜也見堯典舜典大禹臯陶謨其知之宜也而去鳴條之師幾何年書湯誓遂與桀戰于鳴條之野一德咸有尹親相乎湯也書惟尹躬暨湯咸有一德其知之亦宜也而去西土之王幾何世書泰誓惟我文考云云顯于西土至於內而文明外而柔順則太公宜生之徒相與周旋久矣易明夷內文明而外柔順文王以之又見題注其知之者亦宜也以上説見知者而時移嵗改聲迹泯然於洙泗之濵孔子設教於洙泗之上自非相知以道道字是主意則寥寥五百載何以一聞而亦知耶此是聞知者大抵不待生而存不隨死而亡者聖人之所以為聖人也兩句出蘇東坡韓愈廟碑取之以隨足用之而不竭者道之所以為道也東坡赤壁賦取之無禁用之不竭吾誠以見而知之歟則見其參於前論語立則見其參於前也否則視之而不見矣大學心不在焉視而不見吾誠以聞而知之歟則聞一以知十語回也聞一以知十否則言諄諄而聽藐藐矣詩誨爾諄諄聽我藐藐論而至是則數君子之見知聞知果道也非迹也道迹二字收拾本意盡雖然文王之後有孔子矣兩楹夢斷記檀弓夫子曰豫疇昔之夜夢坐奠於兩楹之間豫周人也將不起乎把吾道之旌麾傳斯文之正印者非吾孟子而誰韓原道孔子傳之孟軻中庸之妙親得於子思之傳孟子受業於子思大成之藴慨然於願學之際孟子乃所願則學孔子也其知聖人也至矣視夫四非之語而請事之語有真見論語子曰非禮勿視非禮勿聽非禮勿言非禮勿動云云回雖不敏請事斯語矣一貫之授而一唯之外無費辭者異世而同一知也論語子曰吾道一以貫之曽子曰唯吾故曰若顏曽則見而知之也若孟子則聞而知之歟亦是就出處説孟子自任意順題發明格此篇與黃萬里見知聞知論同意湯文孔子聞知如何黃鏞出處孟子盡心下詳見前篇立説是道之用散於天下有耳者莫不聞有聞者莫不知而是道之體微妙難見必有聖人者相繼而出而後可以傳其不傳之妙是則聞者衆人之所同知者聖人之所獨此湯文孔子所以為聖人而天下不能皆湯文孔子也考官楊棟批學粹文婉皆自講貫中來讀之終篇猶有餘味又批三聖人之所以知堯舜者知在聞先也如中庸説知天也知人也苟知天矣一聞天道即知天之所以為天苟知人矣一聞人道即知聖人之所以為聖人生知學知困知及其知之一也到此地位聞斯知矣吾道有不可傳之妙謂道之體微妙於其不可傳者而獨得其傳焉惟聖人能知是道之妙故可以傳其不傳之妙非聖人不能也湯聖人指文孔子夫道之在天下挈起道字説有明晦無絶續有古今無存亡是道無一日不在於天下人之由乎是道者且開説孰不可以與於是道之傳聞者衆人之所同可傳矣粘上傳字則有耳者莫不聞有聞者莫不知説衆人皆可以聞而知而何聖人獨得其傳哉難蓋道之大原出乎天見前漢董仲舒䇿云而其用散於事物之間先説道之用是其流行著見於天下者是道無一日不在於天下有此心則具此知孰不可得而聞也有耳者莫不聞有聞者莫不知從人之由乎是道者起難至此然其體之微妙却説道之體難見不惟不可以意見知非真知而亦不可以口耳聞非真聞况可得而傳之乎非真聞知何以傳其不傳之妙必有聖人者為之先指堯舜而後有以得乎斯道之原道之原自堯舜始又必有聖人者繼之於其後指湯文孔子乃能聞而知之以傳其不可傳之妙照主意是則聞者衆人之所同而知者聖人之所獨説盡主意此湯文孔子之所以為聖人而天下不能皆湯文孔子也語圓意盡湯文孔子聞知如何請得而繹其説斯道也何道也只就道字敘述起應冒頭承題道韓原云云天下所共由之謂道也語雍也誰能出不由户何莫由斯道也道之所以得名既曰天下之所共由粘綴上文則亦天下之所共聞露出聞字既曰天下之所共聞粘聞字説則亦天下之所共知也應冒頭有聞者莫不知意何聖人獨聞而獨知之歟應冒頭而何聖人獨得其傳哉意吁道費而隱中庸君子之道費而隱費者用之廣而隱者體之微朱文公釋上文云云應冒頭用與體字用之廣者衆人之所共聞應冒頭其用散於事物之間孰不可得而聞也意然體之微不離乎用之著者應冒頭其體之微妙意皆是文公議論非聖人其誰能知之惟聖人則知是道之體何謂用再挈用字説所當然而然者道之用也此是道之用何謂體再挈體字説所以然而然者道之體也考官批云用所以然三字無所見者不能道云如朱文公釋一隂一陽之謂道所以一隂一陽者道也吾道之用散於天下又説道之用其教仁義禮智其端惻隱羞惡辭遜是非孟子惻隱之心仁之端也羞惡之心義之端也辭遜之心禮之端也是非之心智之端也其倫君臣父子兄弟夫婦此段文法自韓文原道中來此其當然之用皆是道當然而然之用雖匹夫之愚可以與聞而與知之也應冒頭有耳者莫不聞有聞者莫不知意可中庸匹夫之愚以與知焉而其所以然之體演所以然三字則非可以苟聞而苟知之也是道之體微妙難見仁之所以惻隱義之所以羞惡禮智之所以辭遜而是非注見上與夫君臣之所以敬父子之所以親兄弟夫婦之所以有序而有别並見孟子辰此段文法自韓愈送文暢師序中來日月星之所以行天地之所以著鬼神之所以幽必有真聞而後有真知也從非苟聞苟知過真聞真知上來文有血脈昔者談虎傷人者聞者莫不懼也比聞知者而真知虎之可畏者神色獨異於衆比真知者是其所聞雖同而懼不懼之有異者以其知之有真有不真也譬喻主意分曉然則欲觀湯文孔子之所以獨得乎聞知之妙者其以是求之歟引入大講且自堯舜五百嵗而後有湯湯五百嵗而後有文王文王五百嵗而後有孔子敘出處本文天之生聖人如是其不數也五百年方得個聖人出故曰不數世數之相去如是其久也湯去堯舜五百年文王去湯亦五百年孔子去文王亦五百年故曰如是其久固不幸而無湯文孔子見而知之以親得乎斯道之傳此是見知猶幸而有湯文孔子聞而知之以獨得其不可傳之妙此是聞知不亦是學韓原道文幸幸三字然其所謂聞者果何所聞其所謂知者果何所知歟辨聞知二字從此發難將求道於無在歟則微眇芒忽不可以執而傳設第一難抑求道於無不在歟語録道無在無不在則流散無統不可以泛而傳設第二難又否則求之言語文字之間歟則堯之命舜自允執厥中之外窅無聞焉論語堯曰咨爾舜天之厯數在爾躬允執其中舜之命禹雖益之以危微精一之三言書大禹謨人心惟危道心惟微惟精惟一允執厥中解益以三言之語乃是朱文公中庸議論而所可聞者僅止於是吾道亦僅足於是歟設第三難是數語者書之於簡册傳之於萬世天下之人蓋無不聞而無不知也應冒頭有耳者莫不聞有聞者莫不知之語何獨於湯能聞而知之歟何獨於湯而得其不可傳之妙歟應冒頭何聖人獨得其傳之語從然其所謂聞起一直難至此毋亦堯舜之道其所當然之用雖天下之所共聞應題下當然而然者道之用衆人所共聞之語而其所以然之體乃湯之所獨知歟應題下所以然而然者道之體非聖人其誰知之之語至於文王之於湯孔子之於文王亦猶湯之於堯舜也自湯過文王孔子上來此是省文法最有力量湯不能以建中則湯為不知堯舜書仲虺之誥王懋昭大德建中于民文王而不能順則則文王為不知湯詩皇矣不識不知順帝之則孔子而不一以貫之則孔子為不知文王語里仁子曰參乎吾道一以貫之今而曰建中也順則也一以貫之也總上三腳文此其所以為湯文孔子聞知之妙歟結上文古往今來世代遼絶形容五百嵗意先聖後聖心若符節孟離婁下舜生於諸馮云云文王生於岐周云云地之相去也千有餘里世之相後也千有餘嵗得志行乎中國若合符節先聖後聖其揆一也其所聞者豈影響之聞聞皆真聞而所知者豈形似之知乎知皆真知子貢謂性與天道不可得聞論語子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也必如是而後謂之真聞以子貢不可得聞字證本題聞字子思謂人莫不飲食鮮能知味見中庸必如是而後謂之真知以子思鮮知字證本題知字彼道聽而塗説者豈真聞語陽貨道聽而塗説德之棄也而行不著習不察者豈真知歟孟子行矣而不著習矣而不察世之欲知聖人之道者當於道體之所以然者而求之應題下語然後可以得其不可傳之妙也應冒頭傳其不可傳之語不然董子之言三聖則曰相授守一道前漢董仲舒䇿云云韓子之論堯舜至孟軻亦曰以是而相傳韓原道堯以是傳之舜舜以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻其所授者果何説其所傳者果何事哉反繳有力孟子之言又曰由孔子至于今其致意尤深焉題注下文由孔子而來至於今百有餘嵗去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾所謂然而無有乎爾注見上雖若託之不居而其自任之實可見朱文公集注云孟子言孔子至今時未逺鄒魯相去又近然而已無有見而知之者矣則五百嵗之後又豈復有聞而知之者乎所謂則亦無有乎爾注見上雖若歎其將絶而所以啓夫萬世無窮之傳者又未嘗不在斯也朱文公集注云愚按此言雖若不敢自謂已得其傳而憂後學遂失其傳然乃所以自見其有不得辭者而又以見夫天理民彛不容泯滅百世之下必將有神會而心得之者耳記孟子之言者以是終篇焉豈無見歟朱文公云故於篇終歷述羣聖之統而終之以此所以明其傳之有在而又以俟後聖於無窮也魯論之作堯曰一章歷述乎堯舜禹湯文武相傳之道其意亦猶是也見語堯曰第二十愚故表而出之前篇以道無時而不在為主意此篇以聖人獨傳吾道不傳之妙為主意大抵都歸著於真知上體製略同步驟相似可以參看駁難本題格此篇與陳合堯舜一天下論同意博施濟衆何如蔡岸出處論語雍也子貢曰如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸立説施而至於博濟而周乎衆此其為理甚大為事甚難雖聖人有所不能與也是就堯舜其猶病諸句立意批云深得論體語此篇是要看他間字回斡冷發明最有法度天下之理有不可以直遂其所期者謂施未易博衆未易濟雖聖人有所不能與也謂堯舜其猶病諸夫使天下均其愛而無有一物失所之憂説施而至於博濟而周乎衆苟不至於汨喪夫惻隱之實者皆且有是心也孟子惻隱之心人皆有之而况於聖人之所以為心轉歸堯舜上固無一物之不體者乎博施濟衆乃堯舜之本心然而合本轉歸意能有是心而不能遂雖有博施濟衆之心而不能以直遂不能無是願也而卒不能以自慰也雖有博施濟衆之願而不能以自慰是何也難理固有所不可以理言之天下之大民物之衆施不可以博衆不可以濟力固有所不及以力言之施未易博衆未易濟聖人之於人亦類也見孟子彼獨且奈何哉果欲博施濟衆雖聖人亦末如之何也已矣嗟夫語大而至於聖人亦極矣如堯舜大聖人若可以盡此理中庸語大天下莫能載而既若是然也堯舜且不能盡况他人乎則夫子貢之在孔門引上生下宜必有察此者乎下得察字好入題全不覺今其言曰博施濟衆何如舉出處本文吾不知其如之何而博施濟衆也下如之何三字大有力而若是易易言之也謂施未易博衆未易濟也夫博施濟衆我固不敢知曰是非聖人之所願也謂博施濟衆非聖人之所願固不可而天下之理有不可以終焉者也則我亦不敢知曰是固聖人之所能也然天下之理無有終窮謂施而至於博濟而周乎衆為聖人之能亦不可蓋昔者聖人之作易也用易為證水在火上其卦為既濟易既濟卦水在火上既濟既之為言盡也形容博施意其在彖曰既濟亨形容濟衆意小者亨也以上二句既濟卦本文夫濟焉而至於盡施可謂博矣亨焉而極於天下之至小濟可謂衆矣博施濟衆儻不在兹乎以易既濟卦形容本題意甚切且老成雖然如是而遂可也若易至既濟卦而終則可易於是乎且終焉疑若終之以既濟奈何哉其不可也不終之以既濟而終之以未濟而猶有未濟者繼焉易終之以未濟則知天卞之理果難盡也則夫天下之理宏闊長逺形容博字衆字千嵗日至殆未始有底定之期矣孟千嵗之日至可坐而致也故曰物不可窮也故受之以未濟終焉應天下之理有不可以終窮語見易繫辭而子貢之見則有未足以詣此者也言子貢未知堯舜之本心博施濟衆率爾而有問焉引本文然且發其端於如有之一語若將有以及見乎此者也本文如有博施於民而能濟衆何如卜其疑於何如之一決若將有所未足乎此者也見上字演如有何如四甚分曉夫不計其所窮而覬幸斯人之或可以及見彼固不足以察天下不可終窮之理再演如有二字意而猶不能自安於博施濟衆之可以言仁也則是以仁為大而以博施濟衆為小矣若施至於博濟周乎衆非止於仁乃聖人之極功而子貢且以何如問夫子者疑博施濟衆為未足以盡仁嗟夫施矣而誠博也濟矣而誠足以及衆也則將聖是謂而奚仁之足名演本文分曉正惟天下之理有不可以至此者爾應天下之理有不可以終窮語天地之大人猶有憾見中庸全句日月有明能使容光之必照而不能加之於其所不容孟子日月有明容光必照焉謂天地之大日月之明且有未盡善處况於人乎博施濟衆宜未可以易易言之也應冒頭語舟車所至見中庸夫固若是其廣且逺也形容博字而况乎其所不至也天下之博如此吾之施何以極其博生齒之數見周禮夫固若是其繁且夥也形容衆字而况乎其所不及計也民物之衆如此吾之濟何以周乎衆賜之所謂博施濟衆誠以為能窮其所不至而周其所不及計者耶謂子貢之見如此此其為理甚大而其為事甚難也應冒頭理固有所不可力固有所不及語河東之狹惠孟梁惠王曰河內凶則移其民於河東溱洧之淺功孟子産以其乘輿濟人於溱洧彼固不足以語此矣此施不足以言博此濟不足以言衆有如東漸而西被暨朔南而訖四海書禹貢東漸于海西被于流沙朔南暨聲教訖于四海若是者非賜之所謂博施而濟衆者歟引禹貢之事證子貢之言雖然則亦止於所被所漸所訖所暨而已矣若有未被未漸未訖未暨處則不可以言博不可以言衆過此以往未之或知也兩句全用經語域有所至則施有所窮施未易博數有所止則濟有所遺衆未易濟然則果且謂之博施乎哉果且謂之濟衆乎哉施分明未易博衆分明未易濟用果且謂三字是冷語發明嗚呼博施濟衆堯舜其猶病諸此夫子所以直子貢之問而無隱也引本出處分胡説出夫博施濟衆之猶病蓋與夫子之不居仁聖者同指孟昔者子貢問於夫子曰夫子聖矣乎孔子曰聖則吾不能云云仁且智夫子既聖矣夫聖孔子不居而或者不究顧以為聖人之謙辭焉亦已過矣他人則以此為聖人之謙言非也天下之理必有失也而後有復若無失則無復矣而謙之為言常生於驕之反驕者謙之反驕非所以為聖人也語泰伯如有周公之才之美使驕且吝其餘不足觀也已而奚謙焉正惟天下之理難盡故以不居言奚謙之有况夫聖人之立教常以實理示天下而豈樂為是之虛沖哉演盡上意非聖人所言皆實虗也故凡仁聖之不居以不居字證猶病意博施濟衆之猶病見題注皆所為天下之實理者也總結上文然則博施濟衆果非子貢之宜聞歟再難嗚呼解是固不可以終言也應前終字夫有博施濟衆之志而以其事可以直遂者非也應破題不可以直遂其所期語病其理之不可而卒安於所不為者亦非也又添一意謂博施濟衆固是難盡亦不可不勉盡惡乎然惡乎其不然惡乎可惡乎其不可惡乎然惡乎可謂博施濟衆之難盡惡乎不然惡乎不可謂博施濟衆之不容不盡亦為之而已矣當勉為之夫天地之帥吾其性也天地之塞吾其體也見張橫渠西銘癢疴疾痛舉切吾身程子語而一念之非仁殆且與天地不相似而相違矣程子語博施濟衆可不盡心焉應亦為之而已矣意雖然施不可不博也而卒不可以博施言也衆不可不濟也而卒不可以濟衆言也謂此理艱盡亦為之而已矣應前一句天施地生其益無方易益卦云云凡益之道與時偕行有孚惠心勿問元吉同上九五云云有孚惠我德是則易之所謂長裕而不設者也易繫辭益長裕而不設者也注云因物興務不虛設也夫子曰若聖與仁則吾豈敢抑為之不厭誨人不倦語述而云云則可謂云爾已矣應亦為之而已矣句嗚呼學者其尚勉之哉施不可博衆不可濟駁難本題格此篇與博施濟衆何如論同意堯舜一天下如何陳合出處荀子王制篇權者重之兵者徑之名聲者美之夫堯舜者一天下也不能加毫末於此矣立説謂天下之大風俗未易齊也堯舜雖欲一天下而天下終不能以盡如吾意者勢也勢有所不可一堯舜亦豈能強一之哉蓋有物之不齊物之情也二句故可以反難有博施濟衆堯舜其猶病諸二句可以為據考官批云立説異衆行文髙古如纍九層之臺一級髙一級老作也風俗之不齊謂天下之勢難一雖聖人不能為也主意能謂堯舜不以強一聖人豈忘天下者哉語老得前輩議論不能忘乎天下粘上句説來則其所以綱維世變總攝羣動綱維總攝四字形容一字必欲事事物物一統吾條理之中如此方是一而其心始得以自慰聖人之心本欲一天下是學前篇規模然天下之事則有所甚難者焉亦是學前篇理固有所不可力固有所不及之語民物如彼其衆也風俗如彼其異也天下之大如此何以一之句是學孟子功烈如彼其卑也法吾以一身出而任綱維總攝之責應承題四字異者使之同衆者使之合形容一字亦惟曰吾與斯世相安於無事而已聖人豈能強一之至於合之而不能以盡齊同之而不能以皆一風俗之不齊一之難如此則聖人且奈何哉亦學前篇彼獨且奈何哉意吁此非聖人之意也勢也勢字有眼目聖人本心非不欲一之其勢不可以強一也是學栁文封建論句法昔者堯舜之治天下入題從容自在蓋未始不竭其意之所欲就應上意字而常病於其勢之所不能應上勢字荀卿子處世變之窮思古治之不復見舉本出處方以為聖人能一天下而天下威權之重聲名之美皆歸焉見題注夫聖人誠欲天下之定于一見孟子而風俗之不齊應破題語往往不能以直遂其所為者應有所甚難語則雖聖人亦末如之何耳應聖人且奈何哉語天下事固可易言哉此篇全是學蔡岸論步驟堯舜一天下如何孰能一之孟梁惠王上襄王曰云云對曰不嗜殺人者能一之堯舜其猶病諸論語博施濟衆云云風俗之不一也久矣應破題語將遂聽其自為紛紛乎且開説天生蒸民不自統理於是生聖人而宗主之自栁文封建論中來聖人而無意於天下則已此是格苟有意焉亦應冒頭意字則夫舟車所至日月所照中庸語微有一民一物之不就吾條理者聖人莫不欲畢力為之應冒頭必欲事事物物一就吾條理之中一段雖然轉勢則有所不可也應冒頭此非聖人意也勢也天之於物也以天比聖人亦不小了小大之不齊髙下之不等往往不得曲遂其齊一之功應冒頭事有甚難者意聖人之於天下又豈能一一皆遂其意之所欲為者天且不能一萬物聖人其能一天下乎思昔生民之初俗淳事簡至易一也古者天下可以一羲農氏作僅能少變其爪剛力強之習從原頭敘述來而黃帝繼之世變已詳矣黃帝之時已不及羲農之時畫州野理風土選東都賦分州王立市朝黃帝氏所以開帝功也彼其所以綱維世道總攝羣動者用心何如也應冒頭語當是時其不可一者且有梗化之蚩尤焉才有一箇蚩尤梗化天下已自難一了阪泉涿鹿之戰史記黃帝與炎帝戰于阪泉之野與蚩尤戰于涿鹿之野卒未能與天下相從於無事之域此言堯舜之前黃帝已自不能一天下吁此豈聖人之本意哉勢則有所不可也應冒頭及上面意字勢字蓋嘗即易言之前篇題下以易為證此篇亦以易為證乾上坤下天地開闢之時也屯難蒙童太古洪荒之世也蓋至於需而食師而征則黃帝堯舜世運之會用易乾坤屯蒙需師比七卦次帝引入堯舜來得誠齋議論而天下紛紛總總者至是而不容於不一也且説天下不容不一故聖人於易之師而繼之以比比者合異為一之象也以比字證一字天下之俗既不容於不一演上文惟其勢之所難應冒頭難字復不容以強一演主意堯舜於此將何如哉結盡原題引入大講今觀堯舜之治其所以一天下者至矣且説堯舜之一天下敷五品以為教而天下之分一書舜典帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬定九州以立賦而天下之制一書禹貢禹别九州云云任土作貢遜耕遜畔天下之定于一也史記舜耕歷山歷山之人皆遜畔不識不知天下之忘其為一也莊子堯逰康衢聞童謠曰不識不知順帝之則自此以上且説堯舜之一天下雖然如是而遂可也此以下乃言天下未易一亦是學前篇原題數語天下之大而人道之無終窮也天下之大如此何以一之亦應事有甚難勢有不可語博施濟衆夫子猶以為病焉語雍也云云則夫風俗之未齊固聖人之所憂應破題語其事勢之甚難雖聖人有所不能強亦應破題語堯嘗問於舜曰我欲致天下為之奈何事見莊子彼固自知其一天下之難也應前難字萬國之歡心得矣史記舜得萬國之歡心而吾有苖頑焉書益稷苗頑弗即工萬邦之黎民協矣書堯典協和萬邦黎民於變時雍而吾有宗膾胥敖焉莊子堯問於舜曰我欲伐宗膾胥也敖而不釋焉何也即三苖近而朝廷皆相遜矣前劉向傳濟濟相遜和之至也而吾復有不才之族雜處之共鯀焉左傳少皥氏有不才子天下之民謂之窮奇顓頊氏有不才子天下之民謂之檮杌注即共鯀也又劉向傳共鯀歡兜雜處堯朝凡此者皆所以為帝治之梗而堯舜之所未能一者有前三項之人梗化如此堯舜其何以一之議論愈出愈奇徂征之誓書禹謨有苖弗率汝徂征禹乃誓師不釋之問見上文注四罪之舉書舜典流共工放歡兜竄三苗殛鯀又孟子四罪而天下咸服往往不能以直遂其所期應前語而常有慊然不足之意天下事可易言哉是學前論冷語有味且夫物之不齊物之情也見孟子得有此二句方立一篇意天且不能一萬物聖人亦豈能一天下哉應題下語聖人之於天下亦惟使之各得其所而已應冒頭相安無事語如必曰人人而齊之物物而一之則非惟聖人之所不能應雖聖人不能為語亦理勢之所不可應勢有所不可語彼荀卿子謂堯舜之一天下不能加毫末於此敘本出處而復謂權兵之重聲名之美皆歸於聖人之身見題注是若以堯舜之事而望戰國者戰國之君何足以語此吁天下事正未可以易言也應前天下事可易言哉朱之不肖堯之子象之弗率舜之弟堯舜之化且不能加焉荀子堯舜不能化朱象則夫天下之大民物之衆風俗之不齊而理勢之所不可者應原題語聖人亦末如之何也應冒頭語故嘗謂天下之事合者離之同者異之應冒頭語有心於天下者乃所以忘天下也亦應冒頭語聖人出而任天下之責已非聖人之得已况欲合天下之大無一而不出於吾區畫之中則甚非聖人之意也説盡本意嗚呼聖人而有意於一天下則朱象久矣其堯舜也吁得上齋議論此篇意新語老全是倣蔡迂齋先生博施濟衆何如議論反覆熟味方見入題處雙關議論格智者行其所無事黃槐出處孟子離婁下孟子曰天下之言性也則故而已矣故者以利為本所惡於智者為其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣立説天下之事非智者孰能辨之惟處事以智則智因事而後行因其是非利害之定勢而處之以是非利害之當然是謂行其所無事苟或過於任智以處事則事因智而後起取天下自然之理而畀之膠膠擾擾之地適以啓多事之原蓋成天下之事者智也敗天下之事者亦智也惟處事以智不以智處事斯可矣批云渾然天成不費斧鑿千古不可磨滅之文論曰天下之事成於智者之善謀善謀者處事以智智因事而後行所以成而敗於智者之多事多事者過於任智以處事事因智而後起所以敗故成天下之事者智也正説而敗天下之事者亦智也反説天下之事照破題起句是非利害之未形四字是一篇字面之條目非有智者孰能辨之無智不可因其是非利害之定勢而處之以是非利害之當然因字是一篇之骨而此是處事以智智因事後行則君子於智何惡之有成於智者之善謀水暗用孟子本文如智者若禹之行無惡於智之語惟夫智者過而矜之過於用智則不可裂道以徇名任術以處事此是以智處事者取天下之所安行者而畀之膠膠擾擾之地與因其定勢處以安行者相反天下之事始有不循其理者矣便多事了不循其理而從事於是非利害之際應前面是非利害四字將以利之適以害之此是事因智而後起多事之原實基於此敗於智者之多事智暗用孟子所惡於者為其鑿也之語智者行其所無事宜有激於孟子之論也引本文天下果無事乎問難不為則不利不行則不成天下蓋未始無事也答上無事句謂未始無事也故以無事而去智則不足以立天下可成之功無事而去智則不可天下果有事乎再問難為者敗之執者失之天下蓋未始有事也答上有事句謂亦未始有事也故以有事而任智則適以啓天下紛紛之禍有事而任智亦不可子此段文法自栁厚封建論中來君子於此當何如哉總上文且疑結處事以智不以智處事如斯而已只此九字斷盡一篇之意處處事以智則為善謀以智事則為多事蓋處事以智則智因事而後行應冒頭因其是非利害之定勢而處之以是非利害之當然以智處事則事因智而後起應冒頭取天下之所安行者而畀之膠膠擾擾之地二者之決在於用智不用智二者之間則禍福之岐始分於此成於善謀則為福敗於多事則為禍世有激於用智以徼功應任智以處事者而不知古人處事蓋未始矜其智也古人只是處事以智頭矜字應冒過而矜之因民之飢而興耒耜之利因字應冒頭意易繫辭神農氏作斫木為耜揉木為耒耒耜之利以教天下蓋取諸益又韓原道飢然後為之食因民之寒而興蠶繅之利同上寒然後為之衣又孟子夫人蠶繅以為衣服民阻於險而後舟楫之事興繫辭刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸渙民狃於暴而後弧矢之事作同上弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌相欺也為之符璽以信之韓原道相欺也為之符璽斗斛以信之相奪也為之城池以守之同上相奪也為之城郭兵甲以守之因其是非利害之定勢而處之以是非利害之當然應冒頭二句使夫人之不阻於飢也耒耜之利不病於寒也蠶繅之利險而能通暴而能禦也舟楫弧矢之利則耒耜之事蠶繅之事舟楫之事弧矢之事總大講一段文聖人之智亦何事於此哉此是處事以智者講腹文法自韓退之原道中來聖人不期於去智處事以智亦不期於用智不以智處事因其事而有其智固未嘗以智而滋其事也應原題智因事而後行未嘗任智以啓天下紛紛之禍謀自此以上是成於智者之善奈何後世之人急於有功而志於趨事應用智徼功任術處事者權謀行而開行險之門指孫武吳起之權謀見下注縱橫興而開捭闔之術指蘇秦張儀之縱橫見下注變詐用而騁乘時之利指申不害商鞅之變詐見下注蘇張以口舌投其機應縱橫句説蘇秦説六國合從事秦張儀六國連橫攻秦孫吳以爪距媒其權應權謀句孫武以兵法見於吳王吳起好用兵以為魯將申鞅又以刻剝之術逞其欲應變詐句鞅申不害干韓昭侯以刑名之學商説秦孝公以富強之道取天下自然之理而紛之應冒頭取天下安行者而畀之膠膠擾擾之地期以處事反以敗事應冒頭將以利之適以害之是非智者之罪也過於智者之罪也應冒頭智者過而矜之天下之事再應破題句演説惟其無智也所以不成成於智者之善謀惟其過於智也所以求其成而敗敗於智者之多事世之説者有曰天下本無事庸人擾之耳史天下本無事庸人自擾之夫庸人何足以擾天下之事庸人平常碌碌之人安能擾亂天下事而擾天下之事者皆智者也本是庸人事今却斡歸智上來可謂用死事作活者是故處天下之事與其過於智寧過於庸庸人本不足道今謂過於智者尤不如過於庸者所以深言夫智者之生事也過於庸者雖不足以成其事亦不至於敗事不能成事亦不敗事尚無害於事過於智者一不成而萬有餘敗矣此其所以不如庸人之自事此以上是敗於智者多堯之水引本文事書堯典帝曰咨四嶽湯湯洪水方割蕩蕩懷山襄陵下民其咨有能俾又鯀治之同上僉曰於鯀哉禹又治之書鯀湮洪水汨陳其五行禹乃嗣興洪水一也以禹則治之以鯀則不治總上文辨論何也禹之治水以水治水智者之事也應因其是非利害之定勢而處之以是非利害之當然意鯀之治水以鯀治水智者之過也應取天下自然之理而紛之之意天下之事無異於水事之逆順與水何異智者之於事無異於治水因事而處之如因水之勢而治之否則反是知治天下之事以禹不以鯀則智者之説盡矣知禹則不任已見能因水之勢而治之如鯀則反是或若使今人作此論則必以禹鯀治水之事用於原題用於大講此篇直留此事到結尾方用方見大筆力有散場處且是終篇無一間字後學能以此篇為法行文自去冗泛之病謹論雙關議論格有天下者審其御邵康出處揚子問道篇御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵故有天下者審其御而已矣立説只就本文御得其道則狙詐咸作使御失其道則狙詐咸作敵立意謂御得其道者不求之天下而求諸我我以理而動雖英雄豪傑之才莫不屈服於其下御失其道者動有人心難制之憂一切用其籠絡駕馭之術智巧相尋無所底止彼又安得不與吾為敵哉馮厚齋批常人只從審字上用意曽不知御字是緊切字又他人於有天下三字必不思顧此於三字關括尤工論曰人主不可有輕用天下之心也見審字又見御字又見字夫情之不齊而闕從我也闕使意其去我也非無故闕呼咸作意喚下御豈無故而從去我者亦必是不善御豈無故而去然而善用天下者闕御善者不求之天下也不求之天下而求之我我以理而動御得其道彼以心而服咸作使雖有英雄豪傑之才亦莫不俯首屈意於其下厚齋云以狙詐為英雄之失身於此則咸作使之意好所謂御者如此而已古人御之善者如此後世不思我之用天下者何如却説不善御者而動有人心難制之憂與不求之天下意相反日從事於籠絡駕馭之術以籠絡駕御為術則是用智術者智巧相尋無所底止與以理而動者相反彼自以為善御而不計其窮也後世御之不善者如彼二者蓋同謂之御總正反二段御字所以為御者不同焉善御與不善御此人主之所當深察而君子之所以力辨也深察見審字字厚齋批云只説御將三句自而審字見揚雄氏言御之得失在道只以御之得失在道六字包本文二十六字而為有天下者審其御之説請試論之天下大物也不走了題上有天下三字雖聖人固不能恝然自立於其上聽其自附而信其自去也應冒子接題蓋自虞書而已有御衆以寬之説焉書大禹謨臨下以簡御衆以寬由後世言之寬非所以為御也難上意而古之所恃以御衆者卒無出於此解上文聖人蓋審之久矣歸審字上六馬之喻發於夏后氏書五子之歌述大禹之訓以作歌云云豫臨兆民懍乎若朽索之御六馬為人上者奈何不敬而文王由閨門兄弟以達于家邦者皆是物也詩思齊文王所以聖也云云刑于寡妻至于兄弟以御于家邦彼其所謂御者亦何往而非道哉此是御得其道者三代之王夏商周世守是道以用其天下此説古者世守是道如上一以誠意接闕服而無復有囂闕古之天下獨無狙詐之徒哉闕雖欲逞其詐而不忍也以上是説御得其道則狙詐咸作使秦漢以來世變日降此説後世下之所以自恃者每曰乘時而自奮爾下不盡力以事其上上之所以待之者亦曰隨事而制變爾上不以誠意接下故士益自放於規矩法度之外便有囂然難制悍然不服之患而人主一切用其籠絡駕馭之術應冒頭從事於籠絡駕馭之術往往以英雄豪傑之資而淪於盜賊姦宄之中者不可勝算包狙詐咸作敵意此非天下之罪也而輕用天下者之過也歸審御字上應破題此二句與智者行其所無事論此非智者之罪也過於智者之罪也句法一同凡舍道而言御者幾何而不激其變邪此是御失其道者古之御者如彼善御者而後之御者如此不善御者文總上二段然則人主將何擇哉歸審字上今夫馬之踶􅐅者或以其詭御泛駕之虞前漢武帝紀元封五年詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之纍而立功名夫泛駕之馬跅弛之士亦在御之而已泛方勇反跅上各反弛式爾反並見下注棄之皂櫪而不敢乘皂櫪飬馬之所脫遇王良造父之手則間習調和無異於凡馬孟子滕文公昔者趙簡子使王良與嬖奚乘云云為之詭遇一朝而獲十王良造父古之善御馬者也脫遇設使遇之責之一日千里不以為難矣揚子修身夫驥一日而千里駑馬千駕則亦及之矣彼其羈束轡勒之具豈有異於他人哉其御之之具則一而已特不先以詭御泛駕待之爾以詭遇泛駕之馬比狙詐之士徒應入講豈古之天下獨無狙詐之哉惟不以詐待之之意况天地之生斯人長短大小非無用於世者人之品不憑力可以自效闕語是皆以一日闕而以狙詐視之固子雲之所哀也引子審御後可以御之也御天下如王良造父之御馬則為善御昔者漢髙皇帝大度無我以接一世之豪傑末又引漢髙帝事為證通鑑髙帝寬仁大度而韓彭英盧之徒為之奔走於後先韓信彭越英布盧綰庶乎知所御者先揚晚嵗雲夢之遊舉動小異後抑變韓信傳有告信欲反上用陳平謀偽逰雲夢實欲襲信而諸侯莫有固志叛者次第而起後陳狶韓信彭越等皆反則一人之身而得失遽變焉始者能用韓彭等則為御得其道後來諸臣相繼而反則為御失其道有天下者可以觀矣前頭已用唐虞三代作隊仗了此只用漢髙帝一事見不可不審亦謹嚴省辭又不走了題上有天下者字審字謹論論學繩尺卷二
