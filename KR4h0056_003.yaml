body:
  text: 論學繩尺卷三宋魏天應編選林子長箋解摘字貫題格此篇與太宗文武德功論同意文帝道德仁義如何文及翁出處前漢東方朔傳臣近述孝文以道德為麗以仁義為凖天下望風成俗昭然化之立説文帝本仁厚之君凡其清靜化民之道恭儉自守之德剛決裁制之義皆自仁厚中來是摘出題中仁字為主來貫道德義三者謂文帝之道德與義天理所由以充者皆天資仁厚所致也批云議論正當文字純粹初學可以為法論曰人主天資之厚者指文帝之仁天理之所由充也指道德義皆自仁中出天下萬善道德義孰有出於人主天資之外者哉文帝之仁自其天資之厚也粘上天資字指仁則見於躬行德形於日用道寓於制事度宜之間義何莫非天理之流行總道德義説應前天理字亦何莫非天資之發見指仁應前天資字一或反是無仁則天理油然而生之機道德義必將錮於天資之薄薄字反説厚字言無尚安有道德深長之味義理制裁之妙也哉必無道德義夫仁也者仁字是主意曰道曰德曰義之所由充者也道德義皆自仁中來充應破題天理之所由也世之人主惟患其天資之不本於仁且厚也應前天資之原字夫茍一本於仁且厚粘上句仁厚字則由是而之之謂道足已無待於外之謂德事合乎宜之謂義見得道德義皆出於仁之韓原道博愛之謂仁行而宜之之謂義由是而焉之謂道足乎已無待於外之謂德孰謂不自夫天資之仁厚者基之繳歸主意仁字上三代而下論人主之天資極其仁厚者莫若文帝也歸題人見其道全德備而義亦盡焉不知其天資仁厚蓋有為之本者有仁則有道德義三者然則帝之仁其道德與義之所由充與應破題意文帝道德仁義如何東方朔舉此而告武帝本出處愚請以仁而論文帝主意大哉乾元萬物資始易乾卦元者何喚下文仁是也應上文極天下萬物之衆無以加於乾應上乾字合天下萬善之粹無以加於元應上元字大題下氣象故聖人於文言曰元者善之長見乾卦又曰君子體仁足以長人同上乾惟有此仁以為之元應元者善之長意故變化之道正中之德利物之義皆由是而生謂乾有仁則有道德義易乾卦乾道變化云云龍德而正中者也云云利物足以和義君惟有仁以為之資應天資之仁厚意故曰道而道曰德而德曰義而義皆由是而出謂人君亦有仁則有道德義易言和順道德而理於義獨不言仁見易非不言也就仁字斡一轉蓋仁為四德之元萬善之長上兩句用朱文公語天體物而不遺猶仁體事而無不在上兩甸用張子正蒙語合易繫與文言而觀之總原題上兩股文則仁之為元可見矣應前語文帝之所謂仁引文帝之仁比乾之仁固不敢以乾元之仁望之也下語有稱停然甘受和白受采言文帝天資近厚如甘味之受調和白色之受采畫其天資仁厚可與入道可與進德可與由義應主意三代而下亦未易多見也應冒頭三代而下論人主之天資極其仁厚者莫若文帝語自居代時其仁已聞於天下先説文帝之仁於本紀大王賢聖仁孝聞天下即位以後今年賜田租二年賜民田租之半十二年又賜田租之半十三年除田租稅明年除肉刑十三年除肉刑法開妖言之禁二年除誹謗妖言之罪去收孥之令敘傳罪不收孥至於春和議貸一詔本紀元年三月詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡而莫之省憂為民父母將何如其議所以賑貸之至今讀之如祥風和氣之襲人油雲膏雨之著物何其仁且厚耶以祥風和氣油雲膏雨比文帝之仁以下又變文一露臺之作若未害也帝則寧惜百金之費母寧使民之無廬以傷吾仁學章穎文見下注云云人本紀贊帝欲作露臺召匠計之直百金上曰百金中十家之産也吾奉先帝宫室常恐羞之何以臺為一服御之增若未過也帝則寧衣弋綈之衣毋寧使民之無褐以病吾仁同上身衣弋綈論學章穎孝文幾致刑措云云一臺之作未害也而帝謂吾可無臺不可使民無廬一惟帳之文采未過也而帝謂吾可無文不可使民無褐君子長者之風慈祥惻怛之意其天資之仁厚如此自原題以下至此只是説文帝天資之仁厚是以躬修玄默仁之靜也自此以下説文帝有仁則有道德義默前刑法志文帝躬修玄而清淨之道由是而得推此仁則為道淨樊凖傳文帝性好黃老清之化流景武之間専務化民仁之實也本贊専務以德化民而恭儉之德由是而著推此仁則為德以景帝贊至于孝文加之恭儉薄昭之誅非忍也十年薄昭殺漢使者帝不忍加誅令羣臣喪服往哭之乃自殺斷以義者所以濟吾仁之偏推此仁則為義裁記義者天下之制注制者制於事魏尚之罰非苛也馮唐傳魏尚為雲中守上功差級文吏以法繩之裁以義者所以輔吾仁之不及推此仁則為義天朱文公云義者人心之裁制理之公也使帝之天資不本於仁厚反説主意應前則道其所道德其所德焉知其不溺於黃老之虛無無仁則無道德為黃帝老子以虛無清淨道德發於義者又安保其不流於申韓之慘刻也哉無仁則無義申商韓非學刑名慘刻之學是則道而非仁不足以為道有仁則有道德而非仁不足以為德有仁則有德義而非仁不足以為義有仁則有義散吾仁於道德與義之中推此仁出去則為道德義即散之則彌滿六合意此一本之所以萬殊見下注斂道德與義於吾仁之內斂道德義入來則在吾仁中即斂之不盈一握之意此萬殊之所以一本用朱文公語天理之發達豈不自天資之仁厚者充之耶謂道德與義皆自仁中朱頭應冒話故班孟堅稱其海內興義必贊之曰嗚呼仁哉本贊専務以德化民是以海內殷富興於禮義斷獄數百幾致刑措嗚呼仁哉而誇大其詞美之以道純德厚如鼂錯者又變文道鼂錯傳大功數十純德厚反不若太史公必世後仁之論為知本也史記律書道言文帝有仁方有德義雖然東方朔道德仁義之對蓋舉文帝之家法為武帝告也出處本文武帝天資亦可謂髙矣美矣且取武帝天資與文帝一觀其初年之䇿賢良未嘗不欲聞大道也而未之有聞董仲舒傳賢良䇿則曰欲聞大道之要未嘗不欲承休德也而未始云獲上文朕獲承至尊之休德道德淵源之妙終不若文帝之意味深逺者則以徒慕仁義之虛名而不能充仁義於實踐也貶武帝不及文帝以其無仁義之故土木之興武帝千門萬户之役神仙之好武帝好求神仙其誠不可掩也如此武帝無仁義所以無道德東方朔謂道德為麗仁義為凖本文是僅足以規帝之失而未足以中帝之膏肓膏肓音荒言心也下左傳膏之上肓之然則中帝之膏肓誰歟喚下文善乎汲黯之言曰內多欲而外施仁義奈何欲效唐虞之治乎見汲黯傳云云帝曰甚矣黯之戇也愚故曰黯之戇朔不如有斷制謹論摘字貫題格此篇與文帝道德仁義論同意太宗文武德功如何丁應奎出處唐陸贄奏議太宗有經緯天地之文有底定禍亂之武有躬行仁義之德有致治太平之功可謂盛矣人到於今稱之則從諫改過為稱首立説文致太平武定禍亂此太宗之功也然所以能致此大功者以其有仁義之德所以有文武之功德盛則功著矣是摘出題中德字為主意批云立説正大行文精神亦有法度論曰君心之天者定指太宗之德則所以運天下者隨用隨著矣文武之功用隨著謂文武之功自德而出天者理也又以理指德舉而措之者其事也以事指文武之功然事之形於外者易見文武之功形於外理之本於心者難純德本於心心有一息之未定心之德未定則天理之妙必不能實有諸已則文武之功不能全根之稟賦者弗充驗之躬行者弗至謂仁義之德乃欲顯設以為文勘定以為武吾知其事難而功邈矣無仁義之德則無文武之功抑豈知帝王平治天下之功雖出於文武並行而不相悖先説文武之功而德也者乃文武之所自出歟發明主意在此一句彼其一心之中天理具足物欲不參此是仁義之德所以酬酢萬變者源源也發出則為文武之功豈曰理與事判而為二乎事根諸理謂文武之功出於德安有二致應前理事二字太宗之造唐始吾懼其天理人欲之雜也為後面張本然帝之德終於仁義乎有取主意此其天之定也天之定是仁義之德應破題宜乎可文可武卒有造唐之功有仁義之德則有文武之功陸宣公舉四者錯言互見而論德於中見本題詳注謂陸贄以文武德功分而為四者曰躬行仁義此其本也主意指德字惜乎太宗所以為唐者猶未純乎天應破題天字與後面相應而德宗且不太宗若也為後面張本太宗文武德功如何請廣其説昔者嘗觀聖人之繫易也孔子作易繫辭曰富有之謂大業以大業指文武之功見繫辭日新之謂盛德以盛德指仁義之德出處同上蓋並言之而不可離也謂孔子以德業並言夫闔闢變化輔相裁成易繫辭一闔一闢謂之變往來不窮謂之通又泰卦后以裁成天地之道輔相天地之宜盈乎天地之間民得其為民物得其為物斯可謂大業也已此一截説大業易之為道也皆隂陽剛柔仁義之為也繫辭立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義其文明之懿而神武之妙也易乾卦天下文明又內文明而外柔順又繫辭聰明睿智神武而不殺君人者有焉皆天德也謂人君有此應主意天字聖人不名其所以為文武者而惟名之曰盛德焉此一截説盛德然則吾身之德孰非天下之業謂德中有文武之功而天下之業孰非吾身之德哉謂文武之功皆出於德帝之德惟其廣運也是以乃武乃文而不可掩書大禹謨帝德廣運乃聖乃神乃武乃文蕩蕩乎無能名也而巍巍乎其有成功焉語八大哉堯之為君也蕩蕩乎民無能名焉巍巍乎其有成功也其所以為盛且大者若是繳前盛大二字後之君不揣其本無仁義之德徒喜其功徒求文武之功不以表章六經為文漢武帝贊罷黜百家表章六經則以窮兵稔禍為武後荀悅漢紀論窮兵極武百姓空竭反求諸其身多欲之與仁義方交戰於中而靡定也應破題定字欲前汲黯傳黯曰陛下內多而外施仁義噫亦可退而念德矣轉歸德字主意云見王徠春秋義云秦漢以還若太宗之造唐其殆庶幾乎引入太宗太宗之為德也純與駁與先説太宗之德純是天理駁是人欲或者資稟雖髙學問未至而血氣之私功利之習不能不為之纍也應冒頭天理人欲之雜也矧言刑言利之徒布列先後如封德彛則言刑權萬紀則言利以權萬紀傳言鑿山治銀歲數十萬帝責曰公利誘我而誘之以秦任法律漢雜霸道者接迹焉魏徴傳封德􅐩曰秦任法律漢雜霸道徴曰五帝三王不易民而教行帝道而帝行王道而王顧所行如何耳至是天下大治理欲之境帝將奚從若從魏徴之言是天理若從封德彛權萬紀之言則是人欲夫仁者心之德愛之理義者心之制事之宜説仁義二字用朱文公議論此其全體大用之不可易者謂仁義之德如此性之者固由之而行身之者以之得天下孟子堯舜性之也湯武身之也又舜由仁義行又三代得天下以仁以之制事蓋亦綽綽乎有餘裕謂以仁義之德而為文武之功書以義制事又孟子則吾進退豈不綽綽然有餘裕哉太宗本然之天亦豈與帝王異哉應主意天字亦應上堯舜湯武事蓋自魏徴仁義之一言有以迎其善端而充廣之見上魏徴傳云云帝謂羣臣曰此徴勸我行仁義既效矣由是篤信力行四年既效而天者定矣應破題天者定字見上注經營運量而時出之推此德則為文武之功應破題運天下隨用隨著意豈特開儒館備樂舞以為文選舉志太宗崇儒術置𢎞文館又禮樂志帝曰朕雖以武功興終以文德綏海內乃更製歌舞名七德舞九功舞凡其致治之美庶幾成康乃其文之大也本贊致治之美庶幾成康豈特御鞍馬兼將事以為武太宗敗竇建德虜王世充凱旋太宗被金甲陳鐵騎獻俘太廟又張行成傳朕為人主兼行將相事凡其除隋之亂比迹湯武乃其武之大也本筫除隋之亂比迹湯武二者隨著功在其中應破題八代之後乃有貞觀太宗年號貞觀四年天下太平天地為之再造生民復見隆平不其盛哉此是太宗文武之功事本於理應冒頭事理二字德推於業應原題德業字發明主意陸宣公雖列四者言之見本題注味其躬行仁義一語同上則自本自根之地在是矣此一句是一篇主意與冒頭躬行仁義此其本也相應噫其亦幸而太宗之天終定也掦之三應天字原幸不幸字學韓道文其亦不幸而太宗之天未純也抑之太自此以下應冒頭宗未純乎天語慙德內多本原何在通鑑父子兄弟之間慙德多矣一鑑既失初心且移朕常保此三鑑云云嘆曰今魏徴逝一鑑亡矣此二句謂太宗未純仁義之德牽愛而復立浮屠文之隳也本贊牽於多愛復立浮屠好大而勤兵於遠武之黷也同上好大喜功勤兵於逺之此二句謂太宗未全文武功由是唐之功不能三代矣責太宗豈惟不三代哉粘上文要過德宗來垂統如此繼體象之謂太宗之垂統未善所以德宗之繼體不純朱文公感興詩垂統己如此繼體宜昏風一再傳而唐事愈異過德宗蓋以太宗一身所以詒厥孫謀者且若是詩豐水有芑云云詒厥孫謀以燕翼子於德宗乎何有應冒頭德宗且不太宗若也陸贄之頌太宗也似溢美矣敘本文而歸於從諌改過則有味之言也見題注夫知諌之為善也而從焉知過之不善也而改焉演上文此君心之天所由定也應破題其諸魏徴之力歟應勸行仁義語德宗天姿不逮其祖逺甚謂德宗不如太宗而猜忌愎諌視仁義為何物陸贄奏議九弊不去姿強愎忌直言踈隔猜忌前有徴約而為一言見前注後有贄豐而為數百諌陸贄論諫數百篇本於仁義之一言之大謂之約數百篇之多謂豐此其源委也源委源流也一悟一迷治亂判矣太宗悟魏徴之勸所以有貞觀之治德宗迷陸贄之諫所以有奉天之亂固嘗謂使太宗能廣仁義之言以學問充天資應講題資稟之髙學問未至語自夜讀周禮之後文中子録唐禮樂事上曰朕昨夜讀周禮真聖作也益求關睢麟趾之意以行周官之法度程子遺書有關睢麟趾之意而後可以行周官之法度則貞觀之治雖泰和不是過也謂太宗可以及三代周揚子泰和其在唐虞成乎使德宗能從仁義之諌從陸贄之言以禮義揉氣質揉者矯揉其氣質之偏動遵禮法一如即位之初如初年則建中之政終始如一日何貞觀之不可逮哉謂德宗能行仁義亦可及太宗建中德宗年號貞觀太宗年號噫太宗之不能為成周是可憾也見上泰和注德宗之不能為太宗抑其次耳應上語君子上下有唐一代之世變於魏徴仁義之言陸贄仁義之諌每有感焉取魏陸二公之言規諷今日意味深長謹論前篇以文帝之道德義皆自仁中出此篇以太宗之文武功皆自德中出調仗一同主意暗合體用貫題格此篇與季應旗帝王文武德威論同字面上聖道德仁義如何李雷奮出處前漢司馬相如傳時蜀父老多言通西南夷之不為用相如乃著書籍蜀父老為辭而已詰難之以風天子且令百姓皆知天子之意云云况乎上聖又烏可已故云云創道德之塗埀仁義之統將博恩廣施逺撫長駕云云以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎立説道德體也仁義用也道德之體備於一身仁義之用見於天下有是體則有是用仁義實不離乎道德也人君出而為天地民物之主豈曰能備道德以獨善其身而已故將由體而用推吾之所有以副天地民物之望使天下無逺近無內外悉歸吾仁義之中自非聖人之盛者孰能與於此相如以是而稱武帝或者將以藥其窮兵逺夷之病如帝之不悟何批云立説正大而不迂造辭紆徐而不迫蔚有南宫風度宜冠多士論曰備是理之體於一身道德是體而溥是理之用於天下仁義是用非聖之盛者不能也歸上聖上大抵體用同一原程子曰體用一原顯微無間而吾身之與天下初無二本道德仁義一而已矣孟而夷子二本故也人君出而為天地人物之主歸上聖身上豈曰獨善其身而已哉非特有道德於已兼孟子窮則獨善其身達則善天下固將達已之所有以副天地人物之望要將充道德之體而為仁義之用應上語使無逺邇無踈戚悉囿於道化之中者也承題説得地位開闊氣象體面夫統攝萬善謂之道德露出道德字而曰仁與義則其著見於事物者也露出仁義字體不博則用固不能周道德之體不廣大則仁義之用不周遍而用有所未博則所謂體者亦虛而已矣説仁義之用未周則是道德之體未實聖人豈若是哉上聖則不如此彼其一身之微衆理俱備聖人一身備道德之體既無一毫之虧欠無虧無欠用前輩語而覆載之間苟有一之不獲應為天地人物之主語則戚然憂怛然念急起而拯之此是仁義之用以盡吾天地父母之責應副天地人物之望語嗚呼此其體用之兼舉歟合體用字此所以為聖之盛歟總結上文漢之武帝何如主也含責武帝意於是理之全體且未能備於天下之大用又豈能充周而無所遺者哉既無道德之全體安有仁義之大用相如以是稱之入本文或者將藥其窮兵逺夷之病也相如之見如此如武帝之不悟何惜帝不足以知此上聖道德仁義如何請申之愚嘗求仁義於楊墨矣孟子滕文公下楊氏為我是無君也墨氏兼愛是無父也其弊也至於無父無君同上文無父無君是禽獸也以其非道德之仁義也同上是邪説誣民充塞仁義也又嘗求道德於佛老矣韓文原道其言道德仁義者不入于老則入于佛其弊也至於清虛寂滅同上今其法曰必棄而君臣去而父子禁而相生養之道以求所謂清靜寂滅者以其非仁義之道德也見上注反以上兩腳是證嗚呼天下豈有外道德而可以言仁義此是楊墨亦豈有棄仁義而可以為道德也哉此是佛老所謂楊墨之所謂仁義非道德之仁義佛老之謂道德非仁義之道德惟其不知體用同原故其弊如此昔之聖人轉歸正説本之於精神心術之微道德之體達之於四方萬里之逺仁義之用吾見其體用一原也用程子語題應冒頭接語物我一本也孟子滕文公上且天之生物也使之一本遐邇一轍也見本題注仁以上三句形容道德義一而已勉強所以充此體説道德中庸知仁勇天下之達德也云云或勉強而行之而思天下之溺者飢者則所以達此用也孟子離婁下禹思天下有溺者由己溺之也稷思天下有飢者由已飢之也修身所以立此體説道德道中庸修身則立而視民物之傷如已傷則所以溥此用也孟子離婁下文王視民如傷曷嘗有二理耶發明破題備是理之體於一身而溥是理之用於天下意况夫代天理物而曰君前漢董仲舒䇿文王順天理物此三才之所賴也天地人之所依夷夏之所宗也外夷中國之所尊遐陬僻壤之所仰而望也指本出處通西南夷吾有是道而不能明通公溥周子通書無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥庶矣乎使舉天下皆遊泳於仁義之中無道則無仁義是道其所道非聖人所謂道也韓原道道其所道非吾所謂道也吾有是德而不能長駕逺撫見題詳注使通內外皆休息於仁義之域無德則無仁義是德其所德非聖人所謂德也韓原道德其所德非吾所謂德也天地人物之望於我者果如是耶反應冒頭語嗚呼此論者所以有恨於後世之人君也此一句先藏不滿武帝意且無方之謂道易繫辭上通乎晝夜之道而知故神無方而易無體有諸已之謂德韓原道足乎已無待於外謂之德又孟子盡心下有諸己之謂信實萬善之所宗而衆理之所會者也道德中自有仁義見之愛物則為仁孟子盡心上仁民而愛物見之制事則為義書仲虺之誥以義制事而仁義實不離乎道德也發出主意有是體則有是用有道德則有仁義特在乎君人者充之而已矣歸上聖上應冒子統攝萬善謂之道德而曰仁與義則其著見於事物者也一段何則天之生物一本而已孟子見前注民吾同胞物吾與也張橫渠西銘全句親者當愛踈者獨不可愛乎應冒頭無疏戚字邇者當懷逺者獨不可懷乎應冒頭無逺邇字在中國者當使之得所在異域者獨可使之失所乎應題下夷夏所宗遐陬僻壤所望等語均此雲霓之望則必均此甘雨之潤澤也孟梁惠王上民望之若大旱之望雲霓也又前漢天地之間被潤澤而大豐美同此來蘇之徯則必同此恩波之漸被也書仲虺之誥徯豫后后來其蘇又禹貢東漸于海西被于流沙越南燕北一春風和氣應遐邇一轍語日照月臨一家人父子應物我一本語説得氣象廣大蓋至是而後可以為仁之至可以為義之盡記郊特牲仁之至義之盡也可以為道德之極如是方是道德中之仁義是故有苗弗率所宜征也書大禹謨有苗弗率汝徂征而舞干兩階惟欲使之自格以苗民即吾民也同上帝乃誕敷文德舞干羽于兩階七旬有苗格有崇叛命所宜伐也左僖十九年文王聞崇亂云云退修教而復伐之因壘而降而退修文教惟欲俾之因壘而降以崇人即吾人也見上注唐苗民即吾民崇人即吾人是學文蔡人亦吾人句法後之言道德者豫帝王而言仁義者亦豫帝王總結上舜文事非以其體博用周若此歟以上二段應冒子此其體用之兼舉歟此其所以為聖之盛歟漢之武帝非不上嘉下樂也本紀詔曰朕嘉唐虞而樂商周又仲舒傳制曰朕今上嘉唐虞非不欲聞大道之要也董仲舒傳制曰欲聞大道之要至論之極然不能懲忿窒欲易損卦君子以懲忿窒欲而有好大喜功之纍此是武帝之病北討強胡南征徑越西通諸夷而內外為之騷動題上下文故北出師以討強胡南馳使以誚徑越餘見本題注相如目睹一時之害此相如所以言於是因蜀父老之辭而為文以諷之且深寓其意於道德仁義之語詳見本題注相如若曰普天王土率土王臣孟子萬章上普天之下莫非王土率土之濵莫非王臣邇者被吾仁而逺者不被吾仁是未為道之極也反應前遐邇一轍語為倒説仁不及逺則不足以道中國歸吾義而外域不歸吾義是未為德之盛也反應前夷夏所宗語倒説義不服外域則不足以為德帝而幡然於此幡然字見孟子則必將偃甲兵息征伐使遐邇一體中外褆福矣詳見題注又何至擾擾以貽後日輪臺之悔哉前漢渠犁傳下詔深陳既往之悔云云今請逺田輪臺是擾勞天下非所以優民也甚矣帝之不足與知道德而且不與言仁義也結大講責武帝亦是應冒子如武帝之不悟何一句雖然相如之愛帝固厚矣而其言理則未精也結尾略責相如未知體用一原之説夫道德仁義非二理而亦無二用本主意今乃以創塗歸之道德本題注創道德之塗垂統歸之仁義埀仁義之統則未免岐而為二物矣如此則是道德自道德仁義自仁義了豈體用一原之論乎責相如不知此意善夫董子之言曰道者適治之路也仁義禮樂皆其具也董仲舒策云吁此所以為儒之醇末取仲舒之論以彼形此見得相如所言未是體用貫題格此篇與季雷奮上聖道德仁義論同字面帝王文武德威如何季應旗出處前漢刑法志文德者帝王之利器威武者文德之輔助夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑措兵寢者其本末有序帝王之極功也立説文與武所以治外德與威所以治內二者皆不可狃於一偏専於文者或不足於武過於威者或不足於德漢之諸君皆坐此病班固之志刑法必以帝王之文武德威兼舉而並言之且即其文之所加以觀其武之所服即其德之所施以驗其威之所制是蓋文之中有武德之中有威體立於此用行於彼兹蓋古帝王所以治內外之道固之所以為是説者其殆救時君一偏之病歟文德是體威武是用考官批云立意正大行文通暢自是南宫體製舉古人所以治內外之道文武治外德威治內必析體用而言之文德是體武威是用史臣之意微矣藏班固救時君之偏意蓋治內外之道至不可有一偏之病若治外以文而不足於武治內以威而不足於德則是一偏矣専於安靜者或無振厲之功安靜是文振厲是武過於剛決者或乏寬平之意剛決是威寬平是德斯二者皆狃於一偏有文無武有威無德便是一偏了是未知體立用行之説也見朱文公太極圖解用所以行體所以立思古帝王所以治內外者且正説自有其道四者兼全逺人之未格者吾以文綏之即其文之所加而服乎彼者自有不殺之武以觀其武之所服不易繫辭聰明睿智神武而殺者夫民之梗吾化者吾以德懷之即其德之所施而制乎彼者自有不怒之威以驗其威之所制中庸不怒而民威於鈇鉞是蓋柔之中有強文中有武寬之中有嚴德中有威體立於此文德是體用行於彼武威是用兹帝王之所以為帝王也結小講意漢興以來諸君皆不知出此有文者不足於武有威者不足於德班固之志刑法必以帝王文武德威兼舉而並言之引出處本文君子因其文之所加以觀其武之所服文中有武即其德之所施以驗其威之所制德中有威主此四句是二篇意則班固本末有序之説見題注是正析體用而言之文德是體武威是用固之意其殆救時君一偏之弊而為是説歟専於文者或不足於武過於威者或不是於德皆是一偏應接題意帝王文武德威如何請繹其意愚嘗反覆刑法一志而觀之而得其説矣便就本出處原起漢興以來先説破漢諸君之病如髙祖則知以武定天下而不知有文偏於用武文帝則知以文綏天下而不知有武偏於用文武帝則知以兵服逺人而不知有威中之德偏於用威宣帝則知以嚴御下而不知有德中之威偏於用威若元成則似文而非文似德而非德其武與威又不足言矣如元成二君四者咸無焉何以言之以馬上得天下者此説髙祖偏於用武注見下固未遑詩書之事前漢陸賈傳賈時時前説稱詩書髙帝罵之曰乃公居馬上得之安事詩書玄默清靜者此説文帝偏於用文傳文帝紀敘傳允恭玄默又後樊凖孝文好清靜竟不能洗侮嫚之羞胸奴傳冒頓為書遺髙后曰兩主不樂無以自娛願以所有易其所無此嫚侮之羞也窮征沙漠勇矣此説武帝偏於用威漠前胸奴傳掦雄曰云云孝武浮西河絶大窮極其地追奔逐北其如户口虛耗何昭帝贊承孝武師旅之後海內虛耗户口減半刑名繩下嚴矣此説宣帝偏於用威下元帝紀見宣帝以刑名繩云云其如不能純任德教何同上元帝言陛下持刑太深宣帝作色曰漢家自有制度奈何純任德枚用周政乎牽制文義優遊不斷見元帝本紀贊又不可與前數君並言又不如髙文武宣數君而不威不武此漢之所以東也前面已先判斷了後用實事應之亦是應冒頭蓋治內外之道至不可有一偏之病一段嗚呼人君之治內外蓋自有道應冒頭接題剛柔貴於迭施應冒頭柔之中有剛語寬嚴貴於相濟應冒頭寬之中有嚴意其來久矣自古如此何嘗舉一而廢一哉曷嘗舉文德而廢武威哉特先立乎其在我者文德而後在彼者從之武威是何也設問體不立則用不行也照主意體用字帝王惟知其有文而已而文之中未嘗無武文中有武惟知其有德而已而德之中何嘗無威德中有威曉説主意分征苗之舉書禹謨惟時有苗弗率汝徂征人見其舞羽兩階同上帝乃誕敷文德舞干羽于兩階七旬有苗格而不知誕敷文德舜自有以服其心注見上而七旬來格皆此文之發見注見上伐崇之事左僖公文王聞崇德亂而伐之人見其因壘而降同上軍三而不降退修文教而復伐之因壘而降而不知退修文教文王先有以遏其萌見上注而再駕之後皆此文之效驗又襄三十年文王伐崇再駕而降為臣中以上兩腳説文之未嘗無武好生之德豈狃於姑息者書禹謨好生之德洽于民心兹用不犯于有司而民用不犯有不法之法見上注德明惟明豈好為哀矜者書吕刑皇帝清問下民德威惟畏德明惟明而德威惟畏有不嚴之嚴見上注未此兩腳説德之中嘗不威自或者觀之帝王之治內外若専主於文德而闊略於威武也略設難而不知帝王之所謂專一者非後世之所謂一偏也答上文何也又設問武固不可廢而武特不可先於文文之中有武威固不可弛而威特不可先於德德之中有威曉撥剔主意分文施於此而武自行文是體武是用德用於此而威自著德是體威是用有此體則有此用發盡主意本末先後自有次第應冒子柔之中有強寬之中有嚴體立於此用行於彼意此固所以置文於武之上置威於德之下且曰本末有序厥有意哉見本題詳注使漢君而果知帝王所以治內外之道則不主於一偏而先立乎其大者矣應冒頭班固立言之意正以救時君一偏之弊意抑又聞之治天下之道固不可不知體用之説全篇以體用為主意亦不可不權理勢之宜末又以理勢為權宜理之當然者吾固盡之文德勢之或然者吾必應之武威文德者所以立其理之常威武者所以應其勢之變權其時而用之又在人君善用而已末意似歸重武威上天以一元運譬喻獨陽不能以成歲功喻文德而陰必時出以佐乎陽喻威武入前漢董仲舒傳天使陽出布施於上而主嵗功使陰伏於下而時出佐陽陽不得陰之助而不能獨成帝王以天為心甚欲待天下以君子長者之道尚文德乃帝王之本心而天下之民乃有出於文德之外者不得已而從事於威武焉至於用威武乃帝王之不得已此豈聖人之本心哉發明帝王心事出論至於此班固以文德為帝王之利器以威武為文德之輔助其説信矣見題注帝逺矣後世有王者作必以固之言為然漢之君烏足以語此暗歸美今日此兩篇皆以體用字為字面貫題可以參觀推明性理格以體效二字貫題意知動仁靜樂壽如何陳應靁出處語雍也知者樂水仁者樂山知者動仁者靜知者樂仁者壽朱文公集注云知者達於事理而周流無滯故動仁者安於義理而厚重不遷故靜動靜以體言樂壽以效言動而不括故樂靜而有常故壽立説本朱子之説以體言動靜以效言樂壽而謂仁知之理本於吾身之固有亦非容心以求其樂壽之效也動靜之中自有樂壽存焉惟純乎天而已矣批云文字簡潔無一冗辭最可為法論曰吾身有全理知仁體立而效存焉體是動靜效是樂壽則亦性之而已主意乎性是純天夫人有此生均有此理知仁本然之體既具於是理之中動靜之體具於仁知之中自然之效豈出於是理之外樂壽之效非出於仁知之外言理而無所驗固不可言知仁之動靜而不言樂壽之效驗固是不可或有所利而為之亦非也若有心求樂壽之效亦不可此兩句已含動靜以天樂壽亦以天意夫知也仁也即吾一身之全理也應破題首句知者周流泛應而其體動本朱子之説動則適於變而自然之樂存焉動中自有樂仁者純固堅守而其體靜本朱子之説靜則順其常而自然之壽存焉靜中自有壽樂非専主於動也再斡一轉因其動而見其天之樂見自然意壽非専主於靜也意與上段同亦斡一轉因其靜而見其天之壽見自然意若無此一轉則文字枯淡了動靜以天樂壽亦以天此兩句發明主意非詣理之極者孰知之程子釋此章曰非體仁知之深者不能如此形容結語用其意知動仁靜樂壽如何請因夫子之言而申之嘗聞動靜一隂陽也隂陽一太極也用周子太極圖語太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根云云五行一隂陽也陰陽一太極也方陽剛用事則流動發越而萬物有熙熙之樂謂陽動之中有樂存焉逮陰柔布令則凝定正固而萬物得性命之真謂隂靜之中有壽存焉是動靜之中未嘗無樂壽之驗也借陰陽動靜之中有樂壽意以形容本題然天地以其心普萬物而無心者也用程子語天地之常以其心普萬物而無心效驗之應造化何容心哉應自然意知造化之太極則知吾身之太極矣鎖得有力用朱子一物各具一太極語法原題只百餘字便結入講簡潔可世固有攖拂其恬怡之性泊亂其純一之天者非自然之動靜棄知違仁莊子絶聖棄知又語三月不違仁固無望其樂且壽也固無自然之樂壽乃若逐物之變更以為樂逺物之纍自以為壽亦非自然之動靜自然之樂壽亦豈至仁大知者之為哉此段應冒頭或有所利而為之亦非也蓋仁知有本然之體則亦有自然之效應冒頭語動靜天也樂壽亦天也應冒頭動靜以天樂壽亦以天吾何容心之有應破題性之而已此所謂體立而效隨非有所利而為之者是故酬酢夫上下四方之宇周流夫古往今來之宙淮南子上下四方曰宇往古來今曰宙人見其為知之動吾初無心於動也應自然之動意此性貫融自然天機之發天籟之應事見莊子有不知其樂者矣知者自然之樂如此窮理而至盡性之境易繫辭窮理盡性以至於命復禮而造至仁之地克已復禮為仁人見其為仁之靜吾亦無心於靜也應自然之靜意此性凝定自然安則久久則天事見荀子有不知其壽者矣仁者自然之夀如此此非仁知之外别有所謂動靜亦非動靜之外别有所謂樂壽也此兩句應冒頭因其動而見其天之樂因其靜而見其天之夀意微吾夫子見理之精造理之極其孰能言之應冒頭結處盡發程子之意雖然聖人言此不過形容道體云爾餘意尤好若夫會而觀之融而通之則知仁本一理動靜本一機勉齋通釋此章曰人之生質有近於仁者有近於知者學焉而即其所近或趨於仁或趨於知至其成就則好樂動靜樂壽之分自應如是然仁則必知知則必仁不仁不足以為知不知不足以為仁特其氣象有偏重耳靜之中未嘗無動者存動之中未嘗無靜者寓此兩句舉周子通書動而無靜靜而無動物也動而無動靜而無靜神也動而無動靜而無靜非不動不靜也物則不通神妙萬物故精義入神與利用安身非二事易繫辭精義入神以致用也利用安身以崇德也成物之知與成已之仁實一機中庸成已仁也成物知也性之德也合內外之道也動靜互為其根太極語樂壽交致其驗應前驗字兹其為無體之易歟繫辭神無方而易無體兹其為不測之神歟同上隂陽不測之謂神故曰動靜無端陰陽無始愚於仁知亦云程子曰動靜無端隂陽無始非知道者孰能識之謹論立説貫題格以明誠二字貫題意盡心知性存養如何毛登龍出處孟盡心上孟子曰盡其心者知其性也知性則知天矣存其心養其性所以事天也朱子集注云人有是心莫非全體然不窮理則有所蔽而無以盡此心之量故能極其心之全體而無不盡者必能窮夫理而無不知也以大學之序言之知性則物格之謂盡心則知至之謂存謂操而不舍養謂順而無害立説以明誠兩進為主意明謂盡心知性誠謂存養自明而誠則吾心性之天可以不失矣批云議論有據文字亦老時文中不多得明與誠兩進明指盡知字誠指存養字進朱文公白鹿洞賦明誠其兩君子所以全其天也天指心性言天所命為性中庸天命之謂性性所具為心朱文公釋本文云性則心之所具之理今曰性所具為心少礙理人有此生均有此天應天字指心性昧乎天者非也不能盡心知性拂乎天者亦非也不能存心養性君子天其天之學天其天字用前輩語亦曰明誠兩進而已矣應破題語誠謂夫虛靈知覺者吾之心程子云心虛靈知覺純粹至善者吾之性周子通書純粹至善者也故曰云云繼之者善也成之者性也究極之盡心領悟之知性吾之明固足以為誠之之地矣應前明誠字然明之至而誠未至焉明之至則能盡心知性誠之未至則是未能存養其把握也弗力不能存心其保育也不粹不能養性是非理欲或得以往來乎其中語老與接題相應則明自明爾徒能盡心知性向之得諸天者未必有諸已也如心與性何不能存心養性天字應破題是故轉歸正非盡不足以存明而誠而存之所以究其盡誠而明盡存心所以心非知不足以養明而誠而養之所以充其知誠而明知養性所以性明而誠盡心知性誠而明存心養性其君子兩進之功歟繳本意應破題盡心知性存養如何諸以申孟軻氏之旨嘗試論之天命流行於事物之表氣以成形理亦賦焉從天字説起朱子中庸章句天命謂性注曰天以隂陽五行化生萬物氣以成形而理亦賦焉合虛與氣有性之名合性與知覺有心之名從心性上説起之橫渠張子曰由太虛有天名由氣化有道之名云云兩句全文是赤子不失之初孟離婁大人者不失其赤子之心者也是牛山未牧之根告子上牛山之木嘗美矣斧斤伐之云云牛羊又從而牧之是乾道各正性命之地易乾卦彖曰乾道變化各正性命心也性也一天也應主意天字之以上説心性字應虛靈知覺者吾心純粹至善者吾之性人患不盡爾不知爾轉入盡知意苟知且盡也從盡知上轉入存養則沖漠無朕萬象森然程子曰沖漠無朕萬象森然已具徹上徹下火然泉達程子曰徹上徹下不過如此又孟子曰若火之始然泉之始達存之云乎哉養之云乎哉歸存養上來然天理人欲同行異情應冒頭是非理欲或得以往來乎其中胡子知言云云莫非性也而氣質之性或得以蠱之朱子曰有天地之性有氣質之性又張子曰形而後有氣質之性莫非心也而有外之心或得以障之張子曰有外之之心不足以合天心初之昭然者將昏然初之純然者將雜然以上是反説不能盡不能知天者人之尚安得以全其天哉反應破題全其天字此誠明之學不容不於兩進之地而加之力焉應破題首句且夫吾於知覺者而盡其心應冒頭知覺字固可以詣其安安之地書堯典安安允恭克讓然出入無時則遷矣不能存心時孟子出入無莫知其鄉其心之謂歟吾於純粹者而知其性應冒頭純粹字固可以全其生生之妙繫辭生生之謂易然揠苗助長則斫矣不能養性有孟子宋人憫其苗之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苗長矣又何以存之養之哉反説存養字嗚呼明之未至固無以為誠之地應冒頭非盡不足以存非知不足以養意而誠之未固亦不足以充其明之天反應冒頭存之所以究其盡養之所以充其知意明則誠矣誠則明矣用中庸句法應冒頭語此中庸之所以為教見上文亦吾孟氏盡知存養之論所從出歟引入講今夫性天之命也而心則具之中庸語性天之理也而心則主之朱文公集注並見冒頭注四端根焉仁義禮智四孟子凡有端於我者萬善足焉朱文公云萬善具足有感有應者心之妙程子曰有感必有應盡則可以斂宇宙於一握可以運六合於一思程子曰斂之不盈一握散之彌滿六合心之盡則奚心之不可存從盡心字過存心字無聲無臭者性之體詩云上天之載無聲無臭知則可以會萬殊於一本可以融太極於一真程子云一本所以萬殊萬殊所以一本又周子太極圖無極而太極無極之真二五之精妙合而凝性之知則性之養者易易爾從知性字過養性字盡矣知矣洞洞屬屬無在無不在明之事也皆用前輩語應主意明字是説盡知字然而明誠之學君子進進不自已之心應明誠兩進字誠是説存養字不患其知之不至患其行之不力而無以究其知行之不力是不能存養中庸力行近乎仁不患其知之不及患其仁之不守而適以自鑿其知仁之不守是不能存養適論語知及之仁不能守之况夫理與欲交攻公與私相勝是與非真與偽對立應冒頭是非理欲或得以往來乎其中語一把握之不謹則心之難持甚於槃水之難持奚其存應冒頭把握弗力語而荀子解蔽篇人心譬如槃水正錯不動則湛濁在下清明在上一保護之不至則性之易流甚於湍水東西之易流奚其養應冒頭保育弗粹語流孟告子上性猶湍水也決諸東方則東決諸西方則西流必有誠焉應主意誠字誠則真則實則無妄誠則能存養真朱子云誠者實無妄之謂不誠則偽矣不誠則不能存養誠則靜則定則能得誠則能存養安記大學定而后能靜靜而后能安而后能慮慮而后能得不誠則膠膠擾擾矣不誠則不能存養荀子膠膠擾擾無鴻鵠其移孟告子云一心以為有鴻鵠將至無雞犬其放同上人有雞犬放則知求之有放心而不知求無稿木死灰其寂滅莊子齊物篇形固可使如稿木心固可使如死灰乎又老子絶滅禮學無一息之不存如此則能存存吾之心則心之盡者又盡也應冒頭存之所以究其盡不以旦晝亡孟告子上則其旦晝之所為有梏亡之矣不以牛羊牧同上牛羊又從而牧之不以杞栁杯棬戕賊同上性猶杞栁也義猶杯棬也云云孟子曰子能順杞桞之性而以為杯棬乎將戕賊杞栁而後以為杯棬也無一瞬之不養如此則能養養吾之性則性之知者真知也應冒頭養之所以充其知明以探索之誠以踐履之應主意造其理而履其事朱子注盡心知性而知天所以造其理存心養性以事天所以履其事君子兩進之功不至於兩盡不止也繳歸本意是故中庸之不明乎善則無以為誠身之本中庸不明乎善不誠乎身矣而誠其意者又大學致知之功大學欲誠其意者先致其知又見本題集注孟子學孔子者也引入本題出處中庸大學吾孔子之遺書所以揭後學心性之日月也結中庸大學兩句七篇之作往往得之謂孟子之言得之中庸大學其曰操則存舍則亡其曰得其養則長失其養則消並見告子上云云存養數語亹亹為學者言之今而盡心一章言心之盡性之知舉本文不徒曰知與盡而已而復繼之以存養之片辭演上文信乎知而存盡而養誠明兩進之學君子之所以天其天者歟應破題語繳盡本意雖然此復焉執焉之事也周子通書云性焉之謂聖復焉執焉之謂賢又進一步思索由復而至於無妄易序卦復則無妄矣由固執而至於不勉不思中庸誠者不勉而中不思而得誠之者擇善而固執之也則雲行雨施吾心觸也天髙地下吾性湛也用劉屛山文是孔子從心不踰之境語七十而從心所欲不踰矩是文王性與天合之時詩思齊雍雍在宫肅肅在廟注言性與天合也蕩蕩巍巍在吾方寸中矣學劉屛山堯舜論蕩蕩巍巍復在吾目中矣故曰賢希聖聖希天不走了天字聖周子通書士希賢賢希聖希天題外生意格此篇與陳子頥麒麟閣惟霍光不名論同格中興輔佐孰優陶大章出處前漢蘇武傳甘露二年單于入朝上思股肱之美乃圖畫其人於麒麟閣法其形貌書其官爵姓名云云明著中興輔佐凡十一人始霍光終蘇武又見後篇詳注立説此題本因上文有單于入朝之説遂立意謂欲以聳四夷之觀聽故麒麟閣之繪畫功臣以單于平日所畏慕如蘇武者而列羣臣之後使之一見此圖謂大節如蘇武且居羣臣之後則凡列於武之前者果何如人哉益見中國人才之多也竹林陳一薦批尋常人若如此立意必説倒了前十人皆不及蘇武此則又有抑掦雖是取蘇武名節過人又回護前十人亦當在其前此最難斡旋蓋説十人當在前是與主意不相合了此獨兩不相礙可謂大有手段當逺人嚮慕之時單于入朝而論次羣臣之勳烈麒麟閣中興輔佐凡十一人始霍光終蘇武此其微意之所寓未易以常情論也含蓄本意未發出夫人才之衆多總説十一人固國勢盛強之本皆可以為漢朝輔佐而名節之顯著専指蘇武一人尤逺人之所畏慕者也漢武居胸奴十九年誰不畏慕之然名節之全者不常見於天下名節之人難得有能堅此志於艱危怵迫之餘始指蘇武在胸奴時伸大義於人所難居之地居北海上牧羝其風聲所存名節誠足以懾戎心而張國體應逺人向慕意視夫從容輔治者總説前十人難易優劣蓋不待辨而明不必辨其優劣狀孰優字而英明之君暗指宣帝昭示夫輔治之勳中興輔佐十一人顧取其表表尤著者指蘇武一人厠諸羣臣之後居十一人之後豈無深意於此哉亦未説出本意蓋秉節不移者亦臣子當為之事蘇武能守節而屈一人以示大體以武居羣臣之後正人主抑揚之微權也此正宣帝本意所在先之以輔治之臣前十人終之以全節之士蘇武居十一人之後豈惟髙下之序自有不可紊者存始霍光終蘇武抑使外夷聞之有以知中國人才之盛使單于見之以武之名節如此且居其後足見吾國人才之多而未易窺其淺深也發盡主意在此漢宣帝因單于入朝而思股肱之美出處本文表而揚之者凡十一人自霍光至蘇武凡十一人而蘇武特居其後居十一人之後遡其論次之意有不難知者矣應意字中興輔佐孰優請申之夫褒賢録善韓進學解占小善者率以録崇德報功書武成崇德報功垂拱而天下治此有國之常典此六典之常法也而總八柄者不可一日廢也禮天官太宰以八柄詔王馭羣臣一曰爵以馭其貴初豈視外夷之觀聽為輕重哉謂初不必因外夷來朝方論定功臣次序然帝之論功適在於單于入朝之始出處本文應逺人向慕語則其所以聳嚮慕明激勸者實於此乎寓也應微意所寓語昔者帝舜之世有德者篤之書舜典惇德允元元者信之同上惇德允元注允信也憸壬者則畏而逺之同上而難任人於逺人乎何與若與逺人不相關而顧於蠻夷有率服之理同上蠻夷率服豈非去取之意明輕重之理得去小人取君子輕小人重君子有以深服其心乎中國人才之重輕外夷所視以為敬侮春秋以來晉楚之爭亦已久矣晉楚爭霸一旦晉君類能而使左襄九年楚伐晉子囊曰晉君類能而使之舉不失選韓范趙魏各當其才同上韓厥老矣知罃稟焉以為政范丐少於中行偃而上之使佐中軍韓起少於欒黶士魴上之使佐上軍魏綘多功以趙武為賢而為之佐楚之善覘人國者悉數而陳之見上注退焉而不敢校同上文晉不可敵事之而後可信夫人才之為國輕重不可示人以狹也人才於中國豈無關係漢廷公卿列侯曽不足以起人畏而一大將軍猶足以為漢重大將軍衛青上書公車輒拜丞相車千秋傳太子為江充所譛敗久之千秋上急變訟太子寃上感悟立拜千秋為大鴻臚數日遂代屈氂為丞相封富氏侯後漢使至胸奴單于問曰間漢新拜丞相何用得之使者口以上書言事故單于曰如此漢置丞相非用賢也妄一男子上書即得之矣而外夷遂得以竊笑之見上注况乎覽元功之籍過宣帝章中興之懿中興輔佐諸臣以令衆庶以示四夷因單于入朝宣帝得不劑量其輕重而示人以意乎應意字是故形貌之擬本出處法其形貌官爵之書同上書其官爵麒麟之載褒嘉之寵前此未始見也上文上思股肱之美乃圖畫其人於麒麟閣自帝之論功而事昉乎此矣昉者始也然即帝之所謂輔佐而觀之且總説十一人定策如博陸博陸侯霍氏又光受遺詔輔少主又定萭世策濟治如丙魏丙吉魏相同心輔政靖邊如充國趙充國保勝安邊勳烈之優爵祿之重總説置之於前列夫誰曰不然以此數人居於前列誰曰不可安世以謹厚聞張安世忠厚謹信延年以安和著杜延年為人安和久典朝政蕭望之梁丘賀以儒學顯蕭望之明經持重議論有餘梁丘賀從京房受易各見本傳其他如韓如劉韓增劉德要不過一藝一能之士未見其有卓然可紀之功也略抑之注詳見題子卿仗節虜廷不撓不屈武使胸奴仗漢節牧羊臥起操持節旄盡落蘇武為主合敘得長富貴利達之語舉不足以動其心本傳衛律説武曰蘇君律前負漢歸胸奴幸蒙大恩賜號稱王擁衆數萬馬畜彌山冨貴如此蘇君今日降明日復然武不應又李陵謂武曰單于聞陵與子卿素厚故使陵來説足下虛心欲相待終不得歸漢徒自苦無人之地信義安可見乎武曰王必欲降武請畢今日之歡效死於前而大節凛然真足以寒單于之膽而奪之氣本傳揚名於胸奴功顯於漢室想夫單于之族翕然起敬知中國之有人誰不畏慕其名節渭水之朝丐奴呼韓邪來朝渭水上深自屈服且説蘇武之功是雖胸奴衰微之故宣帝贊承武帝奮擊之威值胸奴百年之運而子卿慷慨不回之節足以壯漢家之勢多矣蘇武之功不可掩然則宣帝行報功之典其可不知所論次乎此宣帝所以論次之也今也列羣臣於其前前十人置子卿於其後居十人之後先後次序帝意果何所寓耶設問帝也亦思夫往者武帝復讎之役矣且開展説將武帝時衛霍來比並方見得蘇武有功席富庶之後食貨志武帝初七十年間國家亡事民給家足都鄙廩庾盡滿而府庫餘財乘纍戰之威同上干戈日滋而又得衛霍之徒以為之將大將軍衛青驃騎將軍霍去病雖所向輒克以少紓前日之恥同上衛霍同出兵追胸奴斬首萬餘級而終不得其臣妾之心武帝單于未來朝今也不煩兵革以臣所未臣而振吾中興之功直至宣帝時單于方來朝此豈特在廷諸臣輔佐之力不走了前十人微子卿之節外國逺人殆不知中國禮義之為可尊矣若無蘇武一人則胸奴得以玩中國矣子卿之守節如彼其堅也起敬於單于如彼其久也而序列如彼其卑也是學孟子功烈如彼其卑也句法帝豈無見於此哉又設問蓋麒麟之圖繪正逺人觀聽之所繫本文因單于入朝乃圖畫其人於麒麟閣彼其平日所以畏慕者知有子卿而已且説單于所畏慕者惟武一人蘇武字子卿一旦顧瞻傑閣麒麟閣厯數元勳十一人而疇昔敬畏之人指蘇武乃眇眇然特居於輔佐諸臣之後武居十人之後殆將相顧駭愕私相告語形容當時畏慕氣象如親見之以中郎之大節如此蘇武為中郎將且居羣臣之下居十人之後則凡偃然於其右者前十人響下得偃字其功德顧可量歟人回護得前十人俱好此是大手段將益信中國人才之盛非吾之所能盡知胸奴所知名只是蘇武一人之名節以前十人未能盡知而隱然有虎豹在山之勢矣虎豹在山藜霍為之不採如是寧不足以示中國之大而杜外夷窺伺之心耶應上冒頭國勢盛強逺人向慕之意漢末三國爭衡魏蜀吳吳之不競於魏蓋明矣魏強而吳弱趙咨將命於魏乃能於雍容立談之頃而折其輕視江東之意用趙咨事為證魏問咨以吳如大夫者幾人蓋美其専對之不屈也詳見吳志其文甚明不待注咨寧自貶而不肯損國威重故託言聰明特達者八九十人而自處於不可勝數之列咨對曰聰明特達者八九十人如臣之輩車載斗量嗚呼吳之才惟不止若咨者而已此吳之所以強大而魏之所以深憚也以咨比蘇武宣帝之用心咨誠得之矣雖然中興之輔佐則盛矣抑當時在廷公卿之選皆無愧於子卿者耶説當時不獨蘇武有功然亦得在內大臣主張之力曰是正不當以內外為别也內前十人外蘇武蓋內治之不舉則在外者無以成其功無大臣主於內則蘇武何以成其功而居中之有人正守節於外者之所恃以為無恐也有大臣主於內則武有所恃而不屈有如望之梁丘賀以儒術自致於其君見前注雖未有傑然髙世之勳而開導扶掖之任亦誠不可闕者獨可以為文墨議論而遽少之哉以十人當在前宣王之中興毛詩蒸民篇任賢使能周室中興焉其輔佐之臣自方叔召虎而下詩人序其功而歌之詩采芑方叔元老克壯其猶江漢命召公平淮夷云云王命召虎式辟四方其髙下大小誠不可掩矣末以宣王事為比而六月卒章乃曰侯誰在矣張仲孝友見小雅六月詩云云以其居中之有人嗚呼昔者中興之論功蓋已若此矣回護前十人意好題外生意格此篇與陶大章中興輔佐孰優論同格麒麟閣唯霍光不名陳子頥出處前漢蘇武傳甘露三年單于始入朝上思股肱之美乃圖畫其人於麒麟閣法其形貌署其官爵姓名惟霍光不名曰大司馬大將軍傳陸侯霍氏衛將軍富平侯張安世車騎將軍龍額侯韓增後將軍營平侯趙充國丞相髙平侯魏相丞相傳陽侯丙吉御史大夫建平侯杜延年宗正陽城侯劉德少府梁丘賀太傳蕭望之典屬國蘇武立説霍光擁昭立宣有大功於漢室宣帝宜報之之厚而反有赤族之誅真少恩也彼時單于方來朝萬一舉霍光以為問謂光之有功如此何故待之之薄宣帝恐無以掩其過乃畫功臣於麒麟閣而以霍氏居第一且不書其名欲使單于知帝之待霍氏未嘗不厚其所以誅之者乃其子孫之罪非帝少恩也猶兾可以釋單于之疑耳批云説破宣帝待霍氏之心如親見之且是文勢有抑揚言語極痛快讀此一篇可以前無古人矣可敬可服禮有不出於人主之誠心謂宣帝本心不敬霍光而過為是褒顯人臣之舉者過以不名之禮待之此其意必有所為也含蓄本意夫人主之於功臣優崇尊顯正説而不以臣禮待之者不以臣禮待之故不敢書其名正以想其疇昔之功也此正是待功臣之意然而思其功則必厚其報且暗説思霍光之功當報其恩愛之於其身則必酬之於其後愛霍光之身當酬其子孫今也保全之意不堅於疑忌未露之時當時不能保全霍光且有滅族之慘而褒崇之典乃驟用於裁抑太過之後既是裁抑之且於麒麟閣之畫乃以不名之禮待之豈褒崇之真心耶君子固已知其意之所主矣亦未説出本意是祖前篇步武麒麟閣之畫見本文圖形者凡十有一人始霍光終蘇武而獨於霍光不名焉博陸侯霍氏不書其名人固知宣帝之假寵於霍氏也似若敬霍光而不知帝之意不在於光而在於單于之朝也方露出本意蓋光之擁昭立宣功在社稷此是光之功不可掩凡其所以為漢與夫漢之所以待霍氏者光之功如彼宣帝待之如此不惟天下知之胸奴固已知之熟矣胸奴亦熟知霍光之功使其來朝之始首舉是以為問則帝之心寧不有愧乎設使單于來朝之始問及霍光有功如此漢何故待之薄宣帝何以對之能無愧心乎是以列之於諸臣之先而待之以不名之禮所以麒麟之畫以霍氏居第一而不書其名使其一見之頃必知漢之所以待霍氏者非羣臣之所敢望欲使單于不待問而知之謂諸臣皆書其名獨霍氏不書其名者非敬霍氏之至耶則夫前日之事非真漢之少恩也前日赤族之誅乃霍山霍禹之罪非宣帝少恩也猶冀可以釋單于之疑乎單于知此意則謂漢未嘗不待霍光之至其所以招此誅者乃其子孫之罪可以曉然而無疑矣麒麟閣唯霍光不名請遡其意夫委質策名臣子大義晉語委質為臣無有二心云云又晉王導傳策名藩屛又見前百官公卿表云云君前臣名禮之大經記君前臣名父前子名古之大臣雖有大勳勞於天下其君蓋未始不名之君之於臣當顯其名如曰來禹書大禹謨帝曰來禹曰嗚呼説説命王曰嗚呼説曰父義和文侯之命王曰父義和此皆功崇德厚而見名於其君者也舜之於禹髙宗之於傳説平王之於義和未嘗不名之獨成王之於周公詩閟宫王曰叔父建爾元子俾侯于魯太甲之於伊尹太甲上惟嗣王不惠于阿衡而特以叔父阿衡目之見上外是未多見也除此二人之外亦皆名之今而宣帝之不名霍光豈非以伊周之禮待之耶此是疑辭綴上文伊周來然而人君之於人臣不名之禮可以為一時非常之恩轉正意至於垂之竹帛後漢鄧禹傳垂功名於竹帛勒之彛鼎王文憲集序功銘鼎彛所以昭元勳而垂後裔者人臣之名欲使萬世知之正不當以名之為嫌也豈容不書其名成王雖尊周公而書之於史者未嘗不曰周公旦也見周書太甲雖重伊尹而記之於書者未嘗不曰伊尹也見商書伊訓安有麟閣之圖引本文逺將以威四裔久將以傳子孫乃遽沒光之名而不書哉若不書其名何以威四裔何以示子孫是必有故也故字是應冒頭其意必有為意大抵人之常情有所諱晦於中者必有所文飾於其外有愧於心者必欲文飾於外以掩其過無故而加之非常之寵必非其中之誠然者也忽然待以過情之禮豈真心哉且帝之所以待光者果厚耶薄耶輕耶重耶且將厚薄輕重字疑説始元以後昭帝年號地節以前宣帝年號漢幾岌岌矣時昭帝崩迎昌邑王賀立後廢昌邑王復立宣帝二十年間其能挈卯金既搖之鼎漢姓劉故云卯金而措之泰山之安者前嚴助傳天下之安猶太山而四維之也秋毫皆光力也秋毫言纎細皆光之功非霍光擁昭立宣則漢之為漢未可知也此其鴻名偉績精忠峻節表表然彌滿六合之間光之功不可掩雖在逺人亦知有所謂霍子孟之忠矣霍光字子孟借使後嗣不競猶當蒙八議之貸縱霍山霍禹不是猶當恕之四禮秋官小司冦之職一曰議親二曰議故三曰議賢曰議能五曰議功六曰議貴七曰議勤八曰議賔帝也宅心不𢎞疑慮日積從此責宣帝芒刺在背固已不能堪於驂乘之時霍光傳宣帝始立謁見髙廟光從驂乘上內嚴憚之若芒刺在背云云故俗傳之曰霍氏之禍蒙於驂乘而積薪不徙正所以養成直突之變霍光傳霍氏誅滅而告霍氏者皆封人為徐生上書曰云云曲突徙薪無恩渾焦頭爛額為上客耶云云今徐福數上言霍氏而獨不蒙其功惟陛下察之卒使副封朝去魏相傳又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屛去不奏相因許伯白去副封以防壅蔽帝善之霍氏夕誅同上霍氏殺許后之謀始得上聞云云霍氏伏誅功臣之肉未寒言霍光薨未幾而子孫無噍類矣赤族之誅霍雲霍山皆自殺禹腰斬顯及諸女昆弟皆棄市無噍類字出項羽傳嘗攻襄城襄城無噍類言無一人也則帝之所以待光者何其薄耶應前薄字夫愛其人則必有以全其功愛光之功則當保全之尊顯其身則必有以安榮其子孫愛光之身則當酬其子孫應冒頭小講數語豈有忍於夷其宗覆其祀而不忍於書其名哉説得痛快祀書覆宗絶帝之本心斷不然矣帝之心蓋他有所主也蓋是時呼韓邪單于方入朝貢出處本文彼雖外夷豈不知中國有博陸侯乎博陸侯霍氏赤族之慘見前注其心固疑帝以為忍矣光有功如此而且有赤族之誅非忍乎是雖擢髮以數山禹之罪霍禹山雲等日見侵削始有邪謀而中國明白正大之意恐未必能暴白於逺人也語意分曉夫中國本以信義服逺人也單于所服者信義而已今使奉珍執幣之始單于奉珍朝貢而首聞中國有薄於信義之名其不取輕於單于乎帝既誅霍氏是無信義何以服單于之心於是寓其意於麟閣之畫本文列功臣十有一人而冠霍光於其首始霍光終蘇武詳見本題注且以不名尊之博陸侯霍氏不書其名使之過而觀焉見而思焉想像當時氣象視其爵則皆爵也十一人均書其爵氏則皆氏也十一人均書其氏名則皆名也十一人皆書其名而霍光獨以氏稱而諱其名但云霍氏不書其名則將曰霍光有非常之功光有擁昭立宣之功而漢天子有非常之報宣帝未嘗不報之之厚圖其形且不敢名况親待其人乎光既死之後且以不名待之則親待其人為可知矣誅其子孫而尊榮其身漢之法顧不甚公乎誅霍山霍禹等而不書霍光之名有見於此則彼不待於言使單于知此意則不必問此不待於辨宣帝亦不必答而其所疑者固已冰消風釋矣應猶兾可以釋單于之疑一句然則帝之所以不名光者非為光諱也乃為已諱也正是諱已之過非諱其名也諱霍氏之誅也明知誅霍氏之過故以不名之禮待之而欲掩其過使帝而果以光為重則單于來朝之始獨不能發德音下明詔以湔洗霍氏之辜乎難宣帝無厚待霍氏之意麟閣既畫之後又不能捐一爵命一官以嗣續霍氏之祀乎又難宣帝既不曽湔洗霍氏之罪又不曽嗣續霍氏之祀徒以不名之虛禮何以蓋其過乎實惠不見於平時如前之説虛禮驟加於一旦麒麟閣之畫帝之心吾知其非誠矣應破題數語發盡主意抑嘗反覆麟閣圖畫之事而觀之蓋無一而不為單于設也末就蘇武上説始之以霍光帝之私也光居第一所以釋單于之疑也此見帝之私處終之以蘇武帝之公也蘇武居十一所以服單于之心也此是帝之公處牧羝之節十九年不屈於胸奴見前注仗漢節牧羝云云武留胸奴凡十九歲一旦歸自朔庭同上始以強壯出及還鬚髮盡白外國之人將謂漢廷以何職處之官不過屬國今也官不過屬國而位列於十人之下蘇武居十人之後則所謂十人者其光明俊偉又當何如耶亦是祖前篇説話折外侮於方萌張大漢之威聲帝於是乎得之矣應無一而不為單于設意後世論麟閣之畫第惟曰為褒功報德計帝之意不在於褒功報德而在於屈服單于而不知帝之微意固如是其深也又應冒頭意字吾固因霍氏之事復表而出之前篇謂宣帝麟閣之畫以蘇武居末者欲使單于知中國之有人此篇謂宣帝麟閣之畫以霍光居首者欲使單于知中國待大臣之厚雖意各有所指大抵皆歸於屈服單于上來機軸略同可以參看駁難本題格此篇與陳季南乾坤之藴論同意動靜見天地之心方監出處文中子天地篇子曰圓者動方者靜其見天地之心乎立説王通以圓者動方者靜為可以見天地之心是執其迹之一偏者然天之迹雖動而有靜之理存地之迹雖靜而有動之理寓動伏於靜之中而靜者又所以為動之地一元之氣相為流通而無窮此則天地之心也殆不容以執一而議彼王通以方圓而論動靜是拘其迹耳又何足以知天地之心哉考官批云辭旨精深學問淹貫關洛諸儒議論盡在是矣執其迹之一偏者王通以圓者為動以方者為靜是執其一偏之迹耳而求以窺造化之妙藴見天地之心易藴字是用繫辭乾坤其之藴字君子以為未也責王通不知天地之心夫易道不明久矣全篇純用易作議論承題便挈易來説自太極肇判合從太極説來稟其輕清者而形於上列子天瑞篇清輕者上為天濁重者下為地乂韓原人形於上者謂之天形於下者謂之地得其重濁者而形於下注見上是特其迹之粗焉耳應破題執其迹語或者徒見其穹然隤然於俯仰之間太玄元告篇天穹窿而周乎下易繫辭夫坤隤然示人簡矣隤音頺釋文柔貌也遂以為彼一於動此専於靜以天之圓為動地之方為靜而外是則無餘藴藴字是説心抑不思夫一元之氣亭毒於不言之表此是天地之心蓄唐楊炯渾天賦生之育之長之之亭之毒之其理本相為流通而無窮如太極圖所謂一動一靜互為其根是其理相為流通者也殆不容以執一而議説破王通不合執一偏之見四時之運功成者退動之中有靜斂藏之後生意復還靜之中有動動伏於靜之中而靜者又所以為動之地主意分曉吁此易道也彼王通氏何足以知之責王通觀其言曰圓者動方者靜其見天地之心乎引本出處以方圓而論動靜異乎吾所聞矣是特其迹之粗者動靜見天地之心請申之昔者嘗於易而有考焉應冒頭承題易字夫乾之謂乾取其能變化者也易乾卦乾道變化有動意而初九則曰潛龍勿用同上初九潛龍勿用有靜意蓋至於坤之柔順利貞易坤卦柔順利貞有靜意則又曰行地無疆同上行地無疆有動意夫研深索至宜莫易若也易繫辭極深研幾乂揚子聖人存神索至今而於乾則言潛潛有靜意於坤則言行行有動意聖人果何見歟難吾知之矣解天地本一理也動靜非二機也前􅒰説話憧憧往來朋從爾思易咸卦九四貞吉悔亡云云寂然不動感而遂通天下之故易繫辭全文此心説也此則為天地之心自是説不明牽上文來立説於是乎管窺錐測者莊子秋水篇是直用𬋩窺天以錐指地始曰天道止於左旋是天止於動耳見天文志否則曰地積塊耳是地止於靜耳氣列子天瑞篇天積也地積塊也吁為此論者蓋自列禦冦以來非一人也列子名禦冦亦孰知其所言者僅止於迹歟應破題迹字寒來則暑往可以言天之迹以天為止於動而不可以言心動中有靜方是天之心山峙而川流可以言地之迹以地為止於靜而不可以言心靜中有動方是地之心夫即其動靜之中詳演動靜二字而求其所以不専動靜者天非專於動地非專於靜尚未免泥於所見之粗以不専於動靜而言猶未見其心曽謂一方一圓可以論天地乎况以方為靜圓為動可以見天地之心乎草木吾知其春而生也龍蛇吾知其冬而蟄也學史記老子傳文法夫子稱老􅖫曰鳥吾知其能飛魚吾知其能遊獸吾知其能走云云然陽生於黃鐘之月前漢律厯志黃鐘黃者中之色故陽氣施於下泉向者不食之碩果剝卦碩果不食生意已萌芽於歸根復命之中應動伏於靜之中意其老子夫物藝藝各歸根歸根曰靜是謂復命而一隂為姤姤卦五陽一隂所謂摧枯剝落者雖曰未見其形生氣化之象朱文公太極圖解乾男坤女以氣化言也萬物化生以形化言也已不可以昔日之物論矣應靜者又所以為動之地然榮枯生悴者其迹也應迹字盈虛消息者其心也應心字易詳見周此其周流一機蓋精義入神繫辭精義入神以致用也有不容以俄測俄度者焉見今夫鼓舞萬物者莫神乎雷先説靜而未動意欲援復其見天地之心語故先把雷來説以雷在地中復故也陰凝而莫散物蹙而莫遂日之所不能燥雨之所不能濕風之所不能鼓雷一震焉而凝者散蹙者遂其機亦神矣全學蘇明允樂論雨吾見其所以濕萬物也曰吾見其所以燥萬物也風吾見其所以動萬物也隱隱谹谹而謂之雷彼何物也陰凝而不散物蹙而不遂雨之所不能濕曰之所不能燥風之所不能動雷一震焉而凝者散蹙者遂至此則靜者動矣及其凄然而秋也雷至秋則收聲則退藏諸密靜與夫舂撞呌號者動俱蟄其聲於冥然漠然之表動者復靜是果何為而然耶呌下文來吁雷在地中復見易復卦段有此一句故生一議論震下坤上則為復見復卦雷動物也不伏乎地之中動不伏於靜坤靜物也而升乎震之上靜見於動蓋至是而天地之心可見矣用此一句甚切天易復卦復其見地之心乎然則善論天地者將何如演餘意曰一動之間規矩兩存焉規動矩靜一息之頃智仁兩寓焉知動仁靜萬象紛錯有非有也動之中有靜不産而化無非無也靜之中有動直専翕闢當如吾夫子之繫易斯可矣易繫辭夫乾其靜也専其動也直夫坤其靜也翕其動也闢烏可岐其迹而論耶應破題迹字雖然離一為二固非真見認無為有亦非深知造化者就心上充廣去萬物有心於天地天地何容心於萬物用關洛諸儒語籟者自鳴孰使之鳴也莊子天籟自鳴蠖者自屈孰使之屈也易繫辭尺蠖之屈以求伸也時之至萬物不能却其來勢之極萬物不能強其反純用前輩議論天地何與焉謂天地何容心於萬物且以咸之一卦言天地之感也見易咸卦而聖人則不曰感而曰咸誠以有心於感者天地之末而無心於感者乃天地之妙伊川語夫論天地之感者蓋如是則未感之初可知矣至哉夫子之言曰易何思也何慮也又曰過此以往未之或知也並見繫辭思曰何思慮曰何慮知曰未知皆未嘗以有心而論天地也謂天地何容心於物惜夫無以此理語王通氏駁難本題格此篇與方監動靜見天地之心論同意乾坤之藴如何陳季南出處文中子立命篇薛收曰敢問三才之藴子曰天統元氣地統元形人統元識乾坤之藴汝思之乎於是收退而學易立説乾陽物也陽以健而運故動坤陰物也陰以順而承故靜然陽不止於動動之前已有靜陰不止於靜靜之前已有動動靜無端陰陽無始所謂乾坤之藴者如此今王通乃以天統元氣地統元形為藴是乾坤細之妙果可以形氣盡乎此意本前篇議論看自見之批云論有根據文有起伏理學透徹皆從關洛乾淳諸老語録中來真佳作也論曰動靜無端道之妙也動靜指乾坤道妙指藴始伊川云動靜無端陰陽無自太極判而隂陽分合從太極原頭説來極周子太極圖陰陽一太也惟一故神惟兩故化張子正蒙一故神兩故化動靜互根循環不已周子太極一動一靜互為其根而造化之妙莫窺焉見動中有靜靜中有動意夫穹然而居乎上太玄元吉篇天穹窿而周乎下隤然而處乎下者見繫辭詳見前篇注天地之形體也程子云以形體而言則謂之天健而動者陽之變見周子太極圖順而靜者陰之合同上太極動而生陽云云靜而生隂云云陽變陰合乃其性情之妙同上乾者天之性情其張南軒曰陽主乎變陰主乎合性情然也無動而不靜無靜而不動動中有靜靜中有動推之於前不見其始朱文公太極圖解文推之於前不見其始之合窮之於後不見其終同上引之於後不見其終之離非知道者孰能識之程子云云昔者聖人泄造化之藴而作易出處説學易故如此援引乾陽之始者氣之初坤陰之生者形之成前輩議論而陰陽大化升降上下盈虛消息無有止息見動之前有靜靜之前有動意大哉易也斯其至矣見周子太極圖王通因薛收三才之問而及於乾坤之藴見本題出處此收之所以悟之而學易同上於是收退而學易然藴之一辭摘出藴字説通雖言之且揚恐亦未能真知之也却抑乾坤之藴如何請究言之夫一陰一陽之謂道就繫辭一句原起最有據指陰陽而謂之道可乎朱文公語曰陰陽非道也所以一陰一陽者道也朱文公云形而上者謂之道形而下者謂之器陰陽亦形而下者耳故陰陽非道也所以一陰一陽者道也夫天地之間惟一陰陽動靜之理焉則所謂道也見上文諸句句是關洛乾淳儒議論太極者本然之妙陰陽動靜者所乘之機見朱子太極圖解謂其始於動乎而動之先已有靜謂其終於靜乎而靜之後復有動並見文公語録此紀綱造化流行古今不言之妙藴也而畫前之易於是乎在矣此段並照接題自太極判至造化之妙莫窮焉故夫子之繫易曰乾坤其易之藴耶見繫辭證得藴字切蓋乾陽物也坤陰物也並見繫辭云云乾坤二卦六陽六陰者乾坤之純也乾一卦六爻皆純陽坤一卦六爻皆純隂散之於六十四卦三百八十四爻陽者皆乾而陰者皆坤凡屬乾者皆陽凡屬坤者皆陰天地水火雷風山澤乾天坤地坎水離火震雷巽風艮山兌澤同此一陰陽一乾坤也見繫辭云云陰陽之機循環迭化聚散相因升降相求絪緼相揉相兼相制欲一之不能用前革諸儒緒論演一動一靜互為其根之意此其所以為易之道所以為乾坤之藴歟主司批此處云理透文老非淺學可到不然夫子何以繼之曰乾坤毁則無以見易易不可見則乾坤或幾乎息矣自題下至此凡四引繫辭中語節節足以發明王通之言毋乃得夫子之遺論歟就夫子繫易過王通氏説易上來今觀之易曰天行健地勢坤矣易乾卦天行健坤卦地勢坤蓋指乾坤之象而言而非乾坤之藴也以天地言乾坤則是象也非藴也曰乾用九坤用六矣諸卦無用九用六字獨乾坤二卦有之蓋指乾坤之數言而非乾坤之藴也以九六言乾坤則是數也非藴也闢户謂之乾闔户謂之坤易繫辭云云闔而闢闢而闔變化往來而不窮者其藴為何如同上一闔一闢謂之變往來不窮謂之通中闔是靜闢是動闔而闢則靜中有動意闢而闔則動有靜意此則為乾坤之藴乾知太始坤作成物見繫辭始者必成成者復始相摩相蕩而不已者其藴為何如繫辭剛柔相摩八卦相蕩始是動成是靜始者必成則動中有靜意成者復始則靜中有動意乾為陽動而動直之中有靜専焉則陽含陰也繫辭夫乾其靜也専其動也直坤為陰靜而靜翕之中有動闢焉則陰含陽也同上夫坤其靜也翕其動也闢陽含陰陰含陽亦是朱文公説話變化用於此最為活法乾坤之藴寧不於是乎在乾之動中有靜坤之靜中有動此則為真藴火陽根陰水陰根陽而陰陽之精互藏其宅也根陽根陰用周子太極圖語語陰陽之精互藏其宅用張橫渠動極而靜靜極而動而動靜之機互為其根也並用周子太極圖語推而至於乾降坤升而為泰泰往而有必復之理泰卦坤上乾下乾上坤下而為否否終而有必傾之道否卦乾上坤下剝盡而復反五陰為剝一陽為復剝繼以復夬消而姤長五陽為夬一陰為姤夬繼以姤無非此理之藴也諸卦動中皆有靜靜中皆有動此則為乾坤之藴人有人之乾坤如乾男坤女之類則為人之乾坤物有物之乾坤如乾龍坤馬之類則為物之乾坤並見語録其終其始其進其退其榮悴其盛衰理徹語老行文且有法度而隂陽動靜之理無不有焉乾坤之藴無不在焉分曉此所謂乾坤成列而易行乎其中者歟又引繫辭結非有學問安能及此王通答薛收之問而欲其於乾坤之藴而致思焉其旨深矣且説王通之言是然謂統元氣者為天之藴統元形者為地之藴見題注乾坤之藴果可以形氣而盡乎乾坤之藴不在形氣陰陽無始動靜無端應破題語全篇議論祖此兩句循環不息立天地之大義者乾坤精藴之所存乾坤之藴在此通或未能真知之也責王通不知此意亦應冒頭語雖然收之所問者三才之藴通獨答之以乾坤之藴而人心之妙不及焉又就出處設問作結尾豈不以無極之真二五之精妙合而為人者天地之藴盡在是矣周子太極圖無極之真二五之精妙合而凝乾道成男坤道成女通何贅於言使人極不立則窮而髙汚而下者特塊乎之形體爾其精藴孰從而窺之無人極主宰於其中則天地之道不立矣故辟上辟下而辟中有人焉太玄經天辟乎上地辟乎下人辟乎中參天地贊化育中庸惟天下至誠可以贊天地之化育與天地參矣彌綸而輔相之易泰卦財成天地之道輔相天地之宜而後乾坤有以自立也人極立則乾坤之道立然則人者其天地之心禮記人者天地之心也乾坤之藴歟愚故併論之推原立意格此篇與黃九鼎定名虛位論同意博愛之謂仁陳傳良出處韓愈原道博愛之謂仁行而宜之之謂義云云老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天罪也彼以煦煦為仁孑孑為義其小之也則宜立説仁道之大天下之公言也彼佛老之小吾仁一人之私言也韓愈慮天下之人不知仁道之大於是始以博愛言仁曰博云者大之也此説只是推原韓退之本意考官批云立意廣大行文圓活造語老蒼無一贅字真可為法道公於天下仁道之公之夲出處下文云天下公言也見之私者小之佛老私見小吾仁詳同上一人之私言也見下注君子不大其説以辨焉韓愈乃以博愛言仁小大字形博字公私大四字是眼目則昧者莫覺也如愈不以大言之則時人昏昧者不知此仁甚矣小見之害道也佛老小見害吾仁夫心與道一晦翁云仁者心之德愛之理道與仁一道即是仁仁與萬物一仁者以天地萬物為一體自佛老離仁於道德之説本題下文凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也而天下之言仁者始小不知博愛之理嗟夫轉歸正彼其小也於仁固無加損彼佛老之見小吾仁此其大也於仁亦豈加益此以博愛言仁君子必辨焉者指韓愈聖人之道包容天下若是然也歸主意道字韓愈作原道以闢佛老原道為闢佛老而作首之曰博愛之謂仁引夲文韓愈以博言仁以佛老小吾仁者也博字是大以我之大形彼之小凡君子之言道挈道字説起定以名之者原道云仁與義為定名非君子之意也覺天下之不知者也與後面相應天下不知易仲尼是以生生名易易繫辭生生之謂易天下不知中子思是以喜怒哀樂名中中庸喜怒哀樂未發謂之中天下不知善孟子是以可欲名善孟可欲之謂善理在天下自有定論總繳上文而何假聖人之名言者設問然則答上問非君子意也覺天下之不知也應原題下兩句仁之説具於易之元隱於洪範之極且説仁道之大處易乾卦元者善之長也君子體仁足以長人書洪範五皇極散於中庸之誠中庸仁者天下之達德也云云誠者天之道也詳著於論語之克已語顔淵一日克已復禮天下歸仁焉此四句夲之先儒議論博愛之名未立也六經中初無博愛之語愈也以博愛言仁引夲文定而名之原道仁與義為定名是豈為知仁者告也且疑辭母亦以為佛老不知仁者設也主意在此陋矣夫佛老之不知仁也佛老之不知仁以見之小也堯舜以仁官天下前漢蓋寬饒傳五帝官天下禹湯以仁家天下見上三王家天下伊周以仁相天下伊尹相成湯周公相成王孔孟以仁師天下孔子孟子為萬世師論此四句亦本之先儒議孰非此愛之加見得仁道之大處而佛老者曰仁小惠也佛老小吾仁吾相忘於道而已原道道其所道非吾所謂道也奚仁為不知仁嗟夫壁魚見日於隙曰日之明咫尺也坎蛙見水於井曰水之深尋丈也前漢馬援傳援曰子陽井底蛙耳妄自尊大换即是原道坐井而觀天曰天小者之説奪胎骨來佛老見仁於小惠而曰仁之施區區也以上二件此佛老之見小吾仁愈闢佛老者也發明主意不名言以大吾仁烏在其為闢佛老者哉不以博愛言仁不足以闢佛老之小見昔者生民之初天下蓋不能自立也推原古者聖人者以其博愛之仁凡為天下利悉為之備敘仁之功用大處其寒也衣原道寒然後為之衣其飢也食同上飢然後為之食其居之陋也宫室之同上木處而顛土處而病然後為之宫室其涉之危也舟楫之易繫辭刳木為舟剡木為楫舟楫之利以濟不通其羣之爭也書契之同上上古結繩而治後世聖人易之以書契以上五句夲之繫辭參之仁道來説是果何心為之耶設問此以仁心為之也答上問見得仁道之大處彼佛老生死吾仁之中而懵然以為無賴於仁其亦不知夲也甚矣責佛老不知仁嗚呼佛老之不知吾仁吾末如之何也已矣佛老不知仁其害小而且以其説禍天下之知仁者天下不知仁其害大禍孟子率天下之仁而仁義者必子之言夫世無韓愈吾見仁道其幾息也此韓愈所以以博愛而言仁太史公司馬遷嘗言申韓之慘刻皆原道德之説史記韓非贊老子所貴道虛無因應變云云申子卑卑勉之於名實韓子引繩墨切事情明是非其極慘礉少恩皆原於道德之意而老子深逺矣夫道德者若非為慘刻之唱而其流必至於此句斡得精神蓋其同死生絶親戚置天下於不愛之地者佛老基之也佛老之見如此故自佛老之説行天下之愛始衰佛老之害如此愈也以博愛名仁夲文亦以還天下君子長者之道借用文中子之語不以君子長者之道治天下者終危邦也而惟吾仁焉是歸也韓愈之見如此故嘗為之説曰魯哀公小儒孔子大之而儒始尊記儒行魯哀公問孔子曰夫子之服其儒服歟孔子曰丘不知儒服敢問儒行子曰儒有席上之珍以待聘夙夜強學以待問其自立有如此者叔孫武叔毁聖人子貢大之而聖人始尊叔孫武叔毁仲尼子貢曰仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也無得而踰焉佛老小吾仁韓愈大之而仁始尊以比面二事為比甚精切而好議論者又從而疵之曰又據他人之説愈之賢不加於孟子韓文釋老之害過於楊墨韓愈之賢不及孟子孟子於兼愛之墨力以不仁闢之孟子曰墨氏兼愛是無父也無父無君是禽獸也云云是邪説誣民充塞仁義也而愈之所言不幾佐墨者愈言博愛與墨子言兼愛略相似佐助之也噫遜美行也子噲之不取用之過也史記燕噲立以國遜其相子之國事皆決於子之又孟子子噲不得與人燕子之不得受燕於子噲廉亦美行也仲子之不取亦用之過也孟滕文公下匡章曰陳仲子豈不誠亷士哉云云孟子曰仲子惡能亷充仲子之操蚓而後可者也云云以母則不食以妻則食之以兄之室則弗居以於陵則居之愛豈賊仁者而墨子之非亦用之過也孟子吾聞夷子墨者墨之治喪也以薄為其道也云云之則以為愛無差等施由親始又賊仁者謂之賊又以上二事比墨子學者烏可醇孟而疵韓借用韓文孟氏醇乎醇荀與楊也大醇而小疵推原立意格此篇與陳傳良博愛之謂仁論同格定名虛位如何黃九鼎出處韓愈原道博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德仁與義為定名道與德為虛位故道有君子有小人而德有凶有吉老子之小仁義非毁之也其見小也云云凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也立説佛老以道德為虛無之物使韓愈力排之而固爭之曰有則彼方梏於所見之偏誰肯信吾道之不果無也於是屈吾道於虛位而實之以仁義之定名彼而有得於名之定則位之虛者不果虛矣然則屈吾道者乃所以伸吾道也批云發越透徹極其形容所謂命意如畫圖行文如走珠此篇是也屈吾道於無道德虛位而實吾道於有仁義定名君子之意微矣韓愈微意蓋欲誘佛老之虛無而歸吾道之有也夫道固不膠於有也喝破有字然豈果無也哉接上面有無字説非果無則是有仁義而已世之惑於清淨寂滅之説者原道今其法曰必棄而君臣去而父子云云以求所謂清淨寂滅者乃始認道於無佛老以道德為虛無使君子於此而固爭之曰有暗指韓愈則彼方梏於所見不能自有佛老之見徒知有道德之虛無豈信夫是道之不果無也安知吾有仁義之實其自是也必固其為惑也終不解矣用進學解語故莫若婉其辭以誘其心韓愈所以定名虛位之説曰道誠無也道德虛位而無之中有所謂有者焉虛位之中有仁義之定名彼方喜吾之説有似於彼之説彼佛老喜吾虛位之説似彼虛無之説未必不舍彼而唯吾之從矣舍彼之虛無而從吾道之有嗚呼此韓愈之於佛老所以陽豫而隂排之也敘本文彼以虛無為道德佛老故愈也寧屈道德之虛位而實之以仁義之定名虛位是無定名是有彼而有得於名之定則位之虛者不果虛矣説出主意然則其屈吾道也乃所以伸吾道也虛位者屈吾道曰定名者是伸吾道定名虛位如何請申之嘗謂屈吾道於一時者吾道之不幸也虛位之説伸吾道於千萬世者吾道之幸也定名之説就入題處屈吾道伸吾道六字雙説起嗟夫孰知屈者所以為伸不幸者所以為幸耶繳上文説夲意世變既降入戰國時道術爭鳴異端之學雖以孟子之賢亦難於直致其説借孟子以形韓愈故一見而稍可以語道謂齊宣王則以仁術告之孟子齊宣王曰齊國雖褊小吾何愛一牛即不忍其觳觫若無罪而就死地故以羊易之也云云曰無傷也是乃仁術也見牛未見羊也夫仁非術也斡一轉以術而謂之仁猶以道德為虛位而有仁義之定名然彼之所急者術謂齊宣而吾強之以仁謂孟子其不為術之勝者幾希若孟子只言仁而不以術告之則與齊宣不相入矣是以借其術而納之仁正説孟子夲意苟得於仁雖屈而名之曰術無傷也孟子言仁如韓愈之言定名孟子言術如韓愈之言虛位處前輩謂善用證者將不切用得切方是妙處故屈吾道於術而納之仁者孟子也屈吾道於虛位而納之定名者韓愈也以孟子之言比韓愈之言繳結引入題且愈亦嘗聞聖賢之言矣乎引聖賢之言證愈之説曰事親仁之實從兄義之實孟子仁之實事親是也義之實從兄是也以實言仁義則愈之所謂定名者其信然矣謂韓愈定名之説是志於道據於德語述而云云則道與德非泛然無據之物也反難韓愈虛位之説似未是愈何見而以虛位言耶設問豈固判仁義於道德之外耶疑辭原道一篇敘夲文以愛為仁博愛之謂仁以宜為義行而宜之之謂義由是而之足乎已者為道德由是而之焉之謂道足乎已無待於外之謂德則愈非之也明矣非判仁義道德為二物其殆屈吾道以排異端者歟説出夲意蓋異端之讎吾道異端指佛老亦猶吾道之讎異端也吾道與佛老不相入墨者孟勝死於荆其徒從之者百餘人見史記異端之死守其説者若此乎其牢不可破也見佛氏之説難攻況夫老於漢曹參傳蓋公善治黃老言使人厚幣請之又儒林傳寶太后好黃老術又汲黯傳黯好黃老言佛於晉宋齊梁魏隋之間原道黃老于漢佛于晉宋齊梁魏隋之間其言道德仁義者不入于楊則入于墨蔓衍至于唐至韓愈時行于世者不知其幾人矣言學佛老之徒甚衆以一旦之言而頓釋其幾千百年之惑以韓愈一旦之言而欲解自漢以至于唐之惑執一人之見而欲破千百人之説以韓愈一人之見而欲破佛老千百人之説言佛老之難攻如此是何異於一齊衆楚而欲強其齊語哉孟子謂戴不勝曰云云一齊人傳之衆楚人咻之雖日撻而求其齊也不可得矣故愈也將欲去之必固取之將欲抑之必固揚之抑其虛無之學而揚之以虛位之言學七書語將欲取之必姑豫之彼方駕虛無之説謂佛老吾不惟不辨其虛無之非謂韓愈方且托虛位之言以投其虛無之説説出夲意極分曉道德之位雖虛必有居此位者也此位非真虛居此位者實此名也有仁義之定名則虛位之中皆實也非虛也彼佛老者聞吾虛位之説道德虛位之語似佛老虛無之語則將退而自喜曰喜其無也吾之所謂虛者無以異於韓子之所謂虛矣形容得透徹聞吾定名之説仁義定名則又將退而自悟曰悟其有也韓子之所謂虛得此名而實有仁義之定名吾之所謂虛得無為清淨寂滅之歸乎佛老之學詳見其注得無異於韓子之所謂虛者乎佛老知吾虛位之中有定名之實始而喜終而悟繳前喜悟二字因吾之虛位得吾之定名結盡題字則佛老其聖賢矣佛老如知則與聖賢一矣尚何俟乎昌言以排之悉力以拒之耶應冒頭陽與而隂排之意是則愈之屈吾道政所以伸吾道也應冒頭語雖然是非愈之臆説也曰非愈已見之説欲引證之昔者聖賢之論大抵然矣又引揚子為證揚子之言仁義道德有曰合則渾離則散揚子問道篇道德仁義禮譬諸身乎夫道以導之德以得之仁以人之義以宜之禮以體之天也合則渾離則散彼豈不知老氏之去仁義談道德為非耶揚子亦知老子之意然不敢盡舉而非之也揚子不盡非老子之意亦與韓子一般方且取其言道德而獨於捶提仁義無取焉同上老子之言道德吾有取焉耳及捶提仁義絶滅禮學吾無取焉耳夫取而不盡取所以明老氏不知道之失取其言道德而不取其言仁義不盡取而取所以誘老氏而為吾道之歸不盡取其言仁義而取其言道德苟能因吾之言以求仁義如愈定名之説因仁義以求道德如愈虛位之説烏知老氏之果無取哉雄之意亦欲誘老子之歸吾道也是又揚雄之屈吾道以進老氏者然也應冒頭屈吾道意故曰屈吾道於一時而伸吾道於千萬世者應原題屈吾道伸吾道兩腳軻意也題下用孟軻事揚雄意也此論尾用韓愈意也夲題收拾得盡首尾照應所謂如常山蛇勢是也前篇以佛老小吾仁故韓子以博言仁此篇以佛老指道德為虛無故韓愈以道德虛位之説而誘之俾之歸吾仁義定名之實兩篇皆以闢佛老為主意以心會道格與君子之教如時雨論同格夫子與點如何陳子直出處語先進子路曽晳冉有公西華侍坐子曰云云點爾何如鼓瑟希鏗爾舍瑟而作對曰異乎三子者之撰子曰何傷乎亦各言其志也曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然嘆曰吾與點也立説孔門三子之言志各欲求用於當世惟曾點獨得浴沂風雩之趣而夫子與之蓋以其襟懷軒豁物我兩忘見髙一世而樂與人同道超萬物而動與時偕其清足以潔其大足以容其視三子者之撰大不侔矣夫子安得不與之批云形狀曽點廣大氣象宛然如見想其胸中亦得浴沂所詠歸之趣者知聖人所與之意謂夫子與點之意則知賢者所得之樂謂曾點所得之樂賢者之樂何樂也虛設問固非以得時行道之為樂也不是此一等樂亦非以眇然絶俗離世自樂其樂之為樂也亦不是此一等樂見髙一世而樂與人同暗説曽點不同三子之志而與冠者五六人童子六七人同浴沂之樂道超萬物而動與時偕謂其道超出萬物之表而逰於暮春之時其清足以潔形容浴沂其大足以容樂與人同物我之兩忘物我猶人已也而形體之順適詠而歸此則賢者之至樂點之至樂在此而聖人之所深與也夫子與之方孔門三子言志之時子路冉有公西華而曽點獨拳拳於浴沂風雩之趣本題注夫子與之同上吾與點也昧者不察他人不知夫子之意遂謂聖人以潔身不仕為喜謂夫子喜其如此嗚呼使聖人果以是為喜粘上文辨難則春秋之世潔身不仕者多矣如荷蕢而過者楚狂而歌者皆是潔身不仕之人何必點乎豈獨一曾點而反難至此或者苟知浴沂之樂正説本意其廣大同物之意與聖人同以曽點廣大意思與夫子合則可以識點之所存知聖人之所與矣繳盡主意亦應破題夫子與點如何請申其意士之出處不同而所樂不過三其樂有三樣食前方丈孟子食前方丈侍妾𢾗百人潭潭其居韓潭潭府中居垂銀黃銀魚金印被黼繡書黼黻絺繡此慕富貴者之所樂也此是一等樂彈鋏而長歌孟嘗君傳馮歡彈鋏而歌曰長鋏歸來乎食無魚處囊而脫頴平原君傳平原君謂毛遂曰賢士之處世譬若錐之處囊中其末立見云云遂曰使遂處囊中乃脫頴而出非特其末見而已出其尺寸以垂名於旗常竹帛之上有功銘于太常注旗也又後漢鄧禹傳使禹得效其尺寸垂功名於竹帛耳此好功名者之所樂也此又是一等樂道應冒頭固非以得時行之為樂然君子皆陋之不與也陋者卑也不以上二者之樂足與至於寬間之野寂寞之濱用古文語鼓琴行歌如楚狂荷蕢之徒邈然不以世之休戚介念慮自樂其樂此避世隱逸之士所以自樂其樂此又是一等樂出應冒頭亦非以眇然絶俗離自樂其樂之為樂而君子亦不與之以上隱者之樂亦不足與惟顔子一簞自適浩然天遊語雍也子曰賢哉回也一簞食一瓢飲在陋卷人不堪其憂回也不改其樂又莊子心無天逰則六鑿相攘出則四方羣士並遊於聖門從遊者三千入則陋巷塵囂卑湫之雜處陋巷見上注湫陋也行藏用舍時有不然語子謂顔淵曰用之則行舍之則藏惟我與爾有是夫而其樂卒不可改見上回也不改其樂故夫子曰惟我與爾有是夫見上注用得與字切雖然顔子之樂天也聖人之事也人不可得而同之也要引曽晳入題故以天人聖人賢者字為眼目曽晳之樂人也賢者之事也人可得而同之也人之樂則不如天之樂賢者之樂則不如聖人之樂曽晳之樂則不如顔子牽上同字人可以得而同之而同諸人只就同字上纒過結上生下則其襟量軒豁物我兩忘暗説曾點氣象廣大處其視孤介獨立閉關絶物者不可同日語與絶俗離世自樂其樂者不同儕之顔子固不可儕等也謂曽點之樂固不同顔子進之聖門亦在可與之列也過與字浴沂魯之禊事也邦之舊俗也本出處朱文公釋云浴盥濯也今上已袚除是也沂水名在魯城南地志以為有溫泉焉時和氣清春服既備敘本文暮春者春服既成環龜蒙鳬繹之郊者雜然而雲集龜蒙鳬繹魯之地名蓋與陳之宛丘鄭之溱洧同俗也宛丘陳國地名溱洧二水名鄭國當春時士女往觀乎洧之外並見詩彼逐豪華競鮮美之徒固隨物以蕩其志此一等遊冶之士固不識其樂至於憤時嫉世之士必且翛然逺逝此一等隱逸之士亦不識其樂恥以朝衣朝冠自齒於鄉人孟公孫丑孟子曰伯夷非其君不事非其友不友不立於惡人之朝不與惡人言立於惡人之朝與惡人言如以朝衣朝冠坐於塗炭也云思與鄉人立其冠不正望望然去之是亦隘矣同上孟子曰伯夷隘隘㣣也有如點也之在聖門入曽點授業久而見道髙應見髙一世道超萬物等語固不隨俗而俱化不隨上面二等人俱化冠者五六人童子六七人引本文此特瑣瑣者而欲與之並遊同樂曽點與此類人者遊謂之同流合汙亦可也似隨俗俱化者殆必有見矣必有見道處春秋之世説孔子時賢不肖倒植賈誼弔屈原賦聖賢逆曳兮方正倒植植音治去聲以吾夫子之才之美規天條地之規模用周公之才之美字往來諸侯之邦厯聘列國席不暇暖而所就竟如此韓諫臣論孔席不暇暖墨突不得黔區區如三子者謂冉有子路公西華而欲以瑣細自許求用安在其不見哂也出處上文子路率爾而對曰千乘之國攝乎大國之間加之以師旅因之以飢饉由也為之比及三年可使有勇且知方也夫子哂之求爾何如對曰方六七十如五六十求也為之可使足民如其禮樂以俟君子赤爾何如對曰非曰能之願學焉宗廟之事如會同端章甫願為小相焉沂魯水也又説沂水吾魯人也曽點上得聖人以為依歸孔子下與父母之邦之民共桑梓之樂與魯邦之人澡吾冠濯吾纓形容浴意身而華裾春服既成以徜徉于雩壇清曠之下風乎舞雩體舒氣適然後歌詠聖人之道浩然而歸詠而歸學晦庵集注云曽點之蓋有以見夫人欲淨盡天理流行隨處充滿無少欠缺故其動靜之際從容如此而其言志又不過即其所居之位樂其日用之常初無舍已為人之意而其胸次悠然直與天地萬物上下同流各得其所之妙隱然自見於言外視三子規規於事為之末者氣象不侔矣蓋與葛天無懷之民同一氣象太古之時回視三子者之撰殆鵬鷃之不侔也莊子逍遙遊篇有鳥其名曰鵬摶扶搖羊角而上者九萬里絶雲氣負青天然後圖南且適南𡨕也斥鷃笑之曰彼且奚適也我騰躍而上不過數仭而下翶翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也彼三子者其志將以求用也子路冉有公西華見前注用捨未可必則其視一世不如意之事豈能不置欣戚於其懷三子規規於事為之末大厦將顛非一繩所維西漢郭林宗云云全句正使獲用謂三子則區區一邦一邑之民竟何濟焉謂三子所見者小得晦庵集注云程子曰三子皆欲國而治之故夫子不取吾夫子之意蓋亦與斯世共浴沂風雩之樂者而局於時晦庵集注程子曰曽點狂者也未必能為聖人之事而能知夫子之志故曰浴乎沂風乎舞雩詠而歸言樂而得其所也孔子之志在于老者安之朋友信之少者懷之使萬物莫不遂其性曽點知之故孔子喟然嘆曰吾與點也乘桴居夷既不可論語子曰道不行乘桴浮于海又子欲居九夷轍環厯聘又不可韓進學解轍環天下卒老于行又厯聘列國慨然方有感於行藏用舍之際論語子曰用之則行舍之則藏則一聆點也之言適與意會故不自知其發嘆也見上詳注程子云云用舍有時遇不遇在天又敘孔子用舍行藏意也孟子吾之不遇魯侯天而吾與物周旋之念常使如一見上注晦庵云點之胸次真與天地萬物上下同流各得其所之妙同魯之人樂魯之俗沂魯水也吾魯人也用而行也則推此樂以同天下應用之則行不然卷而懷之語邦無道卷而懷之亦足與鄉閭之父兄子弟共有此樂應講中下與父母之邦之民共桑梓之樂語不猶愈於楚狂荷蕢之徒自潔其身自樂其樂也應冒頭亦非眇然絶俗離世自樂其樂語夫子之與正與此也夫子與點之意如此雖然有曽晳之見則可無曽晳之見而效之則其蔽也狂見上注又語陽貨好剛不好學其蔽也狂莊周列禦寇之倫二子各著書皆周末人其意趣頗類曽晳如晳之狂而狎侮仁義粳粃世教書狎侮五常又莊子道在粳粃又不得聖人為之裁制不得孔子裁制之故其狂益甚不如曽晳下至於劉伶阮籍之徒皆晉人則蕩然不繫之舟矣言其無檢束也斯人也其可與哉言此等人不足與然則學者其誰與喚下文曰漆雕開其實也語子使漆雕開仕對曰吾斯之未能信曽子其精也精愈於實顔子其天也天愈于精又應題晦庵集注程子曰曽點漆雕開已見大意同前格與夫子與點如何論同格君子之教如時雨蔡德潤出處孟盡心上孟子曰君子之所以教者五有如時雨化之者朱文公集注云時雨者及時之雨也草木之生播種封植人力已至而未能自化所少者雨露之滋耳及此時而雨之則其化速矣教人之妙亦猶是也若孔子之於顔曽是已又南軒云言如時雨之造化萬物也今夫物之萌者欲發甲者欲拆於是時而雨及之則皆可以遂矣蓋不先不後當其可而適與之曽無待於彼之求也君子之教人其察之精矣於其時而告之得之者如物之被時雨焉其於欲達未達之間所被者深矣立説祖朱張二先生之説謂物有機人亦有機機未發焉雖日沾溉之無益也機已發焉雖日浸漬之亦無益也惟當其欲發之時而造化之則所被者深矣君子之授教于人者以時亦猶雨之授於物者以時也機字是一篇主意批云立意妙造語新時文中之翹楚者聖賢之造化人才君子之教雨造化字便有時意惟迎其欲發之機以覺之而已欲發之時迎其機而能開覺之斯發矣夫教莫難於一機之轉移也接上機字物有機雨之及物要及時人亦有機君子之教人亦要及時機未發焉此是先時雖日沾溉之無益也沾溉字有雨意機已發焉此是後時雖日浸漬之亦無益也浸漬字有雨意是故自其欲發者造化之此乃是及時應破題字面有所不潤潤斯溥矣溥有雨意有所不及及則深矣深有雨意如是則雨之授於物者時矣歸在時上君子之授教於人亦猶是也又歸在君子之教人上猶用朱文公語教人之妙亦是也彼有受教於斯者謂人受君子之教者頴悟之天藏於一默頴悟猶發達也一默是欲發之時是欲達未達之機也此是欲發之時用南軒語迎其機而一覺之應破題語則向也凝然今也勃然凝結也勃發也何異萬物受時雨於造化也哉歸猶時雨意君子之教猶時雨孟子之論淵乎深矣亦不苟夫萬物一造化之造化也天之造化學者一聖賢之造化也人之造化均是造化也總上二句受則授受者自受也授者與人也如人有受道之質方可以教授之不受則不授若無受道之質則不可以教授之斯二者有機焉吾無所容吾力也應主意機字土膏未動此是未春時機藴於無雖霖潦有所不受應冒頭機未發焉雖日沾溉之無益也萬寶告成此是已秋時機顯於有雖甘霖有所不受應冒頭機已發焉雖日浸漬之亦無益也甲而欲茁拆而欲敷華而欲實此是欲發時軒應冒頭自其欲發者造化之用張南萌者欲發甲者欲拆語此一機也歸機字無者已露有者未達欲發之時造化溥一勺之甘天溥一勺之甘雨則沛然矣沛滂沛也裕如矣裕廣大也芃芃然而頴且栗矣芃芃秀也成詩芃芃黍苗陰雨膏之栗頴重頴也栗就也詩生民實穎實不授則已應授字授則無不受也及時而後有以授之彼無不受也以上只説時雨其於教也亦然以下歸在教字上蔽者扞於教扞以手捍之也耳提之戞戞然教之則不相合鈍者礦於教礦躍冶之金也面命之藐藐然教之則逺而不聽詩誨爾諄諄聼我藐藐塞者聵於教聵耳不聞也言傳之昧昧然教之則昏而不知我自授之彼不我受應前授受二字亦徒倍費聖賢之造化而已應前造化字發以上應冒頭機已發未二截意吁非其機也授之不受也以上言不及其時者有悱之機而發之其發也疾語述而不憤不啓不悱不發而朱文公集注云悱者口欲言未能之貌發謂達其辭有憤之機而啓之其啓也速見上得注云憤者心求通而未之意啓謂開其意未悱而發於發何功未憤而啓於啓何有程子云不待憤悱而啓發之則知之不能堅固此未發之時此君子之教所以非其時不可也要及時吾何以知其然耶引事顔之機隱於愚語為政子曰吾與回言終日不違如愚此覺之時也顔子及時可以教夫子乘其時而以克復之訓覺之語顔淵問仁子曰克已復禮為仁一日克已復禮天下歸仁焉則鼓元氣而雷域中出唐文全句而顔子盎然皆仁矣見上以如前輩云顔愚得之若以此施之互鄉之童子語互鄉童子見門人惑此是未及時者則機之懵者徒強聒耳懵無知也強聒費力也不受也無受道之資故不能受參之機韜於魯語參也魯此覺之時也曽子及時可以教夫子乘其時而以一貫之道覺之語子曰參乎吾道一以貫之則騰百川而雨天下唐文全句得此一句亦與上股移易未甚密但文字精采讀之不覺耳而曽子勃然皆忠恕矣語同上下文門人曰何謂也曽子曰夫子之道忠恕而已矣之前輩云參以魯得若以此施之空空之鄙夫語有鄙夫問於我空空如也是未及時者則機之蔽者徒扞格爾扞格不相入也不受也無受道之資故不能受孔以上二段用顔曽事蓋祖朱文公注本文云若子之於顔曽是已之語吁此其時也歸時字上互鄉之不顔也互鄉童子不如顔子鄙夫之不曽也鄙夫不如曽子我何以授彼亦何所受耶謂童子鄙夫不及時應前授受字若顔曽則時矣如此二人方是及時一覺而充滿勃鬱應破題迎其欲發之機以覺之意躍如之境生意周匝狀發之一字其發達於夫子造化之天也奚禦焉應前造化字孟子續夫子者也本出處未始不欲以夫子之造化顔曽者造化二三子也二三子如告子公都子樂正子之類奈何告子之機未觸其時未發與之言性則杞桞之孟告子曰性猶杞栁也公都子之機未觸其時未發與之言仁義則內外之孟公都子曰仁內也義外也善信之克有其機矣樂正子名克不盡心下浩生害問曰樂正子何人也孟子曰善人也信人也如樂正子方及時如孔門之顔曽授之則受矣應授受字好善優於天下孟子好善優於天下而况魯國乎克亦遊於孟氏造化中矣謂樂克得孟子時雨之教應破題造化字雖然天何言哉推廣題意論語天何言哉四時行焉百物生焉授者無授也不必授之百物生焉見上受之者亦無受也不必受於我風止雨休品彚呈鮮問之萬物莫窺其妙何者為雨本朝魏公詩云須臾一雨千山遍收斂神功寂似無心領神悟優入聖域問之學者談不容聲何者為教如顔子之請事斯語如曽子之曰唯心領神會皆不待教吁化矣至此地位大而化之之謂聖不然反結有受之者彼有受道之資無授之者我無以授之欲發之機渴於望霖猶大旱之望霖雨于是之時以我視物猶夏畦也孟脅肩諂笑病於夏畦奚其化如是則不能化此篇與夫子與點同機軸彼以樂字形容聖賢之心相契此以機字發明學者領悟之方可以參看反題辨難格君子絶德徐邦憲出處揚子淵騫篇君子絶德小人絶力或問絶德曰舜以孝禹以功臯陶以謨非絶德耶立説揚雄以舜之孝禹之功臯陶之謨為君子絶德此篇立説反駁謂之為君子之德則可謂之絶德則是以天下後世不可復能也夫德者性分之所固有夫人而能之也天下豈有不可能之德哉考官批云自首至尾委曲詳盡使子雲復生亦不復辨且文字照應節莭可觀論曰天下未嘗有不可能之事謂之絶德故不可能也此反駁絶德之意而賢者亦未嘗沮人以不可能之説責揚雄謂古人無絶德之説夫德者性分之固有夫人而能之也如孟子我固有之也古之君子所以形於孝暗指舜著於功暗指禹陳於謨暗指臯陶無非出於德之所固有而人之所能為應前面初非絶人之事也何嘗以此為絶德議者暗指揚雄見其於難事之親而盡其孝舜父頑母嚚而盡孝於難平之患而成其功禹八年治水而有功於巍巍極治無所容言之時而矢其謨臯陶處堯舜極盛而陳謨於是歆艷侈大指為絶德且據雄之説殊不知時有難易而德無加損時不同而德則一以謂為君子之德則可以三人之孝功謨為德則可謂之絶德則是以天下後世不可復能也應起語噫天下豈有不可能之德哉折倒絶德之説揚雄以舜之孝禹之功臯陶之謨為君子絶德愚未許為通論也責雄雄之説曰君子絶德小人絶力只説本文兩句辨難謂雄之説如此愚則曰自立説天下有絶力無絶德以力論之有一夫之力有十夫之力有百夫之力力有髙下之不同有一夫之力者舉十夫之任則不能勝矣一夫之力不如有十夫之力者有十夫之力者舉百夫之任則不能勝矣十夫之力不如有百夫之力者故烏獲任鄙古今謂之絶力者此二人古之有力者以扛洪鼎揭華旗人所不能而烏獲任鄙獨能之本文烏獲任鄙扛鼎抃牛非絶力耶若夫德則異於力矣德非力之比德出於性性出於天應冒頭承題性分固有之意天之命是性也無私則其畀是德也宜其無所私也接承題夫人而能之也舜禹臯陶古之所謂有德者舉本文三人來説自雄觀之則以為不可能也雄則為絶德自理觀之則未有不可能之德也此主意則謂無絶德之理夫世無虞舜而天下未嘗無聞孝舜孝之後亦有以孝聞者世無夏禹而天下未嘗無偉功禹功之後亦有以功稱者世無臯陶而天下未嘗無名言臯謨之後亦有以名言著者且古今一時也聖愚一性也今以彼為絶德而處天下於不可能之地辨倒雄之説則是舜禹臯陶之所為乃加於人一等之事未免為聖人所病三人未嘗以此為絶德豈所謂天下之達德哉中庸知仁勇天下之達德也聞人皆可以為舜矣孟子舜何人也豫何人也有為者亦若是未聞以舜為絶德而不可能也辨舜孝未嘗為絶德聞塗人皆可以為禹矣荀性惡篇塗之人皆可以為禹未聞以禹為絶德而不可能也辨禹功未嘗為絶德聞淑問如臯陶矣詩淑問如臯陶未聞以臯陶為絶德而不可能也辨臯謨未嘗為絶德雄之説奚自而發哉設疑為雄之説曰且據他説孝可能也事頑嚚之親而能竭全廪浚井之事者舜之孝所不可能也書父頑母嚚象傲乂孟子萬章曰父母使舜完廩捐階瞽膄焚廩使浚井出徔而掩之功可能也拯昏墊之患而能致隨山濬川之利者禹之功所不可能也書益稷禹曰洪水滔天云云下民昏墊又禹貢隨山濬川謨可能也居雍熙垂拱之朝而能申知人安民之戒者臯陶之謨所不可能也臯陶謨臯陶曰都在知人在安民是三者後世之無有此所以為絶德也謂雄之見三人之孝功謨如此不可能故謂之絶德嗟夫甚矣雄之不知德也轉歸本意德者本也孝也功也謨也皆德之所寓而後見者也三者皆德內之固有使必有是孝有是功有是謨然後可以希舜禹臯陶之德使舜不遇難事之親而顯其孝則舜為無德可乎舜之德不特見於事親禹不遇洪水之患而著其功則禹為無德可乎禹之功不特見於平水臯陶不遇明良之朝而陳其謨則臯陶為無德可乎臯陶之謨不特見於知人安民要之有德於中不必有全廪浚井之事然後可以為舜之孝應前面全廪浚井之孝凡能盡子職之所當盡者皆可無愧於舜矣但能盡孝便如舜不必有隨山濬川之利然後可以為禹之功應前面隨山濬川之功凡能盡臣職之所當盡者皆可無愧於禹矣但能有功便如禹之德不必有知人安民之仁然後可以為臯陶之謨應前面知人安民之謨凡能盡言職之所當盡者皆可無愧於臯陶矣但能陳謨便如臯陶之德略其迹之異而反其性之同應德者性分之固有則舜禹臯陶其絶人乎其將比我而同之乎未當以為絶德去孟子比而同之比聲逆雄之意蓋不過欲人知舜禹臯陶之德卓越超絶不可企及庶幾勉強力行以奔走乎君子之域否則易忽而不為之也謂雄之意稱三人之絶德欲人勉強學之殊不知天下之事誘之以易猶憚其難約之以同猶蔽於異以易與同且不能勉之况以難懼之而以異絶之况於難與異乎異應上難易同字孤聖人之道沮學者之心則雄之絶德之言斯為過矣用劉屏山文語全句責揚雄嗟夫君子之設心又奚以絶人為事哉君子之設心未嘗絶人以絶人為事雄之立論大抵然也見得揚雄之所見如此謂賢人必為人所不能則謂君子為絶德蓋無足怪者深責揚雄為絶德之説不幸而使斯言不顯行於世為底板張本吾懼學者以喬桀相髙以卓鷙相務謂喬桀卓鷙皆是為絶德欲過人一等者不循天下常行之理而動欲為絶人之事若為絶德之事其弊必至此孝不為舜而為申生左傳閔二年晉侯使太子申生伐東山臯落氏僖四年太子申生縊於新城功不為禹而為白圭孟白圭曰丹之治水也愈于禹孟子曰子過矣禹之治水水之道也是故禹以四海為壑今吾子以鄰國為壑謨不為臯陶而為公孫惠子其流弊有不可勝言者矣孝如申生功如白圭謨如公孫惠子皆德之弊幸而雄之言不顯行耳應前面説謹論就題發明格堯仁如天王質出處史記本紀其仁如天其智如神就之如日望之如雲立説天下被聖人之仁而不知有聖人之仁故安者自安莫知其所以安養者自飬莫知其所以養斯仁也天也蓋天以仁覆萬物而萬物未嘗以為天之功聖人以仁育天下而天下未嘗以為聖人之惠功深而形不露惠博而體不顯於此見聖人之仁與天為一徐進齋批此等題目最難形容又難反抑深説又不是此篇只就眼前事上發明天與堯氣象極為得體且是文字不麗不浮不蔓不枝真可法也論曰可使天下被聖人之仁堯之仁不可使天下知聖人之仁不知堯之仁便見如天意被聖人之仁而知有聖人之仁仁之小者也有方而可議也被其仁而知之則其仁安能如天之大被聖人之仁而不知有聖人之仁仁之大者也無迹而可名也被其仁而不知之則其仁方見如天之大惟其無迹之可名粘一句正説故安者自安莫知其所以安養者自養莫知其所以養莫知其所以然方見如天之功斯仁也天也打合仁如天意天以仁覆萬物而萬物未嘗以為天之功萬物不知天之功聖人以仁育天下而天下未嘗以為聖人之惠天下不知聖人之惠非天無功聖人無惠也就功惠二字斡一轉甚有力功深而形不露此是天之功大處惠博而體不顯此是聖人之惠大處是以蒙其功而不荷其功功惟其大故物不知其功受其惠而不感其惠惠惟其大故人不知其惠於此見聖人之仁與天為一應斯仁也天也意堯仁如天馬遷善論堯者也司馬遷作史記天下之人有心者能識當使有心而無所措其識形容不知意有目者能見當使有目而無所措其見形容不知意有口者能議當使有口而無所措其議亦形容不知意格以上三派遣文世之人君其中孜孜然其外戚戚然仁之小者惟恐天下之人心不識目不見而口不議也總上三派聖苟使之知則小了應冒頭被人之仁而知有聖人之仁仁之小者也有方而可議也諄諄而告曰兩股對説吾施布帛振而之寒彼將稱之曰仁也應冒接題有方而可議也然布帛窮而仁亦窮應仁之小者也聖人之仁能使天下舉無寒而天下終不知其為聖人之布帛如此方是仁之大處又諄諄而告曰對上股吾發榖粟振而之飢彼將稱之曰仁也應冒頭接題有方而可議也然榖粟窮而仁亦窮應仁之小者也聖人之仁能使天下舉無飢而天下終不知其為聖人之榖粟如此方是仁之大處如是而後能無所窮鎖上兩股故曰聖人之仁天之仁也應冒頭斯仁也天也今夫陽一噓而萬物生方其未生也有望乎陽也既生矣何有於陽陰一吸而萬物成方其未成也有望乎陰也既成矣何有於陰應天以仁覆萬物而萬物未嘗以為天之功聖人之仁一施而天下得其安得其養此如陽噓陰吸而萬物生成方其未安且養也有望乎聖人之仁也此如萬物未生成而望陰陽之時既安且養矣何有於聖人之仁此如既生成之後何有於陰陽夫惟萬物以為天何有於我于以見天之仁為甚深總上三𣲖文此一段應冒頭蒙其功而不荷其功天下以為聖人何有於我于以見聖人之仁為甚博此一段應冒頭受其惠而不感其惠何者虛設問鳥棲於木何有於木鳥忘木也魚遊於淵何有於淵魚忘淵也萬物忘乎天天下忘乎聖人粘上忘字此與鳥忘木魚忘淵何異帝堯在上舉堯事作者曰日出而作息者曰日入而息彼以為已之力也通厯帝堯之時有老人擊壤於路曰吾日出而作日入而息而不知所以作所以息者帝堯之仁使之各得其職也歸堯仁上飲者曰鑿井而飲食者曰耕田而食彼以為已之力也同上鑿井而飲耕田而而食帝何力於我哉不知所以飲所以食者帝堯之仁使之各遂其欲也歸堯仁上不惟當時之人莫之知後世之人亦莫之知也形容主意不知二字今考之書禹一出而洪水乃平堯無力也書舜典帝曰前咨禹汝平水土又孟子禹抑洪水而天下平仁果安在哉見不知意稷一出而百榖乃播堯無力也書益稷暨稷播奏庶鮮食又孟子后稷播時百榖仁果安在哉見不知意推之而莫能窮其端探之而莫能窮其狀見不知意抑非堯之仁有似乎天也耶打合本意能言之類誰如於孔子至論堯也不能言其名而以蕩蕩稱之蕩蕩者大而不可測也見仁之大而不知處民語大哉堯之為君也云云蕩蕩乎無能名焉不能言其功而以巍巍稱之巍巍者髙而不可量也見仁之大而不知處同上巍巍乎其有成功也惟其文章則可擬議故曰煥乎其有文章同上全句文章堯之粗迹也故可以指名此非堯之仁蕩蕩巍巍堯之至仁也雖孔子亦不可窺測此堯仁之大處孔子且不知况於他人乎蓋嘗推孔子之論而至於大哉之言蓋未嘗輕許也又以孔子大哉二字合乾卦大哉二字説大有方又不小了堯於易則稱乾曰大哉乾元萬物資始見易乾卦於語則稱堯曰大哉堯之為君也惟天為大惟堯則之見語子罕全句坤不得以並乾故止曰至哉坤元乾卦大哉乾元坤卦至哉坤元舜不得以並堯故止曰君哉舜也以坤至哉匹舜君哉以乾大哉匹堯大哉舜孟大哉堯之為君也云云君哉也然則極萬有之大無以加乎天極羣聖之大無以加乎堯説天與堯氣象極大天也堯也其相配也固宜應冒頭聖人之仁與天為一司馬遷之説蓋出乎孔子之論而不善用之引史記本文來説接上生下為底板張本日愚知其為日也雲愚知其為雲也至於天愚不知其所以為天也學家語文夫子稱老聃曰烏吾知其能飛魚吾能知其能遊獸吾知其能走云云至於龍吾不知其乘風雲而上天吾今日見老子其猶龍耶其仁如天是也無迹之可名就之如日則有迹之可依矣望之如雲則有形之可覩矣有方之可議當堯之時問之在朝在朝不知問之在野在野不知形容不知字好云列子仲尼堯治天下五十年不知天下治歟不治歟云顧問左右左右不知問外朝外朝不知問在野在野不知云云烏有如日之可就如雲之可望哉如日如雲則是可得而知矣曰其仁如天大之也取遷其仁如天之説曰就之如日望之如雲反所以小之也責遷如日如雲之譬反小了堯故曰馬遷得孔子之論而不善用之也應前面謹論元本於出處下并結語俱作望之如日就之如雲似與史記不合今以其字與文僣改正之故記之于此論學繩尺卷三
