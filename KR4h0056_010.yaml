body:
  text: 論學繩尺卷十宋魏天應編選林子長箋解因數明理格可與律吕參天兩地論參看數學河圖洛書經緯如何論吳有元出處前漢五代志劉歆云河圖洛書相為經緯八卦九章相為表裏立說河圖之數十雖為偶而以五生數統五成數則偶之中有竒洛書之數九雖為竒而以五竒數統四偶數則竒之中有偶動靜相乘竒偶相配此圖書所以相為表裏歟批云立論本之於易學啓䝉而又能發之以已意說得圖書經緯之妙處出非平時熟於講明一旦安能有此筆力較之魁論尤有力量學者宜熟讀此篇為數學入門論曰知動靜相乘之機朱子釋太極圖云動靜者所乘之機動為陽靜為隂竒為陽偶為隂河圖之數十則為偶洛書之數九則為竒機字有經緯意詳見圖書注則可以論數矣竒偶之數雖殊而機則一天地間一自然之數耳粘上數字吾孰從而探其機哉再入機字難機非數外物也解自數之中有機天不愛道託諸數以畀聖人見圖注又記天不愛道地不愛寶數天以河圖之數畀伏羲以洛書之錫夏禹數不自神必有機以妙其用數中有機相為經緯是以竒偶不滯於一偏而動靜相因於無窮河圖以五生數統五成數則竒之中有偶洛書以五竒數統四偶數則偶之中又有竒使非有機行乎其間則竒一於動偶一於靜判然不相為用安得比而同之耶獨陽不生獨隂不成竒而無偶則為獨陽偶而無竒則為獨隂如何得相為經緯且十其數者河圖也圖之數天一地二天三地四天五地六天七地八天九地十九其數者洛書也書之數戴九履一左三右七二四為肩八六為足五為腹心然圖之數偶未嘗不合書之竒十數雖偶亦合九數之竒書之數竒未嘗不合圖之偶九數雖竒亦合十數之偶於其參差不齊之中而有彼此錯綜之妙造化之機亦神矣圖數十書數九雖若參差不齊而竒偶相為經緯其機則一而已應前神字是機也泄於河洛闡於羲禹伏羲因河圖而畫八卦夏禹因洛書而叙九疇吾不謂劉歆亦足以知之本出處河圖洛書經緯如何請因班固所援劉歆之言而申之班固作漢五行志引劉歆之言如此天地果有機乎掇機字說起學栁子厚封建論文吾聞天地無心也而有機乎哉機非天地之所容力也明道云天地之常以其心普萬物而無心造化自然之理流行乎宇宙間應冒頭天地間一自然之數耳一之為太極二之為隂陽五之為水火木金土出於機者也太極圖云太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根云云陽變隂合而生水火木金土五行一隂湯隂陽一太極太極本無極入於機者也同上五行一隂陽也隂陽一太極也太極本無極也機又莊子至樂篇萬物皆出於皆入於機是機也固造化之所以神而造化亦不能自祕其神應冒頭神字河圖洛書豈非妙隂陽五行之數而泄其機以示人者乎謂圖書即太極圖中之妙蓋天下之理動而無靜靜而無動則其體為一偏周子通書動而無靜靜而無動物也朱子釋云有形則滯於一偏動而無動靜而無靜則其用為無窮同上動而無動靜而無靜神也云云混兮闢兮其無窮兮一竒一偶之謂數應冒頭數字動靜相乘之謂機應冒頭機字故凡積數之極至於什百千萬殆若不可勝算康節加一倍法而要其統㑹則不過竒而偶偶而竒二者迭相終始耳此其本之朱文公易學啓䝉議論然則圖書之數即太極之隂陽五行圖書之機即隂陽五行之一太極也合就原題所援之語謂其數雖異其機則一明乎此則經緯之妙可得而見矣夫自河馬效祥孔安國云河圖者伏羲氏王天下龍馬出河遂則其文以畫八卦洛龜薦瑞同上洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九類以天數配地數兩其五行而定位之易學啓䝉云天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之又易繫辭天數五地數五五位相得而各有合則知圖之為圖其數偶其位亦偶河圖十數為偶五位相合亦為偶以陽數統隂數縱橫十五而迭數之易學啓䝉云洛書以五竒數統四偶數而各居其所蓋主於湯以統隂而肇其變數之用也云云洛書之縱橫十五則知書之為書其數竒其位亦竒洛書九數為竒而四正之位之數亦竒竒主於動洛書之數偶主於靜河圖之數動者常流行洛書之數靜者常對待河圖之數若齟齬而難合焉烏在其相經緯耶且設難謂書數一於竒圖數一於偶曰是不然解上文說主意隂陽無獨立之理而常有相須之義有陽必有隂兩兩常相對動靜無一定之體而每有相乘之機動極則復靜靜極則復動淵矣哉圖書之數乎應冒子數宇神矣哉是數之機乎應冒子機字蓋圖雖偶數十數是偶然以一合六以二合七以三合八以四合九以五合十其數未嘗不竒啓䝉云一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中河圖五位皆竒數故以河圖為經則洛書為緯矣河圖之數雖偶而又有竒數存焉書雖竒數九數是竒然以一含九以二含八以三含七以四含六其數未嘗不偶啓䝉云洛書之縱橫十五而七八九六迭為消長虛五分十而一含九二含八三含七四含六則參伍錯綜無適而不遇其合焉洛書去其中之五數則縱橫皆十數故以洛書為經則河圖為緯矣洛書之數雖竒而又有偶數存焉圖之內而生數則陽居下左隂居上右外而成數則陽居上右隂居下左啓蒙云河圖之一二三四各居其五象本方之外而六七八九十者又各因五而得數以附於其生數之外云云其生數之在內者則陽居下左而隂居上右也其成數之在外者則隂居下左而陽居上右也書之四正皆竒四隅皆偶以明獨陽不生獨隂不成是動靜之相為經緯者也洛書之文九前一後三左七右四正皆竒數四前左二前右八後左六後右四隅皆偶數故靜以動為用而圖之數即書偶之中有竒是圖與書合動以靜為用而書之數即圖竒之中有偶是書與圖合一動一靜互為其根用太極圖語其參伍錯綜之變歟其往來不窮之通歟用易繫辭語說經緯意不然河圖授羲洛書畀姒時異數殊見前注吾夫子乃兼取而著之於大傳何哉難繫辭云河出圖洛出書正以明二而一之義也解圖書之義則一劉歆經緯之論其亦得聖人遺意乎且揚之而繳論腹之意雖然歆亦有遺論焉却抑之夫河圖也洛書也大衍也三者皆相為經緯者也豈惟圖書為然哉又添大衍來打合說河圖五十五數洛書四十五數大衍之數五十故河圖而虛十則圖之書也河圖虛其十則為洛書之四十五數虛五則圖之衍也河圖虛其五則為大衍之五十數洛書積五得十則書之圖也洛書加十數則為河圖之五十五數以五含五則書之衍也洛書加五數則為大衍之五十數大衍之加五减五則又圖書之相表裏也大衍之數五十加五數則為河圖减五數則為洛書以上議論皆本之朱文公易學啓䝉歆又何足以知之責劉歆未必知此數此非愚臆說也愚得之書易書易得之天學楊誠齊易傳序語云愚聞諸先儒先儒聞諸三聖三聖聞諸天謹論因數明理格可與河圖洛書經緯論參看數學律吕參天兩地如何論詹登龍出處前漢律歷志律十有二陽六為律隂六為吕律以統氣類物一曰黃鍾二曰太簇三曰姑洗四曰㽔賓五曰夷則六曰無射吕以旅陽宣氣一曰林鍾二曰南吕三曰應鍾四曰大吕五曰夾鍾六曰中吕云云皆參天兩地法也立說黃鍾陽律為六律之首其寸有九九而九之凡八百一十分而當歷之一統所以合參天之數林鍾隂吕為六吕之首其寸有六六而六之凡三百六十分而當期之日所以合兩地之數參竒也兩偶也六律六吕展轉相生而必以黃鍾起數之始者蓋以陽先於隂而竒為偶所宗也批云以黃鍾為律本立說有源委有考究熟於數而精於理者也器數之學固是難曉學者亦須平時講究論曰古人因數以制器因陽竒之數為律因隂偶之數為吕而必有為之宗十二律以黃鍾為本一陽肇於此所以法造化者精矣包參天兩地意見立說注夫有數斯有器數是隂陽器是律吕數者隂陽竒偶之判一三五七九是陽數之竒二四六八十是隂數之偶而器者隂陽竒偶之寓正月三月五月七月九月竒數屬陽律二月四月六月八月十月偶數屬隂吕以古人制器之微律吕至於稽擬造化而作則參天兩地是豈徒數而然者含蓄本意未發出蓋天地之間陽道常贏而隂道常乏贏有餘也乏不足也陽之數竒常有餘隂之數偶常不足又見下注陽之數進而用九天之中數五一三在上七九在下故曰進而用九隂之數退而用六地之中數六二四在上八十在下故曰退而用六今而黃鍾之數以九而參天之陽黃鍾陽之律其寸有九九而九之凡八百一十分而當歷之一統所以合參天之數林鍾之數以六而兩地之隂林鍾隂之吕其寸有六六而六之凡三百六十分而當期之日所以合兩地之數至於律吕之相生而必以黃鍾起數之始本出處黃鍾之宫是為律本又隋律歷志仲冬之月律中黃鍾黃鍾者首於冬至陽之始也此即陽先於隂而竒為偶所宗也本文黃鍾初九律之首陽之變也隂陽相生自黃鍾始天地之數陽以肇乎隂參天兩地之數始於天律吕之數陽以首乎隂六律六吕之數始於黃鍾數之所始即器之所法總上器數二字說主意古人豈以臆度而準造化哉包參天兩地意班固志漢律歷言律吕參兩之法叙本文而以黃鍾之九為律之首林鍾之六為吕之首本出處初九律之首初六吕之首夫九之於六陽有餘而隂不足也陽之九數有餘隂之六數不足見前注律之於吕陽先隂而隂承陽也一律與一吕相間律居吕之先吕承律之後黃鍾之起十二律一陽之生萬物也主意在此應破題必有為之宗者一句器於此乎制法於此乎立包器數意漢儒如固亦知古人制作之遺意歟取班固志律吕之言律吕參天兩地如何請因固志律歷而申之固之志曰皆參天兩地法也直述本文起文脈不斷夫參兩天地吾易法也以易之數為證五本出處下文云天地之數五十有并終數為十九易窮則變故為閏法參天九兩地十是為㑹數參天數二十五兩地數三十是為朔望之㑹非律法也問說易數與律數不同固何所見而有是言哉難班所述之言蓋吾易之法解上文一陽萌動於地雷之復易復卦五隂在上一陽在下本卦云雷在地中復由是歷臨泰壯夬至乾為左行之陽二陽為臨三陽為泰四陽為壯五陽為夬六陽為乾歷姤遁否觀至坤為右轉之隂一隂為姤二隂為遁三隂為否四隂為觀五隂為剝六隂為坤所以妙出入而神闔闢者復之一陽實肇之謂六隂六陽之數自復之一陽始用易繫辭一闔一闢謂之變云云利用出入民咸之謂之神若夫制律之法起於黃鍾九寸之管隂陽之數始於復亦猶律吕之數起於黃鍾由是太簇至中吕為下生之陽一陽黃鍾二陽中吕三陽太簇四陽夾鍾五陽姑洗六陽中吕本文注陽生隂曰下蕤賓至應鍾為上生之隂一隂蕤賓二隂林鍾三隂夷則四隂南吕五隂無射六隂應鍾本文注隂生陽曰上上生六而倍之如林鍾生太簇南吕生姑洗應鍾生蕤賓大吕生夷則夾鍾生無射皆三分益一下生六而損之如黃鍾生林鍾太簇生南吕姑洗生應鍾蕤賓生大吕夷則生夾鍾無射生仲吕皆三分損一其皆自黃鍾而來十二律起於黃鍾之一即易之法一陽以生天地之萬物萬物相生始於一陽律之法以黃鍾之陽而生律吕之萬變十二律相生始於黃鍾此極動生陽極靜生隂用周子太極圖語無物不統於太極亦無物不具乎太極用周子太極圖解語律之器孰謂不存易之道哉律之有黃鍾猶易之有太極嘗即律吕而考之考䆒律吕之制淳古之葦籥女媧之笙簧律吕所由始也記明堂位葦籥伊耆氏之樂也注籥如笛三孔伊耆氏古天子號又女媧之笙簧注女媧三皇承伏羲者辨雌雄於翽羽分左右於隂陽律吕所由用也前律歷志黃帝使伶倫取竹之嶰谷斷兩節而吹之以為黃鍾之宫制十二筒以聽鳯之鳴其雄鳴為六雌鳴亦六此黃鍾之宫而皆可以生之是為律本于翽羽鳯也詩鳯凰飛翽翽其羽夫律吕一器也而參天兩地也何居將本題設問粵自太極肇分易數以泄答從原頭說來極易繫辭易有太一三五七九天數之竒也天一天三天五天七天九見易繫辭參天之數進陽於有餘而易用九焉與律之數用九同用應冒子陽之數進而九求之於律則黃鍾太簇姑洗陽之陽也十一月律中黃鍾正月律中太簇三月律中姑洗皆是陽數之竒然一陽為十一月三陽為正月五陽為三月今黃鍾太簇姑洗皆以陽數應陽月是謂陽之陽也蕤賓夷則無射隂之陽也五月律中蕤賓七月律中夷則九月律中無射皆是陽數之竒然一隂為五月三隂為七月五隂為九月今㽔賓夷則無射以陽數應隂月是謂隂之陽也陽常贏而律之九數足以參天之一三五矣見前注黃應冒子鍾之數以九而參天之陽二四六八十地數之偶也地二地四地六地八地十見易繫辭兩地之數退隂於不足而易用六焉與吕之數用六同應冒子隂之數退而用六求之於吕則大吕夾鍾中吕陽之隂也十二月律中大吕二月律中夾鍾四月律中中吕皆隂數之偶然二陽為十二月四陽為二月六陽為四月今大吕夾鍾中吕皆以隂數應陽月是謂陽之隂也林鍾南吕應鍾隂之隂也六月律中林鍾八月律中南吕十月律中應鍾皆是隂數之偶然二隂為六月四隂為八月六隂為十月今林鍾南吕應鍾皆以隂數應隂月是謂隂之隂也隂常乏而吕之六數足以兩地之二四矣見前注應冒子林鍾之數以六而兩地之隂不特此也更推廣說去十二律起於黃鍾之宫本出處見前注左行而生吕下生六吕右轉而生律上生六律求之天地則一之數自南而起冬至子之半而萬化根焉前律歷志天統之正始於子半又邵康節詩云冬至子之半天心無改移一陽初動處萬物未生時隂其有不宗於陽者乎陽先隂而生乾坤為大父母而黃鍾至中吕蕤賓至應鍾之太隂陽即參兩此乾坤也乾六陽之極為大父坤六隂之極為大母黃鍾至中吕乃陽月之極蕤賓至應鍾乃隂月之極是為太隂陽邵康節云乾坤為大父母復姤為小父母復姤為小父母而黃鍾於大吕太簇於夾鍾之小隂陽即參兩此復姤也復一陽之始為小父姤一隂之始為小母黃鍾之陽間以大吕之隂太簇之陽間以夾鍾之隂是謂小隂陽析木星紀之次鶉首鶉尾之躔仰而參之皆天之陽應鍾亥之氣也十月建焉而辰在析木黃鍾子之氣也十一月建焉而辰在星紀蕤賓午之氣也五月建焉而辰在鶉首夷則申之氣也七月建焉而辰在鶉尾並見禮太師注燕齊秦趙之分大梁魯晉之墟俯而兩之皆地之隂於律為應鍾斗建在亥今燕分野於律為大吕斗建在丑今齊分野於律為蕤賓斗建在午今秦分野云云於律為夾鍾斗建在卯今魯分野於律為中吕斗建在已今晉分野並見郡國志六上以象六氣之神進而生六律之陽五下以法五行之運退而生六吕之隂旁而通之又皆參天兩地之妙參竒也兩偶也竒數參天偶數兩地夫天地以一陽而肇隂陽之化育太極動而生陽有陽而後有隂律吕以黃鍾之一而肇上生下生之經緯黃鍾下生林鍾林鍾上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鍾應鍾上生蕤賓蕤賓下生大吕大吕上生夷則夷則下生夾鍾夾鍾上生無射無射下生中吕律吕一隂陽也隂陽一天地也天地一太極也總結前意孰謂固漢儒也而能窺古人之用心歟取班固志律歷之言嗚呼揚雄之草太𤣥也終於八十一家取黃鍾之數而推之也揚雄傳𤣥首四重者非卦也數也其用自天元推一畫一夜隂陽數度律歷之紀九九大運與天終始故𤣥三方九州二十七部八十一家二百四十三表七百二十九贊分為三卷曰一二三與泰初歷相應亦有類帝之歷焉鄧平之造歷也終於八十一分取黃鍾之數而乘之也前律歷志洛下閎運算轉歷其法以律起歷與鄧平所治同名曰陽歷隂歷陽歷先朔月生隂歷朔而後月乃生乃詔遷用平所造八十二分律歷黃鍾以陽律之九積八十一而周流變化無盡焉同上天之數始於一終於二十有五其義紀之以三故置一得三凡二十五置終天之數得八十一以天地五位之合終於十者乘之為八百一十分應歷一統黃鍾之實也注十九歲為一章一統凡八十一章故自大吕以下律吕相間以次而降至應鍾而極而黃鍾獨為十二律之首見本題注及圖猶一陽之復萬物化醇而宇宙民物由此造也乾陽坤隂由此運也應原題用復卦事一陽肇於黃鍾至應鍾而極猶一陽生於復至純乾而極參兩之法至此極矣繳盡大講意雖然易之數先天之數也原題已用易至此又用易為證先天之數由中而起中者天地之至數也天之中數五注一三在上七九在下地之中數六注二四在上八十在下見律歷志故乾一至坤八而復為之中一陽生於復而復居乾坤之中律陽而吕隂而黃鍾亦起於中陽肇於黃鍾而黃鍾居律吕之中今觀仲冬之月隂窮陽返而黃鍾之氣應焉非中而何哉記月令仲冬之月律中黃鍾故曰中心法也以中為主雖易之法亦律之法也總繳中數之說鍾律歷志黃者中之極君之服者種也五聲之本生於黃鍾之律九寸為宫此言數而本於理之妙漢儒家法未之有聞也責漢之諸儒不知中之說非特固不知也吾於固乎何責謹論順題發明格與王道之端論同幾字主意天人分際如何論陳協道出處前漢儒林傳序公孫為學官悼王道鬱滯乃白丞相御史言制曰導民以禮風之以樂其令禮官興禮崇化厲賢謹案詔書律今明天人分際立說天人之分是相判之勢天人之際是相與之幾其勢雖相判而其心甚欲相合人君能察其相與之幾而使之合則相判之勢可以合否則合者才一際而分之上下又判乎其不相合矣批云文脈貫串如聨珠文勢轉摺如弄丸此止齊筆法也時文中久不見此作論曰隱顯之判者勢也言天人之分勢宇是分而其所以相與者則幾也言天人之際幾字是際際董仲舒䇿云天人相與之幾之相與甚可畏也先提起幾宇說交際之意於其可畏而忽之接上可畏字反說學陳止齊文必至於孤其相與之心而成是相判之勢矣反說天人之際不相與則天人之分相判古之聖人知天人之勢雖相判穿上勢字說分意而天人之心則甚欲其相合相合只是相與說際字意以甚欲相合之心而拘以相判之勢又申上文則吾所以使之合者穿上合字最莫難於一際之幾也照主意幾字此幾也所際如所欲焉又穿上際字幾字則勢之判者雖不能以不異穿上勢字判字說分意而此心之所以相與者未嘗不往來於其間相與之際是幾一或觖然於其心反說觖音缺吾恐其合者才一際穿上合字而分之上下者又遼遼乎其不相屬矣不合其際則其分判矣嗚呼天人交際之幾豈不甚可畏哉照主意幾與接題可畏字君人者當於其幾者而深思焉可也穿上幾字天人分際如何吾於漢儒林傳深有味於斯言學本出處抑漢人能言之其幾則未必能察之也抑漢人不知天人之幾為後面張本嘗試論之穹然而上者為天藐然而下者為人此其勢本相遼而不相屬也說天人之分應冒子勢字勢不相屬則欲其心之相與也亦難說出天人之際應冒子相與字然而有幾焉是不可以不察也應冒子幾字察字今夫賤臣扣胸也而霜亦是學止齊文法天燕鄒衍傳衍事燕惠王左右譛之被係於獄仰而哭盛夏為之降霜江淹曰賤臣叩心飛霜擊於燕也孝婦茹寃也而旱前漢于定國傳云云太守竟論殺孝婦郡中枯旱三年人亦何德於天也而天之於人也每數數然用情以上說天之心欲與人相合慶雲也而歌頌宋符瑞志帝舜時和氣普應慶雲興焉若煙非煙若雲非雲郁郁紛紛蕭索輪困百工相和而歌慶雲帝乃唱之曰慶雲爛兮禮漫漫兮日月光華旦復旦兮云云暑雨也而怨咨書君牙夏暑雨小民惟曰怨咨冬祈寒小民亦惟曰怨咨天亦何意於人也而人之於天也喜怒往往緣之而起以上說人之心欲與天相合語用董仲舒䇿嗚呼此可以見其甚欲相合之心矣應冒子相合之心字故自其勢之異者而觀之則上下之判者分也分是相判之勢應前勢字自其心之微者而察之則幾乎相與之一際也際是相與之心應前心字善惡之關禍福之門也天道福善而禍淫惠逆之括吉凶之的也書大禹謨惠迪吉從逆凶惟影響若然者天人之一判一合非於天乎自皆於幾乎自也歸幾宇上應前判字合字正說於幾乎自而我不察其所以相與之幾又傳過上文應冒子察其幾字反說則其心之欲合者寧不缺然於驟合隨散之際乎應冒子吾恐其合者才一際而分之上下者又遼遼乎其不相屬嗟夫天人之心驟合而隨散甚非世道之福也又傳過上文謂天人之心甚欲其相合是以古之聖人其察諸此也熟矣應冒子察其幾意仰觀諸天見其星辰之運動日月之流轉順而無逆也常而無變也天之勢如此則不獨曰此天之所欲也則亦曰是人之所欲也天意欲與人之心相合俯觀諸人見生齒之繁滋獄訟之哀息安而不危也恬而不驚也人之勢如此則不獨曰人之所欲者如此而曰雖天也亦欲之人之心欲與天之心相合後一股與前一股相對故夫察天之文非懼禍也書舜典以齊七政注舜察天文以審已哀人之窮非市恩也莊子舜問於堯曰天王之用心何如堯曰吾不敖無告不廢窮民苦死者嘉孺子而哀婦人又見韓文一政事之施必致其謹書無逸繼自今我其立政立事云云和我庶獄庶慎一號令之發必欲其臧書發號施令罔有不臧非惴惴焉為是自貶也接上生下誠恐夫上有以干天和下有以拂人意其於相與之際或不滿於我應主意相與字而其合者不能保其散之不易易應前合字散字此其幾至可畏也應冒接題幾之相與至可畏也嗚呼何可忽諸此哉應接題於其可畏而忽之昔者嘗讀揚子見其有聖人和同之際之論揚問神篇聖人存神索至云云和同天人之際使之無間者也雄之立為此論辭亦已矣推原揚雄本意可已而猶未巳猶有所謂使之混然無間者焉見上注無間字形相與意雄豈贅辭哉接上生下雄非贅也是幾說也應主意幾字欲其分之相遼絶者而心之相和同也應前分字心字心相和同則勢雖異而實混然無間也應前勢字無間字繳抑其所以混然無間者則在於際之之幾引無間字歸在幾字上使之常合而不使之乍合乍判也雄之言有㫖哉應前合字判字取揚雄之言不特雄也昔者舒也嘗於對䇿而為帝言之矣又舉董仲舒之言為證曰天人相與之際甚可畏也仲舒對武帝云云臣謹案春秋之中視前已行之事以觀天人相與之際甚可畏也凡論用相與字可畏字皆本諸此夫略其所未分而惟以際言喝出際字舒之望帝能察其幾以和同天人之心者切矣應前察其幾字奈之何帝之不察此歟謂武帝不能察其幾天旱也而乾封本紀天漢元年旱帝曰天意其在乾封乎於是封泰山人盜也而直指同上琅邪羣盜阻山攻城道路不通遣直指使者暴勝之等衣繡衣杖斧分捕刺史郡守以下皆伏誅其分之遼遼而際者曾不一見說武帝時天人之分已判而天人之際未相合建元元光以後漢事概可見矣建元元光皆武帝年號詔令訓辭徒言之何益見本題注說武帝時詔書律令徒言天人分際何益噫漢往矣不必論也擺去漢意後之於天人分際者暗推尊今日有能於舒與雄之所謂相與無間者而深長思之亦可以過半耳總前揚雄仲舒所言謹論順題發明格與天人分際論同幾字主意王道之端如何論李瓘出處前漢董仲舒䇿臣謹案春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也立說端者初也初者幾之所伏幾者是非之界仲舒之告武帝使之求王道之端是其幾之善者果能由是而行之則純乎理而不雜乎欲純乎王而不雜乎伯也批云以幾字主意說新文老語精意婉中間只說武帝好處大有含蓄佳作也論曰於君心之初而决其幾幾指端字幾周子通云誠無為善惡則純乎一天理矣純乎天理是王道蓋天下之事莫不有初亦莫不有幾初者幾之所伏也演說上面初字幾字物初而美幾則美惡判焉本通書幾善惡之語又見下注人初而善幾則善利界焉本孟子孳孳為善孳孳為利之說心初而純幾則純駁分焉本近思録物初而美人初為善之語其幾最可畏也亦在乎審其初而已總幾字初字英明之主出而作新萬物暗說武帝此世道之一初也亦君心之一初也昭上初字於斯時也而且求其為治之端喝出端字是其幾未失也端即是幾善告君者暗指仲舒首以大公至正之道而入其心說王道之端苟非出於是者則不敢以陳於前孟我非堯舜之道不敢陳於王前使吾君於其幾之善者而行之照主意幾字則純乎王而不雜乎伯純乎理而不雜乎欲常如此心之初矣照初字純乎天理是王道雜乎人欲是伯道然則仲舒當武帝初年董仲舒於武帝元光元年對䇿特舉王道之端以為告而絶口不言霸此說得之湯壽帝王顧所行如何論意豈非王道純乎天理也端者决其幾於君心之初乎應破題語王道之端如何請申之道在天地間亦一隂陽之氣爾以隂陽之幾喻君心之幾說得廣大而人主之新政則又混元立極之時也以混元喻君心之初然天地其有初乎開天地之初者固今日把天地之初與君心之初合說用栁子厚封建論起語隂陽其有幾乎决隂陽之幾者亦今日把隂陽之幾與君心之幾合說何謂初喚起初字易曰大哉乾元萬物資始是也應初字卦見易乾何謂幾喚起幾宇易曰幾者動之微吉之先見是已應幾字辭見易繫夫當資始之元而求先見之吉非王道之端在是乎總上兩股舉證歸題意此明其道不計其功正其義不謀其利者見董仲舒䇿每於理欲純駁未分之初而首以是幾告其君也仲舒對䇿在元光元年何則發問物以下引三為譬初如日之方旦幾則有明晦之候初如泉之始達幾則有清濁之分初如車之發軔幾則有正邪之岐以三物譬喻君心之初與幾字初則全善幾則介乎善惡之間君心其一太極之初也語録心即太極逮夫萬事出善惡分則其道有純駁之判此其幾豈不大可畏哉用周子太極圖中語五性感動而善惡分萬事出矣喻君心善惡之幾與上譬一同啇君於秦孝公強國之初年而投以三變之術終以誤秦於異日者此幾也史記啇君傳衛鞅見孝公說公以帝道不悟復說以王道不入復說公以霸道公與語不自知膝之前於席也鞅封於啇號啇君也善此幾之不者董公於漢髙帝創業之初年而教以仁義之說終以開漢四百年者亦此幾也髙祖本紀三老董公遮說曰臣聞順德者昌逆德者亡云云夫仁不以勇義不以力云云此三王舉也此幾之善者微哉幾乎接上幾字其始也毫髮相去其終也天地遼絶可不早辨於其初乎歸初字此仲舒舉其端以告武帝獨於王道拳拳焉舉本文是亦幾善之說也用周子通書語主意幾字本此斯道也何道也喝出道字用韓原道語見下注以下未說仲舒所對且說王道之源流自人心道心之幾一决於十六字之間舉幾字為證能苟子人心道心之幾惟君子為知之又書大禹謨人心惟危道心惟微惟精惟一允執厥中而禹傳之湯湯傳之文武周公率是道也韓原道斯道也何道也曰斯吾所謂道也云云堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻以上是幾之善者彼齊晉數君齊桓公晉文公管晏諸子管仲晏子與夫蘇張申韓者流蘇秦張儀申不害韓非其言則功利管仲晏子言功利其術則縱橫蘇秦說七國合縱攻秦張儀說七國連橫事秦並見史記其所謂道非吾之所謂道也用韓原道中語以上是幾之惡者且帝欲聞大道之要亦嘗有志於此矣至此方引武帝事來欲武帝本紀帝䇿仲舒云云聞大道之要至論之極抑不知帝之所謂道者果何道歟喝出道字且疑辭喚下文用武帝實事與王者事合說觀其初年舉賢良則與禹之籲俊同本紀建元元年冬十月詔丞相御史列侯舉賢良方正直言極諫之士又書立政古之人迪惟有夏乃有室大競籲俊尊上帝求直言則與湯之從諫同見上注又書伊訓先王肇修人紀從諫弗咈奉髙年則與文之養老同建元元年詔曰云云古之立政鄉里以齒云云先耆艾奉髙年又孟子吾聞西伯善養老者此時此心可以王矣用孟子語揚武帝之美處然王伯之分一間相去理欲界限其隔幾何學危科為治顧力行何如論文說幾者乃善惡之界二者之端苟有所未决則其幾真可畏也應主意幾字以上說武帝過仲舒對䇿今仲舒言道而必歸之王言王道而必謂之端叙本文是端也其初也亦其幾也解析題意分曉故於兩端之間擇其幾之善者而告之中庸執其兩端用其中於民又周子通書幾善惡曰正心則邪氣不得干董仲舒䇿正心以正朝廷云云有邪氣干於其間曰任德則刑罰所當後同上王者承天意以從事任德教而不任刑刑者不可任以治世猶隂之不可以成歲也曰體元以居正則不可不謹其始同上臣謹案春秋謂一為元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也正心也任德也體元以居正也皆王者之道也此其端亦大矣總上三項事皆歸之王道之端使帝也於此而决其幾主意幾宇應破題語常正心常任德常體元居正總上文此是幾之善者毋初以仁義而終以功利仁義是王道功利是伯道毋初以道德而終以權謀仁義是王道權謀是伯道毋初以正論而終以邪說正論是王道邪說是伯道則帝之心純乎天理應破題語而漢之冶亦純乎三代又何有末年之事不說武帝末年不好處語有含蓄雖然亦在乎所學何如耳末歸之學亦是六經道之寄也王道在六經中使帝之表章武帝表章六經於詩而必知正始詩關雎周南召南正始之道王化之基於春秋而必知為元見前注於中庸而必知造端中庸造端乎夫婦非苟知之亦允蹈之用經語則堯舜之道可至也而况於王進一步說抑當時師友淵源如董仲舒一人者真王佐才也本傳贊劉向稱仲舒有王佐之才雖伊吕亡以加云云然考其師友淵源所漸猶未及游夏儻使之終身勸學於武帝之側則舒其伊吕乎帝其湯文乎見上注好議論儘吁謹論二篇皆以幾字為字面可以參看就題輕重格此篇與章鑑正位廣居大道論同意王者寬大仁厚如何論王闕名出處後漢郎顗傳王者宜流寬大之澤垂仁厚之德順動元氣含養庶類立說以仁為天地之心寬大與厚為天地之體仁者天地生物之心而人得之所為心者也聖人能心天地之心則寬此仁也大此仁也而厚亦此仁也必能與天地同其體矣蓋指下文有順動元氣等語元者仁也故以仁字為主意批云字面官樣地位開闢無蹇澀卑汚之態可以為省試作文之法論曰聖人心天地之心指王者之仁以仁字為主意見接題注則天地吾其體矣指寬大與厚其西銘天地之塞吾體蓋仁天地之心也朱文公云仁者天地生物之心而人得之以為心者也接便喝出仁宇天地之所以并包容載而極其體之不可窮者并包容載指寬大與厚字皆此心之仁實基之寬大厚自仁中出聖人中覆載而立記天無私覆地無私載與天地同其體者非難此是寬大字而與天地同其心者實難此是仁歸重在仁字上心者體之所由充也有仁則有寬大厚語用孟子氣體之充吾所以存其胸中者人欲淨盡天理流行用朱文公語吾心其仁矣仁是主意其一太極之渾涵矣應破題天地之心意廣而充之寬此也大此也而厚亦此也豈與天地異體哉充此仁則為寬為大為厚應破題天地之體字知天地之體之為寬大且厚而不以天地之仁心充之反說根本之未立根本是仁吾恐限量之所至猶未免乎淺狹無仁字則無寬大且厚正與覆載之體判然二矣豈天地之所望於聖人者哉如何得與天地同體王者寬大仁厚如何郎顗以順動元氣言本題注吾喜其暗合於仁之義謂元者仁也為後面相應請索言之天之寥然穹然而寬以大也寥逺也寬大也地之隤然屹然而厚以載也隤大回反柔貌也簡易繫辭夫坤隤然示人矣此篇以天地立說故題下以天地為譬運亭毒而無端包散殊而無外至寬大者孰如天再說天之寬大處負流峙而不重生動植而不窮至厚者莫地若再說地之厚處以天地之寬大與厚比聖人人見其體之若是也孰知其所以充此體者有心以為之地哉天地寬大與厚之體亦自仁之心出來大哉乾元萬物資始乾之仁也易乾卦云云至哉坤元萬物資生坤之仁也易坤卦云云此其心也所以周流乎其體者也天地惟有仁之心故有寬大與厚之體乾稱父坤稱母豫兹藐然混然中處引過王者身上來用張橫渠西銘語則夫兩間之所望於聖人之意固有在也應冒頭天地所望於聖人意民吾同胞物亦吾與西銘民吾同胞物吾與也舉天下之飛潜生植顛連無告者其責皆在於我同上凡天下之疲癃殘疾皆吾兄弟之顛連而無告者吾求以覆之包之容之養之則非有以極夫至寬至大至厚之體未易以淺中狹量言也聖人寬大與厚之體亦如天地之體世之樊牆比鄰自為分限者用與論文私於家者隔樊牆而分比鄰非不能大其體之咎而不能充其本心之仁之咎也世之人無寬大與厚之體以其無仁之心故也乾之所謂博化施普乾卦德博而化又德施普也坤之所謂含𢎞載物坤卦含𢎞光大又厚德載物兹寬也大也厚也曷嘗不自一元之仁充之哉謂乾元之寬大與厚皆自仁中出來是心也就乾坤上引過禹湯文武謂數聖人之心與天地之心一禹湯文武之所以與天地並而後之言仁者莫加焉者也舉三王實事講何則禹之大見於功左禹之功其大庇民乎大證題宇湯之寬見於代虐書伊訓惟我商王代虐以寬證題寬字周家之忠厚著見於行葦勿踐之微詩行葦周家忠厚仁及草題木云云牛羊勿踐履證厚字夷想其時總說禹湯文武之時動者以育魚鳥之動者得所養育植者以蕃草木之植者得以蕃盛魚鱉者以衣食向之遭溺者幾為魚鱉所害今皆得其衣食之奉而塗炭者以袵席向之遇難者如坐塗炭之中今皆安於袵席之上舉天下之大無一民一物不囿於吾并包容載之中真與天地同其體矣應冒子天地吾其體語以上說寬大與厚字而數聖人之所以立心者何如哉應聖人心天地之心以下說禹湯文武之寬大皆自仁中來曰思溺曰泣罪仁之一視也孟禹思天下有溺者由已溺之也又通鑑禹出見罪人下車泣而問之曰祝網曰視民如傷仁之惻隱也史記商紀湯出見野張網四面祝曰自天下四方皆入吾網湯曰盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣又孟文王視民如傷後之論其仁者曰本曰身曰積曰纍真有以立夫天地一元之心矣前漢三王本仁祖義又孟子湯武身之也又周積德纍功應冒子天地之心字又應元字其著見於三者之用固應爾邪有仁則有寬大與厚春秋戰國天地一元之氣幾於磔裂而無餘接上元字反說太前輩云分張和磔裂元氣桓文則假仁孟子五伯假之也梁惠則不仁孟不仁哉梁惠王也蟊賊之以申韓申不害韓非學刑名之人畦畛之以秦越韓文秦人視越人之肥瘠漠然不加喜戚於其心迫促淺狹之氣亦隨以應之不仁則不寬不大亦不厚了而若民若物無復見三代涵養容覆之澤不忍言也不如禹湯文武之時應上面續天地一元之脈於既絶其有望於漢乎接前一元字生下文然孝文之篤厚仁之近似也先揚流前漢文帝本紀風篤厚禁網疏濶惟其止於幾措則薄昭之誅不能不傷其厚者後抑同上幾致刑措又薄昭殺漢使者帝使羣臣喪服哭之乃自殺孝宣帝之寬大仁之雜霸也先揚又宣帝本紀數詔公卿務行寬大元帝紀帝作色曰漢家自有制度本以伯王道雜之奈何純任德教用周政乎惟其德不純任則趙蓋韓楊之寃正與寬大背馳爾見上注又趙廣漢被寬饒韓延壽楊惲皆殺况下此者哉文宣二賢君且盡未得餘人可知郎顗言於東都舉本文既曰王者寬大仁厚而又繼之曰順動元氣見本題注豈不謂元者仁也解上元字仁者天地之心也能以天地之心為心則曰寬曰大曰厚可與天地同其體矣收拾一篇之意與冒子相應其如世主之不能盡仁何反說一句繳盡雖然天地之心未嘗泯也天地之望亦未嘗替也天地之心天地之望應冒子語仁道之大不以堯存不以桀亡得前輩議論苟能充之天地之帥吾其性則天地之塞吾其體矣用西銘語接三代泰和之脈而軼漢唐人主卑汙淺陋之功揚子泰和其在唐虞成周乎正有望於寬大仁厚之治暗指今日故曰行王道而王用魏徵傳語行帝道而帝行王道而王謹論就題輕重格此篇與前篇王者寬大仁厚論同意廣居正位大道如何章鑑出處滕文公下孟子曰居天下之廣居立天下之正位行天下之大道立說朱文公集注曰廣居仁也正位禮也大道義也此篇本文公之說又就仁義禮三者之中歸重於仁以仁為禮義之主謂仁者以天地萬物為一體而一毫私意不得以隘吾廣居焉則動容進退何莫非禮周流洞達何莫非義所謂正位大道豈吾廣居外物哉批云本先儒之說而參以已意理學玲瓏議論正大可為後學模楷論曰一理混融之天一理是仁指廣居萬理流通之地也萬理是禮與義指正位大道夫有此天即有此理包仁義禮意廣而非隘正而非他大而非小也且滚說三箇仁是廣居禮是正位義是大道未說出以仁為禮義之主自夫人不能天其天也性以情窒理以欲蔽性為情所窒塞天理為人欲所䝉蔽則為不仁方寸之間自為町畦而所處者隘矣不仁則其居不廣於是遷奪流蕩而正者日以他禮之位不正拘攣淺狹而大者日以小義之道不大與以上隘字他字小字皆接題相串然則亦是理之未融耳又歸在仁上何則曰仁也者天下之廣居也禮其正位而義則大道也且解析本題之義本朱文公之說而未說出主意要必真見夫仁者以天地萬物為一體摘出仁字為主意此句用朱文公議論而一毫私意不得以隘吾廣居焉應前隘字仁是廣居則動容進退何莫非禮有仁則有禮是正位周流洞達何莫非義有仁則有義是大道而所謂正位大道固在我矣夫豈以廣居為外物哉見得禮與義皆自仁中而出吁一理融萬理徹兹其為一貫之妙歟應破題語用伊洛諸儒議論廣居正位大道如何請因孟氏之言而先推衍仁之說主意在仁上且仁果何物乎喚起仁字辨論在天為命朱文公云天所賦為命在人為心同上仁者天地生物之心而人得之以為心者也在四德為元在四時為春同上仁在四德為元在四時為春禮者履此者也義者宜此者也仁包禮義義記祭儀禮者履此者也者宜此者也彼愛牛易羊仁之小耳孟齊宣以羊易牛云云曰無傷也是乃仁術也移民移粟仁之偏耳孟梁王曰河內凶則移其民於河東移其粟於河內見孺子入井而有怵惕惻隱之心抑又仁之端倪耳孟今人乍見孺子將入於井皆有怵惕惻隱之心以上反說仁字居不廣必天地萬物與我無間然後仁而小有限隔非仁也以上正說仁字形容廣居意一朱文公云仁者以天地萬物為體必物我內外一脈融貫然後仁而彼善於此非仁也用吕與叔克己銘意又孟彼善於此則有之矣自其廣者而充之正說仁之廣居則視聽言動必以其禮而正者可與立禮自仁中出勿語顔淵問仁云云子曰非禮勿視非禮聽非禮勿言非禮勿動簡易平直行所無事而大者可與行義亦自仁中出道藝文志六經之簡嚴易直又孟子智者亦行其所無事有是廣者而自隘之反說仁之居不廣則禮不足以制欲而正者為他適無仁則無禮揚書欲敗度縱敗禮又子適堯舜文王為正道非堯舜文王為他道義不足以勝利而大者為小用無仁則無義矣亦有仁義而已何必曰利吁仁之道固何如哉歸在仁上正說斂之可以宅吾心普之可以宅天下宅字形容居字天書克宅厥心又光宅下渾然大同物我無蔽其廣居之氣象乎記禮運故外户不閉是謂大同形容廣居字開濶且吾何以知廣居之為仁也又喝起仁字辨論廣居之意洞然八荒皆在我闥非廣居乎吕與叔克己銘語萬境俱融畛域不立非廣居乎語録一境徹萬境融以民物為同體以天下為一家非廣居乎見前注又記禮運聖人能以天下為一家體而長人者此也易乾卦君子體仁足以長人推而保四海者此也孟故推恩足以保四海一日克己復禮而天下歸焉者亦此也語顔淵問仁云云子曰一日克己復禮天下歸仁焉自以上一段形容仁之廣居處此以下說仁包禮義故履而為禮則反身而誠萬物皆備而正位立孟子反身而誠樂莫大焉又萬物皆備於我不視不聽不言不動而正位立見前注暗室屋漏昭於神明尸居龍見對越上帝而正位立中庸詩云相在爾室尚不愧于屋漏又記尸居而龍見又朱文公云潜心以居對越上帝宜而為義則無偏無陂遵王之義而大道行書洪範云云天下為公是為大同而大道行記禮運大道之行天下為公云云是為大同君子可履而小人亦可視賢者可由而愚夫愚婦亦可行而大道行詩大東周道如砥其直如矢君子所履小人所視又中庸賢者過之云云夫婦之愚可以與知焉云云夫婦之不肖可以能行焉帝驟王馳而不知古今之為終始以下充廣本題意用奧論文鳶飛魚躍而不知天淵之為深溥中庸鳶飛戾天魚躍于淵雲行雨施而不知品物之為流暢易乾卦雲行雨施又品物流形一境混融萬境昭徹洞洞屬屬皆吾廣居中物耳用諸儒語録中議論以正位大道皆歸在廣居上正位何有哉大道何有哉總結上文語健堯舜禹湯文武達而在上則居天下之廣居而所謂正位大道者其用在吾身以上正說古者帝王以仁包禮義若夫老莊之虛誕以下反說莊周老聃皆尚虛無之學管晏之功利管仲晏嬰皆齊人尚功利之學斯髙之慘刻李斯趙髙皆秦人尚慘刻之學蘇秦張儀之縱橫捭闔蘇秦說七國合縱攻秦張儀說七國連橫事秦並見史記是皆自隘其廣居而位非正位道非大道者也以上文反說後世之不能以仁包禮義孟氏舉廣居正位大道之言而答景春之問本出處景春問曰公孫衍張儀豈不誠大丈夫哉云云其言粹矣取孟子之言是愚因其言而以仁義禮三者實之祖朱文公之說而且主於仁之說以仁為主是主意繳得老健無冗辭雖然此非愚臆說也謂已之說有所祖引證孟氏之言曰仁宅也禮門也義路也孟離婁上仁人之安宅也義仁之正路也又萬章下夫義路也禮門也君子能由是路出入是門也曰宅也曰門也曰路也非廣居正位大道之異名乎廣居即仁宅正位即禮門大道即義路人能安是宅則能出入是門矣則能由是路矣總上文以廣居包正位大道抑問仁之方可聞歟又歸仁上結末是學方嶽聖人之道出乎一論曰一而已矣見下注一則靜虛動直靜虛則明明則通動直則公公則溥明通公溥其庶矣乎周子通書聖學章聖可學乎曰可有要乎曰有請聞焉曰一為要一者無欲也無欲則靜虛動直云云謹論形容題意格與陳自然君子之教如時雨論同意湯文孔子聞知如何論黃龍友出處孟子盡心下孟子曰由堯舜至於湯五百有餘歲若禹皋陶則見而知之若湯則聞而知之由湯至於文王五百有餘歲若伊尹萊朱則見而知之若文王則聞而知之由文王至於孔子五百有餘歲若太公望散宜生則見而知之若孔子則聞而知之立說謂後聖人之心與前聖人之心相遇是雖聞其道於數百載之下而可以知其道於數百載之上蓋以心聞道非以耳聞道故可以傳其不傳之妙使湯之心不與堯舜遇文王之心不與湯遇孔子之心不與文王遇何以一聞之頃而遽知是道之微批云吐胸中之微辭繹前輩之緒論理學了了文勢滔滔發明數聖人之心於千百載之上論曰傳道而得不傳之傳後聖聞前聖之道於五百載之下而能知前聖之道於五百載之上是謂傳其不傳非此心之迭相遇不能也以後聖之心與前聖之心相遇故也夫道何嘗一日不可傳哉傳字本韓原道又見題下注特患乎未有所遇爾遇字本吕東萊顔子論奚為遇喚起遇字辨以我之有近彼之有彼此皆有是道方相遇亦是前輩議論耳不可得而聞所以聞者心也心相遇則能聞其道聞以心故聞雖在於已傳之後而知則在於未傳之先矣聞在於五百餘歲之後而知在於五百餘歲之前是之謂遇應上遇字遇則不相拒不遇則不相受一正一反對說用古文不相受而求以相傳反說雖終日相接而恍若無知者而又安可以不聞聞之也心不相遇雖見亦不知何以聞而知之聖人迭出而為吾道宗主暗說湯文孔子不有遇之何以傳之反應遇字傳字苟遇矣非以道傳道以心傳道也正說心相遇則可以聞而知之是雖上下數百載間湯文孔子相去各五百載謦咳寂寥影響不接耳不聞了音謦咳字莊子咳概猶聲音也而一脈貫通固已領㑹於無言之表以心聞道又何必口授耳聽而後謂之聞目擊首肯而後謂之知也哉抑問聞知二字說得響孟軻氏七篇之終論湯文孔子相去五百餘載皆謂其聞而知之見本題注豈不以湯文孔子之聞道雖在五百載之下湯文孔子之知道則在於五百載之上說聞知二字分曉向使湯之心而不迭與堯舜遇文王之心而不迭與湯遇孔子之心而不迭與文王遇遇字是主意詳見題意何以一聞之頃而遽知此道若是之微耶反說聞知二宇有力遇之於心萬古如一日正說遇字遇則聞而知不遇於心勿求於聞可也反說遇字不遇則不聞而不知法學孟子不得於心勿求於氣句此不傳之傳所以為傳之妙也應破題語湯文孔子聞知如何請得以廣其說嘗讀韓子原道一編舉此為證觀其論列聖相承所傳之道有曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子見韓原道全文破題傳字本此竊怪夫堯舜禹聚㑹精神於一堂之上堯舜禹君臣也聚王褒聖主得賢臣頌精㑹神相得益章文武周公啓佑繼承於一家之中文武周公父子也我書丕顯哉文王謨丕承哉武王烈啓佑後人咸以正罔缺其見親見其言親言固可謂之傳矣以上且說禹之於堯舜周公之於文武是見而知者固可以傳道湯文相去世代逾逺周孔窮通聲迹已殊而亦謂之傳何歟由湯而至文王五百有餘歲由文王至於孔子五百有餘歲周公達而在上孔子窮而在下此數聖人相去已逺不如當時親見者亦謂之傳道何也吁此其所以為不傳之傳也應破題傳其不傳字天下之事從其有而近其有則易取其無而納以有則難說遇字一正一反下用奧論文前篇亦用此二句况以道相傳而傳於不相遇者耶反說傳字遇字有力舉珠玊以授無指而責其不玩指日月以示無目而責其不仰可乎設譬此猶以道而傳於不相遇者若夫手與目具者惟恐吾之不授不示也授則受示則睹矣此猶心與聖人相遇者不惟授而後受示而後睹也雖不授之猶將取之雖不示之猶將窺之此猶不求傳道而道自傳何則彼固有以遇之也歸在遇字上手與珠玊遇則其取不可禁目與日月遇則其睹不可閉以上皆是出入古文說得遇字透徹大哉遇乎其吾道一脈之所繫乎歸在主意上來夫心不遇焉雖同堂合席何啻藩牆爾汝之不相入反說遇字心不遇雖見之亦不知道心苟遇焉將神交意契於千萬世之下而又安有毫髮之差也正說遇字心相遇雖聞之亦可知道何也再喚起上意遇而非傳也主意夫惟遇而非傳是以傳而必遇轉過上文辨論世固有終身疲道路或不盡知其險要用舉譬此比見知者而指山畫谷者乃得於不出户之儒此比聞知者天老子不出户而知下把手論交情者或不盡知其辭色此比見知者而洞見肺腑者乃出於未傾蓋之士此比聞知者見前漢䇿傾蓋如故前以上四句襲黃萬里見知聞知論在集此所謂遇之真也歸在遇字上湯之於堯舜文王之於湯孔子之於文王其殆迭相遇之真歟見本題注應遇字不然何其遇而順順而契也亦是用顔子論文彼其所謂遇者下論遇字非謂前者之言能啓人而後者之聽能聽人也指見而知之者言而能啓人之聽也傳上文則丹朱聽之矣堯之子丹朱不肖商均聽之矣舜之子商均亦不肖管蔡之徒聽之矣周公之兄管叔蔡叔皆不賢何為不傳之父子兄弟而傳之五百載之後也謂當時見者不如聞者之心相遇也見本題注然則前聖之傳傳不以言後聖之傳傳不以耳傳道不在口耳之末傳不以言則言者心也傳不以耳則耳者亦心也傳道在乎心之相遇以前聖之心觸後聖之心是惟無合合則遇矣應主意遇字精一允執堯舜未嘗口以授之湯也書大禹謨人心惟危道心惟微惟精惟一允執厥中而執中之㫖湯自與堯舜不約劑而合孟子湯執中立賢無方則湯之心其所以知堯舜者久矣湯與堯舜固一遇也湯去堯舜五百餘歲而其心相遇故聞而知之日新又新湯未嘗口以語之文王也大學湯之盤銘曰苟日新日日新又日新而不已之運文王自與湯不符璽而契中庸詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文王也純亦不已則文王之心其所以知湯者素矣文王與湯又一遇也文王去湯亦五百有餘歲而其心相遇故聞而知之作爻重易文王未嘗口以告之孔子也漢藝文志文王以諸侯順命而行道之於是重易六文作上下篇孔氏為之彖象繫辭文言序卦之屬而繫辭之作孔子自與文王不印券而侔史孔子世家孔子晚年而喜易序彖繫象說卦文言又見上注則孔子之心其所以知文王者非一日矣孔子與文王又一遇也孔子去文王亦五百有餘歲而其心相遇故聞而知之不求堯舜於堯舜而求此心之堯舜不求湯於湯而求此心之湯不求文王於文王而求此心之文王此數語警䇿應冒子耳不可得而聞所以聞者心也則遇者真而傳亦得其真矣應遇字傳字五百載之前此一道也五百載之後亦此一道也已往之聖此一道也未來之聖亦此一道也總本題之意文勢滔滔有先知焉知則無先有後知焉知則無後四句純用先儒語證知字切此不傳之傳所以常聞於不聞之聞也應主意總結昔子貢常有言曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也舉此一聞字為證見論語公冶長篇夫文章性天本非二道引上文辨論子貢聞之以耳而不聞之以心此所以但知文章之可聞遂謂性天之不可聞也性天之外豈有所謂文章也哉子貢徒以耳聞夫子而不以心聞夫子吾甚悲夫子貢日與夫子相接而日與夫子不相遇也貶子貢之心不與夫子遇故不知道若夫如愚之回則領㑹之固已久矣無他回之心與夫子遇也賜如回則聞一以知十矣抑子貢不如顔回十語公冶長回也聞一以知賜也聞一以知二參如回則無孝經矣抑曾子不如顔淵子曾子名參志在孝道故孔因之以作孝經門人如回則無論語矣抑門人不如顔淵皆論語序魯論語二十篇孔子弟子記諸善言也人人皆如回則無六經矣抑諸人皆不如顔淵孟子序孔子自衛反魯云云乃刪詩定書繫周易作春秋又家語定禮理樂有經而道猶不傳何也再喚下意嗚呼應上文王之後有孔子矣孔子之後斯道散於百家蕩於末流耶朋邪詖異幅裂鼎沸莫敢誰何不有孟子孰從而嗣其脈哉出入劉屏山文就孔子上過孟子來其曰找欲正人心息邪說又曰我欲承三聖並見孟子滕文公篇三聖指禹周公孔子此時此心蓋不特與孔子遇且與文王遇不特與文王遇且與湯遇與堯舜遇矣謂孟子之心與數聖人相遇無有乎爾自知何甚明而自任何甚毅耶本出處下文由孔子而來至於今百有餘歲去聖人之世若此其未逺也近聖人之居若此其甚也然而無有乎爾則亦無有乎爾軻之聞蓋異乎人之所聞矣取孟子不然原道何以復繼之曰孔子傳之孟軻見韓原道孔子傳之孟軻軻之死不得其傳焉然軻死不得其傳之言則又驗矣吾亦未敢以是而疵韓子之說也見上注繳上文吾嘗謂道之傳與不傳繫乎心之遇與不遇引上主意而心之遇與不遇有天焉君子不徒謂人也過天字做論餘意何者道之大原出於天見董仲舒䇿天無心以道為心聖人無心以天為心程子云天地之常以其心普萬物而無心聖人之常以其心順萬事而無情惟其以天為心故亦與天相遇㸃天字五百載而聖人始生見題注非聖人之難遇也心之難遇也非心之難遇也天之難遇也歸在天字上故曰孔子聞諸文王文王聞諸湯湯聞諸堯舜堯舜聞諸天用誠齊易序語證天字切各五百載而始以心遇天豈嗇其遇哉喚下意吾是以益悲夫此心之難遇而聖人之不世出也應心之難遇以天之難遇也吁聖人雖不世出豈無迭遇聖人之心於千百世之下者自任甚重謹論形容題意格與黃龍友湯文孔子聞知論同意君子之教如時雨論陳自然出處孟子盡心上孟子曰君子所以教者五有如時雨化之者南軒解云言如時雨之造化萬物也今夫物之萌者欲發甲者欲拆於是時也而雨及之則物皆得以遂矣蓋不先不後當其可而適與之㑹無待於彼之求也立說聖賢之教人迎其所有而與之相遇則其天機躍然時雨及物迎其方發而與之相遇則其生意勃然聖賢之造化學者亦猶天之造化萬物皆要與時相遇而後其功易成也批云意脈本之南軒字面得之東萊發越透徹反覆抑揚讀之使人灑然如親承時雨之教論曰道以遇而後傳聖賢教人迎其所有而與之相遇而後可以傳道此聖賢造化學者之妙也造化見時雨意夫聖賢一造化也聖賢教人如時雨及物一般造化澤物之功不能違乎時雨之及物當其方發之時而潤之則聖賢教人之術何獨不以時而造化乎君子之教人亦當其可教時而教之然時原於順順原於遇應破遇字論用東萊顔子文遇則道可傳不遇則不可傳矣一正一反說應傳道字故聖賢之教學者每迎其所有而不強其所無迎其所有如人有受道之資而我能啓發之是相遇強其所無如人無受道之資而我強誘化之是不相遇從其有而迎其有則與之相遇而其功易搬上文迎其所有字正說強其無而納以有則與之不相遇而其功難搬上文強其所無字反說有如人心之善已萌天理之機已露自此以下是說自從其有而迎其有一段於是以吾之天觸彼之天一啓沃之而其天躍然書說命啓乃心沃朕心殆猶天之生物也遇如時雨意於芽萌甲拆之時而沛之以時雨用南軒議論發明見題注物與雨相遇而不相違而物之生意勃然矣應遇字違字而教之及時則有功夫苟機之未至自此以下說強其無而納以有一段而求以啓發之善之未萌而強以誘化之彼固與道不相及也不相遇了又安能與吾教相浹洽哉浹洽字見時雨意教之非時則無功此孟子以時雨言君子之教說出本文蓋謂之時則遇矣主意遇字既遇則教之入也易為功繳盡冒子意君子之教如時雨請以是論夫時之義大矣哉喝出時字議論交相遇謂之時照破題遇字當其可謂之時記學記當其可之謂時不先不後謂之時書𦙍征先時者殺無赦不及時者殺無赦天下之事時之未至聖賢不能先時而必為時之既至聖賢不能後時而不為以上反覆辨論時字况夫以道傳人而不適其時可乎照破題傳道字人心雖有可化之機聖賢雖有能化之道說教意生下文然時未至則機未露雖有善道不能速化矣反說時字人本出處解云草木之生播種封植力已至而不能自化所少者雨露之滋耳及此時而雨之則其化速矣教人之妙亦猶是也何則未遇故也照主意遇字遇則不相拒應冒子從其有而迎其有則與之相遇而其功易不遇則不相受也應冒子強其無而納以冇則與之相拒而其功難使彼學者而未遇乎時之可反說遇字雖父兄不能發其端雖師友不能引其進時未遇則不可以教吾固諄諄然誨之抑詩誨爾諄諄固循循然誘之語孔夫子循循然善誘人徒見其相扞格爾徒見其相拂戾爾扞格拂戾皆是不相入貌今夫天之於物也亦惟其時而已過時雨上來春而木以生夏而苗以長此是庶物生長之時於斯時而雨之則木且燁然華苗且芃然實矣物與雨相遇則成功易何則時固易然也歸在時上向使雨於秋而求夫木之華雨於冬而求夫苗之實此非庶物生長之時雖日潤之不可得也雨不與物相遇則成功難然則不遇夫生長之時雖造化不能以成潤物之功雨不遇時且無功孰謂不遇夫可教之時聖賢能得夫學者之化哉教不遇時又何益昔者作易聖人知乾之為乾有雲行雨施之象焉易乾卦雲行雨施天下平也而於乾之進德修業必以及時言之同上君子進德修業欲及時也而時過然後學記禮者亦深以是為學者戒記學記時過然後學則勤苦而難成舉二時字證題蓋時之不及固無以為進修之本中上文乾卦時字而過時而學不特學者勤苦而難成而教者亦徒勞而無功矣申上文學記時字舉此二時事一正一反繳題下意嘗觀夫子之為學也引夫子時事講自十有五而志學此一時也三十而立此又一時也至於七十不踰矩則又一時也語為政第二吾十有五而志於學三十而立云云七十而從心所欲不踰矩夫聖人具生知之性抱誠明之資其於學也猶有次序先後之時而况學者之學聖人乎引聖人過學者身上使其當灑掃應對之時語十九小子當灑掃應對進退而教之以致知格物之功應時雨意是不種而溉也大學致知在格物物當灑掃應對是小學時致知格是大學時當離經辨志之時記學記古之學者比年入學中年考校一年視離經辨志而教之以治國平天下之事大學國治而后天下平是離經辨志是小學時治國平天下大學時是未耕而穫也應時雨意反以上皆說君子之教異於是自此以下正說彼方惛惛也吾不強之以昭昭惛惛不明貌昭昭光明貌用孟子以其惛惛使人昭昭字彼方聵聵也吾不責之以灼灼瞶瞶不明貌灼灼光明貌意以上二句說教人要及時彼惟芽蘖可復也吾始從而滋沃之彼惟枝葉可養也吾始從而沾溉之彼惟根實可食也吾始從而潤澤之以上數句解如時雨意以已之有迎彼之有有者自有無益之者用古文照冒頭迎其所有字即我之覺覺彼之覺無覺之者亦是用古文亦借用孟子以先覺而後覺字蓋至是學者之心與道遇教者之心與學者遇應破題遇宇不待求望不假問答形容遇字意此一天也彼一天也應冒子天字以天觸天應冒子以吾之天觸彼之夭鶴鳴而子和也易繫辭鶴鳴在隂其子和之鼓琴而響應也亦如上句意比並遇時之意其心油然非勺水之為溉也中庸今夫水一勺之多形容時雨意其機勃然非揠苗以為長也孟公孫丑上宋人有憫其苗之不長而揠之者芒芒然歸謂其人曰今日病矣豫助苗長矣意形容時雨天下雷行物與無妄易旡妄卦云云形容時雨意泉源混混放乎四海孟子離婁下源泉混混不舍晝夜盈科而後進放乎四海形容時雨意斯其所以為君子之教與歸教上斯其所以為時雨之教也歟歸時雨上嗚呼此吾夫子告顔子以天下歸仁之日語十二顔淵問仁子曰克己復禮為仁云云一日克己復禮天下歸仁焉語曾參以吾道一貫之時也語四子曰參乎吾道一以貫之孔門諸弟惟顔曽二子之心與夫子之心相遇故可以傳道此論皆得前輩諸儒大有發明只用顔曽二子事作二句繳結尤見老成是教也無問無答以問答求之教則淺非言非語以言語詰之教則末推廣題意學者能以吾之天感聖賢之天力到功深超然領略應前天字天髙地下吾性湛也雲行雨施吾性遊也明道先生語略云云舞雩之風語十一曰㸃爾何如鼓瑟希鏗爾舍瑟而作曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸當春之雨杜詩好雨知時節當春乃發生有不足以喻其樂以上數句皆用古文不然則自昏昏其見自昧昧其天雨露之潤不足以勝斧斤之尋而牛山之木濯濯矣孟告子上牛山之木嘗美矣以其郊於大國也斧斤伐之可以為美乎是其日夜之所息雨露之所潤非無萌蘖之生焉牛羊又從而牧之是以若彼濯濯也心地茅塞孟子盡心下今茅塞子之心矣私欲荊榛私欲之蔽如荆榛之塞吾見子之苗稿矣注見前雖有時雨之教烏乎施反繳句健語老謹論二篇皆以遇字為字面同一議論比而觀之可以觸類合二為一格與張宗堯舜之知急先務論同意教人得人謂忠仁如何論程果行出處孟子滕文公上堯以不得舜為已憂舜以不得禹皋陶為已憂云云教人以善謂之忠為天下得人者謂之仁立說朱文公孟子集注云教人以善雖有愛民之實然其所及亦有限而難久惟若堯之得舜舜之得禹皋陶乃所謂為天下得人者而其恩惠廣大教化無窮此其所以為仁此篇本此立說謂教人以善固足以見堯舜愛天下之心然教可行於一時而不可以必行於後世堯舜憂其教之窮吾之愛亦與之俱窮必欲得舜禹皋陶以寄其愛於無窮而後已初不以吾身有窮之愛而廣天下無窮之憂惟其有憂天下之心而後有以見堯舜愛天下之心批云文意相生一起一伏發盡朱文公底藴筆力老蒼决非少作論曰不觀聖人憂天下之心包為天下得人謂之仁無以知聖人愛天下之心包教人以善謂之忠其謂教人之愛其忠止於一時得人之憂仁及於異日必有得人之仁斯可以見教人之忠也蓋聖人之心不敢以已之愛為已盡而常以已之憂為未盡也接上憂愛二字說去謂教人之忠易盡而得人之仁無窮知所以愛天下未知所以憂天下徒知教人而不知得人則吾恐吾之愛可以行於愛之所及而天下之憂固已伏於愛之所不及矣以教人為忠止及一時是謂愛之所及不以得人為仁及於後世是謂愛之所不及我思古之聖人其待天下何厚也暗指堯舜其所以輔之翼之振德之者說教人意之出處上文云放勳曰勞之來之匡之直輔之翼之使自得之又從而振德之朱子集注云輔以立之翼以行之使自得其性矣又從而提撕警覺以加惠焉不使其放逸怠惰而或失之夫亦曰民吾民也吾之所當愛也吾知盡吾之心而已然使天下後世而皆如吾心之所期則聖人亦可無憂矣謂使異日皆能如今日教人之意則不必得人了奈之何其不然轉歸主意聖人有憂焉因愛字入憂字過得人意以下說為天下得人者謂之仁憂之如何憂其愛之窮而吾之心不能以自達於天下也謂教人之忠可行於一時而不能必行於後世以聖人愛天下之心而至於不能以自達傳過上句苟不得人以寄其愛於無窮則聖人之心豈不遂窮於此哉苟不得人以寄吾愛天下之心則教人之忠亦止於一時而已嗚呼吾於是而知堯舜氏之心只一句歸堯舜語極簡徑可法教人得人謂忠仁如何孟氏子其知之矣敢問如之何而謂之忠設問忠字曰答忠字盡已之謂忠朱文公集注云盡已之謂忠如心之謂恕如之何而謂之仁設問仁字曰答仁字愛人之謂仁孟子盡心上仁者愛人然天下之理以已而愛人者其愛小指教人以善接上愛字說主意以人而愛人者其愛博指為天下得人愛之小者其愛為易窮教人以善及於一時愛之博者其仁為無窮為天下得人及於異日非已之愛無窮也斡一轉喚下意一已之愛有窮而寄其愛於人者無窮也愛人有窮是教人寄其愛於無窮是得人應冒子得人以寄其愛於無窮知聖人愛天下之忠而不知聖人憂天下之仁則聖人之志荒矣應破題不觀聖人憂天下之心無以知聖人愛天下之心聖人以一身而任天下之寄以下應冒子古之聖人其待天下何厚也一段環視宇宙之內苟有一民之不協於極書洪範不協於極不罹於咎不得以自遂其性命之正者易乾卦各正性命保合太和聖人之心豈安哉應聖人有憂天下之心使聖人之心而不在於斯人也則亦已矣反說憂天下意若果畏天命而悲人窮也轉歸正憂天下意固韓愈諫臣論若果賢則畏天命而閔人窮也則其所以愛利斯人之心始不能以自己於言而後吾之教始行說教人以善謂之忠吾之教行而後吾之愛始達將上文斡轉應愛天下字使吾愛天下之心得與吾之教相繼於無窮是固聖人之心也以上應冒子使天下後世而皆如吾心之所期則聖人亦可以無憂矣然教可行於一時而不能以必行於後世吾之教窮而吾之愛亦與之俱窮謂教人以善之忠易窮為天下得人之仁無窮知其窮而不知憂其窮則是吾之仁亦窮矣以上應冒子聖人有憂焉止苟不得人以寄其愛於無窮一段文意展轉相生一起一伏是以聖人之治天下不遺天下以教指教人以善謂之忠而遺天下以仁指為天下得人者謂之仁蓋教人之忠固所以盡吾身之責應冒子聖人愛天下之心而得人之仁乃所以盡天下後世之責應冒子聖人憂天下之心不以吾身有窮之愛而廢天下無窮之憂兹其為聖人之盛心哉以憂愛二字反覆議論愈讀愈有味是心也蓋堯舜氏之心也串上心字過本題當是時也叙堯舜之時以下且說教人意五教敷矣書舜典敬敷五教在寬聲教暨矣禹貢朔南暨聲教訖於四海命契而教以人倫矣孟子滕文公上使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信連用三箇教字吾想斯人涵泳於道教之內者皆康衢之童擊壤之老比屋可封之俗也列子仲尼篇堯遊康衢聞兒童謡曰立我蒸民莫匪爾極又通歷有老人擊壤於路曰日出而作日入而息帝力何有於我哉後漢王莽傳堯舜之民比屋可封其忠厚氣象去之數千百載尚可想見且稱美教人以善處當時之人無得而名焉要引下面兩忠字來所可得而名者曰忠信無倦而已曰忠利之教而已苟子堯問忠信無倦天下自來又虞舜有􅉃怛之愛有忠利之教以上自五教敷矣至此講教人以善謂之忠嗚呼吾於此而見堯舜之忠也亦於此而見堯舜之仁也引忠字過仁字人見其愛天下也而堯舜之心則曰我何愛也吾之愛雖無窮而吾之憂亦無窮又自愛字過憂字愛天下是教人以善憂天下是為天下得人何也喚下意憂其愛之窮也轉歸得人上時時拈出憂字愛字愛字照主意吾之教敷矣豈無尚有未敷者乎再演前敷教事含得人意吾之教暨矣豈無尚有未暨者乎再演前暨教事含得人意吾之教有親有義有别有序有信矣又豈皆有親有義有别有序有信乎再演前教人倫事含得人意注見前凡前日之所以愛天下之心皆轉而為今日憂天下之心將愛字轉歸憂字惟其有憂天下之心而後始足以見其愛天下之心又將憂字轉歸愛字照破題意展轉相生如盤中走珠故方其未得舜也所憂者舜而已應憂字舜本文堯以不得為已憂既得舜則吾之教寄於舜矣舜之仁即吾之仁也得舜則教人之心寄於舜而堯之仁無窮方其未得禹也所憂者禹而已應憂字皋本文舜以不得禹陶為已憂既得禹則吾之教寄於禹矣禹之仁即吾之仁也舜得禹則教人之心寄於禹而舜之仁無窮方其未得皋陶也所憂者皋陶而已應憂字本文見上注既得皋陶則吾之教寄於皋陶矣皋陶之仁即吾之仁也舜得皋陶則教人之心寄於皋陶而舜之仁無窮以上三股講為天下得人謂之仁教人之忠止於一時之仁得人之仁則可以為萬世之仁終篇議論只是說此二句使堯舜之心而曰吾之仁博施矣濟衆矣語第六如有博施於民而能濟衆何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸而且諄諄然命之也用孟子萬章語則是堯之仁止於七十年舜之仁止於五十年何以至今無窮哉或曰愛天下者堯舜也憂天下者亦堯舜也前面因愛字歸岩廊憂字上黃屋之非心文選范蔚宗詩黃屋非堯心岩廊之恭已前董仲舒䇿制虞舜游岩廊之上垂拱無為然則憂耶樂耶今又因憂字歸在樂字上曰未得人以前則此憂在於堯舜既得人以後則此憂在於舜禹皋陶說得極是分明吾觀舜之徽五典舜典慎徽五典禹之宅百揆同上咨四嶽有能奮庸熙帝之載使宅百揆曰伯禹作司空皋陶之明刑禹謨帝曰皋陶汝作士明於五刑以弼五教此教人之忠也亦得人之仁也繳題意學者知堯舜之先天下之憂而憂當知堯舜之後天下之樂而樂末用范仲淹嶽陽樓記先天下之憂而憂後天下之樂而樂語繳結有味謹論合二為一格與程果行教人得人謂忠仁論同意堯舜之知急先務論張宗出處孟子盡心上孟子曰知者無不知也當務之為急仁者無不愛也急親賢之為務堯舜之知而不遍物急先務也堯舜之仁不遍愛人急親賢也立說聖人以身任天下之重凡天下一事一物之不得其理皆聖人責也然天下之事無窮一人之力有限以有限之力豈能應無窮之事聖人是以默察夫先後緩急之宜舉天下之大而與賢者共之是不以天下纍其身矣非知之大者歟批云終篇行文有法度中間用事有綱領真可為後學矜式論曰聖人以身任天下說堯舜以一身任天下之事而不以天下纍其身先務之急在於親賢以天下之事與賢者共理之方是不纍其事必有見於大者矣知親賢方是智之大處蓋聖人出而與世接順說與原題相應凡天下一事一物之不得其理者聖人蓋深憂之謂天下之務甚衆皆在聖人身上亦與原題相應是聖人以身任天下矣應破題聖人以身任天下句然聖人以天下自任轉上文而天下之求於聖人者無窮引下文以有限之力應無窮之求總上兩句天下之事如此其多獨力如何理㑹得則將求遍天下之事物而求以安之無乃以天下自纍歟天下事都要事事自去理㑹則不勝其勞纍遍周也用本文而不遍物之意應破題不以天下其身句反說聖人之知蓋知乎此歸智字說是故深居夫事物之表而默察夫先後緩急之宜說出題上急字先字舉天下之大而與賢者共之說知者無不知也當務之為急仁者無不愛也急親賢之為務則吾雖不必以身應天下而任天下之責塞矣應破題聖人以身任天下不以天下纍其身意嗚呼此則堯舜之所以用其知也舉本文歸在堯舜之智上夫以堯舜之知而求以遍天下之事物豈有難能者哉反說堯舜之智而不遍物意然聖人不汲汲於彼而乃以親賢為急其用知之大者歟不急於遍物惟急於親賢此則為堯舜之智堯舜之知急先務請申孟子之論蓋聖人為天下事物之宗主也應冒子聖人出而與世接意一民之不得其所一物之不得其宜皆歸其責於聖人應冒子凡天下一事一物之不得其理者聖人深憂之聖人不為天下則已聖人而苟有意於天下其能以身辭其責乎疑辭下應冒子是聖人以身任天下矣然天下至衆而一人至寡也轉歸本意勞者欲息擾者欲定弊者欲新而不振者欲起形容天下之望聖人者如此其衆聖人方以身任之而天下之求於我者方來而不已應冒子聖人以天下自仕而天下之求於聖人者無窮嗚呼亦觀其知之處此而已矣歸知字上應冒子聖人之知篕知乎此夫匹夫之不被澤成湯不憂而伊尹憂之孟萬章伊尹耕於有莘之野云云思天下之民匹夫匹婦有不被堯舜之澤者若已推而納之溝中其自任以天下之重如此西土之蠢不靖成王不憂而周公憂之書大誥周公相成王云云有大艱於西土西土人亦不靖越兹蠢蓋湯成王不憂天下而憂伊尹周公之未用也以上說湯與成王能以親賢為先務可謂之知後世以一人之知欲遍天下而每有不遍者焉引古者事過後世謂古者能任賢故可以周知天下之事後世不任賢故不能周知天下之事廟謨雄斷光武非不足言知也光武本紀贊明明廟謨﨣﨣雄斷而三公不任事歸臺閣天下之事有遺於廟謨之外者多矣後漢仲長統傳光武愠先世之失權忿強臣之竊命矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職備員而已聰明天縱太宗非不足以語知也太宗本紀為人聰明英武有大志又陸贄奏議太宗以天縱之才有神器之重而身兼將相下行臣職天下之事有出於聰明之所不及者多矣唐張行成傳帝嘗謂羣臣曰朕為人主兼行將相事豈不是奪公等名云云行成上疏曰云云左右文武誠無將相才奚用大庭廣衆與之量校損萬乘之尊與臣下爭功哉以上謂光武太宗不能以親賢為先務故不足以言知嗚呼盍亦於聖人之所以用知者觀之乎轉歸本題堯舜事上來讀書而至於堯典看他用事只把堯舜二典來鋪叙尤見手段以下叙堯事自親九族至和萬邦皆其治之綱目也堯典以親九族九族既睦平章百姓百姓昭明協和萬邦自授人事以至憂洪水皆其時事之至切者也同上敬授人時又湯湯洪水方割堯既以身任之胡不以身親之反下應以身任天下意而明峻德命羲和咨四嶽若有憂焉何哉疑辭又歸在親賢上命堯典克明峻德以親九族又乃羲和又帝曰咨四嶽注四嶽即上羲和之四子分掌四嶽之諸侯羲和羲叔和仲和叔讀書而至於舜典以下叙舜事自徽五典至賓四門皆其治之體統也舜典愼徽五典五典克從又賓於四門四門穆穆自嗣位至輯五瑞皆時事之不宜緩者也同上三載汝陟帝位又輯五瑞注舜斂公族伯子男之瑞圭璧舜既以身任之胡不以身親之反下應以身任天下意而內命九官外命羣后有能之咨汝往之命若不容緩又何哉疑辭歸在親賢上同上舜曰咨四嶽有能奮庸熙帝之載云云帝曰汝往哉朝九官禹稷契皋陶垂益伯夷䕫龍又羣后四嗚呼此則聖人所以能用其知者也惟其親賢所以為知吾觀懷襄之患聖人視天下若已溺之再說堯舜先務之急在於親賢上堯典湯湯洪水方割浩浩懷山襄陵又孟子禹思天下有溺者由已溺之也百穀之未播聖人視斯民若已飢之舜典帝曰棄黎民阻飢汝后稷播時百谷又孟子稷思天下有飢者由已飢之也又見下注五品之未遜聖人之視斯世若已陷之同上帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬又說苑堯存心於天下加志於窮民云云有一民飢則曰此我飢之也有一人寒則曰此我寒之也一民有罪則曰此我陷之也曷嘗不以天下自任應冒子以身任天下意而一則曰用人二則曰用人應冒子不以天下纍其身意堯雖遭洪水用禹以平之則天變不足為堯纍舜雖有飢民用稷以養之雖有頑民用契以教之則世變不足為舜纍聖人蓋有見乎一人之知不足以遍天下也必矣叙本文而先後緩急必致力於其大者焉見堯舜智之大處只在親賢上應冒子默察先後緩急之宜故曰堯以不得舜為已憂舜以不得禹皋陶為已憂聖人不憂天下而以為天下得人為憂用此數語繳上意最切題得見孟子滕文公上堯以不得舜為已憂舜以不禹皋陶為已憂云云為天下得人者謂之仁嗚呼其善用知者歟其知務之當先者歟歸在知上先務只在親賢是謂智後世論堯之知曰神舜之知曰大亦既知聖人矣史記帝紀帝堯者其仁如天其智如神又中庸舜其大智也與而又舉天下之功而歸之聖人曰無能名曰有天下而不與論語泰伯子曰大哉堯之為君也云云蕩蕩乎民無能名焉又孟滕文公君哉舜也巍巍乎有天下而不與焉證不以天下纍其身意聖人豈自處於無事而忘天下者哉設難回喚下意以身任天下不以天下纍其身其惟堯舜歟雖然孟子之言主於仁而言也見本題注夫言仁而先其知孟子善論聖人者歟孟子本文先說堯舜之知後說堯舜之仁蓋昔者皋陶之為帝謨既曰知人安民矣書皋陶謨皋陶曰都在知人在安民至於九德而下則皆知人之事而安民纍不及焉何哉設難陶同上皋陶曰都亦行有九德云云皋曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而亷剛而塞疆而義彰厥有常吉哉蓋孟子言仁不言仁而言知皋陶言安民不言安民而言知人聖賢之言是或一道也皋陶之言知人即孟子之言知皋陶之言安民即孟子之言仁後世謂皋陶以知為帝謨舉此一智亦切殺揚問明皋陶以其智為帝謨身者逺矣愚於此尤信謹論前篇謂教人之忠為易盡得人之仁為無窮必須得人而分吾教人之憂此篇謂遍物之智為難盡親賢之仁為易周必須親賢而為吾先務之急就題發明格與後篇觀乎賢聖天地論同意君子之志於道如何黃印生出處孟盡心上孟子曰孔子登東山而小魯登太山而小天下故觀於海者難為水遊於聖人之門者難為言觀水有術必觀其瀾日月有明容光必照焉流水之為物也不盈科不行君子之志於道也不成章不達朱子釋云此章言聖人之道大而有本學之者必以其漸乃能至也立說謂吾道之大未易以遽至彼欲超詣徑造者殊無下學上達之工夫故君子用心於斯道以漸而至則未至者亦可至焉顧吾之所志何如耳批云主晦庵循序漸進之說破象山直詣徑造之病深得孟子此章本㫖有功於後學多矣筆力老蒼文脈貫通論中之巨擘也論曰學有未易以遽至者聖道之大未可以超詣徑造即朱子學當以漸乃能至之意亦在夫人心之而已心字指志字之詩志者心之所也學何學也喚下文學道焉耳喝出道字而道豈易言哉應破易字道固未易言也而亦未有終不可至者申上文又應破至字特患夫學者之不心乎此也歸重在志字上苟其心之心乎道也貫上心字一念所發惟此乎在而不間乎其他志惟在乎道見之真而趨之决也積之久而行之力也說志字意雖斯道之大若未易以遽至應破題語而此一心之不息且有必至之理若有志於道則道必可至焉用夫超詣徑造以為髙哉須要以漸進安可以直到學道而求為超詣徑造之髙又轉過上句學陳止齊文則有非下學者之事下學上達是漸進工夫而道有弗若是易易然者應主意未易遽至意曷若决諸吾心之所之歸在志字上心惟道之趨則道其終不可至也耶謂之未易遽至者所以見吾道之大謂之未有終於不可至者所以見立志之堅此文字反覆處吁道之大未易遽至也又反應破題語求道者亦志之耳志於是者必至於是又歸在志字上孟軻氏所以為君子言之引本文志在焉則道雖難言而豈終難哉志在於道則道不難至君子之志於道如何世之君子其亦志軻之所謂志則道矣舉題處下語亦老健不草草軻長於譬喻者也便用孟子起連接上文不斷請以水喻本出處有觀於海者難為水之語故原起借此為喻水之大未有若海者矣渺渺然歸墟之谷莫可涯也列湯問渤海之東有大壑焉實惟無底之谷名曰歸墟八紘九野之水天漢之流莫不注之而百川之能至是豈一朝夕之遽哉揚學行百川學海而至於海滿乎其中溢乎其外而後沛乎其莫禦滔滔汨汨而匯於斯也謂水之至於海亦以漸而進禹孟若决江河沛然莫之能禦也又貢東匯于海也匯水之聚水雖無心而實動物說志字用前輩議論其為物也動則其晝夜不舍而東之海也雖謂水之志也亦宜孟源泉混混不舍晝夜惟學者之志於道亦然歸題意聖人之道之大一海也下語老海聖道之大猶之大學不至聖人之道是水不至於海尋常之汚瀆耳反說有力道之海未易至也望洋者有焉應破未易至字伯莊秋水時至百川灌河兩涘諸涯之間不辨牛馬河欣然自喜以天下之美為盡在已順流而至於海望洋向若而嘆北海若曰井蛙不可以語於海者拘於墟也天下之水莫大於海萬川歸之不知何時止而不盈噫未必其果未易至也特其志之未加耳應未易至字歸在志字上昔者聖人之於道蓋自其十五之年已志乎此用志字切而語為政吾十有五志於學自是而立同上三十而立自是而不惑同上四十而不惑自是而知命耳順以至於從心不踰矩之時同上五十而知天命六十而耳順七十而從心所欲不踰矩斯時也聖道其海矣學至於道猶水至於海以聖人之為道亦於其志焉得之就孔子志上過下意孰謂學者之不志於斯也而未易遽至之道可以易易言哉入本題應冒子學未易以遽至軻蓋未嘗以易言之而怠學者之志接上易字亦未嘗以難言之而絶學者之志又以難字與易字對說苟志焉則雖未易遽至之道吾知其終可至也應冒子道固未易言亦未有終不可至語道蓋難言也先挈道字說題下過大講文脈亦不斷超乎無物之先而行乎有物之後莊子自本自根未有天地自古以固存即三才而三才在所貫即萬事而萬事在所統無精粗無巨細無乎不寓焉者也以上形容聖道之大處出入先儒議論聖人者該其體之全㑹其用之大而曾無虧缺道之全體大用皆備於聖人之一身故語道之大者至聖人止矣荀子禮論聖人者道之極也又中庸故君子語大天下莫能載焉道止聖人之為大則其所謂大者毋乃抗之以自孤乎設疑辨難聖人未始以其道之大而孤立於天下也解上文因反歸正學陳止齊仲尼不為已甚論文法人皆可能也中庸夫婦之不肖可以能行焉志於道一語昭昭然號於人說出本題惟懼夫人有未至應冒子未至字吾之所至者由之果賜之達子路之果敢子貢之通達語由也果賜也達曷嘗不欲一蹴而詣其極而終未獲窺其奧者一蹴一步也謂學者非不欲一步而徑造聖人之道而終不能見聖道之藴奧亦或欲速者纍之而卒之移其志抑二子有超詣徑造之病語欲速則不達陋巷之子於其心齊限智慮之頃而求所謂道語顔淵賢哉回也一簞食一瓢飲在陋巷又莊子回曰敢問心齊又回曰墮肢體黜聰明離形去知同於大道一以夫子為準的顔回志孔子之志終日如愚蓋有循循以進之功語子曰吾與回言終日不違如愚取顔子有下學上達之工夫正猶百川學海而至於海者進不止也應原題百川能至之之語未語吾見其進也見其止也道豈果未易至哉應冒子語君子而求至於道則亦至之而已在於志上軻之喻諸人者曰立志曰持志曰志一曰專心致志舉孟子數箇志字證題孫孟萬章下懦夫有立志又公丑上持其志無暴其氣又志一則動氣又告子上其一人專心致志惟奕秋之為聽其所以立是志者亦立於道耳道外非吾志也以上解孟子之立志在於道其所以持其志者亦為道持之耳舍道則志不在是也以上解孟子之持志在於道志惟一則純乎道不少雜焉而蹶趨於血氣之馳也以上解孟子之志一亦在於道動孟公孫丑今夫蹶者趨者是氣也而反其心志惟專則凝於道不少誘焉而望望乎援鴻鵠之弓也以上解孟子之志專亦在於道鵠孟告子上一人雖聽之一心以為有鴻將至思援弓繳而射之軻之志若是然也總孟子上面四箇志字此志一定二不二三不參不東以西不南以北用朱文公敬齊針語不二以二不參以三云云勉焉而非強揠循焉而非躐等久以持之不倦以終之皆是循序漸進之意則仁若未易以遽至也而充其事親之實而至於無一念之非仁則仁之道可至矣孟離婁上仁之實事親是也義若未易以遽盡也而充其從兄之實而至於無一事之非義則義之道可盡矣同上義之實從兄是也禮智若未易以遽能也而充其節文知斯之實而至於無一節之非禮無一端之非智則禮智之道可能矣同上智之實知斯二者弗去是也禮之實節文斯二者是也以上三股應冒子道未易以遽至未有終不可至者身即道也而吾身之能誠孟反身而誠樂莫大焉性即道也而吾性之能養孟子存其心養其性天即道也而吾天之能知同上知其性則知天矣一理徹而萬理融用伊川語又孰有見海若而歎不足以語秋水者哉應原題以水為譬意見原題莊子注至則軻幾於孔矣謂孟子之志於道幾及孔子蓋原題已用孔子志學事故以孔孟字夾用軻則幾於孔矣而世之君子不皆軻之學孔也說孟子以志於道之說誘天下之人不小吾聖人之道以為易能此志失之不及則大聖人於過髙而謂終不可幾及也此志失之太過軻實憂之孟子欲引而志於道始之以觀海之難以喻吾道之大若未易以遽至者見本題注以應冒子道未易遽至繼之以觀水有術以喻斯道之原有可得而求者應冒子志於是則至於是而終之以盈科而進之喻以見學者而志於斯則道未有終不可至者應冒子一此心之不息且有必至之理嗚呼君子人歟其亦志軻之志以道孔之道歟貫合題下文勢圓轉而吾猶疑夫道有未易言者也此篇文字最是好從冒子過原題過大講過結尾處一串說去文脈不斷可法何也軻之言諒為時之君子發也此語蓋為戰國之人設若告子若萬章若公孫丑要皆有志乎道三人皆孟子弟子究其所以質諸軻則丑之問氣易於論氣者也孟公孫丑上敢問何謂浩然之氣曰難言也告之言性易於論性者也孟告子上告子曰性猶杞栁也義猶杯棬也又曰性猶湍水也又曰生之為性又曰食色性也章之問舜易於議聖人者也孟萬章曰堯以天下與舜有諸孟子曰否天子不能以天下與人道可易乎哉應冒子易字如三子者吾意其枵乎其中而騖乎其逺枵空虛也騖馳驟也不少得乎道而遽曰道可以立至焉三子以道為易至下學之功不加而躐求上達之事三子皆有超詣徑造之病而無下學上達之工夫志則大矣如未足以入道何貶三子不能至乎聖人之道此固軻之所憂而有不成章不達之語以警夫求道之君子見本題注朱子釋云成章所積者厚而文章外見也噫又豈惟戰國之君子為然含譏當世意是學吕中帝王治安之本論尾結又豈特漢事為然謹論就題發明格與前篇君子之志於道論同意觀乎賢聖天地如何章祥道出處揚子修身篇觀乎賢人則見衆人觀乎聖人則見賢人觀乎天地則見聖人立說道不可以頓悟也悟道固有其幾而進道必有其序由近之逺由淺入深由小至大當以漸進是必離乎衆人而後可以及賢人及乎賢人而後可以造聖人造乎聖人而後可以參天地蓋有次序者在非可以躐等而進也批云循序漸進之說得之朱子中間議論出入伊洛諸儒非可與直詣徑造者語也論曰吾道至造化而極吾道字包聖賢造化字包天地學者要不可以頓悟也由衆人至賢人由賢人至聖人由聖人至天地當循序漸進未可以頓然便悟也悟字有觀意夫道無終窮接上道字包聖賢天地意固非局於淺識者所能知說觀字意亦非急於躐等者所能造說循序漸進意彼其躐等以進非不可以言頓悟之學應破題頓悟二字究其極亦終於茫昧而已若不以漸而進則所謂觀者終於不知而已矣何也喚下意悟道固有其機而進道必有其序主意在此兩句近之而後逺也淺之而後深也微小充之而後可以廣大也此三句指由衆人而賢人由賢人而聖人由聖人而天地意未離乎衆而曰我賢者欺也離乎衆人方可到賢人反是則為欺誑未及乎賢而曰我聖者妄也及乎賢人方可到聖人反是則為妄誕未造乎聖而曰我參天地者荒也造乎聖人方可到天地反是則為荒匆欺妄荒三字與大講相應由衆觀賢進一等由賢觀聖再進一等由聖觀天地又進一等庶幾循序觀之亦循序進之即前面非可以淺識而知躐等而造之意而道之妙在我矣吾道至天地而極而曾謂欺者妄者荒者之可以得道乎總前面欺妄荒三箇字子雲論道始曰觀賢次曰觀聖又其次終之以觀天地叙本文語截乎等級之嚴有如此一級髙一級一層髙一層吁學者欲進而觀聖人又進而觀天地可不先自觀賢始當循序漸進不然觀我生未能賢於衆焉則去道已逺而於聖人天地吾何以觀之哉反說有味生易觀卦觀我觀乎賢聖天地如何請申子雲之本㫖粵自絪緼判而形體均有天地之氣而後有人之形易繫辭天地絪緼萬物化醇形體均而性真具有人之形便具天地之性賦朱文公云氣以成形而理亦焉賢得此道而為賢聖得此道而為聖天地得此道而為天地謂賢聖天地本同此道一反觀之喝出觀字而賢聖天地之道具焉而謂不可以頓悟何哉應破題頓悟二字設疑辨難嗟夫是以天地之性觀道而未以氣質之性觀道也朱文公云有天地之性有氣質之性天地之性則純粹至善無智愚無賢否一本而已矣氣質之性則稟受不同有昏明有厚薄非可以一概論論性不論氣不備論氣不論性不明性是天地之性氣是氣質之性衆人賢人則是氣質之性聖人則天地之性云張橫渠正䝉云性猶水也以水為譬有流而未逺固已溷濁則衆人也衆人之性如水濁中之濁有流而漸逺方有所濁則賢人也賢人之性如水清中之濁有流而至海終無所汚則聖人也聖人之性如水清中之清伊以上數語見近思録程川云云聖人即天地之性雖賢人亦未離氣質之性總前面說話是可泛泛觀之而一蹴可以詣此道乎應非可以淺識而知躐等而進之說故必加澄治之力使濁歸於清則所觀漸明而衆可進於賢矣澄衆人之濁而漸進賢人之清亦是用伊川語復加淵深之功使清勝夫濁則所觀益明而賢可進於聖矣由賢人濁中之清而愈進聖人清中之清苟至於聖則湛然不滓粹然不雜渾然天理之性聖人之性即天地之性徹上徹下其觀殆有不容間者兹其為漸進之學也應冒子語道固有其機造道必有其序意彼欲頓悟以求道者祇自恍惚耳自誕謾耳道安在哉應冒子彼其躐等以進非不可以言頓悟之學䆒其極亦終於茫昧而已昔者聖人之立教也入講道有等級意自道德性命降而仁義禮樂孟子題辭仁義道德性命之言又離婁上仁之實事親是也義之實從兄是也禮之實節文斯二者是也樂之實樂斯二者降而文行忠信語子以四教文行忠信又降而射御書數記六藝禮樂射御書數又降而徐行折枝孟為長者折枝又徐行後長謂之弟又降而灑掃應對記灑掃應對進退下數箇降字是學沈渙學道損益論文是豈淺視吾道而至是耶疑辭設難忱悲天下視此道過髙或索之清靜寂滅之境此是佛老之學生韓原道今其法曰必棄而君臣去而父子禁而相養之道以求其所謂清靜寂滅者而終不見天地賢聖之大全也歸本題意譬如行逺必自邇譬如登髙必自卑中庸君子之道譬如行逺必自邇登髙必自卑撤籓籬捐門牆去簾陛乃使塗之人一舉足可以觀宗廟之美百官之富豈理也哉以此比直詣徑造之徒言吕與叔詩剖破籓籬即大家又賈誼䇿人主之尊譬如堂羣臣如陛衆庶如地故陛九級上簾逺地則堂髙又語不得其門而入不見宗廟之美百官之富吁是則聖人之所憂而子雲切切為修身者告也叙本出處嘗因子雲之論求之昔矣考䆒古者善學道者莫如孔門用孔門實事大抵皆以循序進道而未始躐等以求頓悟之學也應冒子循序漸進躐等頓悟之語當時從游三千徒亦衆矣此說衆人二韓顔子不過論登孔氏之門者衆矣三千之徒而賢哉之稱夫子獨為顔子申美之則知賢於衆者顔子一人而已此說賢人異於衆人一語賢哉回也一簟食瓢飲在陋巷人不堪其憂回也不改其樂賢哉回也雖子貢亦曰賜也何敢望回他可知也語子謂子貢曰女與回也孰愈對曰賜也何敢望回回也聞一以知十賜也聞一以知二孔門之衆何嘗敢躐等賢者之道而以賢自居哉以上說觀乎賢人則見衆人聞一知十有不善未嘗不知顔之自觀亦卓矣見上注又繫辭顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也以其未達一間之學雖謂之亞聖可也孟子顔淵具體而微又揚子顔子亦潜心於仲尼矣未達一間耳又孟子題辭命世亞聖之大才也而回也拳拳服膺惟恐失之中庸子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣以至仰之髙也鑽之堅也瞻前而忽後也語子罕顔淵喟然嘆曰仰之彌髙鑽之彌堅瞻之在前匆然在後瞪若乎奔逸絶塵之後莊子顔淵問於仲尼曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辨亦辨也夫子馳亦馳也夫子言道回亦言道也及奔逸絶塵而回瞪若乎其後瞪音撑瞪目貌而視夫子如天之不可階而升回之賢又何嘗躐聖人之道以聖自居耶以上說觀乎聖人則見賢人而語夫子之不可及也猶天之不可階升也乃若忠恕一貫語子曰吾道一以貫之云云曽子曰夫子之道忠恕而已聖智兼全孟孔子之謂集大成云云始條理者智之事也終條理者聖之事也夫子之道亦既聖矣孟仁且智夫子既聖矣夫聖孔子不居如天之覆也如地之載也固不待觀而見之見下注而吾夫子循循工程曾不少足語夫子循循然善誘人博我以文約我以禮不惑必四十知命必五十語四十而不惑五十而知天命祖述則堯舜也憲章則文武也上律下襲則天時水土也中庸仲尼祖述堯舜憲章文武上律天時下襲水土譬如天地之無不持載無不覆幬若聖與仁且曰則吾豈敢語子曰若聖與仁則吾豈敢抑為之不厭誨人不倦則可謂云爾已矣夫子之聖又何嘗不仰觀俯察肯自謂與天地同流乎以上說觀乎天地則見聖人子易繫辭仰以觀於天文俯以察於地理又孟子君云云上下與天地同流由此觀之孔門之衆希顔子之賢者也觀乎賢人則見衆人顔子之賢希夫子之聖者也觀乎聖人則見賢人夫子之聖又希天地之所以為天地也觀乎天地則見聖人希以上三句學通書語士希賢賢聖聖希天固非於衆之外有顔之道非顔之外有聖之道非聖之外有天地之道總上文謂聖賢天地本無二道而等級次序則有不可紊者耳應冒子悟道固有其機進道必有其序使衆不於顔是觀而曰吾觀即顔果顔之道乎不觀賢人何以見衆人外顔而為孔之觀而曰吾觀即孔果孔之道乎不觀聖人何以見賢人外孔而為天地之觀而曰吾觀即天地果天地之道乎不觀天地何以見聖人故必真為顔是觀而後可以語顔子復焉執焉之事否則欺非賢也道何在應冒子未離乎衆而曰我賢者欺也通書復焉執焉之謂賢真有顔之觀而後可以語孔子性焉安焉之事否則妄非聖也道何在應冒子未及賢人而曰我聖者妄也通書性焉安焉之謂聖真有孔之觀而後可以語淵淵其淵浩浩其天之事否則荒非天地也道何在應冒子未造乎聖而曰我參天地者荒也中庸淵淵其淵浩浩其天學道不可以頓悟而以漸進吾於孔門見之矣應主意頓悟漸進四字孟軻續孔道之傳者也引孟子說其論樂正子之為人必以善信於此可以觀賢矣樂正子孟子弟子孟浩生不害問曰樂正子何人也子曰善人也信人也而美大聖神則未遽許之同上何謂善何謂信曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之之謂神無他道不可以頓悟故也又應主意頓悟字有善信始可言美大大則化而聖矣既聖始可言不可知之神神則天地矣見上注謂孟子之言亦有次第等級非頓悟之學無善信而曰可以聖未聖而曰可以神得非誣且誕之尤者乎將上文反說證題意漸進之說子雲修身一篇曰衆曰賢曰聖再三辨之而論其所以觀必始乎賢中乎聖卒乎天地見本題注其亦得孔孟之遺㫖而覺天下以漸進之學也歟總結孔孟事又應主意漸進字雖然未也推廣題意有先知焉知則無先有後覺焉覺則無後用前輩語說觀之一字謂有待於我之觀猶有形迹不待於我之觀是為造道之妙有觀之觀又孰若不觀之觀乎觀是有心不觀是無心一理徹萬理融又孰為賢孰為聖孰為天地道之屬屬一方寸耳到此地位是造道之妙處不可得而擬議此非頓悟之學也漸進之極功也又應主意子雲所謂擬議形迹之觀乎抑揚子觀之之說不然何以即太𤣥擬易揚雄作大𤣥以擬周易而論聖人參諸身亦曰擬天地揚子聖人擬天地參諸身去其擬融其觀擬則為有迹去其擬則為無迹觀則為有形融其觀則為無形要當真有得於賢聖天地之外進一步說謹論傷今思古格與何贄循良核實之能同意孝宣舉廉得真如何論陳若蒙出處漢宣帝紀黃龍元年詔曰舉廉吏誠欲得其真也立說以廉律已乃古者士夫之常不待人主之責實自世變汚下廉恥道喪欺僞者多求其廉之真者寡於是人主之舉廉吏欲得其真可以觀世變矣吁以廉舉吏意已非古而又使人主致疑於舉者之非真為士者能無愧乎批云意有感慨文有曲折說得真字出其味悠然以長其辭婉然成章此老作也論曰以士夫律已之常以廉侓已乃古者士夫之常未嘗有真之名而至勤人主之責實至漢時欺僞者多於是有舉廉得真之說實字指真字是可以觀世變矣謂漢世不如古夫人之一身關於綱常者為甚大接上律已之常說得開濶則凡我之所當為者豈必待上之人有所為而然哉設難人謂廉乃常事奚待主之責實自義利取舍之戒不明解變說世意而寡廉鮮恥之徒雜出謂漢世廉吏少而欺僞多則前漢司馬相如傳寡廉鮮恥俗不長厚人欲橫流於穹壤之間橫去聲舍穹天也壤地也謂人皆義取利滿於天地間我之所以秉彛好德者類皆喪其所有喪去聲彛詩民之秉好是懿德至有竊清之名而行汙之實汙昔烏謂不廉者求其真者蓋寡焉喝出真字此廉之所以得稱於當世也謂廉之真者少所以有舉廉得真之名吁以廉舉吏意已非古而又使人主致疑於舉者之非真挑剔得廉字真字出意有感慨為當世之士亦可以自愧矣責士大夫不如古宣帝綜核名實之主也本贊信賞必罰綜核名實黃龍一詔本題注懇懇然慮舉廉之為難而又慮夫得廉之真者為尤難剔得廉真二字分曉嗚呼廉特古人之常事而漢世以為士夫之髙致應破題以士夫律已之常至勤人主之責實此愚深有感於世變者也應破世變二字孝宣舉廉得真如何請慨論之嘗謂舉世皆醉則醒者張其目舉世皆濁則清者揚其波以醒與清字比廉字又離騷舉世皆濁我獨清衆人皆醉我獨醒何必掘其泥而揚其波使士夫有獨醒獨清之名有醉而後醒之名始見有濁而後清之名始見有貪而後廉之名始見固非士夫之幸亦豈世道之幸耶應破士夫世變意一介不取之節不獨一伊尹商之士皆伊尹也謂商之士皆如伊尹之不取孟子萬章伊尹非其道則一介不以取諸人首陽茹芝之風不獨一伯夷周之士皆伯夷也謂周之士皆如伯夷之清誓史記伯夷𨼆於首陽山採薇而食之不食周粟亦不聞其廉稱何也設難字喝出廉嗟夫解聖賢講明所習何訓命義大間所守何戒應律已之常意之唐卓行贊命義天下大戒一節不謹沒齒餘憾沒齒猶終身也餘憾有餘恨也語沒齒無怨言則夫所謂廉者特吾職分所當為之事又喝出廉字應冒子凡我所當為意如事親之孝若曾子可也曷嘗以為有餘哉昔者士夫之廉如曾子之孝皆以為常事孟子離婁上事親若曽子者可也蓋至盤庚則有總貨之戒冏命則有惟貨之譏廉恥道喪世變不如古貨書盤庚無總于貨寶又冏命惟其吉或者以為成湯文武之隆未嘗數以貨飭其臣也謂古者士夫皆廉不必戒飭其殆商周之衰乎盤庚冏命之時不如禹湯文武之時吁此愚世變之說也應主意世變字下是風氣愈漓利欲滋長世道愈趨愈下為春秋之瀆貨無厭左昭公叔向曰晉有羊舌鮒者瀆貨無厭為戰國之嗜利忘恥前陳平傳士之頑鈍嗜利亡恥者亦多歸漢恥以上應冒頭義利取舍之戒不明而寡廉鮮之徒雜出意求如陳仲子者蓋千萬不一二焉孟滕文下陳仲子豈不誠廉士哉然而織屨辟纑寧居於陵而不居兄之室同上彼身織屨妻辟纑以易之也辟音璧纑音盧辟績也纑練麻也又見下注咽李哇鵝寧妻之食而不母之食同上井上有李螬食實者過半矣匍匐往將食之云云辟兄離母處於於陵他日歸有饋其兄生鵝者已頻顣曰惡用是鶂鶂者為哉他日其母殺是鵝也與之食之其兄自外至曰是鶂鶂之肉也出而哇之云云以母則不食以妻則食之以兄之室則不居以於陵則居之注於陵地名曾是以為廉乎謂陳仲子非廉士嗚呼聖賢之所不齒而通國乃以為廉世道抑可知矣應世變字與求其真者蓋寡意俗流失世敗壞不至乎秦不止也廉恥道喪至秦而極漢興其世道之一機乎應世變字方引入漢來而又適值乎倥偬之日漢髙祖時倥偬猶匆冗也則使貪使詐吾何擇焉說是時未暇擇吏之廉固有身為宗臣甘受自汙之名前漢蕭何傳多買田宅賤貰貸以自汙位居宰相不免受金之辱陳平傳或讒平曰臣聞平使諸將金多者得善處金少者得惡處云云無知對曰云云受金安足疑乎一再傳而文帝若可以革吏治矣漸漸引入來過文帝然漢之化猶淺而秦之染滋深漢猶秦染謂漢繼秦後未有更革士大夫尚仍秦舊孝廉一詔至萬家而無應令者文帝本紀十二年詔舉廉萬家無應令舉一廉字則簠簋不飭寧能免年少之嘵嘵乎賈誼䇿大臣不廉曰簠簋不飾嘵嘵奴交反猶喧喧也繼而建元發䇿過武帝見下注首以廉恥貿亂未得其真為問武帝䇿董仲舒制曰今廉恥貿亂未得其真字舉一廉字一真證題甚切仲舒之對非不剴切仲舒對武帝䇿或者已覘於三䇿委曲之不合而迎逢者至矣武帝三䇿仲舒三對不合帝意擯為江都相而公孫𢎞阿諛逢迎帝意平津之寵既穹公孫𢎞為相封平津侯布被之詐猶飾汲黯曰𢎞位三公為布被此詐也𢎞曰夫以三公為布被誠飾詐欲以釣名何其不近人情也耶帝亦卒售其欺而已管仲云三子非人情不可近謂武帝受公孫𢎞之欺嗚呼嘆咏思古古非無廉士也又喝出廉字簡廉之教特古人九德之一耳書皋陶謨亦行有九德曰簡而廉應廉特古人之常事耳漢之人主乃能以是求之士大夫乃不能以是應之應冒子漢世以為士夫之髙致及人主致疑於舉者之非真意吁甚可嘆也耶又嘆詠傷今宣帝興自閭閻誠知民生之疾苦係於吏治之廉汙循吏傳序宣帝興於閭閻知民事之艱難見下注拳拳然以責實為心應主意責實字守同上及拜刺史相輒親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然夷考是時考究宣帝之時送迎省費如霸者固少有黃霸傳為穎川太守曰數易長吏送故迎新之費廉此是者而虧湟中之糴者比比皆是趙充國傳上屯田奏湟中穀吾謂耿壽昌中丞糴三百萬斛耿中丞請糴百萬斛乃得四十萬斛此是不廉者家無餘財如邑者不多見朱邑傳身為列卿家無餘財此是廉者而增僦車之錢者滔滔若流田延年傳請增僦直車凡六千萬餘錢此是不廉者於是今年而有郡國牧養之詔本始元年詔郡國謹牧養民明年而有吏不廉平之詔神爵三年詔吏不廉平則治道衰又明年而有欺謾避課之詔黃龍元年詔令吏或以不禁奸邪為寬大云云務為欺謾以避其課至是而舉廉得真之詔又下矣見本題詳注帝何切切於是哉設問帝之心是則然爾生下文抑古者事舉言揚之制出長入治之職不專在是應古者以廉律已乃士夫之常意興記文王世子或以事舉或以言揚又禮地官使民賢出使長之興能入使治之向使在位皆素絲正直之風詩羔羊在位皆節儉正直云云羔羊之皮素絲五紽立朝皆氷蘖自將之操李義山傳氷蘖自將之言士大夫如氷之清蘖苦則所與我共理者皆將芥軒冕而塵珠玊矣宣帝本紀與我共理者其惟良二千石乎又用通書語銖視珠玉塵視軒冕吾知舉廉得真之詔不必下也以上謂漢之吏苟如古者之亷則為常事耳又何待下此一詔然則班固作漢吏傳以循良稱而不以亷稱者亦豈無見於此歟漢循吏傳序云云是故漢世良吏於斯為盛繳講中意盡抑吾有感於世變而考之聖賢之遺論焉應主意世變字傳曰官之失德寵賂章也國家之敗由官邪也左桓二年臧哀伯曰國家之敗由官邪也官之失德寵賂章也孟子又曰上下交征利則其國危孟子梁惠王上云云夫寵賂何至於敗家征利何至於危國古人立論乃如是之確何耶申上文反覆辨難作議論蓋人主之所恃者人心而已歸重在人心上吏治之貪廉民生之休戚係焉吏廉則係民之休貪則係民之戚民生之休戚國家之存亡基焉民之休則國存民之戚則國亡此斷斷不可易之理也取上面聖賢議論自非卓然有見之君鮮有不徇於流俗者又歸在人主身上宣帝舉廉之詔又歸本題其亦更嘗久而世故深閲歷多而人情熟而見於黃龍之年黃龍元年乃宣帝之末年乃下舉亷得真之詔惜其不早下此詔也惜夫晚矣哉斷送語老成謹論傷今思古格與陳若䝉孝宣舉廉得真論同意循良核實之能如何論何贄出處唐陸贄奏議漢宣精吏能故其時萃循良核實之能立說古之吏有循良之實而無循良之名上之人亦無待於考核後世吏惟不能皆循良也故宣帝不得不嚴為考核之法其間梢稍循良者始得以能自名而帝亦有精於吏能之稱此名要非帝之所樂聞也適足以驗吏治之不如古爾批云意婉曲文條暢說得實字出有感慨有抑揚佳作也論曰吏不必有名也謂古者之吏無循良之名任吏而以名稱之至漢吏始有循良之名而且至於考核其實名字反形實字自吏治之不如古始見得考核之法不如古者之時蓋古之為吏者有循良之實而無循良之名分曉說出主意其任吏者有樂與之情而無嚴察之意古者未嘗考核其實題以上數句為下張本當是時也循良之名且不立何有於核實之稱此二句正與題相反後世吏習不美欺誕成風自此以下暗說宣帝之世上之所以待之者於是乎不得不嚴為考核之法喝出題上核字謂惟吏無循良者所以考核其間有自拔於流俗之中者是時間有一二循良之吏始以能稱以循良名又喝出能字循良字嗚呼吏惟不能皆循良也而後循良者以能著反古者之吏有循良之實無循良之名意為吏者已可以自愧矣說主意分曉吏無循良之實至使人主嚴為考核之法以察之反其任吏者有樂與之情而無嚴察之實意吏得以循良自名而人主亦有精於察吏之稱見本題注檢㸃得循良字核實字能字皆出人主亦豈樂聞此名哉應破名字陸宣公之言曰漢宣精吏能故其時萃循良核實之能本出處全文能之一字凡兩言之喝出兩箇能字宣公之言雖所以美宣帝亦所以傷吏治之不如古爾應破題文有抑揚循良核實之能如何請繹其說循良之名何始乎唐虞三代之臣未嘗求為此名也發問循良二字從古者引起核實之名何始乎唐虞三代之君亦未嘗為此名也又發問核實二字於應冒子循良之名且不立何有核實之稱意循良之名核實之法其始昉於漢之時乎總上循核歸漢之時漢初皆刀筆吏前漢蕭曹傳贊蕭何曹參皆起秦刀筆吏文景繼之漢文帝景帝又多將相舊臣前刑法志孝文將相皆舊功臣至宣帝厲精為治而核實之法始行於羣吏魏相傳宣帝厲精為治練羣臣核名實核實之法既行則循良之吏始盛發出本題循良核實四字然則能之一字所以挈而豫之者喝出能字豈宣帝之君臣固能為唐虞三代之所不能歟應原起反難曰非也應上後世之吏惟其多鍥薄也而後循良之名立說出主意名字應冒子吏惟不能皆循良也而後循良者以能著惟其多虛誕也而後核實之法行應冒子吏無循吏之實至使人主嚴為考核之法以察之察吏之名非帝之所樂聞也應冒子人亦豈樂聞此名哉意吏而以循良稱祗足以驗吏治之不古爾應冒子傷吏治之不如古意我思古人再說古者百工惟時無循名也書皋陶謨百僚師師百工惟時九德咸事無良稱也同上九德咸事俊乂在官宣慈惠和之才靖共正直之士未嘗以一能自耀也左文十八年髙辛氏有才子八人宣慈惠和又詩靖共爾位又羔羊詩在位皆節儉正直之以上數句應冒子古者之吏有循良實無循良之名故三載一考績也而不聞其有綜核之名書舜典三載考績六計所以察吏也而未嘗見其峻厲督責之意禮天官以六計弊羣吏之治以上數句應冒子其任吏者有樂與之情而無嚴察之意想夫人而皆能也而皆循良也亦既皆有其實矣而又何核之有以上數句應冒子循良之名且不立何有於核實之稱至從我思古人起此皆是思古若夫後之為吏者則異於是自此以下是傷今指宣帝時以良吏為難能喝出題上良字又見循吏傳前後互注以循理奉法為無能又喝出題上循字循吏傳序奉法循理之吏不矜功伐能百姓無稱苟且取容虛誕成習本紀上下相安莫有苟且之意元又本紀元康二年詔曰增辭飾非如黃龍年之詔則曰務為欺謾皆是苟且虛誕之意彼其釣名飾譽於一時直謂可以欺一世之耳目同上元康詔云云越職踰法以取名譽君如宣帝其可欺乎哉以上數句應冒子後世吏習不美欺誕成風一段此核實之法所以不見於唐虞三代之世而見於帝厲精之日也再提起唐虞三代繳歸宣帝身上文有關鎖或者不察猶謂帝之所以核實者失於繩束之過嚴傷於刻畫之太甚以核實二字作議論謂核似有繩束刻畫之意風林無寧翼急湍無縱鱗借此二物為譬謂林有風則烏翼不安寧水之急則魚鱗不放縱如刻核之世無循良之吏二句用陳止齊文以為未免作意震之而使整齊也自此以上皆開說抑豈知亦吏有以自取之耳歸本意惟吏不循良所以有待人主之核實漢至宣帝八葉矣承武昭之後正入宣帝來講欺謾虛僞之弊不少謾音瞞見前注又王成僞增户口帝蓋深懲夫吏習之不美也思所以苗耨而髮櫛之淮兵略訓若櫛髮耨苗所去者少而所利者多也去吏之不實者如耨田苗梳頭髮故自其上計具文欺謾非實也見下注於是乎真僞相亂者不得不嚴為御史之按宣本紀黃龍元年詔上計薄具文而已務為欺謾以避其課御史察計簿疑非實者按之使真僞無相亂自其用法飾辭奏不如實也見下注於是乎越職踰法者不得不詳於二千石之戒同上元康二年夏詔今用法或持巧心增辭飾非奏不如實二千石各察官屬或越職踰法以取名譽豈不殆哉責平審於廷平非親細務也見下注以刻深無實者不容於不責也前刑法志宣帝下詔曰間者吏用法巧文浸深決獄不當朕甚傷之於是求明察寬恕黃霸等以為廷平考言行於守相非尚苛察也見下注以實不相應者不容於不考也前循吏傳序及拜刺史守相輒親見問退而考察所行以質其言有名實不相應必知其所以然吁此帝所以有精於核實之稱也亦豈帝之本心哉應冒子人主亦有精於察吏之稱人主亦豈樂聞此名哉傳漢循吏者才六人而宣帝之吏居其五前漢循吏傳文翁王成黃霸朱邑龔遂召信臣共有六人只有文翁一人是文帝朝時人其餘五人皆宣帝朝時人元本謂傳漢循吏十有一人誤也今改正作才六人若後漢范曄作循吏傳却有十二人而宣帝之五人是前漢人不在其列自常情觀之則以為漢世吏治之盛無出於此循吏傳漢世良吏於是為盛帝之所望亦豈止是核實非帝得已向使忠厚長者人皆龔遂也何必有治郡有聲之名龔遂傳遂為人忠厚上以為渤海太守上問以治狀遂對云云天子笑曰君安得長者之言而稱之外寬內明人皆黃霸也何必有治為第一之名黃霸傳霸以外寬內明得吏民心治為天下第一廉平不苛勤力有方人皆朱邑信臣也又何必有淑人君子為民興利之名朱邑傳廉平不苛以愛利為行天子下詔褒揚云云可謂淑人君子又召信臣傳信臣為人勤力有方略好為民興利意以上三段皆是反難應吏不必有名循良之名不立則宣帝核吏之名亦且泯然矣夫豈有能不能之别耶應冒子循良之名且不立何有於核實之稱喝得能字響惟其當時之吏不皆龔黃朱召也則帝不可不嚴為考核之法也總上四人歸本意應冒子不得不嚴為考核之法行考核之法而得所謂循良之吏申上文歸題意吏有循良之能宣帝所以有精於吏能之稱以上數句應冒子吏惟不能皆循良也而後循良者以能著自向使下至此文有操縱是意也惟陸宣公知之入本出處迹其所言固所以美宣帝抑亦有感於後世吏治之不古歟結大講亦與冒子結處相照雖然綜核名實君之責也見前注總領衆職其大臣之責歟魏相傳總領衆職甚稱上意末歸之大臣吾觀魏相之輔相也講魏相精白一心以承休德用賈山至言語相亦可謂無負於帝矣取魏相好尚書副封則白去之守相不實則奏斥之魏相傳相因許伯白去副封以防壅蔽又上書今郡國守相多不實選一時士精其能吏稱其職或者亦魏相總領之功也宣帝紀贊綜核名實政事文學法理之士咸精其能云云亦足以知吏稱其職又見前注論而至此則知帝有循良核實之能而又知魏相總領衆職之能見前注魏相本出處無能字今添一能字似未穩然大體自好謹論前篇謂廉者乃古者吏治之常而真之名不聞今宣帝舉廉吏而必得其真可以覘吏治之不古此篇謂循良乃古者吏治之常而實之名不聞今宣帝舉能吏而必核其實可以覘吏治之不古同出一機軸亦與已集陳耆卿漢世良吏為盛葉觀光漢吏廉平論同意合而觀之可以觸類而長推究源流格與歐陽起鳴學者審其是論同意世宗統一聖真陸合出處前漢武帝叙傳世宗曄曄思𢎞祖業云云武功既抗亦迪斯文憲章六學統一聖真立說謂聖道本無僞也惟漢承秦滅學之後道統不傳邪說紛起竊聖人之近似者以欺世於是僞者始得以亂真武帝能體認於真僞近似之間而㑹斯道於分裂渙散之後是之謂統一批云明白條暢不晦不深儘可為式論曰道本無僞也無僞字指真字謂聖人之道未有邪說之害何嘗有僞底由似是而非者得以僞勝竊聖人之近似者始得以僞亂真孟盡心惡似而非者而人主㑹道之功始著矣武帝方出來統一聖人之道㑹字有統一意蓋僞不能以亂真僞是邪說真是聖人之道惟似真而僞者得以惑之邪說似聖人之道而非聖人之道方其始焉不過竊吾道之似及其終也乃至於亂吾道之真始以邪說之僞終亂聖人之真於似是而非之中而揭其所謂真者而尊尚之暗說世宗統一之功使昔之渙散者有所歸說統字意向之分裂者有所據說一字意合其所以二而㑹其所以一總說統一字則宗主斯道之功顧不偉歟應㑹道之功始著意漢承秦者也凡史論要早入題方推究得源流出百氏興而正學微包講中學申韓蘇張之學者真以僞奪其來蓋非一日申韓蘇張之學皆聖人之道是以僞奪真武帝乃能體認於真僞近似之間入本題之主來應破題似是而非意尊經崇儒武帝能表章六經尊崇儒術㑹斯道於分裂渙散之後說統一意真者既明聖人之道僞者自息申韓蘇張之學班固以統一聖真歸之信乎其能統一矣揚史臣叙傳之說世宗統一聖真請申其說嘗謂六經不言真挑出真字說用前輩議論非不言真也就斡一轉道本無僞而真之名不得而加也應破題道本無僞也自朱紫混淆而紫得以亂朱也於是天下無真色語十七惡紫之奪朱也又孟盡心惡紫恐其亂朱也注紫間色朱正色自鄭雅雜奏而鄭得以亂雅也於是天下無真樂語十七惡鄭聲之亂雅樂也又孟盡心惡鄭聲恐其亂樂也注鄭聲淫樂也樂正樂也自邪正並馳而邪得以亂正也於是天下無真學以紫之亂朱鄭之亂雅比邪說之亂真夫所以立夫真之名者正所以致辨於毫芒疑似之間耳應似是而非之說方良心同得於生民稟賦之初從原頭說來而天理流行於愚夫愚婦日用常行之際中庸君子之道費而隱夫婦之愚可以與知焉人與道術相忘真之名固不立也既是無僞安有真之名應道本無僞亦何待於統一之功哉不必統一是故精一執中堯舜之真傳書大禹謨帝曰人心惟危道心惟微惟精惟一允執厥中克已復禮孔顔之真意語十二顔淵問仁子曰克已復禮為仁一貫忠恕參賜之真知語四子曰吾道一以貫之曾子曰惟云云夫子之道忠恕而已矣又子曰賜也云云豫一以貫之是真之實固已潜通默㑹於君臣師友講明授受之中此一句指前真傳真意真知三樣人而其名則泯於言辭之表無真之名斯道之統渾然大全固如此謂道在古昔渾然大全不待統一不幸而更春秋歷戰國次第引入來諸子百家並建角立說邪說抵老莊為黃帝之學前司馬遷傳大道先黃老而後六經黃老黃帝老子之學許行為神農之言孟滕文公有為神農之言者許行墨氏祖於禹謂墨氏兼愛本大禹之心人莊子墨子稱道曰禹大聖也而形勞天下如此申韓祖於道德史記老子傳申韓慘刻少恩皆原道德之意各以已見而求附於聖人之道總上面數句觀其名則是究其實則非學韓文問其名則是究其行則非知道之主孰能致辨於近似之間哉數子之學皆似是而非者漢承秦絶學之後入漢事來髙帝以馬上得天下詩書之事蓋所未遑前陸賈傳賈時時前說稱詩書髙帝罵曰乃公居馬上得天下安事詩書逮至文景文帝景帝又不過從事於黃老申韓之術而已黃帝老子好清靜申不害韓非學刑名後漢樊隼傳文帝性好黃老六經之道與百家並馳似是而非誰其辨之應破題語武帝臨位以來正入武帝講題道德性命之說固已稔聞於親近儒生之頃前董仲舒傳勉強行道大有功又命者天之令性者生之質也而偏見詖論時亦間見捷出於諸子雜說之流前藝文志建藏書之䇿及諸子傳說皆充祕府於斯時也使帝而辭其統一斯道之責而復以安事詩書為家法反說前注見以清淨無為為治本前食貨志孝文清淨恭儉安養天下以刑名慘刻為君德前儒林傳序孝文好刑名之言吾恐正邪不分而真者終為僞所奪應冒子真以僞奪之語是漢初之舊習猶存而吾道一線之脈終無可續之時也若邪說得行則聖真終無統一之時帝也正說武帝將欲覺人心於斯道晦蝕之後可不章六經於百家紛擾之餘哉武帝贊卓然罷黜百家表章六經故知申韓蘇張之學易以假真也則其言之亂國政者必為之屏斥武帝紀詔丞相舉賢良方正直言極諫之士丞相奏所舉賢良或治申啇韓非蘇秦張儀言亂國政請皆罷奏可知諸子傳說之言易以亂真也則不在六藝之科者必為之抑絶董仲舒䇿今師異道人異論百家殊方指意不同愚以為諸子不在六藝之科孔子之術者皆絶其道勿使並進申公之授詩則召之前申公傳申公事齊人浮丘伯授詩孔安國之為經作傳則詔之尚書序孔安國承詔為五十九篇作傳以至徐生之頌河間之雅則莫不進之東方朔傳嚴安徐樂等皆辨知閎達溢於文辭又河間獻王傳采古禮樂事稍稍增輯至五百餘篇凡諸儒平日之嚌擩乎道真者皆是尊是尚唐文藝傳嚌擩道真擩音撋曰嚅者非合其二而歸諸一應冒子合其所以二㑹其所以一天下學者始知六經之為真矣方知武帝統一聖真之功嗚呼說餘意孔楹夢奠記檀弓孔子夢奠於兩楹之間軻死無傳韓原道孔子傳之孟軻軻之死不得其傳焉是道一脈久冷於秦坑煨燼之餘書序及秦始皇焚書坑儒垂絶於異端簧鼓之際如黃老申韓蘇張之徒皆是異端一旦揭斗柄於迷途人惑異端今覩聖真如冥行者之見星斗曳足音於空谷聖真絶響今方聞之如空谷之聞足音莊子逃空虛者聞人足音蛩然而喜矣帝之有功於斯道豈淺淺哉歸重武帝統一之功雖然㑹此道之真以淑夫人帝固可喜也本論主意全此心之真以用夫道寧不有望於帝乎欲武帝推行聖人之道如其虛文徒示而實意不存則雖真猶僞也反說有是道而不能用又何取其為真當帝之世經學大明儒術向風人莫不以為統一聖真之效前儒林傳田蚡為丞相黜黃老刑名百家之言天下學士靡然向風然觀其朝廷之上君臣之間相與講論治道者考究當時君臣皆不能推行聖人之道非孔僅桑大夫之功利前食貨志孔僅為大農丞領鹽鐵事桑𢎞羊貴幸言利析秋毫則趙禹張湯輩刑名之學耳前趙禹傳武帝時為御史與張湯論定律令作見知法魯申公則罷斥至邸前申公傳趙綰受詩申公綰請立明堂乃言師申公上使安車蒲輪迎申公至上問治亂之事公對云云上見申公對默然即以為大中大夫舍魯邸膠東相則擯棄於外董仲舒傳仲舒以賢良對䇿天子以為江都相後公孫𢎞摧之使為膠東相其所以關吾道之命脈而為吾道之蟊賊者未見其能進此而退彼也蟊賊字出毛詩害稼蟲也然則帝之所謂統一者毋乃躐其名而已乎躐等取名不然後之論者何以帝為好名之君謂武帝有統一之名無統一之實謹論此篇言異端竊吾道之近似以亂其真必待統一之功後篇言異端竊吾道之近似以亂其是必待審察之功推究源流格與前篇世宗統一聖真論同意學者審其是歐陽起鳴出處揚子學行篇習乎習以習非之勝是也况習是之勝非乎嗚呼學者審其是而已矣立說是非之理常對立於天下非者不難辨似是而非者最難辨異端者流竊吾道之近似以欺時惑衆者非一此似是而非者學者不可以不察也批云說正文明最利初學論曰疑似之際指異端竊吾之近似者君子辨之衆人惑焉辨有審字意此三句是學蘇東坡作六一居士序文言有大而非夸達者信之衆人疑焉夫是之與非常對立於天下把是與非對說而瞭然於人心之天孰肯是其非乎人心皆曉然知是非之理然而非者不難辨全然不是者不難審察似是而非者最難辨也似吾道而非者須要審察立此三腳為一篇之綱天下有大公至正之理如是而非如是而是謂是非有一定之理關諸百世而不慙質諸聖人而不悖此人心之公是也此一等是是者不必辨學中庸語建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑異端者流此等之人最害道竊取吾道之近似者而亦謂之是此似是而非者如楊墨申韓之徒以欺時惑衆者非一孟子題辭異端並起若楊朱墨翟之言以欺時惑衆者非一人惟行矣不著習矣不察則害道也𢎞矣不察異端之似是而非者所以害道焉孟盡心行矣而不著習矣而不察焉二者蓋同謂之是總上三段一非一是者而所以為是則不同焉一箇是真是底一箇是似是而非底所以不同此學者之所當深察而揚雄之所以力辨也說審字康此四句是學邵有天下者審其御論繳結處學者審其是嗚呼人知非之為非孰知是之為非乎總繳是非二字嘗謂邪不能以亂正而亂正者似正而非正也應下面似是而非意僞不能以亂真而亂真者假真而非真也應下面似是而非意非不能以亂是而亂乎是者其似是而非者乎應破題似是而非字夫是非之在天下本不難辨也應接題是之與非常對立於天下然有非是者有真是者有似是者是非有此三等豈可不辨涇之不可以為渭枘之不可以為鑿此非是也涇濁渭清枘圓鑿方金堅而良玉美而粹此真是也唐王勃傳宋之問之文如良金美玉無施不可莠之亂苗紫之亂朱珉中而玊表羊質而虎皮其似是者乎孟惡莠恐其亂苗也惡紫恐其亂朱也又見揚子云云珉石也似玊而非玊非是者不難辨此一等是下流底人應非是一股真是者不待辨此一等是吾儒之近應真是一股而似是者不能辨愚者惑之智者亦惑之不惟不肖者惑之賢者亦惑之君子可不辨之乎此一等是異端竊吾道之近似者不可不辨應似是而非一股應冒子君子辨之衆人惑焉夫是者人心天理之公昔帝今王之道也此真是者揆諸心而當度諸理而宜是者只是當然之理建諸天地而不悖質諸鬼神而無愧者也中庸見冒子注堯舜之官天下此是也三王之家天下此是也前蓋寬饒傳五帝官天下三王家天下家以傳子官以傳賢伊周之相天下孔孟之師天下亦此是也伊尹相成湯周公相成王孔子設教於春秋孟子設教於戰國在易謂之元易乾卦大哉乾元坤卦至哉坤元在書謂之皇極書洪範五皇極皇建其有極在春秋謂之權衡文中子事君篇子謂淑恬曰汝為春秋元經乎春秋元經於王道是輕重之權衡曲直之繩墨在禮記謂之中庸亦此是也禮記中庸伊川云中者天下之正道庸者天下之定理豈非人心之真是者乎以上皆是真者應真是者不待辨異端者流竊取吾道之糠粃簧鼓時人之耳目應冒子異端者流一段佛老之道德道德之名則是而虛無則非也韓原道佛老之所謂道德云者去仁與義言之也佛者虛無之學楊墨之仁義仁義之名則是而為我兼愛則非也孟楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也云云是邪說誣民充塞仁義也中庸之名則是而小人之中庸則非也中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也忠信之名則是而鄉原之忠信則非也孟盡心下萬章曰一鄉皆稱原人焉無所往而不為原人孔子以為德之賊何哉曰云云居之似忠信行之似亷潔以至專門名家各是其師之說諸子百篇各是其已之見漢之諸儒如此吾以其說彼亦以其說吾之所謂是者如彼彼之所謂是者如此各以已見為是甚矣疑似之惑人也應破疑似二字錙銖之失尋文之隔也毫釐之差千里之繆也似是而非者見周易繫辭其始也堯舜周孔之同門此是真是者其終也桀跖楊墨之異路此是似是而非者然則君子將何如哉歸學者上來嗚呼亦審此而已矣歸審字內審諸心外審諸物靜審於夜氣清明之始動審於感物遂通之時連下四箇審字文勢通暢察夫毫芒之義利辨夫同行異情之天理人欲審似是而非者同朱文公云天理人欲行異情得其真是而不惑於似是者然後可以語道矣應主意似是而非字此子雲之所深憂也歟叙出處或曰是之不可不審固矣然焉知其是而審之乎設疑喚下意人以為是我以為非我以為是人以為非一人各執一見焉知其真是之所在是乎人則其失流於苟同以他人為是既不是是乎已則其失流於自異以已為是亦不是學者將奚從乎設問曰答上問衆言淆亂則折諸聖見揚子有此二句故生前一段議論謹論論學繩尺卷十
